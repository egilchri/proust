d’avoir un rêve affreux ; elle ne pouvait me voir de la façon dont elle était placée, et je restais là ne sachant si je devais m’avancer ou me retirer ; mais déjà elle semblait revenue au sentiment de la réalité et avait reconnu le mensonge des visions qui l’avaient effrayée ; un sourire de joie, de pieuse reconnaissance envers Dieu qui permet que la vie soit moins cruelle que les rêves, éclaira faiblement son visage, et avec cette habitude qu’elle avait prise de se parler à mi-voix à elle-même quand elle se croyait seule, elle murmura : « Dieu soit loué ! nous n’avons comme tracas que la fille de cuisine qui accouche.", "en": "I was going to leave quietly, but undoubtedly the noise I had made had intervened in her sleep and had \"changed the speed\", as they say for automobiles, because the music of the snoring stopped for a second and resumed a lower tone, then she woke up and half turned her face which I could then see; he expressed a sort of terror; she had obviously just had a terrible dream; she could not see me from the way she was placed, and I remained there not knowing whether I should advance or withdraw; but already she seemed to have returned to the feeling of reality and had recognized the lie of the visions which had frightened her; a smile of joy, of pious gratitude to God who allows life to be less cruel than dreams, faintly lit up her face, and with that habit she had acquired of speaking to herself in a low voice when she thought she was alone, she murmured: “Praise be to God! All we have to worry about is the kitchen maid giving birth."}, {"start": 8298.93, "end": 8319.47, "b_start": 16463.17, "b_end": 16505.95, "orig": "Voilà-t-il pas que je rêvais que mon pauvre Octave était ressuscité et qu’il voulait me faire faire une promenade tous les jours ! » Sa main se tendit vers son chapelet qui était sur la petite table, mais le sommeil recommençant ne lui laissa pas la force de l’atteindre : elle se rendormit, tranquillisée, et je sortis à pas de loup de la chambre sans qu’elle ni personne eût jamais appris ce que j’avais entendu.", "en": "Didn't I dream that my poor Octave had come back to life and that he wanted to take me for a walk every day! » Her hand reached for her rosary which was on the little table, but the resuming sleep did not leave her with the strength to reach it: she fell asleep again, reassured, and I quietly left the room without her or anyone having ever learned what I had heard."}, {"start": 8320.47, "end": 8336.82, "b_start": 16505.95, "b_end": 16540.78, "orig": "Quand je dis qu’en dehors d’événements très rares, comme cet accouchement, le traintrain de ma tante ne subissait jamais aucune variation, je ne parle pas de celles qui, se répétant toujours identiques à des intervalles réguliers, n’introduisaient au sein de l’uniformité qu’une sorte d’uniformité secondaire.", "en": "When I say that apart from very rare events, like this childbirth, my aunt's routine never underwent any variation, I am not talking about those which, always repeating themselves identically at regular intervals, only introduced into the uniformity a sort of secondary uniformity."}, {"start": 8337.82, "end": 8346.84, "b_start": 16540.78, "b_end": 16560.69, "orig": "C’est ainsi que tous les samedis, comme Françoise allait dans l’après-midi au marché de Roussainville-le-Pin, le déjeuner était, pour tout le monde, une heure plus tôt.", "en": "This is how every Saturday, as Françoise went to the Roussainville-le-Pin market in the afternoon, lunch was, for everyone, an hour earlier."}, {"start": 8347.84, "end": 8355.76, "b_start": 16560.69, "b_end": 16577.12, "orig": "Et ma tante avait si bien pris l’habitude de cette dérogation hebdomadaire à ses habitudes, qu’elle tenait à cette habitude-là autant qu’aux autres.", "en": "And my aunt had gotten so used to this weekly departure from her habits that she valued this habit as much as the others."}, {"start": 8356.76, "end": 8371.23, "b_start": 16577.12, "b_end": 16607.11, "orig": "Elle y était si bien « routinée », comme disait Françoise, que s’il lui avait fallu un samedi, attendre pour déjeuner l’heure habituelle, cela l’eût autant « dérangée » que si elle avait dû, un autre jour, avancer son déjeuner à l’heure du samedi.", "en": "She was so well “routine” there, as Françoise said, that if she had had to wait until the usual time for lunch on a Saturday, it would have “disturbed” her as much as if she had had to, on another day, bring forward her lunch to Saturday time."}, {"start": 8372.23, "end": 8380.54, "b_start": 16607.11, "b_end": 16624.57, "orig": "Cette avance du déjeuner donnait d’ailleurs au samedi, pour nous tous, une figure particulière, indulgente, et assez sympathique.", "en": "This advance of lunch also gave Saturday, for all of us, a particular, indulgent, and quite pleasant aspect."}, {"start": 8381.54, "end": 8393.63, "b_start": 16624.57, "b_end": 16650.62, "orig": "Au moment où d’habitude on a encore une heure à vivre avant la détente du repas, on savait que, dans quelques secondes, on allait voir arriver des endives précoces, une omelette de faveur, un bifteck immérité.", "en": "At a time when we usually still have an hour to live before the meal relaxes, we knew that, in a few seconds, we would see the arrival of early endives, a favored omelette, an undeserved steak."}, {"start": 8394.63, "end": 8415.46, "b_start": 16650.62, "b_end": 16694.58, "orig": "Le retour de ce samedi asymétrique était un de ces petits événements intérieurs, locaux, presque civiques qui, dans les vies tranquilles et les sociétés fermées, créent une sorte de lien national et deviennent le thème favori des conversations, des plaisanteries, des récits exagérés à plaisir : il eût été le noyau tout prêt pour un cycle légendaire si l’un de nous avait eu la tête épique.", "en": "The return of this asymmetrical Saturday was one of those small internal, local, almost civic events which, in quiet lives and closed societies, create a sort of national bond and become the favorite theme of conversations, jokes, exaggerated stories at pleasure: it would have been the ready-made nucleus for a legendary cycle if one of us had had an epic head."}, {"start": 8416.46, "end": 8459.26, "b_start": 16694.58, "b_end": 16783.99, "orig": "Dès le matin, avant d’être habillés, sans raison, pour le plaisir d’éprouver la force de la solidarité, on se disait les uns aux autres avec bonne humeur, avec cordialité, avec patriotisme : « Il n’y a pas de temps à perdre, n’oublions pas que c’est samedi ! » cependant que ma tante, conférant avec Françoise et songeant que la journée serait plus longue que d’habitude, disait : « Si vous leur faisiez un beau morceau de veau, comme c’est samedi. » Si à dix heures et demie un distrait tirait sa montre en disant : « Allons, encore une heure et demie avant le déjeuner », chacun était enchanté d’avoir à lui dire : « Mais voyons, à quoi pensez-vous, vous oubliez que c’est samedi ! » ; on en riait encore un quart d’heure après et on se promettait de monter raconter cet oubli à ma tante pour l’amuser.", "en": "From the morning, before getting dressed, for no reason, for the pleasure of experiencing the strength of solidarity, we said to each other with good humor, with cordiality, with patriotism: “There is no time to waste, let’s not forget that it’s Saturday! » while my aunt, conferring with Françoise and thinking that the day would be longer than usual, said: “If you made them a nice piece of veal, as it is Saturday. » If at half past ten an absent-minded person pulled out his watch and said: “Come on, still an hour and a half before lunch,” everyone was delighted to have to say to him: “Come on, what are you thinking, you forget that it’s Saturday! »; we were still laughing about it a quarter of an hour later and we promised to go up and tell my aunt about this oversight to amuse her."}, {"start": 8460.26, "end": 8463.4, "b_start": 16783.99, "b_end": 16792.04, "orig": "Le visage du ciel même semblait changé.", "en": "The face of the sky itself seemed changed."}, {"start": 8464.4, "end": 8515.16, "b_start": 16792.04, "b_end": 16894.8, "orig": "Après le déjeuner, le soleil, conscient que c’était samedi, flânait une heure de plus au haut du ciel, et quand quelqu’un, pensant qu’on était en retard pour la promenade, disait : « Comment, seulement deux heures ? » en voyant passer les deux coups du clocher de Saint-Hilaire (qui ont l’habitude de ne rencontrer encore personne dans les chemins désertés à cause du repas de midi ou de la sieste, le long de la rivière vive et blanche que le pêcheur même a abandonnée, et passent solitaires dans le ciel vacant où ne restent que quelques nuages paresseux), tout le monde en chœur lui répondait : « Mais ce qui vous trompe, c’est qu’on a déjeuné une heure plus tôt, vous savez bien que c’est samedi ! » La surprise d’un barbare (nous appelions ainsi tous les gens qui ne savaient pas ce qu’avait de particulier le samedi) qui, étant venu à onze heures pour parler à mon père, nous avait trouvés à table, était une des choses qui, dans sa vie, avaient le plus égayé Françoise.", "en": "After lunch the sun, aware that it was Saturday, loitered an hour longer high in the sky, and when someone, thinking we were late for the walk, said: “What, only two hours? » seeing the two shots of the bell tower of Saint-Hilaire pass (which are used to meeting no one yet on the deserted paths because of the midday meal or the siesta, along the white and white river that even the fisherman has abandoned, and pass solitary in the vacant sky where only a few lazy clouds remain), everyone answered him in chorus: \"But what deceives you is that we had lunch an hour earlier, you know very well that it is Saturday! » The surprise of a barbarian (that's what we called all the people who didn't know what was special about Saturday) who, having come at eleven o'clock to speak to my father, found us at the table, was one of the things which, in her life, had brightened Françoise the most."}, {"start": 8516.16, "end": 8549.78, "b_start": 16894.8, "b_end": 16966.23, "orig": "Mais si elle trouvait amusant que le visiteur interloqué ne sût pas que nous déjeunions plus tôt le samedi, elle trouvait plus comique encore (tout en sympathisant du fond du cœur avec ce chauvinisme étroit) que mon père, lui, n’eût pas eu l’idée que ce barbare pouvait l’ignorer et eût répondu sans autre explication à son étonnement de nous voir déjà dans la salle à manger : « Mais voyons, c’est samedi ! » Parvenue à ce point de son récit, elle essuyait des larmes d’hilarité et pour accroître le plaisir qu’elle éprouvait, elle prolongeait le dialogue, inventait ce qu’avait répondu le visiteur à qui ce « samedi » n’expliquait rien.", "en": "But if she found it amusing that the taken aback visitor did not know that we had lunch earlier on Saturday, she found it even more comical (while sympathizing from the bottom of her heart with this narrow chauvinism) that my father had not had the idea that this barbarian could ignore it and had responded without any further explanation to his astonishment at seeing us already in the dining room: “But let's see, it's Saturday! » Reaching this point in her story, she wiped away tears of hilarity and to increase the pleasure she felt, she prolonged the dialogue, inventing what the visitor had responded to to whom this “Saturday” explained nothing."}, {"start": 8550.78, "end": 8558.73, "b_start": 16966.23, "b_end": 16984.05, "orig": "Et bien loin de nous plaindre de ses additions, elles ne nous suffisaient pas encore et nous disions : « Mais il me semblait qu’il avait dit aussi autre chose.", "en": "And far from complaining about his additions, they were still not enough for us and we said: “But it seemed to me that he had also said something else."}, {"start": 8559.73, "end": 8568.87, "b_start": 16984.05, "b_end": 17003.19, "orig": "C’était plus long la première fois quand vous l’avez raconté. » Ma grand’tante elle-même laissait son ouvrage, levait la tête et regardait par-dessus son lorgnon.", "en": "It was longer the first time when you told it. » My great aunt herself left her work, raised her head and looked over her glasses."}, {"start": 8569.87, "end": 8581.01, "b_start": 17003.19, "b_end": 17026.08, "orig": "Le samedi avait encore ceci de particulier que ce jour-là, pendant le mois de mai, nous sortions après le dîner pour aller au « mois de Marie ». Comme nous y rencontrions parfois M.", "en": "Saturday was also special in that on that day, during the month of May, we went out after dinner to go to the “month of Mary”. As we sometimes met there Mr."}, {"start": 8582.01, "end": 8597.99, "b_start": 17026.08, "b_end": 17059.54, "orig": "Vinteuil, très sévère pour « le genre déplorable des jeunes gens négligés, dans les idées de l’époque actuelle », ma mère prenait garde que rien ne clochât dans ma tenue, puis on partait pour l’église. C’est au mois de Marie que je me souviens d’avoir commencé à aimer les aubépines.", "en": "Vinteuil, very severe for \"the deplorable type of neglected young people, in the ideas of the current era\", my mother took care that nothing was wrong with my outfit, then we left for the church. It was in the month of Mary that I remember starting to love hawthorns."}, {"start": 8598.99, "end": 8625.58, "b_start": 17059.54, "b_end": 17121.52, "orig": "N’étant pas seulement dans l’église, si sainte, mais où nous avions le droit d’entrer, posées sur l’autel même, inséparables des mystères à la célébration desquels elles prenaient part, elles faisaient courir au milieu des flambeaux et des vases sacrés leurs branches attachées horizontalement les unes aux autres en un apprêt de fête, et qu’enjolivaient encore les festons de leur feuillage sur lequel étaient semés à profusion, comme sur une traîne de mariée, de petits bouquets de boutons d’une blancheur éclatante.", "en": "N’étant pas seulement dans l’église, si sainte, mais où nous avions le droit d’entrer, posées sur l’autel même, inséparables des mystères à la célébration desquels elles prenaient part, elles faisaient courir au milieu des flambeaux et des vases sacrés leurs branches attachées horizontalement les unes aux autres en un apprêt de fête, et qu’enjolivaient encore les festons de leur feuillage sur lequel étaient semés à profusion, comme sur une traîne de mariée, de small bouquets of dazzling white buds."}, {"start": 8626.58, "end": 8644.49, "b_start": 17121.52, "b_end": 17166.32, "orig": "Mais, sans oser les regarder qu’à la dérobée, je sentais que ces apprêts pompeux étaient vivants et que c’était la nature elle-même qui, en creusant ces découpures dans les feuilles, en ajoutant l’ornement suprême de ces blancs boutons, avait rendu cette décoration digne de ce qui était à la fois une réjouissance populaire et une solennité mystique.", "en": "Mais, sans oser les regarder qu’à la dérobée, je sentais que ces apprêts pompeux étaient vivants et que c’était la nature elle-même qui, en creusant ces découpures dans les feuilles, en ajoutant l’ornement suprême de ces blancs boutons, avait rendu cette décoration digne de ce qui était à la fois une réjouissance populaire et une solennité mystique."}, {"start": 8645.49, "end": 8670.83, "b_start": 17166.32, "b_end": 17220.02, "orig": "Plus haut s’ouvraient leurs corolles çà et là avec une grâce insouciante, retenant si négligemment comme un dernier et vaporeux atour le bouquet d’étamines, fines comme des fils de la Vierge, qui les embrumait tout entières, qu’en suivant, qu’en essayant de mimer au fond de moi le geste de leur efflorescence, je l’imaginais comme si ç’avait été le mouvement de tête étourdi et rapide, au regard coquet, aux pupilles diminuées, d’une blanche jeune fille, distraite et vive.", "en": "Higher up, their corollas opened here and there with a carefree grace, retaining so carelessly as a last and vaporous surround the bouquet of stamens, fine as the threads of the Virgin, which misted them entirely, that while following, while trying to mimic deep within myself the gesture of their efflorescence, I imagined it as if it had been the dizzy and rapid movement of the head, with the coquettish gaze, with the pupils diminished, of a white young girl, distracted and lively."}, {"start": 8671.83, "end": 8688.15, "b_start": 17220.02, "b_end": 17258.62, "orig": "M. Vinteuil était venu avec sa fille se placer à côté de nous. D’une bonne famille, il avait été le professeur de piano des sœurs de ma grand’mère et quand, après la mort de sa femme et un héritage qu’il avait fait, il s’était retiré auprès de Combray, on le recevait souvent à la maison.", "en": "Mr. Vinteuil had come with his daughter to stand next to us. D’une bonne famille, il avait été le professeur de piano des sœurs de ma grand’mère et quand, après la mort de sa femme et un héritage qu’il avait fait, il s’était retiré auprès de Combray, on le recevait souvent à la maison."}, {"start": 8689.15, "end": 8698.37, "b_start": 17258.62, "b_end": 17280.69, "orig": "Mais d’une pudibonderie excessive, il cessa de venir pour ne pas rencontrer Swann qui avait fait ce qu’il appelait « un mariage déplacé, dans le goût du jour ».", "en": "Mais d’une pudibonderie excessive, il cessa de venir pour ne pas rencontrer Swann qui avait fait ce qu’il appelait « un mariage déplacé, dans le goût du jour »."}, {"start": 8699.37, "end": 8710.0, "b_start": 17280.69, "b_end": 17303.29, "orig": "Ma mère, ayant appris qu’il composait, lui avait dit par amabilité que, quand elle irait le voir, il faudrait qu’il lui fît entendre quelque chose de lui. M.", "en": "My mother, having learned that he composed, had told him out of kindness that, when she went to see him, he would have to let her hear something of his own. Mr."}, {"start": 8711.0, "end": 8724.66, "b_start": 17303.29, "b_end": 17332.12, "orig": "Vinteuil en aurait eu beaucoup de joie, mais il poussait la politesse et la bonté jusqu’à de tels scrupules que, se mettant toujours à la place des autres, il craignait de les ennuyer et de leur paraître égoïste s’il suivait ou seulement laissait deviner son désir.", "en": "Vinteuil would have been very happy about it, but he pushed his politeness and kindness to such scruples that, always putting himself in the place of others, he feared boring them and appearing selfish if he followed or even hinted at his desire."}, {"start": 8725.66, "end": 8733.7, "b_start": 17332.12, "b_end": 17353.69, "orig": "Le jour où mes parents étaient allés chez lui en visite, je les avais accompagnés, mais ils m’avaient permis de rester dehors et, comme la maison de M.", "en": "Le jour où mes parents étaient allés chez lui en visite, je les avais accompagnés, mais ils m’avaient permis de rester dehors et, comme la maison de M."}, {"start": 8734.7, "end": 8749.98, "b_start": 17353.69, "b_end": 17388.5, "orig": "Vinteuil, Montjouvain, était en contre-bas d’un monticule buissonneux, où je m’étais caché, je m’étais trouvé de plain-pied avec le salon du second étage, à cinquante centimètres de la fenêtre. Quand on était venu lui annoncer mes parents, j’avais vu M.", "en": "Vinteuil, Montjouvain, était en contre-bas d’un monticule buissonneux, où je m’étais caché, je m’étais trouvé de plain-pied avec le salon du second étage, à cinquante centimètres de la fenêtre. When we came to tell him about my parents, I saw Mr."}, {"start": 8750.98, "end": 8766.54, "b_start": 17388.5, "b_end": 17420.94, "orig": "Vinteuil se hâter de mettre en évidence sur le piano un morceau de musique. Mais une fois mes parents entrés, il l’avait retiré et mis dans un coin. Sans doute avait-il craint de leur laisser supposer qu’il n’était heureux de les voir que pour leur jouer de ses compositions.", "en": "Vinteuil hastens to highlight a piece of music on the piano. But once my parents came in, he took it out and put it in a corner. No doubt he was afraid of letting them suppose that he was only happy to see them to play his compositions for them."}, {"start": 8767.54, "end": 8782.25, "b_start": 17420.94, "b_end": 17451.84, "orig": "Et chaque fois que ma mère était revenue à la charge au cours de la visite, il avait répété plusieurs fois : « Mais je ne sais qui a mis cela sur le piano, ce n’est pas sa place », et avait détourné la conversation sur d’autres sujets, justement parce que ceux-là l’intéressaient moins.", "en": "And each time my mother returned to the charge during the visit, he repeated several times: “But I don’t know who put that on the piano, it’s not his place,” and turned the conversation to other subjects, precisely because those interested him less."}, {"start": 8783.25, "end": 8796.54, "b_start": 17451.84, "b_end": 17479.88, "orig": "Sa seule passion était pour sa fille et celle-ci, qui avait l’air d’un garçon, paraissait si robuste qu’on ne pouvait s’empêcher de sourire en voyant les précautions que son père prenait pour elle, ayant toujours des châles supplémentaires à lui jeter sur les épaules.", "en": "His only passion was for his daughter and she, who looked like a boy, seemed so robust that one could not help but smile when seeing the precautions her father took for her, always having extra shawls to throw over her shoulders."}, {"start": 8797.54, "end": 8807.62, "b_start": 17479.88, "b_end": 17501.4, "orig": "Ma grand’mère faisait remarquer quelle expression douce, délicate, presque timide passait souvent dans les regards de cette enfant si rude, dont le visage était semé de taches de son.", "en": "My grandmother pointed out what a gentle, delicate, almost shy expression often passed through the eyes of this rough child, whose face was strewn with freckles."}, {"start": 8808.62, "end": 8823.94, "b_start": 17501.4, "b_end": 17534.26, "orig": "Quand elle venait de prononcer une parole, elle l’entendait avec l’esprit de ceux à qui elle l’avait dite, s’alarmait des malentendus possibles et on voyait s’éclairer, se découper comme par transparence, sous la figure hommasse du « bon diable », les traits plus fins d’une jeune fille éplorée.", "en": "When she had just uttered a word, she heard it with the spirit of those to whom she had said it, was alarmed by possible misunderstandings and we saw light up, silhouetted as if by transparency, under the human face of the \"good devil\", the finer features of a young girl in tears."}, {"start": 8824.94, "end": 8848.96, "b_start": 17534.26, "b_end": 17589.79, "orig": "Quand, au moment de quitter l’église, je m’agenouillai devant l’autel, je sentis tout d’un coup, en me relevant, s’échapper des aubépines une odeur amère et douce d’amandes, et je remarquai alors sur les fleurs de petites places plus blondes, sous lesquelles je me figurai que devait être cachée cette odeur comme sous les parties gratinées le goût d’une frangipane, ou sous leurs taches de rousseur celui des joues de M\nlle\nVinteuil.", "en": "Quand, au moment de quitter l’église, je m’agenouillai devant l’autel, je sentis tout d’un coup, en me relevant, s’échapper des aubépines une odeur amère et douce d’amandes, et je remarquai alors sur les fleurs de petites places plus blondes, sous lesquelles je me figurai que devait être cachée cette odeur comme sous les parties gratinées le goût d’une frangipane, ou sous leurs taches de rousseur celui des joues de M lle Vinteuil."}, {"start": 8849.96, "end": 8869.66, "b_start": 17589.79, "b_end": 17632.11, "orig": "Malgré la silencieuse immobilité des aubépines, cette intermittente ardeur était comme le murmure de leur vie intense dont l’autel vibrait ainsi qu’une haie agreste visitée par de vivantes antennes, auxquelles on pensait en voyant certaines étamines presque rousses qui semblaient avoir gardé la virulence printanière, le pouvoir irritant, d’insectes aujourd’hui métamorphosés en fleurs.", "en": "Despite the silent immobility of the hawthorns, this intermittent ardor was like the murmur of their intense life, the altar of which vibrated like a rustic hedge visited by living antennae, of which one thought when seeing certain almost red stamens which seemed to have retained the spring virulence, the irritating power, of insects now metamorphosed into flowers."}, {"start": 8870.66, "end": 8882.33, "b_start": 17632.11, "b_end": 17657.68, "orig": "Nous causions un moment avec M. Vinteuil devant le porche en sortant de l’église. Il intervenait entre les gamins qui se chamaillaient sur la place, prenait la défense des petits, faisait des sermons aux grands.", "en": "We chatted for a while with Mr. Vinteuil in front of the porch as we left the church. He intervened between the kids who were bickering in the square, defended the little ones, gave sermons to the older ones."}, {"start": 8883.33, "end": 8896.05, "b_start": 17657.68, "b_end": 17685.92, "orig": "Si sa fille nous disait de sa grosse voix combien elle avait été contente de nous voir, aussitôt il semblait qu’en elle-même une sœur plus sensible rougissait de ce propos de bon garçon étourdi qui avait pu nous faire croire qu’elle sollicitait d’être invitée chez nous.", "en": "If her daughter told us in her loud voice how happy she was to see us, it immediately seemed as if a more sensitive sister within herself blushed at this thoughtless good-natured remark which could have made us believe that she was asking to be invited to our house."}, {"start": 8897.05, "end": 8904.46, "b_start": 17685.92, "b_end": 17702.54, "orig": "Son père lui jetait un manteau sur les épaules, ils montaient dans un petit buggy qu’elle conduisait elle-même et tous deux retournaient à Montjouvain.", "en": "Her father threw a coat over her shoulders, they got into a small buggy that she drove herself and they both returned to Montjouvain."}, {"start": 8905.46, "end": 8927.52, "b_start": 17702.54, "b_end": 17747.65, "orig": "Quant à nous, comme c’était le lendemain dimanche et qu’on ne se lèverait que pour la grand’messe, s’il faisait clair de lune et que l’air fût chaud, au lieu de nous faire rentrer directement, mon père, par amour de la gloire, nous faisait faire par le calvaire une longue promenade, que le peu d’aptitude de ma mère à s’orienter et à se reconnaître dans son chemin, lui faisait considérer comme la prouesse d’un génie stratégique.", "en": "As for us, as it was the next day, Sunday, and we would only get up for High Mass, if it was moonlight and the air was warm, instead of sending us home directly, my father, for love of glory, took us through the ordeal for a long walk, which my mother's lack of ability to orient herself and recognize her path made him consider it as the feat of strategic genius."}, {"start": 8928.52, "end": 8952.33, "b_start": 17747.65, "b_end": 17798.71, "orig": "Parfois nous allions jusqu’au viaduc, dont les enjambées de pierre commençaient à la gare et me représentaient l’exil et la détresse hors du monde civilisé, parce que chaque année en venant de Paris, on nous recommandait de faire bien attention, quand ce serait Combray, de ne pas laisser passer la station, d’être prêts d’avance, car le train repartait au bout de deux minutes et s’engageait sur le viaduc au delà des pays chrétiens dont Combray marquait pour moi l’extrême limite.", "en": "Sometimes we went as far as the viaduct, whose stone steps began at the station and represented to me exile and distress outside the civilized world, because every year when coming from Paris, we were advised to be very careful, when it was Combray, not to let the station pass, to be ready in advance, because the train left after two minutes and took the viaduct beyond the Christian countries of which Combray marked for me the extreme limit."}, {"start": 8953.33, "end": 8970.51, "b_start": 17798.71, "b_end": 17834.65, "orig": "Nous revenions par le boulevard de la gare, où étaient les plus agréables villas de la commune. Dans chaque jardin le clair de lune, comme Hubert Robert, semait ses degrés rompus de marbre blanc, ses jets d’eau, ses grilles entr’ouvertes. Sa lumière avait détruit le bureau du télégraphe.", "en": "We returned via the boulevard de la gare, where the most pleasant villas in the town were located. In each garden the moonlight, like Hubert Robert, sowed its broken steps of white marble, its jets of water, its half-open gates. Its light had destroyed the telegraph office."}, {"start": 8971.51, "end": 8977.46, "b_start": 17834.65, "b_end": 17847.84, "orig": "Il n’en subsistait plus qu’une colonne à demi brisée, mais qui gardait la beauté d’une ruine immortelle.", "en": "All that remained was a half-broken column, but which retained the beauty of an immortal ruin."}, {"start": 8978.46, "end": 8988.98, "b_start": 17847.84, "b_end": 17870.65, "orig": "Je traînais la jambe, je tombais de sommeil, l’odeur des tilleuls qui embaumait m’apparaissait comme une récompense qu’on ne pouvait obtenir qu’au prix des plus grandes fatigues et qui n’en valait pas la peine.", "en": "I dragged my leg, I fell asleep, the scent of the linden trees which fragrant seemed to me like a reward that could only be obtained at the cost of the greatest fatigue and which was not worth it."}, {"start": 8989.98, "end": 9014.24, "b_start": 17870.65, "b_end": 17921.61, "orig": "De grilles fort éloignées les unes des autres, des chiens réveillés par nos pas solitaires faisaient alterner des aboiements comme il m’arrive encore quelquefois d’en entendre le soir, et entre lesquels dut venir (quand sur son emplacement on créa le jardin public de Combray) se réfugier le boulevard de la gare, car, où que je me trouve, dès qu’ils commencent à retentir et à se répondre, je l’aperçois, avec ses tilleuls et son trottoir éclairé par la lune.", "en": "From gates very far from each other, dogs awakened by our solitary steps alternated barking as I still sometimes hear in the evening, and between which must have come (when the public garden of Combray was created on its site) to take refuge on the boulevard de la gare, because, wherever I am, as soon as they begin to sound and respond to each other, I see it, with its lime trees and its lit sidewalk. by the moon."}, {"start": 9015.24, "end": 9027.89, "b_start": 17921.61, "b_end": 17949.8, "orig": "Tout d’un coup mon père nous arrêtait et demandait à ma mère : « Où sommes-nous ? » Épuisée par la marche, mais fière de lui, elle lui avouait tendrement qu’elle n’en savait absolument rien. Il haussait les épaules et riait.", "en": "Suddenly my father stopped us and asked my mother, “Where are we? » Exhausted by the walk, but proud of him, she tenderly admitted to him that she knew absolutely nothing about it. He shrugged his shoulders and laughed."}, {"start": 9028.89, "end": 9041.75, "b_start": 17949.8, "b_end": 17977.22, "orig": "Alors, comme s’il l’avait sortie de la poche de son veston avec sa clef, il nous montrait debout devant nous la petite porte de derrière de notre jardin qui était venue avec le coin de la rue du Saint-Esprit nous attendre au bout de ces chemins inconnus.", "en": "Then, as if he had taken it out of his jacket pocket with his key, he showed us standing in front of us the little back door to our garden which had come with the corner of the rue du Saint-Esprit to wait for us at the end of these unknown paths."}, {"start": 9042.75, "end": 9061.81, "b_start": 17977.22, "b_end": 18017.05, "orig": "Ma mère lui disait avec admiration : « Tu es extraordinaire ! » Et à partir de cet instant, je n’avais plus un seul pas à faire, le sol marchait pour moi dans ce jardin où depuis si longtemps mes actes avaient cessé d’être accompagnés d’attention volontaire : l’Habitude venait de me prendre dans ses bras et me portait jusqu’à mon lit comme un petit enfant.", "en": "My mother would say to him in admiration, “You’re amazing! » And from that moment on, I no longer had a single step to take, the ground walked for me in this garden where for so long my actions had ceased to be accompanied by voluntary attention: Habit had just taken me in its arms and carried me to my bed like a little child."}, {"start": 9062.81, "end": 9081.41, "b_start": 18017.05, "b_end": 18056.2, "orig": "Si la journée du samedi, qui commençait une heure plus tôt, et où elle était privée de Françoise, passait plus lentement qu’une autre pour ma tante, elle en attendait pourtant le retour avec impatience depuis le commencement de la semaine, comme contenant toute la nouveauté et la distraction que fût encore capable de supporter son corps affaibli et maniaque.", "en": "If the day of Saturday, which began an hour earlier, and where she was deprived of Françoise, passed more slowly than any other for my aunt, she nevertheless awaited its return with impatience since the beginning of the week, as containing all the novelty and distraction that her weakened and manic body was still capable of supporting."}, {"start": 9082.41, "end": 9121.96, "b_start": 18056.2, "b_end": 18141.01, "orig": "Et ce n’est pas cependant qu’elle n’aspirât parfois à quelque plus grand changement, qu’elle n’eût de ces heures d’exception où l’on a soif de quelque chose d’autre que ce qui est, et où ceux que le manque d’énergie ou d’imagination empêche de tirer d’eux-mêmes un principe de rénovation demandent à la minute qui vient, au facteur qui sonne, de leur apporter du nouveau, fût-ce du pire, une émotion, une douleur ; où la sensibilité, que le bonheur a fait taire comme une harpe oisive, veut résonner sous une main, même brutale, et dût-elle en être brisée ; où la volonté, qui a si difficilement conquis le droit d’être livrée sans obstacle à ses désirs, à ses peines, voudrait jeter les rênes entre les mains d’événements impérieux, fussent-ils cruels.", "en": "And it is not, however, that she did not sometimes aspire to some greater change, that she did not have those exceptional hours when we thirst for something other than what is, and where those whose lack of energy or imagination prevents them from drawing from themselves a principle of renovation ask at the next minute, to the postman who rings, to bring them something new, even if it is the worst, an emotion, a pain; where sensitivity, which happiness has silenced like an idle harp, wants to resonate under a hand, even brutal, and even if it is broken; where the will, which has so difficultly won the right to be delivered without obstacle to its desires, to its sorrows, would like to throw the reins into the hands of compelling events, even if they were cruel."}, {"start": 9122.96, "end": 9139.98, "b_start": 18141.01, "b_end": 18178.03, "orig": "Sans doute, comme les forces de ma tante, taries à la moindre fatigue, ne lui revenaient que goutte à goutte au sein de son repos, le réservoir était très long à remplir, et il se passait des mois avant qu’elle eût ce léger trop-plein que d’autres dérivent dans l’activité et dont elle était incapable de savoir et de décider comment user.", "en": "No doubt, as my aunt's strength, dried up at the slightest fatigue, only returned to her drop by drop during her rest, the reservoir took a very long time to fill, and months passed before she had that slight overflow that others derive from activity and of which she was incapable of knowing or deciding how to use it."}, {"start": 9140.98, "end": 9168.24, "b_start": 18178.03, "b_end": 18236.94, "orig": "Je ne doute pas qu’alors – comme le désir de la remplacer par des pommes de terre béchamel finissait au bout de quelque temps par naître du plaisir même que lui causait le retour quotidien de la purée dont elle ne se « fatiguait » pas – elle ne tirât de l’accumulation de ces jours monotones auxquels elle tenait tant l’attente d’un cataclysme domestique, limité à la durée d’un moment, mais qui la forcerait d’accomplir une fois pour toutes un de ces changements dont elle reconnaissait qu’ils lui seraient salutaires et auxquels elle ne pouvait d’elle-même se décider.", "en": "I have no doubt that then - as the desire to replace it with béchamel potatoes ended up being born after a while from the very pleasure caused to her by the daily return of the mash of which she did not \"get tired\" - she drew from the accumulation of these monotonous days to which she was so attached the expectation of a domestic cataclysm, limited to the duration of a moment, but which would force her to accomplish once and for all one of these changes which she recognized that they would be beneficial to her and which she could not decide on herself."}, {"start": 9169.24, "end": 9213.28, "b_start": 18236.94, "b_end": 18329.52, "orig": "Elle nous aimait véritablement, elle aurait eu plaisir à nous pleurer ; survenant à un moment où elle se sentait bien et n’était pas en sueur, la nouvelle que la maison était la proie d’un incendie où nous avions déjà tous péri et qui n’allait plus bientôt laisser subsister une seule pierre des murs, mais auquel elle aurait eu tout le temps d’échapper sans se presser, à condition de se lever tout de suite, a dû souvent hanter ses espérances comme unissant aux avantages secondaires de lui faire savourer dans un long regret toute sa tendresse pour nous, et d’être la stupéfaction du village en conduisant notre deuil, courageuse et accablée, moribonde debout, celui bien plus précieux de la forcer au bon moment, sans temps à perdre, sans possibilité d’hésitation énervante, à aller passer l’été dans sa jolie ferme de Mirougrain, où il y avait une chute d’eau.", "en": "She truly loved us, she would have enjoyed crying for us; occurring at a time when she was feeling well and not sweating, the news that the house was prey to a fire in which we had all already perished and which would soon leave not a single stone of the walls remaining, but from which she would have had plenty of time to escape without hurrying, provided she got up immediately, must have often haunted her hopes as combining with the secondary advantages of making her savor in a long regret all her tenderness for us, and of being the amazement of the village in leading our mourning, courageous and overwhelmed, moribund standing, the much more precious one of forcing her at the right moment, without time to waste, without the possibility of annoying hesitation, to go and spend the summer on her pretty farm in Mirougrain, where there was a waterfall."}, {"start": 9214.28, "end": 9246.73, "b_start": 18329.52, "b_end": 18397.69, "orig": "Comme n’était jamais survenu aucun événement de ce genre, dont elle méditait certainement la réussite quand elle était seule absorbée dans ses innombrables jeux de patience (et qui l’eût désespérée au premier commencement de réalisation, au premier de ces petits faits imprévus, de cette parole annonçant une mauvaise nouvelle et dont on ne peut plus jamais oublier l’accent, de tout ce qui porte l’empreinte de la mort réelle, bien différente de sa possibilité logique et abstraite), elle se rabattait pour rendre de temps en temps sa vie plus intéressante, à y introduire des péripéties imaginaires qu’elle suivait avec passion.", "en": "As no event of this kind had ever occurred, the success of which she certainly meditated on when she was alone absorbed in her innumerable games of patience (and which would have despaired her at the first beginning of realization, at the first of these little unforeseen facts, of this word announcing bad news and of which one can never forget the accent, of everything which bears the imprint of real death, very different from its logical and abstract possibility), she fell back to make her life from time to time more interesting, to introduce imaginary adventures that she followed with passion."}, {"start": 9247.73, "end": 9275.11, "b_start": 18397.69, "b_end": 18455.85, "orig": "Elle se plaisait à supposer tout d’un coup que Françoise la volait, qu’elle recourait à la ruse pour s’en assurer, la prenait sur le fait ; habituée, quand elle faisait seule des parties de cartes, à jouer à la fois son jeu et le jeu de son adversaire, elle se prononçait à elle-même les excuses embarrassées de Françoise et y répondait avec tant de feu et d’indignation que l’un de nous, entrant à ces moments-là, la trouvait en nage, les yeux étincelants, ses faux cheveux déplacés laissant voir son front chauve.", "en": "She liked to suppose all of a sudden that Françoise was stealing from her, that she was resorting to trickery to make sure of it, that she was catching her in the act; accustomed, when she played cards alone, to playing both her own game and her opponent's game, she uttered Françoise's embarrassed apologies to herself and responded with so much fire and indignation that one of us, entering at those moments, found her sweating, her eyes sparkling, her false hair out of place revealing her bald forehead."}, {"start": 9276.11, "end": 9290.1, "b_start": 18455.85, "b_end": 18486.8, "orig": "Françoise entendit peut-être parfois dans la chambre voisine de mordants sarcasmes qui s’adressaient à elle et dont l’invention n’eût pas soulagé suffisamment ma tante s’ils étaient restés à l’état purement immatériel, et si en les murmurant à mi-voix elle ne leur eût donné plus de réalité.", "en": "Françoise perhaps sometimes heard in the neighboring room biting sarcasms addressed to her and the invention of which would not have sufficiently relieved my aunt if they had remained in a purely immaterial state, and if by murmuring them under her breath she had not given them more reality."}, {"start": 9291.1, "end": 9298.21, "b_start": 18486.8, "b_end": 18501.74, "orig": "Quelquefois, ce « spectacle dans un lit » ne suffisait même pas à ma tante, elle voulait faire jouer ses pièces.", "en": "Sometimes this “show in a bed” wasn’t even enough for my aunt, she wanted to have her plays performed."}, {"start": 9299.21, "end": 9323.9, "b_start": 18501.74, "b_end": 18558.15, "orig": "Alors, un dimanche, toutes portes mystérieusement fermées, elle confiait à Eulalie ses doutes sur la probité de Françoise, son intention de se défaire d’elle, et une autre fois, à Françoise ses soupçons de l’infidélité d’Eulalie, à qui la porte serait bientôt fermée ; quelques jours après elle était dégoûtée de sa confidente de la veille et racoquinée avec le traître, lesquels d’ailleurs, pour la prochaine représentation, échangeraient leurs emplois.", "en": "Alors, un dimanche, toutes portes mystérieusement fermées, elle confiait à Eulalie ses doutes sur la probité de Françoise, son intention de se défaire d’elle, et une autre fois, à Françoise ses soupçons de l’infidélité d’Eulalie, à qui la porte serait bientôt fermée ; quelques jours après elle était dégoûtée de sa confidente de la veille et racoquinée avec le traître, lesquels d’ailleurs, pour la prochaine représentation, échangeraient leurs emplois."}, {"start": 9324.9, "end": 9333.02, "b_start": 18558.15, "b_end": 18579.07, "orig": "Mais les soupçons que pouvait parfois lui inspirer Eulalie n’étaient qu’un feu de paille et tombaient vite, faute d’aliment, Eulalie n’habitant pas la maison.", "en": "Mais les soupçons que pouvait parfois lui inspirer Eulalie n’étaient qu’un feu de paille et tombaient vite, faute d’aliment, Eulalie n’habitant pas la maison."}, {"start": 9334.02, "end": 9347.48, "b_start": 18579.07, "b_end": 18611.96, "orig": "Il n’en était pas de même de ceux qui concernaient Françoise, que ma tante sentait perpétuellement sous le même toit qu’elle, sans que, par crainte de prendre froid si elle sortait de son lit, elle osât descendre à la cuisine se rendre compte s’ils étaient fondés.", "en": "Il n’en était pas de même de ceux qui concernaient Françoise, que ma tante sentait perpétuellement sous le même toit qu’elle, sans que, par crainte de prendre froid si elle sortait de son lit, elle osât descendre à la cuisine se rendre compte s’ils étaient fondés."}, {"start": 9348.48, "end": 9364.8, "b_start": 18611.96, "b_end": 18651.0, "orig": "Peu à peu son esprit n’eut plus d’autre occupation que de chercher à deviner ce qu’à chaque moment pouvait faire, et chercher à lui cacher, Françoise. Elle remarquait les plus furtifs mouvements de physionomie de celle-ci, une contradiction dans ses paroles, un désir qu’elle semblait dissimuler.", "en": "Peu à peu son esprit n’eut plus d’autre occupation que de chercher à deviner ce qu’à chaque moment pouvait faire, et chercher à lui cacher, Françoise. Elle remarquait les plus furtifs mouvements de physionomie de celle-ci, une contradiction dans ses paroles, un désir qu’elle semblait dissimuler."}, {"start": 9365.8, "end": 9375.93, "b_start": 18651.0, "b_end": 18675.7, "orig": "Et elle lui montrait qu’elle l’avait démasquée, d’un seul mot qui faisait pâlir Françoise et que ma tante semblait trouver, à enfoncer au cœur de la malheureuse, un divertissement cruel.", "en": "Et elle lui montrait qu’elle l’avait démasquée, d’un seul mot qui faisait pâlir Françoise et que ma tante semblait trouver, à enfoncer au cœur de la malheureuse, un divertissement cruel."}, {"start": 9376.93, "end": 9407.05, "b_start": 18675.7, "b_end": 18745.87, "orig": "Et le dimanche suivant, une révélation d’Eulalie – comme ces découvertes qui ouvrent tout d’un coup un champ insoupçonné à une science naissante et qui se traînait dans l’ornière – prouvait à ma tante qu’elle était dans ses suppositions bien au-dessous de la vérité. « Mais Françoise doit le savoir maintenant que vous y avez donné une voiture. » – « Que je lui ai donné une voiture ! » s’écriait ma tante. – « Ah ! mais je ne sais pas, moi, je croyais, je l’avais vue qui passait maintenant en calèche, fière comme Artaban, pour aller au marché de Roussainville.", "en": "Et le dimanche suivant, une révélation d’Eulalie – comme ces découvertes qui ouvrent tout d’un coup un champ insoupçonné à une science naissante et qui se traînait dans l’ornière – prouvait à ma tante qu’elle était dans ses suppositions bien au-dessous de la vérité. “But Françoise must know now that you gave her a car. » – “That I gave him a car! » cried my aunt. – “Ah! mais je ne sais pas, moi, je croyais, je l’avais vue qui passait maintenant en calèche, fière comme Artaban, pour aller au marché de Roussainville."}, {"start": 9408.05, "end": 9421.2, "b_start": 18745.87, "b_end": 18771.66, "orig": "J’avais cru que c’était M\nme\nOctave qui lui avait donné. » Peu à peu Françoise et ma tante, comme la bête et le chasseur, ne cessaient plus de tâcher de prévenir les ruses l’une de l’autre.", "en": "I had thought it was Madame Octave who had given it to him. » Little by little Françoise and my aunt, like the beast and the hunter, never stopped trying to prevent each other's tricks."}, {"start": 9422.2, "end": 9436.43, "b_start": 18771.66, "b_end": 18804.09, "orig": "Ma mère craignait qu’il ne se développât chez Françoise une véritable haine pour ma tante qui l’offensait le plus durement qu’elle le pouvait. En tous cas Françoise attachait de plus en plus aux moindres paroles, aux moindres gestes de ma tante une attention extraordinaire.", "en": "Ma mère craignait qu’il ne se développât chez Françoise une véritable haine pour ma tante qui l’offensait le plus durement qu’elle le pouvait. In any case, Françoise attached more and more extraordinary attention to my aunt's slightest words and gestures."}, {"start": 9437.43, "end": 9452.41, "b_start": 18804.09, "b_end": 18839.34, "orig": "Quand elle avait quelque chose à lui demander, elle hésitait longtemps sur la manière dont elle devait s’y prendre. Et quand elle avait proféré sa requête, elle observait ma tante à la dérobée, tâchant de deviner dans l’aspect de sa figure ce que celle-ci avait pensé et déciderait.", "en": "When she had something to ask him, she hesitated for a long time about how she should go about it. Et quand elle avait proféré sa requête, elle observait ma tante à la dérobée, tâchant de deviner dans l’aspect de sa figure ce que celle-ci avait pensé et déciderait."}, {"start": 9453.41, "end": 9517.3, "b_start": 18839.34, "b_end": 18986.4, "orig": "Et ainsi – tandis que quelque artiste lisant les Mémoires du XVII\ne\nsiècle, et désirant de se rapprocher du grand Roi, croit marcher dans cette voie en se fabriquant une généalogie qui le fait descendre d’une famille historique ou en entretenant une correspondance avec un des souverains actuels de l’Europe, tourne précisément le dos à ce qu’il a le tort de chercher sous des formes identiques et par conséquent mortes – une vieille dame de province qui ne faisait qu’obéir sincèrement à d’irrésistibles manies et à une méchanceté née de l’oisiveté, voyait sans avoir jamais pensé à Louis XIV les occupations les plus insignifiantes de sa journée, concernant son lever, son déjeuner, son repos, prendre par leur singularité despotique un peu de l’intérêt de ce que Saint-Simon appelait la « mécanique » de la vie à Versailles, et pouvait croire aussi que ses silences, une nuance de bonne humeur ou de hauteur dans sa physionomie, étaient de la part de Françoise l’objet d’un commentaire aussi passionné, aussi craintif que l’étaient le silence, la bonne humeur, la hauteur du Roi quand un courtisan, ou même les plus grands seigneurs, lui avaient remis une supplique, au détour d’une allée, à Versailles.", "en": "Et ainsi – tandis que quelque artiste lisant les Mémoires du XVII e siècle, et désirant de se rapprocher du grand Roi, croit marcher dans cette voie en se fabriquant une généalogie qui le fait descendre d’une famille historique ou en entretenant une correspondance avec un des souverains actuels de l’Europe, tourne précisément le dos à ce qu’il a le tort de chercher sous des formes identiques et par conséquent mortes – une vieille dame de province qui ne faisait qu’obéir sincèrement à d’irrésistibles manies et à une méchanceté née de l’oisiveté, voyait sans avoir jamais pensé à Louis XIV les occupations les plus insignifiantes de sa journée, concernant son lever, son déjeuner, son repos, prendre par leur singularité despotique un peu de l’intérêt de ce que Saint-Simon appelait la « mécanique » de la vie à Versailles, et pouvait croire aussi que ses silences, une nuance de bonne humeur ou de hauteur dans sa physionomie, étaient de la part de Françoise l’objet d’un commentaire aussi passionné, aussi craintif que l’étaient le silence, la bonne humeur, la hauteur du Roi quand un courtisan, ou même les plus grands seigneurs, lui avaient remis une supplique, au détour d’une allée, à Versailles."}, {"start": 9518.3, "end": 9540.78, "b_start": 18986.4, "b_end": 19039.59, "orig": "Un dimanche, où ma tante avait eu la visite simultanée du curé et d’Eulalie, et s’était ensuite reposée, nous étions tous montés lui dire bonsoir, et maman lui adressait ses condoléances sur la mauvaise chance qui amenait toujours ses visiteurs à la même heure :\n– Je sais que les choses se sont encore mal arrangées tantôt, Léonie, lui dit-elle avec douceur, vous avez eu tout votre monde à la fois.", "en": "Un dimanche, où ma tante avait eu la visite simultanée du curé et d’Eulalie, et s’était ensuite reposée, nous étions tous montés lui dire bonsoir, et maman lui adressait ses condoléances sur la mauvaise chance qui amenait toujours ses visiteurs à la même heure : – Je sais que les choses se sont encore mal arrangées tantôt, Léonie, lui dit-elle avec douceur, vous avez eu tout votre monde à la fois."}, {"start": 9541.78, "end": 9552.15, "b_start": 19039.59, "b_end": 19064.71, "orig": "Ce que ma grand’tante interrompit par : « Abondance de biens... » car depuis que sa fille était malade elle croyait devoir la remonter en lui présentant toujours tout par le bon côté.", "en": "Ce que ma grand’tante interrompit par : « Abondance de biens... » car depuis que sa fille était malade elle croyait devoir la remonter en lui présentant toujours tout par le bon côté."}, {"start": 9553.15, "end": 9568.85, "b_start": 19064.71, "b_end": 19096.52, "orig": "Mais mon père prenant la parole :\n– Je veux profiter, dit-il, de ce que toute la famille est réunie pour vous faire un récit sans avoir besoin de le recommencer à chacun. J’ai peur que nous ne soyons fâchés avec Legrandin : il m’a à peine dit bonjour ce matin.", "en": "But my father speaking: – I want to take advantage, he said, of the whole family being together to tell you a story without having to start it again for everyone. I'm afraid we'll be angry with Legrandin: he barely said hello to me this morning."}, {"start": 9569.85, "end": 9576.95, "b_start": 19096.52, "b_end": 19111.2, "orig": "Je ne restai pas pour entendre le récit de mon père, car j’étais justement avec lui après la messe quand nous avions rencontré M.", "en": "I did not stay to hear my father's story, because I was just with him after mass when we met Mr."}, {"start": 9577.95, "end": 9589.33, "b_start": 19111.2, "b_end": 19136.0, "orig": "Legrandin, et je descendis à la cuisine demander le menu du dîner qui tous les jours me distrayait comme les nouvelles qu’on lit dans un journal et m’excitait à la façon d’un programme de fête. Comme M.", "en": "Legrandin, and I went down to the kitchen to ask for the dinner menu which every day entertained me like the news you read in a newspaper and excited me like a party program. Like Mr."}, {"start": 9590.33, "end": 9602.78, "b_start": 19136.0, "b_end": 19162.87, "orig": "Legrandin avait passé près de nous en sortant de l’église, marchant à côté d’une châtelaine du voisinage que nous ne connaissions que de vue, mon père avait fait un salut à la fois amical et réservé, sans que nous nous arrêtions ; M.", "en": "Legrandin had passed by us on his way out of the church, walking alongside a neighboring chatelaine whom we only knew by sight, my father had made a greeting that was both friendly and reserved, without us stopping; Mr."}, {"start": 9603.78, "end": 9626.27, "b_start": 19162.87, "b_end": 19209.03, "orig": "Legrandin avait à peine répondu, d’un air étonné, comme s’il ne nous reconnaissait pas, et avec cette perspective du regard particulière aux personnes qui ne veulent pas être aimables et qui, du fond subitement prolongé de leurs yeux, ont l’air de vous apercevoir comme au bout d’une route interminable et à une si grande distance qu’elles se contentent de vous adresser un signe de tête minuscule pour le proportionner à vos dimensions de marionnette.", "en": "Legrandin had barely responded, with an air of surprise, as if he did not recognize us, and with that perspective of gaze particular to people who do not want to be friendly and who, from the suddenly extended depths of their eyes, seem to see you as if at the end of an endless road and at such a great distance that they are content to give you a tiny nod to proportion it to your puppet dimensions."}, {"start": 9627.27, "end": 9663.32, "b_start": 19209.03, "b_end": 19285.44, "orig": "Or, la dame qu’accompagnait Legrandin était une personne vertueuse et considérée ; il ne pouvait être question qu’il fût en bonne fortune et gêné d’être surpris, et mon père se demandait comment il avait pu mécontenter Legrandin. « Je regretterais d’autant plus de le savoir fâché, dit mon père, qu’au milieu de tous ces gens endimanchés il a, avec son petit veston droit, sa cravate molle, quelque chose de si peu apprêté, de si vraiment simple, et un air presque ingénu qui est tout à fait sympathique. » Mais le conseil de famille fut unanimement d’avis que mon père s’était fait une idée ou que Legrandin, à ce moment-là, était absorbé par quelque pensée.", "en": "Now, the lady whom Legrandin accompanied was a virtuous and considered person; there could be no question that he was in good fortune and embarrassed to be surprised, and my father wondered how he could have displeased Legrandin. “I would regret all the more to know that he was angry,” said my father, “that in the midst of all these people in their Sunday best, he has, with his little straight jacket, his loose tie, something so undressed, so truly simple, and an almost ingenuous air which is entirely likeable. » But the family council was unanimously of the opinion that my father had formed an idea or that Legrandin, at that moment, was absorbed in some thought."}, {"start": 9664.32, "end": 9676.37, "b_start": 19285.44, "b_end": 19311.73, "orig": "D’ailleurs la crainte de mon père fut dissipée dès le lendemain soir. Comme nous revenions d’une grande promenade, nous aperçûmes près du Pont-Vieux, Legrandin, qui à cause des fêtes restait plusieurs jours à Combray.", "en": "Besides, my father's fear was dissipated the next evening. As we were returning from a long walk, we saw near the Pont-Vieux, Legrandin, who was staying several days in Combray because of the holidays."}, {"start": 9677.37, "end": 9694.36, "b_start": 19311.73, "b_end": 19346.68, "orig": "Il vint à nous la main tendue : « Connaissez-vous, monsieur le liseur, me demanda-t-il, ce vers de Paul Desjardins :\nLes bois sont déjà noirs, le ciel est encor bleu... N’est-ce pas la fine notation de cette heure-ci ? Vous n’avez peut-être jamais lu Paul Desjardins.", "en": "He came to us with his hand outstretched: “Do you know, Mr. Reader,” he asked me, “this verse from Paul Desjardins: The woods are already black, the sky is still blue... Isn’t that the fine notation of this hour? You may have never read Paul Desjardins."}, {"start": 9695.36, "end": 9707.19, "b_start": 19346.68, "b_end": 19372.3, "orig": "Lisez-le, mon enfant ; aujourd’hui il se mue, me dit-on, en frère prêcheur, mais ce fut longtemps un aquarelliste limpide... Les bois sont déjà noirs, le ciel est encor bleu...", "en": "Read it, my child; today he is turning, I am told, into a preacher brother, but for a long time he was a clear watercolorist... The woods are already black, the sky is still blue..."}, {"start": 9708.19, "end": 9729.1, "b_start": 19372.3, "b_end": 19417.75, "orig": "Que le ciel reste toujours bleu pour vous, mon jeune ami ; et même à l’heure, qui vient pour moi maintenant, où les bois sont déjà noirs, où la nuit tombe vite, vous vous consolerez comme je fais en regardant du côté du ciel. » Il sortit de sa poche une cigarette, resta longtemps les yeux à l’horizon, « Adieu, les camarades », nous dit-il tout à coup, et il nous quitta.", "en": "May the sky always remain blue for you, my young friend; and even at the hour, which is coming for me now, when the woods are already dark, when night is falling quickly, you will console yourself as I do by looking towards the sky. » He took a cigarette from his pocket, remained for a long time with his eyes on the horizon, “Farewell, comrades,” he said to us suddenly, and left us."}, {"start": 9730.1, "end": 9762.23, "b_start": 19417.75, "b_end": 19485.51, "orig": "À cette heure où je descendais apprendre le menu, le dîner était déjà commencé, et Françoise, commandant aux forces de la nature devenues ses aides, comme dans les féeries où les géants se font engager comme cuisiniers, frappait la houille, donnait à la vapeur des pommes de terre à étuver et faisait finir à point par le feu les chefs-d’œuvre culinaires d’abord préparés dans des récipients de céramistes qui allaient des grandes cuves, marmites, chaudrons et poissonnières, aux terrines pour le gibier, moules à pâtisserie, et petits pots de crème en passant par une collection complète de casserole de toutes dimensions.", "en": "At that hour when I went down to learn the menu, dinner had already begun, and Françoise, commanding the forces of nature which had become her aids, as in the fairy tales where the giants are hired as cooks, was striking the coal, steaming the potatoes to steam and bringing the culinary masterpieces, first prepared in ceramists' vessels, which ranged from large vats, pots, cauldrons and fish bowls, to the perfect finish over the fire. terrines for game, baking molds, and small pots of cream, including a complete collection of casseroles of all sizes."}, {"start": 9763.23, "end": 9784.71, "b_start": 19485.51, "b_end": 19530.84, "orig": "Je m’arrêtais à voir sur la table, où la fille de cuisine venait de les écosser, les petits pois alignés et nombrés comme des billes vertes dans un jeu ; mais mon ravissement était devant les asperges, trempées d’outre-mer et de rose et dont l’épi, finement pignoché de mauve et d’azur, se dégrade insensiblement jusqu’au pied – encore souillé pourtant du sol de leur plant – par des irisations qui ne sont pas de la terre.", "en": "I stopped to see on the table, where the kitchen girl had just shelled them, the peas lined up and numbered like green marbles in a game; but my delight was in front of the asparagus, drenched in overseas and pink and whose spike, finely pecked with mauve and azure, imperceptibly degrades down to the base – still soiled, however, with the soil of their plant – by iridescence which is not of the earth."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il me semblait que ces nuances célestes trahissaient les délicieuses créatures qui s’étaient amusées à se métamorphoser en légumes et qui, à travers le déguisement de leur chair comestible et ferme, laissaient apercevoir en ces couleurs naissantes d’aurore, en ces ébauches d’arc-en-ciel, en cette extinction de soirs bleus, cette essence précieuse que je reconnaissais encore quand, toute la nuit qui suivait un dîner où j’en avais mangé, elles jouaient, dans leurs farces poétiques et grossières comme une féerie de Shakespeare, à changer mon pot de chambre en un vase de parfum.", "en": "It seemed to me that these celestial nuances betrayed the delicious creatures which had amused themselves by metamorphosing into vegetables and which, through the disguise of their edible and firm flesh, allowed us to see in these emerging colors of dawn, in these outlines of the rainbow, in this extinction of blue evenings, this precious essence which I still recognized when, all night following a dinner where I had eaten it, they played, in their poetic and crude pranks like a Shakespeare fairy tale, to change my chamber pot into a vase of perfume."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "La pauvre Charité de Giotto, comme l’appelait Swann, chargée par Françoise de les « plumer », les avait près d’elle dans une corbeille, son air était douloureux, comme si elle ressentait tous les malheurs de la terre ; et les légères couronnes d’azur qui ceignaient les asperges au-dessus de leurs tuniques de rose étaient finement dessinées, étoile par étoile, comme le sont dans la fresque les fleurs bandées autour du front ou piquées dans la corbeille de la Vertu de Padoue.", "en": "Poor Giotto's Charity, as Swann called her, charged by Françoise with \"plucking\" them, had them near her in a basket, her expression was painful, as if she felt all the misfortunes of the earth; and the light azure crowns which surrounded the asparagus above their pink tunics were finely drawn, star by star, as are in the fresco the flowers bandaged around the forehead or stuck in the basket of the Virtue of Padua."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et cependant, Françoise tournait à la broche un de ces poulets, comme elle seule savait en rôtir, qui avaient porté loin dans Combray l’odeur de ses mérites, et qui, pendant qu’elle nous les servait à table, faisaient prédominer la douceur dans ma conception spéciale de son caractère, l’arôme de cette chair qu’elle savait rendre si onctueuse et si tendre n’étant pour moi que le propre parfum d’une de ses vertus.", "en": "And yet, Françoise was turning on the spit one of these chickens, as only she knew how to roast, which had carried far into Combray the smell of her merits, and which, while she served them to us at the table, made the sweetness predominate in my special conception of her character, the aroma of this flesh which she knew how to make so creamy and so tender being for me only the proper perfume of one of her virtues."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais le jour où, pendant que mon père consultait le conseil de famille sur la rencontre de Legrandin, je descendis à la cuisine, était un de ceux où la Charité de Giotto, très malade de son accouchement récent, ne pouvait se lever ; Françoise, n’étant plus aidée, était en retard.", "en": "But the day when, while my father was consulting the family council on the meeting with Legrandin, I went down to the kitchen, was one of those when Giotto's Charity, very ill from her recent childbirth, could not get up; Françoise, no longer being helped, was late."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Quand je fus en bas, elle était en train, dans l’arrière-cuisine qui donnait sur la basse-cour, de tuer un poulet qui, par sa résistance désespérée et bien naturelle, mais accompagnée par Françoise hors d’elle, tandis qu’elle cherchait à lui fendre le cou sous l’oreille, des cris de « sale bête ! sale bête ! », mettait la sainte douceur et l’onction de notre servante un peu moins en lumière qu’il n’eût fait, au dîner du lendemain, par sa peau brodée d’or comme une chasuble et son jus précieux égoutté d’un ciboire.", "en": "When I was downstairs, she was, in the scullery which overlooked the farmyard, killing a chicken which, through its desperate and very natural resistance, but accompanied by Françoise beside herself, while she tried to split its neck under its ear, screamed “dirty beast! you dirty beast! ”, highlighted the holy sweetness and anointing of our servant a little less than it would have done, at dinner the next day, by her skin embroidered with gold like a chasuble and her precious juice drained from a ciborium."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Quand il fut mort, Françoise recueillit le sang qui coulait sans noyer sa rancune, eut encore un sursaut de colère, et regardant le cadavre de son ennemi, dit une dernière fois : « Sale bête ! » Je remontai tout tremblant ; j’aurais voulu qu’on mît Françoise tout de suite à la porte.", "en": "When he was dead, Françoise caught the blood that flowed without drowning her resentment, had another burst of anger, and looking at the corpse of her enemy, said one last time: “Dirty beast! » I went back up, all trembling; I would have liked Françoise to be kicked out immediately."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais qui m’eût fait des boules aussi chaudes, du café aussi parfumé, et même... ces poulets ?... Et en réalité, ce lâche calcul, tout le monde avait eu à le faire comme moi.", "en": "But who would have made me such hot balls, such fragrant coffee, and even... these chickens?... And in reality, everyone had had to do this cowardly calculation like me."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Car ma tante Léonie savait – ce que j’ignorais encore – que Françoise qui, pour sa fille, pour ses neveux, aurait donné sa vie sans une plainte, était pour d’autres êtres d’une dureté singulière. Malgré cela ma tante l’avait gardée, car si elle connaissait sa cruauté, elle appréciait son service.", "en": "Because my aunt Léonie knew – what I did not yet know – that Françoise, who, for her daughter, for her nephews, would have given her life without a complaint, was for other beings of singular harshness. Despite this, my aunt had kept her, because although she knew her cruelty, she appreciated her service."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je m’aperçus peu à peu que la douceur, la componction, les vertus de Françoise cachaient des tragédies d’arrière-cuisine, comme l’histoire découvre que le règne des Rois et des Reines qui sont représentés les mains jointes dans les vitraux des églises, furent marqués d’incidents sanglants.", "en": "I gradually realized that Françoise's gentleness, compunction, and virtues hid back-kitchen tragedies, just as history discovers that the reign of Kings and Queens who are represented with clasped hands in the stained glass windows of churches, were marked by bloody incidents."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je me rendis compte que, en dehors de ceux de sa parenté, les humains excitaient d’autant plus sa pitié par leurs malheurs, qu’ils vivaient plus éloignés d’elle.", "en": "I realized that, apart from those of her relatives, humans aroused her pity all the more by their misfortunes, the further away they lived from her."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Les torrents de larmes qu’elle versait en lisant le journal sur les infortunes des inconnus se tarissaient vite si elle pouvait se représenter la personne qui en était l’objet d’une façon un peu précise.", "en": "The torrents of tears that she shed while reading the newspaper about the misfortunes of strangers would quickly dry up if she could imagine the person who was the subject of them in a somewhat precise way."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Une de ces nuits qui suivirent l’accouchement de la fille de cuisine, celle-ci fut prise d’atroces coliques : maman l’entendit se plaindre, se leva et réveilla Françoise qui, insensible, déclara que tous ces cris étaient une comédie, qu’elle voulait « faire la maîtresse ».", "en": "One of the nights following the kitchen maid's birth, she suffered from terrible colic: mother heard her complaining, got up and woke Françoise who, unmoved, declared that all these cries were a comedy, that she wanted to \"play the mistress\"."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Le médecin, qui craignait ces crises, avait mis un signet, dans un livre de médecine que nous avions, à la page où elles sont décrites et où il nous avait dit de nous reporter pour trouver l’indication des premiers soins à donner.", "en": "The doctor, who feared these attacks, had put a bookmark, in a medical book that we had, on the page where they are described and where he told us to turn to find the indication of the first aid to be given."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ma mère envoya Françoise chercher le livre en lui recommandant de ne pas laisser tomber le signet. Au bout d’une heure, Françoise n’était pas revenue ; ma mère indignée crut qu’elle s’était recouchée et me dit d’aller voir moi-même dans la bibliothèque.", "en": "My mother sent Françoise to get the book, advising her not to drop the bookmark. After an hour, Françoise had not returned; my indignant mother thought she had gone back to bed and told me to go and look in the library myself."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "J’y trouvai Françoise qui, ayant voulu regarder ce que le signet marquait, lisait la description clinique de la crise et poussait des sanglots maintenant qu’il s’agissait d’une malade-type qu’elle ne connaissait pas.", "en": "There I found Françoise who, having wanted to look at what the bookmark marked, was reading the clinical description of the attack and sobbing now that it was a typical patient that she did not know."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "À chaque symptôme douloureux mentionné par l’auteur du traité, elle s’écriait : « Hé là ! Sainte Vierge, est-il possible que le bon Dieu veuille faire souffrir ainsi une malheureuse créature humaine ?", "en": "At each painful symptom mentioned by the author of the treatise, she exclaimed: “Hey there! Holy Virgin, is it possible that the good Lord wants to make an unfortunate human creature suffer like this?"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Hé ! la pauvre ! »\nMais dès que je l’eus appelée et qu’elle fut revenue près du lit de la Charité de Giotto, ses larmes cessèrent aussitôt de couler ; elle ne put reconnaître ni cette agréable sensation de pitié et d’attendrissement qu’elle connaissait bien et que la lecture des journaux lui avait souvent donnée, ni aucun plaisir de même famille ; dans l’ennui et dans l’irritation de s’être levée au milieu de la nuit pour la fille de cuisine, et à la vue des mêmes souffrances dont la description l’avait fait pleurer, elle n’eut plus que des ronchonnements de mauvaise humeur, même d’affreux sarcasmes, disant, quand elle crut que nous étions partis et ne pouvions plus l’entendre : « Elle n’avait qu’à ne pas faire ce qu’il faut pour ça ! ça lui a fait plaisir ! qu’elle ne fasse pas de manières maintenant.", "en": "Hey ! poor thing! » But as soon as I had called her and she returned to Giotto's bed of Charity, her tears immediately stopped flowing; she could not recognize either this pleasant sensation of pity and tenderness which she knew well and which reading the newspapers had often given her, nor any similar pleasure; in the boredom and irritation of having gotten up in the middle of the night for the kitchen maid, and at the sight of the same sufferings whose description had made her cry, she had nothing left but grumblings of bad humor, even dreadful sarcasm, saying, when she thought we were gone and could no longer hear her: “She had only to do the right thing about that! It made him happy! Don't let her be so polite now."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Faut-il tout de même qu’un garçon ait été abandonné du bon Dieu pour aller avec\nça\n.", "en": "Does a boy still have to have been abandoned by the good Lord to go with that?"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ah ! c’est bien comme on disait dans le patois de ma pauvre mère :\n« Qui du cul d’un chien s’amourose\nIl lui paraît une rose. »\nSi, quand son petit-fils était un peu enrhumé du cerveau, elle partait la nuit, même malade, au lieu de se coucher, pour voir s’il n’avait besoin de rien, faisant quatre lieues à pied avant le jour afin d’être rentrée pour son travail, en revanche ce même amour des siens et son désir d’assurer la grandeur future de sa maison se traduisait dans sa politique à l’égard des autres domestiques par une maxime constante qui fut de n’en jamais laisser un seul s’implanter chez ma tante, qu’elle mettait d’ailleurs une sorte d’orgueil à ne laisser approcher par personne, préférant, quand elle-même était malade, se relever pour lui donner son eau de Vichy plutôt que de permettre l’accès de la chambre de sa maîtresse à la fille de cuisine.", "en": "Ah! It’s as they used to say in my poor mother’s dialect: “He who falls in love with the ass of a dog seems like a rose. » If, when her grandson had a bit of a head cold, she left at night, even when ill, instead of going to bed, to see if he needed anything, walking four leagues before daylight in order to be back for work, on the other hand this same love of her family and her desire to ensure the future greatness of her house was reflected in her policy towards other servants by a constant maxim which was to never let a single one establish themselves. at my aunt's, whom she took a sort of pride in not letting anyone approach, preferring, when she herself was ill, to get up to give her her Vichy water rather than allowing the kitchen maid access to her mistress's room."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et comme cet hyménoptère observé par Fabre, la guêpe fouisseuse, qui pour que ses petits après sa mort aient de la viande fraîche à manger, appelle l’anatomie au secours de sa cruauté et, ayant capturé des charançons et des araignées, leur perce avec un savoir et une adresse merveilleux le centre nerveux d’où dépend le mouvement des pattes, mais non les autres fonctions de la vie, de façon que l’insecte paralysé près duquel elle dépose ses œufs, fournisse aux larves, quand elles écloront un gibier docile, inoffensif, incapable de fuite ou de résistance, mais nullement faisandé, Françoise trouvait pour servir sa volonté permanente de rendre la maison intenable à tout domestique, des ruses si savantes et si impitoyables que, bien des années plus tard, nous apprîmes que si cet été-là nous avions mangé presque tous les jours des asperges, c’était parce que leur odeur donnait à la pauvre fille de cuisine chargée de les éplucher des crises d’asthme d’une telle violence qu’elle fut obligée de finir par s’en aller.", "en": "And like this hymenoptera observed by Fabre, the burrowing wasp, which so that its young after its death have fresh meat to eat, calls anatomy to the aid of its cruelty and, having captured weevils and spiders, pierces with marvelous knowledge and skill the nervous center on which the movement of the legs depends, but not the other functions of life, so that the paralyzed insect near which it deposits its eggs, provides the larvae, when they will hatch a docile, harmless game, incapable of flight or resistance, but in no way taunted, Françoise found to serve her permanent desire to make the house untenable for any servant, ruses so clever and so merciless that, many years later, we learned that if that summer we had eaten asparagus almost every day, it was because their smell gave the poor kitchen maid responsible for peeling them asthma attacks of such violence that she was finally forced to leave."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Hélas ! nous devions définitivement changer d’opinion sur Legrandin.", "en": "Alas! we definitely had to change our opinion about Legrandin."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Un des dimanches qui suivit la rencontre sur le Pont-Vieux après laquelle mon père avait dû confesser son erreur, comme la messe finissait et qu’avec le soleil et le bruit du dehors quelque chose de si peu sacré entrait dans l’église que M\nme\nGoupil, M\nme\nPercepied (toutes les personnes qui tout à l’heure, à mon arrivée un peu en retard, étaient restées les yeux absorbés dans leur prière et que j’aurais même pu croire ne m’avoir pas vu entrer si, en même temps, leurs pieds n’avaient repoussé légèrement le petit banc qui m’empêchait de gagner ma chaise) commençaient à s’entretenir avec nous à haute voix de sujets tout temporels comme si nous étions déjà sur la place, nous vîmes sur le seuil brûlant du porche, dominant le tumulte bariolé du marché, Legrandin, que le mari de cette dame avec qui nous l’avions dernièrement rencontré était en train de présenter à la femme d’un autre gros propriétaire terrien des environs.", "en": "One of the Sundays which followed the meeting on the Pont-Vieux after which my father had to confess his error, as the mass was ending and with the sun and the noise from outside something so unsacred entered the church that Mme Goupil, Mme Percepied (all the people who earlier, when I arrived a little late, had remained with their eyes absorbed in their prayer and whom I could even have believed not to have seen me enter if, at the same time, time, their feet had only slightly pushed back the small bench which prevented me from reaching my chair) began to talk with us in a loud voice about entirely temporal subjects as if we were already on the square, we saw on the burning threshold of the porch, overlooking the colorful tumult of the market, Legrandin, whom the husband of this lady with whom we had recently met him was in the process of introducing to the wife of another big landowner in the area."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "La figure de Legrandin exprimait une animation, un zèle extraordinaires ; il fit un profond salut avec un renversement secondaire en arrière, qui ramena brusquement son dos au delà de la position de départ et qu’avait dû lui apprendre le mari de sa sœur, M\nme\nde Cambremer.", "en": "Legrandin's face expressed extraordinary animation and zeal; he made a deep bow with a secondary reversal backwards, which suddenly brought his back beyond the starting position and which must have taught him the husband of his sister, Madame de Cambremer."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ce redressement rapide fit refluer en une sorte d’onde fougueuse et musclée la croupe de Legrandin que je ne supposais pas si charnue ; et je ne sais pourquoi cette ondulation de pure matière, ce
