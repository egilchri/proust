ed to have been removed."}, {"start": 6146.33, "end": 6180.36, "b_start": 12252.78, "b_end": 12322.3, "orig": "C’est que, reconnaissant alors ce même goût pour les expressions rares, cette même effusion musicale, cette même philosophie idéaliste qui avait déjà été les autres fois, sans que je m’en rendisse compte, la cause de mon plaisir, je n’eus plus l’impression d’être en présence d’un morceau particulier d’un certain livre de Bergotte, traçant à la surface de ma pensée une figure purement linéaire, mais plutôt du « morceau idéal » de Bergotte, commun à tous ses livres et auquel tous les passages analogues qui venaient se confondre avec lui auraient donné une sorte d’épaisseur, de volume, dont mon esprit semblait agrandi.", "en": "It is that, recognizing then this same taste for rare expressions, this same musical effusion, this same idealist philosophy which had already been the other times, without me realizing it, the cause of my pleasure, I no longer had the impression of being in the presence of a particular piece of a certain book by Bergotte, tracing on the surface of my thought a purely linear figure, but rather of the \"ideal piece\" of Bergotte, common to all his books and to which all the analogous passages which came to merge with it would have given a sort of thickness, of volume, which seemed to enlarge my mind."}, {"start": 6181.36, "end": 6212.27, "b_start": 12322.3, "b_end": 12386.1, "orig": "Je n’étais pas tout à fait le seul admirateur de Bergotte ; il était aussi l’écrivain préféré d’une amie de ma mère qui était très lettrée ; enfin pour lire son dernier livre paru, le docteur du Boulbon faisait attendre ses malades ; et ce fut de son cabinet de consultation, et d’un parc voisin de Combray, que s’envolèrent quelques-unes des premières graines de cette prédilection pour Bergotte, espèce si rare alors, aujourd’hui universellement répandue, et dont on trouve partout en Europe, en Amérique, jusque dans le moindre village, la fleur idéale et commune.", "en": "I wasn’t quite Bergotte’s only admirer; he was also the favorite writer of a friend of my mother’s who was very well read; finally to read his latest published book, Doctor du Boulbon kept his patients waiting; and it was from his consulting room, and from a neighboring park in Combray, that some of the first seeds of this predilection for Bergotte flew, a species so rare then, today universally widespread, and of which we find everywhere in Europe, in America, even in the smallest village, the ideal and common flower."}, {"start": 6213.27, "end": 6235.21, "b_start": 12386.1, "b_end": 12431.71, "orig": "Ce que l’amie de ma mère et, paraît-il, le docteur du Boulbon aimaient surtout dans les livres de Bergotte c’était, comme moi, ce même flux mélodique, ces expressions anciennes, quelques autres très simples et connues, mais pour lesquelles la place où il les mettait en lumière semblait révéler de sa part un goût particulier ; enfin, dans les passages tristes, une certaine brusquerie, un accent presque rauque.", "en": "What my mother's friend and, it seems, Doctor du Boulbon especially loved in Bergotte's books was, like me, this same melodic flow, these old expressions, a few others very simple and well-known, but for which the place where he highlighted them seemed to reveal a particular taste on his part; finally, in the sad passages, a certain abruptness, an almost hoarse accent."}, {"start": 6236.21, "end": 6240.34, "b_start": 12431.71, "b_end": 12442.04, "orig": "Et sans doute lui-même devait sentir que là étaient ses plus grands charmes.", "en": "And no doubt he himself must have felt that these were his greatest charms."}, {"start": 6241.34, "end": 6270.35, "b_start": 12442.04, "b_end": 12501.62, "orig": "Car dans les livres qui suivirent, s’il avait rencontré quelque grande vérité, ou le nom d’une célèbre cathédrale, il interrompait son récit et dans une invocation, une apostrophe, une longue prière, il donnait un libre cours à ces effluves qui dans ses premiers ouvrages restaient intérieurs à sa prose, décelés seulement alors par les ondulations de la surface, plus douces peut-être encore, plus harmonieuses quand elles étaient ainsi voilées et qu’on n’aurait pu indiquer d’une manière précise où naissait, où expirait leur murmure.", "en": "For in the books that followed, if he had encountered some great truth, or the name of a famous cathedral, he would interrupt his story and in an invocation, an apostrophe, a long prayer, he would give free rein to these scents which in his first works remained internal to his prose, detected only then by the undulations of the surface, softer perhaps still, more harmonious when they were thus veiled and which could not have been indicated. in a precise way where their murmur was born, where it expired."}, {"start": 6271.35, "end": 6282.03, "b_start": 12501.62, "b_end": 12524.24, "orig": "Ces morceaux auxquels il se complaisait étaient nos morceaux préférés. Pour moi, je les savais par cœur. J’étais déçu quand il reprenait le fil de son récit.", "en": "These songs he indulged in were our favorite songs. For me, I knew them by heart. I was disappointed when he resumed the thread of his story."}, {"start": 6283.03, "end": 6301.7, "b_start": 12524.24, "b_end": 12556.66, "orig": "Chaque fois qu’il parlait de quelque chose dont la beauté m’était restée jusque-là cachée, des forêts de pins, de la grêle, de\nNotre-Dame de Paris\n, d’\nAthalie\nou de\nPhèdre\n, il faisait dans une image exploser cette beauté jusqu’à moi.", "en": "Each time he spoke of something whose beauty had until then remained hidden from me, pine forests, hail, Notre-Dame de Paris, Athalie or Phèdre, he made this beauty explode before me in an image."}, {"start": 6302.7, "end": 6329.51, "b_start": 12556.66, "b_end": 12613.28, "orig": "Aussi sentant combien il y avait de parties de l’univers que ma perception infirme ne distinguerait pas s’il ne les rapprochait de moi, j’aurais voulu posséder une opinion de lui, une métaphore de lui, sur toutes choses, surtout sur celles que j’aurais l’occasion de voir moi-même, et entre celles-là, particulièrement sur d’anciens monuments français et certains paysages maritimes, parce que l’insistance avec laquelle il les citait dans ses livres prouvait qu’il les tenait pour riches de signification et de beauté.", "en": "Also feeling how many parts of the universe there were that my crippled perception would not distinguish if he did not bring them closer to me, I would have liked to have an opinion of him, a metaphor of him, on all things, especially on those that I would have the opportunity to see myself, and among those, particularly on ancient French monuments and certain maritime landscapes, because the insistence with which he cited them in his books proved that he considered them to be rich in meaning. and beauty."}, {"start": 6330.51, "end": 6334.5, "b_start": 12613.28, "b_end": 12623.02, "orig": "Malheureusement sur presque toutes choses j’ignorais son opinion.", "en": "Unfortunately on almost all things I ignored his opinion."}, {"start": 6335.5, "end": 6359.28, "b_start": 12623.02, "b_end": 12674.36, "orig": "Je ne doutais pas qu’elle ne fût entièrement différente des miennes, puisqu’elle descendait d’un monde inconnu vers lequel je cherchais à m’élever : persuadé que mes pensées eussent paru pure ineptie à cet esprit parfait, j’avais tellement fait table rase de toutes, que quand par hasard il m’arriva d’en rencontrer, dans tel de ses livres, une que j’avais déjà eue moi-même, mon cœur se gonflait comme si un Dieu dans sa bonté me l’avait rendue, l’avait déclarée légitime et belle.", "en": "I had no doubt that it was entirely different from mine, since it came from an unknown world to which I was seeking to elevate myself: convinced that my thoughts would have seemed pure nonsense to this perfect mind, I had made such a clean slate of them all, that when by chance I happened to encounter, in one of his books, one that I had already had myself, my heart swelled as if a God in his goodness had given it to me returned, declared it legitimate and beautiful."}, {"start": 6360.28, "end": 6373.0, "b_start": 12674.36, "b_end": 12701.62, "orig": "Il arrivait parfois qu’une page de lui disait les mêmes choses que j’écrivais souvent la nuit à ma grand’mère et à ma mère quand je ne pouvais pas dormir, si bien que cette page de Bergotte avait l’air d’un recueil d’épigraphes pour être placées en tête de mes lettres.", "en": "It sometimes happened that a page of his said the same things that I often wrote at night to my grandmother and my mother when I could not sleep, so that this page of Bergotte looked like a collection of epigraphs to be placed at the head of my letters."}, {"start": 6374.0, "end": 6384.01, "b_start": 12701.62, "b_end": 12722.51, "orig": "Même plus tard, quand je commençai de composer un livre, certaines phrases dont la qualité ne suffit pas pour décider à le continuer, j’en retrouvai l’équivalent dans Bergotte.", "en": "Even later, when I began to compose a book, certain sentences whose quality was not enough to decide to continue it, I found the equivalent in Bergotte."}, {"start": 6385.01, "end": 6401.47, "b_start": 12722.51, "b_end": 12755.52, "orig": "Mais ce n’était qu’alors, quand je les lisais dans son œuvre, que je pouvais en jouir ; quand c’était moi qui les composais, préoccupé qu’elles reflétassent exactement ce que j’apercevais dans ma pensée, craignant de ne pas « faire ressemblant », j’avais bien le temps de me demander si ce que j’écrivais était agréable !", "en": "But it was only then, when I read them in his work, that I could enjoy them; when it was me who composed them, concerned that they reflected exactly what I saw in my thoughts, fearing not to “resemble”, I had plenty of time to ask myself if what I was writing was pleasant!"}, {"start": 6402.47, "end": 6413.7, "b_start": 12755.52, "b_end": 12780.97, "orig": "Mais en réalité il n’y avait que ce genre de phrases, ce genre d’idées que j’aimais vraiment. Mes efforts inquiets et mécontents étaient eux-mêmes une marque d’amour, d’amour sans plaisir mais profond.", "en": "But in reality there were only these kinds of sentences, these kinds of ideas that I really liked. My restless and discontented efforts were themselves a mark of love, love without pleasure but deep."}, {"start": 6414.7, "end": 6431.38, "b_start": 12780.97, "b_end": 12817.73, "orig": "Aussi quand tout d’un coup je trouvais de telles phrases dans l’œuvre d’un autre, c’est-à-dire sans plus avoir de scrupules, de sévérité, sans avoir à me tourmenter, je me laissais enfin aller avec délices au goût que j’avais pour elles, comme un cuisinier qui pour une fois où il n’a pas à faire la cuisine trouve enfin le temps d’être gourmand.", "en": "So when all of a sudden I found such phrases in the work of another, that is to say without having any more scruples, any severity, without having to torment myself, I finally let myself go with delight to the taste I had for them, like a cook who for once when he does not have to cook finally finds the time to be greedy."}, {"start": 6432.38, "end": 6456.26, "b_start": 12817.73, "b_end": 12867.92, "orig": "Un jour, ayant rencontré dans un livre de Bergotte, à propos d’une vieille servante, une plaisanterie que le magnifique et solennel langage de l’écrivain rendait encore plus ironique, mais qui était la même que j’avais si souvent faite à ma grand’mère en parlant de Françoise, une autre fois que je vis qu’il ne jugeait pas indigne de figurer dans un de ces miroirs de la vérité qu’étaient ses ouvrages une remarque analogue à celle que j’avais eu l’occasion de faire sur notre ami M.", "en": "One day, having encountered in a book by Bergotte, about an old servant, a joke that the magnificent and solemn language of the writer made even more ironic, but which was the same one that I had so often made to my grandmother when speaking of Françoise, another time I saw that he did not consider it unworthy to appear in one of these mirrors of truth that were his works a remark similar to that which I had had the opportunity to make about our friend M."}, {"start": 6457.26, "end": 6460.74, "b_start": 12867.92, "b_end": 12876.46, "orig": "Legrandin (remarques sur Françoise et M.", "en": "Legrandin (remarks on Françoise and M."}, {"start": 6461.74, "end": 6480.97, "b_start": 12876.46, "b_end": 12918.95, "orig": "Legrandin qui étaient certes de celles que j’eusse le plus délibérément sacrifiées à Bergotte, persuadé qu’il les trouverait sans intérêt), il me sembla soudain que mon humble vie et les royaumes du vrai n’étaient pas aussi séparés que j’avais cru, qu’ils coïncidaient même sur certains points, et de confiance et de joie je pleurai sur les pages de l’écrivain comme dans les bras d’un père retrouvé.", "en": "Legrandin which were certainly among those that I would have most deliberately sacrificed to Bergotte, convinced that he would find them of no interest), it suddenly seemed to me that my humble life and the realms of truth were not as separate as I had believed, that they even coincided on certain points, and with confidence and joy I wept on the pages of the writer as in the arms of a found father."}, {"start": 6481.97, "end": 6489.05, "b_start": 12918.95, "b_end": 12934.58, "orig": "D’après ses livres j’imaginais Bergotte comme un vieillard faible et déçu qui avait perdu des enfants et ne s’était jamais consolé.", "en": "From his books I imagined Bergotte as a weak and disappointed old man who had lost children and had never been consoled."}, {"start": 6490.05, "end": 6506.27, "b_start": 12934.58, "b_end": 12967.24, "orig": "Aussi je lisais, je chantais intérieurement sa prose, plus « dolce », plus « lento » peut-être qu’elle n’était écrite, et la phrase la plus simple s’adressait à moi avec une intonation attendrie. Plus que tout j’aimais sa philosophie, je m’étais donné à elle pour toujours.", "en": "So I read, I sang internally his prose, more “dolce”, more “lento” perhaps than it was written, and the simplest sentence addressed me with a tender intonation. More than anything I loved her philosophy, I gave myself to her forever."}, {"start": 6507.27, "end": 6513.39, "b_start": 12967.24, "b_end": 12980.83, "orig": "Elle me rendait impatient d’arriver à l’âge où j’entrerais au collège, dans la classe appelée Philosophie.", "en": "It made me impatient to reach the age where I would enter college, in the class called Philosophy."}, {"start": 6514.39, "end": 6530.26, "b_start": 12980.83, "b_end": 13016.0, "orig": "Mais je ne voulais pas qu’on y fît autre chose que vivre uniquement par la pensée de Bergotte, et si l’on m’avait dit que les métaphysiciens auxquels je m’attacherais alors ne lui ressembleraient en rien, j’aurais ressenti le désespoir d’un amoureux qui veut aimer pour la vie et à qui on parle des autres maîtresses qu’il aura plus tard.", "en": "But I didn't want anyone to do anything other than live solely through Bergotte's thoughts, and if someone had told me that the metaphysicians to whom I would then become attached would not resemble him in any way, I would have felt the despair of a lover who wants to love for life and to whom people talk about the other mistresses he will have later."}, {"start": 6531.26, "end": 6545.42, "b_start": 13016.0, "b_end": 13045.3, "orig": "Un dimanche, pendant ma lecture au jardin, je fus dérangé par Swann qui venait voir mes parents.\n– Qu’est-ce que vous lisez, on peut regarder ? Tiens, du Bergotte ? Qui donc vous a indiqué ses ouvrages ?", "en": "One Sunday, while reading in the garden, I was disturbed by Swann who came to see my parents. – What are you reading, can we watch? Hey, some Bergotte? Who then pointed you to his works?"}, {"start": 6546.42, "end": 6564.18, "b_start": 13045.3, "b_end": 13082.48, "orig": "Je lui dis que c’était Bloch.\n– Ah ! oui, ce garçon que j’ai vu une fois ici, qui ressemble tellement au portrait de Mahomet II par Bellini. Oh ! c’est frappant, il a les mêmes sourcils circonflexes, le même nez recourbé, les mêmes pommettes saillantes.", "en": "I told him it was Bloch. – Oh! yes, this boy I saw here once, who looks so much like Bellini's portrait of Mohammed II. Oh ! It’s striking, he has the same circumflex eyebrows, the same curved nose, the same high cheekbones."}, {"start": 6565.18, "end": 6572.74, "b_start": 13082.48, "b_end": 13099.39, "orig": "Quand il aura une barbiche ce sera la même personne. En tout cas il a du goût, car Bergotte est un charmant esprit.", "en": "When he has a goatee he will be the same person. In any case he has taste, because Bergotte is a charming wit."}, {"start": 6573.74, "end": 6589.62, "b_start": 13099.39, "b_end": 13131.3, "orig": "Et voyant combien j’avais l’air d’admirer Bergotte, Swann qui ne parlait jamais des gens qu’il connaissait fit, par bonté, une exception et me dit :\n– Je le connais beaucoup, si cela pouvait vous faire plaisir qu’il écrive un mot en tête de votre volume, je pourrais le lui demander.", "en": "And seeing how much I seemed to admire Bergotte, Swann, who never spoke of people he knew, made, out of kindness, an exception and said to me: - I know him a lot, if it would please you if he wrote a word at the beginning of your volume, I could ask him."}, {"start": 6590.62, "end": 6605.89, "b_start": 13131.3, "b_end": 13164.19, "orig": "Je n’osai pas accepter, mais posai à Swann des questions sur Bergotte. « Est-ce que vous pourriez me dire quel est l’acteur qu’il préfère ? »\n– L’acteur, je ne sais pas. Mais je sais qu’il n’égale aucun artiste homme à la Berma qu’il met au-dessus de tout.", "en": "I did not dare to accept, but asked Swann questions about Bergotte. “Could you tell me who his favorite actor is? » – The actor, I don’t know. But I know that he is not equal to any male artist like Berma, whom he places above everything."}, {"start": 6606.89, "end": 6616.99, "b_start": 13164.19, "b_end": 13185.52, "orig": "L’avez-vous entendue ?\n– Non monsieur, mes parents ne me permettent pas d’aller au théâtre.\n– C’est malheureux. Vous devriez leur demander.", "en": "Did you hear it? – No sir, my parents don’t allow me to go to the theater. – It’s unfortunate. You should ask them."}, {"start": 6617.99, "end": 6659.2, "b_start": 13185.52, "b_end": 13262.21, "orig": "La Berma dans\nPhèdre\n, dans\nle Cid\n, ce n’est qu’une actrice si vous voulez, mais vous savez je ne crois pas beaucoup à la «\nhiérarchie !\n» des arts.\n(Et je remarquai, comme cela m’avait souvent frappé dans ses conversations avec les sœurs de ma grand’mère, que quand il parlait de choses sérieuses, quand il employait une expression qui semblait impliquer une opinion sur un sujet important, il avait soin de l’isoler dans une intonation spéciale, machinale et ironique, comme s’il l’avait mise entre guillemets, semblant ne pas vouloir la prendre à son compte, et dire : « la\nhiérarchie\n, vous savez, comme disent les gens ridicules » ?", "en": "La Berma in Phèdre, in Le Cid, she’s just an actress if you like, but you know I don’t believe much in “hierarchy!” » of the arts. (And I noticed, as had often struck me in his conversations with my grandmother's sisters, that when he spoke of serious things, when he used an expression which seemed to imply an opinion on an important subject, he took care to isolate it in a special intonation, mechanical and ironic, as if he had put it in quotation marks, seeming not to want to take it personally, and to say: \"the hierarchy, you know, as ridiculous people say\"?"}, {"start": 6660.2, "end": 6664.93, "b_start": 13262.21, "b_end": 13272.8, "orig": "Mais alors, si c’était ridicule, pourquoi disait-il la hiérarchie ?).", "en": "But then, if it was ridiculous, why did he say hierarchy?)."}, {"start": 6665.93, "end": 6697.92, "b_start": 13272.8, "b_end": 13341.43, "orig": "Un instant après il ajouta : « Cela vous donnera une vision aussi noble que n’importe quel chef-d’œuvre, je ne sais pas moi... que – et il se mit à rire – les Reines de Chartres ! » Jusque-là cette horreur d’exprimer sérieusement son opinion m’avait paru quelque chose qui devait être élégant et parisien et qui s’opposait au dogmatisme provincial des sœurs de ma grand’mère ; et je soupçonnais aussi que c’était une des formes de l’esprit dans la coterie où vivait Swann et où par réaction sur le lyrisme des générations antérieures on réhabilitait à l’excès les petits faits précis, réputés vulgaires autrefois, et on proscrivait les « phrases ».", "en": "A moment later he added: “It will give you a vision as noble as any masterpiece, I don’t know… that – and he began to laugh – the Queens of Chartres! » Until then this horror of seriously expressing one's opinion had seemed to me something which should be elegant and Parisian and which opposed the provincial dogmatism of my grandmother's sisters; and I also suspected that it was one of the forms of wit in the coterie where Swann lived and where, as a reaction to the lyricism of previous generations, small precise facts, formerly deemed vulgar, were excessively rehabilitated, and \"sentences\" were proscribed."}, {"start": 6698.92, "end": 6711.5, "b_start": 13341.43, "b_end": 13366.91, "orig": "Mais maintenant je trouvais quelque chose de choquant dans cette attitude de Swann en face des choses. Il avait l’air de ne pas oser avoir une opinion et de n’être tranquille que quand il pouvait donner méticuleusement des renseignements précis.", "en": "But now I found something shocking in Swann's attitude towards things. He seemed to not dare to have an opinion and only to be calm when he could meticulously give precise information."}, {"start": 6712.5, "end": 6719.96, "b_start": 13366.91, "b_end": 13383.07, "orig": "Mais il ne se rendait donc pas compte que c’était professer l’opinion, postuler que l’exactitude de ces détails avait de l’importance.", "en": "But he didn't realize that this was professing an opinion, postulating that the accuracy of these details mattered."}, {"start": 6720.96, "end": 6737.23, "b_start": 13383.07, "b_end": 13417.74, "orig": "Je repensai alors à ce dîner où j’étais si triste parce que maman ne devait pas monter dans ma chambre et où il avait dit que les bals chez la princesse de Léon n’avaient aucune importance. Mais c’était pourtant à ce genre de plaisirs qu’il employait sa vie. Je trouvais tout cela contradictoire.", "en": "I then thought back to that dinner where I was so sad because Mom wasn't supposed to come up to my room and where he had said that the balls at the Princess de Léon's were of no importance. But it was nevertheless this type of pleasure that he devoted his life to. I found all this contradictory."}, {"start": 6738.23, "end": 6751.96, "b_start": 13417.74, "b_end": 13448.59, "orig": "Pour quelle autre vie réservait-il de dire enfin sérieusement ce qu’il pensait des choses, de formuler des jugements qu’il pût ne pas mettre entre guillemets, et de ne plus se livrer avec une politesse pointilleuse à des occupations dont il professait en même temps qu’elles sont ridicules ?", "en": "For what other life did he reserve to finally say seriously what he thought about things, to formulate judgments which he could not put in quotation marks, and to no longer indulge with punctilious politeness in occupations which he at the same time professed to be ridiculous?"}, {"start": 6752.96, "end": 6766.28, "b_start": 13448.59, "b_end": 13476.95, "orig": "Je remarquai aussi dans la façon dont Swann me parla de Bergotte quelque chose qui en revanche ne lui était pas particulier, mais au contraire était dans ce temps-là commun à tous les admirateurs de l’écrivain, à l’amie de ma mère, au docteur du Boulbon.", "en": "I also noticed in the way Swann spoke to me about Bergotte something which on the other hand was not particular to him, but on the contrary was at that time common to all the admirers of the writer, to my mother's friend, to Doctor du Boulbon."}, {"start": 6767.28, "end": 6777.05, "b_start": 13476.95, "b_end": 13498.18, "orig": "Comme Swann, ils disaient de Bergotte : « C’est un charmant esprit, si particulier, il a une façon à lui de dire les choses un peu cherchée, mais si agréable.", "en": "Like Swann, they said of Bergotte: “He is a charming spirit, so particular, he has his own way of saying things that is a little sophisticated, but so pleasant."}, {"start": 6778.05, "end": 6794.06, "b_start": 13498.18, "b_end": 13531.98, "orig": "On n’a pas besoin de voir la signature, on reconnaît tout de suite que c’est de lui. » Mais aucun n’aurait été jusqu’à dire : « C’est un grand écrivain, il a un grand talent. » Ils ne disaient même pas qu’il avait du talent. Ils ne le disaient pas parce qu’ils ne le savaient pas.", "en": "We don't need to see the signature, we immediately recognize that it's his. » But none would have gone so far as to say: “He’s a great writer, he has great talent. » They didn't even say he had talent. They didn't say it because they didn't know it."}, {"start": 6795.06, "end": 6804.73, "b_start": 13531.98, "b_end": 13552.61, "orig": "Nous sommes très longs à reconnaître dans la physionomie particulière d’un nouvel écrivain le modèle qui porte le nom de « grand talent » dans notre musée des idées générales.", "en": "We are very slow to recognize in the particular physiognomy of a new writer the model which bears the name of \"great talent\" in our museum of general ideas."}, {"start": 6805.73, "end": 6812.52, "b_start": 13552.61, "b_end": 13567.79, "orig": "Justement parce que cette physionomie est nouvelle, nous ne la trouvons pas tout à fait ressemblante à ce que nous appelons talent.", "en": "Precisely because this physiognomy is new, we do not find it entirely resembling what we call talent."}, {"start": 6813.52, "end": 6832.77, "b_start": 13567.79, "b_end": 13607.98, "orig": "Nous disons plutôt originalité, charme, délicatesse, force ; et puis un jour nous nous rendons compte que c’est justement tout cela le talent.\n– Est-ce qu’il y a des ouvrages de Bergotte où il ait parlé de la Berma ? demandai-je à Swann.\n– Je crois dans sa petite plaquette sur Racine, mais elle doit être épuisée.", "en": "Rather, we say originality, charm, delicacy, strength; and then one day we realize that this is precisely what talent is all about. – Are there any works by Bergotte where he spoke about Berma? I asked Swann. – I believe in his little brochure on Racine, but it must be out of print."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il y a peut-être eu cependant une réimpression. Je m’informerai. Je peux d’ailleurs demander à Bergotte tout ce que vous voulez, il n’y a pas de semaine dans l’année où il ne dîne à la maison. C’est le grand ami de ma fille.", "en": "However, there may have been a reprint. I will find out. I can ask Bergotte anything you want, there is not a week in the year when he does not have dinner at home. He is my daughter's great friend."}, {"start": 6848.78, "end": 6853.8, "b_start": 13622.49, "b_end": 13633.66, "orig": "Ils vont ensemble visiter les vieilles villes, les cathédrales, les châteaux.", "en": "They go together to visit old towns, cathedrals, castles."}, {"start": 6854.8, "end": 6873.69, "b_start": 13633.66, "b_end": 13669.51, "orig": "Comme je n’avais aucune notion sur la hiérarchie sociale, depuis longtemps l’impossibilité que mon père trouvait à ce que nous fréquentions M\nme\net M\nlle\nSwann avait eu plutôt pour effet, en me faisant imaginer entre elles et nous de grandes distances, de leur donner à mes yeux du prestige.", "en": "As I had no idea of ​​the social hierarchy, for a long time the impossibility that my father found in our associating with Mrs. and Miss Swann had rather the effect, by making me imagine great distances between them and us, to give them prestige in my eyes."}, {"start": 6874.69, "end": 6904.33, "b_start": 13669.51, "b_end": 13724.72, "orig": "Je regrettais que ma mère ne se teignît pas les cheveux et ne se mît pas de rouge aux lèvres comme j’avais entendu dire par notre voisine M\nme\nSazerat que M\nme\nSwann le faisait pour plaire, non à son mari, mais à M. de Charlus, et je pensais que nous devions être pour elle un objet de mépris, ce qui me peinait surtout à cause de M\nlle\nSwann qu’on m’avait dit être une si jolie petite fille et à laquelle je rêvais souvent en lui prêtant chaque fois un même visage arbitraire et charmant.", "en": "I regretted that my mother did not dye her hair and did not put red lipstick on her lips as I had heard from our neighbor Ms. Sazerat that Ms. Swann did it to please, not her husband, but M. de Charlus, and I thought that we must be an object of contempt for her, which pained me especially because of Ms. Swann whom I had been told was such a pretty little girl and of whom I often dreamed of lending her each time the same arbitrary and charming face."}, {"start": 6905.33, "end": 6964.58, "b_start": 13724.72, "b_end": 13843.46, "orig": "Mais quand j’eus appris ce jour-là que M\nlle\nSwann était un être d’une condition si rare, baignant comme dans son élément naturel au milieu de tant de privilèges, que quand elle demandait à ses parents s’il y avait quelqu’un à dîner, on lui répondait par ces syllabes remplies de lumière, par le nom de ce convive d’or qui n’était pour elle qu’un vieil ami de sa famille : Bergotte ; que, pour elle, la causerie intime à table, ce qui correspondait à ce qu’était pour moi la conversation de ma grand’tante, c’étaient des paroles de Bergotte, sur tous ces sujets qu’il n’avait pu aborder dans ses livres, et sur lesquels j’aurais voulu l’écouter rendre ses oracles ; et qu’enfin, quand elle allait visiter des villes, il cheminait à côté d’elle, inconnu et glorieux, comme les Dieux qui descendaient au milieu des mortels ; alors je sentis en même temps que le prix d’un être comme M\nlle\nSwann, combien je lui paraîtrais grossier et ignorant, et j’éprouvai si vivement la douceur et l’impossibilité qu’il y aurait pour moi à être son ami, que je fus rempli à la fois de désir et de désespoir.", "en": "But when I learned that day that Miss Swann was a being of such a rare condition, bathed as in her natural element in the midst of so many privileges, that when she asked her parents if there was anyone at dinner, she was answered with these syllables filled with light, with the name of this golden guest who was for her only an old friend of her family: Bergotte; that, for her, the intimate conversation at the table, what corresponded to what my great-aunt's conversation was for me, were the words of Bergotte, on all those subjects that he had not been able to address in his books, and on which I would have liked to listen to him deliver his oracles; and that finally, when she went to visit cities, he walked beside her, unknown and glorious, like the Gods who descended among mortals; then I felt at the same time the value of a being like Miss Swann, how crude and ignorant I would appear to her, and I felt so keenly the sweetness and the impossibility that it would be for me to be her friend, that I was filled both with desire and despair."}, {"start": 6965.58, "end": 6978.98, "b_start": 13843.46, "b_end": 13871.12, "orig": "Le plus souvent maintenant quand je pensais à elle, je la voyais devant le porche d’une cathédrale, m’expliquant la signification des statues, et, avec un sourire qui disait du bien de moi, me présentant comme son ami, à Bergotte.", "en": "Most often now when I thought of her, I saw her in front of the porch of a cathedral, explaining to me the meaning of the statues, and, with a smile that spoke well of me, introducing me as her friend, to Bergotte."}, {"start": 6979.98, "end": 6994.76, "b_start": 13871.12, "b_end": 13900.82, "orig": "Et toujours le charme de toutes les idées que faisaient naître en moi les cathédrales, le charme des coteaux de l’Ile-de-France et des plaines de la Normandie faisait refluer ses reflets sur l’image que je me formais de M\nlle\nSwann : c’était être tout prêt à l’aimer.", "en": "And always the charm of all the ideas that the cathedrals gave birth to in me, the charm of the hills of Ile-de-France and the plains of Normandy brought back its reflections on the image that I formed of Miss Swann: it was being ready to love her."}, {"start": 6995.76, "end": 7007.28, "b_start": 13900.82, "b_end": 13925.65, "orig": "Que nous croyions qu’un être participe à une vie inconnue où son amour nous ferait pénétrer, c’est, de tout ce qu’exige l’amour pour naître, ce à quoi il tient le plus, et qui lui fait faire bon marché du reste.", "en": "That we believe that a being participates in an unknown life into which his love would introduce us is, of all that love requires to be born, what it values ​​most, and which makes it cheap on the rest."}, {"start": 7008.28, "end": 7015.26, "b_start": 13925.65, "b_end": 13940.49, "orig": "Même les femmes qui prétendent ne juger un homme que sur son physique, voient en ce physique l’émanation d’une vie spéciale.", "en": "Even women who claim to only judge a man on his looks see in his looks the emanation of a special life."}, {"start": 7016.26, "end": 7037.0, "b_start": 13940.49, "b_end": 13984.18, "orig": "C’est pourquoi elles aiment les militaires, les pompiers ; l’uniforme les rend moins difficiles pour le visage ; elles croient baiser sous la cuirasse un cœur différent, aventureux et doux ; et un jeune souverain, un prince héritier, pour faire les plus flatteuses conquêtes, dans les pays étrangers qu’il visite, n’a pas besoin du profil régulier qui serait peut-être indispensable à un coulissier.", "en": "This is why they love the military, the firefighters; the uniform makes them less difficult on the face; they believe they kiss under the armor a different heart, adventurous and gentle; and a young sovereign, a crown prince, to make the most flattering conquests in the foreign countries he visits, does not need the regular profile which would perhaps be essential to a coulisssier."}, {"start": 7038.0, "end": 7062.5, "b_start": 13984.18, "b_end": 14033.52, "orig": "Tandis que je lisais au jardin, ce que ma grand’tante n’aurait pas compris que je fisse en dehors du dimanche, jour où il est défendu de s’occuper à rien de sérieux et où elle ne cousait pas (un jour de semaine, elle m’aurait dit « comment tu t’\namuses\nencore à lire, ce n’est pourtant pas dimanche » en donnant au mot amusement le sens d’enfantillage et de perte de temps), ma tante Léonie devisait avec Françoise en attendant l’heure d’Eulalie.", "en": "While I was reading in the garden, which my great aunt would not have understood that I was doing outside of Sunday, a day when it is forbidden to do anything serious and when she did not sew (on a weekday, she would have said to me \"how do you still have fun reading, it's not Sunday\" giving the word fun the meaning of childishness and waste of time), my aunt Léonie was chatting with Françoise while waiting for the hour of Eulalie."}, {"start": 7063.5, "end": 7072.98, "b_start": 14033.52, "b_end": 14051.65, "orig": "Elle lui annonçait qu’elle venait de voir passer M\nme\nGoupil « sans parapluie, avec la robe de soie qu’elle s’est fait faire à Châteaudun.", "en": "She told him that she had just seen Ms. Goupil pass “without an umbrella, with the silk dress she had made in Châteaudun."}, {"start": 7073.98, "end": 7094.65, "b_start": 14051.65, "b_end": 14094.57, "orig": "Si elle a loin à aller avant vêpres elle pourrait bien la faire saucer ».\n– Peut-être, peut-être (ce qui signifiait peut-être non) disait Françoise pour ne pas écarter définitivement la possibilité d’une alternative plus favorable.\n– Tiens, disait ma tante en se frappant le front, cela me fait penser que je n’ai point su si elle était arrivée à l’église après l’élévation.", "en": "If she has far to go before vespers she might well have it sauced.” – Maybe, maybe (which meant maybe no) said Françoise so as not to definitively rule out the possibility of a more favorable alternative. – Well, said my aunt, tapping her forehead, that makes me think that I didn’t know if she had arrived at the church after the elevation."}, {"start": 7095.65, "end": 7112.28, "b_start": 14094.57, "b_end": 14128.21, "orig": "Il faudra que je pense à le demander à Eulalie... Françoise, regardez-moi ce nuage noir derrière le clocher et ce mauvais soleil sur les ardoises, bien sûr que la journée ne se passera pas sans pluie. Ce n’était pas possible que ça reste comme ça, il faisait trop chaud.", "en": "I will have to remember to ask Eulalie... Françoise, look at this black cloud behind the bell tower and this bad sun on the slates, of course the day will not pass without rain. There was no way it could stay like that, it was too hot."}, {"start": 7113.28, "end": 7144.5, "b_start": 14128.21, "b_end": 14190.64, "orig": "Et le plus tôt sera le mieux, car tant que l’orage n’aura pas éclaté, mon eau de Vichy ne descendra pas, ajoutait ma tante dans l’esprit de qui le désir de hâter la descente de l’eau de Vichy l’emportait infiniment sur la crainte de voir M\nme\nGoupil gâter sa robe.\n– Peut-être, peut-être.\n– Et c’est que, quand il pleut sur la place, il n’y a pas grand abri.\n– Comment, trois heures ? s’écriait tout à coup ma tante en pâlissant, mais alors les vêpres sont commencées, j’ai oublié ma pepsine !", "en": "And the sooner the better, because as long as the storm has not broken, my Vichy water will not descend, added my aunt in whose mind the desire to hasten the descent of the Vichy water infinitely outweighed the fear of seeing Mme Goupil spoil her dress. – Maybe, maybe. – And that’s because when it rains in the square, there isn’t much shelter. – What, three hours? cried my aunt suddenly, turning pale, “but then vespers began, I forgot my pepsin!"}, {"start": 7145.5, "end": 7149.85, "b_start": 14190.64, "b_end": 14200.81, "orig": "Je comprends maintenant pourquoi mon eau de Vichy me restait sur l’estomac.", "en": "I now understand why my Vichy water remained on my stomach."}, {"start": 7150.85, "end": 7202.52, "b_start": 14200.81, "b_end": 14304.19, "orig": "Et se précipitant sur un livre de messe relié en velours violet, monté d’or, et d’où, dans sa hâte, elle laissait s’échapper de ces images, bordées d’un bandeau de dentelle de papier jaunissante, qui marquent les pages des fêtes, ma tante, tout en avalant ses gouttes, commençait à lire au plus vite les textes sacrés dont l’intelligence lui était légèrement obscurcie par l’incertitude de savoir si, prise aussi longtemps après l’eau de Vichy, la pepsine serait encore capable de la rattraper et de la faire descendre. « Trois heures, c’est incroyable ce que le temps passe ! »\nUn petit coup au carreau, comme si quelque chose l’avait heurté, suivi d’une ample chute légère comme de grains de sable qu’on eût laissé tomber d’une fenêtre au-dessus, puis la chute s’étendant, se réglant, adoptant un rythme, devenant fluide, sonore, musicale, innombrable, universelle : c’était la pluie.\n– Eh bien !", "en": "And rushing to a mass book bound in purple velvet, mounted in gold, and from which, in her haste, she let escape these images, bordered by a band of yellowing paper lace, which mark the pages of the festivals, my aunt, while swallowing her drops, began to read as quickly as possible the sacred texts whose intelligence was slightly obscured by the uncertainty of knowing whether, taken so long after the Vichy water, the pepsin would still be able to catch it and bring it down. “Three hours, it’s amazing how time flies! » A little tap on the pane, as if something had hit it, followed by a large fall, light as grains of sand that had been dropped from a window above, then the fall extending, regulating itself, adopting a rhythm, becoming fluid, sonorous, musical, innumerable, universal: it was rain. - Well !"}, {"start": 7203.52, "end": 7215.45, "b_start": 14304.19, "b_end": 14327.79, "orig": "Françoise, qu’est-ce que je disais ? Ce que cela tombe ! Mais je crois que j’ai entendu le grelot de la porte du jardin, allez donc voir qui est-ce qui peut être dehors par un temps pareil.", "en": "Françoise, what was I saying? How great! But I think I heard the garden door bell, so go and see who might be outside in such weather."}, {"start": 7216.45, "end": 7235.89, "b_start": 14327.79, "b_end": 14365.8, "orig": "Françoise revenait :\n– C’est M\nme\nAmédée (ma grand’mère) qui a dit qu’elle allait faire un tour. Ça pleut pourtant fort.\n– Cela ne me surprend point, disait ma tante en levant les yeux au ciel. J’ai toujours dit qu’elle n’avait point l’esprit fait comme tout le monde.", "en": "Françoise came back: – It was Mme Amédée (my grandmother) who said she was going for a walk. It's raining hard though. “That doesn’t surprise me,” my aunt said, rolling her eyes. I always said that her mind was not made like everyone else."}, {"start": 7236.89, "end": 7256.33, "b_start": 14365.8, "b_end": 14403.92, "orig": "J’aime mieux que ce soit elle que moi qui soit dehors en ce moment.\n– M\nme\nAmédée, c’est toujours tout l’extrême des autres, disait Françoise avec douceur, réservant pour le moment où elle serait seule avec les autres domestiques de dire qu’elle croyait ma grand’mère un peu « piquée ».\n– Voilà le salut passé !", "en": "I'd rather it be her than me who was out there right now. “Mme Amédée, it’s always the extreme of others,” Françoise said gently, reserving for the moment when she was alone with the other servants to say that she thought my grandmother was a little “bitten.” – There is salvation past!"}, {"start": 7257.33, "end": 7274.34, "b_start": 14403.92, "b_end": 14439.38, "orig": "Eulalie ne viendra plus, soupirait ma tante ; ce sera le temps qui lui aura fait peur.\n– Mais il n’est pas cinq heures, madame Octave, il n’est que quatre heures et demie.\n– Que quatre heures et demie ? et j’ai été obligée de relever les petits rideaux pour avoir un méchant rayon de jour.", "en": "Eulalie will no longer come, my aunt sighed; it will be the weather that frightens him. – But it’s not five o’clock, Madame Octave, it’s only half-past four. – Only half-past four? and I had to raise the little curtains to get a nasty ray of light."}, {"start": 7275.34, "end": 7293.66, "b_start": 14439.38, "b_end": 14479.14, "orig": "À quatre heures et demie ! Huit jours avant les Rogations ! Ah ! ma pauvre Françoise, il faut que le bon Dieu soit bien en colère après nous. Aussi, le monde d’aujourd’hui en fait trop ! Comme disait mon pauvre Octave, on a trop oublié le bon Dieu et il se venge.", "en": "At half past four! Eight days until Rogations! Ah! my poor Françoise, the good Lord must be very angry with us. Also, today’s world does too much! As my poor Octave said, we have forgotten the good Lord too much and he is taking revenge."}, {"start": 7294.66, "end": 7298.95, "b_start": 14479.14, "b_end": 14489.2, "orig": "Une vive rougeur animait les joues de ma tante, c’était Eulalie.", "en": "A bright blush came to my aunt's cheeks; it was Eulalie."}, {"start": 7299.95, "end": 7326.4, "b_start": 14489.2, "b_end": 14544.15, "orig": "Malheureusement, à peine venait-elle d’être introduite que Françoise rentrait et avec un sourire qui avait pour but de se mettre elle-même à l’unisson de la joie qu’elle ne doutait pas que ses paroles allaient causer à ma tante, articulant les syllabes pour montrer que, malgré l’emploi du style indirect, elle rapportait, en bonne domestique, les paroles mêmes dont avait daigné se servir le visiteur :\n– M. le Curé serait enchanté, ravi, si Madame Octave ne repose pas et pouvait le recevoir.", "en": "Unfortunately, she had barely been introduced when Françoise returned and with a smile which was intended to put herself in unison with the joy that she had no doubt that her words would cause my aunt, articulating the syllables to show that, despite the use of the indirect style, she reported, like a good servant, the very words which the visitor had deigned to use: - M. le Curé would be enchanted, delighted, if Madame Octave was not resting not and could receive it."}, {"start": 7327.4, "end": 7334.0, "b_start": 14544.15, "b_end": 14559.26, "orig": "M. le Curé ne veut pas déranger. M. le Curé est en bas, j’y ai dit d’entrer dans la salle.", "en": "The priest does not want to disturb. The priest is downstairs, I told him to come into the room."}, {"start": 7335.0, "end": 7348.85, "b_start": 14559.26, "b_end": 14588.72, "orig": "En réalité, les visites du curé ne faisaient pas à ma tante un aussi grand plaisir que le supposait Françoise et l’air de jubilation dont celle-ci croyait devoir pavoiser son visage chaque fois qu’elle avait à l’annoncer ne répondait pas entièrement au sentiment de la malade.", "en": "In reality, the priest's visits did not give my aunt as much pleasure as Françoise supposed and the look of jubilation with which she thought she should adorn her face each time she had to announce it did not entirely respond to the sick woman's feelings."}, {"start": 7349.85, "end": 7369.79, "b_start": 14588.72, "b_end": 14631.4, "orig": "Le curé (excellent homme avec qui je regrette de ne pas avoir causé davantage, car s’il n’entendait rien aux arts, il connaissait beaucoup d’étymologies), habitué à donner aux visiteurs de marque des renseignements sur l’église (il avait même l’intention d’écrire un livre sur la paroisse de Combray), la fatiguait par des explications infinies et d’ailleurs toujours les mêmes.", "en": "The priest (an excellent man with whom I regret not having spoken more, because although he knew nothing about the arts, he knew a lot of etymologies), accustomed to giving distinguished visitors information about the church (he even intended to write a book on the parish of Combray), tired her with endless explanations and, moreover, always the same ones."}, {"start": 7370.79, "end": 7382.22, "b_start": 14631.4, "b_end": 14656.02, "orig": "Mais quand elle arrivait ainsi juste en même temps que celle d’Eulalie, sa visite devenait franchement désagréable à ma tante. Elle eût mieux aimé bien profiter d’Eulalie et ne pas avoir tout le monde à la fois.", "en": "But when she arrived just at the same time as Eulalie's, her visit became frankly unpleasant for my aunt. She would have preferred to take advantage of Eulalie and not have everyone at once."}, {"start": 7383.22, "end": 7399.34, "b_start": 14656.02, "b_end": 14690.66, "orig": "Mais elle n’osait pas ne pas recevoir le curé et faisait seulement signe à Eulalie de ne pas s’en aller en même temps que lui, qu’elle la garderait un peu seule quand il serait parti.\n– Monsieur le Curé, qu’est-ce que l’on me disait qu’il y a un artiste qui a installé son chevalet dans votre église pour copier un vitrail.", "en": "But she did not dare not receive the priest and only made a sign to Eulalie not to leave at the same time as him, that she would keep her alone for a while when he was gone. – Mr. Priest, what did they tell me that there is an artist who set up his easel in your church to copy a stained glass window."}, {"start": 7400.34, "end": 7408.6, "b_start": 14690.66, "b_end": 14707.54, "orig": "Je peux dire que je suis arrivée à mon âge sans avoir jamais entendu parler d’une chose pareille ! Qu’est-ce que le monde aujourd’hui va donc chercher !", "en": "I can say that I got to my age without ever having heard of such a thing! What is the world looking for today?"}, {"start": 7409.6, "end": 7424.89, "b_start": 14707.54, "b_end": 14740.99, "orig": "Et ce qu’il y a de plus vilain dans l’église !\n– Je n’irai pas jusqu’à dire que c’est ce qu’il y a de plus vilain, car s’il y a à Saint-Hilaire des parties qui méritent d’être visitées, il y en a d’autres qui sont bien vieilles dans ma pauvre basilique, la seule de tout le diocèse qu’on n’ait pas restaurée !", "en": "And the nastiest thing in the church! – I won't go so far as to say that this is the ugliest thing, because if there are parts of Saint-Hilaire that deserve to be visited, there are others that are very old in my poor basilica, the only one in the entire diocese that has not been restored!"}, {"start": 7425.89, "end": 7438.49, "b_start": 14740.99, "b_end": 14768.72, "orig": "Mon Dieu, le porche est sale et antique, mais enfin d’un caractère majestueux ; passe même pour les tapisseries d’Esther dont personnellement je ne donnerais pas deux sous, mais qui sont placées par les connaisseurs tout de suite après celles de Sens.", "en": "My goodness, the porch is dirty and ancient, but still of a majestic character; even goes for the Esther tapestries, for which I personally wouldn't give two cents, but which are placed by connoisseurs immediately after those of Sens."}, {"start": 7439.49, "end": 7450.67, "b_start": 14768.72, "b_end": 14794.51, "orig": "Je reconnais d’ailleurs, qu’à côté de certains détails un peu réalistes, elles en présentent d’autres qui témoignent d’un véritable esprit d’observation. Mais qu’on ne vienne pas me parler des vitraux.", "en": "I recognize, moreover, that alongside certain somewhat realistic details, they present others which demonstrate a true spirit of observation. But don’t come and talk to me about the stained glass windows."}, {"start": 7451.67, "end": 7469.86, "b_start": 14794.51, "b_end": 14833.5, "orig": "Cela a-t-il du bon sens de laisser des fenêtres qui ne donnent pas de jour et trompent même la vue par ces reflets d’une couleur que je ne saurais définir, dans une église où il n’y a pas deux dalles qui soient au même niveau et qu’on se refuse à me remplacer sous prétexte que ce sont les tombes des abbés de Combray et des seigneurs de Guermantes, les anciens comtes de Brabant.", "en": "Does it make sense to leave windows which do not reveal any daylight and even deceive the view with these reflections of a color that I cannot define, in a church where no two slabs are at the same level and where no one refuses to replace me on the pretext that they are the tombs of the abbots of Combray and the lords of Guermantes, the former counts of Brabant."}, {"start": 7470.86, "end": 7492.49, "b_start": 14833.5, "b_end": 14877.02, "orig": "Les ancêtres directs du Duc de Guermantes d’aujourd’hui et aussi de la Duchesse puisqu’elle est une demoiselle de Guermantes qui a épousé son cousin. » (Ma grand’mère qui à force de se désintéresser des personnes finissait par confondre tous les noms, chaque fois qu’on prononçait celui de la Duchesse de Guermantes prétendait que ce devait être une parente de M\nme\nde Villeparisis.", "en": "The direct ancestors of today's Duke of Guermantes and also of the Duchess since she is a young lady from Guermantes who married her cousin. » (My grandmother, who through her lack of interest in people ended up confusing all the names, each time that of the Duchess of Guermantes was mentioned, claimed that it must be a relative of Madame de Villeparisis."}, {"start": 7493.49, "end": 7523.94, "b_start": 14877.02, "b_end": 14940.18, "orig": "Tout le monde éclatait de rire ; elle tâchait de se défendre en alléguant une certaine lettre de faire part : « Il me semblait me rappeler qu’il y avait du Guermantes là dedans. » Et pour une fois j’étais avec les autres contre elle, ne pouvant admettre qu’il y eût un lien entre son amie de pension et la descendante de Geneviève de Brabant.) – « Voyez Roussainville, ce n’est plus aujourd’hui qu’une paroisse de fermiers, quoique dans l’antiquité cette localité ait dû un grand essor au commerce de chapeaux de feutre et des pendules. (Je ne suis pas certain de l’étymologie de Roussainville.", "en": "Everyone burst out laughing; she tried to defend herself by alleging a certain letter to share: “I seemed to remember that there was Guermantes in there. » And for once I was with the others against her, not being able to admit that there was a link between her boarding school friend and the descendant of Geneviève de Brabant.) – “See Roussainville, today it is no longer just a parish of farmers, although in antiquity this locality owed a great boom to the trade in felt hats and clocks. (I am not sure of the etymology of Roussainville."}, {"start": 7524.94, "end": 7552.93, "b_start": 14940.18, "b_end": 14993.64, "orig": "Je croirais volontiers que le nom primitif était Rouville (\nRadulfi villa\n) comme Châteauroux (\nCastrum Radulfi\n), mais je vous parlerai de cela une autre fois.) Hé bien ! l’église a des vitraux superbes, presque tous modernes, et cette imposante\nEntrée de Louis-Philippe à Combray\nqui serait mieux à sa place à Combray même, et qui vaut, dit-on, la fameuse verrière de Chartres.", "en": "I would happily believe that the original name was Rouville ( Radulfi villa ) like Châteauroux ( Castrum Radulfi ), but I will tell you about that another time.) Well! the church has superb stained glass windows, almost all modern, and this imposing Entrance of Louis-Philippe to Combray which would be better in its place in Combray itself, and which is said to be worth the famous glass roof of Chartres."}, {"start": 7553.93, "end": 7586.38, "b_start": 14993.64, "b_end": 15060.39, "orig": "Je voyais même hier le frère du docteur Percepied qui est amateur et qui la regarde comme d’un plus beau travail.\n« Mais, comme je le lui disais à cet artiste qui semble du reste très poli, qui est paraît-il, un véritable virtuose du pinceau, que lui trouvez-vous donc d’extraordinaire à ce vitrail, qui est encore un peu plus sombre que les autres ? »\n– Je suis sûre que si vous le demandiez à Monseigneur, disait mollement ma tante qui commençait à penser qu’elle allait être fatiguée, il ne vous refuserait pas un vitrail neuf.\n– Comptez-y, madame Octave, répondait le curé.", "en": "Yesterday I even saw Doctor Percepied's brother who is an amateur and who considers it to be more beautiful work. “But, as I said to this artist who seems very polite, who is apparently a true virtuoso of the brush, what do you find extraordinary about this stained glass window, which is still a little darker than the others? » – I am sure that if you asked Monseigneur, said my aunt softly, who was beginning to think that she was going to be tired, he would not refuse you a new stained glass window. “Count on it, Madame Octave,” replied the priest."}, {"start": 7587.38, "end": 7609.72, "b_start": 15060.39, "b_end": 15109.53, "orig": "Mais c’est justement Monseigneur qui a attaché le grelot à cette malheureuse verrière en prouvant qu’elle représente Gilbert le Mauvais, sire de Guermantes, le descendant direct de Geneviève de Brabant qui était une demoiselle de Guermantes, recevant l’absolution de Saint-Hilaire.\n– Mais je ne vois pas où est saint Hilaire ?\n– Mais si, dans le coin du vitrail vous n’avez jamais remarqué une dame en robe jaune ?", "en": "But it was precisely Monseigneur who attached the bell to this unfortunate glass roof, proving that it represents Gilbert the Bad, Lord of Guermantes, the direct descendant of Geneviève de Brabant who was a young lady of Guermantes, receiving absolution from Saint-Hilaire. – But I don’t see where Saint Hilary is? – But what if, in the corner of the stained glass window, you have never noticed a lady in a yellow dress?"}, {"start": 7610.72, "end": 7621.38, "b_start": 15109.53, "b_end": 15132.49, "orig": "Hé bien ! c’est saint Hilaire qu’on appelle aussi, vous le savez, dans certaines provinces, saint Illiers, saint Hélier, et même, dans le Jura, saint Ylie.", "en": "Well! it is Saint Hilaire who is also called, as you know, in certain provinces, Saint Illiers, Saint Hélier, and even, in the Jura, Saint Ylie."}, {"start": 7622.38, "end": 7632.1, "b_start": 15132.49, "b_end": 15152.08, "orig": "Ces diverses corruptions de\nsanctus Hilarius\nne sont pas du reste les plus curieuses de celles qui se sont produites dans les noms des bienheureux.", "en": "These various corruptions of Sanctus Hilarius are not, moreover, the most curious of those which have occurred in the names of the blessed."}, {"start": 7633.1, "end": 7645.86, "b_start": 15152.08, "b_end": 15176.34, "orig": "Ainsi votre patronne, ma bonne Eulalie,\nsancta Eulalia\n, savez-vous ce qu’elle est devenue en Bourgogne ?\nsaint Éloi\ntout simplement : elle est devenue un saint.", "en": "So your patroness, my good Eulalie, sancta Eulalia, do you know what has become of her in Burgundy? Saint Eloi quite simply: she became a saint."}, {"start": 7646.86, "end": 7674.82, "b_start": 15176.34, "b_end": 15233.66, "orig": "Voyez-vous, Eulalie, qu’après votre mort on fasse de vous un homme ? » – « Monsieur le Curé a toujours le mot pour rigoler. » – « Le frère de Gilbert, Charles le Bègue, prince pieux mais qui, ayant perdu de bonne heure son père, Pépin l’Insensé, mort des suites de sa maladie mentale, exerçait le pouvoir suprême avec toute la présomption d’une jeunesse à qui la discipline a manqué ; dès que la figure d’un particulier ne lui revenait pas dans une ville, il y faisait massacrer jusqu’au dernier habitant.", "en": "Do you see, Eulalie, that after your death they make you a man? » – “Monsieur le Curé always has a joke. » – “Gilbert's brother, Charles the Stutterer, a pious prince but who, having lost his father early, Pepin the Fool, who died as a result of his mental illness, exercised supreme power with all the presumption of a youth who lacked discipline; as soon as the face of an individual did not return to him in a town, he had every last inhabitant there massacred."}, {"start": 7675.82, "end": 7697.16, "b_start": 15233.66, "b_end": 15275.98, "orig": "Gilbert voulant se venger de Charles fit brûler l’église de Combray, la primitive église alors, celle que Théodebert, en quittant avec sa cour la maison de campagne qu’il avait près d’ici, à Thiberzy (\nTheodeberciacus\n), pour aller combattre les Burgondes, avait promis de bâtir au-dessus du tombeau de saint Hilaire si le Bienheureux lui procurait la victoire.", "en": "Gilbert, wanting to take revenge on Charles, burned the church of Combray, the primitive church at the time, the one that Théodebert, leaving with his court the country house he had near here, at Thiberzy (Theodeberciacus), to go and fight the Burgundians, had promised to build above the tomb of Saint Hilaire if the Blessed gave him victory."}, {"start": 7698.16, "end": 7712.87, "b_start": 15275.98, "b_end": 15307.84, "orig": "Il n’en reste que la crypte où Théodore a dû vous faire descendre, puisque Gilbert brûla le reste. Ensuite il défit l’infortuné Charles avec l’aide de Guillaume le Conquérant (le curé prononçait Guilôme), ce qui fait que beaucoup d’Anglais viennent pour visiter.", "en": "All that remains is the crypt where Théodore must have taken you down, since Gilbert burned the rest. Then he defeated the unfortunate Charles with the help of William the Conqueror (the priest pronounced Guilôme), which means that many English people come to visit."}, {"start": 7713.87, "end": 7722.68, "b_start": 15307.84, "b_end": 15326.55, "orig": "Mais il ne semble pas avoir su se concilier la sympathie des habitants de Combray, car ceux-ci se ruèrent sur lui à la sortie de la messe et lui tranchèrent la tête.", "en": "But he does not seem to have been able to win the sympathy of the inhabitants of Combray, because they rushed on him after mass and cut off his head."}, {"start": 7723.68, "end": 7734.96, "b_start": 15326.55, "b_end": 15351.12, "orig": "Du reste Théodore prête un petit livre qui donne les explications.\n« Mais ce qui est incontestablement le plus curieux dans notre église, c’est le point de vue qu’on a du clocher et qui est grandiose.", "en": "Moreover, Théodore lends a small book which gives the explanations. “But what is undoubtedly the most curious thing about our church is the view from the bell tower, which is grandiose."}, {"start": 7735.96, "end": 7744.94, "b_start": 15351.12, "b_end": 15370.5, "orig": "Certainement, pour vous qui n’êtes pas très forte, je ne vous conseillerais pas de monter nos quatre-vingt-dix-sept marches, juste la moitié du célèbre dôme de Milan.", "en": "Certainly, for you who are not very strong, I would not advise you to climb our ninety-seven steps, just half of the famous Milan Cathedral."}, {"start": 7745.94, "end": 7756.38, "b_start": 15370.5, "b_end": 15392.16, "orig": "Il y a de quoi fatiguer une personne bien portante, d’autant plus qu’on monte plié en deux si on ne veut pas se casser la tête, et on ramasse avec ses effets toutes les toiles d’araignées de l’escalier.", "en": "It's enough to tire a healthy person, especially since you go up bent double if you don't want to worry, and you pick up all the cobwebs from the stairs with your belongings."}, {"start": 7757.38, "end": 7772.93, "b_start": 15392.16, "b_end": 15425.38, "orig": "En tous cas il faudrait bien vous couvrir, ajoutait-il (sans apercevoir l’indignation que causait à ma tante l’idée qu’elle fût capable de monter dans le clocher), car il fait un de ces courants d’air une fois arrivé là-haut ! Certaines personnes affirment y avoir ressenti le froid de la mort.", "en": "In any case you should cover yourself well, he added (without noticing the indignation that caused my aunt the idea that she was capable of climbing the bell tower), because it makes one of those drafts once you get up there! Some people claim to have felt the cold of death there."}, {"start": 7773.93, "end": 7789.02, "b_start": 15425.38, "b_end": 15457.29, "orig": "N’importe, le dimanche il y a toujours des sociétés qui viennent même de très loin pour admirer la beauté du panorama et qui s’en retournent enchantées. Tenez, dimanche prochain, si le temps se maintient, vous trouveriez certainement du monde, comme ce sont les Rogations.", "en": "No matter, on Sunday there are always companies who come even from very far away to admire the beauty of the panorama and who return enchanted. Look, next Sunday, if the weather holds, you would certainly find people, like the Rogations."}, {"start": 7790.02, "end": 7801.14, "b_start": 15457.29, "b_end": 15480.8, "orig": "Il faut avouer du reste qu’on jouit de là d’un coup d’œil féerique, avec des sortes d’échappées sur la plaine qui ont un cachet tout particulier. Quand le temps est clair on peut distinguer jusqu’à Verneuil.", "en": "We must admit that we enjoy a magical view from there, with a kind of glimpse of the plain which has a very special character. When the weather is clear you can see as far as Verneuil."}, {"start": 7802.14, "end": 7819.8, "b_start": 15480.8, "b_end": 15518.3, "orig": "Surtout on embrasse à la fois des choses qu’on ne peut voir habituellement que l’une sans l’autre, comme le cours de la Vivonne et les fossés de Saint-Assise-lès-Combray, dont elle est séparée par un rideau de grands arbres, ou encore comme les différents canaux de Jouy-le-Vicomte (\nGaudiacus vice comitis\ncomme vous savez).", "en": "Above all, we embrace things at the same time that we can usually only see one without the other, such as the course of the Vivonne and the ditches of Saint-Assise-lès-Combray, from which it is separated by a curtain of large trees, or even like the different canals of Jouy-le-Vicomte (Gaudiacus vice comitis as you know)."}, {"start": 7820.8, "end": 7835.15, "b_start": 15518.3, "b_end": 15548.67, "orig": "Chaque fois que je suis allé à Jouy-le-Vicomte, j’ai bien vu un bout du canal, puis quand j’avais tourné une rue j’en voyais un autre, mais alors je ne voyais plus le précédent. J’avais beau les mettre ensemble par la pensée, cela ne me faisait pas grand effet.", "en": "Each time I went to Jouy-le-Vicomte, I saw one end of the canal, then when I turned a street I saw another, but then I no longer saw the previous one. No matter how hard I put them together in my mind, it didn't have much effect on me."}, {"start": 7836.15, "end": 7851.18, "b_start": 15548.67, "b_end": 15581.4, "orig": "Du clocher de Saint-Hilaire c’est autre chose, c’est tout un réseau où la localité est prise. Seulement on ne distingue pas d’eau, on dirait de grandes fentes qui coupent si bien la ville en quartiers, qu’elle est comme une brioche dont les morceaux tiennent ensemble mais sont déjà découpés.", "en": "From the bell tower of Saint-Hilaire it is something else, it is a whole network where the locality is taken. Only we can't see any water, it looks like large cracks that cut the city into quarters so well that it's like a brioche whose pieces hold together but are already cut up."}, {"start": 7852.18, "end": 7857.43, "b_start": 15581.4, "b_end": 15594.78, "orig": "Il faudrait pour bien faire être à la fois dans le clocher de Saint-Hilaire et à Jouy-le-Vicomte.", "en": "To do this well, it would be necessary to be both in the bell tower of Saint-Hilaire and in Jouy-le-Vicomte."}, {"start": 7858.43, "end": 7922.54, "b_start": 15594.78, "b_end": 15726.64, "orig": "Le curé avait tellement fatigué ma tante qu’à peine était-il parti, elle était obligée de renvoyer Eulalie.\n– Tenez, ma pauvre Eulalie, disait-elle d’une voix faible, en tirant une pièce d’une petite bourse qu’elle avait à portée de sa main, voilà pour que vous ne m’oubliiez pas dans vos prières.\n– Ah ! mais, madame Octave, je ne sais pas si je dois, vous savez bien que ce n’est pas pour cela que je viens ! disait Eulalie avec la même hésitation et le même embarras, chaque fois, que si c’était la première, et avec une apparence de mécontentement qui égayait ma tante mais ne lui déplaisait pas, car si un jour Eulalie, en prenant la pièce, avait un air un peu moins contrarié que de coutume, ma tante disait :\n– Je ne sais pas ce qu’avait Eulalie ; je lui ai pourtant donné la même chose que d’habitude, elle n’avait pas l’air contente.\n– Je crois qu’elle n’a pourtant pas à se plaindre, soupirait Françoise, qui avait une tendance à considérer comme de la menue monnaie tout ce que lui donnait ma tante pour elle ou pour ses enfants, et comme des trésors follement gaspillés pour une ingrate les piécettes mises chaque dimanche dans la main d’Eulalie, mais si discrètement que Françoise n’arrivait jamais à les voir.", "en": "The priest had tired my aunt so much that as soon as he had left, she was obliged to send Eulalie away. – Here, my poor Eulalie, she said in a weak voice, taking a coin from a small purse that she had within reach, so that you do not forget me in your prayers. – Oh! but, Madame Octave, I don't know if I should, you know very well that that's not why I come! said Eulalie with the same hesitation and the same embarrassment, each time, as if it were the first, and with an appearance of discontent which cheered my aunt but did not displease her, because if one day Eulalie, when taking the coin, had an air a little less upset than usual, my aunt would say: - I don't know what was wrong with Eulalie; However, I gave her the same thing as usual, she didn't seem happy. – I believe that she has nothing to complain about, sighed Françoise, who had a tendency to consider as small change everything that my aunt gave her for herself or for her children, and as treasures foolishly wasted on an ungrateful person the coins placed every Sunday in Eulalie's hand, but so discreetly that Françoise never managed to see them."}, {"start": 7923.54, "end": 7928.67, "b_start": 15726.64, "b_end": 15739.11, "orig": "Ce n’est pas que l’argent que ma tante donnait à Eulalie, Françoise l’eût voulu pour elle.", "en": "It’s not that the money my aunt gave to Eulalie, Françoise would have wanted it for herself."}, {"start": 7929.67, "end": 7950.86, "b_start": 15739.11, "b_end": 15784.63, "orig": "Elle jouissait suffisamment de ce que ma tante possédait, sachant que les richesses de la maîtresse du même coup élèvent et embellissent aux yeux de tous sa servante ; et qu’elle, Françoise, était insigne et glorifiée dans Combray, Jouy-le-Vicomte et autres lieux, pour les nombreuses fermes de ma tante, les visites fréquentes et prolongées du curé, le nombre singulier des bouteilles d’eau de Vichy consommées.", "en": "She sufficiently enjoyed what my aunt possessed, knowing that the riches of the mistress at the same time elevate and beautify her servant in the eyes of all; and that she, Françoise, was distinguished and glorified in Combray, Jouy-le-Vicomte and other places, for my aunt's numerous farms, the frequent and prolonged visits of the priest, the singular number of bottles of Vichy water consumed."}, {"start": 7951.86, "end": 7961.82, "b_start": 15784.63, "b_end": 15806.24, "orig": "Elle n’était avare que pour ma tante ; si elle avait géré sa fortune, ce qui eût été son rêve, elle l’aurait préservée des entreprises d’autrui avec une férocité maternelle.", "en": "She was only stingy for my aunt; If she had managed her fortune, which would have been her dream, she would have protected it from the enterprises of others with maternal ferocity."}, {"start": 7962.82, "end": 7972.21, "b_start": 15806.24, "b_end": 15827.18, "orig": "Elle n’aurait pourtant pas trouvé grand mal à ce que ma tante, qu’elle savait incurablement généreuse, se fût laissée aller à donner, si au moins ç’avait été à des riches.", "en": "However, she would not have found much harm in the fact that my aunt, whom she knew to be incurably generous, had indulged in giving, if at least it had been to the rich."}, {"start": 7973.21, "end": 7989.58, "b_start": 15827.18, "b_end": 15859.11, "orig": "Peut-être pensait-elle que ceux-là, n’ayant pas besoin des cadeaux de ma tante, ne pouvaient être soupçonnés de l’aimer à cause d’eux. D’ailleurs offerts à des personnes d’une grande position de fortune, à M\nme\nSazerat, à M. Swann, à M.", "en": "Perhaps she thought that these people, not needing my aunt's gifts, could not be suspected of loving her because of them. Moreover, offered to people of great position of fortune, to Ms. Sazerat, to Mr. Swann, to Mr."}, {"start": 7990.58, "end": 8008.5, "b_start": 15859.11, "b_end": 15893.66, "orig": "Legrandin, à M\nme\nGoupil, à des personnes « de même rang » que ma tante et qui « allaient bien ensemble », ils lui apparaissaient comme faisant partie des usages de cette vie étrange et brillante des gens riches qui chassent, se donnent des bals, se font des visites et qu’elle admirait en souriant.", "en": "Legrandin, to Mme Goupil, to people “of the same rank” as my aunt and who “went well together”, they appeared to her as part of the customs of this strange and brilliant life of rich people who hunt, give balls, pay visits and whom she admired with a smile."}, {"start": 8009.5, "end": 8025.97, "b_start": 15893.66, "b_end": 15927.22, "orig": "Mais il n’en allait plus de même si les bénéficiaires de la générosité de ma tante étaient de ceux que Françoise appelait « des gens comme moi, des gens qui ne sont pas plus que moi » et qui étaient ceux qu’elle méprisait le plus à moins qu’ils ne l’appelassent « Madame Françoise » et ne se considérassent comme étant « moins qu’elle ».", "en": "But it was no longer the same if the beneficiaries of my aunt's generosity were those whom Françoise called \"people like me, people who are no more than me\" and who were those whom she despised the most unless they called her \"Madame Françoise\" and considered themselves to be \"less than her\"."}, {"start": 8026.97, "end": 8041.54, "b_start": 15927.22, "b_end": 15960.4, "orig": "Et quand elle vit que, malgré ses conseils, ma tante n’en faisait qu’à sa tête et jetait l’argent – Françoise le croyait du moins – pour des créatures indignes, elle commença à trouver bien petits les dons que ma tante lui faisait en comparaison des sommes imaginaires prodiguées à Eulalie.", "en": "And when she saw that, despite her advice, my aunt was doing what she wanted and was throwing money away – Françoise believed so at least – for unworthy creatures, she began to find the donations that my aunt gave her very small in comparison to the imaginary sums lavished on Eulalie."}, {"start": 8042.54, "end": 8057.25, "b_start": 15960.4, "b_end": 15991.45, "orig": "Il n’y avait pas dans les environs de Combray de ferme si conséquente que Françoise ne supposât qu’Eulalie eût pu facilement l’acheter, avec tout ce que lui rapporteraient ses visites. Il est vrai qu’Eulalie faisait la même estimation des richesses immenses et cachées de Françoise.", "en": "There was no farm in the vicinity of Combray so large that Françoise did not suppose that Eulalie could easily have bought it, with all that her visits would bring her. It is true that Eulalie made the same estimate of Françoise’s immense and hidden riches."}, {"start": 8058.25, "end": 8071.45, "b_start": 15991.45, "b_end": 16018.53, "orig": "Habituellement, quand Eulalie était partie, Françoise prophétisait sans bienveillance sur son compte. Elle la haïssait, mais elle la craignait et se croyait tenue, quand elle était là, à lui faire « bon visage ».", "en": "Usually, when Eulalie was gone, Françoise prophesied without kindness about her. She hated her, but she feared her and believed herself obliged, when she was there, to give her a “good face”."}, {"start": 8072.45, "end": 8085.96, "b_start": 16018.53, "b_end": 16047.3, "orig": "Elle se rattrapait après son départ, sans la nommer jamais à vrai dire, mais en proférant, en oracles sibyllins, des sentences d’un caractère général telles que celles de l’Ecclésiaste, mais dont l’application ne pouvait échapper à ma tante.", "en": "She made up for it after her departure, without ever actually naming her, but by uttering, in sibylline oracles, sentences of a general nature such as those of Ecclesiastes, but the application of which could not escape my aunt."}, {"start": 8086.96, "end": 8107.91, "b_start": 16047.3, "b_end": 16091.08, "orig": "Après avoir regardé par le coin du rideau si Eulalie avait refermé la porte : « Les personnes flatteuses savent se faire bien venir et ramasser les pépettes ; mais patience, le bon Dieu les punit toutes par un beau jour », disait-elle, avec le regard latéral et l’insinuation de Joas pensant exclusivement à Athalie quand il dit :\nLe bonheur des méchants comme un torrent s’écoule.", "en": "After looking through the corner of the curtain to see if Eulalie had closed the door: “Flattering people know how to make themselves come and pick up the jokes; but be patient, the good Lord punishes them all one fine day,” she said, with the sideways glance and insinuation of Joash thinking exclusively of Athaliah when he said: The happiness of the wicked flows like a torrent."}, {"start": 8108.91, "end": 8122.76, "b_start": 16091.08, "b_end": 16118.74, "orig": "Mais quand le curé était venu aussi et que sa visite interminable avait épuisé les forces de ma tante, Françoise sortait de la chambre derrière Eulalie et disait :\n– Madame Octave, je vous laisse reposer, vous avez l’air beaucoup fatiguée.", "en": "But when the priest had also come and his interminable visit had exhausted my aunt's strength, Françoise came out of the room behind Eulalie and said: - Madame Octave, I'll let you rest, you look very tired."}, {"start": 8123.76, "end": 8131.2, "b_start": 16118.74, "b_end": 16135.12, "orig": "Et ma tante ne répondait même pas, exhalant un soupir qui semblait devoir être le dernier, les yeux clos, comme morte.", "en": "And my aunt didn't even respond, exhaling a sigh that seemed to be the last, with her eyes closed, as if dead."}, {"start": 8132.2, "end": 8143.5, "b_start": 16135.12, "b_end": 16159.5, "orig": "Mais à peine Françoise était-elle descendue que quatre coups donnés avec la plus grande violence retentissaient dans la maison et ma tante, dressée sur son lit, criait :\n– Est-ce qu’Eulalie est déjà partie ?", "en": "But barely had Françoise come downstairs when four knocks delivered with the greatest violence resounded in the house and my aunt, sitting up on her bed, shouted: – Has Eulalie already left?"}, {"start": 8144.5, "end": 8165.24, "b_start": 16159.5, "b_end": 16201.1, "orig": "Croyez-vous que j’ai oublié de lui demander si M\nme\nGoupil était arrivée à la messe avant l’élévation ! Courez vite après elle ! Mais Françoise revenait n’ayant pu rattraper Eulalie.\n– C’est contrariant, disait ma tante en hochant la tête. La seule chose importante que j’avais à lui demander !", "en": "Do you think I forgot to ask her if Ms. Goupil had arrived at mass before the elevation! Quickly run after her! But Françoise returned, having been unable to catch up with Eulalie. “It’s annoying,” my aunt said, shaking her head. The only important thing I had to ask him!"}, {"start": 8166.24, "end": 8176.75, "b_start": 16201.1, "b_end": 16223.12, "orig": "Ainsi passait la vie pour ma tante Léonie, toujours identique, dans la douce uniformité de ce qu’elle appelait avec un dédain affecté et une tendresse profonde, son « petit traintrain ».", "en": "This is how life passed for my aunt Léonie, always identical, in the sweet uniformity of what she called with affected disdain and deep tenderness, her “little routine”."}, {"start": 8177.75, "end": 8198.9, "b_start": 16223.12, "b_end": 16267.56, "orig": "Préservé par tout le monde, non seulement à la maison, où chacun ayant éprouvé l’inutilité de lui conseiller une meilleure hygiène, s’était peu à peu résigné à le respecter, mais même dans le village où, à trois rues de nous, l’emballeur, avant de clouer ses caisses, faisait demander à Françoise si ma tante ne « reposait pas » – ce traintrain fut pourtant troublé une fois cette année-là.", "en": "Preserved by everyone, not only at home, where everyone, having felt the uselessness of advising her to improve hygiene, had gradually resigned themselves to respecting it, but even in the village where, three streets from us, the packer, before nailing up his crates, asked Françoise if my aunt was not “resting” – this routine was however disturbed once that year."}, {"start": 8199.9, "end": 8208.68, "b_start": 16267.56, "b_end": 16286.65, "orig": "Comme un fruit caché qui serait parvenu à maturité sans qu’on s’en aperçût et se détacherait spontanément, survint une nuit la délivrance de la fille de cuisine.", "en": "Like a hidden fruit that would have reached maturity without being noticed and would come off spontaneously, the deliverance of the kitchen maid came one night."}, {"start": 8209.68, "end": 8217.98, "b_start": 16286.65, "b_end": 16305.12, "orig": "Mais ses douleurs étaient intolérables, et comme il n’y avait pas de sage-femme à Combray, Françoise dut partir avant le jour en chercher une à Thiberzy.", "en": "But her pain was intolerable, and as there was no midwife in Combray, Françoise had to leave before daylight to find one in Thiberzy."}, {"start": 8218.98, "end": 8229.64, "b_start": 16305.12, "b_end": 16327.95, "orig": "Ma tante, à cause des cris de la fille de cuisine, ne put reposer, et Françoise, malgré la courte distance, n’étant revenue que très tard, lui manqua beaucoup.", "en": "My aunt, because of the cries of the kitchen maid, could not rest, and Françoise, despite the short distance, having only returned very late, missed her very much."}, {"start": 8230.64, "end": 8245.45, "b_start": 16327.95, "b_end": 16357.29, "orig": "Aussi, ma mère me dit-elle dans la matinée : « Monte donc voir si ta tante n’a besoin de rien. » J’entrai dans la première pièce et, par la porte ouverte, vis ma tante, couchée sur le côté, qui dormait ; je l’entendis ronfler légèrement.", "en": "So my mother said to me in the morning: “Go up and see if your aunt doesn’t need anything. » I entered the first room, and through the open door saw my aunt, lying on her side, sleeping; I heard him snoring lightly."}, {"start": 8246.45, "end": 8297.93, "b_start": 16357.29, "b_end": 16463.17, "orig": "J’allais m’en aller doucement, mais sans doute le bruit que j’avais fait était intervenu dans son sommeil et en avait « changé la vitesse », comme on dit pour les automobiles, car la musique du ronflement s’interrompit une seconde et reprit un ton plus bas, puis elle s’éveilla et tourna à demi son visage que je pus voir alors ; il exprimait une sorte de terreur ; elle venait évidemment
