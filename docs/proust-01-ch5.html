        <title>À la recherche du temps perdu I – II</title>
        
        
        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 30.0, "b_start": 0.0, "b_end": 64.07, "orig": "II\nCombray de loin, à dix lieues à la ronde, vu du chemin de fer quand nous y arrivions la dernière semaine avant Pâques, ce n’était qu’une église résumant la ville, la représentant, parlant d’elle et pour elle aux lointains, et, quand on approchait, tenant serrés autour de sa haute mante sombre, en plein champ, contre le vent, comme une pastoure ses brebis, les dos laineux et gris des maisons rassemblées qu’un reste de remparts du moyen âge cernait çà et là d’un trait aussi parfaitement circulaire qu’une petite ville dans un tableau de primitif.", "en": "II Combray from a distance, ten leagues around, seen from the railway when we arrived there the last week before Easter, it was only a church summarizing the town, representing it, speaking of it and for it to the distant ones, and, when we approached, holding tight around its tall dark mantle, in the open field, against the wind, like a shepherd its sheep, the woolly and gray backs of the houses gathered together as a remnant of the ramparts of the The Middle Ages surrounded here and there with a line as perfectly circular as a small town in a primitive painting."}, {"start": 31.0, "end": 100.74, "b_start": 64.07, "b_end": 207.55, "orig": "À l’habiter, Combray était un peu triste, comme ses rues dont les maisons construites en pierres noirâtres du pays, précédées de degrés extérieurs, coiffées de pignons qui rabattaient l’ombre devant elles, étaient assez obscures pour qu’il fallût dès que le jour commençait à tomber relever les rideaux dans les « salles » ; des rues aux graves noms de saints (desquels plusieurs se rattachaient à l’histoire des premiers seigneurs de Combray) : rue Saint-Hilaire, rue Saint-Jacques où était la maison de ma tante, rue Sainte-Hildegarde, où donnait la grille, et rue du Saint-Esprit sur laquelle s’ouvrait la petite porte latérale de son jardin ; et ces rues de Combray existent dans une partie de ma mémoire si reculée, peinte de couleurs si différentes de celles qui maintenant revêtent pour moi le monde, qu’en vérité elles me paraissent toutes, et l’église qui les dominait sur la Place, plus irréelles encore que les projections de la lanterne magique ; et qu’à certains moments, il me semble que pouvoir encore traverser la rue Saint-Hilaire, pouvoir louer une chambre rue de l’Oiseau – à la vieille hôtellerie de l’Oiseau Flesché, des soupiraux de laquelle montait une odeur de cuisine qui s’élève encore par moments en moi aussi intermittente et aussi chaude – serait une entrée en contact avec l’Au-delà plus merveilleusement surnaturelle que de faire la connaissance de Golo et de causer avec Geneviève de Brabant.", "en": "To live in it, Combray was a little sad, as its streets whose houses built of blackish local stones, preceded by exterior steps, topped with gables which cast the shadows in front of them, were dark enough that as soon as daylight began to fall it was necessary to raise the curtains in the \"rooms\"; streets with the grave names of saints (several of which were linked to the history of the first lords of Combray): rue Saint-Hilaire, rue Saint-Jacques where my aunt's house was, rue Sainte-Hildegarde, where the gate opened, and rue du Saint-Esprit onto which the small side door of her garden opened; and these streets of Combray exist in such a remote part of my memory, painted in colors so different from those which now cover the world for me, that in truth they all seem to me, and the church which dominated them on the Place, even more unreal than the projections of the magic lantern; and that at certain moments, it seems to me that being able to still cross rue Saint-Hilaire, to be able to rent a room on rue de l'Oiseau - in the old inn of l'Oiseau Flesché, from the vents of which rose a smell of cooking which still rises in me at times as intermittent and as warm - would be an entry into contact with the Beyond more wonderfully supernatural than making the acquaintance of Golo and chatting with Geneviève de Brabant."}, {"start": 101.74, "end": 124.57, "b_start": 207.55, "b_end": 255.13, "orig": "La cousine de mon grand-père – ma grand’tante – chez qui nous habitions, était la mère de cette tante Léonie qui, depuis la mort de son mari, mon oncle Octave, n’avait plus voulu quitter, d’abord Combray, puis à Combray sa maison, puis sa chambre, puis son lit et ne « descendait » plus, toujours couchée dans un état incertain de chagrin, de débilité physique, de maladie, d’idée fixe et de dévotion.", "en": "My grandfather's cousin - my great-aunt - with whom we lived, was the mother of this aunt Léonie who, since the death of her husband, my uncle Octave, had no longer wanted to leave, first Combray, then in Combray her house, then her room, then her bed and would no longer \"come down\", always lying in an uncertain state of grief, physical debility, illness, fixed ideas and devotion."}, {"start": 125.57, "end": 147.05, "b_start": 255.13, "b_end": 300.86, "orig": "Son appartement particulier donnait sur la rue Saint-Jacques qui aboutissait beaucoup plus loin au Grand-Pré (par opposition au Petit-Pré, verdoyant au milieu de la ville, entre trois rues), et qui, unie, grisâtre, avec les trois hautes marches de grès presque devant chaque porte, semblait comme un défilé pratiqué par un tailleur d’images gothiques à même la pierre où il eût sculpté une crèche ou un calvaire.", "en": "His private apartment overlooked Rue Saint-Jacques which ended much further at Grand-Pré (as opposed to Petit-Pré, green in the middle of the town, between three streets), and which, plain, greyish, with the three high sandstone steps almost in front of each door, seemed like a procession practiced by a cutter of Gothic images on the very stone where he had carved a nativity scene or a Calvary."}, {"start": 148.05, "end": 154.94, "b_start": 300.86, "b_end": 315.88, "orig": "Ma tante n’habitait plus effectivement que deux chambres contiguës, restant l’après-midi dans l’une pendant qu’on aérait l’autre.", "en": "My aunt actually only lived in two adjoining rooms, staying in the afternoon in one while we aired the other."}, {"start": 155.94, "end": 211.33, "b_start": 315.88, "b_end": 432.41, "orig": "C’étaient de ces chambres de province qui – de même qu’en certains pays des parties entières de l’air ou de la mer sont illuminées ou parfumées par des myriades de protozoaires que nous ne voyons pas – nous enchantent des mille odeurs qu’y dégagent les vertus, la sagesse, les habitudes, toute une vie secrète, invisible, surabondante et morale que l’atmosphère y tient en suspens ; odeurs naturelles encore, certes, et couleur du temps comme celles de la campagne voisine, mais déjà casanières, humaines et renfermées, gelée exquise, industrieuse et limpide de tous les fruits de l’année qui ont quitté le verger pour l’armoire ; saisonnières, mais mobilières et domestiques, corrigeant le piquant de la gelée blanche par la douceur du pain chaud, oisives et ponctuelles comme une horloge de village, flâneuses et rangées, insoucieuses et prévoyantes, lingères, matinales, dévotes, heureuses d’une paix qui n’apporte qu’un surcroît d’anxiété et d’un prosaïsme qui sert de grand réservoir de poésie à celui qui la traverse sans y avoir vécu.", "en": "They were these provincial rooms which - just as in certain countries entire parts of the air or the sea are illuminated or perfumed by myriads of protozoa that we do not see - enchant us with the thousand odors given off by virtues, wisdom, habits, a whole secret, invisible, superabundant and moral life that the atmosphere holds in suspense; natural smells still, certainly, and color of the weather like those of the neighboring countryside, but already homely, human and withdrawn, exquisite, industrious and clear jelly of all the fruits of the year which have left the orchard for the cupboard; seasonal, but movable and domestic, correcting the sting of white frost with the sweetness of warm bread, idle and punctual like a village clock, strolling and tidy, carefree and provident, laundry workers, early morning people, devout, happy with a peace which only brings an increase in anxiety and a prosaism which serves as a great reservoir of poetry for those who pass through it without having lived there."}, {"start": 212.33, "end": 295.8, "b_start": 432.41, "b_end": 601.57, "orig": "L’air y était saturé de la fine fleur d’un silence si nourricier, si succulent que je ne m’y avançais qu’avec une sorte de gourmandise, surtout par ces premiers matins encore froids de la semaine de Pâques où je le goûtais mieux parce que je venais seulement d’arriver à Combray : avant que j’entrasse souhaiter le bonjour à ma tante on me faisait attendre un instant dans la première pièce où le soleil, d’hiver encore, était venu se mettre au chaud devant le feu, déjà allumé entre les deux briques et qui badigeonnait toute la chambre d’une odeur de suie, en faisait comme un de ces grands « devants de four » de campagne, ou de ces manteaux de cheminée de châteaux, sous lesquels on souhaite que se déclarent dehors la pluie, la neige, même quelque catastrophe diluvienne pour ajouter au confort de la réclusion la poésie de l’hivernage ; je faisais quelques pas du prie-Dieu aux fauteuils en velours frappé, toujours revêtus d’un appui-tête au crochet ; et le feu cuisant comme une pâte les appétissantes odeurs dont l’air de la chambre était tout grumeleux et qu’avait déjà fait travailler et « lever » la fraîcheur humide et ensoleillée du matin, il les feuilletait, les dorait, les godait, les boursouflait, en faisant un invisible et palpable gâteau provincial, un immense « chausson » où, à peine goûtés les arômes plus croustillants, plus fins, plus réputés, mais plus secs aussi du placard, de la commode, du papier à ramages, je revenais toujours avec une convoitise inavouée m’engluer dans l’odeur médiane, poisseuse, fade, indigeste et fruitée du couvre-lit à fleurs.", "en": "The air there was saturated with the fine flower of a silence so nourishing, so succulent that I only approached it with a sort of greed, especially on those first still cold mornings of Easter week when I tasted it better because I had only just arrived in Combray: before I went in to say hello to my aunt I was made to wait for a moment in the first room where the sun, still winter, had come to warm itself in front of the fire, already lit between the two bricks and which coated the whole room with a smell of soot, made it like one of those large country “oven fronts”, or those castle chimney breasts, under which one wishes the rain, the snow, even some torrential catastrophe to break out outside to add to the comfort of seclusion the poetry of wintering; I took a few steps from the prie-dieu to the crushed velvet armchairs, always covered with a crocheted headrest; and the fire cooking like a dough the appetizing smells of which the air in the room was all lumpy and which had already been made to work and \"leave\" the humid and sunny freshness of the morning, he leafed through them, browned them, diluted them, blistered them, making an invisible and palpable provincial cake, an immense \"slipper\" where, barely tasted the crisper, finer, more famous, but also drier aromas of the cupboard, of the chest of drawers, flowered paper, I always came back with an unacknowledged desire to get stuck in the central, sticky, bland, indigestible and fruity odor of the flowered bedspread."}, {"start": 296.8, "end": 301.79, "b_start": 601.57, "b_end": 612.74, "orig": "Dans la chambre voisine, j’entendais ma tante qui causait toute seule à mi-voix.", "en": "In the next room, I heard my aunt talking to herself in a low voice."}, {"start": 302.79, "end": 341.38, "b_start": 612.74, "b_end": 695.22, "orig": "Elle ne parlait jamais qu’assez bas parce qu’elle croyait avoir dans la tête quelque chose de cassé et de flottant qu’elle eût déplacé en parlant trop fort, mais elle ne restait jamais longtemps, même seule, sans dire quelque chose, parce qu’elle croyait que c’était salutaire pour sa gorge et qu’en empêchant le sang de s’y arrêter, cela rendrait moins fréquents les étouffements et les angoisses dont elle souffrait ; puis, dans l’inertie absolue où elle vivait, elle prêtait à ses moindres sensations une importance extraordinaire ; elle les douait d’une motilité qui lui rendait difficile de les garder pour elle, et à défaut de confident à qui les communiquer, elle se les annonçait à elle-même, en un perpétuel monologue qui était sa seule forme d’activité.", "en": "She never spoke more than quite quietly because she believed she had something broken and floating in her head which she had moved by speaking too loudly, but she never stayed long, even alone, without saying something, because she believed that it was beneficial for her throat and that by preventing the blood from stopping there, it would make the choking and anguish from which she suffered less frequent; then, in the absolute inertia in which she lived, she attached extraordinary importance to her slightest sensations; she endowed them with a motility which made it difficult for her to keep them to herself, and in the absence of a confidant to whom to communicate them, she announced them to herself, in a perpetual monologue which was her only form of activity."}, {"start": 342.38, "end": 379.08, "b_start": 695.22, "b_end": 770.18, "orig": "Malheureusement, ayant pris l’habitude de penser tout haut, elle ne faisait pas toujours attention à ce qu’il n’y eût personne dans la chambre voisine, et je l’entendais souvent se dire à elle-même : « Il faut que je me rappelle bien que je n’ai pas dormi » (car ne jamais dormir était sa grande prétention dont notre langage à tous gardait le respect et la trace : le matin Françoise ne venait pas « l’éveiller », mais « entrait » chez elle ; quand ma tante voulait faire un somme dans la journée, on disait qu’elle voulait « réfléchir » ou « reposer » ; et quand il lui arrivait de s’oublier en causant jusqu’à dire : « ce qui m’a réveillée » ou « j’ai rêvé que », elle rougissait et se reprenait au plus vite).", "en": "Unfortunately, having gotten into the habit of thinking out loud, she did not always pay attention to the fact that there was no one in the next room, and I often heard her say to herself: \"I must remember that I did not sleep\" (because never to sleep was her great claim of which our language all kept respect and trace: in the morning Françoise did not come to \"wake her up\", but \"entered\" her house; when my aunt wanted to take a nap in during the day, it was said that she wanted to “think” or “rest” and when she happened to forget herself while talking to the point of saying: “what woke me up” or “I dreamed that”, she would blush and compose herself as quickly as possible)."}, {"start": 380.08, "end": 396.66, "b_start": 770.18, "b_end": 805.52, "orig": "Au bout d’un moment, j’entrais l’embrasser ; Françoise faisait infuser son thé ; ou, si ma tante se sentait agitée, elle demandait à la place sa tisane, et c’était moi qui étais chargé de faire tomber du sac de pharmacie dans une assiette la quantité de tilleul qu’il fallait mettre ensuite dans l’eau bouillante.", "en": "After a while, I went in to kiss him; Françoise was brewing her tea; or, if my aunt felt agitated, she would ask for her herbal tea instead, and it was I who was responsible for dropping from the pharmacy bag onto a plate the quantity of lime which then had to be put in the boiling water."}, {"start": 397.66, "end": 408.92, "b_start": 805.52, "b_end": 829.78, "orig": "Le desséchement des tiges les avait incurvées en un capricieux treillage dans les entrelacs duquel s’ouvraient les fleurs pâles, comme si un peintre les eût arrangées, les eût fait poser de la façon la plus ornementale.", "en": "The drying out of the stems had curved them into a capricious trellis in the interlacing of which the pale flowers opened, as if a painter had arranged them, had placed them in the most ornamental way."}, {"start": 409.92, "end": 425.02, "b_start": 829.78, "b_end": 860.32, "orig": "Les feuilles, ayant perdu ou changé leur aspect, avaient l’air des choses les plus disparates, d’une aile transparente de mouche, de l’envers blanc d’une étiquette, d’un pétale de rose, mais qui eussent été empilées, concassées ou tressées comme dans la confection d’un nid.", "en": "The leaves, having lost or changed their appearance, looked like the most disparate things, like the transparent wing of a fly, the white back of a label, a rose petal, but which had been piled up, crushed or woven as if making a nest."}, {"start": 426.02, "end": 447.81, "b_start": 860.32, "b_end": 908.42, "orig": "Mille petits détails inutiles – charmante prodigalité du pharmacien – qu’on eût supprimés dans une préparation factice, me donnaient, comme un livre où on s’émerveille de rencontrer le nom d’une personne de connaissance, le plaisir de comprendre que c’était bien des tiges de vrais tilleuls, comme ceux que je voyais avenue de la Gare, modifiées, justement parce que c’étaient non des doubles, mais elles-mêmes et qu’elles avaient vieilli.", "en": "A thousand little useless details – charming lavishness of the pharmacist – which would have been removed in an artificial preparation, gave me, like a book in which one is amazed to encounter the name of a person I know, the pleasure of understanding that these were indeed the stems of real lime trees, like those I saw on avenue de la Gare, modified, precisely because they were not doubles, but themselves and that they had aged."}, {"start": 448.81, "end": 481.45, "b_start": 908.42, "b_end": 976.91, "orig": "Et chaque caractère nouveau n’y étant que la métamorphose d’un caractère ancien, dans de petites boules grises je reconnaissais les boutons verts qui ne sont pas venus à terme ; mais surtout l’éclat rose, lunaire et doux qui faisait se détacher les fleurs dans la forêt fragile des tiges où elles étaient suspendues comme de petites roses d’or – signe, comme la lueur qui révèle encore sur une muraille la place d’une fresque effacée, de la différence entre les parties de l’arbre qui avaient été « en couleur » et celles qui ne l’avaient pas été – me montrait que ces pétales étaient bien ceux qui avant de fleurir le sac de pharmacie avaient embaumé les soirs de printemps.", "en": "And each new character being only the metamorphosis of an old character, in small gray balls I recognized the green buds which did not come to fruition; but above all the pink, lunar and soft glow which made the flowers stand out in the fragile forest of the stems where they were suspended like little golden roses - a sign, like the glow which still reveals on a wall the place of a faded fresco, of the difference between the parts of the tree which had been \"in color\" and those which had not - showed me that these petals were indeed those which, before flowering, the pharmacy bag had embalmed the spring evenings."}, {"start": 482.45, "end": 492.22, "b_start": 976.91, "b_end": 997.44, "orig": "Cette flamme rose de cierge, c’était leur couleur encore, mais à demi éteinte et assoupie dans cette vie diminuée qu’était la leur maintenant et qui est comme le crépuscule des fleurs.", "en": "This pink candle flame was still their color, but half-extinguished and dormant in this diminished life that was theirs now and which is like the twilight of flowers."}, {"start": 493.22, "end": 503.37, "b_start": 997.44, "b_end": 1020.44, "orig": "Bientôt ma tante pouvait tremper dans l’infusion bouillante dont elle savourait le goût de feuille morte ou de fleur fanée une petite madeleine dont elle me tendait un morceau quand il était suffisamment amolli.", "en": "Soon my aunt was able to dip a small madeleine into the boiling infusion of which she savored the taste of dead leaves or faded flowers, a piece of which she handed me when it was sufficiently softened."}, {"start": 504.37, "end": 525.2, "b_start": 1020.44, "b_end": 1064.69, "orig": "D’un côté de son lit était une grande commode jaune en bois de citronnier et une table qui tenait à la fois de l’officine et du maître-autel, où, au-dessus d’une statuette de la Vierge et d’une bouteille de Vichy-Célestins, on trouvait des livres de messe et des ordonnances de médicaments, tous ce qu’il fallait pour suivre de son lit les offices et son régime, pour ne manquer l’heure ni de la pepsine, ni des Vêpres.", "en": "On one side of his bed was a large yellow chest of drawers made of lemon wood and a table which served as both the counter and the high altar, where, above a statuette of the Virgin and a bottle of Vichy-Célestins, there were mass books and prescriptions for medicines, everything needed to follow the services and his diet from his bed, so as not to miss the time for pepsin or Vespers."}, {"start": 526.2, "end": 540.6, "b_start": 1064.69, "b_end": 1096.67, "orig": "De l’autre côté, son lit longeait la fenêtre, elle avait la rue sous les yeux et y lisait du matin au soir, pour se désennuyer, à la façon des princes persans, la chronique quotidienne mais immémoriale de Combray, qu’elle commentait ensuite avec Françoise.", "en": "On the other side, her bed ran alongside the window, she had the street before her eyes and read there from morning to evening, to relieve herself of boredom, like Persian princes, the daily but immemorial chronicle of Combray, which she then commented on with Françoise."}, {"start": 541.6, "end": 547.46, "b_start": 1096.67, "b_end": 1110.26, "orig": "Je n’étais pas avec ma tante depuis cinq minutes, qu’elle me renvoyait par peur que je la fatigue.", "en": "I hadn't been with my aunt for five minutes, and she sent me away for fear that I would tire her out."}, {"start": 548.46, "end": 583.06, "b_start": 1110.26, "b_end": 1182.49, "orig": "Elle tendait à mes lèvres son triste front pâle et fade sur lequel, à cette heure matinale, elle n’avait pas encore arrangé ses faux cheveux, et où les vertèbres transparaissaient comme les pointes d’une couronne d’épines ou les grains d’un rosaire, et elle me disait : « Allons, mon pauvre enfant, va-t’en, va te préparer pour la messe ; et si en bas tu rencontres Françoise, dis-lui de ne pas s’amuser trop longtemps avec vous, qu’elle monte bientôt voir si je n’ai besoin de rien. »\nFrançoise, en effet, qui était depuis des années à son service et ne se doutait pas alors qu’elle entrerait un jour tout à fait au nôtre, délaissait un peu ma tante pendant les mois où nous étions là.", "en": "She held up to my lips her sad, pale and faded forehead on which, at this early hour, she had not yet arranged her false hair, and where the vertebrae showed through like the points of a crown of thorns or the beads of a rosary, and she said to me: “Come, my poor child, go away, go and prepare for mass; and if you meet Françoise downstairs, tell her not to have fun with you for too long, she can come up soon to see if I need anything. » Françoise, in fact, who had been in her service for years and did not suspect at the time that she would one day join ours, neglected my aunt a little during the months we were there."}, {"start": 584.06, "end": 604.56, "b_start": 1182.49, "b_end": 1223.62, "orig": "Il y avait eu dans mon enfance, avant que nous allions à Combray, quand ma tante Léonie passait encore l’hiver à Paris chez sa mère, un temps où je connaissais si peu Françoise que, le 1\ner\njanvier, avant d’entrer chez ma grand’tante, ma mère me mettait dans la main une pièce de cinq francs et me disait : « Surtout ne te trompe pas de personne.", "en": "In my childhood, before we went to Combray, when my aunt Léonie was still spending the winter in Paris with her mother, there was a time when I knew Françoise so little that, on January 1, before entering my great-aunt's house, my mother put a five-franc piece in my hand and said to me: “Above all, don't get the wrong person."}, {"start": 605.56, "end": 625.1, "b_start": 1223.62, "b_end": 1264.64, "orig": "Attends pour donner que tu m’entendes dire : « Bonjour Françoise » ; en même temps je te toucherai légèrement le bras. » À peine arrivions-nous dans l’obscure antichambre de ma tante que nous apercevions dans l’ombre, sous les tuyaux d’un bonnet éblouissant, raide et fragile comme s’il avait été de sucre filé, les remous concentriques d’un sourire de reconnaissance anticipé.", "en": "Wait until you hear me say: “Hello Françoise”; at the same time I will lightly touch your arm. » We had barely arrived in my aunt's dark anteroom when we saw in the shadows, under the pipes of a dazzling bonnet, stiff and fragile as if it had been made of spun sugar, the concentric swirls of an anticipated smile of recognition."}, {"start": 626.1, "end": 633.32, "b_start": 1264.64, "b_end": 1281.12, "orig": "C’était Françoise, immobile et debout dans l’encadrement de la petite porte du corridor comme une statue de sainte dans sa niche.", "en": "It was Françoise, motionless and standing in the frame of the little door to the corridor like a statue of a saint in its niche."}, {"start": 634.32, "end": 646.85, "b_start": 1281.12, "b_end": 1309.09, "orig": "Quand on était un peu habitué à ces ténèbres de chapelle, on distinguait sur son visage l’amour désintéressé de l’humanité, le respect attendri pour les hautes classes qu’exaltait dans les meilleures régions de son cœur l’espoir des étrennes.", "en": "When one was a little accustomed to this darkness of the chapel, one could distinguish on his face the disinterested love of humanity, the tender respect for the upper classes that was exalted in the best regions of one's heart by the hope of New Years."}, {"start": 647.85, "end": 659.46, "b_start": 1309.09, "b_end": 1334.4, "orig": "Maman me pinçait le bras avec violence et disait d’une voix forte : « Bonjour Françoise. » À ce signal mes doigts s’ouvraient et je lâchais la pièce qui trouvait pour la recevoir une main confuse, mais tendue.", "en": "Mom pinched my arm violently and said in a loud voice: “Hello Françoise. » At this signal my fingers opened and I released the piece which found a confused but outstretched hand to receive it."}, {"start": 660.46, "end": 686.72, "b_start": 1334.4, "b_end": 1387.74, "orig": "Mais depuis que nous allions à Combray je ne connaissais personne mieux que Françoise ; nous étions ses préférés, elle avait pour nous, au moins pendant les premières années, avec autant de considération que pour ma tante, un goût plus vif, parce que nous ajoutions, au prestige de faire partie de la famille (elle avait pour les liens invisibles que noue entre les membres d’une famille la circulation d’un même sang, autant de respect qu’un tragique grec), le charme de n’être pas ses maîtres habituels.", "en": "But since we went to Combray I knew no one better than Françoise; we were her favorites, she had for us, at least during the first years, with as much consideration as for my aunt, a keener taste, because we added, to the prestige of being part of the family (she had as much respect for the invisible links that the circulation of the same blood creates between members of a family as a Greek tragedy), the charm of not being her usual masters."}, {"start": 687.72, "end": 706.2, "b_start": 1387.74, "b_end": 1425.89, "orig": "Aussi, avec quelle joie elle nous recevait, nous plaignant de n’avoir pas encore plus beau temps, le jour de notre arrivée, la veille de Pâques, où souvent il faisait un vent glacial, quand maman lui demandait des nouvelles de sa fille et de ses neveux, si son petit-fils était gentil, ce qu’on comptait faire de lui, s’il ressemblerait à sa grand’mère.", "en": "Also, with what joy she received us, complaining about not having even better weather, the day of our arrival, the day before Easter, when it was often freezing wind, when mother asked her about her daughter and her nephews, if her grandson was nice, what we planned to do with him, if he would be like his grandmother."}, {"start": 707.2, "end": 718.31, "b_start": 1425.89, "b_end": 1450.79, "orig": "Et quand il n’y avait plus de monde là, maman qui savait que Françoise pleurait encore ses parents morts depuis des années, lui parlait d’eux avec douceur, lui demandait mille détails sur ce qu’avait été leur vie.", "en": "And when there were no more people there, mother, who knew that Françoise was still mourning her parents who had died for years, spoke to her gently about them, asked her a thousand details about what their lives had been like."}, {"start": 719.31, "end": 728.62, "b_start": 1450.79, "b_end": 1471.2, "orig": "Elle avait deviné que Françoise n’aimait pas son gendre et qu’il lui gâtait le plaisir qu’elle avait à être avec sa fille, avec qui elle ne causait pas aussi librement quand il était là.", "en": "She had guessed that Françoise did not like her son-in-law and that he spoiled the pleasure she had in being with her daughter, with whom she did not talk as freely when he was there."}, {"start": 729.62, "end": 778.49, "b_start": 1471.2, "b_end": 1554.01, "orig": "Aussi, quand Françoise allait les voir, à quelques lieues de Combray, maman lui disait en souriant : « N’est-ce pas Françoise, si Julien a été obligé de s’absenter et si vous avez Marguerite à vous toute seule pour toute la journée, vous serez désolée, mais vous vous ferez une raison ? » Et Françoise disait en riant : « Madame sait tout ; madame est pire que les rayons X (elle disait x avec une difficulté affectée et un sourire pour se railler elle-même, ignorante, d’employer ce terme savant), qu’on a fait venir pour M\nme\nOctave et qui voient ce que vous avez dans le cœur », et disparaissait, confuse qu’on s’occupât d’elle, peut-être pour qu’on ne la vît pas pleurer ; maman était la première personne qui lui donnât cette douce émotion de sentir que sa vie, ses bonheurs, ses chagrins de paysanne pouvaient présenter de l’intérêt, être un motif de joie ou de tristesse pour une autre qu’elle-même.", "en": "So, when Françoise went to see them, a few leagues from Combray, mother said to her with a smile: “Isn’t it Françoise, if Julien was forced to be absent and if you have Marguerite all to yourself for the whole day, you will be sorry, but you will make up your mind? » And Françoise said, laughing: “Madame knows everything; madame is worse than the x-rays (she said mother was the first person who gave her this sweet emotion of feeling that her life, her happiness, her peasant sorrows could be of interest, be a reason for joy or sadness for someone other than herself."}, {"start": 779.49, "end": 842.08, "b_start": 1554.01, "b_end": 1684.94, "orig": "Ma tante se résignait à se priver un peu d’elle pendant notre séjour, sachant combien ma mère appréciait le service de cette bonne si intelligente et active, qui était aussi belle dès cinq heures du matin dans sa cuisine, sous son bonnet dont le tuyautage éclatant et fixe avait l’air d’être en biscuit, que pour aller à la grand’messe ; qui faisait tout bien, travaillant comme un cheval, qu’elle fût bien portante ou non, mais sans bruit, sans avoir l’air de rien faire, la seule des bonnes de ma tante qui, quand maman demandait de l’eau chaude ou du café noir, les apportait vraiment bouillants ; elle était un de ces serviteurs qui, dans une maison, sont à la fois ceux qui déplaisent le plus au premier abord à un étranger, peut-être parce qu’ils ne prennent pas la peine de faire sa conquête et n’ont pas pour lui de prévenance, sachant très bien qu’ils n’ont aucun besoin de lui, qu’on cesserait de le recevoir plutôt que de les renvoyer ; et qui sont en revanche ceux à qui tiennent le plus les maîtres qui ont éprouvé leur capacités réelles, et ne se soucient pas de cet agrément superficiel, de ce bavardage servile qui fait favorablement impression à un visiteur, mais qui recouvre souvent une inéducable nullité.", "en": "My aunt resigned herself to depriving herself a little of her during our stay, knowing how much my mother appreciated the service of this maid who was so intelligent and active, who was as beautiful from five o'clock in the morning in her kitchen, under her cap whose bright and fixed piping looked like it was made of biscuit, as when going to high mass; who did everything well, working like a horse, whether she was well or not, but without noise, without seeming to do anything, the only one of my aunt's maids who, when mother asked for hot water or black coffee, brought them really hot; she was one of those servants who, in a house, are at the same time those who most displease a stranger at first glance, perhaps because they do not take the trouble to win him over and do not show him any consideration, knowing very well that they have no need of him, that one would stop receiving him rather than send them away; and who, on the other hand, are those who care most about the masters who have tested their real abilities, and who do not care about this superficial pleasure, this servile chatter which makes a favorable impression on a visitor, but which often conceals an ineducable nullity."}, {"start": 843.08, "end": 890.48, "b_start": 1684.94, "b_end": 1779.76, "orig": "Quand Françoise, après avoir veillé à ce que mes parents eussent tout ce qu’il leur fallait, remontait une première fois chez ma tante pour lui donner sa pepsine et lui demander ce qu’elle prendrait pour déjeuner, il était bien rare qu’il ne fallût pas donner déjà son avis ou fournir des explications sur quelque événement d’importance :\n– Françoise, imaginez-vous que M\nme\nGoupil est passée plus d’un quart d’heure en retard pour aller chercher sa sœur ; pour peu qu’elle s’attarde sur son chemin cela ne me surprendrait point qu’elle arrive après l’élévation.\n– Hé ! il n’y aurait rien d’étonnant, répondait Françoise.\n– Françoise, vous seriez venue cinq minutes plus tôt, vous auriez vu passer M\nme\nImbert qui tenait des asperges deux fois grosses comme celles de la mère Callot ; tâchez donc de savoir par sa bonne où elle les a eues.", "en": "When Françoise, after having ensured that my parents had everything they needed, went back to my aunt for the first time to give her her pepsin and ask her what she would have for lunch, it was very rare that she did not already have to give her opinion or provide explanations on some important event: – Françoise, can you imagine that Madame Goupil came more than a quarter of an hour late to pick up her sister; as long as she lingers on her way it would not surprise me if she arrived after the elevation. - Hey ! there would be nothing surprising, replied Françoise. – Françoise, you would have come five minutes earlier, you would have seen Madame Imbert pass by holding asparagus twice as big as Mother Callot’s; So try to find out from her maid where she got them."}, {"start": 891.48, "end": 910.13, "b_start": 1779.76, "b_end": 1819.39, "orig": "Vous qui, cette année, nous mettez des asperges à toutes les sauces, vous auriez pu en prendre de pareilles pour nos voyageurs.\n– Il n’y aurait rien d’étonnant qu’elles viennent de chez M. le Curé, disait Françoise.\n– Ah ! je vous crois bien, ma pauvre Françoise, répondait ma tante en haussant les épaules.", "en": "You who, this year, are giving us asparagus in every sauce, you could have taken similar ones for our travelers. – There would be nothing surprising if they came from M. le Curé, said Françoise. – Oh! I believe you, my poor Françoise, replied my aunt, shrugging her shoulders."}, {"start": 911.13, "end": 920.56, "b_start": 1819.39, "b_end": 1840.67, "orig": "Chez M. le Curé ! Vous savez bien qu’il ne fait pousser que de petites méchantes asperges de rien. Je vous dis que celles-là étaient grosses comme le bras.", "en": "At M. le Curé’s! You know very well that he only grows little nasty asparagus of nothing. I tell you that those were as big as your arm."}, {"start": 921.56, "end": 941.58, "b_start": 1840.67, "b_end": 1880.81, "orig": "Pas comme le vôtre, bien sûr, mais comme mon pauvre bras qui a encore tant maigri cette année.\n– Françoise, vous n’avez pas entendu ce carillon qui m’a cassé la tête ?\n– Non, madame Octave.\n– Ah ! ma pauvre fille, il faut que vous l’ayez solide votre tête, vous pouvez remercier le Bon Dieu.", "en": "Not like yours, of course, but like my poor arm which has lost so much weight again this year. – Françoise, didn’t you hear that chime that broke my head? – No, Madame Octave. – Oh! my poor girl, you must have a strong head, you can thank the good Lord."}, {"start": 942.58, "end": 950.81, "b_start": 1880.81, "b_end": 1898.65, "orig": "C’était la Maguelone qui était venue chercher le docteur Piperaud. Il est ressorti tout de suite avec elle et ils ont tourné par la rue de l’Oiseau.", "en": "It was Maguelone who had come to get Doctor Piperaud. He went out straight away with her and they turned towards Rue de l’Oiseau."}, {"start": 951.81, "end": 970.41, "b_start": 1898.65, "b_end": 1935.91, "orig": "Il faut qu’il y ait quelque enfant de malade.\n– Eh ! là, mon Dieu, soupirait Françoise, qui ne pouvait pas entendre parler d’un malheur arrivé à un inconnu, même dans une partie du monde éloignée, sans commencer à gémir.\n– Françoise, mais pour qui donc a-t-on sonné la cloche des morts ?", "en": "There must be some sick child. – Hey! there, my God, sighed Françoise, who could not hear of a misfortune happening to a stranger, even in a distant part of the world, without beginning to groan. – Françoise, but for whom did we ring the death bell?"}, {"start": 971.41, "end": 989.17, "b_start": 1935.91, "b_end": 1971.76, "orig": "Ah ! mon Dieu, ce sera pour M\nme\nRousseau. Voilà-t-il pas que j’avais oublié qu’elle a passé l’autre nuit. Ah ! il est temps que le Bon Dieu me rappelle, je ne sais plus ce que j’ai fait de ma tête depuis la mort de mon pauvre Octave.", "en": "Ah! my God, it will be for Madame Rousseau. I hadn't forgotten that she was there the other night. Ah! It is time for the Good Lord to call me back, I no longer know what I have done with my head since the death of my poor Octave."}, {"start": 990.17, "end": 1002.46, "b_start": 1971.76, "b_end": 1998.05, "orig": "Mais je vous fais perdre votre temps, ma fille.\n– Mais non, madame Octave, mon temps n’est pas si cher ; celui qui l’a fait ne nous l’a pas vendu. Je vas seulement voir si mon feu ne s’éteint pas.", "en": "But I'm wasting your time, girl. – But no, Madame Octave, my time is not that expensive; whoever made it didn’t sell it to us. I'm just going to see if my fire doesn't go out."}, {"start": 1003.46, "end": 1010.1, "b_start": 1998.05, "b_end": 2012.8, "orig": "Ainsi Françoise et ma tante appréciaient-elles ensemble au cours de cette séance matinale, les premiers événements du jour.", "en": "Thus Françoise and my aunt appreciated together during this morning session, the first events of the day."}, {"start": 1011.1, "end": 1028.38, "b_start": 2012.8, "b_end": 2048.88, "orig": "Mais quelquefois ces événements revêtaient un caractère si mystérieux et si grave que ma tante sentait qu’elle ne pourrait pas attendre le moment où Françoise monterait, et quatre coups de sonnette formidables retentissaient dans la maison.\n– Mais, madame Octave, ce n’est pas encore l’heure de la pepsine, disait Françoise.", "en": "But sometimes these events took on such a mysterious and serious character that my aunt felt that she could not wait for the moment when Françoise would come up, and four tremendous rings of the bell would ring through the house. “But, Madame Octave, it’s not yet time for pepsin,” said Françoise."}, {"start": 1029.38, "end": 1048.82, "b_start": 2048.88, "b_end": 2086.88, "orig": "Est-ce que vous vous êtes senti une faiblesse ?\n– Mais non, Françoise, disait ma tante, c’est-à-dire, si, vous savez bien que maintenant les moments où je n’ai pas de faiblesse sont bien rares ; un jour je passerai comme M\nme\nRousseau sans avoir eu le temps de me reconnaître ; mais ce n’est pas pour cela que je sonne.", "en": "Did you feel weak? – But no, Françoise, said my aunt, that is to say, yes, you know very well that now the moments when I do not have weakness are very rare; one day I will pass like Madame Rousseau without having had time to recognize myself; but that’s not why I’m ringing."}, {"start": 1049.82, "end": 1066.55, "b_start": 2086.88, "b_end": 2120.02, "orig": "Croyez-vous pas que je viens de voir comme je vous vois M\nme\nGoupil avec une fillette que je ne connais point. Allez donc chercher deux sous de sel chez Camus. C’est bien rare si Théodore ne peut pas vous dire qui c’est.\n– Mais ça sera la fille de M.", "en": "Don't you believe that I just saw Ms Goupil as I see you with a little girl I don't know. So go get two pennies worth of salt from Camus. It's very rare if Théodore can't tell you who it is. –But it will be M.’s daughter."}, {"start": 1067.55, "end": 1082.24, "b_start": 2120.02, "b_end": 2151.85, "orig": "Pupin, disait Françoise qui préférait s’en tenir à une explication immédiate, ayant été déjà deux fois depuis le matin chez Camus.\n– La fille de M. Pupin ! Oh ! je vous crois bien, ma pauvre Françoise !", "en": "Pupin, said Françoise, who preferred to stick to an immediate explanation, having already been to Camus' house twice since the morning. – Mr. Pupin’s daughter! Oh ! I really believe you, my poor Françoise!"}, {"start": 1083.24, "end": 1104.48, "b_start": 2151.85, "b_end": 2194.85, "orig": "Avec cela que je ne l’aurais pas reconnue ?\n– Mais je ne veux pas dire la grande, madame Octave, je veux dire la gamine, celle qui est en pension à Jouy. Il me ressemble de l’avoir déjà vue ce matin.\n– Ah ! à moins de ça, disait ma tante. Il faudrait qu’elle soit venue pour les fêtes. C’est cela !", "en": "Why wouldn't I have recognized her? – But I don’t mean the big one, Madame Octave, I mean the kid, the one who is in boarding school in Jouy. It looks like I already saw her this morning. – Oh! unless that, my aunt said. She should have come for the holidays. That’s it!"}, {"start": 1105.48, "end": 1123.22, "b_start": 2194.85, "b_end": 2228.82, "orig": "Il n’y a pas besoin de chercher, elle sera venue pour les fêtes. Mais alors nous pourrions bien voir tout à l’heure M\nme\nSazerat venir sonner chez sa sœur pour le déjeuner. Ce sera ça ! J’ai vu le petit de chez Galopin qui passait avec une tarte !", "en": "There's no need to look, she'll be here for the holidays. But then we might well see Ms. Sazerat coming to her sister's doorbell for lunch later. This will be it! I saw the kid from Galopin passing by with a pie!"}, {"start": 1124.22, "end": 1170.25, "b_start": 2228.82, "b_end": 2316.24, "orig": "Vous verrez que la tarte allait chez M\nme\nGoupil.\n– Dès l’instant que M\nme\nGoupil a de la visite, madame Octave, vous n’allez pas tarder à voir tout son monde rentrer pour le déjeuner, car il commence à ne plus être de bonne heure, disait Françoise qui, pressée de redescendre s’occuper du déjeuner, n’était pas fâchée de laisser à ma tante cette distraction en perspective.\n– Oh ! pas avant midi, répondait ma tante d’un ton résigné, tout en jetant sur la pendule un coup d’œil inquiet, mais furtif pour ne pas laisser voir qu’elle, qui avait renoncé à tout, trouvait pourtant, à apprendre que M\nme\nGoupil avait à déjeuner, un plaisir aussi vif, et qui se ferait malheureusement attendre encore un peu plus d’une heure.", "en": "You will see that the pie went to Ms. Goupil. “As soon as Mme Goupil has a visitor, Madame Octave, it won't be long before you see everyone coming home for lunch, because it's starting to get out of time,” said Françoise, who, in a hurry to go back downstairs to take care of lunch, was not sorry to leave my aunt with this distraction in perspective. - Oh ! not before noon, replied my aunt in a resigned tone, while casting a worried glance at the clock, but furtively so as not to show that she, who had given up everything, nevertheless found learning that Mme Goupil had lunch such a keen pleasure, and which would unfortunately make her wait a little more than an hour."}, {"start": 1171.25, "end": 1177.1, "b_start": 2316.24, "b_end": 2329.52, "orig": "Et encore cela tombera pendant mon déjeuner ! ajouta-t-elle à mi-voix pour elle-même.", "en": "And again it will fall during my lunch! she added in a low voice to herself."}, {"start": 1178.1, "end": 1195.34, "b_start": 2329.52, "b_end": 2365.78, "orig": "Son déjeuner lui était une distraction suffisante pour qu’elle n’en souhaitât pas une autre en même temps. « Vous n’oublierez pas au moins de me donner mes œufs à la crème dans une assiette plate ? » C’étaient les seules qui fussent ornées de sujets, et ma tante s’amusait à chaque repas à lire la légende de celle qu’on lui servait ce jour-là.", "en": "Her lunch was enough of a distraction that she didn't want another at the same time. “Won’t you at least forget to give me my creme eggs on a flat plate? » These were the only ones which were decorated with subjects, and my aunt had fun at each meal reading the legend of the one served to her that day."}, {"start": 1196.34, "end": 1217.58, "b_start": 2365.78, "b_end": 2408.39, "orig": "Elle mettait ses lunettes, déchiffrait : Alibaba et quarante voleurs, Aladin ou la Lampe merveilleuse, et disait en souriant : Très bien, très bien.\n– Je serais bien allée chez Camus... disait Françoise en voyant que ma tante ne l’y enverrait plus.\n– Mais non, ce n’est plus la peine, c’est sûrement M\nlle\nPupin.", "en": "She put on her glasses, deciphered: Alibaba and forty thieves, Aladdin or the Wonderful Lamp, and said with a smile: Very good, very good. – I would have liked to go to Camus… said Françoise when she saw that my aunt would no longer send her there. – But no, there’s no point, it’s probably M lle Pupin."}, {"start": 1218.58, "end": 1223.33, "b_start": 2408.39, "b_end": 2419.42, "orig": "Ma pauvre Françoise, je regrette de vous avoir fait monter pour rien.", "en": "My poor Françoise, I regret having sent you upstairs for nothing."}, {"start": 1224.33, "end": 1257.26, "b_start": 2419.42, "b_end": 2486.39, "orig": "Mais ma tante savait bien que ce n’était pas pour rien qu’elle avait sonné Françoise, car, à Combray, une personne « qu’on ne connaissait point » était un être aussi peu croyable qu’un dieu de la mythologie, et de fait on ne se souvenait pas que, chaque fois que s’était produite, dans la rue de Saint-Esprit ou sur la place, une de ces apparitions stupéfiantes, des recherches bien conduites n’eussent pas fini par réduire le personnage fabuleux aux proportions d’une « personne qu’on connaissait », soit personnellement, soit abstraitement, dans son état civil, en tant qu’ayant tel degré de parenté avec des gens de Combray.", "en": "But my aunt knew well that it was not for nothing that she had rung Françoise, because, in Combray, a person \"whom we did not know\" was a being as unbelievable as a god of mythology, and in fact we did not remember that, each time one of these astonishing apparitions had occurred, in the rue de Saint-Esprit or on the square, well-conducted research would not have ended up reducing the fabulous character to the proportions of a “person known”, either personally or abstractly, in their civil status, as having such a degree of kinship with people from Combray."}, {"start": 1258.26, "end": 1272.44, "b_start": 2486.39, "b_end": 2514.89, "orig": "C’était le fils de M\nme\nSauton qui rentrait du service, la nièce de l’abbé Perdreau qui sortait de couvent, le frère du curé, percepteur à Châteaudun qui venait de prendre sa retraite ou qui était venu passer les fêtes.", "en": "It was Madame Sauton's son who was returning from service, Father Perdreau's niece who was leaving a convent, the priest's brother, a tax collector at Châteaudun who had just retired or who had come to spend the holidays."}, {"start": 1273.44, "end": 1282.42, "b_start": 2514.89, "b_end": 2534.63, "orig": "On avait eu en les apercevant l’émotion de croire qu’il y avait à Combray des gens qu’on ne connaissait point simplement parce qu’on ne les avait pas reconnus ou identifiés tout de suite.", "en": "When we saw them, we had the emotion of believing that there were people in Combray that we didn't know simply because we hadn't recognized or identified them right away."}, {"start": 1283.42, "end": 1292.54, "b_start": 2534.63, "b_end": 2551.99, "orig": "Et pourtant, longtemps à l’avance, M\nme\nSauton et le curé avaient prévenu qu’ils attendaient leurs « voyageurs ».", "en": "And yet, well in advance, Ms. Sauton and the priest had warned that they were expecting their “travelers”."}, {"start": 1293.54, "end": 1308.15, "b_start": 2551.99, "b_end": 2582.46, "orig": "Quand le soir, je montais, en rentrant, raconter notre promenade à ma tante, si j’avais l’imprudence de lui dire que nous avions rencontré près du Pont-Vieux, un homme que mon grand-père ne connaissait pas : « Un homme que grand-père ne connaissait point, s’écriait-elle.", "en": "When in the evening, when I came home, I would go upstairs and tell my aunt about our walk, if I had the imprudence to tell her that we had met near the Pont-Vieux, a man that my grandfather did not know: “A man that grandfather did not know,” she cried."}, {"start": 1309.15, "end": 1351.3, "b_start": 2582.46, "b_end": 2663.95, "orig": "Ah ! je te crois bien ! » Néanmoins un peu émue de cette nouvelle, elle voulait en avoir le cœur net, mon grand-père était mandé. « Qui donc est-ce que vous avez rencontré près du Pont-Vieux, mon oncle ? un homme que vous ne connaissiez point ? » – « Mais si, répondait mon grand-père, c’était Prosper le frère du jardinier de M\nme\nBouillebœuf. » – « Ah ! bien », disait ma tante, tranquillisée et un peu rouge ; haussant les épaules avec un sourire ironique, elle ajoutait : « Aussi il me disait que vous aviez rencontré un homme que vous ne connaissiez point ! » Et on me recommandait d’être plus circonspect une autre fois et de ne plus agiter ainsi ma tante par des paroles irréfléchies.", "en": "Ah! I believe you! » Nevertheless, a little moved by this news, she wanted to be sure, my grandfather was summoned. “Who did you meet near the Pont-Vieux, uncle? a man you didn’t know? » – “But yes,” replied my grandfather, “it was Prosper, the brother of Madame Bouilleboeuf’s gardener. » – “Ah! good,” said my aunt, calmed and a little red; shrugging her shoulders with an ironic smile, she added: “He also told me that you had met a man you didn’t know! » And I was advised to be more circumspect another time and not to agitate my aunt again with thoughtless words."}, {"start": 1352.3, "end": 1392.21, "b_start": 2663.95, "b_end": 2741.24, "orig": "On connaissait tellement bien tout le monde, à Combray, bêtes et gens, que si ma tante avait vu par hasard passer un chien « qu’elle ne connaissait point », elle ne cessait d’y penser et de consacrer à ce fait incompréhensible ses talents d’induction et ses heures de liberté.\n– Ce sera le chien de M\nme\nSazerat, disait Françoise, sans grande conviction, mais dans un but d’apaisement et pour que ma tante ne se « fende pas la tête ».\n– Comme si je ne connaissais pas le chien de M\nme\nSazerat ! répondait ma tante donc l’esprit critique n’admettait pas si facilement un fait.\n– Ah ! ce sera le nouveau chien que M.", "en": "We knew everyone in Combray so well, animals and people, that if my aunt had by chance seen a dog passing by \"that she didn't know\", she never stopped thinking about it and devoting her talents of induction and her free hours to this incomprehensible fact. – It will be Madame Sazerat’s dog, Françoise said, without much conviction, but with the aim of appeasement and so that my aunt does not “split her head”. – As if I didn’t know Ms. Sazerat’s dog! replied my aunt, so the critical mind did not admit a fact so easily. – Oh! this will be the new dog that Mr."}, {"start": 1393.21, "end": 1410.9, "b_start": 2741.24, "b_end": 2778.36, "orig": "Galopin a rapporté de Lisieux.\n– Ah ! à moins de ça.\n– Il paraît que c’est une bête bien affable, ajoutait Françoise qui tenait le renseignement de Théodore, spirituelle comme une personne, toujours de bonne humeur, toujours aimable, toujours quelque chose de gracieux.", "en": "Galopin reported from Lisieux. – Oh! unless that. – It seems that she is a very affable creature, added Françoise who had received the information from Théodore, as witty as a person, always in a good mood, always amiable, always something gracious."}, {"start": 1411.9, "end": 1416.17, "b_start": 2778.36, "b_end": 2788.5, "orig": "C’est rare qu’une bête qui n’a que cet âge-là soit déjà si galante.", "en": "It’s rare that a beast that’s only that old is already so gallant."}, {"start": 1417.17, "end": 1440.78, "b_start": 2788.5, "b_end": 2836.9, "orig": "Madame Octave, il va falloir que je vous quitte, je n’ai pas le temps de m’amuser, voilà bientôt dix heures, mon fourneau n’est seulement pas éclairé, et j’ai encore à plumer mes asperges.\n– Comment, Françoise, encore des asperges ! mais c’est une vraie maladie d’asperges que vous avez cette année, vous allez en fatiguer nos Parisiens !\n– Mais non, madame Octave, ils aiment bien ça.", "en": "Madame Octave, I'm going to have to leave you, I don't have time to have fun, it's almost ten o'clock, my stove is only not lit, and I still have to pluck my asparagus. – What, Françoise, more asparagus! but it’s a real asparagus disease that you have this year, you’re going to tire out our Parisians! – But no, Madame Octave, they like that."}, {"start": 1441.78, "end": 1455.46, "b_start": 2836.9, "b_end": 2865.2, "orig": "Ils rentreront de l’église avec de l’appétit et vous verrez qu’ils ne les mangeront pas avec le dos de la cuiller.\n– Mais à l’église, ils doivent y être déjà ; vous ferez bien de ne pas perdre de temps. Allez surveiller votre déjeuner.", "en": "They will come home from church with an appetite and you will see that they will not eat them with the back of the spoon. – But at the church, they must already be there; you will do well not to waste time. Go watch your lunch."}, {"start": 1456.46, "end": 1466.02, "b_start": 2865.2, "b_end": 2885.66, "orig": "Pendant que ma tante devisait ainsi avec Françoise, j’accompagnais mes parents à la messe. Que je l’aimais, que je la revois bien, notre église !", "en": "While my aunt was chatting like this with Françoise, I accompanied my parents to mass. How I loved it, how I see it again, our church!"}, {"start": 1467.02, "end": 1494.02, "b_start": 2885.66, "b_end": 2939.87, "orig": "Son vieux porche par lequel nous entrions, noir, grêlé comme une écumoire, était dévié et profondément creusé aux angles (de même que le bénitier où il nous conduisait) comme si le doux effleurement des mantes des paysannes entrant à l’église et de leurs doigts timides prenant de l’eau bénite, pouvait, répété pendant des siècles, acquérir une force destructive, infléchir la pierre et l’entailler de sillons comme en trace la roue des carrioles dans la borne contre laquelle elle bute tous les jours.", "en": "Its old porch through which we entered, black, pockmarked like a skimmer, was deviated and deeply hollowed out at the corners (as was the font where it led us) as if the gentle touch of the mantles of the peasant women entering the church and of their timid fingers taking holy water, could, repeated for centuries, acquire a destructive force, bend the stone and cut it with furrows like the cart wheel marks in the boundary stone against which she encounters every day."}, {"start": 1495.02, "end": 1532.17, "b_start": 2939.87, "b_end": 3018.1, "orig": "Ses pierres tombales, sous lesquelles la noble poussière des abbés de Combray, enterrés là, faisait au chœur comme un pavage spirituel, n’étaient plus elles-mêmes de la matière inerte et dure, car le temps les avait rendues douces et fait couler comme du miel hors des limites de leur propre équarrissure qu’ici elles avaient dépassées d’un flot blond, entraînant à la dérive une majuscule gothique en fleurs, noyant les violettes blanches du marbre ; et en deçà desquelles, ailleurs, elles s’étaient résorbées, contractant encore l’elliptique inscription latine, introduisant un caprice de plus dans la disposition de ces caractères abrégés, rapprochant deux lettres d’un mot dont les autres avaient été démesurément distendues.", "en": "Its tombstones, under which the noble dust of the abbots of Combray, buried there, made the choir like a spiritual paving, were no longer themselves inert and hard matter, because time had made them soft and made them flow like honey outside the limits of their own squaring which here they had exceeded with a blond flood, dragging a Gothic capital in flowers adrift, drowning the white violets of the marble; and below which, elsewhere, they had been reabsorbed, further contracting the elliptical Latin inscription, introducing one more caprice into the arrangement of these abbreviated characters, bringing together two letters of a word whose others had been disproportionately distended."}, {"start": 1533.17, "end": 1612.34, "b_start": 3018.1, "b_end": 3184.84, "orig": "Ses vitraux ne chatoyaient jamais tant que les jours où le soleil se montrait peu, de sorte que, fît-il gris dehors, on était sûr qu’il ferait beau dans l’église ; l’un était rempli dans toute sa grandeur par un seul personnage pareil à un Roi de jeu de cartes, qui vivait là-haut, sous un dais architectural, entre ciel et terre ; (et dans le reflet oblique et bleu duquel, parfois les jours de semaine, à midi, quand il n’y a pas d’office – à l’un de ces rares moments où l’église aérée, vacante, plus humaine, luxueuse, avec du soleil sur son riche mobilier, avait l’air presque habitable comme le hall de pierre sculptée et de verre peint, d’un hôtel de style moyen âge – on voyait s’agenouiller un instant M\nme\nSazerat, posant sur le prie-Dieu voisin un paquet tout ficelé de petits fours qu’elle venait de prendre chez le pâtissier d’en face et qu’elle allait rapporter pour le déjeuner) ; dans un autre une montagne de neige rose, au pied de laquelle se livrait un combat, semblait avoir givré à même la verrière qu’elle boursouflait de son trouble grésil comme une vitre à laquelle il serait resté des flocons éclairés par quelque aurore (par la même sans doute qui empourprait le retable de l’autel de tons si frais qu’ils semblaient plutôt posés là momentanément par une lueur du dehors prête à s’évanouir que par des couleurs attachées à jamais à la pierre) ; et tous étaient si anciens qu’on voyait çà et là leur vieillesse argentée étinceler de la poussière des siècles et montrer brillante et usée jusqu’à la corde la trame de leur douce tapisserie de verre.", "en": "Its stained glass windows never shimmered so much as on days when the sun showed little, so that, even if it was gray outside, one was sure that it would be fine in the church; one was filled in all its grandeur by a single character like a card-playing King, who lived up there, under an architectural canopy, between heaven and earth; (and in the oblique blue reflection of which, sometimes on weekdays, at noon, when there is no service - at one of those rare moments when the airy, vacant, more human, luxurious church, with the sun on its rich furniture, looked almost inhabitable like the hall of sculpted stone and painted glass, of a medieval style hotel - we saw Ms. Sazerat kneeling for a moment, placing a package on the neighboring prie-dieu all tied up with petit fours that she had just bought from the pastry chef across the street and which she was going to bring back for lunch); in another a mountain of pink snow, at the foot of which a combat was taking place, seemed to have frosted on the very glass roof which it blistered with its cloudy sleet like a window on which there remained flakes lit by some dawn (probably by the same one which colored the altar retable with tones so fresh that they seemed rather placed there momentarily by a light from outside ready to vanish than by attached colors forever to the stone); and all of them were so ancient that here and there their silvery old age could be seen sparkling with the dust of centuries and showing the weave of their soft glass tapestry shiny and worn to the core."}, {"start": 1613.34, "end": 1684.17, "b_start": 3184.84, "b_end": 3337.08, "orig": "Il y en avait un qui était un haut compartiment divisé en une centaine de petits vitraux rectangulaires où dominait le bleu, comme un grand jeu de cartes pareil à ceux qui devaient distraire le roi Charles VI ; mais soit qu’un rayon eût brillé, soit que mon regard en bougeant eût promené à travers la verrière tour à tour éteinte et rallumée un mouvant et précieux incendie, l’instant d’après elle avait pris l’éclat changeant d’une traîne de paon, puis elle tremblait et ondulait en une pluie flamboyante et fantastique qui dégouttait du haut de la voûte sombre et rocheuse, le long des parois humides, comme si c’était dans la nef de quelque grotte irisée de sinueux stalactites que je suivais mes parents, qui portaient leur paroissien ; un instant après les petits vitraux en losange avaient pris la transparence profonde, l’infrangible dureté de saphirs qui eussent été juxtaposés sur quelque immense pectoral, mais derrière lesquels on sentait, plus aimé que toutes ces richesses, un sourire momentané de soleil ; il était aussi reconnaissable dans le flot bleu et doux dont il baignait les pierreries que sur le pavé de la place ou la paille du marché ; et, même à nos premiers dimanches quand nous étions arrivés avant Pâques, il me consolait que la terre fût encore nue et noire, en faisant épanouir, comme en un printemps historique et qui datait des successeurs de saint Louis, ce tapis éblouissant et doré de myosotis en verre.", "en": "There was one which was a high compartment divided into a hundred small rectangular stained glass windows dominated by blue, like a large game of cards like those which were to entertain King Charles VI; but either a ray had shone, or my gaze, while moving, had wandered through the glass roof, alternately extinguished and rekindled, a moving and precious fire, the next moment it had taken on the changing brilliance of a peacock's train, then it trembled and undulated in a flamboyant and fantastic rain which dripped from the top of the dark and rocky vault, along the damp walls, as if it were in the nave from some cave iridescent with sinuous stalactites that I followed my parents, who were carrying their parishioner; a moment later the small diamond-shaped stained glass windows had taken on the deep transparency, the infrangible hardness of sapphires which would have been juxtaposed on some immense pectoral, but behind which one felt, more loved than all these riches, a momentary smile of sunshine; it was as recognizable in the soft blue flow with which it bathed the jewels as on the pavement of the square or the straw of the market; and, even on our first Sundays when we arrived before Easter, he consoled me that the earth was still bare and black, by making this dazzling and golden carpet of glass forget-me-nots bloom, as in a historic spring dating back to the successors of Saint Louis."}, {"start": 1685.17, "end": 1729.76, "b_start": 3337.08, "b_end": 3428.82, "orig": "Deux tapisseries de haute lice représentaient le couronnement d’Esther (la tradition voulait qu’on eût donné à Assuérus les traits d’un roi de France et à Esther ceux d’une dame de Guermantes dont il était amoureux) auxquelles leurs couleurs, en fondant, avaient ajouté une expression, un relief, un éclairage : un peu de rose flottait aux lèvres d’Esther au delà du dessin de leur contour ; le jaune de sa robe s’étalait si onctueusement, si grassement, qu’elle en prenait une sorte de consistance et s’enlevait vivement sur l’atmosphère refoulée ; et la verdure des arbres restée vive dans les parties basses du panneau de soie et de laine, mais ayant « passé » dans le haut, faisait se détacher en plus pâle, au-dessus des troncs foncés, les hautes branches jaunissantes, dorées et comme à demi effacées par la brusque et oblique illumination d’un soleil invisible.", "en": "Two high-style tapestries represented the coronation of Esther (tradition had it that Ahasuerus had been given the features of a king of France and Esther those of a lady from Guermantes with whom he was in love) to which their colors, melting, had added an expression, a relief, a lighting: a little pink floated to Esther's lips beyond the drawing of their outline; the yellow of her dress spread so smoothly, so richly, that it took on a sort of consistency and stood out vividly on the repressed atmosphere; and the greenery of the trees remained vibrant in the lower parts of the silk and wool panel, but having \"passed\" to the top, made the high branches stand out paler, above the dark trunks, yellowing, golden and as if half erased by the sudden and oblique illumination of an invisible sun."}, {"start": 1730.76, "end": 1847.66, "b_start": 3428.82, "b_end": 3665.71, "orig": "Tout cela, et plus encore les objets précieux venus à l’église de personnages qui étaient pour moi presque des personnages de légende (la croix d’or travaillée, disait-on, par saint Éloi et donnée par Dagobert, le tombeau des fils de Louis le Germanique, en porphyre et en cuivre émaillé), à cause de quoi je m’avançais dans l’église, quand nous gagnions nos chaises, comme dans une vallée visitée des fées, où le paysan s’émerveille de voir dans un rocher, dans un arbre, dans une mare, la trace palpable de leur passage surnaturel ; tout cela faisait d’elle pour moi quelque chose d’entièrement différent du reste de la ville : un édifice occupant, si l’on peut dire, un espace à quatre dimensions – la quatrième étant celle du Temps – déployant à travers les siècles son vaisseau qui, de travée en travée, de chapelle en chapelle, semblait vaincre et franchir, non pas seulement quelques mètres, mais des époques successives d’où il sortait victorieux ; dérobant le rude et farouche XI\ne\nsiècle dans l’épaisseur de ses murs, d’où il n’apparaissait avec ses lourds cintres bouchés et aveuglés de grossiers moellons que par la profonde entaille que creusait près du porche l’escalier du clocher, et, même là, dissimulé par les gracieuses arcades gothiques qui se pressaient coquettement devant lui comme de plus grandes sœurs, pour le cacher aux étrangers, se placent en souriant devant un jeune frère rustre, grognon et mal vêtu ; élevant dans le ciel au-dessus de la Place, sa tour qui avait contemplé saint Louis et semblait le voir encore ; et s’enfonçant avec sa crypte dans une nuit mérovingienne où, nous guidant à tâtons sous la voûte obscure et puissamment nervurée comme la membrane d’une immense chauve-souris de pierre, Théodore et sa sœur nous éclairaient d’une bougie le tombeau de la petite fille de Sigebert, sur lequel une profonde valve – comme la trace d’un fossile – avait été creusée, disait-on, « par une lampe de cristal qui, le soir du meurtre de la princesse franque, s’était détachée d’elle-même des chaînes d’or où elle était suspendue à la place de l’actuelle abside, et, sans que le cristal se brisât, sans que la flamme s’éteignît, s’était enfoncée dans la pierre et l’avait fait mollement céder sous elle ».", "en": "All this, and even more the precious objects that came to the church from people who were for me almost legendary characters (the golden cross worked, it was said, by Saint Eloi and given by Dagobert, the tomb of the sons of Louis the German, in porphyry and enameled copper), because of which I advanced into the church, when we reached our chairs, as in a valley visited by fairies, where the peasant marvels at seeing in a rock, in a tree, in a pond, the palpable trace of their supernatural passage; all this made it for me something entirely different from the rest of the city: a building occupying, so to speak, a four-dimensional space – the fourth being that of Time – deploying through the centuries its vessel which, from bay to bay, from chapel to chapel, seemed to conquer and cross, not just a few meters, but successive eras from which it emerged victorious; hiding the harsh and fierce 11th century in the thickness of its walls, from where it only appeared with its heavy arches blocked and blinded with coarse rubble through the deep cut dug near the porch by the staircase of the bell tower, and, even there, hidden by the graceful Gothic arcades which crowded coquettishly in front of it like older sisters, to hide it from strangers, place themselves smiling in front of a younger brother boorish, grumpy and poorly dressed; raising into the sky above the Place, its tower which had contemplated Saint Louis and seemed to see him again; and sinking with his crypt into a Merovingian night where, guiding us gropingly under the dark vault and powerfully ribbed like the membrane of an immense stone bat, Théodore and his sister lit us with a candle the tomb of Sigebert's little daughter, on which a deep valve - like the trace of a fossil - had been dug, it was said, \"by a crystal lamp which, on the evening of the murder of the Frankish princess, had detached herself from the golden chains where she was suspended in the place of the current apse, and, without the crystal breaking, without the flame being extinguished, had sunk into the stone and made it softly give way under her."}, {"start": 1848.66, "end": 1857.88, "b_start": 3665.71, "b_end": 3685.96, "orig": "L’abside de l’église de Combray, peut-on vraiment en parler ? Elle était si grossière, si dénuée de beauté artistique et même d’élan religieux.", "en": "The apse of the Combray church, can we really talk about it? She was so crude, so devoid of artistic beauty and even religious impulse."}, {"start": 1858.88, "end": 1876.69, "b_start": 3685.96, "b_end": 3725.64, "orig": "Du dehors, comme le croisement des rues sur lequel elle donnait était en contre-bas, sa grossière muraille s’exhaussait d’un soubassement en moellons nullement polis, hérissés de cailloux, et qui n’avait rien de particulièrement ecclésiastique, les verrières semblaient percées à une hauteur excessive, et le tout avait plus l’air d’un mur de prison que d’église.", "en": "From the outside, as the intersection of the streets onto which it overlooked was below, its rough wall was raised by a base of rubble which was in no way polished, bristling with pebbles, and which had nothing particularly ecclesiastical about it, the glass roofs seemed pierced to an excessive height, and the whole thing looked more like a prison wall than a church."}, {"start": 1877.69, "end": 1886.78, "b_start": 3725.64, "b_end": 3745.0, "orig": "Et certes, plus tard, quand je me rappelais toutes les glorieuses absides que j’ai vues, il ne me serait jamais venu à la pensée de rapprocher d’elles l’abside de Combray.", "en": "And certainly, later, when I remembered all the glorious apses that I saw, it would never have occurred to me to compare the apse of Combray to them."}, {"start": 1887.78, "end": 1901.42, "b_start": 3745.0, "b_end": 3774.5, "orig": "Seulement, un jour, au détour d’une petite rue provinciale, j’aperçus, en face du croisement de trois ruelles, une muraille fruste et surélevée, avec des verrières percées en haut et offrant le même aspect asymétrique que l’abside de Combray.", "en": "Only, one day, at the bend of a small provincial street, I saw, opposite the intersection of three alleys, a crude and raised wall, with glass roofs pierced at the top and offering the same asymmetrical appearance as the apse of Combray."}, {"start": 1902.42, "end": 1920.75, "b_start": 3774.5, "b_end": 3812.36, "orig": "Alors je ne me suis pas demandé comme à Chartres ou à Reims avec quelle puissance y était exprimé le sentiment religieux, mais je me suis involontairement écrié : « L’Église ! »\nL’église ! Familière ; mitoyenne, rue Saint-Hilaire, où était sa porte nord, de ses deux voisines, la pharmacie de M.", "en": "So I did not ask myself as in Chartres or Reims with what power religious sentiment was expressed there, but I involuntarily exclaimed: “The Church! » The church! Familiar; adjoining, rue Saint-Hilaire, where its north door was, of its two neighbors, the pharmacy of Mr."}, {"start": 1921.75, "end": 1943.54, "b_start": 3812.36, "b_end": 3854.54, "orig": "Rapin et la maison de M\nme\nLoiseau, qu’elle touchait sans aucune séparation ; simple citoyenne de Combray qui aurait pu avoir son numéro dans la rue si les rues de Combray avaient eu des numéros, et où il semble que le facteur aurait dû s’arrêter le matin quand il faisait sa distribution, avant d’entrer chez M\nme\nLoiseau et en sortant de chez M.", "en": "Rapin and Madame Loiseau’s house, which she touched without any separation; simple citizen of Combray who could have had her number in the street if the streets of Combray had had numbers, and where it seems that the postman should have stopped in the morning when he was making his distribution, before entering Ms. Loiseau's and when leaving Mr."}, {"start": 1944.54, "end": 1951.6, "b_start": 3854.54, "b_end": 3870.61, "orig": "Rapin, il y avait pourtant entre elle et tout ce qui n’était pas elle une démarcation que mon esprit n’a jamais pu arriver à franchir.", "en": "Rapin, there was however between her and everything that was not her a demarcation that my mind was never able to cross."}, {"start": 1952.6, "end": 1982.07, "b_start": 3870.61, "b_end": 3928.25, "orig": "M\nme\nLoiseau avait beau avoir à sa fenêtre des fuchsias, qui prenaient la mauvaise habitude de laisser leurs branches courir toujours partout tête baissée, et dont les fleurs n’avaient rien de plus pressé, quand elles étaient assez grandes, que d’aller rafraîchir leurs joues violettes et congestionnées contre la sombre façade de l’église, les fuchsias ne devenaient pas sacrés pour cela pour moi ; entre les fleurs et la pierre noircie sur laquelle elles s’appuyaient, si mes yeux ne percevaient pas d’intervalle, mon esprit réservait un abîme.", "en": "Madame Loiseau may have had fuchsias at her window, which had the bad habit of letting their branches always run headlong everywhere, and whose flowers had nothing more in a hurry, when they were large enough, than to refresh their purple and congested cheeks against the dark facade of the church, fuchsias did not become sacred to me for that reason; between the flowers and the blackened stone on which they rested, if my eyes did not perceive an interval, my mind reserved an abyss."}, {"start": 1983.07, "end": 2028.98, "b_start": 3928.25, "b_end": 4024.48, "orig": "On reconnaissait le clocher de Saint-Hilaire de bien loin, inscrivant sa figure inoubliable à l’horizon où Combray n’apparaissait pas encore ; quand du train qui, la semaine de Pâques, nous amenait de Paris, mon père l’apercevait qui filait tour à tour sur tous les sillons du ciel, faisant courir en tous sens son petit coq de fer, il nous disait : « Allons, prenez les couvertures, on est arrivé. » Et dans une des plus grandes promenades que nous faisions de Combray, il y avait un endroit où la route resserrée débouchait tout à coup sur un immense plateau fermé à l’horizon par des forêts déchiquetées que dépassait seul la fine pointe du clocher de Saint-Hilaire, mais si mince, si rose, qu’elle semblait seulement rayée sur le ciel par un ongle qui aurait voulu donner à ce paysage, à ce tableau rien que de nature, cette petite marque d’art, cette unique indication humaine.", "en": "We recognized the bell tower of Saint-Hilaire from afar, inscribing its unforgettable figure on the horizon where Combray did not yet appear; when from the train which, during Easter week, brought us from Paris, my father saw him speeding in turn over all the furrows of the sky, making his little iron rooster run in all directions, he said to us: “Come on, take the blankets, we have arrived. » And in one of the longest walks we took in Combray, there was a place where the narrow road suddenly opened onto an immense plateau closed on the horizon by jagged forests which only the thin point of the bell tower of Saint-Hilaire protruded, but so thin, so pink, that it seemed only scratched on the sky by a fingernail which would have liked to give to this landscape, to this painting nothing but nature, this little mark of art, this unique human indication."}, {"start": 2029.98, "end": 2049.93, "b_start": 4024.48, "b_end": 4065.17, "orig": "Quand on se rapprochait et qu’on pouvait apercevoir le reste de la tour carrée et à demi détruite qui, moins haute, subsistait à côté de lui, on était frappé surtout du ton rougeâtre et sombre des pierres ; et, par un matin brumeux d’automne, on aurait dit, s’élevant au-dessus du violet orageux des vignobles, une ruine de pourpre presque de la couleur de la vigne vierge.", "en": "When we got closer and could see the rest of the square and half-destroyed tower which, less tall, remained next to it, we were struck above all by the reddish and dark tone of the stones; and, on a misty autumn morning, it seemed, rising above the stormy purple of the vineyards, a ruin of purple almost the color of the Virginia creeper."}, {"start": 2050.93, "end": 2056.76, "b_start": 4065.17, "b_end": 4077.95, "orig": "Souvent sur la place, quand nous rentrions, ma grand’mère me faisait arrêter pour le regarder.", "en": "Often in the square, when we returned, my grandmother would make me stop to look at him."}, {"start": 2057.76, "end": 2084.57, "b_start": 4077.95, "b_end": 4133.57, "orig": "Des fenêtres de sa tour, placées deux par deux les unes au-dessus des autres, avec cette juste et originale proportion dans les distances qui ne donne pas de la beauté et de la dignité qu’aux visages humains, il lâchait, laissait tomber à intervalles réguliers des volées de corbeaux qui, pendant un moment, tournoyaient en criant, comme si les vieilles pierres qui les laissaient s’ébattre sans paraître les voir, devenues tout
