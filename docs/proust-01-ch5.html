d’un coup inhabitables et dégageant un principe d’agitation infinie, les avait frappés et repoussés.", "en": "From the windows of his tower, placed two by two one above the other, with that fair and original proportion in the distances which does not give beauty and dignity to human faces, he released, let fall at regular intervals flocks of crows which, for a moment, circled and cried, as if the old stones which let them frolic without seeming to see them, had suddenly become uninhabitable and released a principle of infinite agitation, had struck them and pushed them back."}, {"start": 2085.57, "end": 2105.42, "b_start": 4133.57, "b_end": 4177.62, "orig": "Puis, après avoir rayé en tous sens le velours violet de l’air du soir, brusquement calmés ils revenaient s’absorber dans la tour, de néfaste redevenue propice, quelques-uns posés çà et là, ne semblant pas bouger, mais happant peut-être quelque insecte, sur la pointe d’un clocheton, comme une mouette arrêtée avec l’immobilité d’un pêcheur à la crête d’une vague.", "en": "Then, after having scratched in all directions the purple velvet of the evening air, suddenly calmed down, they returned to absorb themselves in the tower, from being harmful to becoming propitious again, a few perched here and there, not seeming to move, but perhaps catching some insect, on the tip of a bell tower, like a seagull stopped with the immobility of a fisherman at the crest of a wave."}, {"start": 2106.42, "end": 2124.34, "b_start": 4177.62, "b_end": 4215.67, "orig": "Sans trop savoir pourquoi, ma grand’mère trouvait au clocher de Saint-Hilaire cette absence de vulgarité, de prétention, de mesquinerie, qui lui faisait aimer et croire riches d’une influence bienfaisante la nature quand la main de l’homme ne l’avait pas, comme faisait le jardinier de ma grand’tante, rapetissée, et les œuvres de génie.", "en": "Without really knowing why, my grandmother found in the bell tower of Saint-Hilaire this absence of vulgarity, pretension, pettiness, which made her love and believe nature to be rich in a beneficent influence when the hand of man did not have it, as my great-aunt's gardener did, made smaller, and the works of genius."}, {"start": 2125.34, "end": 2139.0, "b_start": 4215.67, "b_end": 4244.89, "orig": "Et sans doute, toute partie de l’église qu’on apercevait la distinguait de tout autre édifice par une sorte de pensée qui lui était infuse, mais c’était dans son clocher qu’elle semblait prendre conscience d’elle-même, affirmer une existence individuelle et responsable.", "en": "And no doubt, any part of the church that we saw distinguished it from any other building by a sort of thought infused into it, but it was in its bell tower that it seemed to become aware of itself, to affirm an individual and responsible existence."}, {"start": 2140.0, "end": 2151.45, "b_start": 4244.89, "b_end": 4269.98, "orig": "C’était lui qui parlait pour elle. Je crois surtout que, confusément, ma grand’mère trouvait au clocher de Combray ce qui pour elle avait le plus de prix au monde, l’air naturel et l’air distingué.", "en": "It was he who spoke for her. Above all, I believe that, vaguely, my grandmother found in the Combray bell tower what was most precious to her in the world, natural air and distinguished air."}, {"start": 2152.45, "end": 2162.17, "b_start": 4269.98, "b_end": 4290.76, "orig": "Ignorante en architecture, elle disait : « Mes enfants, moquez-vous de moi si vous voulez, il n’est peut-être pas beau dans les règles, mais sa vieille figure bizarre me plaît.", "en": "Ignorant of architecture, she said: “My children, make fun of me if you want, he is perhaps not handsome in the rules, but his strange old face pleases me."}, {"start": 2163.17, "end": 2198.57, "b_start": 4290.76, "b_end": 4361.95, "orig": "Je suis sûre que s’il jouait du piano, il ne jouerait pas\nsec\n. » Et en le regardant, en suivant des yeux la douce tension, l’inclinaison fervente de ses pentes de pierre qui se rapprochaient en s’élevant comme des mains jointes qui prient, elle s’unissait si bien à l’effusion de la flèche, que son regard semblait s’élancer avec elle ; et en même temps elle souriait amicalement aux vieilles pierres usées dont le couchant n’éclairait plus que le faîte et qui, à partir du moment où elles entraient dans cette zone ensoleillée, adoucies par la lumière, paraissaient tout d’un coup montées bien plus haut, lointaines, comme un chant repris « en voix de tête » une octave au-dessus.", "en": "I'm sure if he played the piano, he wouldn't play dry. » And looking at it, following with her eyes the gentle tension, the fervent inclination of its stone slopes which approached each other while rising like clasped hands praying, she united so well with the effusion of the arrow, that her gaze seemed to soar with it; and at the same time she smiled friendly at the old worn stones whose sunset only lit the ridge and which, from the moment they entered this sunny area, softened by the light, suddenly seemed much higher, distant, like a song taken up \"in head voice\" an octave above."}, {"start": 2199.57, "end": 2209.77, "b_start": 4361.95, "b_end": 4384.0, "orig": "C’était le clocher de Saint-Hilaire qui donnait à toutes les occupations, à toutes les heures, à tous les points de vue de la ville, leur figure, leur couronnement, leur consécration.", "en": "It was the bell tower of Saint-Hilaire which gave to all occupations, at all hours, to all points of view of the city, their figure, their crowning, their consecration."}, {"start": 2210.77, "end": 2264.26, "b_start": 4384.0, "b_end": 4490.86, "orig": "De ma chambre, je ne pouvais apercevoir que sa base qui avait été recouverte d’ardoises ; mais quand, le dimanche, je les voyais, par une chaude matinée d’été, flamboyer comme un soleil noir, je me disais : « Mon Dieu ! neuf heures ! il faut se préparer pour aller à la grand’messe si je veux avoir le temps d’aller embrasser tante Léonie avant », et je savais exactement la couleur qu’avait le soleil sur la place, la chaleur et la poussière du marché, l’ombre que faisait le store du magasin où maman entrerait peut-être avant la messe, dans une odeur de toile écrue, faire emplette de quelque mouchoir que lui ferait montrer, en cambrant la taille, le patron qui, tout en se préparant à fermer, venait d’aller dans l’arrière-boutique passer sa veste du dimanche et se savonner les mains qu’il avait l’habitude, toutes les cinq minutes, même dans les circonstances les plus mélancoliques, de frotter l’une contre l’autre d’un air d’entreprise, de partie fine et de réussite.", "en": "From my room, I could only see its base which had been covered with slates; but when, on Sunday, I saw them, on a hot summer morning, blazing like a black sun, I said to myself: “My God! nine o'clock! I have to get ready to go to high mass if I want to have time to go and kiss Aunt Léonie first,” and I knew exactly the color of the sun in the square, the heat and the dust of the market, the shadow cast by the awning of the store where Mom would perhaps enter before mass, in a smell of unbleached linen, to buy some handkerchief that would show her, arching her waist, the boss who, while preparing to close, was coming to go into the back room to put on his Sunday jacket and soap his hands which he was accustomed to, every five minutes, even in the most melancholic circumstances, to rub one against the other with an air of enterprise, of finery and success."}, {"start": 2265.26, "end": 2284.51, "b_start": 4490.86, "b_end": 4532.03, "orig": "Quand après la messe, on entrait dire à Théodore d’apporter une brioche plus grosse que d’habitude parce que nos cousins avaient profité du beau temps pour venir de Thiberzy déjeuner avec nous, on avait devant soi le clocher qui, doré et cuit lui-même comme une plus grande brioche bénie, avec des écailles et des égouttements gommeux de soleil, piquait sa pointe aiguë dans le ciel bleu.", "en": "When after mass we came in and told Théodore to bring a bigger brioche than usual because our cousins ​​had taken advantage of the good weather to come from Thiberzy to have lunch with us, we had in front of us the bell tower which, golden and baked itself like a larger blessed brioche, with scales and gummy drops of sunlight, stuck its sharp point into the blue sky."}, {"start": 2285.51, "end": 2313.95, "b_start": 4532.03, "b_end": 4592.47, "orig": "Et le soir, quand je rentrais de promenade et pensais au moment où il faudrait tout à l’heure dire bonsoir à ma mère et ne plus la voir, il était au contraire si doux, dans la journée finissante, qu’il avait l’air d’être posé et enfoncé comme un coussin de velours brun sur le ciel pâli qui avait cédé sous sa pression, s’était creusé légèrement pour lui faire sa place et refluait sur ses bords ; et les cris des oiseaux qui tournaient autour de lui semblaient accroître son silence, élancer encore sa flèche et lui donner quelque chose d’ineffable.", "en": "And in the evening, when I returned from a walk and thought about the moment when I would soon have to say good evening to my mother and no longer see her, it was on the contrary so soft, in the dying day, that it seemed to be placed and pressed like a cushion of brown velvet against the pale sky which had given way under its pressure, had hollowed out slightly to make its place for it and was flowing back to its edges; and the cries of the birds that circled around him seemed to increase his silence, to further shoot his arrow and give him something ineffable."}, {"start": 2314.95, "end": 2327.29, "b_start": 4592.47, "b_end": 4619.89, "orig": "Même dans les courses qu’on avait à faire derrière l’église, là où on ne la voyait pas, tout semblait ordonné par rapport au clocher surgi ici ou là entre les maisons, peut-être plus émouvant encore quand il apparaissait ainsi sans l’église.", "en": "Even in the errands we had to do behind the church, where we could not see it, everything seemed orderly in relation to the bell tower emerging here and there between the houses, perhaps even more moving when it appeared like this without the church."}, {"start": 2328.29, "end": 2339.74, "b_start": 4619.89, "b_end": 4645.7, "orig": "Et certes, il y en a bien d’autres qui sont plus beaux vus de cette façon, et j’ai dans mon souvenir des vignettes de clochers dépassant les toits, qui ont un autre caractère d’art que celles que composaient les tristes rues de Combray.", "en": "And certainly, there are many others which are more beautiful seen this way, and I remember vignettes of bell towers protruding from the roofs, which have a different artistic character than those which made up the sad streets of Combray."}, {"start": 2340.74, "end": 2378.85, "b_start": 4645.7, "b_end": 4724.36, "orig": "Je n’oublierai jamais dans une curieuse ville de Normandie voisine de Balbec, deux charmants hôtels du XVIII\ne\nsiècle, qui me sont à beaucoup d’égards chers et vénérables et entre lesquels, quand on la regarde du beau jardin qui descend des perrons vers la rivière, la flèche gothique d’une église qu’ils cachent s’élance, ayant l’air de terminer, de surmonter leurs façades, mais d’une matière si différente, si précieuse, si annelée, si rose, si vernie, qu’on voit bien qu’elle n’en fait pas plus partie que de deux beaux galets unis, entre lesquels elle est prise sur la plage, la flèche purpurine et crénelée de quelque coquillage fuselé en tourelle et glacé d’émail.", "en": "I will never forget, in a curious town in Normandy near Balbec, two charming 18th century hotels, which are in many respects dear and venerable to me and between which, when one looks at it from the beautiful garden which descends from the steps towards the river, the Gothic spire of a church which they hide juts out, seeming to complete, to surmount their facades, but of a material so different, so precious, so ringed, so pink, so varnished, that we can clearly see that it is no more part of it than of two beautiful plain pebbles, between which it is caught on the beach, the purpurine spire crenellated with some shell tapered into a turret and glazed with enamel."}, {"start": 2379.85, "end": 2404.26, "b_start": 4724.36, "b_end": 4776.72, "orig": "Même à Paris, dans un des quartiers les plus laids de la ville, je sais une fenêtre où on voit après un premier, un second et même un troisième plan fait des toits amoncelés de plusieurs rues, une cloche violette, parfois rougeâtre, parfois aussi, dans les plus nobles « épreuves » qu’en tire l’atmosphère, d’un noir décanté de cendres, laquelle n’est autre que le dôme Saint-Augustin et qui donne à cette vue de Paris le caractère de certaines vues de Rome par Piranesi.", "en": "Even in Paris, in one of the ugliest districts of the city, I know of a window where we see after a first, a second and even a third plane made of the piled-up roofs of several streets, a purple bell, sometimes reddish, sometimes also, in the noblest \"tests\" that the atmosphere draws from it, of a black settled with ashes, which is none other than the dome of Saint-Augustin and which gives to this view of Paris the character of certain views of Rome by Piranesi."}, {"start": 2405.26, "end": 2427.91, "b_start": 4776.72, "b_end": 4824.4, "orig": "Mais comme dans aucune de ces petites gravures, avec quelque goût que ma mémoire ait pu les exécuter, elle ne put mettre ce que j’avais perdu depuis longtemps, le sentiment qui nous fait non pas considérer une chose comme un spectacle, mais y croire comme en un être sans équivalent, aucune d’elles ne tient sous sa dépendance toute une partie profonde de ma vie, comme fait le souvenir de ces aspects du clocher de Combray dans les rues qui sont derrière l’église.", "en": "But as in none of these little engravings, with whatever taste my memory was able to execute them, it could not put what I had lost for a long time, the feeling which makes us not consider a thing as a spectacle, but believe in it as in a being without equivalent, none of them holds under its control a whole deep part of my life, as does the memory of these aspects of the bell tower of Combray in the streets behind the church."}, {"start": 2428.91, "end": 2485.26, "b_start": 4824.4, "b_end": 4943.78, "orig": "Qu’on le vît à cinq heures, quand on allait chercher les lettres à la poste, à quelques maisons de soi, à gauche, surélevant brusquement d’une cime isolée la ligne de faîte des toits ; que si, au contraire, on voulait entrer demander des nouvelles de M\nme\nSazerat, on suivît des yeux cette ligne redevenue basse après la descente de son autre versant en sachant qu’il faudrait tourner à la deuxième rue après le clocher ; soit qu’encore, poussant plus loin, si on allait à la gare, on le vît obliquement, montrant de profil des arêtes et des surfaces nouvelles comme un solide surpris à un moment inconnu de sa révolution ; ou que, des bords de la Vivonne, l’abside musculeusement ramassée et remontée par la perspective semblât jaillir de l’effort que le clocher faisait pour lancer sa flèche au cœur du ciel ; c’était toujours à lui qu’il fallait revenir, toujours lui qui dominait tout, sommant les maisons d’un pinacle inattendu, levé devant moi comme le doigt de Dieu dont le corps eût été caché dans la foule des humains sans que je le confondisse pour cela avec elle.", "en": "That we saw it at five o'clock, when we were going to collect letters from the post office, a few houses away, on the left, suddenly raising the ridge line of the roofs from an isolated peak; that if, on the contrary, we wanted to go in and ask for news of Ms. Sazerat, we followed with our eyes this line which had become low again after the descent of its other slope, knowing that we would have to turn to the second street after the bell tower; or again, pushing further, if we went to the station, we saw it obliquely, showing new edges and surfaces in profile like a solid surprised at an unknown moment in its revolution; or that, from the banks of the Vivonne, the apse muscularly picked up and raised by the perspective seemed to spring from the effort that the bell tower made to launch its arrow into the heart of the sky; it was always to him that we had to return, always he who dominated everything, crowning the houses with an unexpected pinnacle, raised before me like the finger of God whose body would have been hidden in the crowd of humans without my confusing it with her."}, {"start": 2486.26, "end": 2538.27, "b_start": 4943.78, "b_end": 5052.16, "orig": "Et aujourd’hui encore si, dans une grande ville de province ou dans un quartier de Paris que je connais mal, un passant qui m’a « mis dans mon chemin » me montre au loin, comme un point de repère, tel beffroi d’hôpital, tel clocher de couvent levant la pointe de son bonnet ecclésiastique au coin d’une rue que je dois prendre, pour peu que ma mémoire puisse obscurément lui trouver quelque trait de ressemblance avec la figure chère et disparue, le passant, s’il se retourne pour s’assurer que je ne m’égare pas, peut, à son étonnement, m’apercevoir qui, oublieux de la promenade entreprise ou de la course obligée, reste là, devant le clocher, pendant des heures, immobile, essayant de me souvenir, sentant au fond de moi des terres reconquises sur l’oubli qui s’assèchent et se rebâtissent ; et sans doute alors, et plus anxieusement que tout à l’heure quand je lui demandais de me renseigner, je cherche encore mon chemin, je tourne une rue... mais... c’est dans mon cœur...", "en": "And even today if, in a large provincial town or in a district of Paris that I do not know well, a passer-by who has \"put me on my path\" shows me in the distance, like a landmark, such a hospital belfry, such a convent bell tower raising the tip of its ecclesiastical cap at the corner of a street that I must take, as long as my memory can obscurely find in it some trait of resemblance with the dear and disappeared figure, the passer-by, if he turns around to making sure that I do not get lost, can, to his astonishment, notice me who, forgetful of the walk undertaken or the obligatory errand, remains there, in front of the bell tower, for hours, motionless, trying to remember, feeling deep within me lands reconquered from oblivion which dry up and are rebuilt; and no doubt then, and more anxiously than earlier when I asked him for information, I am still looking for my way, I am turning a street... but... it is in my heart..."}, {"start": 2539.27, "end": 2553.0, "b_start": 5052.16, "b_end": 5080.78, "orig": "En rentrant de la messe, nous rencontrions souvent M. Legrandin qui, retenu à Paris par sa profession d’ingénieur, ne pouvait, en dehors des grandes vacances, venir à sa propriété de Combray que du samedi soir au lundi matin.", "en": "Coming home from mass, we often met Mr. Legrandin who, kept in Paris by his profession as an engineer, could only come to his property in Combray from Saturday evening to Monday morning, outside of summer holidays."}, {"start": 2554.0, "end": 2567.99, "b_start": 5080.78, "b_end": 5111.2, "orig": "C’était un de ces hommes qui, en dehors d’une carrière scientifique où ils ont d’ailleurs brillamment réussi, possèdent une culture toute différente, littéraire, artistique, que leur spécialisation professionnelle n’utilise pas et dont profite leur conversation.", "en": "He was one of those men who, apart from a scientific career in which they have succeeded brilliantly, possess a completely different culture, literary, artistic, which their professional specialization does not use and from which their conversation benefits."}, {"start": 2568.99, "end": 2573.79, "b_start": 5111.2, "b_end": 5122.46, "orig": "Plus lettrés que bien des littérateurs (nous ne savions pas à cette époque que M.", "en": "More literate than many literati (we did not know at that time that Mr."}, {"start": 2574.79, "end": 2598.58, "b_start": 5122.46, "b_end": 5172.11, "orig": "Legrandin eût une certaine réputation comme écrivain et nous fûmes très étonnés de voir qu’un musicien célèbre avait composé une mélodie sur des vers de lui), doués de plus de « facilité » que bien des peintres, ils s’imaginent que la vie qu’ils mènent n’est pas celle qui leur aurait convenu et apportent à leurs occupations positives soit une insouciance mêlée de fantaisie, soit une application soutenue et hautaine, méprisante, amère et consciencieuse.", "en": "Legrandin had a certain reputation as a writer and we were very surprised to see that a famous musician had composed a melody on verses of his), endowed with more \"facility\" than many painters, they imagine that the life they lead is not the one that would have suited them and bring to their positive occupations either a carelessness mixed with fantasy, or a sustained and haughty application, contemptuous, bitter and conscientious."}, {"start": 2599.58, "end": 2618.94, "b_start": 5172.11, "b_end": 5212.75, "orig": "Grand, avec une belle tournure, un visage pensif et fin aux longues moustaches blondes, au regard bleu et désenchanté, d’une politesse raffinée, causeur comme nous n’en avions jamais entendu, il était aux yeux de ma famille, qui le citait toujours en exemple, le type de l’homme d’élite, prenant la vie de la façon la plus noble et la plus délicate.", "en": "Tall, with a handsome figure, a pensive and fine face with long blond mustaches, blue and disenchanted eyes, a refined politeness, a conversationalist like we had never heard, he was in the eyes of my family, who always cited him as an example, the type of elite man, taking life in the most noble and delicate way."}, {"start": 2619.94, "end": 2632.59, "b_start": 5212.75, "b_end": 5240.96, "orig": "Ma grand’mère lui reprochait seulement de parler un peu trop bien, un peu trop comme un livre, de ne pas avoir dans son langage le naturel qu’il y avait dans ses cravates lavallière toujours flottantes, dans son veston droit presque d’écolier.", "en": "My grandmother only reproached him for speaking a little too well, a little too much like a book, for not having the naturalness in his language that was evident in his always flowing pussy-bow ties, in his straight, almost schoolboy jacket."}, {"start": 2633.59, "end": 2656.1, "b_start": 5240.96, "b_end": 5288.45, "orig": "Elle s’étonnait aussi des tirades enflammées qu’il entamait souvent contre l’aristocratie, la vie mondaine, le snobisme, « certainement le péché auquel pense saint Paul quand il parle du péché pour lequel il n’y a pas de rémission. »\nL’ambition mondaine était un sentiment que ma grand’mère était si incapable de ressentir et presque de comprendre, qu’il lui paraissait bien inutile de mettre tant d’ardeur à la flétrir.", "en": "She was also surprised by the fiery tirades that he often launched against the aristocracy, worldly life, snobbery, “certainly the sin that Saint Paul thinks of when he speaks of the sin for which there is no remission. » Worldly ambition was a feeling that my grandmother was so incapable of feeling and almost of understanding, that it seemed to her quite pointless to put so much effort into condemning it."}, {"start": 2657.1, "end": 2660.73, "b_start": 5288.45, "b_end": 5298.06, "orig": "De plus, elle ne trouvait pas de très bon goût que M.", "en": "Furthermore, she did not find it in very good taste that Mr."}, {"start": 2661.73, "end": 2679.03, "b_start": 5298.06, "b_end": 5334.62, "orig": "Legrandin, dont la sœur était mariée près de Balbec avec un gentilhomme bas-normand, se livrât à des attaques aussi violentes contre les nobles, allant jusqu’à reprocher à la Révolution de ne les avoir pas tous guillotinés.\n– Salut, amis ! nous disait-il en venant à notre rencontre.", "en": "Legrandin, whose sister was married near Balbec to a Lower Normandy gentleman, engaged in such violent attacks against the nobles, going so far as to reproach the Revolution for not having guillotined them all. – Hello, friends! he said to us as he came to meet us."}, {"start": 2680.03, "end": 2696.5, "b_start": 5334.62, "b_end": 5369.8, "orig": "Vous êtes heureux d’habiter beaucoup ici ; demain il faudra que je rentre à Paris, dans ma niche.\n– Oh ! ajoutait-il, avec ce sourire doucement ironique et déçu, un peu distrait, qui lui était particulier, certes il y a dans ma maison toutes les choses inutiles.", "en": "You are happy to live here a lot; tomorrow I will have to return to Paris, to my niche. - Oh ! he added, with that gently ironic and disappointed smile, a little absent-minded, which was peculiar to him, “certainly there are all useless things in my house."}, {"start": 2697.5, "end": 2708.87, "b_start": 5369.8, "b_end": 5393.57, "orig": "Il n’y manque que le nécessaire, un grand morceau de ciel comme ici. Tâchez de garder toujours un morceau de ciel au-dessus de votre vie, petit garçon, ajoutait-il en se tournant vers moi.", "en": "All that is missing is what is necessary, a large piece of sky like here. Try to always keep a piece of sky above your life, little boy, he added, turning to me."}, {"start": 2709.87, "end": 2727.87, "b_start": 5393.57, "b_end": 5426.53, "orig": "Vous avez une jolie âme, d’une qualité rare, une nature d’artiste, ne la laissez pas manquer de ce qu’il lui faut. Quand, à notre retour, ma tante nous faisait demander si M\nme\nGoupil était arrivée en retard à la messe, nous étions incapables de la renseigner.", "en": "You have a beautiful soul, of rare quality, an artistic nature, don't let it lack what it needs. When, on our return, my aunt asked us if Ms. Goupil had arrived late for mass, we were unable to tell her."}, {"start": 2728.87, "end": 2735.95, "b_start": 5426.53, "b_end": 5443.85, "orig": "En revanche nous ajoutions à son trouble en lui disant qu’un peintre travaillait dans l’église à copier le vitrail de Gilbert le Mauvais.", "en": "On the other hand, we added to his confusion by telling him that a painter was working in the church copying the stained glass window of Gilbert the Bad."}, {"start": 2736.95, "end": 2757.66, "b_start": 5443.85, "b_end": 5487.44, "orig": "Françoise, envoyée aussitôt chez l’épicier, était revenue bredouille par la faute de l’absence de Théodore à qui sa double profession de chantre ayant une part de l’entretien de l’église, et de garçon épicier donnait, avec des relations dans tous les mondes, un savoir universel.\n– Ah ! soupirait ma tante, je voudrais que ce soit déjà l’heure d’Eulalie.", "en": "Françoise, sent immediately to the grocer, had returned empty-handed due to the absence of Théodore, to whom his dual profession as cantor having a share in the upkeep of the church, and as a grocer's boy gave, with connections in all worlds, universal knowledge. – Oh! sighed my aunt, “I wish it was Eulalie’s time already."}, {"start": 2758.66, "end": 2761.76, "b_start": 5487.44, "b_end": 5495.21, "orig": "Il n’y a vraiment qu’elle qui pourra me dire cela.", "en": "It's really only her who can tell me that."}, {"start": 2762.76, "end": 2790.1, "b_start": 5495.21, "b_end": 5549.58, "orig": "Eulalie était une fille boiteuse, active et sourde qui s’était « retirée » après la mort de M\nme\nde la Bretonnerie où elle avait été en place depuis son enfance, et qui avait pris à côté de l’église une chambre, d’où elle descendait tout le temps soit aux offices, soit, en dehors des offices, dire une petite prière ou donner un coup de main à Théodore ; le reste du temps elle allait voir des personnes malades comme ma tante Léonie à qui elle racontait ce qui s’était passé à la messe ou aux vêpres.", "en": "Eulalie was a lame, active and deaf girl who had “retired” after the death of Madame de la Bretonnerie where she had been since her childhood, and who had taken a room next to the church, from where she came down all the time either to the services, or, outside of the services, to say a little prayer or to give a hand to Théodore; the rest of the time she went to see sick people like my aunt Léonie to whom she told what had happened at mass or at vespers."}, {"start": 2791.1, "end": 2803.07, "b_start": 5549.58, "b_end": 5576.38, "orig": "Elle ne dédaignait pas d’ajouter quelque casuel à la petite rente que lui servait la famille de ses anciens maîtres en allant de temps en temps visiter le linge du curé ou de quelque autre personnalité marquante du monde clérical de Combray.", "en": "She did not disdain adding something casual to the small income that the family of her former masters provided her by going from time to time to visit the linen of the priest or some other notable personality in the clerical world of Combray."}, {"start": 2804.07, "end": 2815.35, "b_start": 5576.38, "b_end": 5599.38, "orig": "Elle portait au-dessus d’une mante de drap noir un petit béguin blanc, presque de religieuse, et une maladie de peau donnait à une partie de ses joues et à son nez recourbé, les tons rose vif de la balsamine.", "en": "Above a black cloth mantle she wore a little white crush, almost like a nun's, and a skin disease gave part of her cheeks and her curved nose the bright pink tones of balsam."}, {"start": 2816.35, "end": 2823.5, "b_start": 5599.38, "b_end": 5615.33, "orig": "Ses visites étaient la grande distraction de ma tante Léonie qui ne recevait plus guère personne d’autre, en dehors de M. le Curé.", "en": "His visits were the great distraction of my aunt Léonie who hardly received anyone else, apart from M. le Curé."}, {"start": 2824.5, "end": 2833.05, "b_start": 5615.33, "b_end": 5634.76, "orig": "Ma tante avait peu à peu évincé tous les autres visiteurs parce qu’ils avaient le tort à ses yeux de rentrer tous dans l’une ou l’autre des deux catégories de gens qu’elle détestait.", "en": "My aunt had gradually ousted all the other visitors because in her eyes they were all wrong in falling into one or the other of the two categories of people she hated."}, {"start": 2834.05, "end": 2858.6, "b_start": 5634.76, "b_end": 5685.5, "orig": "Les uns, les pires et dont elle s’était débarrassée les premiers, étaient ceux qui lui conseillaient de ne pas « s’écouter » et professaient, fût-ce négativement et en ne la manifestant que par certains silences de désapprobation ou par certains sourires de doute, la doctrine subversive qu’une petite promenade au soleil et un bon bifteck saignant (quand elle gardait quatorze heures sur l’estomac deux méchantes gorgées d’eau de Vichy !) lui feraient plus de bien que son lit et ses médecines.", "en": "Some, the worst and which she was the first to get rid of, were those who advised her not to \"listen to herself\" and professed, even if negatively and only manifested by certain silences of disapproval or by certain smiles of doubt, the subversive doctrine that a little walk in the sun and a good rare steak (when she kept two mean gulps of Vichy water on her stomach for fourteen hours!) would do her more good than his bed and his medicines."}, {"start": 2859.6, "end": 2868.58, "b_start": 5685.5, "b_end": 5704.84, "orig": "L’autre catégorie se composait des personnes qui avaient l’air de croire qu’elle était plus gravement malade qu’elle ne pensait, qu’elle était aussi gravement malade qu’elle le disait.", "en": "The other category consisted of people who seemed to believe that she was more seriously ill than she thought, that she was as seriously ill as she said."}, {"start": 2869.58, "end": 2895.42, "b_start": 5704.84, "b_end": 5758.49, "orig": "Aussi, ceux qu’elle avait laissé monter après quelques hésitations et sur les officieuses instances de Françoise et qui, au cours de leur visite, avaient montré combien ils étaient indignes de la faveur qu’on leur faisait en risquant timidement un : « Ne croyez-vous pas que si vous vous secouiez un peu par un beau temps », ou qui, au contraire, quand elle leur avait dit : « Je suis bien bas, bien bas, c’est la fin, mes pauvres amis », lui avaient répondu : « Ah ! quand on n’a pas la santé !", "en": "Also, those whom she had allowed to come up after some hesitation and at the unofficial urging of Françoise and who, during their visit, had shown how unworthy they were of the favor done to them by timidly risking a: \"Don't you think that if you shook yourself a little in good weather\", or who, on the contrary, when she had said to them: \"I am very low, very low, it's the end, my poor friends\", had replied to her: \"Ah! when you don't have health!"}, {"start": 2896.42, "end": 2903.24, "b_start": 5758.49, "b_end": 5773.55, "orig": "Mais vous pouvez durer encore comme ça », ceux-là, les uns comme les autres, étaient sûrs de ne plus jamais être reçus.", "en": "But you can last like this any longer”, these, one like the other, were sure of never being received again."}, {"start": 2904.24, "end": 2931.14, "b_start": 5773.55, "b_end": 5830.9, "orig": "Et si Françoise s’amusait de l’air épouvanté de ma tante quand de son lit elle avait aperçu dans la rue du Saint-Esprit une de ces personnes qui avait l’air de venir chez elle ou quand elle avait entendu un coup de sonnette, elle riait encore bien plus, et comme d’un bon tour, des ruses toujours victorieuses de ma tante pour arriver à les faire congédier et de leur mine déconfite en s’en retournant sans l’avoir vue, et, au fond, admirait sa maîtresse qu’elle jugeait supérieure à tous ces gens puisqu’elle ne voulait pas les recevoir.", "en": "And if Françoise was amused by my aunt's frightened look when from her bed she saw one of these people in the Rue du Saint-Esprit who seemed to be coming to her house or when she heard a ring of the doorbell, she laughed even more, and as if in a good trick, at my aunt's always victorious ruses to get them dismissed and at their crestfallen expression when they returned without having seen her, and, deep down, admired her mistress whom she considered superior to all these people since she did not want to receive them."}, {"start": 2932.14, "end": 2942.66, "b_start": 5830.9, "b_end": 5852.72, "orig": "En somme, ma tante exigeait à la fois qu’on l’approuvât dans son régime, qu’on la plaignît pour ses souffrances et qu’on la rassurât sur son avenir. C’est à quoi Eulalie excellait.", "en": "In short, my aunt demanded approval of her diet, pity for her suffering and reassurance about her future. This is what Eulalie excelled at."}, {"start": 2943.66, "end": 2981.07, "b_start": 5852.72, "b_end": 5924.57, "orig": "Ma tante pouvait lui dire vingt fois en une minute : « C’est la fin, ma pauvre Eulalie », vingt fois Eulalie répondait : « Connaissant votre maladie comme vous la connaissez, madame Octave, vous irez à cent ans, comme me disait hier encore M\nme\nSazerin. » (Une des plus fermes croyances d’Eulalie, et que le nombre imposant des démentis apportés par l’expérience n’avait pas suffi à entamer, était que M\nme\nSazerat s’appelait M\nme\nSazerin.)\n– Je ne demande pas à aller à cent ans, répondait ma tante, qui préférait ne pas voir assigner à ses jours un terme précis.", "en": "My aunt could say to her twenty times in a minute: \"It's the end, my poor Eulalie\", twenty times Eulalie would reply: \"Knowing your illness as you know it, Madame Octave, you will live to be a hundred years old, as Madame Sazerin told me just yesterday. » (One of Eulalie's firmest beliefs, and which the imposing number of denials brought by experience had not been enough to undermine, was that Ms. Sazerat was called Ms. Sazerin.) - I am not asking to go to a hundred, replied my aunt, who preferred not to have a precise end assigned to her days."}, {"start": 2982.07, "end": 3000.55, "b_start": 5924.57, "b_end": 5963.36, "orig": "Et comme Eulalie savait avec cela comme personne distraire ma tante sans la fatiguer, ses visites qui avaient lieu régulièrement tous les dimanches sauf empêchement inopiné, étaient pour ma tante un plaisir dont la perspective l’entretenait ces jours-là dans un état agréable d’abord, mais bien vite douloureux comme une faim excessive, pour peu qu’Eulalie fût en retard.", "en": "And as Eulalie knew how to distract my aunt without tiring her, her visits which took place regularly every Sunday unless unexpectedly prevented, were for my aunt a pleasure the prospect of which kept her on those days in a pleasant state at first, but soon became painful like excessive hunger, as long as Eulalie was late."}, {"start": 3001.55, "end": 3018.52, "b_start": 5963.36, "b_end": 5998.08, "orig": "Trop prolongée, cette volupté d’attendre Eulalie tournait en supplice, ma tante ne cessait de regarder l’heure, bâillait, se sentait des faiblesses. Le coup de sonnette d’Eulalie, s’il arrivait tout à la fin de la journée, quand elle ne l’espérait plus, la faisait presque se trouver mal.", "en": "Too prolonged, this pleasure of waiting for Eulalie turned into torture, my aunt kept looking at the time, yawning, feeling weak. Eulalie's ringing of the doorbell, if it came at the very end of the day, when she no longer expected it, almost made her feel bad."}, {"start": 3019.52, "end": 3030.34, "b_start": 5998.08, "b_end": 6021.95, "orig": "En réalité, le dimanche, elle ne pensait qu’à cette visite et sitôt le déjeuner fini, Françoise avait hâte que nous quittions la salle à manger pour qu’elle pût monter « occuper » ma tante.", "en": "In reality, on Sunday, she only thought about this visit and as soon as lunch was over, Françoise couldn't wait for us to leave the dining room so that she could go upstairs to \"occupy\" my aunt."}, {"start": 3031.34, "end": 3055.22, "b_start": 6021.95, "b_end": 6073.03, "orig": "Mais (surtout à partir du moment où les beaux jours s’installaient à Combray) il y avait bien longtemps que l’heure altière de midi, descendue de la tour de Saint-Hilaire qu’elle armoriait des douze fleurons momentanés de sa couronne sonore, avait retenti autour de notre table, auprès du pain bénit venu lui aussi familièrement en sortant de l’église, quand nous étions encore assis devant les assiettes des Mille et une Nuits, appesantis par la chaleur et surtout par le repas.", "en": "But (especially from the moment when the good weather set in at Combray) it had been a long time since the haughty hour of noon, descending from the tower of Saint-Hilaire which it adorned with the twelve momentary florets of its sonorous crown, had resounded around our table, near the blessed bread which also came familiarly as we left the church, when we were still seated in front of the plates of the Thousand and One Nights, weighed down by the heat and especially by the meal."}, {"start": 3056.22, "end": 3108.09, "b_start": 6073.03, "b_end": 6179.44, "orig": "Car, au fond permanent d’œufs, de côtelettes, de pommes de terre, de confitures, de biscuits, qu’elle ne nous annonçait même plus, Françoise ajoutait – selon les travaux des champs et des vergers, le fruit de la marée, les hasards du commerce, les politesses des voisins et son propre génie, et si bien que notre menu, comme ces quatre-feuilles qu’on sculptait au XIII\ne\nsiècle au portail des cathédrales, reflétait un peu le rythme des saisons et des épisodes de la vie – : une barbue parce que la marchande lui en avait garanti la fraîcheur, une dinde parce qu’elle en avait vu une belle au marché de Roussainville-le-Pin, des cardons à la moelle parce qu’elle ne nous en avait pas encore fait de cette manière-là, un gigot rôti parce que le grand air creuse et qu’il avait bien le temps de descendre d’ici sept heures, des épinards pour changer, des abricots parce que c’était encore une rareté, des groseilles parce que dans quinze jours il n’y en aurait plus, des framboises que M.", "en": "Because, to the permanent stock of eggs, chops, potatoes, jams, biscuits, which she no longer even announced to us, Françoise added – according to the work in the fields and orchards, the fruit of the tide, the chances of commerce, the politeness of neighbors and her own genius, and so that our menu, like those quatre-feuilles that were carved in the 13th century at the portals of cathedrals, somewhat reflected the rhythm of the seasons and the episodes of life –: a bearded fish because the merchant had guaranteed its freshness, a turkey because she had seen a nice one at the Roussainville-le-Pin market, cardoons with marrow because she had not yet made them for us in that way, a roast leg of lamb because the fresh air was digging and it had plenty of time to go down within seven hours, spinach for a change, apricots because it was still a rarity, currants because in two weeks there would be no more, raspberries that Mr."}, {"start": 3109.09, "end": 3124.54, "b_start": 6179.44, "b_end": 6211.8, "orig": "Swann avait apportées exprès, des cerises, les premières qui vinssent du cerisier du jardin après deux ans qu’il n’en donnait plus, du fromage à la crème que j’aimais bien autrefois, un gâteau aux amandes parce qu’elle l’avait commandé la veille, une brioche parce que c’était notre tour de l’offrir.", "en": "Swann had brought cherries on purpose, the first to come from the cherry tree in the garden after two years since he had stopped giving them, cream cheese that I used to like, an almond cake because she had ordered it the day before, a brioche because it was our turn to offer it."}, {"start": 3125.54, "end": 3142.18, "b_start": 6211.8, "b_end": 6247.09, "orig": "Quand tout cela était fini, composée expressément pour nous, mais dédiée plus spécialement à mon père qui était amateur, une crème au chocolat, inspiration, attention personnelle de Françoise, nous était offerte, fugitive et légère comme une œuvre de circonstance où elle avait mis tout son talent.", "en": "When all this was finished, composed expressly for us, but dedicated more especially to my father who was an amateur, a chocolate cream, inspiration, personal attention from Françoise, was offered to us, fleeting and light like a work of circumstance in which she had put all her talent."}, {"start": 3143.18, "end": 3158.03, "b_start": 6247.09, "b_end": 6280.3, "orig": "Celui qui eût refusé d’en goûter en disant : « J’ai fini, je n’ai plus faim », se serait immédiatement ravalé au rang de ces goujats qui, même dans le présent qu’un artiste leur fait d’une de ses œuvres, regardent au poids et à la matière alors que n’y valent que l’intention et la signature.", "en": "Anyone who had refused to taste it by saying: \"I'm done, I'm not hungry anymore\", would have immediately reduced himself to the rank of those cads who, even in the present that an artist gives them of one of his works, look at the weight and the material when only the intention and the signature are worth it."}, {"start": 3159.03, "end": 3166.42, "b_start": 6280.3, "b_end": 6296.84, "orig": "Même en laisser une seule goutte dans le plat eût témoigné de la même impolitesse que se lever avant la fin du morceau au nez du compositeur.", "en": "Even leaving a single drop in the dish would have shown the same impoliteness as getting up before the end of the piece in the composer's face."}, {"start": 3167.42, "end": 3203.5, "b_start": 6296.84, "b_end": 6372.34, "orig": "Enfin ma mère me disait : « Voyons, ne reste pas ici indéfiniment, monte dans ta chambre si tu as trop chaud dehors, mais va d’abord prendre l’air un instant pour ne pas lire en sortant de table. » J’allais m’asseoir près de la pompe et de son auge, souvent ornée, comme un fond gothique, d’une salamandre, qui sculptait sur la pierre fruste le relief mobile de son corps allégorique et fuselé, sur le banc sans dossier ombragé d’un lilas, dans ce petit coin du jardin qui s’ouvrait par une porte de service sur la rue du Saint-Esprit et de la terre peu soignée duquel s’élevait par deux degrés, en saillie de la maison, et comme une construction indépendante, l’arrière-cuisine.", "en": "Finally my mother said to me: “Come on, don’t stay here indefinitely, go up to your room if you’re too hot outside, but first go get some fresh air for a moment so you don’t read when you get out of the table. » I went to sit near the pump and its trough, often decorated, like a Gothic background, with a salamander, which sculpted on the rough stone the mobile relief of its allegorical and tapered body, on the backless bench shaded by a lilac, in this little corner of the garden which opened by a service door onto the rue du Saint-Esprit and from the unkempt earth from which rose two steps, projecting from the house, and as an independent construction, the scullery."}, {"start": 3204.5, "end": 3212.9, "b_start": 6372.34, "b_end": 6390.49, "orig": "On apercevait son dallage rouge et luisant comme du porphyre. Elle avait moins l’air de l’antre de Françoise que d’un petit temple de Vénus.", "en": "We could see its red paving, shiny like porphyry. It looked less like Françoise's lair than a little temple of Venus."}, {"start": 3213.9, "end": 3226.98, "b_start": 6390.49, "b_end": 6420.19, "orig": "Elle regorgeait des offrandes du crémier, du fruitier, de la marchande de légumes, venus parfois de hameaux assez lointains pour lui dédier les prémices de leurs champs. Et son faîte était toujours couronné du roucoulement d’une colombe.", "en": "It was overflowing with offerings from the dairyman, the fruit grower, the vegetable seller, who sometimes came from hamlets far enough away to dedicate the first fruits of their fields to him. And its summit was always crowned with the cooing of a dove."}, {"start": 3227.98, "end": 3261.0, "b_start": 6420.19, "b_end": 6488.32, "orig": "Autrefois, je ne m’attardais pas dans le bois consacré qui l’entourait, car, avant de monter lire, j’entrais dans le petit cabinet de repos que mon oncle Adolphe, un frère de mon grand-père, ancien militaire qui avait pris sa retraite comme commandant, occupait au rez-de-chaussée, et qui, même quand les fenêtres ouvertes laissaient entrer la chaleur, sinon les rayons du soleil qui atteignaient rarement jusque-là, dégageait inépuisablement cette odeur obscure et fraîche, à la fois forestière et ancien régime, qui fait rêver longuement les narines quand on pénètre dans certains pavillons de chasse abandonnés.", "en": "In the past, I did not linger in the consecrated woods that surrounded it, because, before going up to read, I entered the small resting room that my uncle Adolphe, a brother of my grandfather, a former soldier who had retired as a commander, occupied on the ground floor, and which, even when the windows were open let in the heat, if not the rays of the sun which rarely reached there, inexhaustibly gave off this dark and fresh smell, both forestry and old regime, which makes one's nostrils dream for a long time when one enters certain abandoned hunting lodges."}, {"start": 3262.0, "end": 3285.81, "b_start": 6488.32, "b_end": 6537.17, "orig": "Mais depuis nombre d’années je n’entrais plus dans le cabinet de mon oncle Adolphe, ce dernier ne venant plus à Combray à cause d’une brouille qui était survenue entre lui et ma famille, par ma faute, dans les circonstances suivantes :\nUne ou deux fois par mois, à Paris, on m’envoyait lui faire une visite, comme il finissait de déjeuner, en simple vareuse, servi par son domestique en veste de travail de coutil rayé violet et blanc.", "en": "But for a number of years I had no longer entered my uncle Adolphe's office, the latter no longer coming to Combray because of a quarrel which had arisen between him and my family, through my fault, in the following circumstances: Once or twice a month, in Paris, I was sent to visit him, as he was finishing lunch, in a simple tunic, served by his servant in a purple and white striped ticking work jacket."}, {"start": 3286.81, "end": 3330.22, "b_start": 6537.17, "b_end": 6630.35, "orig": "Il se plaignait en ronchonnant que je n’étais pas venu depuis longtemps, qu’on l’abandonnait ; il m’offrait un massepain ou une mandarine, nous traversions un salon dans lequel on ne s’arrêtait jamais, où on ne faisait jamais de feu, dont les murs étaient ornés de moulures dorées, les plafonds peints d’un bleu qui prétendait imiter le ciel et les meubles capitonnés en satin comme chez mes grands-parents, mais jaune ; puis nous passions dans ce qu’il appelait son cabinet de « travail » aux murs duquel étaient accrochées de ces gravures représentant sur fond noir une déesse charnue et rose conduisant un char, montée sur un globe, ou une étoile au front, qu’on aimait sous le second Empire parce qu’on leur trouvait un air pompéien, puis qu’on détesta, et qu’on recommence à aimer pour une seule et même raison, malgré les autres qu’on donne, et qui est qu’elles ont l’air second Empire.", "en": "He complained grumblingly that I hadn’t come for a long time, that he was being abandoned; he would offer me a marzipan or a tangerine, we walked through a living room in which we never stopped, where we never lit a fire, whose walls were decorated with gilded moldings, the ceilings painted a blue that pretended to imitate the sky and the furniture upholstered in satin like my grandparents', but yellow; then we passed into what he called his \"work\" office, on the walls of which were hung these engravings representing on a black background a fleshy and pink goddess driving a chariot, mounted on a globe, or a star on her forehead, which we loved under the Second Empire because we found in them a Pompeian air, then which we hated, and which we begin to love again for one and the same reason, despite the others that we give, and which is that they seem second Empire."}, {"start": 3331.22, "end": 3339.36, "b_start": 6630.35, "b_end": 6647.06, "orig": "Et je restais avec mon oncle jusqu’à ce que son valet de chambre vînt lui demander, de la part du cocher, pour quelle heure celui-ci devait atteler.", "en": "And I stayed with my uncle until his valet came to ask him, on behalf of the coachman, what time he should hitch up."}, {"start": 3340.36, "end": 3351.3, "b_start": 6647.06, "b_end": 6670.52, "orig": "Mon oncle se plongeait alors dans une méditation qu’aurait craint de troubler d’un seul mouvement son valet de chambre émerveillé, et dont il attendait avec curiosité le résultat, toujours identique.", "en": "My uncle then immersed himself in a meditation that his amazed valet would have feared to disturb with a single movement, and of which he awaited with curiosity the result, always identical."}, {"start": 3352.3, "end": 3387.37, "b_start": 6670.52, "b_end": 6743.71, "orig": "Enfin, après une hésitation suprême, mon oncle prononçait infailliblement ces mots : « Deux heures et quart », que le valet de chambre répétait avec étonnement, mais sans discuter : « Deux heures et quart ? bien...je vais le dire... »\nÀ cette époque j’avais l’amour du théâtre, amour platonique, car mes parents ne m’avaient encore jamais permis d’y aller, et je me représentais d’une façon si peu exacte les plaisirs qu’on y goûtait que je n’étais pas éloigné de croire que chaque spectateur regardait comme dans un stéréoscope un décor qui n’était que pour lui, quoique semblable au millier d’autres que regardait, chacun pour soi, le reste des spectateurs.", "en": "Finally, after a supreme hesitation, my uncle unerringly uttered these words: “A quarter past two,” which the valet repeated with astonishment, but without discussion: “A quarter past two? well...I'll say it...\" At that time I had a love of the theater, a platonic love, because my parents had never allowed me to go there, and I represented to myself in such an inaccurate way the pleasures that one tasted there that I was not far from believing that each spectator looked like in a stereoscope at a set which was only for him, although similar to the thousand others that the rest of the spectators looked at, each for himself."}, {"start": 3388.37, "end": 3393.58, "b_start": 6743.71, "b_end": 6755.03, "orig": "Tous les matins je courais jusqu’à la colonne Moriss pour voir les spectacles qu’elle annonçait.", "en": "Every morning I ran to the Moriss column to see the shows it announced."}, {"start": 3394.58, "end": 3410.3, "b_start": 6755.03, "b_end": 6788.93, "orig": "Rien n’était plus désintéressé et plus heureux que les rêves offerts à mon imagination par chaque pièce annoncée, et qui étaient conditionnés à la fois par les images inséparables des mots qui en composaient le titre et aussi de la couleur des affiches encore humides et boursouflées de colle sur lesquelles il se détachait.", "en": "Nothing was more disinterested and happier than the dreams offered to my imagination by each piece announced, and which were conditioned both by the inseparable images of the words which composed the title and also by the color of the posters, still damp and blistered with glue, on which it stood out."}, {"start": 3411.3, "end": 3471.32, "b_start": 6788.93, "b_end": 6906.47, "orig": "Si ce n’est une de ces œuvres étranges comme\nle Testament de César Girodot\net\nOedipe-Roi\nlesquelles s’inscrivaient, non sur l’affiche verte de l’Opéra-Comique, mais sur l’affiche lie de vin de la Comédie-Française, rien ne me paraissait plus différent de l’aigrette étincelante et blanche des\nDiamants de la Couronne\nque le satin lisse et mystérieux du\nDomino Noir\n, et, mes parents m’ayant dit que quand j’irais pour la première fois au théâtre j’aurais à choisir entre ces deux pièces, cherchant à approfondir successivement le titre de l’une et le titre de l’autre, puisque c’était tout ce que je connaissais d’elles, pour tâcher de saisir en chacun le plaisir qu’il me promettait et de le comparer à celui que recélait l’autre, j’arrivais à me représenter avec tant de force, d’une part une pièce éblouissante et fière, de l’autre une pièce douce et veloutée, que j’étais aussi incapable de décider laquelle aurait ma préférence, que si, pour le dessert, on m’avait donné à opter entre du riz à l’Impératrice et de la crème au chocolat.", "en": "If it is not one of those strange works like the Testament of César Girodot and Oedipe-Roi which were inscribed, not on the green poster of the Opéra-Comique, but on the wine-colored poster of the Comédie-Française, nothing seemed more different to me from the sparkling and white egret of Les Diamants de la Couronne than the smooth and mysterious satin of Domino Noir, and, my parents having told me that when I went to the theater for the first time I would have to choose between these two plays, seeking to successively delve into the title of one and the title of the other, since that was all I knew about them, to try to grasp in each the pleasure that it promised me and to compare it to that which the other concealed, I managed to imagine with so much force, on the one hand a dazzling and proud play, on the other a soft and gentle play. velvety, that I was as incapable of deciding which one I would prefer as if, for dessert, I had been given the choice between rice à la Empress and chocolate cream."}, {"start": 3472.32, "end": 3484.3, "b_start": 6906.47, "b_end": 6931.22, "orig": "Toutes mes conversations avec mes camarades portaient sur ces acteurs dont l’art, bien qu’il me fût encore inconnu, était la première forme, entre toutes celles qu’il revêt, sous laquelle se laissait pressentir par moi l’Art.", "en": "All my conversations with my comrades focused on these actors whose art, although it was still unknown to me, was the first form, among all those it takes, in which Art could be sensed by me."}, {"start": 3485.3, "end": 3494.18, "b_start": 6931.22, "b_end": 6950.75, "orig": "Entre la manière que l’un ou l’autre avait de débiter, de nuancer une tirade, les différences les plus minimes me semblaient avoir une importance incalculable.", "en": "Between the way one or the other had of delivering, of qualifying a tirade, the most minimal differences seemed to me to have incalculable importance."}, {"start": 3495.18, "end": 3506.82, "b_start": 6950.75, "b_end": 6976.42, "orig": "Et, d’après ce que l’on m’avait dit d’eux, je les classais par ordre de talent, dans des listes que je me récitais toute la journée, et qui avaient fini par durcir dans mon cerveau et par le gêner de leur inamovibilité.", "en": "And, according to what I had been told about them, I classified them in order of talent, in lists that I recited to myself all day, and which had ended up hardening in my brain and bothering it with their immovability."}, {"start": 3507.82, "end": 3525.7, "b_start": 6976.42, "b_end": 7012.76, "orig": "Plus tard, quand je fus au collège, chaque fois que pendant les classes je correspondais, aussitôt que le professeur avait la tête tournée, avec un nouvel ami, ma première question était toujours pour lui demander s’il était déjà allé au théâtre et s’il trouvait que le plus grand acteur était bien Got, le second Delaunay, etc.", "en": "Later, when I was at college, every time during classes I corresponded, as soon as the professor's head was turned, with a new friend, my first question was always to ask him if he had ever been to the theater and if he thought that the greatest actor was indeed Got, the second Delaunay, etc."}, {"start": 3526.7, "end": 3549.35, "b_start": 7012.76, "b_end": 7060.66, "orig": "Et si, à son avis, Febvre ne venait qu’après Thiron, ou Delaunay qu’après Coquelin, la soudaine motilité que Coquelin, perdant la rigidité de la pierre, contractait dans mon esprit pour y passer au deuxième rang, et l’agilité miraculeuse, la féconde animation dont se voyait doué Delaunay pour reculer au quatrième, rendait la sensation du fleurissement et de la vie à mon cerveau assoupli et fertilisé.", "en": "And if, in his opinion, Febvre only came after Thiron, or Delaunay only after Coquelin, the sudden motility that Coquelin, losing the rigidity of stone, contracted in my mind to move to second place, and the miraculous agility, the fertile animation with which Delaunay saw himself gifted to move back to fourth, returned the sensation of flowering and life to my softened and fertilized brain."}, {"start": 3550.35, "end": 3577.02, "b_start": 7060.66, "b_end": 7116.92, "orig": "Mais si les acteurs me préoccupaient ainsi, si la vue de Maubant sortant un après-midi du Théâtre-Français m’avait causé le saisissement et les souffrances de l’amour, combien le nom d’une étoile flamboyant à la porte d’un théâtre, combien, à la glace d’un coupé qui passait dans la rue avec ses chevaux fleuris de roses au frontail, la vue du visage d’une femme que je pensais être peut-être une actrice laissait en moi un trouble plus prolongé, un effort impuissant et douloureux pour me représenter sa vie.", "en": "But if the actors preoccupied me in this way, if the sight of Maubant leaving the Théâtre-Français one afternoon had caused me the shock and suffering of love, how much the name of a star flaming at the door of a theater, how much, in the mirror of a coupe passing in the street with its horses flowered with roses on their foreheads, the sight of the face of a woman who I thought was perhaps an actress left in me a more prolonged disturbance, a impotent and painful effort to represent his life to me."}, {"start": 3578.02, "end": 3595.46, "b_start": 7116.92, "b_end": 7154.23, "orig": "Je classais par ordre de talent les plus illustres : Sarah Bernhardt, la Berma, Bartet, Madeleine Brohan, Jeanne Samary, mais toutes m’intéressaient. Or mon oncle en connaissait beaucoup et aussi des cocottes que je ne distinguais pas nettement des actrices. Il les recevait chez lui.", "en": "I ranked the most famous in order of talent: Sarah Bernhardt, la Berma, Bartet, Madeleine Brohan, Jeanne Samary, but they all interested me. Now my uncle knew a lot of them and also some cocottes that I couldn't clearly distinguish from actresses. He received them at his home."}, {"start": 3596.46, "end": 3624.4, "b_start": 7154.23, "b_end": 7214.56, "orig": "Et si nous n’allions le voir qu’à certains jours c’est que, les autres jours, venaient des femmes avec lesquelles sa famille n’aurait pas pu se rencontrer, du moins à son avis à elle, car, pour mon oncle, au contraire, sa trop grande facilité à faire à de jolies veuves qui n’avaient peut-être jamais été mariées, à des comtesses de nom ronflant, qui n’était sans doute qu’un nom de guerre, la politesse de les présenter à ma grand’mère ou même à leur donner des bijoux de famille, l’avait déjà brouillé plus d’une fois avec mon grand-père.", "en": "And if we only went to see him on certain days it was because, on other days, women came with whom his family would not have been able to meet, at least in her opinion, because, for my uncle, on the contrary, his too great ease in dealing with pretty widows who had perhaps never been married, with countesses with high-sounding names, which was undoubtedly only a nom de guerre, the politeness of introducing them to my grandmother or even to giving them family jewels, had already caused disagreements with my grandfather more than once."}, {"start": 3625.4, "end": 3651.8, "b_start": 7214.56, "b_end": 7268.86, "orig": "Souvent, à un nom d’actrice qui venait dans la conversation, j’entendais mon père dire à ma mère, en souriant : « Une amie de ton oncle » ; et je pensais que le stage que peut-être pendant des années des hommes importants faisaient inutilement à la porte de telle femme qui ne répondait pas à leurs lettres et les faisait chasser par le concierge de son hôtel, mon oncle aurait pu en dispenser un gamin comme moi en le présentant chez lui à l’actrice, inapprochable à tant d’autres, qui était pour lui une intime amie.", "en": "Often, when the name of an actress came up in conversation, I heard my father say to my mother, smiling: “A friend of your uncle”; and I thought that the training that perhaps for years important men did in vain at the door of such a woman who did not answer their letters and had them chased away by the concierge of her hotel, my uncle could have spared a kid like me by introducing him at home to the actress, unapproachable to so many others, who was for him an intimate friend."}, {"start": 3652.8, "end": 3674.06, "b_start": 7268.86, "b_end": 7314.9, "orig": "Aussi – sous le prétexte qu’une leçon qui avait été déplacée tombait maintenant si mal qu’elle m’avait empêché plusieurs fois et m’empêcherait encore de voir mon oncle – un jour, autre que celui qui était réservé aux visites que nous lui faisions, profitant de ce que mes parents avaient déjeuné de bonne heure, je sortis et au lieu d’aller regarder la colonne d’affiches, pour quoi on me laissait aller seul, je courus jusqu’à lui.", "en": "So - under the pretext that a lesson which had been moved was now so bad that it had prevented me several times and would continue to prevent me from seeing my uncle - one day, other than the one which was reserved for the visits we made to him, taking advantage of the fact that my parents had had an early lunch, I went out and instead of going to look at the column of posters, for which I was allowed to go alone, I ran up to him."}, {"start": 3675.06, "end": 3689.73, "b_start": 7314.9, "b_end": 7347.22, "orig": "Je remarquai devant sa porte une voiture attelée de deux chevaux qui avaient aux œillères un œillet rouge comme avait le cocher à sa boutonnière. De l’escalier j’entendis un rire et une voix de femme, et dès que j’eus sonné, un silence, puis le bruit de portes qu’on fermait.", "en": "I noticed in front of his door a carriage drawn by two horses who had a red carnation on their blinkers like the coachman had in his buttonhole. From the stairs I heard laughter and a woman's voice, and as soon as I rang the bell, a silence, then the sound of doors being closed."}, {"start": 3690.73, "end": 3709.42, "b_start": 7347.22, "b_end": 7385.8, "orig": "Le valet de chambre vint ouvrir, et en me voyant parut embarrassé, me dit que mon oncle était très occupé, ne pourrait sans doute pas me recevoir, et, tandis qu’il allait pourtant le prévenir, la même voix que j’avais entendue disait : « Oh, si ! laisse-le entrer ; rien qu’une minute, cela m’amuserait tant.", "en": "The valet came to open the door, and on seeing me seemed embarrassed, told me that my uncle was very busy, would probably not be able to receive me, and, while he was going to warn him, the same voice that I had heard said: “Oh, yes! let him in; just for a minute, it would amuse me so much."}, {"start": 3710.42, "end": 3728.33, "b_start": 7385.8, "b_end": 7421.45, "orig": "Sur la photographie qui est sur ton bureau, il ressemble tant à sa maman, ta nièce, dont la photographie est à côté de la sienne, n’est-ce pas ? Je voudrais le voir rien qu’un instant, ce gosse. »\nJ’entendis mon oncle grommeler, se fâcher ; finalement le valet de chambre me fit entrer.", "en": "In the photograph on your desk, he looks so much like his mother, your niece, whose photograph is next to his, right? I would like to see him for just a moment, this kid. » I heard my uncle grumbling, getting angry; finally the valet let me in."}, {"start": 3729.33, "end": 3743.3, "b_start": 7421.45, "b_end": 7451.24, "orig": "Sur la table, il y avait la même assiette de massepains que d’habitude ; mon oncle avait sa vareuse de tous les jours, mais en face de lui, en robe de soie rose avec un grand collier de perles au cou, était assise une jeune femme qui achevait de manger une mandarine.", "en": "On the table there was the same plate of marzipans as usual; my uncle had on his everyday jacket, but opposite him, in a pink silk dress with a large pearl necklace around his neck, sat a young woman who was finishing eating a tangerine."}, {"start": 3744.3, "end": 3754.38, "b_start": 7451.24, "b_end": 7473.96, "orig": "L’incertitude où j’étais s’il fallait dire madame ou mademoiselle me fit rougir et, n’osant pas trop tourner les yeux de son côté de peur d’avoir à lui parler, j’allai embrasser mon oncle.", "en": "The uncertainty I was in whether to say madame or miss made me blush and, not daring to turn my eyes too far in his direction for fear of having to speak to him, I went to kiss my uncle."}, {"start": 3755.38, "end": 3786.17, "b_start": 7473.96, "b_end": 7537.45, "orig": "Elle me regardait en souriant, mon oncle lui dit : « Mon neveu », sans lui dire mon nom, ni me dire le sien, sans doute parce que, depuis les difficultés qu’il avait eues avec mon grand-père, il tâchait autant que possible d’éviter tout trait d’union entre sa famille et ce genre de relations.\n– Comme il ressemble à sa mère, dit-elle.\n– Mais vous n’avez jamais vu ma nièce qu’en photographie, dit vivement mon oncle d’un ton bourru.\n– Je vous demande pardon, mon cher ami, je l’ai croisée dans l’escalier l’année dernière quand vous avez été si malade.", "en": "She looked at me smiling, my uncle said to her: “My nephew,” without telling her my name, nor telling me his own, probably because, since the difficulties he had with my grandfather, he tried as much as possible to avoid any link between his family and this type of relationship. “How he looks like his mother,” she said. “But you’ve only ever seen my niece in photographs,” said my uncle quickly, in a gruff tone. – I beg your pardon, my dear friend, I passed her on the stairs last year when you were so ill."}, {"start": 3787.17, "end": 3802.6, "b_start": 7537.45, "b_end": 7569.94, "orig": "Il est vrai que je ne l’ai vue que le temps d’un éclair et que votre escalier est bien noir, mais cela m’a suffi pour l’admirer. Ce petit jeune homme a ses beaux yeux et aussi\nça\n, dit-elle, en traçant avec son doigt une ligne sur le bas de son front.", "en": "It is true that I only saw it for a flash and that your staircase is very dark, but that was enough for me to admire it. This little young man has his beautiful eyes and also this, she said, tracing a line with her finger on the bottom of his forehead."}, {"start": 3803.6, "end": 3817.83, "b_start": 7569.94, "b_end": 7601.92, "orig": "Est-ce que madame votre nièce porte le même nom que vous, ami ? demanda-t-elle à mon oncle.\n– Il ressemble surtout à son père, grogna mon oncle qui ne se souciait pas plus de faire des présentations à distance en disant le nom de maman que d’en faire de près.", "en": "Does your niece have the same name as you, friend? she asked my uncle. “He especially looks like his father,” grumbled my uncle, who didn’t care any more about making introductions from a distance, saying Mom’s name, than about making them up close."}, {"start": 3818.83, "end": 3834.98, "b_start": 7601.92, "b_end": 7635.43, "orig": "C’est tout à fait son père et aussi ma pauvre mère.\n– Je ne connais pas son père, dit la dame en rose avec une légère inclinaison de tête, et je n’ai jamais connu votre pauvre mère, mon ami. Vous vous souvenez, c’est peu après votre grand chagrin que nous nous sommes connus.", "en": "He is absolutely his father and also my poor mother. “I don’t know her father,” said the lady in pink with a slight inclination of her head, “and I never knew your poor mother, my friend. You remember, it was shortly after your great sorrow that we met."}, {"start": 3835.98, "end": 3847.48, "b_start": 7635.43, "b_end": 7661.15, "orig": "J’éprouvais une petite déception, car cette jeune dame ne différait pas des autres jolies femmes que j’avais vues quelquefois dans ma famille, notamment de la fille d’un de nos cousins chez lequel j’allais tous les ans le premier janvier.", "en": "I felt a little disappointed, because this young lady was no different from the other pretty women I had sometimes seen in my family, notably the daughter of one of our cousins ​​to whom I went every year on January 1st."}, {"start": 3848.48, "end": 3854.94, "b_start": 7661.15, "b_end": 7675.97, "orig": "Mieux habillée seulement, l’amie de mon oncle avait le même regard vif et bon, elle avait l’air aussi franc et aimant.", "en": "Only better dressed, my uncle's friend had the same lively and good look, she seemed just as frank and loving."}, {"start": 3855.94, "end": 3865.32, "b_start": 7675.97, "b_end": 7697.29, "orig": "Je ne lui trouvais rien de l’aspect théâtral que j’admirais dans les photographies d’actrices, ni de l’expression diabolique qui eût été en rapport avec la vie qu’elle devait mener.", "en": "I found nothing in her of the theatrical aspect that I admired in photographs of actresses, nor of the diabolical expression that would have been in keeping with the life she must have led."}, {"start": 3866.32, "end": 3879.83, "b_start": 7697.29, "b_end": 7726.15, "orig": "J’avais peine à croire que ce fût une cocotte et surtout je n’aurais pas cru que ce fût une cocotte chic si je n’avais pas vu la voiture à deux chevaux, la robe rose, le collier de perles, si je n’avais pas su que mon oncle n’en connaissait que de la plus haute volée.", "en": "I could hardly believe that it was a casserole and above all I would not have believed that it was a chic casserole if I had not seen the two-horse carriage, the pink dress, the pearl necklace, if I had not known that my uncle only knew the highest class."}, {"start": 3880.83, "end": 3890.91, "b_start": 7726.15, "b_end": 7747.67, "orig": "Mais je me demandais comment le millionnaire qui lui donnait sa voiture et son hôtel et ses bijoux pouvait avoir du plaisir à manger sa fortune pour une personne qui avait l’air si simple et comme il faut.", "en": "But I wondered how the millionaire who gave him his car and his hotel and his jewelry could have any pleasure in eating away his fortune for a person who seemed so simple and decent."}, {"start": 3891.91, "end": 3923.9, "b_start": 7747.67, "b_end": 7815.7, "orig": "Et pourtant, en pensant à ce que devait être sa vie, l’immoralité m’en troublait peut-être plus que si elle avait été concrétisée devant moi en une apparence spéciale – d’être ainsi invisible comme le secret de quelque roman, de quelque scandale qui avait fait sortir de chez ses parents bourgeois et voué à tout le monde, qui avait fait épanouir en beauté et haussé jusqu’au demi-monde et à la notoriété, celle que ses jeux de physionomie, ses intonations de voix, pareils à tant d’autres que je connaissais déjà, me faisaient malgré moi considérer comme une jeune fille de bonne famille, qui n’était plus d’aucune famille.", "en": "And yet, thinking about what his life must have been, the immorality disturbed me perhaps more than if it had been concretized before me in a special appearance - to be thus invisible like the secret of some novel, of some scandal which had brought out from among its bourgeois parents and devoted to everyone, which had made it blossom in beauty and rise to the demi-monde and to the notoriety, that which its plays of physiognomy, its intonations voices, like so many others that I already knew, made me, despite myself, consider myself a young girl from a good family, who was no longer from any family."}, {"start": 3924.9, "end": 3941.25, "b_start": 7815.7, "b_end": 7848.28, "orig": "On était passé dans le « cabinet de travail », et mon oncle, d’un air un peu gêné par ma présence, lui offrit des cigarettes.\n– Non, dit-elle, cher, vous savez que je suis habituée à celles que le grand-duc m’envoie. Je lui ai dit que vous en étiez jaloux.", "en": "We went into the “work room,” and my uncle, looking a little embarrassed by my presence, offered him some cigarettes. – No, she said, dear, you know that I am used to those that the Grand Duke sends me. I told him you were jealous."}, {"start": 3942.25, "end": 3957.22, "b_start": 7848.28, "b_end": 7879.61, "orig": "Et elle tira d’un étui des cigarettes couvertes d’inscriptions étrangères et dorées. « Mais si, reprit-elle tout d’un coup, je dois avoir rencontré chez vous le père de ce jeune homme. N’est-ce pas votre neveu ? Comment ai-je pu l’oublier ?", "en": "And she took cigarettes covered with foreign and gold inscriptions from a case. “But yes,” she continued suddenly, “I must have met this young man’s father at your house. Isn’t that your nephew? How could I have forgotten it?"}, {"start": 3958.22, "end": 3963.94, "b_start": 7879.61, "b_end": 7892.44, "orig": "Il a été tellement bon, tellement exquis pour moi », dit-elle d’un air modeste et sensible.", "en": "He was so good, so exquisite to me,” she says with a modest and sensitive air."}, {"start": 3964.94, "end": 3982.77, "b_start": 7892.44, "b_end": 7929.6, "orig": "Mais en pensant à ce qu’avait pu être l’accueil rude, qu’elle disait avoir trouvé exquis, de mon père, moi qui connaissais sa réserve et sa froideur, j’étais gêné, comme par une indélicatesse qu’il aurait commise, de cette inégalité entre la reconnaissance excessive qui lui était accordée et son amabilité insuffisante.", "en": "But thinking of what the harsh welcome, which she said she found exquisite, from my father might have been like, I, who knew his reserve and his coldness, was embarrassed, as if by an indelicacy that he had committed, by this inequality between the excessive recognition granted to him and his insufficient kindness."}, {"start": 3983.77, "end": 4005.7, "b_start": 7929.6, "b_end": 7976.56, "orig": "Il m’a semblé plus tard que c’était un des côtés touchants du rôle de ces femmes oisives et studieuses, qu’elles consacrent leur générosité, leur talent, un rêve disponible de beauté sentimentale – car, comme les artistes, elles ne le réalisent pas, ne le font pas entrer dans le cadre de l’existence commune – et un or qui leur coûte peu, à enrichir d’un sertissage précieux et fin la vie fruste et mal dégrossie des hommes.", "en": "It seemed to me later that this was one of the touching aspects of the role of these idle and studious women, that they devote their generosity, their talent, an available dream of sentimental beauty – because, like artists, they do not realize it, do not bring it into the framework of common existence – and a gold which costs them little, to enrich with a precious and fine setting the crude and rough-hewn life of men."}, {"start": 4006.7, "end": 4040.69, "b_start": 7976.56, "b_end": 8046.1, "orig": "Comme celle-ci, dans le fumoir où mon oncle était en vareuse pour la recevoir, répandait son corps si doux, sa robe de soie rose, ses perles, l’élégance qui émane de l’amitié d’un grand-duc, de même elle avait pris quelque propos insignifiant de mon père, elle l’avait travaillé avec délicatesse, lui avait donné un tour, une appellation précieuse et y enchâssant un de ses regards d’une si belle eau, nuancé d’humilité et de gratitude, elle le rendait changé en un bijou artiste, en quelque chose de « tout à fait exquis ».\n– Allons, voyons, il est l’heure que tu t’en ailles, me dit mon oncle.", "en": "Just as she, in the smoking room where my uncle was in his jacket to receive her, spread her soft body, her pink silk dress, her pearls, the elegance that emanates from the friendship of a grand duke, so she had taken some insignificant remark from my father, she had worked on it with delicacy, had given it a turn, a precious name and embedding one of her looks of such beautiful water, nuanced with humility and gratitude, she made him change in an artistic gem, into something “utterly exquisite.” “Come on, it’s time for you to go,” my uncle said to me."}, {"start": 4041.69, "end": 4050.28, "b_start": 8046.1, "b_end": 8065.19, "orig": "Je me levai, j’avais une envie irrésistible de baiser la main de la dame en rose, mais il me semblait que c’eût été quelque chose d’audacieux comme un enlèvement.", "en": "I stood up, I had an irresistible desire to kiss the hand of the lady in pink, but it seemed to me that it would have been something as daring as kidnapping."}, {"start": 4051.28, "end": 4060.78, "b_start": 8065.19, "b_end": 8084.74, "orig": "Mon cœur battait tandis que je me disais : « Faut-il le faire, faut-il ne pas le faire », puis je cessai de me demander ce qu’il fallait faire pour pouvoir faire quelque chose.", "en": "My heart pounded as I thought to myself, “Should we do it, should we not do it,” and then I stopped wondering what I had to do to be able to do something."}, {"start": 4061.78, "end": 4077.19, "b_start": 8084.74, "b_end": 8117.84, "orig": "Et d’un geste aveugle et insensé, dépouillé de toutes les raisons que je trouvais il y avait un moment en sa faveur, je portai à mes lèvres la main qu’elle me tendait.\n– Comme il est gentil ! il est déjà galant, il a un petit œil pour les femmes : il tient de son oncle.", "en": "And with a blind and senseless gesture, stripped of all the reasons that I found a moment ago in her favor, I brought to my lips the hand she held out to me. – How nice he is! he is already gallant, he has a little eye for women: he takes after his uncle."}, {"start": 4078.19, "end": 4095.18, "b_start": 8117.84, "b_end": 8149.85, "orig": "Ce sera un parfait gentleman, ajouta-t-elle en serrant les dents pour donner à la phrase un accent légèrement britannique. Est-ce qu’il ne pourrait pas venir une fois prendre\na cup of tea\n, comme disent nos voisins les Anglais ; il n’aurait qu’à m’envoyer un « bleu » le matin.", "en": "He will be a perfect gentleman, she added, gritting her teeth to give the sentence a slightly British accent. Couldn't he come once for a cup of tea, as our English neighbors say; he would just have to send me a “blue” in the morning."}, {"start": 4096.18, "end": 4099.28, "b_start": 8149.85, "b_end": 8156.99, "orig": "Je ne savais pas ce que c’était qu’un « bleu ».", "en": "I didn’t know what a “blue” was."}, {"start": 4100.28, "end": 4119.94, "b_start": 8156.99, "b_end": 8199.0, "orig": "Je ne comprenais pas la moitié des mots que disait la dame, mais la crainte que n’y fut cachée quelque question à laquelle il eût été impoli de ne pas répondre, m’empêchait de cesser de les écouter avec attention, et j’en éprouvais une grande fatigue.\n– Mais non, c’est impossible, dit mon oncle, en haussant les épaules, il est très tenu, il travaille beaucoup.", "en": "I did not understand half of the words the lady was saying, but the fear that some question might be hidden there which it would have been impolite not to answer, prevented me from stopping listening to them attentively, and I felt very tired as a result. “But no, it’s impossible,” said my uncle, shrugging his shoulders, “he’s very busy, he works a lot."}, {"start": 4120.94, "end": 4127.94, "b_start": 8199.0, "b_end": 8215.57, "orig":
