": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "La haie laissait voir à l’intérieur du parc une allée bordée de jasmins, de pensées et de verveines entre lesquelles des giroflées ouvraient leurs bourses fraîches du rose odorant et passé d’un cuir ancien de Cordoue, tandis que sur le gravier un long tuyau d’arrosage peint en vert, déroulant ses circuits, dressait aux points où il était percé au-dessus des fleurs, dont il imbibait les parfums, l’éventail vertical et prismatique de ses gouttelettes multicolores.", "en": "The hedge revealed inside the park an avenue lined with jasmines, pansies and verbenas between which wallflowers opened their fresh purses of fragrant pink and faded with old Cordoba leather, while on the gravel a long watering hose painted green, unwinding its circuits, raised at the points where it was pierced above the flowers, whose perfumes it imbibed, the vertical and prismatic fan of its Multi-colored droplets."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Tout à coup, je m’arrêtai, je ne pus plus bouger, comme il arrive quand une vision ne s’adresse pas seulement à nos regards, mais requiert des perceptions plus profondes et dispose de notre être tout entier.", "en": "Suddenly I stopped, I could no longer move, as happens when a vision is not only addressed to our gaze, but requires deeper perceptions and disposes of our entire being."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Une fillette d’un blond roux, qui avait l’air de rentrer de promenade et tenait à la main une bêche de jardinage, nous regardait, levant son visage semé de taches roses.", "en": "A little red-blond girl, who looked like she had just returned from a walk and was holding a gardening spade in her hand, looked at us, raising her face strewn with pink spots."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ses yeux noirs brillaient et, comme je ne savais pas alors, ni ne l’ai appris depuis, réduire en ses éléments objectifs une impression forte, comme je n’avais pas, ainsi qu’on dit, assez « d’esprit d’observation » pour dégager la notion de leur couleur, pendant longtemps, chaque fois que je repensai à elle, le souvenir de leur éclat se présentait aussitôt à moi comme celui d’un vif azur, puisqu’elle était blonde : de sorte que, peut-être si elle n’avait pas eu des yeux aussi noirs – ce qui frappait tant la première fois qu’on la voyait – je n’aurais pas été, comme je le fus, plus particulièrement amoureux, en elle, de ses yeux bleus.", "en": "Her black eyes shone and, as I did not know then, nor have I learned since, how to reduce a strong impression into its objective elements, as I did not have, as they say, enough \"spirit of observation\" to discern the notion of their color, for a long time, each time I thought of her, the memory of their brilliance immediately presented itself to me as that of a bright azure, since she was blonde: so that, perhaps if she had not had eyes so black - which was so striking the first time we saw her - I would not have been, as I was, more particularly in love, in her, with her blue eyes."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je la regardai, d’abord de ce regard qui n’est pas que le porte-parole des yeux, mais à la fenêtre duquel se penchent tous les sens, anxieux et pétrifiés, le regard qui voudrait toucher, capturer, emmener le corps qu’il regarde et l’âme avec lui ; puis, tant j’avais peur que d’une seconde à l’autre mon grand-père et mon père, apercevant cette jeune fille, me fissent éloigner en me disant de courir un peu devant eux, d’un second regard, inconsciemment supplicateur, qui tâchait de la forcer à faire attention à moi, à me connaître !", "en": "I looked at her, first with that look which is not only the mouthpiece of the eyes, but at the window of which all the senses lean, anxious and petrified, the look which would like to touch, capture, take the body it looks at and the soul with it; then, so afraid was I that from one second to the next my grandfather and my father, seeing this young girl, would make me move away, telling me to run a little ahead of them, with a second glance, unconsciously pleading, which tried to force her to pay attention to me, to know me!"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Elle jeta en avant et de côté ses pupilles pour prendre connaissance de mon grand’père et de mon père, et sans doute l’idée qu’elle en rapporta fut celle que nous étions ridicules, car elle se détourna, et d’un air indifférent et dédaigneux, se plaça de côté pour épargner à son visage d’être dans leur champ visuel ; et tandis que continuant à marcher et ne l’ayant pas aperçue, ils m’avaient dépassé, elle laissa ses regards filer de toute leur longueur dans ma direction, sans expression particulière, sans avoir l’air de me voir, mais avec une fixité et un sourire dissimulé, que je ne pouvais interpréter d’après les notions que l’on m’avait données sur la bonne éducation que comme une preuve d’outrageant mépris ; et sa main esquissait en même temps un geste indécent, auquel quand il était adressé en public à une personne qu’on ne connaissait pas, le petit dictionnaire de civilité que je portais en moi ne donnait qu’un seul sens, celui d’une intention insolente.\n– Allons, Gilberte, viens ; qu’est-ce que tu fais, cria d’une voix perçante et autoritaire une dame en blanc que je n’avais pas vue, et à quelque distance de laquelle un monsieur habillé de coutil et que je ne connaissais pas fixait sur moi des yeux qui lui sortaient de la tête ; et cessant brusquement de sourire, la jeune fille prit sa bêche et s’éloigna sans se retourner de mon côté, d’un air docile, impénétrable et sournois.", "en": "She threw her pupils forward and sideways to take note of my grandfather and my father, and doubtless the idea she brought back was that we were ridiculous, for she turned away, and with an indifferent and disdainful air, placed herself aside to spare her face from being in their field of vision; and while continuing to walk and not having noticed her, they had passed me, she let her gaze run full length in my direction, without particular expression, without seeming to see me, but with a fixity and a concealed smile, which I could only interpret according to the notions that I had been given about good education as a proof of outrageous contempt; and his hand made at the same time an indecent gesture, to which when it was addressed in public to a person we did not know, the little dictionary of civility that I carried within me gave only one meaning, that of an insolent intention. – Come on, Gilberte, come; what are you doing, shouted in a piercing and authoritative voice a lady in white whom I had not seen, and at some distance from whom a gentleman dressed in ticking and whom I did not know was staring at me with eyes that were bulging out of his head; and abruptly ceasing to smile, the young girl took her spade and walked away without turning towards me, with a docile, inscrutable and sly air."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ainsi passa près de moi ce nom de Gilberte, donné comme un talisman qui me permettait peut-être de retrouver un jour celle dont il venait de faire une personne et qui, l’instant d’avant, n’était qu’une image incertaine.", "en": "So this name of Gilberte passed near me, given as a talisman which perhaps allowed me to one day find the woman of whom he had just made a person and who, a moment before, was only an uncertain image."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ainsi passa-t-il, proféré au-dessus des jasmins et des giroflées, aigre et frais comme les gouttes de l’arrosoir vert ; imprégnant, irisant la zone d’air pur qu’il avait traversée – et qu’il isolait – du mystère de la vie de celle qu’il désignait pour les êtres heureux qui vivaient, qui voyageaient avec elle ; déployant sous l’épinier rose, à hauteur de mon épaule, la quintessence de leur familiarité, pour moi si douloureuse, avec elle, avec l’inconnu de sa vie où je n’entrerais pas.", "en": "So it passed, uttered over jasmines and wallflowers, sour and fresh as the drops from the green watering can; impregnating, iridescent the area of ​​pure air which he had crossed – and which he isolated – with the mystery of the life of the one which he designated for the happy beings who lived, who traveled with her; unfolding under the pink thorn tree, at the height of my shoulder, the quintessence of their familiarity, so painful for me, with her, with the unknown of her life into which I would not enter."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Un instant (tandis que nous nous éloignions et que mon grand-père murmurait : « Ce pauvre Swann, quel rôle ils lui font jouer : on le fait partir pour qu’elle reste seule avec son Charlus, car c’est lui, je l’ai reconnu !", "en": "A moment (while we were walking away and my grandfather murmured: “This poor Swann, what role they are making him play: they are making him leave so that she can stay alone with her Charlus, because it’s him, I recognized him!"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et cette petite, mêlée à toute cette infamie ! ») l’impression laissée en moi par le ton despotique avec lequel la mère de Gilberte lui avait parlé sans qu’elle répliquât, en me la montrant comme forcée d’obéir à quelqu’un, comme n’étant pas supérieure à tout, calma un peu ma souffrance, me rendit quelque espoir et diminua mon amour.", "en": "And this little one, mixed up in all this infamy! \") the impression left in me by the despotic tone with which Gilberte's mother had spoken to her without her replying, by showing me as if she were forced to obey someone, as not being superior to everything, calmed my suffering a little, gave me some hope and diminished my love."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais bien vite cet amour s’éleva de nouveau en moi comme une réaction par quoi mon cœur humilié voulait se mettre de niveau avec Gilberte ou l’abaisser jusqu’à lui.", "en": "But very quickly this love rose again in me as a reaction by which my humiliated heart wanted to put itself on a level with Gilberte or lower it to him."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je l’aimais, je regrettais de ne pas avoir eu le temps et l’inspiration de l’offenser, de lui faire mal, et de la forcer à se souvenir de moi.", "en": "I loved her, I regretted not having had the time and the inspiration to offend her, to hurt her, and to force her to remember me."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je la trouvais si belle que j’aurais voulu pouvoir revenir sur mes pas, pour lui crier en haussant les épaules : « Comme je vous trouve laide, grotesque, comme vous me répugnez ! » Cependant je m’éloignais, emportant pour toujours, comme premier type d’un bonheur inaccessible aux enfants de mon espèce de par des lois naturelles impossibles à transgresser, l’image d’une petite fille rousse, à la peau semée de taches roses, qui tenait une bêche et qui riait en laissant filer sur moi de longs regards sournois et inexpressifs.", "en": "I found her so beautiful that I would have liked to be able to retrace my steps, to shout to her, shrugging my shoulders: “How ugly, grotesque I find you, how disgusting you are to me! » However, I moved away, taking forever, as the first type of a happiness inaccessible to children of my species by natural laws impossible to transgress, the image of a little red-haired girl, with skin dotted with pink spots, who was holding a spade and who was laughing while letting long, sly and expressionless glances fall on me."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et déjà le charme dont son nom avait encensé cette place sous les épines roses où il avait été entendu ensemble par elle et par moi, allait gagner, enduire, embaumer tout ce qui l’approchait, ses grands-parents que les miens avaient eu l’ineffable bonheur de connaître, la sublime profession d’agent de change, le douloureux quartier des Champs-Élysées qu’elle habitait à Paris.\n« Léonie, dit mon grand-père en rentrant, j’aurais voulu t’avoir avec nous tantôt.", "en": "And already the charm with which her name had incenseed this place under the pink thorns where it had been heard together by her and by me, was going to win over, coat, embalm everything that approached her, her grandparents whom mine had had the ineffable happiness of knowing, the sublime profession of stockbroker, the painful Champs-Élysées district that she lived in Paris. “Leonie,” said my grandfather upon returning, “I would have liked to have had you with us today."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Tu ne reconnaîtrais pas Tansonville. Si j’avais osé, je t’aurais coupé une branche de ces épines roses que tu aimais tant. » Mon grand-père racontait ainsi notre promenade à ma tante Léonie, soit pour la distraire, soit qu’on n’eût pas perdu tout espoir d’arriver à la faire sortir.", "en": "You wouldn't recognize Tansonville. If I had dared, I would have cut you off a branch of those pink thorns that you loved so much. » My grandfather told my aunt Léonie about our walk like this, either to distract her or so that we had not lost all hope of being able to get her out."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Or elle aimait beaucoup autrefois cette propriété, et d’ailleurs les visites de Swann avaient été les dernières qu’elle avait reçues, alors qu’elle fermait déjà sa porte à tout le monde.", "en": "Now she used to love this property very much, and in fact Swann's visits had been the last ones she had received, even though she was already closing her door to everyone."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et de même que, quand il venait maintenant prendre de ses nouvelles (elle était la seule personne de chez nous qu’il demandât encore à voir), elle lui faisait répondre qu’elle était fatiguée, mais qu’elle le laisserait entrer la prochaine fois, de même elle dit ce soir-là : « Oui, un jour qu’il fera beau, j’irai en voiture jusqu’à la porte du parc. » C’est sincèrement qu’elle le disait.", "en": "And just as when he now came to ask about her (she was the only person from our house he still asked to see), she made him reply that she was tired, but that she would let him in next time, so she said that evening: “Yes, one day when the weather is nice, I will go by car to the park gate. » She said it sincerely."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Elle eût aimé revoir Swann et Tansonville ; mais le désir qu’elle en avait suffisait à ce qui lui restait de forces ; sa réalisation les eût excédées.", "en": "She would have liked to see Swann and Tansonville again; but the desire she had for it was enough for what strength she had left; its achievement would have exceeded them."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Quelquefois le beau temps lui rendait un peu de vigueur, elle se levait, s’habillait ; la fatigue commençait avant qu’elle fût passée dans l’autre chambre et elle réclamait son lit.", "en": "Sometimes the good weather gave her a little vigor, she got up and dressed; fatigue began before she had gone into the other room and she asked for her bed."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ce qui avait commencé pour elle – plus tôt seulement que cela n’arrive d’habitude – c’est ce grand renoncement de la vieillesse qui se prépare à la mort, s’enveloppe dans sa chrysalide, et qu’on peut observer, à la fin des vies qui se prolongent tard, même entre les anciens amants qui se sont le plus aimés, entre les amis unis par les liens les plus spirituels, et qui, à partir d’une certaine année cessent de faire le voyage ou la sortie nécessaire pour se voir, cessent de s’écrire et savent qu’ils ne communiqueront plus en ce monde.", "en": "What had begun for her – only earlier than it usually happens – is this great renunciation of old age which prepares itself for death, wraps itself in its chrysalis, and which we can observe, at the end of lives which continue late, even between former lovers who loved each other the most, between friends united by the most spiritual ties, and who, from a certain year onwards cease to make the necessary journey or outing to meet each other. see, stop writing to each other and know that they will no longer communicate in this world."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ma tante devait parfaitement savoir qu’elle ne reverrait pas Swann, qu’elle ne quitterait plus jamais la maison, mais cette réclusion définitive devait lui être rendue assez aisée pour la raison même qui, selon nous, aurait dû la lui rendre plus douloureuse : c’est que cette réclusion lui était imposée par la diminution qu’elle pouvait constater chaque jour dans ses forces, et qui, en faisant de chaque action, de chaque mouvement, une fatigue, sinon une souffrance, donnait pour elle à l’inaction, à l’isolement, au silence, la douceur réparatrice et bénie du repos.", "en": "My aunt must have known perfectly well that she would not see Swann again, that she would never leave the house again, but this definitive seclusion had to be made quite easy for her for the very reason which, according to us, should have made it more painful for her: that this seclusion was imposed on her by the reduction that she could see every day in her strength, and which, by making each action, each movement, a fatigue, if not a suffering, gave for her inaction, isolation, silence, the restorative and blessed sweetness of rest."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ma tante n’alla pas voir la haie d’épines roses, mais à tous moments je demandais à mes parents si elle n’irait pas, si autrefois elle allait souvent à Tansonville, tâchant de les faire parler des parents et grands-parents de M\nlle\nSwann qui me semblaient grands comme des Dieux.", "en": "My aunt did not go to see the hedge of pink thorns, but at all times I asked my parents if she would not go, if in the past she often went to Tansonville, trying to get them to talk about Miss Swann's parents and grandparents who seemed to me as great as gods."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ce nom, devenu pour moi presque mythologique, de Swann, quand je causais avec mes parents, je languissais du besoin de le leur entendre dire, je n’osais pas le prononcer moi-même, mais je les entraînais sur des sujets qui avoisinaient Gilberte et sa famille, qui la concernaient, où je ne me sentais pas exilé trop loin d’elle ; et je contraignais tout d’un coup mon père, en feignant de croire par exemple que la charge de mon grand-père avait été déjà avant lui dans notre famille, ou que la haie d’épines roses que voulait voir ma tante Léonie se trouvait en terrain communal, à rectifier mon assertion, à me dire, comme malgré moi, comme de lui-même : « Mais non, cette charge-là était au père de\nSwann\n, cette haie fait partie du parc de\nSwann\n. » Alors j’étais obligé de reprendre ma respiration, tant, en se posant sur la place où il était toujours écrit en moi, pesait à m’étouffer ce nom qui, au moment où je l’entendais, me paraissait plus plein que tout autre, parce qu’il était lourd de toutes les fois où, d’avance, je l’avais mentalement proféré.", "en": "This name, which had become almost mythological for me, of Swann, when I talked with my parents, I languished with the need to hear them say it, I did not dare to pronounce it myself, but I led them on subjects which were close to Gilberte and her family, which concerned her, where I did not feel exiled too far from her; and I suddenly forced my father, by pretending to believe for example that my grandfather's charge had already been in our family before him, or that the pink thorn hedge that my aunt Léonie wanted to see was on communal land, to correct my assertion, to say to me, as if in spite of myself, as if on his own: \"But no, that charge belonged to Swann's father, this hedge is part of Swann's park. » Then I was obliged to catch my breath, so heavy, as it rested on the place where it was always written in me, was this name which, at the moment I heard it, seemed fuller than any other, because it was heavy with all the times when, in advance, I had mentally uttered it."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il me causait un plaisir que j’étais confus d’avoir osé réclamer à mes parents, car ce plaisir était si grand qu’il avait dû exiger d’eux pour qu’ils me le procurassent beaucoup de peine, et sans compensation, puisqu’il n’était pas un plaisir pour eux.", "en": "It caused me a pleasure that I was ashamed to have dared to ask from my parents, because this pleasure was so great that it must have required a lot of pain from them to provide it for me, and without compensation, since it was not a pleasure for them."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Aussi je détournais la conversation par discrétion. Par scrupule aussi. Toutes les séductions singulières que je mettais dans ce nom de Swann, je les retrouvais en lui dès qu’ils le prononçaient.", "en": "So I diverted the conversation out of discretion. Out of scruple too. All the singular attractions that I put into the name Swann, I found them in him as soon as they pronounced it."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il me semblait alors tout d’un coup que mes parents ne pouvaient pas ne pas les ressentir, qu’ils se trouvaient placés à mon point de vue, qu’ils apercevaient à leur tour, absolvaient, épousaient mes rêves, et j’étais malheureux comme si je les avais vaincus et dépravés.", "en": "It then suddenly seemed to me that my parents could not help but feel them, that they found themselves placed in my point of view, that they in turn saw, absolved, espoused my dreams, and I was unhappy as if I had conquered and depraved them."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Cette année-là, quand, un peu plus tôt que d’habitude, mes parents eurent fixé le jour de rentrer à Paris, le matin du départ, comme on m’avait fait friser pour être photographié, coiffer avec précaution un chapeau que je n’avais encore jamais mis et revêtir une douillette de velours, après m’avoir cherché partout, ma mère me trouva en larmes dans le petit raidillon contigu à Tansonville, en train de dire adieu aux aubépines, entourant de mes bras les branches piquantes, et, comme une princesse de tragédie à qui pèseraient ces vains ornements, ingrat envers l’importune main qui en formant tous ces nœuds avait pris soin sur mon front d’assembler mes cheveux, foulant aux pieds mes papillotes arrachées et mon chapeau neuf.", "en": "That year, when, a little earlier than usual, my parents had set the day to return to Paris, the morning of departure, as I had been made to curl my hair to be photographed, carefully put on a hat that I had never worn before and put on a velvet comforter, after having looked for me everywhere, my mother found me in tears in the little steep path adjoining Tansonville, saying goodbye to the hawthorns, wrapping my arms around the prickly branches, and, like a princess in a tragedy who would be weighed down by these vain ornaments, ungrateful towards the importunate hand which, in forming all these knots, had taken care of gathering my hair on my forehead, trampling underfoot my torn papillotes and my new hat."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ma mère ne fut pas touchée par mes larmes, mais elle ne put retenir un cri à la vue de la coiffe défoncée et de la douillette perdue. Je ne l’entendis pas : « Ô mes pauvres petites aubépines, disais-je en pleurant, ce n’est pas vous qui voudriez me faire du chagrin, me forcer à partir.", "en": "My mother was not touched by my tears, but she could not suppress a cry at the sight of the smashed headdress and the lost comforter. I did not hear him: “O my poor little hawthorns,” I said, crying, “it is not you who would want to make me sad, or force me to leave."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Vous, vous ne m’avez jamais fait de peine !", "en": "You, you have never hurt me!"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Aussi je vous aimerai toujours. » Et, essuyant mes larmes, je leur promettais, quand je serais grand, de ne pas imiter la vie insensée des autres hommes et, même à Paris, les jours de printemps, au lieu d’aller faire des visites et écouter des niaiseries, de partir dans la campagne voir les premières aubépines.", "en": "Also I will always love you. » And, wiping my tears, I promised them, when I grew up, not to imitate the crazy lives of other men and, even in Paris, on spring days, instead of going to visit and listen to nonsense, to go into the countryside to see the first hawthorns."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Une fois dans les champs, on ne les quittait plus pendant tout le reste de la promenade qu’on faisait du côté de Méséglise. Ils étaient perpétuellement parcourus, comme par un chemineau invisible, par le vent qui était pour moi le génie particulier de Combray.", "en": "Once in the fields, we never left them for the rest of the walk we took towards Méséglise. They were perpetually traversed, as if by an invisible path, by the wind which for me was the particular genius of Combray."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Chaque année, le jour de notre arrivée, pour sentir que j’étais bien à Combray, je montais le retrouver qui courait dans les sayons et me faisait courir à sa suite.", "en": "Every year, on the day of our arrival, to feel that I was at home in Combray, I went up to find him who was running in the sayons and made me run after him."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "On avait toujours le vent à côté de soi du côté de Méséglise, sur cette plaine bombée où pendant des lieues il ne rencontre aucun accident de terrain.", "en": "We always had the wind beside us on the side of Méséglise, on this rounded plain where for leagues there was no uneven terrain."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je savais que M\nlle\nSwann allait souvent à Laon passer quelques jours et, bien que ce fût à plusieurs lieues, la distance se trouvant compensée par l’absence de tout obstacle, quand, par les chauds après-midi, je voyais un même souffle, venu de l’extrême horizon, abaisser les blés les plus éloignés, se propager comme un flot sur toute l’immense étendue et venir se coucher, murmurant et tiède, parmi les sainfoins et les trèfles, à mes pieds, cette plaine qui nous était commune à tous deux semblait nous rapprocher, nous unir, je pensais que ce souffle avait passé auprès d’elle, que c’était quelque message d’elle qu’il me chuchotait sans que je pusse le comprendre, et je l’embrassais au passage.", "en": "I knew that Miss Swann often went to Laon to spend a few days and, although it was several leagues away, the distance being compensated by the absence of any obstacle, when, on hot afternoons, I saw the same breath, coming from the extreme horizon, lowering the most distant wheat, spreading like a flood over the entire immense expanse and coming to lie down, murmuring and warm, among the sainfoins and the clover, at my feet, this plain which we was common to both of us seemed to bring us together, to unite us, I thought that this breath had passed near her, that it was some message from her that it was whispering to me without my being able to understand it, and I kissed it as it passed."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "À gauche était un village qui s’appelait Champieu (\nCampus Pagani\n, selon le curé).", "en": "On the left was a village called Champieu (Campus Pagani, according to the priest)."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Sur la droite, on apercevait par delà les blés les deux clochers ciselés et rustiques de Saint-André-des-Champs, eux-mêmes effilés, écailleux, imbriqués d’alvéoles, guillochés, jaunissants et grumeleux, comme deux épis.", "en": "On the right, beyond the wheat, we could see the two chiseled and rustic bell towers of Saint-André-des-Champs, themselves tapered, scaly, interwoven with cells, guilloche, yellowing and lumpy, like two ears of corn."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "À intervalles symétriques, au milieu de l’inimitable ornementation de leurs feuilles qu’on ne peut confondre avec la feuille d’aucun autre arbre fruitier, les pommiers ouvraient leurs larges pétales de satin blanc ou suspendaient les timides bouquets de leurs rougissants boutons.", "en": "At symmetrical intervals, amid the inimitable ornamentation of their leaves which cannot be confused with the leaves of any other fruit tree, the apple trees opened their large white satin petals or hung the shy bouquets of their blushing buds."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "C’est du côté de Méséglise que j’ai remarqué pour la première fois l’ombre ronde que les pommiers font sur la terre ensoleillée, et aussi ces soies d’or impalpable que le couchant tisse obliquement sous les feuilles, et que je voyais mon père interrompre de sa canne sans les faire jamais dévier.", "en": "It was on the Méséglise side that I noticed for the first time the round shadow that the apple trees make on the sunny earth, and also these silks of impalpable gold that the setting sun weaves obliquely under the leaves, and which I saw my father interrupt with his cane without ever making them deviate."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Parfois dans le ciel de l’après-midi passait la lune blanche comme une nuée, furtive, sans éclat, comme une actrice dont ce n’est pas l’heure de jouer et qui, de la salle, en toilette de ville, regarde un moment ses camarades, s’effaçant, ne voulant pas qu’on fasse attention à elle.", "en": "Sometimes in the afternoon sky the white moon passed like a cloud, furtive, without brilliance, like an actress whose performance it is not time for and who, from the room, in city clothes, looks for a moment at her comrades, fading away, not wanting anyone to pay attention to her."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "J’aimais à retrouver son image dans des tableaux et dans des livres, mais ces œuvres d’art étaient bien différentes – du moins pendant les premières années, avant que Bloch eût accoutumé mes yeux et ma pensée à des harmonies plus subtiles – de celles où la lune me paraîtrait belle aujourd’hui et où je ne l’eusse pas reconnue alors.", "en": "I liked to find its image in paintings and in books, but these works of art were very different – ​​at least during the first years, before Bloch had accustomed my eyes and my thoughts to more subtle harmonies – from those where the moon would seem beautiful to me today and where I would not have recognized it then."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "C’était, par exemple, quelque roman de Saintine, un paysage de Gleyre où elle découpe nettement sur le ciel une faucille d’argent, de ces œuvres naïvement incomplètes comme étaient mes propres impressions et que les sœurs de ma grand’mère s’indignaient de me voir aimer.", "en": "It was, for example, some novel by Saintine, a landscape by Gleyre where she clearly outlines a silver sickle against the sky, one of those naively incomplete works like my own impressions and which my grandmother's sisters were indignant to see me love."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Elles pensaient qu’on doit mettre devant les enfants, et qu’ils font preuve de goût en aimant d’abord les œuvres que parvenu à la maturité, on admire définitivement.", "en": "They thought that we must put before children, and that they demonstrate taste by first liking the works that upon reaching maturity, we definitely admire."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "C’est sans doute qu’elles se figuraient les mérites esthétiques comme des objets matériels qu’un œil ouvert ne peut faire autrement que de percevoir, sans avoir eu besoin d’en mûrir lentement des équivalents dans son propre cœur.", "en": "It is undoubtedly because they imagined aesthetic merits as material objects that an open eye cannot do otherwise than perceive, without having needed to slowly mature equivalents in one's own heart."}];
            window.__VOCAB_DATA__ = {};
        </script>
        <style>
            :root { --primary: #004a99; --accent: #ffc107; --bg: #f0f2f5; }

            .header-top { display: flex; align-items: center; gap: 12px; }
            .header-left { flex: 1; min-width: 0; }
            .header-title { margin: 2px 0; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .header-subtitle { font-size: 0.75rem; color: #555; margin-top: 2px; }
            .header-meta { font-size: 0.65rem; font-weight: bold; color: #666; }
            .header-meta a { color: #1565c0; text-decoration: none; font-weight: bold; }
            .changelog-overlay {
                display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
                z-index: 1000; align-items: center; justify-content: center;

            .changelog-overlay.open { display: flex; }

                box-shadow: 0 8px 32px rgba(0,0,0,0.2);

            .changelog-box .cl-close { float: right; cursor: pointer; color: #999; font-size: 1.1rem; }
            .cl-entry { margin-bottom: 14px; }
            .cl-date { font-size: 0.7rem; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 3px; }
            .cl-items { margin: 0; padding-left: 16px; font-size: 0.85rem; color: #333; line-height: 1.6; }
            .header-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
            audio { width: 220px; height: 36px; }
            .header-controls { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 6px; padding-top: 6px; border-top: 1px solid #e0e0e0; }
            .header-controls .divider { color: #ccc; }
            .mode-toggle { display: flex; border: 1px solid var(--primary); border-radius: 20px; overflow: hidden; }
            .mode-opt { background: white; color: var(--primary); border: none; padding: 5px 12px; font-size: 0.75rem; font-weight: bold; cursor: pointer; line-height: 1.2; }
            .mode-opt.active { background: var(--primary); color: white; }
            .mode-prog { display: block; font-size: 0.6rem; font-weight: normal; opacity: 0.7; margin-top: 2px; }
            .mode-prog:empty { display: none; }
            .speed-label { font-size: 0.65rem; font-weight: bold; color: #555; }
            .speed-btn { background: #fff; color: #333; border: 1px solid #ccc; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer; }
            .speed-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
            .vocab-row { display: flex; align-items: center; gap: 8px; }
            .btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 0.75rem; }
            .btn.active { background: var(--accent); color: black; }
            .transcript { padding: 20px; max-width: 900px; margin: 0 auto; }
            #word-tip {
                display: flex; align-items: center; justify-content: space-between;
                background: #e8f0fe; border: 1px solid #c5d8fb; border-radius: 8px;
                padding: 8px 12px; margin: 12px 20px 0; font-size: 0.8rem; color: #1a3a6e;
            }
            #word-tip-close { cursor: pointer; font-size: 1rem; color: #999; padding-left: 10px; }
            .row { display: flex; flex-direction: row; margin-bottom: 8px; background: white; border-radius: 12px; border: 1px solid #ddd; overflow: hidden; }
            .row.highlight { background: #fffde7; border-left: none; outline: 3px solid var(--accent); transition: outline 0.3s ease; }
            .row-nav {
                width: 32px; flex-shrink: 0; background: #e8f0fe;
                display: flex; flex-direction: column; align-items: center;
                justify-content: flex-start; padding-top: 8px; gap: 6px;
                cursor: pointer; user-select: none; transition: background 0.15s;
            }
            .row.highlight .row-nav { background: #c5d8fb; }
            .row-nav:active { background: var(--accent); }
            @keyframes navFlash { 0%,100% { background: #e8f0fe; } 50% { background: var(--accent); } }
            .row-nav.flash { animation: navFlash 0.35s ease-out; }
            .row-nav.pinned { background: #fff3cd; }
            .row.highlight .row-nav.pinned { background: #ffe082; }
            .pin-btn { font-size: 0.75rem; opacity: 0.4; cursor: pointer; line-height: 1; }
            .row-nav.pinned .pin-btn { opacity: 1; }
            .row-content { flex: 1; padding: 12px 15px; display: flex; flex-direction: column; min-width: 0; }
            #play-btn {
                display: none; position: fixed; left: 8px; z-index: 50;
                background: var(--accent); border: none; border-radius: 50%;
                width: 36px; height: 36px; font-size: 1rem; cursor: pointer;
                box-shadow: 0 2px 6px rgba(0,0,0,0.2); line-height: 36px; text-align: center;
            }
            .orig { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
            .en { display: none; color: #546e7a; font-style: italic; font-size: 0.95rem; margin-top: 6px; padding-top: 6px; border-top: 1px solid #e8e8e8; }
            .row.highlight .en { display: block; }
            .en.revealed { display: block; }
            body.reading-mode .row-nav { display: none; }
            body.reading-mode #play-btn { display: none !important; }
            body.reading-mode .speed-label,
            body.reading-mode .speed-btn { display: none; }
            .jump-btn { background: #fff3cd; color: #7a5c00; border: 1px solid #ffc107; padding: 4px 10px; border-radius: 12px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
            .status-badge { font-size: 0.7rem; margin-left: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
            .sv-word { cursor: pointer; color: #1565c0; }
            .sv-word .wikt-arrow { font-size: 0.55em; vertical-align: super; opacity: 0.6; }
            #word-popup {
                display: none; position: fixed; z-index: 999;
                background: white; border: 1px solid #ccc; border-radius: 10px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.18); padding: 12px 15px;
                max-width: 280px; font-size: 0.85rem; line-height: 1.5;
            }
            #word-popup .wp-lemma { font-size: 1rem; font-weight: bold; color: var(--primary); }
            #word-popup .wp-trans { color: #546e7a; font-style: italic; margin-bottom: 4px; }
            #word-popup .wp-cognate { color: #1565c0; font-weight: bold; }
            #word-popup .wp-etym { color: #555; font-size: 0.78rem; margin-top: 4px; }
            #word-popup .wp-link { display: inline-block; margin-top: 6px; font-size: 0.75rem; color: #2e7d32; text-decoration: underline; }
            #word-popup .wp-close { float: right; cursor: pointer; color: #999; font-size: 1rem; line-height: 1; margin-left: 8px; }
            @media (max-width: 768px) { .row { padding: 10px 12px; } }
        </style>
    </head>
    <body>
        <div class="header-box">
            <div class="header-top">
                <div class="header-left">
                    <div class="header-meta"><em style="font-weight:normal;">Personal/educational use only.</em></div>
                    <h1 class="header-title">À la recherche du temps perdu I – II</h1>
                    <div class="header-subtitle">Marcel Proust</div>
                </div>
                <div class="header-right">
                    <audio id="audio" preload="metadata" src="proust-01-ch5.mp3"></audio>
                    <span id="audio-status" class="status-badge"></span>
                </div>
            </div>
            <div class="header-controls">
                <span class="speed-label">SPEED:</span>
                <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                <button class="speed-btn active" onclick="setSpeed(1.0)">1x</button>
                <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                <span class="divider">|</span>
                <div class="mode-toggle">
                    <button id="modePodcast" class="mode-opt active" onclick="setMode('orig')" title="Listen and follow along with the translated text">Podcast<span class="mode-prog" id="prog-orig"></span></button>
                    <button id="modeInterleaved" class="mode-opt" onclick="setMode('bilingual')" title="Listen to alternating source and English audio">Interleaved<span class="mode-prog" id="prog-bilingual"></span></button>
                    <button id="modeReading" class="mode-opt" onclick="setMode('reading')" title="Scroll through source and translation &#x2014; no audio">Reading<span class="mode-prog" id="prog-reading"></span></button>
                </div>
                <button id="jump-btn" class="jump-btn" style="display:none" onclick="jumpToLast()">&#x21A9; Resume</button>
            </div>
        </div>
        
        <button id="play-btn" onclick="togglePlayPause()">&#x25B6;</button>
        <div id="word-tip">
            <span>Tap a <strong style="color:#1565c0;">blue word</strong> in the transcript to see its definition.</span>
            <span id="word-tip-close" onclick="dismissTip()">&#x2715;</span>
        </div>
        <div id="word-popup">
            <span class="wp-close" onclick="closePopup()">&#x2715;</span>
            <div class="wp-lemma" id="wp-lemma"></div>
            <div class="wp-trans" id="wp-trans"></div>
            <div class="wp-cognate" id="wp-cognate"></div>
            <div class="wp-etym" id="wp-etym"></div>
            <a class="wp-link" id="wp-link" target="_blank" rel="noopener">Open in Folkets lexikon &#x2197;</a>
        </div>
        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modePodcast = document.getElementById('modePodcast');
            const modeInterleaved = document.getElementById('modeInterleaved');
            const modeReading = document.getElementById('modeReading');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "proust-01-ch5.mp3", bilingual: "proust-01-ch5.bilingual.mp3" };
            const startPattern = null;
            const epKey = 'proust.vol1-ch5';
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode] || sources['orig'], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            // --- Reading mode ---
            let readingObserver = null;

            function enterReadingMode() {
                audio.pause();
                document.body.classList.add('reading-mode');
                document.querySelectorAll('.row').forEach(row => {
                    if (readingObserver) readingObserver.observe(row);
                });
                if (epKey) {
                    const saved = parseInt(localStorage.getItem('readScroll_' + epKey) || '0');
                    if (saved > 0) requestAnimationFrame(() => window.scrollTo({ top: saved, behavior: 'instant' }));
                }
            }

            function exitReadingMode() {
                document.body.classList.remove('reading-mode');
                if (readingObserver) { readingObserver.disconnect(); }
                document.querySelectorAll('.en.revealed').forEach(el => el.classList.remove('revealed'));
            }

            readingObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const enEl = entry.target.querySelector('.en');
                        if (enEl) enEl.classList.add('revealed');
                    }
                });
            }, { threshold: 0.3 });

            // --- Sticky position ---
            function updateModeProgress() {
                if (!epKey) return;
                const audioPct = parseFloat(localStorage.getItem('audioPct_' + epKey) || '0');
                const readPct  = parseFloat(localStorage.getItem('readPct_'  + epKey) || '0');
                document.getElementById('prog-orig').textContent      = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-bilingual').textContent = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-reading').textContent   = readPct  > 0 ? Math.round(readPct)  + '%' : '';
            }

            function updateJumpBtn() {
                if (!epKey) return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                document.getElementById('jump-btn').style.display = (mode !== 'reading' && saved > 5) ? '' : 'none';
            }

            function jumpToLast() {
                if (!epKey || mode === 'reading') return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                if (!saved || !data.length) return;
                audio.currentTime = saved;
                const idx = data.findIndex(item => saved >= item.start && saved <= item.end);
                if (idx !== -1) {
                    const row = document.getElementById('row-' + idx);
                    if (row) { userScrolling = false; row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }
                audio.play();
            }

            let lastSaveWallTime = 0;
            function saveAudioPos() {
                if (epKey && mode !== 'reading' && audio.currentTime > 5) {
                    localStorage.setItem('audioPos_' + epKey, audio.currentTime.toString());
                    if (audio.duration > 0) {
                        localStorage.setItem('audioPct_' + epKey, (audio.currentTime / audio.duration * 100).toString());
                    }
                    lastSaveWallTime = Date.now();
                    updateModeProgress();
                }
            }
            audio.addEventListener('pause', saveAudioPos);

            function setMode(newMode) {
                if (newMode === mode) return;
                const wasReading = (mode === 'reading');
                const willRead = (newMode === 'reading');
                if (wasReading) exitReadingMode();
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = newMode;
                if (epKey) localStorage.setItem('epMode_' + epKey, mode);
                modePodcast.classList.toggle('active', mode === 'orig');
                modeInterleaved.classList.toggle('active', mode === 'bilingual');
                modeReading.classList.toggle('active', mode === 'reading');
                if (willRead) {
                    enterReadingMode();
                    return;
                }
                audio.src = sources[mode] || sources['orig'];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                updateJumpBtn();
            }

            checkAudioStatus();
            updateJumpBtn();
            updateModeProgress();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) { playBtn.style.display = 'none'; return; }
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
                playBtn.style.display = 'block';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            let readScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
                if (epKey && mode === 'reading') {
                    clearTimeout(readScrollTimer);
                    readScrollTimer = setTimeout(() => {
                        localStorage.setItem('readScroll_' + epKey, window.scrollY.toString());
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        if (maxScroll > 0) {
                            localStorage.setItem('readPct_' + epKey, (window.scrollY / maxScroll * 100).toString());
                        }
                        updateModeProgress();
                    }, 500);
                }
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('proust-01-ch5.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('proust-01-ch5.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                // Restore sticky mode
                if (epKey) {
                    const savedMode = localStorage.getItem('epMode_' + epKey);
                    if (savedMode && savedMode !== mode) {
                        mode = savedMode;
                        modePodcast.classList.toggle('active', mode === 'orig');
                        modeInterleaved.classList.toggle('active', mode === 'bilingual');
                        modeReading.classList.toggle('active', mode === 'reading');
                        if (mode !== 'reading') {
                            audio.src = sources[mode] || sources['orig'];
                            checkAudioStatus();
                        }
                    }
                }
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (mode === 'reading') {
                    enterReadingMode();
                } else if (data.length > 0) {
                    const savedPos = epKey ? parseFloat(localStorage.getItem('audioPos_' + epKey) || '0') : 0;
                    if (savedPos > 5) {
                        seekTargetTime = savedPos;
                        initialSeekDone = false;
                        applySeek();
                    } else {
                        let targetIdx = 0;
                        if (startPattern !== null) {
                            const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                            const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                            targetIdx = matchIdx !== -1 ? matchIdx : 0;
                        }
                        const target = data[targetIdx];
                        seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                        const targetRow = document.getElementById('row-' + targetIdx);
                        if (targetRow) {
                            requestAnimationFrame(() => {
                                if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                                movePlayBtn(targetRow);
                            });
                        }
                        if (startPattern !== null) applySeek();
                    }
                    updateJumpBtn();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                // Save to localStorage every 5s; update display every tick
                if (Date.now() - lastSaveWallTime > 5000) saveAudioPos();
                if (epKey && audio.duration > 0 && mode !== 'reading') {
                    const pct = Math.round(now / audio.duration * 100);
                    document.getElementById('prog-orig').textContent = pct > 0 ? pct + '%' : '';
                    document.getElementById('prog-bilingual').textContent = pct > 0 ? pct + '%' : '';
                }

                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
