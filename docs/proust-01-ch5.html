 "Il a tous les prix à son cours, ajouta-t-il, à voix basse pour que je n’entende pas ce mensonge et que je n’y contredise pas.", "en": "He has all the prizes at his price, he added, in a low voice so that I would not hear this lie and so that I would not contradict it."}, {"start": 4128.94, "end": 4148.38, "b_start": 8215.57, "b_end": 8255.78, "orig": "Qui sait ? ce sera peut-être un petit Victor Hugo, une espèce de Vaulabelle, vous savez.\n– J’adore les artistes, répondit la dame en rose, il n’y a qu’eux qui comprennent les femmes... Qu’eux et les êtres d’élite comme vous. Excusez mon ignorance, ami. Qui est Vaulabelle ?", "en": "Who knows? perhaps it will be a little Victor Hugo, a sort of Vaulabelle, you know. – I love artists, replied the lady in pink, it’s only them who understand women... Only them and elite beings like you. Excuse my ignorance, friend. Who is Vaulabelle?"}, {"start": 4149.38, "end": 4158.7, "b_start": 8255.78, "b_end": 8275.43, "orig": "Est-ce les volumes dorés qu’il y a dans la petite bibliothèque vitrée de votre boudoir ? Vous savez que vous m’avez promis de me les prêter, j’en aurai grand soin.", "en": "Is it the gilded volumes in the little glass library in your boudoir? You know that you promised to lend them to me, I will take great care of them."}, {"start": 4159.7, "end": 4186.7, "b_start": 8275.43, "b_end": 8331.77, "orig": "Mon oncle qui détestait prêter ses livres ne répondit rien et me conduisit jusqu’à l’antichambre. Éperdu d’amour pour la dame en rose, je couvris de baisers fous les joues pleines de tabac de mon vieil oncle, et tandis qu’avec assez d’embarras il me laissait entendre sans oser me le dire ouvertement qu’il aimerait autant que je ne parlasse pas de cette visite à mes parents, je lui disais, les larmes aux yeux, que le souvenir de sa bonté était en moi si fort que je trouverais bien un jour le moyen de lui témoigner ma reconnaissance.", "en": "My uncle, who hated lending his books, said nothing and led me to the anteroom. Distraught with love for the lady in pink, I covered my old uncle's tobacco-filled cheeks with wild kisses, and while he rather embarrassedly let me hear without daring to tell me openly that he would just as much like me not to speak of this visit to my parents, I told him, with tears in my eyes, that the memory of his goodness was so strong in me that I would one day find the way to show my gratitude to him."}, {"start": 4187.7, "end": 4202.58, "b_start": 8331.77, "b_end": 8363.65, "orig": "Il était si fort en effet que deux heures plus tard, après quelques phrases mystérieuses et qui ne me parurent pas donner à mes parents une idée assez nette de la nouvelle importance dont j’étais doué, je trouvai plus explicite de leur raconter dans les moindres détails la visite que je venais de faire.", "en": "It was so strong in fact that two hours later, after a few mysterious sentences which did not seem to give my parents a clear enough idea of ​​the new importance with which I was endowed, I found it more explicit to tell them in the smallest details the visit I had just made."}, {"start": 4203.58, "end": 4215.62, "b_start": 8363.65, "b_end": 8389.22, "orig": "Je ne croyais pas ainsi causer d’ennuis à mon oncle. Comment l’aurais-je cru, puisque je ne le désirais pas. Et je ne pouvais supposer que mes parents trouveraient du mal dans une visite où je n’en trouvais pas.", "en": "I didn't think I would cause any trouble to my uncle. How could I have believed it, since I didn't want it. And I could not suppose that my parents would find harm in a visit where I found none."}, {"start": 4216.62, "end": 4229.94, "b_start": 8389.22, "b_end": 8418.68, "orig": "N’arrive-t-il pas tous les jours qu’un ami nous demande de ne pas manquer de l’excuser auprès d’une femme à qui il a été empêché d’écrire, et que nous négligions de le faire, jugeant que cette personne ne peut pas attacher d’importance à un silence qui n’en a pas pour nous.", "en": "Does it not happen every day that a friend asks us not to fail to apologize to a woman to whom he was prevented from writing, and that we neglect to do so, judging that this person cannot attach any importance to a silence which has no importance for us."}, {"start": 4230.94, "end": 4251.46, "b_start": 8418.68, "b_end": 8461.87, "orig": "Je m’imaginais, comme tout le monde, que le cerveau des autres était un réceptacle inerte et docile, sans pouvoir de réaction spécifique sur ce qu’on y introduisait ; et je ne doutais pas qu’en déposant dans celui de mes parents la nouvelle de la connaissance que mon oncle m’avait fait faire, je ne leur transmisse en même temps comme je le souhaitais le jugement bienveillant que je portais sur cette présentation.", "en": "I imagined, like everyone else, that the brains of others were an inert and docile receptacle, without the power of specific reaction to what was introduced there; and I had no doubt that by depositing with my parents the news of the knowledge that my uncle had introduced me to, I would at the same time transmit to them as I wished the benevolent judgment that I had on this presentation."}, {"start": 4252.46, "end": 4266.84, "b_start": 8461.87, "b_end": 8493.4, "orig": "Mes parents malheureusement s’en remirent à des principes entièrement différents de ceux que je leur suggérais d’adopter, quand ils voulurent apprécier l’action de mon oncle. Mon père et mon grand-père eurent avec lui des explications violentes ; j’en fus indirectement informé.", "en": "My parents unfortunately relied on principles entirely different from those that I suggested they adopt, when they wanted to appreciate my uncle's action. My father and my grandfather had violent explanations with him; I was indirectly informed of it."}, {"start": 4267.84, "end": 4277.87, "b_start": 8493.4, "b_end": 8514.24, "orig": "Quelques jours après, croisant dehors mon oncle qui passait en voiture découverte, je ressentis la douleur, la reconnaissance, le remords que j’aurais voulu lui exprimer.", "en": "A few days later, passing my uncle outside in an open car, I felt the pain, the gratitude, the remorse that I would have wanted to express to him."}, {"start": 4278.87, "end": 4293.58, "b_start": 8514.24, "b_end": 8545.36, "orig": "À côté de leur immensité, je trouvai qu’un coup de chapeau serait mesquin et pourrait faire supposer à mon oncle que je ne me croyais pas tenu envers lui à plus qu’à une banale politesse. Je résolus de m’abstenir de ce geste insuffisant et je détournai la tête.", "en": "Compared to their immensity, I found that a tip of the hat would be petty and could make my uncle suppose that I did not believe myself owed more than banal politeness towards him. I resolved to refrain from this insufficient gesture and turned my head away."}, {"start": 4294.58, "end": 4303.37, "b_start": 8545.36, "b_end": 8565.02, "orig": "Mon oncle pensa que je suivais en cela des ordres de mes parents, il ne le leur pardonna pas, et il est mort bien des années après sans qu’aucun de nous l’ait jamais revu.", "en": "My uncle thought that I was following my parents' orders in this, he did not forgive them, and he died many years later without any of us ever seeing him again."}, {"start": 4304.37, "end": 4326.69, "b_start": 8565.02, "b_end": 8608.52, "orig": "Aussi je n’entrais plus dans le cabinet de repos maintenant fermé de mon oncle Adolphe, et, après m’être attardé aux abords de l’arrière-cuisine, quand Françoise, apparaissant sur le parvis, me disait : « Je vais laisser ma fille de cuisine servir le café et monter l’eau chaude, il faut que je me sauve chez M\nme\nOctave », je me décidais à rentrer et montais directement lire chez moi.", "en": "So I no longer entered my uncle Adolphe's now closed rest room, and, after lingering around the back kitchen, when Françoise, appearing on the square, said to me: \"I'm going to let my kitchen maid serve the coffee and turn up the hot water, I have to run to Madame Octave's\", I decided to go back and went straight up to read at home."}, {"start": 4327.69, "end": 4342.83, "b_start": 8608.52, "b_end": 8640.41, "orig": "La fille de cuisine était une personne morale, une institution permanente à qui des attributions invariables assuraient une sorte de continuité et d’identité, à travers la succession des formes passagères en lesquelles elle s’incarnait, car nous n’eûmes jamais la même deux ans de suite.", "en": "The kitchen maid was a moral person, a permanent institution to which invariable attributions ensured a sort of continuity and identity, through the succession of passing forms in which she was incarnated, because we never had the same one two years in a row."}, {"start": 4343.83, "end": 4367.93, "b_start": 8640.41, "b_end": 8690.94, "orig": "L’année où nous mangeâmes tant d’asperges, la fille de cuisine habituellement chargée de les « plumer » était une pauvre créature maladive, dans un état de grossesse déjà assez avancé quand nous arrivâmes à Pâques, et on s’étonnait même que Françoise lui laissât faire tant de courses et de besogne, car elle commençait à porter difficilement devant elle la mystérieuse corbeille, chaque jour plus remplie, dont on devinait sous ses amples sarraus la forme magnifique.", "en": "The year we ate so much asparagus, the kitchen maid usually responsible for \"plucking\" them was a poor, sickly creature, already in a fairly advanced state of pregnancy when we arrived at Easter, and we were even surprised that Françoise let her do so much shopping and work, because she began to carry with difficulty the mysterious basket in front of her, more full each day, whose magnificent shape we could guess under her ample smocks."}, {"start": 4368.93, "end": 4376.1, "b_start": 8690.94, "b_end": 8707.1, "orig": "Ceux-ci rappelaient les houppelandes qui revêtent certaines des figures symboliques de Giotto dont M. Swann m’avait donné des photographies.", "en": "These were reminiscent of the cloaks which adorn some of Giotto's symbolic figures of which Mr. Swann had given me photographs."}, {"start": 4377.1, "end": 4400.38, "b_start": 8707.1, "b_end": 8754.73, "orig": "C’est lui-même qui nous l’avait fait remarquer et quand il nous demandait des nouvelles de la fille de cuisine, il nous disait : « Comment va la Charité de Giotto ? » D’ailleurs elle-même, la pauvre fille, engraissée par sa grossesse, jusqu’à la figure, jusqu’aux joues qui tombaient droites et carrées, ressemblait en effet assez à ces vierges, fortes et hommasses, matrones plutôt, dans lesquelles les vertus sont personnifiées à l’Arena.", "en": "It was he himself who had pointed this out to us and when he asked us about the kitchen maid, he said: “How is Giotto’s Charity? » Besides, the poor girl herself, fattened by her pregnancy, even to the face, to the cheeks which fell straight and square, in fact quite resembled those virgins, strong and masculine, matrons rather, in whom the virtues are personified at the Arena."}, {"start": 4401.38, "end": 4407.29, "b_start": 8754.73, "b_end": 8768.04, "orig": "Et je me rends compte maintenant que ces Vertus et ces Vices de Padoue lui ressemblaient encore d’une autre manière.", "en": "And I realize now that these Virtues and Vices of Padua resembled him in yet another way."}, {"start": 4408.29, "end": 4439.61, "b_start": 8768.04, "b_end": 8832.95, "orig": "De même que l’image de cette fille était accrue par le symbole ajouté qu’elle portait devant son ventre, sans avoir l’air d’en comprendre le sens, sans que rien dans son visage en traduisît la beauté et l’esprit, comme un simple et pesant fardeau, de même c’est sans paraître s’en douter que la puissante ménagère qui est représentée à l’Arena au-dessous du nom « Caritas » et dont la reproduction était accrochée au mur de ma salle d’études, à Combray, incarne cette vertu, c’est sans qu’aucune pensée de charité semble avoir jamais pu être exprimée par son visage énergique et vulgaire.", "en": "Just as the image of this girl was heightened by the added symbol that she carried in front of her stomach, without seeming to understand its meaning, without anything in her face reflecting its beauty and spirit, like a simple and heavy burden, so it is without seeming to suspect it that the powerful housewife who is represented at the Arena below the name \"Caritas\" and whose reproduction hung on the wall of my study room, in Combray, embodies this virtue, it is without any thought of charity seeming to have ever been able to be expressed by his energetic and vulgar face."}, {"start": 4440.61, "end": 4461.61, "b_start": 8832.95, "b_end": 8878.42, "orig": "Par une belle invention du peintre elle foule aux pieds les trésors de la terre, mais absolument comme si elle piétinait des raisins pour en extraire le jus ou plutôt comme elle aurait monté sur des sacs pour se hausser ; et elle tend à Dieu son cœur enflammé, disons mieux, elle le lui « passe », comme une cuisinière passe un tire-bouchon par le soupirail de son sous-sol à quelqu’un qui le lui demande à la fenêtre du rez-de-chaussée.", "en": "By a beautiful invention of the painter she tramples underfoot the treasures of the earth, but absolutely as if she were trampling grapes to extract the juice or rather as she would have climbed on sacks to raise herself; and she holds out her burning heart to God, or better said, she “passes it” to God, like a cook passes a corkscrew through the vent in her basement to someone who asks her for it at the ground floor window."}, {"start": 4462.61, "end": 4467.36, "b_start": 8878.42, "b_end": 8888.51, "orig": "L’Envie, elle, aurait eu davantage une certaine expression d’envie.", "en": "Envy would have had more of a certain expression of envy."}, {"start": 4468.36, "end": 4494.3, "b_start": 8888.51, "b_end": 8943.24, "orig": "Mais dans cette fresque-là encore, le symbole tient tant de place et est représenté comme si réel, le serpent qui siffle aux lèvres de l’Envie est si gros, il lui remplit si complètement sa bouche grande ouverte, que les muscles de sa figure sont distendus pour pouvoir le contenir, comme ceux d’un enfant qui gonfle un ballon avec son souffle, et que l’attention de l’Envie – et la nôtre du même coup – tout entière concentrée sur l’action de ses lèvres, n’a guère de temps à donner à d’envieuses pensées.", "en": "But in this fresco again, the symbol takes up so much space and is represented as so real, the snake which hisses at the lips of Envy is so big, it fills its wide open mouth so completely, that the muscles of its face are distended to be able to contain it, like those of a child who inflates a balloon with its breath, and that the attention of Envy - and ours at the same time - entirely concentrated on the action of its lips, has hardly any time to give to envious thoughts."}, {"start": 4495.3, "end": 4498.11, "b_start": 8943.24, "b_end": 8950.64, "orig": "Malgré toute l’admiration que M.", "en": "Despite all the admiration that Mr."}, {"start": 4499.11, "end": 4534.27, "b_start": 8950.64, "b_end": 9023.62, "orig": "Swann professait pour ces figures de Giotto, je n’eus longtemps aucun plaisir à considérer dans notre salle d’études, où on avait accroché les copies qu’il m’en avait rapportées, cette Charité sans charité, cette Envie qui avait l’air d’une planche illustrant seulement dans un livre de médecine la compression de la glotte ou de la luette par une tumeur de la langue ou par l’introduction de l’instrument de l’opérateur, une Justice, dont le visage grisâtre et mesquinement régulier était celui-là même qui, à Combray, caractérisait certaines jolies bourgeoises pieuses et sèches que je voyais à la messe et dont plusieurs étaient enrôlées d’avance dans les milices de réserve de l’Injustice.", "en": "Swann professed for these figures of Giotto, I had for a long time no pleasure to consider in our study room, where we had hung the copies that he had brought me, this Charity without charity, this Envy which had the air of a board illustrating only in a book of medicine the compression of the glottis or the uvula by a tumor of the tongue or by the introduction of the operator's instrument, a Justice, whose grayish and pettishly regular face was the same one who, in Combray, characterized certain pretty, pious and dry bourgeois women that I saw at mass and several of whom were enrolled in advance in the reserve militias of Injustice."}, {"start": 4535.27, "end": 4559.42, "b_start": 9023.62, "b_end": 9073.64, "orig": "Mais plus tard j’ai compris que l’étrangeté saisissante, la beauté spéciale de ces fresques tenait à la grande place que le symbole y occupait, et que le fait qu’il fût représenté non comme un symbole puisque la pensée symbolisée n’était pas exprimée, mais comme réel, comme effectivement subi ou matériellement manié, donnait à la signification de l’œuvre quelque chose de plus littéral et de plus précis, à son enseignement quelque chose de plus concret et de plus frappant.", "en": "But later I understood that the striking strangeness, the special beauty of these frescoes was due to the large place that the symbol occupied there, and that the fact that it was represented not as a symbol since the symbolized thought was not expressed, but as real, as actually experienced or materially handled, gave to the meaning of the work something more literal and more precise, to its teaching something more concrete and more striking."}, {"start": 4560.42, "end": 4589.79, "b_start": 9073.64, "b_end": 9133.34, "orig": "Chez la pauvre fille de cuisine, elle aussi, l’attention n’était-elle pas sans cesse ramenée à son ventre par le poids qui le tirait ; et de même encore, bien souvent la pensée des agonisants est tournée vers le côté effectif, douloureux, obscur, viscéral, vers cet envers de la mort qui est précisément le côté qu’elle leur présente, qu’elle leur fait rudement sentir et qui ressemble beaucoup plus à un fardeau qui les écrase, à une difficulté de respirer, à un besoin de boire, qu’à ce que nous appelons l’idée de la mort.", "en": "With the poor kitchen maid, too, wasn't attention constantly drawn back to her stomach by the weight that pulled it; and in the same way, very often the thoughts of the dying are turned towards the effective, painful, obscure, visceral side, towards this other side of death which is precisely the side which it presents to them, which it makes them feel harshly and which resembles much more a burden which crushes them, a difficulty in breathing, a need to drink, than what we call the idea of ​​death."}, {"start": 4590.79, "end": 4601.14, "b_start": 9133.34, "b_end": 9156.2, "orig": "Il fallait que ces Vertus et ces Vices de Padoue eussent en eux bien de la réalité puisqu’ils m’apparaissaient comme aussi vivants que la servante enceinte, et qu’elle-même ne me semblait pas beaucoup moins allégorique.", "en": "These Virtues and Vices of Padua had to have a lot of reality in them since they appeared to me as alive as the pregnant servant, and she herself did not seem much less allegorical to me."}, {"start": 4602.14, "end": 4614.74, "b_start": 9156.2, "b_end": 9184.63, "orig": "Et peut-être cette non-participation (du moins apparente) de l’âme d’un être à la vertu qui agit par lui a aussi en dehors de sa valeur esthétique une réalité sinon psychologique, au moins, comme on dit, physiognomonique.", "en": "And perhaps this non-participation (at least apparent) of the soul of a being in the virtue which acts through it also has, apart from its aesthetic value, a reality, if not psychological, at least, as they say, physiognomonic."}, {"start": 4615.74, "end": 4642.04, "b_start": 9184.63, "b_end": 9238.09, "orig": "Quand, plus tard, j’ai eu l’occasion de rencontrer, au cours de ma vie, dans des couvents par exemple, des incarnations vraiment saintes de la charité active, elles avaient généralement un air allègre, positif, indifférent et brusque de chirurgien pressé, ce visage où ne se lit aucune commisération, aucun attendrissement devant la souffrance humaine, aucune crainte de la heurter, et qui est le visage sans douceur, le visage antipathique et sublime de la vraie bonté.", "en": "When, later, I had the opportunity to meet, during my life, in convents for example, truly holy incarnations of active charity, they generally had the cheerful, positive, indifferent and brusque air of a surgeon in a hurry, this face where there is no compassion, no tenderness in the face of human suffering, no fear of offending it, and which is the face without gentleness, the antipathetic and sublime face of true goodness."}, {"start": 4643.04, "end": 4679.66, "b_start": 9238.09, "b_end": 9315.41, "orig": "Pendant que la fille de cuisine – faisant briller involontairement la supériorité de Françoise, comme l’Erreur, par le contraste, rend plus éclatant le triomphe de la Vérité – servait du café qui, selon maman, n’était que de l’eau chaude, et montait ensuite dans nos chambres de l’eau chaude qui était à peine tiède, je m’étais étendu sur mon lit, un livre à la main, dans ma chambre qui protégeait en tremblant sa fraîcheur transparente et fragile contre le soleil de l’après-midi derrière ses volets presque clos où un reflet de jour avait pourtant trouvé moyen de faire passer ses ailes jaunes, et restait immobile entre le bois et le vitrage, dans un coin, comme un papillon posé.", "en": "While the kitchen maid – involuntarily making Françoise's superiority shine, just as Error, through contrast, makes the triumph of Truth more dazzling – served coffee which, according to mother, was only hot water, and then brought hot water into our rooms which was barely lukewarm, I had lain down on my bed, a book in hand, in my room which was trembling protecting its transparent and fragile coolness against the sun. in the afternoon behind its almost closed shutters where a daylight reflection had nevertheless found a way to let its yellow wings pass through, and remained motionless between the wood and the glazing, in a corner, like a butterfly resting."}, {"start": 4680.66, "end": 4730.63, "b_start": 9315.41, "b_end": 9417.71, "orig": "Il faisait à peine assez clair pour lire, et la sensation de la splendeur de la lumière ne m’était donnée que par les coups frappés dans la rue de la Cure par Camus (averti par Françoise que ma tante ne « reposait pas » et qu’on pouvait faire du bruit) contre des caisses poussiéreuses, mais qui, retentissant dans l’atmosphère sonore, spéciale aux temps chauds, semblaient faire voler au loin des astres écarlates ; et aussi par les mouches qui exécutaient devant moi, dans leur petit concert, comme la musique de chambre de l’été : elle ne l’évoque pas à la façon d’un air de musique humaine, qui, entendu par hasard à la belle saison, vous la rappelle ensuite ; elle est unie à l’été par un lien plus nécessaire : née des beaux jours, ne renaissant qu’avec eux, contenant un peu de leur essence, elle n’en réveille pas seulement l’image dans notre mémoire, elle en certifie le retour, la présence effective, ambiante, immédiatement accessible.", "en": "It was barely light enough to read, and the sensation of the splendor of the light was only given to me by the knocks struck in the Rue de la Cure by Camus (warned by Françoise that my aunt was not \"resting\" and that noise could be made) against dusty boxes, but which, resounding in the sonorous atmosphere, special in hot weather, seemed to make scarlet stars fly in the distance; and also by the flies which performed before me, in their little concert, like the chamber music of summer: it does not evoke it in the way of an air of human music, which, heard by chance in the summer, reminds you of it afterwards; it is united to summer by a more necessary link: born from the good weather, reborn only with them, containing a little of their essence, it not only awakens the image in our memory, it certifies its return, its effective, ambient, immediately accessible presence."}, {"start": 4731.63, "end": 4758.58, "b_start": 9417.71, "b_end": 9475.3, "orig": "Cette obscure fraîcheur de ma chambre était au plein soleil de la rue ce que l’ombre est au rayon, c’est-à-dire aussi lumineuse que lui et offrait à mon imagination le spectacle total de l’été dont mes sens, si j’avais été en promenade, n’auraient pu jouir que par morceaux ; et ainsi elle s’accordait bien à mon repos qui (grâce aux aventures racontées par mes livres et qui venaient l’émouvoir) supportait pareil au repos d’une main immobile au milieu d’une eau courante, le choc et l’animation d’un torrent d’activité.", "en": "This dark coolness of my room was to the full sunlight of the street what the shadow is to the ray, that is to say as luminous as it and offered to my imagination the total spectacle of summer which my senses, if I had been out walking, could only have enjoyed in pieces; and thus it fitted well with my rest which (thanks to the adventures recounted in my books and which came to move it) supported, like the rest of an immobile hand in the middle of running water, the shock and animation of a torrent of activity."}, {"start": 4759.58, "end": 4767.86, "b_start": 9475.3, "b_end": 9492.68, "orig": "Mais ma grand’mère, même si le temps trop chaud s’était gâté, si un orage ou seulement un grain était survenu, venait me supplier de sortir.", "en": "But my grandmother, even if the weather was too hot, if a storm or just a squall occurred, would come and beg me to go out."}, {"start": 4768.86, "end": 4782.35, "b_start": 9492.68, "b_end": 9522.58, "orig": "Et ne voulant pas renoncer à ma lecture, j’allais du moins la continuer au jardin, sous le marronnier, dans une petite guérite en sparterie et en toile au fond de laquelle j’étais assis et me croyais caché aux yeux des personnes qui pourraient venir faire visite à mes parents.", "en": "And not wanting to give up my reading, I was at least going to continue it in the garden, under the chestnut tree, in a small sentry box made of esparto and canvas at the back of which I sat and thought I was hidden from the eyes of people who might come to visit my parents."}, {"start": 4783.35, "end": 4791.61, "b_start": 9522.58, "b_end": 9540.04, "orig": "Et ma pensée n’était-elle pas aussi comme une autre crèche au fond de laquelle je sentais que je restais enfoncé, même pour regarder ce qui se passait au dehors ?", "en": "And wasn't my thought also like another crib at the bottom of which I felt that I remained buried, even to watch what was happening outside?"}, {"start": 4792.61, "end": 4813.56, "b_start": 9540.04, "b_end": 9584.5, "orig": "Quand je voyais un objet extérieur, la conscience que je le voyais restait entre moi et lui, le bordait d’un mince liseré spirituel qui m’empêchait de jamais toucher directement sa matière ; elle se volatilisait en quelque sorte avant que je prisse contact avec elle, comme un corps incandescent qu’on approche d’un objet mouillé ne touche pas son humidité parce qu’il se fait toujours précéder d’une zone d’évaporation.", "en": "When I saw an external object, the consciousness that I saw it remained between me and it, bordering it with a thin spiritual border which prevented me from ever directly touching its matter; it somehow vanished before I made contact with it, just as an incandescent body that is brought close to a wet object does not touch its humidity because it is always preceded by a zone of evaporation."}, {"start": 4814.56, "end": 4843.58, "b_start": 9584.5, "b_end": 9645.54, "orig": "Dans l’espèce d’écran diapré d’états différents que, tandis que je lisais, déployait simultanément ma conscience, et qui allaient des aspirations les plus profondément cachées en moi-même jusqu’à la vision tout extérieure de l’horizon que j’avais, au bout du jardin, sous les yeux, ce qu’il y avait d’abord en moi de plus intime, la poignée sans cesse en mouvement qui gouvernait le reste, c’était ma croyance en la richesse philosophique, en la beauté du livre que je lisais, et mon désir de me les approprier, quel que fût ce livre.", "en": "In the sort of screen marked with different states which, while I was reading, my consciousness simultaneously deployed, and which went from the most deeply hidden aspirations in myself to the completely external vision of the horizon that I had, at the end of the garden, before my eyes, what was initially most intimate in me, the constantly moving handle which governed the rest, was my belief in the philosophical richness, in the beauty of the book I was reading, and my desire to make them my own, whatever this book was."}, {"start": 4844.58, "end": 4882.06, "b_start": 9645.54, "b_end": 9722.3, "orig": "Car, même si je l’avais acheté à Combray, en l’apercevant devant l’épicerie Borange, trop distante de la maison pour que Françoise pût s’y fournir comme chez Camus, mais mieux achalandée comme papeterie et librairie, retenu par des ficelles dans la mosaïque des brochures et des livraisons qui revêtaient les deux vantaux de sa porte plus mystérieuse, plus semée de pensées qu’une porte de cathédrale, c’est que je l’avais reconnu pour m’avoir été cité comme un ouvrage remarquable par le professeur ou le camarade qui me paraissait à cette époque détenir le secret de la vérité et de la beauté à demi pressenties, à demi incompréhensibles, dont la connaissance était le but vague mais permanent de ma pensée.", "en": "Because, even if I had bought it in Combray, seeing it in front of the Borange grocery store, too far from the house for Françoise to be able to get supplies there like at Camus, but better stocked as a stationery and bookstore, held by strings in the mosaic of brochures and deliveries which covered the two leaves of its door, more mysterious, more strewn with thoughts than a cathedral door, it was because I had recognized it for having been to me. cited as a remarkable work by the professor or comrade who seemed to me at that time to hold the secret of truth and beauty half intuited, half incomprehensible, the knowledge of which was the vague but permanent goal of my thought."}, {"start": 4883.06, "end": 4899.77, "b_start": 9722.3, "b_end": 9757.57, "orig": "Après cette croyance centrale qui, pendant ma lecture, exécutait d’incessants mouvements du dedans au dehors, vers la découverte de la vérité, venaient les émotions que me donnait l’action à laquelle je prenais part, car ces après-midi-là étaient plus remplis d’événements dramatiques que ne l’est souvent toute une vie.", "en": "After this central belief which, during my reading, performed incessant movements from within to without, towards the discovery of the truth, came the emotions which the action in which I took part gave me, for those afternoons were more filled with dramatic events than is often the case in a lifetime."}, {"start": 4900.77, "end": 4909.41, "b_start": 9757.57, "b_end": 9775.7, "orig": "C’était les événements qui survenaient dans le livre que je lisais ; il est vrai que les personnages qu’ils affectaient n’étaient pas « réels », comme disait Françoise.", "en": "These were the events happening in the book I was reading; it is true that the characters they affected were not “real”, as Françoise said."}, {"start": 4910.41, "end": 4933.16, "b_start": 9775.7, "b_end": 9824.34, "orig": "Mais tous les sentiments que nous font éprouver la joie ou l’infortune d’un personnage réel ne se produisent en nous que par l’intermédiaire d’une image de cette joie ou de cette infortune ; l’ingéniosité du premier romancier consista à comprendre que dans l’appareil de nos émotions, l’image étant le seul élément essentiel, la simplification qui consisterait à supprimer purement et simplement les personnages réels serait un perfectionnement décisif.", "en": "But all the feelings that the joy or misfortune of a real character makes us experience only occur in us through the intermediary of an image of this joy or misfortune; the ingenuity of the first novelist consisted in understanding that in the apparatus of our emotions, the image being the only essential element, the simplification which would consist of purely and simply eliminating the real characters would be a decisive improvement."}, {"start": 4934.16, "end": 4945.37, "b_start": 9824.34, "b_end": 9848.57, "orig": "Un être réel, si profondément que nous sympathisions avec lui, pour une grande part est perçu par nos sens, c’est-à-dire nous reste opaque, offre un poids mort que notre sensibilité ne peut soulever.", "en": "A real being, however deeply we sympathize with him, is largely perceived by our senses, that is to say, remains opaque to us, offers a dead weight that our sensitivity cannot lift."}, {"start": 4946.37, "end": 4957.91, "b_start": 9848.57, "b_end": 9873.85, "orig": "Qu’un malheur le frappe, ce n’est qu’en une petite partie de la notion totale que nous avons de lui que nous pourrons en être émus ; bien plus, ce n’est qu’en une partie de la notion totale qu’il a de soi qu’il pourra l’être lui-même.", "en": "If a misfortune strikes him, it is only in a small part of the total notion that we have of him that we can be moved; moreover, it is only in part of the total notion that he has of himself that he can be himself."}, {"start": 4958.91, "end": 4968.78, "b_start": 9873.85, "b_end": 9896.06, "orig": "La trouvaille du romancier a été d’avoir l’idée de remplacer ces parties impénétrables à l’âme par une quantité égale de parties immatérielles, c’est-à-dire que notre âme peut s’assimiler.", "en": "The novelist's discovery was to have the idea of ​​replacing these impenetrable parts of the soul with an equal quantity of immaterial parts, that is to say that our soul can assimilate."}, {"start": 4969.78, "end": 4988.18, "b_start": 9896.06, "b_end": 9933.11, "orig": "Qu’importe dès lors que les actions, les émotions de ces êtres d’un nouveau genre nous apparaissent comme vraies, puisque nous les avons faites nôtres, puisque c’est en nous qu’elles se produisent, qu’elles tiennent sous leur dépendance, tandis que nous tournons fiévreusement les pages du livre, la rapidité de notre respiration et l’intensité de notre regard.", "en": "What does it matter then that the actions, the emotions of these beings of a new kind appear to us as true, since we have made them our own, since it is in us that they are produced, that they are dependent on them, while we feverishly turn the pages of the book, the rapidity of our breathing and the intensity of our gaze."}, {"start": 4989.18, "end": 5036.82, "b_start": 9933.11, "b_end": 10031.76, "orig": "Et une fois que le romancier nous a mis dans cet état, où comme dans tous les états purement intérieurs toute émotion est décuplée, où son livre va nous troubler à la façon d’un rêve mais d’un rêve plus clair que ceux que nous avons en dormant et dont le souvenir durera davantage, alors, voici qu’il déchaîne en nous pendant une heure tous les bonheurs et tous les malheurs possibles dont nous mettrions dans la vie des années à connaître quelques-uns, et dont les plus intenses ne nous seraient jamais révélés parce que la lenteur avec laquelle ils se produisent nous en ôte la perception ; (ainsi notre cœur change, dans la vie, et c’est la pire douleur ; mais nous ne la connaissons que dans la lecture, en imagination : dans la réalité il change, comme certains phénomènes de la nature se produisent assez lentement pour que, si nous pouvons constater successivement chacun de ses états différents, en revanche, la sensation même du changement nous soit épargnée).", "en": "And once the novelist has put us in this state, where as in all purely interior states all emotion is increased tenfold, where his book will disturb us like a dream but a dream clearer than those we have while sleeping and whose memory will last longer, then, here he unleashes in us for an hour all the happiness and all the possible misfortunes of which we would take years in life to know some of them, and the most intense of which we would not be able to experience. never revealed because the slowness with which they occur takes away our perception of them; (so our heart changes, in life, and it is the worst pain; but we only know it in reading, in imagination: in reality it changes, just as certain phenomena of nature occur slowly enough so that, if we can observe each of its different states successively, on the other hand, we are spared the very sensation of change)."}, {"start": 5037.82, "end": 5052.42, "b_start": 10031.76, "b_end": 10063.88, "orig": "Déjà moins intérieur à mon corps que cette vie des personnages, venait ensuite, à demi projeté devant moi, le paysage où se déroulait l’action et qui exerçait sur ma pensée une bien plus grande influence que l’autre, que celui que j’avais sous les yeux quand je les levais du livre.", "en": "Already less internal to my body than this life of the characters, then came, half projected before me, the landscape where the action took place and which exerted a much greater influence on my thoughts than the other, than the one I had before my eyes when I lifted them from the book."}, {"start": 5053.42, "end": 5072.86, "b_start": 10063.88, "b_end": 10106.47, "orig": "C’est ainsi que pendant deux étés, dans la chaleur du jardin de Combray, j’ai eu, à cause du livre que je lisais alors, la nostalgie d’un pays montueux et fluviatile, où je verrais beaucoup de scieries et où, au fond de l’eau claire, des morceaux de bois pourrissaient sous des touffes de cresson : non loin montaient le long de murs bas des grappes de fleurs violettes et rougeâtres.", "en": "This is how, for two summers, in the warmth of the Combray garden, I had, because of the book I was reading at the time, a nostalgia for a mountainous and fluvial country, where I would see many sawmills and where, at the bottom of the clear water, pieces of wood rotted under tufts of watercress: not far away clusters of purple and reddish flowers rose along low walls."}, {"start": 5073.86, "end": 5089.17, "b_start": 10106.47, "b_end": 10140.04, "orig": "Et comme le rêve d’une femme qui m’aurait aimé était toujours présent à ma pensée, ces étés-là ce rêve fut imprégné de la fraîcheur des eaux courantes ; et quelle que fût la femme que j’évoquais, des grappes de fleurs violettes et rougeâtres s’élevaient aussitôt de chaque côté d’elle comme des couleurs complémentaires.", "en": "And as the dream of a woman who would have loved me was always present in my thoughts, in those summers this dream was imbued with the freshness of running waters; and whatever woman I was talking about, clusters of purple and reddish flowers immediately rose up on each side of her like complementary colors."}, {"start": 5090.17, "end": 5108.89, "b_start": 10140.04, "b_end": 10181.64, "orig": "Ce n’était pas seulement parce qu’une image dont nous rêvons reste toujours marquée, s’embellit et bénéficie du reflet des couleurs étrangères qui par hasard l’entourent dans notre rêverie ; car ces paysages des livres que je lisais n’étaient pas pour moi que des paysages plus vivement représentés à mon imagination que ceux que Combray mettait sous mes yeux, mais qui eussent été analogues.", "en": "It was not only because an image of which we dream always remains marked, becomes embellished and benefits from the reflection of the foreign colors which by chance surround it in our reverie; because these landscapes in the books that I read were for me not only landscapes more vividly represented to my imagination than those that Combray put before my eyes, but which would have been analogous."}, {"start": 5109.89, "end": 5130.7, "b_start": 10181.64, "b_end": 10225.55, "orig": "Par le choix qu’en avait fait l’auteur, par la foi avec laquelle ma pensée allait au-devant de sa parole comme d’une révélation, ils me semblaient être – impression que ne me donnait guère le pays où je me trouvais, et surtout notre jardin, produit sans prestige de la correcte fantaisie du jardinier que méprisait ma grand’mère – une part véritable de la Nature elle-même, digne d’être étudiée et approfondie.", "en": "By the choice that the author had made, by the faith with which my thoughts approached his words as if they were a revelation, they seemed to me to be - an impression that the country where I found myself hardly gave me, and especially our garden, an unglamorous product of the correct fantasy of the gardener that my grandmother despised - a true part of Nature itself, worthy of study and depth."}, {"start": 5131.7, "end": 5141.15, "b_start": 10225.55, "b_end": 10246.85, "orig": "Si mes parents m’avaient permis, quand je lisais un livre, d’aller visiter la région qu’il décrivait, j’aurais cru faire un pas inestimable dans la conquête de la vérité.", "en": "If my parents had allowed me, when I was reading a book, to go and visit the region it described, I would have believed I was taking an invaluable step in the conquest of the truth."}, {"start": 5142.15, "end": 5162.24, "b_start": 10246.85, "b_end": 10289.1, "orig": "Car si on a la sensation d’être toujours entouré de son âme, ce n’est pas comme d’une prison immobile : plutôt on est comme emporté avec elle dans un perpétuel élan pour la dépasser, pour atteindre à l’extérieur, avec une sorte de découragement, entendant toujours autour de soi cette sonorité identique qui n’est pas écho du dehors, mais retentissement d’une vibration interne.", "en": "Because if we have the sensation of always being surrounded by our soul, it is not like an immobile prison: rather we are as if carried with it in a perpetual momentum to surpass it, to reach outside, with a sort of discouragement, always hearing around us this identical sound which is not an echo from outside, but the resounding of an internal vibration."}, {"start": 5163.24, "end": 5186.47, "b_start": 10289.1, "b_end": 10337.06, "orig": "On cherche à retrouver dans les choses, devenues par là précieuses, le reflet que notre âme a projeté sur elles ; on est déçu en constatant qu’elles semblent dépourvues dans la nature, du charme qu’elles devaient, dans notre pensée, au voisinage de certaines idées ; parfois on convertit toutes les forces de cette âme en habileté, en splendeur pour agir sur des êtres dont nous sentons bien qu’ils sont situés en dehors de nous et que nous ne les atteindrons jamais.", "en": "We seek to find in things, which have thereby become precious, the reflection that our soul has projected onto them; we are disappointed to note that they seem devoid in nature of the charm which they owed, in our thought, to the proximity of certain ideas; sometimes we convert all the forces of this soul into skill, into splendor to act on beings whom we feel are located outside of us and that we will never reach them."}, {"start": 5187.47, "end": 5215.46, "b_start": 10337.06, "b_end": 10397.63, "orig": "Aussi, si j’imaginais toujours autour de la femme que j’aimais les lieux que je désirais le plus alors, si j’eusse voulu que ce fût elle qui me les fît visiter, qui m’ouvrît l’accès d’un monde inconnu, ce n’était pas par le hasard d’une simple association de pensée ; non, c’est que mes rêves de voyage et d’amour n’étaient que des moments – que je sépare artificiellement aujourd’hui comme si je pratiquais des sections à des hauteurs différentes d’un jet d’eau irisé et en apparence immobile – dans un même et infléchissable jaillissement de toutes les forces de ma vie.", "en": "Also, if I always imagined around the woman I loved the places that I most desired at the time, if I would have wanted it to be her who showed me around them, who opened up to me access to an unknown world, it was not by the chance of a simple association of thought; no, it's that my dreams of travel and love were only moments - which I artificially separate today as if I were practicing sections at different heights of an iridescent and apparently immobile jet of water - in the same and unwavering gush of all the forces of my life."}, {"start": 5216.46, "end": 5259.56, "b_start": 10397.63, "b_end": 10487.71, "orig": "Enfin, en continuant à suivre du dedans au dehors les états simultanément juxtaposés dans ma conscience, et avant d’arriver jusqu’à l’horizon réel qui les enveloppait, je trouve des plaisirs d’un autre genre, celui d’être bien assis, de sentir la bonne odeur de l’air, de ne pas être dérangé par une visite : et, quand une heure sonnait au clocher de Saint-Hilaire, de voir tomber morceau par morceau ce qui de l’après-midi était déjà consommé, jusqu’à ce que j’entendisse le dernier coup qui me permettait de faire le total et après lequel, le long silence qui le suivait semblait faire commencer, dans le ciel bleu, toute la partie qui m’était encore concédée pour lire jusqu’au bon dîner qu’apprêtait Françoise et qui me réconforterait des fatigues prises, pendant la lecture du livre, à la suite de son héros.", "en": "Finally, by continuing to follow from inside to outside the states simultaneously juxtaposed in my consciousness, and before arriving at the real horizon which enveloped them, I find pleasures of another kind, that of being well seated, of smelling the good smell of the air, of not being disturbed by a visit: and, when one o'clock struck at the bell tower of Saint-Hilaire, of seeing fall piece by piece what had already been consumed in the afternoon, until that I heard the last knock which allowed me to add up the total and after which, the long silence which followed it seemed to begin, in the blue sky, all the part which was still granted to me to read until the good dinner which Françoise was preparing and which would comfort me from the fatigues suffered, during the reading of the book, following her hero."}, {"start": 5260.56, "end": 5274.84, "b_start": 10487.71, "b_end": 10519.14, "orig": "Et à chaque heure il me semblait que c’était quelques instants seulement auparavant que la précédente avait sonné ; la plus récente venait s’inscrire tout près de l’autre dans le ciel et je ne pouvais croire que soixante minutes eussent tenu dans ce petit arc bleu qui était compris entre leurs deux marques d’or.", "en": "And every hour it seemed to me that it was only a few moments before that the previous one had struck; the most recent was registered very close to the other in the sky and I could not believe that sixty minutes had fit into this little blue arc which was included between their two golden marks."}, {"start": 5275.84, "end": 5294.08, "b_start": 10519.14, "b_end": 10556.69, "orig": "Quelquefois même cette heure prématurée sonnait deux coups de plus que la dernière ; il y en avait donc une que je n’avais pas entendue, quelque chose qui avait eu lieu n’avait pas eu lieu pour moi ; l’intérêt de la lecture, magique comme un profond sommeil, avait donné le change à mes oreilles hallucinées et effacé la cloche d’or sur la surface azurée du silence.", "en": "Sometimes even this premature hour sounded two more times than the last; so there was one that I hadn't heard, something that had happened hadn't happened for me; the interest of reading, magical like a deep sleep, had distracted my hallucinated ears and erased the golden bell on the azure surface of silence."}, {"start": 5295.08, "end": 5325.51, "b_start": 10556.69, "b_end": 10621.72, "orig": "Beaux après-midi du dimanche sous le marronnier du jardin de Combray, soigneusement vidés par moi des incidents médiocres de mon existence personnelle que j’y avais remplacés par une vie d’aventures et d’aspirations étranges au sein d’un pays arrosé d’eaux vives, vous m’évoquez encore cette vie quand je pense à vous et vous la contenez en effet pour l’avoir peu à peu contournée et enclose – tandis que je progressais dans ma lecture et que tombait la chaleur du jour – dans le cristal successif, lentement changeant et traversé de feuillages, de vos heures silencieuses, sonores, odorantes et limpides.", "en": "Beautiful Sunday afternoons under the chestnut tree in the Combray garden, carefully emptied by me of the mediocre incidents of my personal existence which I had replaced there with a life of adventures and strange aspirations in the heart of a country watered with living waters, you still evoke this life for me when I think of you and you in fact contain it by having gradually circumvented and enclosed it - while I progressed in my reading and the heat of the day – in the successive crystal, slowly changing and crossed by foliage, of your silent, sonorous, fragrant and limpid hours."}, {"start": 5326.51, "end": 5344.46, "b_start": 10621.72, "b_end": 10660.03, "orig": "Quelquefois j’étais tiré de ma lecture, dès le milieu de l’après-midi, par la fille du jardinier, qui courait comme une folle, renversant sur son passage un oranger, se coupant un doigt, se cassant une dent et criant : « Les voilà, les voilà ! » pour que Françoise et moi nous accourions et ne manquions rien du spectacle.", "en": "Sometimes I was pulled away from my reading, as early as mid-afternoon, by the gardener's daughter, who ran like crazy, overturning an orange tree in her path, cutting her finger, breaking a tooth and shouting: \"There they are, there they are! » so that Françoise and I would run over and not miss anything of the show."}, {"start": 5345.46, "end": 5353.1, "b_start": 10660.03, "b_end": 10676.53, "orig": "C’était les jours où, pour des manœuvres de garnison, la troupe traversait Combray, prenant généralement la rue Sainte-Hildegarde.", "en": "These were the days when, for garrison maneuvers, the troop crossed Combray, generally taking rue Sainte-Hildegarde."}, {"start": 5354.1, "end": 5368.47, "b_start": 10676.53, "b_end": 10707.74, "orig": "Tandis que nos domestiques assis en rang sur des chaises en dehors de la grille regardaient les promeneurs dominicaux de Combray et se faisaient voir d’eux, la fille du jardinier, par la fente que laissaient entre elles deux maisons lointaines de l’avenue de la Gare, avait aperçu l’éclat des casques.", "en": "While our servants seated in a row on chairs outside the gate looked at the Sunday strollers of Combray and made themselves visible to them, the gardener's daughter, through the gap left between them by two distant houses on Avenue de la Gare, had seen the gleam of the helmets."}, {"start": 5369.47, "end": 5406.94, "b_start": 10707.74, "b_end": 10786.16, "orig": "Les domestiques avaient rentré précipitamment leurs chaises, car quand les cuirassiers défilaient rue Sainte-Hildegarde, ils en remplissaient toute la largeur, et le galop des chevaux rasait les maisons, couvrant les trottoirs submergés comme des berges qui offrent un lit trop étroit à un torrent déchaîné.\n– Pauvres enfants, disait Françoise à peine arrivée à la grille et déjà en larmes ; pauvre jeunesse qui sera fauchée comme un pré ; rien que d’y penser j’en suis choquée, ajoutait-elle en mettant la main sur son cœur, là où elle avait reçu ce\nchoc\n.\n– C’est beau, n’est-ce pas, madame Françoise, de voir des jeunes gens qui ne tiennent pas à la vie ? disait le jardinier pour la faire « monter ».", "en": "The servants had hastily pulled in their chairs, because when the cuirassiers paraded on Rue Sainte-Hildegarde, they filled the entire width, and the gallop of the horses leveled the houses, covering the submerged sidewalks like banks which offer too narrow a channel for a raging torrent. “Poor children,” said Françoise, barely arriving at the gate and already in tears; poor youth who will be cut down like a meadow; Just thinking about it makes me shocked, she added, putting her hand on her heart, where she had received this shock. – It’s beautiful, isn’t it, Madame Françoise, to see young people who don’t want to live? the gardener said to make her “come up.”"}, {"start": 5407.94, "end": 5424.5, "b_start": 10786.16, "b_end": 10820.95, "orig": "Il n’avait pas parlé en vain :\n– De ne pas tenir à la vie ? Mais à quoi donc qu’il faut tenir, si ce n’est pas à la vie, le seul cadeau que le bon Dieu ne fasse jamais deux fois. Hélas ! mon Dieu ! C’est pourtant vrai qu’ils n’y tiennent pas !", "en": "He had not spoken in vain: – Of not holding on to life? But what should we hold on to, if not life, the only gift that the good Lord never gives twice? Alas! my God ! However, it’s true that they don’t want to!"}, {"start": 5425.5, "end": 5454.06, "b_start": 10820.95, "b_end": 10882.76, "orig": "Je les ai vus en 70 ; ils n’ont plus peur de la mort, dans ces misérables guerres ; c’est ni plus ni moins des fous ; et puis ils ne valent plus la corde pour les pendre, ce n’est pas des hommes, c’est des lions. (Pour Françoise la comparaison d’un homme à un lion, qu’elle prononçait li-on, n’avait rien de flatteur.)\nLa rue Sainte-Hildegarde tournait trop court pour qu’on pût voir venir de loin, et c’était par cette fente entre les deux maisons de l’avenue de la gare qu’on apercevait toujours de nouveaux casques courant et brillant au soleil.", "en": "I saw them in 70; they are no longer afraid of death, in these miserable wars; they are neither more nor less crazy; and then they are no longer worth the rope to hang them with, they are not men, they are lions. (For Françoise the comparison of a man to a lion, which she pronounced li-on, was not flattering.) Rue Sainte-Hildegarde turned too short for one to be able to see it coming from afar, and it was through this gap between the two houses on Avenue de la gare that one could always see new helmets running and shining in the sun."}, {"start": 5455.06, "end": 5461.97, "b_start": 10882.76, "b_end": 10898.62, "orig": "Le jardinier aurait voulu savoir s’il y en avait encore beaucoup à passer, et il avait soif, car le soleil tapait.", "en": "The gardener would have liked to know if there were still many more to pass, and he was thirsty, because the sun was beating down."}, {"start": 5462.97, "end": 5479.58, "b_start": 10898.62, "b_end": 10935.49, "orig": "Alors tout d’un coup sa fille s’élançait comme d’une place assiégée, faisait une sortie, atteignait l’angle de la rue, et après avoir bravé cent fois la mort, venait nous rapporter, avec une carafe de coco, la nouvelle qu’ils étaient bien un mille qui venaient sans arrêter du côté de Thiberzy et de Méséglise.", "en": "Then all of a sudden his daughter rushed out as if from a place under siege, made an exit, reached the corner of the street, and after having braved death a hundred times, came to bring us, with a jug of coconut, the news that there were indeed a thousand of them coming without stopping from the direction of Thiberzy and Méséglise."}, {"start": 5480.58, "end": 5500.06, "b_start": 10935.49, "b_end": 10974.91, "orig": "Françoise et le jardinier, réconciliés, discutaient sur la conduite à tenir en cas de guerre :\n– Voyez-vous, Françoise, disait le jardinier, la révolution vaudrait mieux, parce que quand on la déclare il n’y a que ceux qui veulent partir qui y vont.\n– Ah ! oui, au moins je comprends cela, c’est plus franc.", "en": "Françoise and the gardener, reconciled, were discussing what to do in the event of war: - You see, Françoise, said the gardener, the revolution would be better, because when it is declared, only those who want to leave go. – Oh! yes, at least I understand that, it’s more frank."}, {"start": 5501.06, "end": 5510.04, "b_start": 10974.91, "b_end": 10994.1, "orig": "Le jardinier croyait qu’à la déclaration de guerre on arrêtait tous les chemins de fer.\n– Pardi, pour pas qu’on se sauve, disait Françoise.", "en": "The gardener believed that when war was declared all the railways would be stopped. “Of course, so we don’t run away,” said Françoise."}, {"start": 5511.04, "end": 5524.5, "b_start": 10994.1, "b_end": 11023.7, "orig": "Et le jardinier : « Ah ! ils sont malins », car il n’admettait pas que la guerre ne fût pas une espèce de mauvais tour que l’État essayait de jouer au peuple et que, si on avait eu le moyen de le faire, il n’est pas une seule personne qui n’eût filé.", "en": "And the gardener: “Ah! they are clever”, because he did not admit that the war was not a kind of bad trick that the State was trying to play on the people and that, if we had had the means to do it, there is not a single person who would not have escaped."}, {"start": 5525.5, "end": 5536.04, "b_start": 11023.7, "b_end": 11045.99, "orig": "Mais Françoise se hâtait de rejoindre ma tante, je retournais à mon livre, les domestiques se réinstallaient devant la porte à regarder tomber la poussière et l’émotion qu’avaient soulevées les soldats.", "en": "But Françoise hurried to join my aunt, I returned to my book, the servants settled back in front of the door to watch the dust fall and the emotion that the soldiers had raised."}, {"start": 5537.04, "end": 5543.81, "b_start": 11045.99, "b_end": 11060.57, "orig": "Longtemps après que l’accalmie était venue, un flot inaccoutumé de promeneurs noircissait encore les rues de Combray.", "en": "Long after the lull had come, an unusual flow of walkers still blackened the streets of Combray."}, {"start": 5544.81, "end": 5560.46, "b_start": 11060.57, "b_end": 11094.2, "orig": "Et devant chaque maison, même celles où ce n’était pas l’habitude, les domestiques ou même les maîtres, assis et regardant, festonnaient le seuil d’un liséré capricieux et sombre comme celui des algues et des coquilles dont une forte marée laisse le crêpe et la broderie au rivage, après qu’elle s’est éloignée.", "en": "And in front of each house, even those where it was not the custom, the servants or even the masters, sitting and watching, festooned the threshold with a capricious and dark border like that of seaweed and shells whose crepe and embroidery a strong tide leaves on the shore, after it has moved away."}, {"start": 5561.46, "end": 5566.78, "b_start": 11094.2, "b_end": 11106.14, "orig": "Sauf ces jours-là, je pouvais d’habitude, au contraire, lire tranquille.", "en": "Except on those days, I could usually, on the contrary, read in peace."}, {"start": 5567.78, "end": 5589.53, "b_start": 11106.14, "b_end": 11152.79, "orig": "Mais l’interruption et le commentaire qui furent apportés une fois par une visite de Swann à la lecture que j’étais en train de faire du livre d’un auteur tout nouveau pour moi, Bergotte, eut cette conséquence que, pour longtemps, ce ne fut plus sur un mur décoré de fleurs violettes en quenouille, mais sur un fond tout autre, devant le portail d’une cathédrale gothique, que se détacha désormais l’image d’une des femmes dont je rêvais.", "en": "But the interruption and the comment which were brought once by a visit from Swann to the reading that I was doing of the book of an author completely new to me, Bergotte, had the consequence that, for a long time, it was no longer on a wall decorated with purple distaff flowers, but on a completely different background, in front of the portal of a Gothic cathedral, that the image of one of the women of which I dreamed stood out."}, {"start": 5590.53, "end": 5598.64, "b_start": 11152.79, "b_end": 11170.1, "orig": "J’avais entendu parler de Bergotte pour la première fois par un de mes camarades plus âgé que moi et pour qui j’avais une grande admiration, Bloch.", "en": "I had heard of Bergotte for the first time from one of my classmates who was older than me and for whom I had great admiration, Bloch."}, {"start": 5599.64, "end": 5615.94, "b_start": 11170.1, "b_end": 11202.88, "orig": "En m’entendant lui avouer mon admiration pour la\nNuit d’Octobre\n, il avait fait éclater un rire bruyant comme une trompette et m’avait dit : « Défie-toi de ta dilection assez basse pour le sieur de Musset. C’est un coco des plus malfaisants et une assez sinistre brute.", "en": "Hearing me confess to him my admiration for La Nuit d’Octobre, he burst out with a loud laugh like a trumpet and said to me: “Beware of your rather base dilection for the Sieur de Musset. He is a most evil commie and a rather sinister brute."}, {"start": 5616.94, "end": 5629.46, "b_start": 11202.88, "b_end": 11229.84, "orig": "Je dois confesser, d’ailleurs, que lui et même le nommé Racine, ont fait chacun dans leur vie un vers assez bien rythmé, et qui a pour lui, ce qui est selon moi le mérite suprême, de ne signifier absolument rien.", "en": "I must confess, moreover, that he and even the man named Racine, each wrote a fairly well-paced verse in their lives, and which has for him, what is in my opinion the supreme merit, of meaning absolutely nothing."}, {"start": 5630.46, "end": 5644.89, "b_start": 11229.84, "b_end": 11260.67, "orig": "C’est : « La blanche Oloossone et la blanche Camire » et « La fille de Minos et de Pasiphaé ». Ils m’ont été signalés à la décharge de ces deux malandrins par un article de mon très cher maître, le père Lecomte, agréable aux Dieux immortels.", "en": "These are: “The white Oloossone and the white Camire” and “The daughter of Minos and Pasiphaé”. They were brought to my attention in defense of these two thugs by an article by my very dear master, Father Lecomte, pleasing to the immortal Gods."}, {"start": 5645.89, "end": 5653.26, "b_start": 11260.67, "b_end": 11277.24, "orig": "À propos voici un livre que je n’ai pas le temps de lire en ce moment qui est recommandé, paraît-il, par cet immense bonhomme.", "en": "By the way, here is a book that I don't have time to read at the moment which is recommended, it seems, by this immense man."}, {"start": 5654.26, "end": 5666.88, "b_start": 11277.24, "b_end": 11303.87, "orig": "Il tient, m’a-t-on dit, l’auteur, le sieur Bergotte, pour un coco des plus subtils ; et bien qu’il fasse preuve, des fois, de mansuétudes assez mal explicables, sa parole est pour moi oracle delphique.", "en": "He considers, I was told, the author, Mr. Bergotte, to be a very subtle comrade; and although he sometimes shows leniency that is quite difficult to explain, his words are for me a Delphic oracle."}, {"start": 5667.88, "end": 5689.96, "b_start": 11303.87, "b_end": 11345.93, "orig": "Lis donc ces proses lyriques, et si le gigantesque assembleur de rythmes qui a écrit\nBhagavat\net le\nLevrier de Magnus\na dit vrai, par Apollon tu goûteras, cher maître, les joies nectaréennes de l’Olympos. » C’est sur un ton sarcastique qu’il m’avait demandé de l’appeler « cher maître » et qu’il m’appelait lui-même ainsi.", "en": "So read these lyrical prose, and if the gigantic assembler of rhythms who wrote Bhagavat and the Greyhound of Magnus spoke the truth, through Apollo you will taste, dear master, the nectarean joys of Olympos. » It was in a sarcastic tone that he asked me to call him “dear master” and that he himself called me that."}, {"start": 5690.96, "end": 5698.06, "b_start": 11345.93, "b_end": 11362.19, "orig": "Mais en réalité nous prenions un certain plaisir à ce jeu, étant encore rapprochés de l’âge où on croit qu’on crée ce qu’on nomme.", "en": "But in reality we took a certain pleasure in this game, being still closer to the age when we believe we are creating what we name."}, {"start": 5699.06, "end": 5713.9, "b_start": 11362.19, "b_end": 11395.44, "orig": "Malheureusement, je ne pus pas apaiser en causant avec Bloch et en lui demandant des explications, le trouble où il m’avait jeté quand il m’avait dit que les beaux vers (à moi qui n’attendais d’eux rien moins que la révélation de la vérité) étaient d’autant plus beaux qu’ils ne signifiaient rien du tout.", "en": "Unfortunately, by talking with Bloch and asking him for explanations, I could not calm down the confusion he had thrown me into when he told me that the beautiful verses (for me who expected nothing less from them than the revelation of the truth) were all the more beautiful because they meant nothing at all."}, {"start": 5714.9, "end": 5720.99, "b_start": 11395.44, "b_end": 11409.4, "orig": "Bloch en effet ne fut pas réinvité à la maison. Il y avait d’abord été bien accueilli.", "en": "Bloch in fact was not invited back to the house. He was initially well received there."}, {"start": 5721.99, "end": 5738.89, "b_start": 11409.4, "b_end": 11446.39, "orig": "Mon grand-père, il est vrai, prétendait que chaque fois que je me liais avec un de mes camarades plus qu’avec les autres et que je l’amenais chez nous, c’était toujours un juif, ce qui ne lui eût pas déplu en principe – même son ami Swann était d’origine juive – s’il n’avait trouvé que ce n’était pas d’habitude parmi les meilleurs que je le choisissais.", "en": "My grandfather, it is true, claimed that every time I became friends with one of my comrades more than with the others and brought him to our house, he was always a Jew, which would not have displeased him in principle – even his friend Swann was of Jewish origin – if he had not found that it was not usually among the best that I chose him."}, {"start": 5739.89, "end": 5761.18, "b_start": 11446.39, "b_end": 11485.31, "orig": "Aussi quand j’amenais un nouvel ami, il était bien rare qu’il ne fredonnât pas : «\nÔ Dieu de nos Pères\n» de\nla Juive\nou bien «\nIsraël romps ta chaîne\n», ne chantant que l’air naturellement (Ti la lam ta lam, talim), mais j’avais peur que mon camarade ne le connût et ne rétablît les paroles.", "en": "So when I brought a new friend, it was very rare that he did not hum: “O God of our Fathers” from the Jewess or “Israel break your chain”, singing only the tune naturally (Ti la lam ta lam, talim), but I was afraid that my comrade would know it and restore the words."}, {"start": 5762.18, "end": 5783.3, "b_start": 11485.31, "b_end": 11529.94, "orig": "Avant de les avoir vus, rien qu’en entendant leur nom qui, bien souvent, n’avait rien de particulièrement israélite, il devinait non seulement l’origine juive de ceux de mes amis qui l’étaient en effet, mais même ce qu’il y avait quelquefois de fâcheux dans leur famille.\n– Et comment s’appelle-t-il ton ami qui vient ce soir ?\n– Dumont, grand-père.\n– Dumont !", "en": "Before having seen them, just by hearing their name which, very often, had nothing particularly Jewish about it, he guessed not only the Jewish origin of those of my friends who were indeed Jewish, but even what was sometimes unfortunate in their family. –And what is the name of your friend who is coming this evening? – Dumont, grandfather. –Dumont!"}, {"start": 5784.3, "end": 5800.18, "b_start": 11529.94, "b_end": 11562.13, "orig": "Oh ! je me méfie. Et il chantait :\n« Archers, faites bonne garde ! Veillez sans trêve et sans bruit ; »\nEt après nous avoir posé adroitement quelques questions plus précises, il s’écriait : « À la garde !", "en": "Oh ! I am wary. And he sang: “Archers, keep good guard! Watch without respite and without noise; » And after skillfully asking us a few more precise questions, he exclaimed: “At the guard!"}, {"start": 5801.18, "end": 5837.71, "b_start": 11562.13, "b_end": 11634.6, "orig": "À la garde ! » ou, si c’était le patient lui-même déjà arrivé qu’il avait forcé à son insu, par un interrogatoire dissimulé, à confesser ses origines, alors, pour nous montrer qu’il n’avait plus aucun doute, il se contentait de nous regarder en fredonnant imperceptiblement :\n« De ce timide Israëlite\nQuoi ! vous guidez ici les pas ! »\nou :\n« Champs paternels, Hébron, douce vallée. »\nou encore :\n« Oui, je suis de la race élue. »\nCes petites manies de mon grand-père n’impliquaient aucun sentiment malveillant à l’endroit de mes camarades.", "en": "On guard! » or, if it was the patient himself who had already arrived and who he had unknowingly forced, through a hidden interrogation, to confess his origins, then, to show us that he no longer had any doubts, he was content to look at us while humming imperceptibly: “From this timid Israelite What! you guide the steps here! » or: “Father's fields, Hebron, sweet valley. » or: “Yes, I am of the chosen race. » These little quirks of my grandfather did not imply any malicious feelings towards my comrades."}, {"start": 5838.71, "end": 5856.9, "b_start": 11634.6, "b_end": 11672.32, "orig": "Mais Bloch avait déplu à mes parents pour d’autres raisons. Il avait commencé par agacer mon père qui, le voyant mouillé, lui avait dit avec intérêt :\n– Mais, monsieur Bloch, quel temps fait-il donc ? est-ce qu’il a plu ? Je n’y comprends rien, le baromètre était excellent.", "en": "But Bloch had displeased my parents for other reasons. He had started by annoying my father who, seeing him wet, had said to him with interest: – But, Mr Bloch, what is the weather like? did it rain? I don't understand anything about it, the barometer was excellent."}, {"start": 5857.9, "end": 5864.41, "b_start": 11672.32, "b_end": 11685.74, "orig": "Il n’en avait tiré que cette réponse :\n– Monsieur, je ne puis absolument vous dire s’il a plu.", "en": "He only got this response: – Sir, I absolutely cannot tell you if it rained."}, {"start": 5865.41, "end": 5881.9, "b_start": 11685.74, "b_end": 11721.13, "orig": "Je vis si résolument en dehors des contingences physiques que mes sens ne prennent pas la peine de me les notifier.\n– Mais, mon pauvre fils, il est idiot ton ami, m’avait dit mon père quand Bloch fut parti. Comment ! il ne peut même pas me dire le temps qu’il fait !", "en": "I live so resolutely outside of physical contingencies that my senses do not take the trouble to notify me of them. – But, my poor son, your friend is an idiot, my father said to me when Bloch had left. How ! he can’t even tell me what the weather is like!"}, {"start": 5882.9, "end": 5887.74, "b_start": 11721.13, "b_end": 11732.04, "orig": "Mais il n’y a rien de plus intéressant ! C’est un imbécile.", "en": "But there’s nothing more interesting! He's an idiot."}, {"start": 5888.74, "end": 5903.96, "b_start": 11732.04, "b_end": 11763.9, "orig": "Puis Bloch avait déplu à ma grand’mère parce que, après le déjeuner comme elle disait qu’elle était un peu souffrante, il avait étouffé un sanglot et essuyé des larmes.\n– Comment veux-tu que ça soit sincère, me dit-elle, puisqu’il ne me connaît pas ; ou bien alors il est fou.", "en": "Then Bloch had displeased my grandmother because, after lunch, as she said she was a little unwell, he had stifled a sob and wiped away tears. – How can you make it sincere, she said to me, since he doesn’t know me; Or maybe he's crazy."}, {"start": 5904.96, "end": 5920.15, "b_start": 11763.9, "b_end": 11796.24, "orig": "Et enfin il avait mécontenté tout le monde parce que, étant venu déjeuner une heure et demie en retard et couvert de boue, au lieu de s’excuser, il avait dit :\n– Je ne me laisse jamais influencer par les perturbations de l’atmosphère ni par les divisions conventionnelles du temps.", "en": "And finally he had displeased everyone because, having come to lunch an hour and a half late and covered in mud, instead of apologizing, he had said: – I never allow myself to be influenced by the disturbances of the atmosphere nor by the conventional divisions of time."}, {"start": 5921.15, "end": 5934.81, "b_start": 11796.24, "b_end": 11826.92, "orig": "Je réhabiliterais volontiers l’usage de la pipe d’opium et du kriss malais, mais j’ignore celui de ces instruments infiniment plus pernicieux et d’ailleurs platement bourgeois, la montre et le parapluie. Il serait malgré tout revenu à Combray.", "en": "I would gladly rehabilitate the use of the opium pipe and the Malay kriss, but I ignore the use of these infinitely more pernicious and moreover flatly bourgeois instruments, the watch and the umbrella. Despite everything, he would have returned to Combray."}, {"start": 5935.81, "end": 5965.16, "b_start": 11826.92, "b_end": 11890.3, "orig": "Il n’était pas pourtant l’ami que mes parents eussent souhaité pour moi ; ils avaient fini par penser que les larmes que lui avait fait verser l’indisposition de ma grand’mère n’étaient pas feintes ; mais ils savaient d’instinct ou par expérience que les élans de notre sensibilité ont peu d’empire sur la suite de nos actes et la conduite de notre vie, et que le respect des obligations morales, la fidélité aux amis, l’exécution d’une œuvre, l’observance d’un régime, ont un fondement plus sûr dans des habitudes aveugles que dans ces transports momentanés, ardents et stériles.", "en": "However, he was not the friend that my parents would have wanted for me; they ended up thinking that the tears that my grandmother's indisposition had caused him to shed were not feigned; but they knew instinctively or by experience that the impulses of our sensitivity have little influence over the course of our actions and the conduct of our life, and that respect for moral obligations, loyalty to friends, the execution of a work, the observance of a regime, have a surer foundation in blind habits than in these momentary, ardent and sterile transports."}, {"start": 5966.16, "end": 5993.21, "b_start": 11890.3, "b_end": 11946.61, "orig": "Ils auraient préféré pour moi à Bloch des compagnons qui ne me donneraient pas plus qu’il n’est convenu d’accorder à ses amis, selon les règles de la morale bourgeoise ; qui ne m’enverraient pas inopinément une corbeille de fruits parce qu’ils auraient ce jour-là pensé à moi avec tendresse, mais qui, n’étant pas capables de faire pencher en ma faveur la juste balance des devoirs et des exigences de l’amitié sur un simple mouvement de leur imagination et de leur sensibilité, ne la fausseraient pas davantage à mon préjudice.", "en": "They would have preferred companions for me to Bloch who would not give me more than is agreed to be granted to one's friends, according to the rules of bourgeois morality; who would not unexpectedly send me a basket of fruit because they would have thought of me with tenderness that day, but who, not being capable of tilting in my favor the fair balance of duties and the demands of friendship on a simple movement of their imagination and their sensitivity, would not distort it further to my detriment."}, {"start": 5994.21, "end": 6010.7, "b_start": 11946.61, "b_end": 11982.31, "orig": "Nos torts même font difficilement départir de ce qu’elles nous doivent ces natures dont ma grand’tante était le modèle, elle qui brouillée depuis des années avec une nièce à qui elle ne parlait jamais, ne modifia pas pour cela le testament où elle lui laissait toute sa fortune, parce que c’était sa plus proche parente et que cela « se devait ».", "en": "Even our wrongs make it difficult to deviate from what they owe us by these natures of which my great-aunt was the model, she who had quarreled for years with a niece to whom she never spoke, did not therefore modify the will in which she left her all her fortune, because she was her closest relative and that \"had to be done.\""}, {"start": 6011.7, "end": 6028.45, "b_start": 11982.31, "b_end": 12016.91, "orig": "Mais j’aimais Bloch, mes parents voulaient me faire plaisir, les problèmes insolubles que je me posais à propos de la beauté dénuée de signification de la fille de Minos et de Pasiphaé me fatiguaient davantage et me rendaient plus souffrant que n’auraient fait de nouvelles conversations avec lui, bien que ma mère les jugeât pernicieuses.", "en": "But I loved Bloch, my parents wanted to please me, the insoluble problems I posed to myself about the meaningless beauty of the daughter of Minos and Pasiphae tired me more and made me more suffering than further conversations with him would have done, although my mother considered them pernicious."}, {"start": 6029.45, "end": 6051.84, "b_start": 12016.91, "b_end": 12064.01, "orig": "Et on l’aurait encore reçu à Combray si, après ce dîner, comme il venait de m’apprendre – nouvelle qui plus tard eut beaucoup d’influence sur ma vie, et la rendit plus heureuse, puis plus malheureuse – que toutes les femmes ne pensaient qu’à l’amour et qu’il n’y en a pas dont on ne pût vaincre les résistances, il ne m’avait assuré avoir entendu dire de la façon la plus certaine que ma grand’tante avait eu une jeunesse orageuse et avait été publiquement entretenue.", "en": "And we would still have received him at Combray if, after this dinner, as he had just told me – news which later had a great influence on my life, and made it happier, then more unhappy – that all women only thought of love and that there were none whose resistance could not be overcome, he had not assured me that he had heard it said in the most certain way that my great-aunt had had a stormy youth and had been publicly entertained."}, {"start": 6052.84, "end": 6065.32, "b_start": 12064.01, "b_end": 12090.88, "orig": "Je ne pus me tenir de répéter ces propos à mes parents, on le mit à la porte quand il revint, et quand je l’abordai ensuite dans la rue, il fut extrêmement froid pour moi. Mais au sujet de Bergotte il avait dit vrai.", "en": "I couldn't keep myself from repeating these words to my parents, he was kicked out when he came back, and when I then approached him in the street, he was extremely cold to me. But about Bergotte he had spoken the truth."}, {"start": 6066.32, "end": 6075.06, "b_start": 12090.88, "b_end": 12110.23, "orig": "Les premiers jours, comme un air de musique dont on raffolera, mais qu’on ne distingue pas encore, ce que je devais tant aimer dans son style ne m’apparut pas.", "en": "The first days, like a tune of music that we love, but which we cannot yet distinguish, what I must have loved so much in his style did not appear to me."}, {"start": 6076.06, "end": 6089.88, "b_start": 12110.23, "b_end": 12139.93, "orig": "Je ne pouvais pas quitter le roman que je lisais de lui, mais me croyais seulement intéressé par le sujet, comme dans ces premiers moments de l’amour où on va tous les jours retrouver une femme à quelque réunion, à quelque divertissement par les agréments desquels on se croit attiré.", "en": "I couldn't put down the novel I was reading by him, but only thought I was interested in the subject, like in those first moments of love when we go every day to find a woman at some meeting, at some entertainment by the pleasures of which we believe we are attracted."}, {"start": 6090.88, "end": 6127.26, "b_start": 12139.93, "b_end": 12215.47, "orig": "Puis je remarquai les expressions rares, presque archaïques qu’il aimait employer à certains moments où un flot caché d’harmonie, un prélude intérieur, soulevait son style ; et c’était aussi à ces moments-là qu’il se mettait à parler du « vain songe de la vie », de « l’inépuisable torrent des belles apparences », du « tourment stérile et délicieux de comprendre et d’aimer », des « émouvantes effigies qui anoblissent à jamais la façade vénérable et charmante des cathédrales », qu’il exprimait toute une philosophie nouvelle pour moi par de merveilleuses images dont on aurait dit que c’était elles qui avaient éveillé ce chant de harpes qui s’élevait alors et à l’accompagnement duquel elles donnaient quelque chose de sublime.", "en": "Then I noticed the rare, almost archaic expressions that he liked to use at certain moments when a hidden flow of harmony, an interior prelude, lifted his style; and it was also at these moments that he began to speak of the \"vain dream of life\", of the \"inexhaustible torrent of beautiful appearances\", of the \"sterile and delicious torment of understanding and loving\", of the \"moving effigies which ennoble forever the venerable and charming facade of the cathedrals\", that he expressed a whole new philosophy for me through marvelous images which one would have said were the ones who had awakened this song of harps which then rose and to the accompaniment of which they gave something sublime."}, {"start": 6128.26, "end": 6145.33, "b_start": 12215.47, "b_end": 12252.78, "orig": "Un de ces passages de Bergotte, le troisième ou le quatrième que j’eusse isolé du reste, me donna une joie incomparable à celle que j’avais trouvée au premier, une joie que je me sentis éprouver en une région plus profonde de moi-même, plus unie, plus vaste, d’où les obstacles et les séparations semblaient avoir été enlevés.", "en": "One of these passages from Bergotte, the third or fourth that I had isolated from the rest, gave me a joy incomparable to that which I had found in the first, a joy which I felt myself experiencing in a deeper region of myself, more united, more vast, from where obstacles and separations seem
