flot tout charnel, sans expression de spiritualité et qu’un empressement plein de bassesse fouettait en tempête, éveillèrent tout d’un coup dans mon esprit la possibilité d’un Legrandin tout différent de celui que nous connaissions.", "en": "This rapid recovery caused Legrandin's rump, which I did not suppose to be so fleshy, to flow back in a sort of fiery and muscular wave; and I don't know why this undulation of pure matter, this entirely carnal flow, without expression of spirituality and which an eagerness full of baseness whipped into a storm, suddenly awakened in my mind the possibility of a Legrandin quite different from the one we knew."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Cette dame le pria de dire quelque chose à son cocher, et tandis qu’il allait jusqu’à la voiture, l’empreinte de joie timide et dévouée que la présentation avait marquée sur son visage y persistait encore.", "en": "This lady begged him to say something to his coachman, and as he went to the carriage, the mark of shy and devoted joy which the presentation had marked on his face still persisted there."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ravi dans une sorte de rêve, il souriait, puis il revint vers la dame en se hâtant et, comme il marchait plus vite qu’il n’en avait l’habitude, ses deux épaules oscillaient de droite et de gauche ridiculement, et il avait l’air tant il s’y abandonnait entièrement en n’ayant plus souci du reste, d’être le jouet inerte et mécanique du bonheur.", "en": "Delighted in a sort of dream, he smiled, then he hurried back towards the lady and, as he walked faster than he was used to, his two shoulders oscillated from right to left ridiculously, and he seemed, as he abandoned himself entirely to it, no longer caring about the rest, to be the inert and mechanical toy of happiness."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Cependant, nous sortions du porche, nous allions passer à côté de lui, il était trop bien élevé pour détourner la tête, mais il fixa de son regard soudain chargé d’une rêverie profonde un point si éloigné de l’horizon qu’il ne put nous voir et n’eut pas à nous saluer.", "en": "However, we were leaving the porch, we were going to pass by him, he was too well behaved to turn his head away, but he fixed with his gaze suddenly charged with deep reverie a point so far away on the horizon that he could not see us and did not have to greet us."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Son visage restait ingénu au-dessus d’un veston souple et droit qui avait l’air de se sentir fourvoyé malgré lui au milieu d’un luxe détesté.", "en": "His face remained ingenuous above a soft, straight jacket which had the air of feeling misplaced in spite of itself in the middle of a hated luxury."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et une lavallière à pois qu’agitait le vent de la Place continuait à flotter sur Legrandin comme l’étendard de son fier isolement et de sa noble indépendance.", "en": "And a polka-dot ascot waved by the wind from the Place continued to float over Legrandin like the standard of his proud isolation and noble independence."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Au moment où nous arrivions à la maison, maman s’aperçut qu’on avait oublié le saint-honoré et demanda à mon père de retourner avec moi sur nos pas dire qu’on l’apportât tout de suite. Nous croisâmes près de l’église Legrandin qui venait en sens inverse conduisant la même dame à sa voiture.", "en": "As we arrived home, mother noticed that we had forgotten the saint-honoré and asked my father to return with me and tell us to bring it straight away. We passed near the church Legrandin who was coming in the opposite direction leading the same lady to her car."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il passa contre nous, ne s’interrompit pas de parler à sa voisine, et nous fit du coin de son œil bleu un petit signe en quelque sorte intérieur aux paupières et qui, n’intéressant pas les muscles de son visage, put passer parfaitement inaperçu de son interlocutrice ; mais, cherchant à compenser par l’intensité du sentiment le champ un peu étroit où il en circonscrivait l’expression, dans ce coin d’azur qui nous était affecté il fit pétiller tout l’entrain de la bonne grâce qui dépassa l’enjouement, frisa la malice ; il subtilisa les finesses de l’amabilité jusqu’aux clignements de la connivence, aux demi-mots, aux sous-entendus, aux mystères de la complicité ; et finalement exalta les assurances d’amitié jusqu’aux protestations de tendresse, jusqu’à la déclaration d’amour, illuminant alors pour nous seuls, d’une langueur secrète et invisible à la châtelaine, une prunelle énamourée dans un visage de glace.", "en": "He passed by us, did not stop talking to his neighbor, and made us from the corner of his blue eye a little sign, somehow inside the eyelids and which, not involving the muscles of his face, was able to go perfectly unnoticed by his interlocutor; but, seeking to compensate by the intensity of the feeling for the somewhat narrow field where he circumscribed its expression, in this azure corner which was assigned to us he made all the enthusiasm of good grace sparkle which went beyond playfulness, bordering on malice; he refined the finer points of kindness down to the winks of connivance, the half-words, the innuendoes, the mysteries of complicity; and finally exalted the assurances of friendship to the protests of tenderness, to the declaration of love, illuminating then for us alone, with a secret languor invisible to the chatelaine, an enamored pupil in a face of ice."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il avait précisément demandé la veille à mes parents de m’envoyer dîner ce soir-là avec lui : « Venez tenir compagnie à votre vieil ami, m’avait-il dit.", "en": "The day before, he had specifically asked my parents to send me to dinner that evening with him: “Come and keep your old friend company,” he told me."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Comme le bouquet qu’un voyageur nous envoie d’un pays où nous ne retournerons plus, faites-moi respirer du lointain de votre adolescence ces fleurs des printemps que j’ai traversés moi aussi il y a bien des années.", "en": "Like the bouquet that a traveler sends us from a country where we will never return, make me breathe from the distance of your adolescence these spring flowers that I too crossed many years ago."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Venez avec la primevère, la barbe de chanoine, le bassin d’or, venez avec le sédum dont est fait le bouquet de dilection de la flore balzacienne, avec la fleur du jour de la Résurrection, la pâquerette et la boule de neige des jardins qui commence à embaumer dans les allées de votre grand’tante, quand ne sont pas encore fondues les dernières boules de neige des giboulées de Pâques.", "en": "Come with the primrose, the canon's beard, the basin of gold, come with the sedum from which the favorite bouquet of the Balzacian flora is made, with the flower of the day of the Resurrection, the daisy and the snowball from the gardens which begins to scent in the paths of your great aunt, when the last snowballs of the Easter showers have not yet melted."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Venez avec la glorieuse vêture de soie du lis digne de Salomon, et l’émail polychrome des pensées, mais venez surtout avec la brise fraîche encore des dernières gelées et qui va entr’ouvrir, pour les deux papillons qui depuis ce matin attendent à la porte, la première rose de Jérusalem. »\nOn se demandait à la maison si on devait m’envoyer tout de même dîner avec M.", "en": "Come with the glorious silk clothing of the lily worthy of Solomon, and the polychrome enamel of thoughts, but above all come with the fresh breeze still from the last frosts and which will half open, for the two butterflies who since this morning have been waiting at the door, the first rose of Jerusalem. » People were wondering at home if they should still send me to dinner with Mr."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Legrandin.", "en": "Legrandin."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais ma grand’mère refusa de croire qu’il eût été impoli. « Vous reconnaissez vous-même qu’il vient là avec sa tenue toute simple qui n’est guère celle d’un mondain. » Elle déclarait qu’en tous cas, et à tout mettre au pis, s’il l’avait été, mieux valait ne pas avoir l’air de s’en être aperçu.", "en": "But my grandmother refused to believe that he had been rude. “You yourself recognize that he comes there with his very simple outfit which is hardly that of a socialite. » She declared that in any case, and at the worst, if it had been, it would be better not to seem to have noticed it."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "À vrai dire mon père lui-même, qui était pourtant le plus irrité contre l’attitude qu’avait eue Legrandin, gardait peut-être un dernier doute sur le sens qu’elle comportait.", "en": "To tell the truth, my father himself, who was nevertheless the most irritated by Legrandin's attitude, perhaps retained one last doubt about the meaning it implied."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Elle était comme toute attitude ou action où se révèle le caractère profond et caché de quelqu’un : elle ne se relie pas à ses paroles antérieures, nous ne pouvons pas la faire confirmer par le témoignage du coupable qui n’avouera pas ; nous en sommes réduits à celui de nos sens dont nous nous demandons, devant ce souvenir isolé et incohérent, s’ils n’ont pas été le jouet d’une illusion ; de sorte que de telles attitudes, les seules qui aient de l’importance, nous laissent souvent quelques doutes.", "en": "It was like any attitude or action where someone's deep and hidden character is revealed: it is not linked to their previous words, we cannot have it confirmed by the testimony of the guilty person who will not confess; we are reduced to that of our senses of which we wonder, in front of this isolated and incoherent memory, if they have not been the plaything of an illusion; so that such attitudes, the only ones that are important, often leave us with some doubts."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je dînai avec Legrandin sur sa terrasse ; il faisait clair de lune : « Il y a une jolie qualité de silence, n’est-ce pas, me dit-il ; aux cœurs blessés comme l’est le mien, un romancier que vous lirez plus tard prétend que conviennent seulement l’ombre et le silence.", "en": "I dined with Legrandin on his terrace; it was moonlight: “There’s a lovely quality of silence, isn’t there,” he said to me; for wounded hearts like mine, a novelist that you will read later claims that only shadows and silence are suitable."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et voyez-vous, mon enfant, il vient dans la vie une heure dont vous êtes bien loin encore où les yeux las ne tolèrent plus qu’une lumière, celle qu’une belle nuit comme celle-ci prépare et distille avec l’obscurité, où les oreilles ne peuvent plus écouter de musique que celle que joue le clair de lune sur la flûte du silence. » J’écoutais les paroles de M.", "en": "And you see, my child, there comes an hour in life from which you are still far away when weary eyes tolerate only one light, that which a beautiful night like this prepares and distills with the darkness, when the ears can no longer listen to music other than that which the moonlight plays on the flute of silence. » I listened to the words of Mr."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Legrandin qui me paraissaient toujours si agréables ; mais troublé par le souvenir d’une femme que j’avais aperçue dernièrement pour la première fois, et pensant, maintenant que je savais que Legrandin était lié avec plusieurs personnalités aristocratiques des environs, que peut-être il connaissait celle-ci, prenant mon courage, je lui dis : « Est-ce que vous connaissez, monsieur, la... les châtelaines de Guermantes ? », heureux aussi en prononçant ce nom de prendre sur lui une sorte de pouvoir, par le seul fait de le tirer de mon rêve et de lui donner une existence objective et sonore.", "en": "Legrandin who always seemed so pleasant to me; but disturbed by the memory of a woman whom I had recently seen for the first time, and thinking, now that I knew that Legrandin was linked with several aristocratic personalities of the surrounding area, that perhaps he knew this one, taking my courage, I said to him: “Do you know, sir, the... the chatelaines of Guermantes? \", happy also in pronouncing this name to take over a sort of power, by the simple fact of drawing it from my dream and giving it an objective and resounding existence."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais à ce nom de Guermantes, je vis au milieu des yeux bleus de notre ami se ficher une petite encoche brune comme s’ils venaient d’être percés par une pointe invisible, tandis que le reste de la prunelle réagissait en sécrétant des flots d’azur. Le cerne de sa paupière noircit, s’abaissa.", "en": "But at the name of Guermantes, I saw in the middle of our friend's blue eyes a small brown notch appear as if they had just been pierced by an invisible point, while the rest of the pupil reacted by secreting streams of azure. The ring around his eyelid darkened and lowered."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et sa bouche marquée d’un pli amer se ressaissant plus vite sourit, tandis que le regard restait douloureux, comme celui d’un beau martyr dont le corps est hérissé de flèches : « Non, je ne les connais pas », dit-il, mais au lieu de donner à un renseignement aussi simple, à une réponse aussi peu surprenante le ton naturel et courant qui convenait, il le débita en appuyant sur les mots, en s’inclinant, en saluant de la tête, à la fois avec l’insistance qu’on apporte, pour être cru, à une affirmation invraisemblable – comme si ce fait qu’il ne connût pas les Guermantes ne pouvait être l’effet que d’un hasard singulier – et aussi avec l’emphase de quelqu’un qui, ne pouvant pas taire une situation qui lui est pénible, préfère la proclamer pour donner aux autres l’idée que l’aveu qu’il fait ne lui cause aucun embarras, est facile, agréable, spontané, que la situation elle-même – l’absence de relations avec les Guermantes – pourrait bien avoir été non pas subie, mais voulue par lui, résulter de quelque tradition de famille, principe de morale ou vœu mystique lui interdisant nommément la fréquentation des Guermantes. « Non, reprit-il, expliquant par ses paroles sa propre intonation, non, je ne les connais pas, je n’ai jamais voulu, j’ai toujours tenu à sauvegarder ma pleine indépendance ; au fond je suis une tête jacobine, vous le savez.", "en": "And his mouth, marked with a bitter wrinkle, tightening more quickly, smiled, while his gaze remained painful, like that of a beautiful martyr whose body is bristling with arrows: “No, I don't know them,” he said, but instead of giving such simple information, such an unsurprising answer, the appropriate natural and common tone, he delivered it emphasizing the words, bowing, nodding, at the same time with insistence. that one brings, in order to be believed, to an improbable assertion - as if this fact that he did not know the Guermantes could only be the effect of a singular chance - and also with the emphasis of someone who, not being able to silence a situation which is painful to him, prefers to proclaim it to give others the idea that the confession he makes does not cause him any embarrassment, is easy, pleasant, spontaneous, that the situation itself - the absence relations with the Guermantes – could well have been not suffered, but wanted by him, resulting from some family tradition, moral principle or mystical vow prohibiting him by name from frequenting the Guermantes. “No,” he continued, explaining his own intonation with his words, “no, I don’t know them, I never wanted, I have always wanted to safeguard my full independence; deep down I am a Jacobin head, you know that."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Beaucoup de gens sont venus à la rescousse, on me disait que j’avais tort de ne pas aller à Guermantes, que je me donnais l’air d’un malotru, d’un vieil ours. Mais voilà une réputation qui n’est pas pour m’effrayer, elle est si vraie !", "en": "Many people came to the rescue, they told me that I was wrong not to go to Guermantes, that I made myself look like a clumsy person, an old bear. But here is a reputation which is not to frighten me, it is so true!"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Au fond, je n’aime plus au monde que quelques églises, deux ou trois livres, à peine davantage de tableaux, et le clair de lune quand la brise de votre jeunesse apporte jusqu’à moi l’odeur des parterres que mes vieilles prunelles ne distinguent plus. » Je ne comprenais pas bien que, pour ne pas aller chez des gens qu’on ne connaît pas, il fût nécessaire de tenir à son indépendance, et en quoi cela pouvait vous donner l’air d’un sauvage ou d’un ours.", "en": "Basically, I only love a few churches in the world, two or three books, barely more paintings, and the moonlight when the breeze of your youth brings to me the smell of the flowerbeds that my old eyes can no longer distinguish. » I didn't quite understand that, in order not to go to people you don't know, it was necessary to maintain your independence, and how that could make you look like a savage or a bear."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais ce que je comprenais, c’est que Legrandin n’était pas tout à fait véridique quand il disait n’aimer que les églises, le clair de lune et la jeunesse ; il aimait beaucoup les gens des châteaux et se trouvait pris devant eux d’une si grande peur de leur déplaire qu’il n’osait pas leur laisser voir qu’il avait pour amis des bourgeois, des fils de notaires ou d’agents de change, préférant, si la vérité devait se découvrir, que ce fût en son absence, loin de lui et « par défaut » ; il était snob.", "en": "But what I understood was that Legrandin was not entirely truthful when he said he only loved churches, moonlight and youth; he loved the people of the castles very much and found himself overcome by such a great fear of displeasing them that he did not dare let them see that his friends were bourgeois people, the sons of notaries or stockbrokers, preferring, if the truth was to be discovered, that it would be in his absence, far from him and \"by default\"; he was a snob."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Sans doute il ne disait jamais rien de tout cela dans le langage que mes parents et moi-même nous aimions tant.", "en": "No doubt he never said any of this in the language that my parents and I loved so much."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et si je demandais : « Connaissez-vous les Guermantes ? », Legrandin le causeur répondait : « Non, je n’ai jamais voulu les connaître. » Malheureusement il ne le répondait qu’en second, car un autre Legrandin qu’il cachait soigneusement au fond de lui, qu’il ne montrait pas, parce que ce Legrandin-là savait sur le nôtre, sur son snobisme, des histoires compromettantes, un autre Legrandin avait déjà répondu par la blessure du regard, par le rictus de la bouche, par la gravité excessive du ton de la réponse, par les mille flèches dont notre Legrandin s’était trouvé en un instant lardé et alangui, comme un saint Sébastien du snobisme : « Hélas ! que vous me faites mal, non je ne connais pas les Guermantes, ne réveillez pas la grande douleur de ma vie. » Et comme ce Legrandin enfant terrible, ce Legrandin maître chanteur, s’il n’avait pas le joli langage de l’autre, avait le verbe infiniment plus prompt, composé de ce qu’on appelle « réflexes », quand Legrandin le causeur voulait lui imposer silence, l’autre avait déjà parlé et notre ami avait beau se désoler de la mauvaise impression que les révélations de son alter ego avaient dû produire, il ne pouvait qu’entreprendre de la pallier.", "en": "What if I asked: “Do you know the Guermantes? », Legrandin the conversationalist replied: “No, I never wanted to know them. » Unfortunately he only answered it second, because another Legrandin whom he carefully hid deep within himself, whom he did not show, because this Legrandin knew about ours, about his snobbery, compromising stories, another Legrandin had already responded with the hurt of the look, by the rictus of the mouth, by the excessive seriousness of the tone of the response, by the thousand arrows with which our Legrandin had found himself shot in an instant and languid, like a Saint Sebastian of snobbery: “Alas! that you are hurting me, no I do not know the Guermantes, do not awaken the great pain of my life. » And like this Legrandin enfant terrible, this Legrandin blackmailer, if he did not have the pretty language of the other, had the infinitely quicker verb, composed of what we call \"reflexes\", when Legrandin the conversationalist wanted to impose silence on him, the other had already spoken and our friend was sorry for the bad impression that the revelations of his alter ego must have produced, he could only undertake to palliate it."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et certes cela ne veut pas dire que M. Legrandin ne fût pas sincère quand il tonnait contre les snobs.", "en": "And certainly that does not mean that Mr. Legrandin was not sincere when he thundered against the snobs."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il ne pouvait pas savoir, au moins par lui-même, qu’il le fût, puisque nous ne connaissons jamais que les passions des autres, et que ce que nous arrivons à savoir des nôtres, ce n’est que d’eux que nous avons pu l’apprendre.", "en": "He could not have known, at least by himself, that he was, since we only ever know the passions of others, and what we come to know about our own, it is only from them that we have been able to learn."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Sur nous, elles n’agissent que d’une façon seconde, par l’imagination qui substitue aux premiers mobiles des mobiles de relais qui sont plus décents. Jamais le snobisme de Legrandin ne lui conseillait d’aller voir souvent une duchesse.", "en": "On us, they only act in a secondary way, through the imagination which replaces the first motives with relay motives which are more decent. Legrandin's snobbery never advised him to go and see a duchess often."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il chargeait l’imagination de Legrandin de lui faire apparaître cette duchesse comme parée de toutes les grâces. Legrandin se rapprochait de la duchesse, s’estimant de céder à cet attrait de l’esprit et de la vertu qu’ignorent les infâmes snobs.", "en": "He instructed Legrandin's imagination to make this duchess appear to him as adorned with all the graces. Legrandin moved closer to the duchess, considering himself giving in to this attraction of wit and virtue that the infamous snobs ignore."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Seuls les autres savaient qu’il en était un ; car, grâce à l’incapacité où ils étaient de comprendre le travail intermédiaire de son imagination, ils voyaient en face l’une de l’autre l’activité mondaine de Legrandin et sa cause première.", "en": "Only others knew he was one; because, thanks to their incapacity to understand the intermediary work of his imagination, they saw Legrandin's worldly activity and its primary cause face to face."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Maintenant, à la maison, on n’avait plus aucune illusion sur M. Legrandin, et nos relations avec lui s’étaient fort espacées.", "en": "Now, at home, we no longer had any illusions about Mr. Legrandin, and our relations with him had become very distant."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Maman s’amusait infiniment chaque fois qu’elle prenait Legrandin en flagrant délit du péché qu’il n’avouait pas, qu’il continuait à appeler le péché sans rémission, le snobisme.", "en": "Mom was infinitely amused every time she caught Legrandin in the act of committing a sin that he did not admit, which he continued to call sin without remission, snobbery."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mon père, lui, avait de la peine à prendre les dédains de Legrandin avec tant de détachement et de gaîté ; et quand on pensa une année à m’envoyer passer les grandes vacances à Balbec avec ma grand’mère, il dit : « Il faut absolument que j’annonce à Legrandin que vous irez à Balbec, pour voir s’il vous offrira de vous mettre en rapport avec sa sœur.", "en": "My father had difficulty taking Legrandin's disdain with such detachment and cheerfulness; and when they thought one year of sending me to spend the summer holidays in Balbec with my grandmother, he said: “I absolutely have to tell Legrandin that you are going to Balbec, to see if he will offer to put you in touch with his sister."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Il ne doit pas se souvenir nous avoir dit qu’elle demeurait à deux kilomètres de là. » Ma grand’mère qui trouvait qu’aux bains de mer il faut être du matin au soir sur la plage à humer le sel et qu’on n’y doit connaître personne, parce que les visites, les promenades sont autant de pris sur l’air marin, demandait au contraire qu’on ne parlât pas de nos projets à Legrandin, voyant déjà sa sœur, M\nme\nde Cambremer, débarquant à l’hôtel au moment où nous serions sur le point d’aller à la pêche et nous forçant à rester enfermés pour la recevoir.", "en": "He must not remember telling us that she lived two kilometers away. » My grandmother, who found that when bathing in the sea you have to be on the beach from morning to evening smelling the salt and that you shouldn't know anyone there, because the visits, the walks are so much taken from the sea air, asked on the contrary that we not speak of our plans to Legrandin, already seeing his sister, Mme de Cambremer, arriving at the hotel at the moment when we were about to go fishing and forcing us to stay locked up to receive it."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais maman riait de ses craintes, pensant à part elle que le danger n’était pas si menaçant, que Legrandin ne serait pas si pressé de nous mettre en relations avec sa sœur.", "en": "But mother laughed at her fears, thinking to herself that the danger was not so threatening, that Legrandin would not be in such a hurry to put us in touch with his sister."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Or, sans qu’on eût besoin de lui parler de Balbec, ce fut lui-même, Legrandin, qui, ne se doutant pas que nous eussions jamais l’intention d’aller de ce côté, vint se mettre dans le piège un soir où nous le rencontrâmes au bord de la Vivonne.\n– Il y a dans les nuages ce soir des violets et des bleus bien beaux, n’est-ce pas, mon compagnon, dit-il à mon père, un bleu surtout plus floral qu’aérien, un bleu de cinéraire, qui surprend dans le ciel.", "en": "Now, without anyone needing to speak to him about Balbec, it was himself, Legrandin, who, not suspecting that we ever intended to go in that direction, came to put himself in the trap one evening when we met him on the banks of the Vivonne. – There are some very beautiful purples and blues in the clouds this evening, aren’t there, my companion, he said to my father, a blue above all more floral than airy, a cineraria blue, which surprises in the sky."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et ce petit nuage rose n’a-t-il pas aussi un teint de fleur, d’œillet ou d’hydrangéa ? Il n’y a guère que dans la Manche, entre Normandie et Bretagne, que j’ai pu faire de plus riches observations sur cette sorte de règne végétal de l’atmosphère.", "en": "And doesn’t this little pink cloud also have the color of a flower, a carnation or a hydrangea? It is only in the English Channel, between Normandy and Brittany, that I have been able to make richer observations on this sort of plant kingdom of the atmosphere."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Là-bas, près de Balbec, près de ces lieux sauvages, il y a une petite baie d’une douceur charmante où le coucher de soleil du pays d’Auge, le coucher de soleil rouge et or que je suis loin de dédaigner, d’ailleurs, est sans caractère, insignifiant ; mais dans cette atmosphère humide et douce s’épanouissent le soir en quelques instants de ces bouquets célestes, bleus et roses, qui sont incomparables et qui mettent souvent des heures à se faner.", "en": "Over there, near Balbec, near these wild places, there is a small bay of charming sweetness where the sunset of the Pays d'Auge, the red and gold sunset that I am far from disdaining, moreover, is without character, insignificant; but in this humid and soft atmosphere these celestial bouquets, blue and pink, bloom in the evening in a few moments, which are incomparable and which often take hours to fade."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "D’autres s’effeuillent tout de suite, et c’est alors plus beau encore de voir le ciel entier que jonche la dispersion d’innombrables pétales soufrés ou roses.", "en": "Others fall off immediately, and it is then even more beautiful to see the entire sky strewn with the scattering of countless sulfur or pink petals."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Dans cette baie, dite d’opale, les plages d’or semblent plus douces encore pour être attachées comme de blondes Andromèdes à ces terribles rochers des côtes voisines, à ce rivage funèbre, fameux par tant de naufrages, où tous les hivers bien des barques trépassent au péril de la mer.", "en": "In this bay, called opal, the golden beaches seem even sweeter to be attached like blond Andromedas to these terrible rocks of the neighboring coasts, to this funereal shore, famous for so many shipwrecks, where every winter many boats perish at the peril of the sea."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Balbec ! la plus antique ossature géologique de notre sol, vraiment Ar-mor, la mer, la fin de la terre, la région maudite qu’Anatole France – un enchanteur que devrait lire notre petit ami – a si bien peinte, sous ses brouillards éternels, comme le véritable pays des Cimmériens, dans l’\nOdyssée\n.", "en": "Balbec! the most ancient geological framework of our soil, truly Ar-mor, the sea, the end of the earth, the cursed region that Anatole France – an enchanter that our little friend should read – has painted so well, under its eternal mists, as the true country of the Cimmerians, in the Odyssey."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "De Balbec surtout, où déjà des hôtels se construisent, superposés au sol antique et charmant qu’ils n’altèrent pas, quel délice d’excursionner à deux pas dans ces régions primitives et si belles.\n– Ah ! est-ce que vous connaissez quelqu’un à Balbec ? dit mon père.", "en": "From Balbec especially, where hotels are already being built, superimposed on the ancient and charming soil which they do not alter, what a delight to take a short excursion into these primitive and beautiful regions. – Oh! do you know anyone in Balbec? said my father."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Justement ce petit-là doit y aller passer deux mois avec sa grand’mère et peut-être avec ma femme.", "en": "This little one is going to spend two months there with his grandmother and perhaps with my wife."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Legrandin pris au dépourvu par cette question à un moment où ses yeux étaient fixés sur mon père, ne put les détourner, mais les attachant de seconde en seconde avec plus d’intensité – et tout en souriant tristement – sur les yeux de son interlocuteur, avec un air d’amitié et de franchise et de ne pas craindre de le regarder en face, il sembla lui avoir traversé la figure comme si elle fût devenue transparente, et voir en ce moment bien au delà derrière elle un nuage vivement coloré qui lui créait un alibi mental et qui lui permettrait d’établir qu’au moment où on lui avait demandé s’il connaissait quelqu’un à Balbec, il pensait à autre chose et n’avait pas entendu la question.", "en": "Legrandin, taken by surprise by this question at a moment when his eyes were fixed on my father, could not turn them away, but fixing them from second to second with more intensity - and while smiling sadly - on the eyes of his interlocutor, with an air of friendship and frankness and not afraid to look him in the face, he seemed to have crossed his face as if it had become transparent, and to see at that moment well beyond behind her a brightly colored cloud which created a mental alibi for him. and which would allow him to establish that when he was asked if he knew anyone in Balbec, he was thinking of something else and had not heard the question."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Habituellement de tels regards font dire à l’interlocuteur : « À quoi pensez-vous donc ? » Mais mon père curieux, irrité et cruel, reprit :\n– Est-ce que vous avez des amis de ce côté-là, que vous connaissez si bien Balbec ?", "en": "Usually such looks make the interlocutor say: “What are you thinking about? » But my curious father, irritated and cruel, continued: – Do you have any friends in that area, who know Balbec so well?"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Dans un dernier effort désespéré, le regard souriant de Legrandin atteignit son maximum de tendresse, de vague, de sincérité et de distraction, mais, pensant sans doute qu’il n’y avait plus qu’à répondre, il nous dit :\n– J’ai des amis partout où il y a des groupes d’arbres blessés, mais non vaincus, qui se sont rapprochés pour implorer ensemble avec une obstination pathétique un ciel inclément qui n’a pas pitié d’eux.\n– Ce n’est pas cela que je voulais dire, interrompit mon père, aussi obstiné que les arbres et aussi impitoyable que le ciel.", "en": "In a last desperate effort, Legrandin's smiling gaze reached its maximum of tenderness, vagueness, sincerity and distraction, but, no doubt thinking that there was nothing left to do but respond, he said to us: - I have friends wherever there are groups of injured, but not vanquished, trees, who have come together to implore together with pathetic obstinacy an inclement sky which has no pity on them. “That’s not what I meant,” interrupted my father, as stubborn as the trees and as merciless as the sky."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je demandais pour le cas où il arriverait n’importe quoi à ma belle-mère et où elle aurait besoin de ne pas se sentir là-bas en pays perdu, si vous y connaissez du monde ?\n– Là comme partout, je connais tout le monde et je ne connais personne, répondit Legrandin qui ne se rendait pas si vite ; beaucoup les choses et fort peu les personnes.", "en": "I was asking in case anything happened to my mother-in-law and she needed to not feel like she was in a lost country, if you know anyone there? “There like everywhere, I know everyone and I don’t know anyone,” replied Legrandin, who was not surrendering so quickly; a lot of things and very few people."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais les choses elles-mêmes y semblent des personnes, des personnes rares, d’une essence délicate et que la vie aurait déçues.", "en": "But the things themselves seem to be people, rare people, of a delicate nature and whom life would have disappointed."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Parfois c’est un castel que vous rencontrez sur la falaise, au bord du chemin où il s’est arrêté pour confronter son chagrin au soir encore rose où monte la lune d’or et dont les barques qui rentrent en striant l’eau diaprée hissent à leurs mâts la flamme et portent les couleurs ; parfois c’est une simple maison solitaire, plutôt laide, l’air timide mais romanesque, qui cache à tous les yeux quelque secret impérissable de bonheur et de désenchantement.", "en": "Sometimes it is a castle that you encounter on the cliff, at the edge of the path where he stopped to confront his sorrow in the still pink evening when the golden moon rises and whose boats which return streaking the variegated water hoist the flame to their masts and carry the colors; sometimes it is a simple solitary house, rather ugly, with a shy but romantic air, which hides from all eyes some imperishable secret of happiness and disenchantment."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Ce pays sans vérité, ajouta-t-il avec une délicatesse machiavélique, ce pays de pure fiction est d’une mauvaise lecture pour un enfant, et ce n’est certes pas lui que je choisirais et recommanderais pour mon petit ami déjà si enclin à la tristesse, pour son cœur prédisposé.", "en": "This country without truth, he added with Machiavellian delicacy, this country of pure fiction is bad reading for a child, and it is certainly not him that I would choose and recommend for my boyfriend, already so prone to sadness, for his predisposed heart."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Les climats de confidence amoureuse et de regret inutile peuvent convenir au vieux désabusé que je suis, ils sont toujours malsains pour un tempérament qui n’est pas formé.", "en": "Climates of loving confidence and useless regret may suit the disillusioned old man that I am, they are always unhealthy for a temperament that is not formed."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Croyez-moi, reprit-il avec insistance, les eaux de cette baie, déjà à moitié bretonne, peuvent exercer une action sédative, d’ailleurs discutable, sur un cœur qui n’est plus intact comme le mien, sur un cœur dont la lésion n’est plus compensée.", "en": "Believe me, he continued insistently, the waters of this bay, already half Breton, can exert a sedative action, moreover debatable, on a heart which is no longer intact like mine, on a heart whose lesion is no longer compensated."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Elles sont contre-indiquées à votre âge, petit garçon. « Bonne nuit, voisin », ajouta-t-il en nous quittant avec cette brusquerie évasive dont il avait l’habitude et, se retournant vers nous avec un doigt levé de docteur, il résuma sa consultation : « Pas de Balbec avant cinquante ans, et encore cela dépend de l’état du cœur », nous cria-t-il.", "en": "They are contraindicated at your age, little boy. “Good night, neighbor,” he added, leaving us with the evasive abruptness he was accustomed to and, turning towards us with a raised doctor’s finger, he summed up his consultation: “No Balbec before fifty years, and again it depends on the state of the heart,” he shouted to us."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mon père lui en reparla dans nos rencontres ultérieures, le tortura de questions, ce fut peine inutile : comme cet escroc érudit qui employait à fabriquer de faux palimpsestes un labeur et une science dont la centième partie eût suffi à lui assurer une situation plus lucrative, mais honorable, M.", "en": "My father spoke to him about it again in our subsequent meetings, torturing him with questions, it was useless trouble: like this learned swindler who used to create false palimpsests a labor and a knowledge of which a hundredth part would have been enough to assure him a more lucrative, but honorable situation, Mr."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Legrandin, si nous avions insisté encore, aurait fini par édifier toute une éthique de paysage et une géographie céleste de la basse Normandie, plutôt que de nous avouer qu’à deux kilomètres de Balbec habitait sa propre sœur, et d’être obligé à nous offrir une lettre d’introduction qui n’eût pas été pour lui un tel sujet d’effroi s’il avait été absolument certain – comme il aurait dû l’être en effet avec l’expérience qu’il avait du caractère de ma grand’mère – que nous n’en aurions pas profité.\n* * *\nNous rentrions toujours de bonne heure de nos promenades pour pouvoir faire une visite à ma tante Léonie avant le dîner.", "en": "Legrandin, if we had insisted still, would have ended up building an entire ethic of landscape and a celestial geography of lower Normandy, rather than admitting to us that two kilometers from Balbec lived his own sister, and being obliged to offer us a letter of introduction which would not have been such a source of fear for him if he had been absolutely certain - as he should have been in fact with the experience he had of my grandmother's character - that we would not have taken advantage of it. * * * We always returned early from our walks so that we could visit my aunt Léonie before dinner."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Au commencement de la saison où le jour finit tôt, quand nous arrivions rue du Saint-Esprit, il y avait encore un reflet du couchant sur les vitres de la maison et un bandeau de pourpre au fond des bois du Calvaire qui se reflétait plus loin dans l’étang, rougeur qui, accompagnée souvent d’un froid assez vif, s’associait, dans mon esprit, à la rougeur du feu au-dessus duquel rôtissait le poulet qui ferait succéder pour moi au plaisir poétique donné par la promenade, le plaisir de la gourmandise, de la chaleur et du repos.", "en": "At the beginning of the season when the day ended early, when we arrived at Rue du Saint-Esprit, there was still a reflection of the sunset on the windows of the house and a band of purple at the bottom of the Calvary woods which was reflected further in the pond, a redness which, often accompanied by a rather sharp cold, was associated, in my mind, with the redness of the fire above which the chicken was roasting which would for me follow the poetic pleasure given by the walk, the pleasure of gluttony, warmth and rest."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Dans l’été au contraire, quand nous rentrions, le soleil ne se couchait pas encore ; et pendant la visite que nous faisions chez ma tante Léonie, sa lumière qui s’abaissait et touchait la fenêtre était arrêtée entre les grands rideaux et les embrasses, divisée, ramifiée, filtrée, et incrustant de petits morceaux d’or le bois de citronnier de la commode, illuminait obliquement la chambre avec la délicatesse qu’elle prend dans les sous-bois.", "en": "In the summer, on the contrary, when we returned, the sun had not yet set; and during the visit we made to my aunt Léonie, her light which lowered and touched the window was stopped between the large curtains and the tiebacks, divided, branched, filtered, and encrusting with small pieces of gold the lemon wood of the chest of drawers, obliquely illuminated the room with the delicacy that it takes on in the undergrowth."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais certains jours fort rares, quand nous rentrions, il y avait bien longtemps que la commode avait perdu ses incrustations momentanées, il n’y avait plus quand nous arrivions rue du Saint-Esprit nul reflet de couchant étendu sur les vitres et l’étang au pied du calvaire avait perdu sa rougeur, quelquefois il était déjà couleur d’opale et un long rayon de lune qui allait en s’élargissant et se fendillait de toutes les rides de l’eau le traversait tout entier.", "en": "But on certain very rare days, when we returned, it had been a long time since the chest of drawers had lost its temporary encrustations, when we arrived at Rue du Saint-Esprit there was no longer any reflection of the setting sun lying on the windows and the pond at the foot of Calvary had lost its redness, sometimes it was already the color of opal and a long ray of moon which widened and cracked with all the ripples of the water crossed it all over. whole."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Alors, en arrivant près de la maison, nous apercevions une forme sur le pas de la porte et maman me disait :\n– Mon dieu ! voilà Françoise qui nous guette, ta tante est inquiète ; aussi nous rentrons trop tard.", "en": "So, when we arrived near the house, we saw a shape on the doorstep and mother said to me: – My God! here is Françoise waiting for us, your aunt is worried; Also we come back too late."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et sans avoir pris le temps d’enlever nos affaires, nous montions vite chez ma tante Léonie pour la rassurer et lui montrer que, contrairement à ce qu’elle imaginait déjà, il ne nous était rien arrivé, mais que nous étions allés « du côté de Guermantes » et, dame, quand on faisait cette promenade-là, ma tante savait pourtant bien qu’on ne pouvait jamais être sûr de l’heure à laquelle on serait rentré.\n– Là, Françoise, disait ma tante, quand je vous le disais, qu’ils seraient allés du côté de Guermantes !", "en": "And without having taken the time to remove our belongings, we quickly went up to my aunt Léonie to reassure her and show her that, contrary to what she already imagined, nothing had happened to us, but that we had gone \"towards Guermantes\" and, lady, when we took that walk, my aunt knew very well that we could never be sure of the time when we would be back. – There, Françoise, said my aunt, when I told you, that they would have gone towards Guermantes!"}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mon Dieu ! ils doivent avoir une faim ! et votre gigot qui doit être tout desséché après ce qu’il a attendu. Aussi est-ce une heure pour rentrer ! comment, vous êtes allés du côté de Guermantes !\n– Mais je croyais que vous le saviez, Léonie, disait maman.", "en": "My God ! They must be hungry! and your leg of lamb which must be completely dried out after waiting for it. Also it's an hour to get home! What, you went to Guermantes! – But I thought you knew that, Léonie, said mother."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je pensais que Françoise nous avait vus sortir par la petite porte du potager.", "en": "I thought Françoise had seen us leave through the little door of the vegetable garden."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Car il y avait autour de Combray deux « côtés » pour les promenades, et si opposés qu’on ne sortait pas en effet de chez nous par la même porte, quand on voulait aller d’un côté ou de l’autre : le côté de Méséglise-la-Vineuse, qu’on appelait aussi le côté de chez Swann parce qu’on passait devant la propriété de M.", "en": "Because around Combray there were two \"sides\" for walks, and so opposite that we did not actually leave our house by the same door, when we wanted to go on one side or the other: the side of Méséglise-la-Vineuse, which we also called the side of Swann's because we passed in front of M."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Swann pour aller par là, et le côté de Guermantes.", "en": "Swann to go that way, and the Guermantes side."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "De Méséglise-la-Vineuse, à vrai dire, je n’ai jamais connu que le « côté » et des gens étrangers qui venaient le dimanche se promener à Combray, des gens que, cette fois, ma tante elle-même et nous tous ne « connaissions point » et qu’à ce signe on tenait pour « des gens qui seront venus de Méséglise ».", "en": "From Méséglise-la-Vineuse, to tell the truth, I only ever knew the “side” and the foreign people who came to walk in Combray on Sundays, people that, this time, my aunt herself and all of us did not “know” and who by this sign we took to be “people who will have come from Méséglise”."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Quant à Guermantes je devais un jour en connaître davantage, mais bien plus tard seulement ; et pendant toute mon adolescence, si Méséglise était pour moi quelque chose d’inaccessible comme l’horizon, dérobé à la vue, si loin qu’on allât, par les plis d’un terrain qui ne ressemblait déjà plus à celui de Combray, Guermantes, lui, ne m’est apparu que comme le terme plutôt idéal que réel de son propre « côté », une sorte d’expression géographique abstraite comme la ligne de l’équateur, comme le pôle, comme l’orient.", "en": "As for Guermantes I was to know more one day, but only much later; and throughout my adolescence, if Méséglise was for me something inaccessible like the horizon, hidden from view, however far one went, through the folds of a terrain which already no longer resembled that of Combray, Guermantes only appeared to me as the rather ideal than real term of his own \"side\", a sort of abstract geographical expression like the line of the equator, like the pole, like the east."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Alors, « prendre par Guermantes » pour aller à Méséglise, ou le contraire, m’eût semblé une expression aussi dénuée de sens que prendre par l’est pour aller à l’ouest.", "en": "So, “take via Guermantes” to go to Méséglise, or the opposite, would have seemed as meaningless an expression to me as take via the east to go to the west."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Comme mon père parlait toujours du côté de Méséglise comme de la plus belle vue de la plaine qu’il connût et du côté de Guermantes comme du type de paysage de rivière, je leur donnais, en les concevant ainsi comme deux entités, cette cohésion, cette unité qui n’appartiennent qu’aux créations de notre esprit ; la moindre parcelle de chacun d’eux me semblait précieuse et manifester leur excellence particulière, tandis qu’à côté d’eux, avant qu’on fût arrivé sur le sol sacré de l’un ou de l’autre, les chemins purement matériels au milieu desquels ils étaient posés comme l’idéal de la vue de plaine et l’idéal du paysage de rivière, ne valaient pas plus la peine d’être regardés que par le spectateur épris d’art dramatique les petites rues qui avoisinent un théâtre.", "en": "As my father always spoke of the Méséglise side as the most beautiful view of the plain he knew and the Guermantes side as the type of river landscape, I gave them, by thus conceiving them as two entities, this cohesion, this unity which only belongs to the creations of our mind; the smallest particle of each of them seemed to me precious and to manifest their particular excellence, while next to them, before we had arrived on the sacred ground of one or the other, the purely material paths in the middle of which they were placed like the ideal of the view of the plain and the ideal of the landscape of the river, were no more worth looking at than for the spectator loving dramatic art the small streets which border a theater."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais surtout je mettais entre eux, bien plus que leurs distances kilométriques, la distance qu’il y avait entre les deux parties de mon cerveau où je pensais à eux, une de ces distances dans l’esprit qui ne font pas qu’éloigner, qui séparent et mettent dans un autre plan.", "en": "But above all I put between them, much more than their kilometric distances, the distance that there was between the two parts of my brain where I thought of them, one of those distances in the mind which do not only distance, which separate and put in another plane."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et cette démarcation était rendue plus absolue encore parce que cette habitude que nous avions de n’aller jamais vers les deux côtés un même jour, dans une seule promenade, mais une fois du côté de Méséglise, une fois du côté de Guermantes, les enfermait pour ainsi dire loin l’un de l’autre, inconnaissables l’un à l’autre, dans les vases clos et sans communication entre eux d’après-midi différents.", "en": "And this demarcation was made even more absolute because this habit that we had of never going towards the two sides on the same day, in a single walk, but once towards Méséglise, once towards Guermantes, locked them up, so to speak, far from each other, unknowable to each other, in isolation and without communication between them on different afternoons."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Quand on voulait aller du côté de Méséglise, on sortait (pas trop tôt et même si le ciel était couvert, parce que la promenade n’était pas bien longue et n’entraînait pas trop) comme pour aller n’importe où, par la grande porte de la maison de ma tante sur la rue du Saint-Esprit.", "en": "When we wanted to go towards Méséglise, we went out (not too early and even if the sky was overcast, because the walk wasn't very long and wasn't too strenuous) as if to go anywhere, through the big door of my aunt's house on Rue du Saint-Esprit."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "On était salué par l’armurier, on jetait ses lettres à la boîte, on disait en passant à Théodore, de la part de Françoise, qu’elle n’avait plus d’huile ou de café, et l’on sortait de la ville par le chemin qui passait le long de la barrière blanche du parc de M. Swann.", "en": "We were greeted by the gunsmith, we threw our letters in the box, we told Théodore in passing, on behalf of Françoise, that she had no more oil or coffee, and we left the town by the path which passed along the white fence of Mr. Swann's park."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Avant d’y arriver, nous rencontrions, venue au-devant des étrangers, l’odeur de ses lilas.", "en": "Before arriving there, we encountered, coming to meet strangers, the smell of its lilacs."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Eux-mêmes, d’entre les petits cœurs verts et frais de leurs feuilles, levaient curieusement au-dessus de la barrière du parc leurs panaches de plumes mauves ou blanches que lustrait, même à l’ombre, le soleil où elles avaient baigné.", "en": "They themselves, from among the little fresh green hearts of their leaves, curiously raised above the park fence their plumes of mauve or white feathers which gleamed, even in the shade, by the sun in which they had bathed."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Quelques-uns, à demi cachés par la petite maison en tuiles appelée maison des Archers, où logeait le gardien, dépassaient son pignon gothique de leur rose minaret.", "en": "A few, half-hidden by the small tiled house called the Archers' house, where the caretaker lived, protruded from its Gothic gable with their pink minaret."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Les Nymphes du printemps eussent semblé vulgaires, auprès de ces jeunes houris qui gardaient dans ce jardin français les tons vifs et purs des miniatures de la Perse.", "en": "The Nymphs of Spring would have seemed vulgar, compared to these young houris who preserved in this French garden the lively and pure tones of the miniatures of Persia."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Malgré mon désir d’enlacer leur taille souple et d’attirer à moi les boucles étoilées de leur tête odorante, nous passions sans nous arrêter, mes parents n’allant plus à Tansonville depuis le mariage de Swann, et, pour ne pas avoir l’air de regarder dans le parc, au lieu de prendre le chemin qui longe sa clôture et qui monte directement aux champs, nous en prenions un autre qui y conduit aussi, mais obliquement, et nous faisait déboucher trop loin.", "en": "Despite my desire to embrace their supple waists and draw to me the starry curls of their fragrant heads, we passed without stopping, my parents no longer going to Tansonville since Swann's marriage, and, so as not to appear to be looking into the park, instead of taking the path which runs along its fence and which goes directly to the fields, we took another which also led there, but obliquely, and led us out too far."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Un jour, mon grand-père dit à mon père :\n– Vous rappelez-vous que Swann a dit hier que, comme sa femme et sa fille partaient pour Reims, il en profiterait pour aller passer vingt-quatre heures à Paris ? Nous pourrions longer le parc, puisque ces dames ne sont pas là, cela nous abrégerait d’autant.", "en": "One day, my grandfather said to my father: – Do you remember that Swann said yesterday that, as his wife and daughter were leaving for Reims, he would take the opportunity to spend twenty-four hours in Paris? We could walk along the park, since these ladies are not there, that would make us even shorter."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Nous nous arrêtâmes un moment devant la barrière.", "en": "We stopped for a moment in front of the barrier."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Le temps des lilas approchait de sa fin ; quelques-uns effusaient encore en hauts lustres mauves les bulles délicates de leurs fleurs, mais dans bien des parties du feuillage où déferlait, il y avait seulement une semaine, leur mousse embaumée, se flétrissait, diminuée et noircie, une écume creuse, sèche et sans parfum.", "en": "The lilac season was nearing its end; some still gave off in high mauve chandeliers the delicate bubbles of their flowers, but in many parts of the foliage where, only a week ago, their embalmed moss surged, withered, diminished and blackened, a hollow foam, dry and without perfume."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mon grand-père montrait à mon père en quoi l’aspect des lieux était resté le même, et en quoi il avait changé, depuis la promenade qu’il avait faite avec M. Swann le jour de la mort de sa femme, et il saisit cette occasion pour raconter cette promenade une fois de plus.", "en": "My grandfather showed my father how the appearance of the place had remained the same, and how it had changed, since the walk he had taken with Mr. Swann on the day of his wife's death, and he took this opportunity to recount that walk once more."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Devant nous, une allée bordée de capucines montait en plein soleil vers le château. À droite, au contraire, le parc s’étendait en terrain plat.", "en": "In front of us, an avenue lined with nasturtiums led up in full sunlight towards the castle. On the right, on the contrary, the park extended onto flat land."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Obscurcie par l’ombre des grands arbres qui l’entouraient, une pièce d’eau avait été creusée par les parents de Swann ; mais dans ses créations les plus factices, c’est sur la nature que l’homme travaille ; certains lieux font toujours régner autour d’eux leur empire particulier, arborent leurs insignes immémoriaux au milieu d’un parc comme ils auraient fait loin de toute intervention humaine, dans une solitude qui revient partout les entourer, surgie des nécessités de leur exposition et superposée à l’œuvre humaine.", "en": "Obscured by the shadows of the tall trees that surrounded it, a pond had been dug by Swann’s parents; but in his most artificial creations, it is on nature that man works; certain places still have their particular empire reign around them, displaying their immemorial insignia in the middle of a park as they would have done far from any human intervention, in a solitude which returns to surround them everywhere, arising from the necessities of their exhibition and superimposed on human work."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "C’est ainsi qu’au pied de l’allée qui dominait l’étang artificiel, s’était composée sur deux rangs, tressés de fleurs de myosotis et de pervenches, la couronne naturelle, délicate et bleue qui ceint le front clair-obscur des eaux, et que le glaïeul, laissant fléchir ses glaives avec un abandon royal, étendait sur l’eupatoire et la grenouillette au pied mouillé les fleurs de lis en lambeaux, violettes et jaunes, de son sceptre lacustre.", "en": "This is how, at the foot of the path overlooking the artificial pond, the natural crown, delicate and blue, which surrounds the chiaroscuro front of the waters, was composed in two rows, woven with forget-me-not and periwinkle flowers, and the gladiolus, letting its swords flex with royal abandon, spread over the eupatory and the wet-footed frog the lily flowers, in tatters, purple and yellow, of his lake scepter."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Le départ de M\nlle\nSwann qui – en m’ôtant la chance terrible de la voir apparaître dans une allée, d’être connu et méprisé par la petite fille privilégiée qui avait Bergotte pour ami et allait avec lui visiter des cathédrales – me rendait la contemplation de Tansonville indifférente la première fois où elle m’était permise, semblait au contraire ajouter à cette propriété, aux yeux de mon grand-père et de mon père, des commodités, un agrément passager, et, comme fait, pour une excursion en pays de montagnes, l’absence de tout nuage, rendre cette journée exceptionnellement propice à une promenade de ce côté ; j’aurais voulu que leurs calculs fussent déjoués, qu’un miracle fît apparaître M\nlle\nSwann avec son père, si près de nous que nous n’aurions pas le temps de l’éviter et serions obligés de faire sa connaissance.", "en": "The departure of Miss Swann, who - by depriving me of the terrible chance of seeing her appear in an alley, of being known and despised by the privileged little girl who had Bergotte for a friend and went with him to visit cathedrals - made the contemplation of Tansonville indifferent to me the first time it was allowed to me, seemed on the contrary to add to this property, in the eyes of my grandfather and my father, conveniences, a temporary pleasure, and, as a matter of fact, for an excursion into the country of mountains, the absence of any cloud, make this day exceptionally suitable for a walk in this direction; I would have liked that their calculations had been foiled, that a miracle would make Miss Swann appear with her father, so close to us that we would not have time to avoid her and would be obliged to make her acquaintance."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Aussi, quand tout d’un coup, j’aperçus sur l’herbe, comme un signe de sa présence possible, un koufin oublié à côté d’une ligne dont le bouchon flottait sur l’eau, je m’empressai de détourner d’un autre côté les regards de mon père et de mon grand-père.", "en": "So, when all of a sudden I saw on the grass, as a sign of its possible presence, a kufin forgotten next to a line whose cap was floating on the water, I hastened to look away from my father and my grandfather in another direction."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "D’ailleurs Swann nous ayant dit que c’était mal à lui de s’absenter, car il avait pour le moment de la famille à demeure, la ligne pouvait appartenir à quelque invité. On n’entendait aucun bruit de pas dans les allées.", "en": "Besides, Swann having told us that it was wrong for him to be absent, because he had family staying at the moment, the line could belong to some guest. There was no sound of footsteps in the aisles."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Divisant la hauteur d’un arbre incertain, un invisible oiseau s’ingéniait à faire trouver la journée courte, explorait d’une note prolongée la solitude environnante, mais il recevait d’elle une réplique si unanime, un choc en retour si redoublé de silence et d’immobilité qu’on aurait dit qu’il venait d’arrêter pour toujours l’instant qu’il avait cherché à faire passer plus vite.", "en": "Dividing the height of an uncertain tree, an invisible bird tried to make the day seem short, explored with a prolonged note the surrounding solitude, but it received from it such a unanimous response, a shock in return so redoubled by silence and immobility that one would have said that it had just stopped forever the moment that it had sought to make pass more quickly."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "La lumière tombait si implacable du ciel devenu fixe que l’on aurait voulu se soustraire à son attention, et l’eau dormante elle-même, dont des insectes irritaient perpétuellement le sommeil, rêvant sans doute de quelque Maelstrôm imaginaire, augmentait le trouble où m’avait jeté la vue du flotteur de liège en semblant l’entraîner à toute vitesse sur les étendues silencieuses du ciel reflété ; presque vertical il paraissait prêt à plonger et déjà je me demandais, si, sans tenir compte du désir et de la crainte que j’avais de la connaître, je n’avais pas le devoir de faire prévenir M\nlle\nSwann que le poisson mordait – quand il me fallut rejoindre en courant mon père et mon grand-père qui m’appelaient, étonnés que je ne les eusse pas suivis dans le petit chemin qui monte vers les champs et où ils s’étaient engagés.", "en": "The light fell so implacably from the sky which had become fixed that one would have liked to escape its attention, and the still water itself, of which insects perpetually irritated one's sleep, no doubt dreaming of some imaginary Maelstrom, increased the confusion into which the sight of the cork float had thrown me by seeming to drag it at full speed across the silent expanses of the reflected sky; almost vertical it seemed ready to dive and already I was wondering if, without taking into account the desire and the fear I had to know her, I did not have the duty to warn Miss Swann that the fish was biting - when I had to run to join my father and my grandfather who were calling me, surprised that I had not followed them on the little path which goes up towards the fields and where they had started."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je le trouvai tout bourdonnant de l’odeur des aubépines.", "en": "I found it buzzing with the smell of hawthorns."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "La haie formait comme une suite de chapelles qui disparaissaient sous la jonchée de leurs fleurs amoncelées en reposoir ; au-dessous d’elles, le soleil posait à terre un quadrillage de clarté, comme s’il venait de traverser une verrière ; leur parfum s’étendait aussi onctueux, aussi délimité en sa forme que si j’eusse été devant l’autel de la Vierge, et les fleurs, aussi parées, tenaient chacune d’un air distrait son étincelant bouquet d’étamines, fines et rayonnantes nervures de style flamboyant comme celles qui à l’église ajouraient la rampe du jubé ou les meneaux du vitrail et qui s’épanouissaient en blanche chair de fleur de fraisier.", "en": "The hedge formed a sort of series of chapels which disappeared under the litter of their flowers piled up in repositories; below them, the sun laid a grid of light on the ground, as if it had just passed through a glass roof; their perfume extended as unctuously, as delimited in its form as if I had been in front of the altar of the Virgin, and the flowers, also adorned, each held with an absent air its sparkling bouquet of stamens, fine and radiant veins of flamboyant style like those which in the church openwork the bannister of the rood screen or the mullions of the stained glass window and which blossomed into white flower flesh. strawberry."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Combien naïves et paysannes en comparaison sembleraient les églantines qui, dans quelques semaines, monteraient elles aussi en plein soleil le même chemin rustique, en la soie unie de leur corsage rougissant qu’un souffle défait.", "en": "How naive and peasant in comparison would seem the wild roses who, in a few weeks, would also climb the same rustic path in full sun, in the plain silk of their bodices reddening like undone breath."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais j’avais beau rester devant les aubépines à respirer, à porter devant ma pensée qui ne savait ce qu’elle devait en faire, à perdre, à retrouver leur invisible et fixe odeur, à m’unir au rythme qui jetait leurs fleurs, ici et là, avec une allégresse juvénile et à des intervalles inattendus comme certains intervalles musicaux, elles m’offraient indéfiniment le même charme avec une profusion inépuisable, mais sans me laisser approfondir davantage, comme ces mélodies qu’on rejoue cent fois de suite sans descendre plus avant dans leur secret.", "en": "But in vain did I stay in front of the hawthorns to breathe, to carry before my mind which did not know what to do with them, to lose, to rediscover their invisible and fixed scent, to unite with the rhythm which threw their flowers, here and there, with a youthful joy and at unexpected intervals like certain musical intervals, they offered me indefinitely the same charm with an inexhaustible profusion, but without allowing me to delve any further, like those melodies that are replayed a hundred times over. continuation without delving further into their secret."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je me détournais d’elles un moment, pour les aborder ensuite avec des forces plus fraîches.", "en": "I turned away from them for a moment, to then approach them with fresher strength."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Je poursuivais jusque sur le talus qui, derrière la haie, montait en pente raide vers les champs, quelques coquelicots perdus, quelques bluets restés paresseusement en arrière, qui le décoraient çà et là de leurs fleurs comme la bordure d’une tapisserie où apparaît clairsemé le motif agreste qui triomphera sur le panneau ; rares encore, espacés comme les maisons isolées qui annoncent déjà l’approche d’un village, ils m’annonçaient l’immense étendue où déferlent les blés, où moutonnent les nuages, et la vue d’un seul coquelicot hissant au bout de son cordage et faisant cingler au vent sa flamme rouge, au-dessus de sa bouée graisseuse et noire, me faisait battre le cœur, comme au voyageur qui aperçoit sur une terre basse une première barque échouée que répare un calfat, et s’écrie, avant de l’avoir encore vue : « La Mer ! »\nPuis je revenais devant les aubépines comme devant ces chefs-d’œuvre dont on croit qu’on saura mieux les voir quand on a cessé un moment de les regarder, mais j’avais beau me faire un écran de mes mains pour n’avoir qu’elles sous les yeux, le sentiment qu’elles éveillaient en moi restait obscur et vague, cherchant en vain à se dégager, à venir adhérer à leurs fleurs.", "en": "I continued as far as the embankment which, behind the hedge, rose steeply towards the fields, a few lost poppies, a few cornflowers remaining lazily behind, which decorated it here and there with their flowers like the border of a tapestry where the rustic motif which will triumph on the panel appears sparsely; still rare, spaced out like the isolated houses which already announce the approach of a village, they announced to me the immense expanse where the wheat surges, where the clouds flutter, and the sight of a single poppy hoisting at the end of its rope and making its red flame whip in the wind, above its greasy and black buoy, made my heart beat, like the traveler who sees on a low ground the first boat stranded that repairs a caulking, and exclaims, before having seen it again: “The Sea! » Then I returned in front of the hawthorns as in front of these masterpieces which we believe we will be able to see better when we stop looking at them for a moment, but in vain I made a screen with my hands so that I could only have them before my eyes, the feeling that they aroused in me remained obscure and vague, trying in vain to free itself, to cling to their flowers."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Elles ne m’aidaient pas à l’éclaircir, et je ne pouvais demander à d’autres fleurs de le satisfaire.", "en": "They did not help me to lighten it, and I could not ask other flowers to satisfy it."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Alors me donnant cette joie que nous éprouvons quand nous voyons de notre peintre préféré une œuvre qui diffère de celles que nous connaissions, ou bien si l’on nous mène devant un tableau dont nous n’avions vu jusque-là qu’une esquisse au crayon, si un morceau entendu seulement au piano nous apparaît ensuite revêtu des couleurs de l’orchestre, mon grand-père m’appelant et me désignant la haie de Tansonville, me dit : « Toi qui aimes les aubépines, regarde un peu cette épine rose ; est-elle jolie ! » En effet c’était une épine, mais rose, plus belle encore que les blanches.", "en": "So giving me that joy that we experience when we see a work by our favorite painter that differs from those we know, or if we are taken in front of a painting of which until then we had only seen a pencil sketch, if a piece heard only on the piano then appears to us covered in the colors of the orchestra, my grandfather calling me and pointing to the hedge of Tansonville, said to me: \"You who love hawthorns, take a look that pink thorn; How pretty is she! » Indeed it was a thorn, but pink, even more beautiful than the white ones."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Elle aussi avait une parure de fête, de ces seules vraies fêtes que sont les fêtes religieuses, puisqu’un caprice contingent ne les applique pas comme les fêtes mondaines à un jour quelconque qui ne leur est pas spécialement destiné, qui n’a rien d’essentiellement férié – mais une parure plus riche encore, car les fleurs attachées sur la branche, les unes au-dessus des autres, de manière à ne laisser aucune place qui ne fût décorée, comme des pompons qui enguirlandent une houlette rococo, étaient « en couleur », par conséquent d’une qualité supérieure selon l’esthétique de Combray, si l’on en jugeait par l’échelle des prix dans le « magasin » de la Place ou chez Camus où étaient plus chers ceux des biscuits qui étaient roses.", "en": "She also had a festive adornment, of those only true festivals which are the religious festivals, since a contingent caprice does not apply them like the worldly festivals to any day which is not specially intended for them, which has nothing essentially holiday - but an adornment even richer, because the flowers attached to the branch, one above the other, in such a way as to leave no place which was not decorated, like pompoms which garland a crook rococo, were \"in color\", therefore of superior quality according to the aesthetics of Combray, if we judged by the scale of prices in the \"store\" of the Place or at Camus where those biscuits which were pink were more expensive."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Moi-même j’appréciais plus le fromage à la crème rose, celui où l’on m’avait permis d’écraser des fraises.", "en": "I myself liked the pink cream cheese more, the one where I was allowed to crush strawberries."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et justement ces fleurs avaient choisi une de ces teintes de chose mangeable, ou de tendre embellissement à une toilette pour une grande fête, qui, parce qu’elles leur présentent la raison de leur supériorité, sont celles qui semblent belles avec le plus d’évidence aux yeux des enfants, et à cause de cela, gardent toujours pour eux quelque chose de plus vif et de plus naturel que les autres teintes, même lorsqu’ils ont compris qu’elles ne promettaient rien à leur gourmandise et n’avaient pas été choisies par la couturière.", "en": "And precisely these flowers had chosen one of those tints of something edible, or of tender embellishment of a dress for a great celebration, which, because they present to them the reason for their superiority, are those which seem beautiful with the most obviousness in the eyes of children, and because of this, always keep for them something more lively and more natural than the other tints, even when they understood that they promised nothing to their gourmandise and had not been chosen by the seamstress."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et certes, je l’avais tout de suite senti, comme devant les épines blanches mais avec plus d’émerveillement, que ce n’était pas facticement, par un artifice de fabrication humaine, qu’était traduite l’intention de festivité dans les fleurs, mais que c’était la nature qui, spontanément, l’avait exprimée avec la naïveté d’une commerçante de village travaillant pour un reposoir, en surchargeant l’arbuste de ces rosettes d’un ton trop tendre et d’un pompadour provincial.", "en": "And certainly, I had immediately felt it, as before the white thorns but with more wonder, that it was not artificially, by an artifice of human manufacture, that the intention of festivity was translated into the flowers, but that it was nature which, spontaneously, had expressed it with the naivety of a village trader working for a resting place, by overloading the shrub with these rosettes with a too tender tone and a pompadour provincial."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Au haut des branches, comme autant de ces petits rosiers aux pots cachés dans des papiers en dentelles, dont aux grandes fêtes on faisait rayonner sur l’autel les minces fusées, pullulaient mille petits boutons d’une teinte plus pâle qui, en s’entr’ouvrant, laissaient voir, comme au fond d’une coupe de marbre rose, de rouges sanguines, et trahissaient, plus encore que les fleurs, l’essence particulière, irrésistible, de l’épine, qui, partout où elle bourgeonnait, où elle allait fleurir, ne le pouvait qu’en rose.", "en": "At the top of the branches, like so many of those little rose bushes with pots hidden in lace paper, whose thin rockets were made to shine on the altar at great festivals, swarmed a thousand little buds of a paler hue which, as they opened, revealed, as at the bottom of a pink marble cup, blood reds, and betrayed, even more than the flowers, the particular, irresistible essence of the thorn, which, wherever it budded, where it was going to flower, it could only do so in pink."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Intercalé dans la haie, mais aussi différent d’elle qu’une jeune fille en robe de fête au milieu de personnes en négligé qui resteront à la maison, tout prêt pour le mois de Marie, dont il semblait faire partie déjà, tel brillait en souriant dans sa fraîche toilette rose l’arbuste catholique et délicieux.", "en": "Interspersed in the hedge, but as different from her as a young girl in a festive dress among people in negligees who will stay at home, all ready for the month of Mary, of which he already seemed to be a part, such the Catholic and delicious shrub shone smiling in its fresh pink toilet."}, {"start": 0.0, "end
