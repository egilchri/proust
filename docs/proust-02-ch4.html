of us. If you want it, it will be over in a second, you will be delivered forever."}, {"start": 6139.96, "end": 6157.31, "b_start": 12207.61, "b_end": 12242.26, "orig": "Dis-moi sur ta médaille, si oui ou non, tu as jamais fais ces choses.\n– Mais je n’en sais rien, moi, s’écria-t-elle avec colère, peut-être il y a très longtemps, sans me rendre compte de ce que je faisais, peut-être deux ou trois fois. Swann avait envisagé toutes les possibilités.", "en": "Tell me on your medal whether or not you have ever done these things. “But I don’t know,” she cried angrily, “perhaps a very long time ago, without realizing what I was doing, perhaps two or three times. Swann had considered all the possibilities."}, {"start": 6158.31, "end": 6172.83, "b_start": 12242.26, "b_end": 12271.86, "orig": "La réalité est donc quelque chose qui n’a aucun rapport avec les possibilités, pas plus qu’un coup de couteau que nous recevons avec les légers mouvements des nuages au-dessus de notre tête, puisque ces mots : « deux ou trois fois » marquèrent à vif une sorte de croix dans son cœur.", "en": "Reality is therefore something that has no connection with possibilities, any more than a stab that we receive with the slight movements of the clouds above our heads, since these words: \"two or three times\" marked a kind of cross in his heart."}, {"start": 6173.83, "end": 6187.08, "b_start": 12271.86, "b_end": 12299.76, "orig": "Chose étrange que ces mots « deux ou trois fois », rien que des mots, des mots prononcés dans l’air, à distance, puissent ainsi déchirer le cœur comme s’ils le touchaient véritablement, puissent rendre malade, comme un poison qu’on absorberait.", "en": "Strange thing that these words \"two or three times\", nothing but words, words spoken in the air, from a distance, can thus tear the heart as if they truly touched it, can make one sick, like a poison that one would absorb."}, {"start": 6188.08, "end": 6202.48, "b_start": 12299.76, "b_end": 12328.09, "orig": "Involontairement Swann pensa à ce mot qu’il avait entendu chez M\nme\nde Saint-Euverte : « C’est ce que j’ai vu de plus fort depuis les tables tournantes. » Cette souffrance qu’il ressentait ne ressemblait à rien de ce qu’il avait cru.", "en": "Involuntarily Swann thought of this remark he had heard from Madame de Saint-Euverte: “It’s the strongest thing I’ve seen since the turning tables. » This pain he felt was unlike anything he had expected."}, {"start": 6203.48, "end": 6225.54, "b_start": 12328.09, "b_end": 12373.03, "orig": "Non pas seulement parce que dans ses heures de plus entière méfiance il avait rarement imaginé si loin dans le mal, mais parce que même quand il imaginait cette chose, elle restait vague, incertaine, dénuée de cette horreur particulière qui s’était échappée des mots « peut-être deux ou trois fois », dépourvue de cette cruauté spécifique aussi différente de tout ce qu’il avait connu qu’une maladie dont on est atteint pour la première fois.", "en": "Not only because in his hours of greatest distrust he had rarely imagined so far into evil, but because even when he did imagine this thing it remained vague, uncertain, devoid of that particular horror which had escaped from the words \"perhaps two or three times\", devoid of that specific cruelty as different from anything he had known as a disease one suffers for the first time."}, {"start": 6226.54, "end": 6241.06, "b_start": 12373.03, "b_end": 12402.25, "orig": "Et pourtant cette Odette d’où lui venait tout ce mal, ne lui était pas moins chère, bien au contraire plus précieuse, comme si au fur et à mesure que grandissait la souffrance, grandissait en même temps le prix du calmant, du contrepoison que seule cette femme possédait.", "en": "And yet this Odette, from whom all this evil came, was no less dear to him, on the contrary more precious, as if as the suffering grew, so did the price of the sedative, of the counterpoison that only this woman possessed."}, {"start": 6242.06, "end": 6256.46, "b_start": 12402.25, "b_end": 12432.65, "orig": "Il voulait lui donner plus de soins comme à une maladie qu’on découvre soudain plus grave. Il voulait que la chose affreuse qu’elle lui avait dit avoir faite « deux ou trois fois » ne pût pas se renouveler. Pour cela il lui fallait veiller sur Odette.", "en": "He wanted to give him more care, like an illness that suddenly becomes more serious. He wanted the terrible thing she had told him she had done “two or three times” to not happen again. For this he had to watch over Odette."}, {"start": 6257.46, "end": 6271.21, "b_start": 12432.65, "b_end": 12463.12, "orig": "On dit souvent qu’en dénonçant à un ami les fautes de sa maîtresse, on ne réussit qu’à le rapprocher d’elle parce qu’il ne leur ajoute pas foi, mais combien davantage s’il leur ajoute foi ! « Mais, se disait Swann, comment réussir à la protéger ?", "en": "It is often said that by denouncing the faults of his mistress to a friend, we only succeed in bringing him closer to her because he does not believe them, but even more so if he does! “But,” Swann said to himself, “how can I succeed in protecting her?"}, {"start": 6272.21, "end": 6287.59, "b_start": 12463.12, "b_end": 12495.6, "orig": "Il pouvait peut-être la préserver d’une certaine femme, mais il y en avait des centaines d’autres, et il comprit quelle folie avait passé sur lui quand il avait, le soir où il n’avait pas trouvé Odette chez les Verdurin, commencé de désirer la possession, toujours impossible, d’un autre être.", "en": "He could perhaps protect her from a certain woman, but there were hundreds of others, and he understood what madness had overtaken him when, on the evening when he had not found Odette at the Verdurins', he had begun to desire the possession, always impossible, of another being."}, {"start": 6288.59, "end": 6307.48, "b_start": 12495.6, "b_end": 12536.08, "orig": "Heureusement pour Swann, sous les souffrances nouvelles qui venaient d’entrer dans son âme comme des hordes d’envahisseurs, il existait un fond de nature plus ancien, plus doux et silencieusement laborieux, comme les cellules d’un organe blessé qui se mettent aussitôt en mesure de refaire les tissus lésés, comme les muscles d’un membre paralysé qui tendent à reprendre leurs mouvements.", "en": "Fortunately for Swann, beneath the new sufferings which had just entered his soul like hordes of invaders, there existed an older nature, gentler and silently laborious, like the cells of an injured organ which immediately put themselves in a position to rebuild the injured tissues, like the muscles of a paralyzed limb which tend to resume their movements."}, {"start": 6308.48, "end": 6320.0, "b_start": 12536.08, "b_end": 12561.84, "orig": "Ces plus anciens, plus autochtones habitants de son âme, employèrent un instant toutes les forces de Swann à ce travail obscurément réparateur qui donne l’illusion du repos à un convalescent, à un opéré.", "en": "These oldest, most indigenous inhabitants of his soul, employed for a moment all of Swann's strength in this obscurely restorative work which gives the illusion of rest to a convalescent, to an operated patient."}, {"start": 6321.0, "end": 6328.94, "b_start": 12561.84, "b_end": 12578.82, "orig": "Cette fois-ci ce fut moins comme d’habitude dans le cerveau de Swann que se produisit cette détente par épuisement, ce fut plutôt dans son cœur.", "en": "This time it was less as usual in Swann's brain that this relaxation from exhaustion occurred, it was rather in his heart."}, {"start": 6329.94, "end": 6344.9, "b_start": 12578.82, "b_end": 12611.86, "orig": "Mais toutes les choses de la vie qui ont existé une fois tendent à se récréer, et comme un animal expirant qu’agite de nouveau le sursaut d’une convulsion qui semblait finie, sur le cœur, un instant épargné, de Swann, d’elle-même la même souffrance vint retracer la même croix.", "en": "But all things in life which have existed once tend to recreate themselves, and like an expiring animal agitated again by the start of a convulsion which seemed finished, on the heart, spared for a moment, of Swann, of itself the same suffering came to retrace the same cross."}, {"start": 6345.9, "end": 6358.66, "b_start": 12611.86, "b_end": 12640.12, "orig": "Il se rappela ces soirs de clair de lune, où allongé dans sa victoria qui le menait rue La Pérouse, il cultivait voluptueusement en lui les émotions de l’homme amoureux, sans savoir le fruit empoisonné qu’elles produiraient nécessairement.", "en": "He remembered those moonlit evenings, when lying in his victoria which took him to rue La Pérouse, he voluptuously cultivated within himself the emotions of the man in love, without knowing the poisonous fruit that they would necessarily produce."}, {"start": 6359.66, "end": 6372.65, "b_start": 12640.12, "b_end": 12666.79, "orig": "Mais toutes ces pensées ne durèrent que l’espace d’une seconde, le temps qu’il portât la main à son cœur, reprit sa respiration et parvînt à sourire pour dissimuler sa torture. Déjà il recommençait à poser ses questions.", "en": "But all these thoughts only lasted for a second, while he put his hand to his heart, caught his breath and managed to smile to hide his torture. He was already starting to ask his questions again."}, {"start": 6373.65, "end": 6389.51, "b_start": 12666.79, "b_end": 12700.04, "orig": "Car sa jalousie qui avait pris une peine qu’un ennemi ne se serait pas donnée pour arriver à lui faire asséner ce coup, à lui faire faire la connaissance de la douleur la plus cruelle qu’il eût encore jamais connue, sa jalousie ne trouvait pas qu’il eut assez souffert et cherchait à lui faire recevoir une blessure plus profonde encore.", "en": "For his jealousy, which had taken pains that an enemy would not have taken to succeed in inflicting this blow on him, in making him acquainted with the cruelest pain he had ever known, his jealousy did not think that he had suffered enough and sought to make him receive an even deeper wound."}, {"start": 6390.51, "end": 6396.56, "b_start": 12700.04, "b_end": 12713.16, "orig": "Telle, comme une divinité méchante, sa jalousie inspirait Swann et le poussait à sa perte.", "en": "Like a wicked divinity, his jealousy inspired Swann and pushed him to his ruin."}, {"start": 6397.56, "end": 6413.9, "b_start": 12713.16, "b_end": 12746.53, "orig": "Ce ne fut pas sa faute, mais celle d’Odette seulement si d’abord son supplice ne s’aggrava pas.\n– Ma chérie, lui dit-il, c’est fini, était-ce avec une personne que je connais ?\n– Mais non je te jure, d’ailleurs je crois que j’ai exagéré, que je n’ai pas été jusque-là.", "en": "It was not his fault, but that of Odette only if her torture did not get worse at first. – My darling, he said to her, it’s over, was it with someone I know? – But no I swear, besides I think I exaggerated, that I didn’t go that far."}, {"start": 6414.9, "end": 6431.39, "b_start": 12746.53, "b_end": 12780.77, "orig": "Il sourit et reprit :\n– Que veux-tu ? cela ne fait rien, mais c’est malheureux que tu ne puisses pas me dire le nom. De pouvoir me représenter la personne, cela m’empêcherait de plus jamais y penser. Je le dis pour toi parce que je ne t’ennuierais plus.", "en": "He smiled and continued: – What do you want? It doesn't matter, but it's unfortunate that you can't tell me the name. Being able to picture the person would prevent me from ever thinking about them again. I'm saying it for you because I won't bother you anymore."}, {"start": 6432.39, "end": 6452.91, "b_start": 12780.77, "b_end": 12822.54, "orig": "C’est si calmant de se représenter les choses ! Ce qui est affreux, c’est ce qu’on ne peut pas imaginer. Mais tu as déjà été si gentille, je ne veux pas te fatiguer. Je te remercie de tout mon cœur de tout le bien que tu m’as fait. C’est fini. Seulement ce mot : « Il y a combien de temps ? »\n– Oh !", "en": "It’s so calming to picture things! What is terrible is what we cannot imagine. But you've already been so nice, I don't want to tire you out. I thank you with all my heart for all the good you have done to me. It's over. Only this word: “How long ago? \" - Oh !"}, {"start": 6453.91, "end": 6464.81, "b_start": 12822.54, "b_end": 12846.12, "orig": "Charles, mais tu ne vois pas que tu me tues ! c’est tout ce qu’il y a de plus ancien. Je n’y avais jamais repensé, on dirait que tu veux absolument me redonner ces idées-là.", "en": "Charles, but can't you see that you're killing me! it’s all that’s oldest. I had never thought about it, it seems like you absolutely want to give me those ideas again."}, {"start": 6465.81, "end": 6476.1, "b_start": 12846.12, "b_end": 12868.38, "orig": "Tu seras bien avancé, dit-elle, avec une sottise inconsciente et une méchanceté voulue.\n– Oh ! je voulais seulement savoir si c’est depuis que je te connais.", "en": "You will be well advanced, she said, with unconscious stupidity and deliberate malice. - Oh ! I just wanted to know if it’s since I’ve known you."}, {"start": 6477.1, "end": 6496.71, "b_start": 12868.38, "b_end": 12908.09, "orig": "Mais ce serait si naturel, est-ce que ça se passait ici ; tu ne peux pas me dire un certain soir, que je me représente ce que je faisais ce soir-là ; tu comprends bien qu’il n’est pas possible que tu ne te rappelles pas avec qui, Odette, mon amour.\n– Mais je ne sais pas, moi, je crois que c’était au Bois un soir où tu es venu nous retrouver dans l’île.", "en": "But it would be so natural, were it happening here; you cannot tell me on a certain evening, that I imagine what I was doing that evening; you understand that it is not possible that you do not remember with whom, Odette, my love. – But I don’t know, I think it was at Le Bois one evening when you came to meet us on the island."}, {"start": 6497.71, "end": 6509.26, "b_start": 12908.09, "b_end": 12932.96, "orig": "Tu avais dîné chez la princesse des Laumes, dit-elle, heureuse de fournir un détail précis qui attestait sa véracité. À une table voisine il y avait une femme que je n’avais pas vue depuis très longtemps.", "en": "You had dinner with the Princess des Laumes, she said, happy to provide a precise detail which attested to its veracity. At a nearby table there was a woman I hadn't seen in a long time."}, {"start": 6510.26, "end": 6524.85, "b_start": 12932.96, "b_end": 12962.98, "orig": "Elle m’a dit : « Venez donc derrière le petit rocher voir l’effet du clair de lune sur l’eau. » D’abord j’ai bâillé et j’ai répondu : « Non, je suis fatiguée et je suis bien ici. » Elle a assuré qu’il n’y avait jamais eu un clair de lune pareil.", "en": "She said to me: “Come behind the little rock and see the effect of the moonlight on the water. » At first I yawned and replied: “No, I'm tired and I'm fine here. » She assured that there had never been moonlight like this."}, {"start": 6525.85, "end": 6540.2, "b_start": 12962.98, "b_end": 12995.41, "orig": "Je lui ai dit « cette blague ! » ; je savais bien où elle voulait en venir. Odette racontait cela presque en riant, soit que cela lui parût tout naturel, ou parce qu’elle croyait en atténuer ainsi l’importance, ou pour ne pas avoir l’air humilié.", "en": "I told him “that joke! »; I knew exactly where she was going with this. Odette recounted this almost with a laugh, either because it seemed completely natural to her, or because she thought she was thereby diminishing its importance, or so as not to appear humiliated."}, {"start": 6541.2, "end": 6556.22, "b_start": 12995.41, "b_end": 13025.35, "orig": "En voyant le visage de Swann, elle changea de ton :\n– Tu es un misérable, tu te plais à me torturer, à me faire faire des mensonges que je dis afin que tu me laisses tranquille. Ce second coup porté à Swann était plus atroce encore que le premier.", "en": "Seeing Swann's face, she changed her tone: - You are a wretch, you like to torture me, to make me believe the lies I tell so that you will leave me alone. This second blow to Swann was even more atrocious than the first."}, {"start": 6557.22, "end": 6579.54, "b_start": 13025.35, "b_end": 13073.0, "orig": "Jamais il n’avait supposé que ce fût une chose aussi récente, cachée à ses yeux qui n’avaient pas su la découvrir, non dans un passé qu’il n’avait pas connu, mais dans des soirs qu’il se rappelait si bien, qu’il avait vécus avec Odette, qu’il avait cru connus si bien par lui et qui maintenant prenaient rétrospectivement quelque chose de fourbe et d’atroce ; au milieu d’eux tout d’un coup se creusait cette ouverture béante, ce moment dans l’île du Bois.", "en": "He had never supposed that it was such a recent thing, hidden from his eyes which had not been able to discover it, not in a past that he had not known, but in evenings that he remembered so well, that he had experienced with Odette, that he had thought he knew so well and which now retrospectively took on something deceitful and atrocious; in their midst suddenly this gaping opening opened up, this moment in the Isle of Wood."}, {"start": 6580.54, "end": 6592.5, "b_start": 13073.0, "b_end": 13099.2, "orig": "Odette sans être intelligente avait le charme du naturel. Elle avait raconté, elle avait mimé cette scène avec tant de simplicité que Swann haletant voyait tout : le bâillement d’Odette, le petit rocher.", "en": "Odette, without being intelligent, had natural charm. She had told, she had mimed this scene with so much simplicity that Swann, panting, saw everything: Odette's yawn, the little rock."}, {"start": 6593.5, "end": 6612.96, "b_start": 13099.2, "b_end": 13139.63, "orig": "Il l’entendait répondre – gaiement, hélas ! : « Cette blague ! » Il sentait qu’elle ne dirait rien de plus ce soir, qu’il n’y avait aucune révélation nouvelle à attendre en ce moment ; elle se taisait ; il lui dit :\n– Mon pauvre chéri, pardonne-moi, je sens que je te fais de la peine, c’est fini, je n’y pense plus.", "en": "He heard her answer – cheerfully, alas! : “This joke! » He felt that she would say nothing more this evening, that there was no new revelation to expect at this moment; she was silent; he said to him: – My poor darling, forgive me, I feel that I am hurting you, it’s over, I don’t think about it anymore."}, {"start": 6613.96, "end": 6629.25, "b_start": 13139.63, "b_end": 13172.21, "orig": "Mais elle vit que ses yeux restaient fixés sur les choses qu’il ne savait pas et sur ce passé de leur amour, monotone et doux dans sa mémoire parce qu’il était vague, et que déchirait maintenant comme une blessure cette minute dans l’île du Bois, au clair de lune, après le dîner chez la princesse des Laumes.", "en": "But she saw that his eyes remained fixed on the things he did not know and on this past of their love, monotonous and sweet in his memory because it was vague, and which now tore like a wound that minute on the Isle of Wood, in the moonlight, after dinner with the Princess of Laumes."}, {"start": 6630.25, "end": 6648.1, "b_start": 13172.21, "b_end": 13212.18, "orig": "Mais il avait tellement pris l’habitude de trouver la vie intéressante – d’admirer les curieuses découvertes qu’on peut y faire – que tout en souffrant au point de croire qu’il ne pourrait pas supporter longtemps une pareille douleur, il se disait : « La vie est vraiment étonnante et réserve de belles surprises ; en somme le vice est quelque chose de plus répandu qu’on ne croit.", "en": "But he had become so accustomed to finding life interesting – to admiring the curious discoveries that can be made there – that while suffering to the point of believing that he could not endure such pain for long, he said to himself: “Life is truly astonishing and has many wonderful surprises in store; In short, vice is something more widespread than we think."}, {"start": 6649.1, "end": 6668.45, "b_start": 13212.18, "b_end": 13254.46, "orig": "Voilà une femme en qui j’avais confiance, qui a l’air si simple, si honnête, en tous cas, si même elle était légère, qui semblait bien normale et saine dans ses goûts : sur une dénonciation invraisemblable, je l’interroge et le peu qu’elle m’avoue révèle bien plus que ce qu’on eût pu soupçonner. » Mais il ne pouvait pas se borner à ces remarques désintéressées.", "en": "Here is a woman in whom I trusted, who seems so simple, so honest, in any case, if even she was light-hearted, who seemed very normal and healthy in her tastes: upon an improbable denunciation, I questioned her and the little she confessed to me revealed much more than we could have suspected. » But he could not limit himself to these disinterested remarks."}, {"start": 6669.45, "end": 6679.6, "b_start": 13254.46, "b_end": 13275.66, "orig": "Il cherchait à apprécier exactement la valeur de ce qu’elle lui avait raconté, afin de savoir s’il devait conclure que ces choses, elle les avait faites souvent, qu’elles se renouvelleraient.", "en": "He was trying to assess exactly the value of what she had told him, in order to know if he should conclude that these things she had done often, that they would happen again."}, {"start": 6680.6, "end": 6693.49, "b_start": 13275.66, "b_end": 13303.75, "orig": "Il se répétait ces mots qu’elle avait dits : « Je voyais bien où elle voulait en venir », « Deux ou trois fois », « Cette blague ! », mais ils ne reparaissaient pas désarmés dans la mémoire de Swann, chacun d’eux tenait son couteau et lui en portait un nouveau coup.", "en": "He repeated to himself the words she had said: “I could see where she was going,” “Two or three times,” “That joke! \", but they did not reappear unarmed in Swann's memory, each of them held his knife and dealt him another blow."}, {"start": 6694.49, "end": 6708.24, "b_start": 13303.75, "b_end": 13333.57, "orig": "Pendant bien longtemps, comme un malade ne peut s’empêcher d’essayer à toute minute de faire le mouvement qui lui est douloureux, il se redisait ces mots : « Je suis bien ici », « Cette blague ! », mais la souffrance était si forte qu’il était obligé de s’arrêter.", "en": "For a long time, as a sick person cannot help but try at every minute to make the movement that is painful for him, he would repeat these words to himself: “I am happy here”, “This joke! \", but the pain was so great that he was forced to stop."}, {"start": 6709.24, "end": 6722.44, "b_start": 13333.57, "b_end": 13361.09, "orig": "Il s’émerveillait que des actes que toujours il avait jugés si légèrement, si gaiement, maintenant fussent devenus pour lui graves comme une maladie dont on peut mourir. Il connaissait bien des femmes à qui il eût pu demander de surveiller Odette.", "en": "He marveled that acts that he had always judged so lightly, so cheerfully, had now become serious for him like an illness from which one could die. He knew many women who he could have asked to watch over Odette."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Mais comment espérer qu’elles se placeraient au même point de vue que lui et ne resteraient pas à celui qui avait été si longtemps le sien, qui avait toujours guidé sa vie voluptueuse, ne lui diraient pas en riant : « Vilain jaloux qui veut priver les autres d’un plaisir. » Par quelle trappe soudainement abaissée (lui qui n’avait eu autrefois de son amour pour Odette que des plaisirs délicats) avait-il été brusquement précipité dans ce nouveau cercle de l’enfer d’où il n’apercevait pas comment il pourrait jamais sortir.", "en": "But how could we hope that they would place themselves in the same point of view as him and would not remain at the one who had been his for so long, who had always guided his voluptuous life, would not say to him with a laugh: “Naughty jealous person who wants to deprive others of a pleasure. » Through what suddenly lowered trapdoor (he who had previously only had delicate pleasures from his love for Odette) had he been suddenly precipitated into this new circle of hell from which he did not see how he could ever escape."}, {"start": 6723.44, "end": 6736.52, "b_start": 13361.09, "b_end": 13389.32, "orig": "Pauvre Odette ! il ne lui en voulait pas. Elle n’était qu’à demi coupable. Ne disait-on pas que c’était par sa propre mère qu’elle avait été livrée, presque enfant, à Nice, à un riche Anglais.", "en": "Poor Odette! he didn't blame her. She was only half guilty. Was it not said that it was by her own mother that she had been delivered, almost as a child, in Nice, to a rich Englishman?"}, {"start": 6737.52, "end": 6753.5, "b_start": 13389.32, "b_end": 13421.42, "orig": "Mais quelle vérité douloureuse prenait pour lui ces lignes du\nJournal d’un Poète\nd’Alfred de Vigny qu’il avait lues avec indifférence autrefois : « Quand on se sent pris d’amour pour une femme, on devrait se dire : Comment est-elle entourée ? Quelle a été sa vie ?", "en": "But what a painful truth these lines from Alfred de Vigny's Diary of a Poet that he had once read with indifference were for him: \"When one feels in love with a woman, one should say to oneself: How is she surrounded? What was his life like?"}, {"start": 6754.5, "end": 6767.39, "b_start": 13421.42, "b_end": 13447.74, "orig": "Tout le bonheur de la vie est appuyé là-dessus. » Swann s’étonnait que de simples phrases épelées par sa pensée, comme « Cette blague ! », « Je voyais bien où elle voulait en venir » pussent lui faire si mal.", "en": "All the happiness of life is based on this. » Swann was surprised that simple sentences spelled out by his mind, like “This joke! ”, “I could see where she was going with this” could hurt her so much."}, {"start": 6768.39, "end": 6782.41, "b_start": 13447.74, "b_end": 13478.42, "orig": "Mais il comprenait que ce qu’il croyait de simples phrases n’était que les pièces de l’armature entre lesquelles tenait, pouvait lui être rendue, la souffrance qu’il avait éprouvée pendant le récit d’Odette. Car c’était bien cette souffrance-là qu’il éprouvait de nouveau.", "en": "But he understood that what he believed to be simple sentences were only the pieces of the framework between which the suffering he had experienced during Odette's story was held and could be restored to him. Because it was indeed this suffering that he was experiencing again."}, {"start": 6783.41, "end": 6807.07, "b_start": 13478.42, "b_end": 13527.44, "orig": "Il avait beau savoir maintenant – même, il eut beau, le temps passant, avoir un peu oublié, avoir pardonné – au moment où il se redisait ses mots, la souffrance ancienne le refaisait tel qu’il était avant qu’Odette ne parlât : ignorant, confiant ; sa cruelle jalousie le replaçait pour le faire frapper par l’aveu d’Odette dans la position de quelqu’un qui ne sait pas encore, et au bout de plusieurs mois cette vieille histoire le bouleversait toujours comme une révélation.", "en": "Although he knew now - even, as time passed, he had forgotten a little, had forgiven - at the moment when he repeated his words to himself, the old suffering made him again as he was before Odette spoke: ignorant, confident; his cruel jealousy placed him in the position of someone who does not yet know, to be struck by Odette's confession, and after several months this old story still shocked him like a revelation."}, {"start": 6808.07, "end": 6819.83, "b_start": 13527.44, "b_end": 13551.67, "orig": "Il admirait la terrible puissance recréatrice de sa mémoire. Ce n’est que de l’affaiblissement de cette génératrice dont la fécondité diminue avec l’âge qu’il pouvait espérer un apaisement à sa torture.", "en": "He admired the terrible creative power of his memory. It was only from the weakening of this generator whose fertility diminished with age that he could hope for relief from his torture."}, {"start": 6820.83, "end": 6834.27, "b_start": 13551.67, "b_end": 13580.2, "orig": "Mais quand paraissait un peu épuisé le pouvoir qu’avait de le faire souffrir un des mots prononcés par Odette, alors un de ceux sur lesquels l’esprit de Swann s’était moins arrêté jusque-là, un mot presque nouveau venait relayer les autres et le frappait avec une vigueur intacte.", "en": "But when the power of one of the words spoken by Odette to make him suffer seemed a little exhausted, then one of those on which Swann's mind had stayed less until then, an almost new word came to relay the others and struck him with intact vigor."}, {"start": 6835.27, "end": 6846.89, "b_start": 13580.2, "b_end": 13605.53, "orig": "La mémoire du soir où il avait dîné chez la princesse des Laumes lui était douloureuse, mais ce n’était que le centre de son mal. Celui-ci irradiait confusément à l’entour dans tous les jours avoisinants.", "en": "The memory of the evening when he had dined with the Princesse des Laumes was painful to him, but it was only the center of his illness. This radiated confusedly all around in all the surrounding days."}, {"start": 6847.89, "end": 6856.53, "b_start": 13605.53, "b_end": 13624.81, "orig": "Et à quelque point d’elle qu’il voulût toucher dans ses souvenirs, c’est la saison tout entière où les Verdurin avaient si souvent dîné dans l’île du Bois qui lui faisait mal.", "en": "And whatever point of her he wanted to touch in his memories, it was the entire season when the Verdurins had so often dined on the Île du Bois that hurt him."}, {"start": 6857.53, "end": 6866.24, "b_start": 13624.81, "b_end": 13645.27, "orig": "Si mal, que peu à peu les curiosités qu’excitait en lui sa jalousie furent neutralisées par la peur des tortures nouvelles qu’il s’infligerait en les satisfaisant.", "en": "So badly that little by little the curiosities that his jealousy excited in him were neutralized by the fear of the new tortures that he would inflict on himself by satisfying them."}, {"start": 6867.24, "end": 6881.93, "b_start": 13645.27, "b_end": 13676.41, "orig": "Il se rendait compte que toute la période de la vie d’Odette écoulée avant qu’elle ne le rencontrât, période qu’il n’avait jamais cherché à se représenter, n’était pas l’étendue abstraite qu’il voyait vaguement, mais avait été faite d’années particulières, remplie d’incidents concrets.", "en": "He realized that the whole period of Odette's life which had elapsed before she met him, a period which he had never tried to imagine, was not the abstract expanse which he vaguely saw, but had been made up of particular years, filled with concrete incidents."}, {"start": 6882.93, "end": 6898.82, "b_start": 13676.41, "b_end": 13710.38, "orig": "Mais en les apprenant, il craignait que ce passé incolore, fluide et supportable, ne prît un corps tangible et immonde, un visage individuel et diabolique. Et il continuait à ne pas chercher à le concevoir non plus par paresse de penser, mais par peur de souffrir.", "en": "But when he learned about them, he feared that this colorless, fluid and bearable past would take on a tangible and filthy body, an individual and diabolical face. And he continued not to try to conceive it either out of laziness of thinking, but out of fear of suffering."}, {"start": 6899.82, "end": 6918.3, "b_start": 13710.38, "b_end": 13749.76, "orig": "Il espérait qu’un jour il finirait par pouvoir entendre le nom de l’île du Bois, de la princesse des Laumes, sans ressentir le déchirement ancien, et trouvait imprudent de provoquer Odette à lui fournir de nouvelles paroles, le nom d’endroits, de circonstances différentes qui, son mal à peine calmé, le feraient renaître sous une autre forme.", "en": "He hoped that one day he would end up being able to hear the name of the Isle of Wood, of the Princess of Laumes, without feeling the old tear, and thought it imprudent to provoke Odette into providing him with new words, the names of places, of different circumstances which, his illness barely calmed, would make him reborn in another form."}, {"start": 6919.3, "end": 6954.96, "b_start": 13749.76, "b_end": 13824.82, "orig": "Mais souvent les choses qu’il ne connaissait pas, qu’il redoutait maintenant de connaître, c’est Odette elle-même qui les lui révélait spontanément, et sans s’en rendre compte ; en effet l’écart que le vice mettait entre la vie réelle d’Odette et la vie relativement innocente que Swann avait cru, et bien souvent croyait encore, que menait sa maîtresse, cet écart, Odette en ignorait l’étendue : un être vicieux, affectant toujours la même vertu devant les êtres de qui il ne veut pas que soient soupçonnés ses vices, n’a pas de contrôle pour se rendre compte combien ceux-ci, dont la croissance continue est insensible pour lui-même, l’entraînent peu à peu loin des façons de vivre normales.", "en": "But often the things that he did not know, that he now feared knowing, it was Odette herself who revealed them to him spontaneously, and without realizing it; in fact the gap that vice placed between Odette's real life and the relatively innocent life that Swann had believed, and very often still believed, that his mistress led, this gap, Odette was unaware of the extent: a vicious being, always affecting the same virtue in front of beings of whom he does not want his vices to be suspected, has no control to realize how these, whose continuous growth is insensible for himself, cause him little somewhat far from normal ways of living."}, {"start": 6955.96, "end": 6977.37, "b_start": 13824.82, "b_end": 13870.19, "orig": "Dans leur cohabitation, au sein de l’esprit d’Odette, avec le souvenir des actions qu’elle cachait à Swann, d’autres peu à peu en recevaient le reflet, étaient contagionnées par elles, sans qu’elle pût leur trouver rien d’étrange, sans qu’elles détonassent dans le milieu particulier où elle les faisait vivre en elle ; mais si elle les racontait à Swann, il était épouvanté par la révélation de l’ambiance qu’elles trahissaient.", "en": "In their cohabitation, within Odette's mind, with the memory of the actions she hid from Swann, others little by little received their reflection, were contagious by them, without her being able to find anything strange in them, without them detonating in the particular environment where she made them live within her; but if she told them to Swann, he was appalled by the revelation of the atmosphere they betrayed."}, {"start": 6978.37, "end": 6984.8, "b_start": 13870.19, "b_end": 13884.22, "orig": "Un jour il cherchait, sans blesser Odette, à lui demander si elle n’avait jamais été chez des entremetteuses.", "en": "One day he tried, without hurting Odette, to ask her if she had ever been with matchmakers."}, {"start": 6985.8, "end": 7007.47, "b_start": 13884.22, "b_end": 13930.6, "orig": "À vrai dire il était convaincu que non ; la lecture de la lettre anonyme en avait introduit la supposition dans son intelligence, mais d’une façon mécanique ; elle n’y avait rencontré aucune créance, mais en fait y était restée, et Swann, pour être débarrassé de la présence purement matérielle mais pourtant gênante du soupçon, souhaitait qu’Odette l’extirpât. « Oh ! non !", "en": "Truth be told, he was convinced it wasn’t; reading the anonymous letter had introduced the supposition into his intelligence, but in a mechanical way; she had encountered no claims there, but in fact had remained there, and Swann, to be rid of the purely material but nevertheless embarrassing presence of suspicion, wanted Odette to eradicate it. \" Oh ! No !"}, {"start": 7008.47, "end": 7018.96, "b_start": 13930.6, "b_end": 13952.59, "orig": "Ce n’est pas que je ne sois pas persécutée pour cela, ajouta-t-elle, en dévoilant dans un sourire une satisfaction de vanité qu’elle ne s’apercevait plus ne pas pouvoir paraître légitime à Swann.", "en": "It's not that I'm not persecuted for that, she added, revealing in a smile a satisfaction of vanity that she no longer realized could not appear legitimate to Swann."}, {"start": 7019.96, "end": 7026.18, "b_start": 13952.59, "b_end": 13966.6, "orig": "Il y en a une qui est encore restée plus de deux heures hier à m’attendre, elle me proposait n’importe quel prix.", "en": "There was one who stayed for more than two hours yesterday waiting for me, she offered me any price."}, {"start": 7027.18, "end": 7036.87, "b_start": 13966.6, "b_end": 13989.72, "orig": "Il paraît qu’il y a un ambassadeur qui lui a dit : « Je me tue si vous ne me l’amenez pas. » On lui a dit que j’étais sortie, j’ai fini par aller moi-même lui parler pour qu’elle s’en aille.", "en": "It seems that there was an ambassador who told him: “I will kill myself if you don’t bring him to me. » We told her that I had gone out, I ended up going to talk to her myself so that she would go away."}, {"start": 7037.87, "end": 7054.0, "b_start": 13989.72, "b_end": 14023.79, "orig": "J’aurais voulu que tu voies comme je l’ai reçue, ma femme de chambre qui m’entendait de la pièce voisine m’a dit que je criais à tue-tête : « Mais puisque je vous dis que je ne veux pas ! C’est une idée comme ça, ça ne me plaît pas. Je pense que je suis libre de faire ce que je veux, tout de même !", "en": "I would have liked you to see how I received it, my maid who heard me from the next room told me that I was shouting at the top of my voice: “But since I tell you that I don’t want to! It’s an idea like that, I don’t like it. I think I'm free to do what I want, all the same!"}, {"start": 7055.0, "end": 7071.27, "b_start": 14023.79, "b_end": 14057.16, "orig": "Si j’avais besoin d’argent, je comprends... » Le concierge a ordre de ne plus la laisser entrer, il dira que je suis à la campagne. Ah ! j’aurais voulu que tu sois caché quelque part. Je crois que tu aurais été content, mon chéri.", "en": "If I needed money, I understand...\" The concierge has orders not to let her in anymore, he will say that I am in the countryside. Ah! I wish you were hidden somewhere. I think you would have been happy, my darling."}, {"start": 7072.27, "end": 7089.17, "b_start": 14057.16, "b_end": 14094.11, "orig": "Elle a du bon, tout de même, tu vois, ta petite Odette, quoiqu’on la trouve si détestable. »\nD’ailleurs ses aveux même, quand elle lui en faisait, de fautes qu’elle le supposait avoir découvertes, servaient plutôt pour Swann de point de départ à de nouveaux doutes qu’ils ne mettaient un terme aux anciens.", "en": "There's something good about her, all the same, you see, your little Odette, even though we find her so detestable. » Besides, her very confessions, when she made them to him, of faults that she supposed him to have discovered, served for Swann rather as a starting point for new doubts than they put an end to old ones."}, {"start": 7090.17, "end": 7093.98, "b_start": 14094.11, "b_end": 14103.19, "orig": "Car ils n’étaient jamais exactement proportionnés à ceux-ci.", "en": "Because they were never exactly proportionate to these."}, {"start": 7094.98, "end": 7110.8, "b_start": 14103.19, "b_end": 14137.0, "orig": "Odette avait eu beau retrancher de sa confession tout l’essentiel, il restait dans l’accessoire quelque chose que Swann n’avait jamais imaginé, qui l’accablait de sa nouveauté et allait lui permettre de changer les termes du problème de sa jalousie. Et ces aveux il ne pouvait plus les oublier.", "en": "Although Odette had removed everything essential from her confession, there remained in the accessory something that Swann had never imagined, which overwhelmed him with its novelty and would allow him to change the terms of the problem of his jealousy. And he could no longer forget these confessions."}, {"start": 7111.8, "end": 7127.59, "b_start": 14137.0, "b_end": 14170.37, "orig": "Son âme les charriait, les rejetait, les berçait, comme des cadavres. Et elle en était empoisonnée. Une fois elle lui parla d’une visite que Forcheville lui avait faite le jour de la Fête de Paris-Murcie. « Comment, tu le connaissais déjà ?", "en": "His soul carried them, rejected them, cradled them, like corpses. And she was poisoned by it. Once she told him about a visit that Forcheville had made to her on the day of the Paris-Murcia Festival. “What do you mean, you already knew him?"}, {"start": 7128.59, "end": 7134.88, "b_start": 14170.37, "b_end": 14185.36, "orig": "Ah ! oui, c’est vrai », dit-il en se reprenant pour ne pas paraître l’avoir ignoré.", "en": "Ah! yes, that’s true,” he said, composing himself so as not to appear to have ignored him."}, {"start": 7135.88, "end": 7146.58, "b_start": 14185.36, "b_end": 14209.49, "orig": "Et tout d’un coup il se mit à trembler à la pensée que le jour de cette fête de Paris-Murcie où il avait reçu d’elle la lettre qu’il avait si précieusement gardée, elle déjeunait peut-être avec Forcheville à la Maison d’Or.", "en": "And suddenly he began to tremble at the thought that on the day of that Paris-Murcia festival where he had received from her the letter he had so preciously kept, she was perhaps lunching with Forcheville at the Maison d'Or."}, {"start": 7147.58, "end": 7175.33, "b_start": 14209.49, "b_end": 14266.43, "orig": "Elle lui jura que non. « Pourtant la Maison d’Or me rappelle je ne sais quoi que j’ai su ne pas être vrai », lui dit-il pour l’effrayer. – « Oui, que je n’y étais pas allée le soir où je t’ai dit que j’en sortais quand tu m’avais cherchée chez Prévost », lui répondit-elle (croyant à son air qu’il le savait), avec une décision où il y avait, beaucoup plus que du cynisme, de la timidité, une peur de contrarier Swann et que par amour-propre elle voulait cacher, puis le désir de lui montrer qu’elle pouvait être franche.", "en": "She swore to him no. “Yet the Golden House reminds me of something I know not to be true,” he said to frighten her. – “Yes, that I didn’t go there the evening I told you that I was leaving when you looked for me at Prévost’s,” she answered him (believing from his appearance that he knew it), with a decision in which there was, much more than cynicism, shyness, a fear of upsetting Swann and which out of self-esteem she wanted to hide, then the desire to show him that she could be frank."}, {"start": 7176.33, "end": 7195.34, "b_start": 14266.43, "b_end": 14307.89, "orig": "Aussi frappa-t-elle avec une netteté et une vigueur de bourreau et qui étaient exemptes de cruauté, car Odette n’avait pas conscience du mal qu’elle faisait à Swann ; et même elle se mit à rire, peut-être il est vrai, surtout pour ne pas avoir l’air humilié, confus. « C’est vrai que je n’avais pas été à la Maison Dorée, que je sortais de chez Forcheville.", "en": "So she struck with the clarity and vigor of an executioner and which was free from cruelty, because Odette was not aware of the harm she was doing to Swann; and she even started to laugh, perhaps it is true, especially so as not to appear humiliated, confused. “It’s true that I hadn’t been to the Maison Dorée, that I was leaving Forcheville’s."}, {"start": 7196.34, "end": 7211.65, "b_start": 14307.89, "b_end": 14338.86, "orig": "J’avais vraiment été chez Prévost, ça c’était pas de la blague, il m’y avait rencontrée et m’avait demandé d’entrer regarder ses gravures. Mais il était venu quelqu’un pour le voir. Je t’ai dit que je venais de la Maison d’Or parce que j’avais peur que cela ne t’ennuie.", "en": "I had really been to Prévost, that was no joke, he had met me there and asked me to come in and look at his engravings. But someone had come to see him. I told you I came from the Golden House because I was afraid it would bore you."}, {"start": 7212.65, "end": 7226.35, "b_start": 14338.86, "b_end": 14368.1, "orig": "Tu vois, c’était plutôt gentil de ma part. Mettons que j’aie eu tort, au moins je te le dis carrément. Quel intérêt aurais-je à ne pas te dire aussi bien que j’avais déjeuné avec lui le jour de la Fête Paris-Murcie, si c’était vrai ?", "en": "See, that was pretty nice of me. Let's pretend I was wrong, at least I'll tell you straight. What interest would I have in not telling you that I had lunch with him on the day of the Paris-Murcia Festival, if it were true?"}, {"start": 7227.35, "end": 7238.87, "b_start": 14368.1, "b_end": 14392.48, "orig": "D’autant plus qu’à ce moment-là on ne se connaissait pas encore beaucoup tous les deux, dis, chéri. » Il lui sourit avec la lâcheté soudaine de l’être sans forces qu’avaient fait de lui ces accablantes paroles.", "en": "Especially since at that time we both didn't know each other very well, darling. » He smiled at her with the sudden cowardice of the helpless being that these overwhelming words had made of him."}, {"start": 7239.87, "end": 7248.46, "b_start": 14392.48, "b_end": 14412.02, "orig": "Ainsi, même dans les mois auxquels il n’avait jamais plus osé repenser parce qu’ils avaient été trop heureux, dans ces mois où elle l’avait aimé, elle lui mentait déjà !", "en": "So, even in the months that he had never dared to think about again because they had been too happy, in those months when she had loved him, she was already lying to him!"}, {"start": 7249.46, "end": 7261.82, "b_start": 14412.02, "b_end": 14437.93, "orig": "Aussi bien que ce moment (le premier soir qu’ils avaient « fait catleya ») où elle lui avait dit sortir de la Maison Dorée, combien devait-il y en avoir eu d’autres, receleurs eux aussi d’un mensonge que Swann n’avait pas soupçonné.", "en": "As well as this moment (the first evening that they had “made catleya”) when she told him she was leaving the Golden House, how many others must there have been, also concealing a lie that Swann had not suspected."}, {"start": 7262.82, "end": 7273.1, "b_start": 14437.93, "b_end": 14458.2, "orig": "Il se rappela qu’elle lui avait dit un jour : « Je n’aurais qu’à dire à M\nme\nVerdurin que ma robe n’a pas été prête, que mon cab est venu en retard.", "en": "He remembered that she had said to him one day: “I would just have to tell Madame Verdurin that my dress was not ready, that my cab came late."}, {"start": 7274.1, "end": 7349.12, "b_start": 14458.2, "b_end": 14612.92, "orig": "Il y a toujours moyen de s’arranger. » À lui aussi probablement bien des fois où elle lui avait glissé de ces mots qui expliquent un retard, justifient un changement d’heure dans un rendez-vous, ils avaient dû cacher, sans qu’il s’en fût douté alors, quelque chose qu’elle avait à faire avec un autre à qui elle avait dit : « Je n’aurai qu’à dire à Swann que ma robe n’a pas été prête, que mon cab est arrivé en retard, il y a toujours moyen de s’arranger. » Et sous tous les souvenirs les plus doux de Swann, sous les paroles les plus simples que lui avait dites autrefois Odette, qu’il avait crues comme paroles d’évangile, sous les actions quotidiennes qu’elle lui avait racontées, sous les lieux les plus accoutumés, la maison de sa couturière, l’avenue du Bois, l’Hippodrome, il sentait (dissimulée à la faveur de cet excédent de temps qui dans les journées les plus détaillées laisse encore du jeu, de la place, et peut servir de cachette à certaines actions), il sentait s’insinuer la présence possible et souterraine de mensonges qui lui rendaient ignoble tout ce qui lui était resté le plus cher, ses meilleurs soirs, la rue La Pérouse elle-même, qu’Odette avait toujours dû quitter à d’autres heures que celles qu’elle lui avait dites, faisant circuler partout un peu de la ténébreuse horreur qu’il avait ressentie en entendant l’aveu relatif à la Maison Dorée, et, comme les bêtes immondes dans la Désolation de Ninive, ébranlant pierre à pierre tout son passé.", "en": "There is always a way to work things out. » To him also probably many times when she had slipped these words to him which explain a delay, justify a change of time in an appointment, they must have hidden, without him having suspected it at the time, something that she had to do with another to whom she had said: \"I will only have to tell Swann that my dress was not ready, that my cab arrived late, there is always a way to work things out. » And under all the sweetest memories of Swann, under the simplest words that Odette had once said to him, which he had believed as words of the gospel, under the daily actions that she had told him about, under the most accustomed places, his dressmaker's house, the Avenue du Bois, the Hippodrome, he felt (hidden in favor of this excess of time which in the most detailed days still leaves play, space, and can used as a hiding place for certain actions), he felt the possible and subterranean presence of lies creeping in which made everything that had remained dearest to him ignoble, his best evenings, the rue La Pérouse itself, which Odette had always had to leave at times other than those she had told him about, circulating everywhere a little of the dark horror that he had felt on hearing the confession relating to the Maison Dorée, and, like the filthy beasts in the Desolation of Nineveh, shaking its entire past stone by stone."}, {"start": 7350.12, "end": 7367.38, "b_start": 14612.92, "b_end": 14648.04, "orig": "Si maintenant il se détournait chaque fois que sa mémoire lui disait le nom cruel de la Maison Dorée, ce n’était plus, comme tout récemment encore à la soirée de M\nme\nde Saint-Euverte, parce qu’il lui rappelait un bonheur qu’il avait perdu depuis longtemps, mais un malheur qu’il venait seulement d’apprendre.", "en": "If now he turned away each time his memory told him the cruel name of the Golden House, it was no longer, as very recently at Madame de Saint-Euverte's evening, because it reminded him of a happiness he had lost a long time ago, but of a misfortune that he had only just learned about."}, {"start": 7368.38, "end": 7381.62, "b_start": 14648.04, "b_end": 14676.04, "orig": "Puis il en fut du nom de la Maison Dorée comme de celui de l’île du Bois, il cessa peu à peu de faire souffrir Swann. Car ce que nous croyons notre amour, notre jalousie, n’est pas une même passion continue, indivisible.", "en": "Then it happened with the name of the Golden House like that of the Isle of Wood, it gradually ceased to make Swann suffer. Because what we believe our love, our jealousy, is not the same continuous, indivisible passion."}, {"start": 7382.62, "end": 7393.71, "b_start": 14676.04, "b_end": 14699.98, "orig": "Ils se composent d’une infinité d’amours successifs, de jalousies différentes et qui sont éphémères, mais par leur multitude ininterrompue donnent l’impression de la continuité, l’illusion de l’unité.", "en": "They are made up of an infinity of successive loves, of different jealousies which are ephemeral, but through their uninterrupted multitude give the impression of continuity, the illusion of unity."}, {"start": 7394.71, "end": 7411.39, "b_start": 14699.98, "b_end": 14735.7, "orig": "La vie de l’amour de Swann, la fidélité de sa jalousie, étaient faites de la mort, de l’infidélité, d’innombrables désirs, d’innombrables doutes, qui avaient tous Odette pour objet. S’il était resté longtemps sans la voir, ceux qui mouraient n’auraient pas été remplacés par d’autres.", "en": "The life of Swann's love, the fidelity of his jealousy, were made up of death, of infidelity, of innumerable desires, of innumerable doubts, all of which had Odette as their object. If he had gone a long time without seeing her, those who died would not have been replaced by others."}, {"start": 7412.39, "end": 7418.34, "b_start": 14735.7, "b_end": 14749.3, "orig": "Mais la présence d’Odette continuait d’ensemencer le cœur de Swann de tendresse et de soupçons alternés.", "en": "But Odette's presence continued to seed Swann's heart with tenderness and alternating suspicions."}, {"start": 7419.34, "end": 7448.07, "b_start": 14749.3, "b_end": 14807.48, "orig": "Certains soirs elle redevenait tout d’un coup avec lui d’une gentillesse dont elle l’avertissait durement qu’il devait profiter tout de suite, sous peine de ne pas la voir se renouveler avant des années ; il fallait rentrer immédiatement chez elle « faire catleya » et ce désir qu’elle prétendait avoir de lui était si soudain, si inexplicable, si impérieux, les caresses qu’elle lui prodiguait ensuite si démonstratives et si insolites, que cette tendresse brutale et sans vraisemblance faisait autant de chagrin à Swann qu’un mensonge et qu’une méchanceté.", "en": "Some evenings she suddenly became kind to him again, of which she harshly warned him that he must take advantage of it immediately, otherwise he would not see it repeated for years; she had to go home immediately to \"do catleya\" and this desire that she claimed to have for him was so sudden, so inexplicable, so imperious, the caresses she then lavished on him so demonstrative and so unusual, that this brutal and implausible tenderness caused Swann as much grief as a lie and meanness."}, {"start": 7449.07, "end": 7479.31, "b_start": 14807.48, "b_end": 14869.66, "orig": "Un soir qu’il était ainsi, sur l’ordre qu’elle lui en avait donné, rentré avec elle, et qu’elle entremêlait ses baisers de paroles passionnées qui contrastaient avec sa sécheresse ordinaire, il crut tout d’un coup entendre du bruit ; il se leva, chercha partout, ne trouva personne, mais n’eut pas le courage de reprendre sa place auprès d’elle qui alors, au comble de la rage, brisa un vase et dit à Swann : « On ne peut jamais rien faire avec toi ! » Et il resta incertain si elle n’avait pas caché quelqu’un dont elle avait voulu faire souffrir la jalousie ou allumer les sens.", "en": "One evening when he was thus, on the orders she had given him, returning with her, and she was interspersing her kisses with passionate words which contrasted with her usual dryness, he suddenly thought he heard a noise; he got up, looked everywhere, found no one, but did not have the courage to take his place with her who then, at the height of rage, broke a vase and said to Swann: “We can never do anything with you! » And he remained uncertain if she had not hidden someone whose jealousy she had wanted to arouse or ignite the senses."}, {"start": 7480.31, "end": 7496.68, "b_start": 14869.66, "b_end": 14904.32, "orig": "Quelquefois il allait dans des maisons de rendez-vous, espérant apprendre quelque chose d’elle, sans oser la nommer cependant. « J’ai une petite qui va vous plaire », disait l’entremetteuse. » Et il restait une heure à causer tristement avec quelque pauvre fille étonnée qu’il ne fît rien de plus.", "en": "Sometimes he went to meeting houses, hoping to learn something from her, without daring to name her, however. “I have a little one that you will like,” said the matchmaker. » And he remained for an hour chatting sadly with some poor girl who was surprised that he did nothing more."}, {"start": 7497.68, "end": 7523.6, "b_start": 14904.32, "b_end": 14958.96, "orig": "Une toute jeune et ravissante lui dit un jour : « Ce que je voudrais, c’est trouver un ami, alors il pourrait être sûr, je n’irais plus jamais avec personne. » – « Vraiment, crois-tu que ce soit possible qu’une femme soit touchée qu’on l’aime, ne vous trompe jamais ? » lui demanda Swann anxieusement. – « Pour sûr ! ça dépend des caractères ! » Swann ne pouvait s’empêcher de dire à ces filles les mêmes choses qui auraient plu à la princesse des Laumes.", "en": "A very young and lovely one said to him one day: “What I would like is to find a friend, then he could be sure, I would never go with anyone again. » – “Really, do you think it’s possible for a woman to be touched that someone loves her, never deceive you? » Swann asked him anxiously. – “For sure! It depends on the characters! » Swann could not help saying to these girls the same things that would have pleased the Princess of Laumes."}, {"start": 7524.6, "end": 7539.02, "b_start": 14958.96, "b_end": 14988.59, "orig": "À celle qui cherchait un ami, il dit en souriant : « C’est gentil, tu as mis des yeux bleus de la couleur de ta ceinture. » – « Vous aussi, vous avez des manchettes bleues. » – « Comme nous avons une belle conversation, pour un endroit de ce genre !", "en": "To the one who was looking for a friend, he said with a smile: “That’s nice, you put blue eyes the color of your belt. » – “You also have blue cuffs. » – “What a lovely conversation we have, for a place like this!"}, {"start": 7540.02, "end": 7554.06, "b_start": 14988.59, "b_end": 15018.86, "orig": "Je ne t’ennuie pas, tu as peut-être à faire ? » – « Non, j’ai tout mon temps. Si vous m’aviez ennuyée, je vous l’aurais dit. Au contraire j’aime bien vous entendre causer. » – « Je suis très flatté.", "en": "I’m not boring you, maybe you have something to do? » – “No, I have plenty of time. If you had bothered me, I would have told you. On the contrary, I like hearing you talk. » – “I am very flattered."}, {"start": 7555.06, "end": 7574.89, "b_start": 15018.86, "b_end": 15060.37, "orig": "N’est-ce pas que nous causons gentiment ? » dit-il à l’entremetteuse qui venait d’entrer. – « Mais oui, c’est justement ce que je me disais. Comme ils sont sages ! Voilà ! on vient maintenant pour causer chez moi. Le Prince le disait, l’autre jour, c’est bien mieux ici que chez sa femme.", "en": "Aren’t we chatting nicely? » he said to the matchmaker who had just entered. – “But yes, that’s exactly what I was telling myself. How wise they are! So ! we are now coming to chat at my place. The Prince said it the other day, it’s much better here than at his wife’s."}, {"start": 7575.89, "end": 7593.22, "b_start": 15060.37, "b_end": 15096.12, "orig": "Il paraît que maintenant dans le monde elles ont toutes un genre, c’est un vrai scandale ! Je vous quitte, je suis discrète. » Et elle laissa Swann avec la fille qui avait les yeux bleus. Mais bientôt il se leva et lui dit adieu, elle lui était indifférente, elle ne connaissait pas Odette.", "en": "It seems that now in the world they all have a gender, it’s a real scandal! I'm leaving you, I'm discreet. » And she left Swann with the girl who had blue eyes. But soon he got up and said goodbye to her, she was indifferent to him, she didn't know Odette."}, {"start": 7594.22, "end": 7609.22, "b_start": 15096.12, "b_end": 15127.48, "orig": "Le peintre ayant été malade, le docteur Cottard lui conseilla un voyage en mer ; plusieurs fidèles parlèrent de partir avec lui ; les Verdurin ne purent se résoudre à rester seuls, louèrent un yacht, puis s’en rendirent acquéreurs et ainsi Odette fit de fréquentes croisières.", "en": "The painter having been ill, Doctor Cottard advised him to take a trip to the sea; several devotees spoke of going with him; the Verdurins could not bring themselves to stay alone, rented a yacht, then purchased it and so Odette took frequent cruises."}, {"start": 7610.22, "end": 7623.87, "b_start": 15127.48, "b_end": 15156.98, "orig": "Chaque fois qu’elle était partie depuis un peu de temps, Swann sentait qu’il commençait à se détacher d’elle, mais comme si cette distance morale était proportionnée à la distance matérielle, dès qu’il savait Odette de retour, il ne pouvait pas rester sans la voir.", "en": "Each time she had been gone for a little while, Swann felt that he was beginning to become detached from her, but as if this moral distance were proportionate to the material distance, as soon as he knew Odette was back, he could not stay without seeing her."}, {"start": 7624.87, "end": 7631.38, "b_start": 15156.98, "b_end": 15171.97, "orig": "Une fois, partis pour un mois seulement, croyaient-ils, soit qu’ils eussent été tentés en route, soit que M.", "en": "Once, leaving for only a month, they believed, either because they had been tempted on the way, or because Mr."}, {"start": 7632.38, "end": 7648.74, "b_start": 15171.97, "b_end": 15206.76, "orig": "Verdurin eût sournoisement arrangé les choses d’avance pour faire plaisir à sa femme et n’eût averti les fidèles qu’au fur et à mesure, d’Alger, ils allèrent à Tunis, puis en Italie, puis en Grèce, à Constantinople, en Asie Mineure. Le voyage durait depuis près d’un an.", "en": "Verdurin would have slyly arranged things in advance to please his wife and would have only warned the faithful that gradually, from Algiers, they went to Tunis, then to Italy, then to Greece, to Constantinople, to Asia Minor. The trip had been going on for almost a year."}, {"start": 7649.74, "end": 7655.43, "b_start": 15206.76, "b_end": 15219.4, "orig": "Swann se sentait absolument tranquille, presque heureux. Bien que M.", "en": "Swann felt absolutely calm, almost happy. Although Mr."}, {"start": 7656.43, "end": 7677.41, "b_start": 15219.4, "b_end": 15259.37, "orig": "Verdurin eût cherché à persuader au pianiste et au docteur Cottard que la tante de l’un et les malades de l’autre n’avaient aucun besoin d’eux, et, qu’en tous cas il était imprudent de laisser M\nme\nCottard rentrer à Paris que M\nme\nVerdurin assurait être en révolution, il fut obligé de leur rendre leur liberté à Constantinople.", "en": "Verdurin would have tried to persuade the pianist and Doctor Cottard that the aunt of one and the sick of the other had no need of them, and that in any case it was imprudent to let Mme Cottard return to Paris which Mme Verdurin assured was in revolution, he was obliged to give them their freedom in Constantinople."}, {"start": 7678.41, "end": 7680.88, "b_start": 15259.37, "b_end": 15265.84, "orig": "Et le peintre partit avec eux.", "en": "And the painter left with them."}, {"start": 7681.88, "end": 7704.27, "b_start": 15265.84, "b_end": 15310.3, "orig": "Un jour, peu après le retour de ces trois voyageurs, Swann voyant passer un omnibus pour le Luxembourg où il avait à faire, avait sauté dedans, et s’y était trouvé assis en face de M\nme\nCottard qui faisait sa tournée de visites « de jours » en grande tenue, plumet au chapeau, robe de soie, manchon, en-tout-cas, porte-cartes, et gants blancs nettoyés.", "en": "One day, shortly after the return of these three travelers, Swann seeing an omnibus pass by for Luxembourg where he had business, jumped on it, and found himself seated opposite Ms. Cottard who was making her \"daytime\" visiting tour in full dress, plume in hat, silk dress, muff, snacks, card case, and cleaned white gloves."}, {"start": 7705.27, "end": 7716.17, "b_start": 15310.3, "b_end": 15333.04, "orig": "Revêtue de ces insignes, quand il faisait sec elle allait à pied d’une maison à l’autre, dans un même quartier, mais pour passer ensuite dans un quartier différent usait de l’omnibus avec correspondance.", "en": "Wearing these badges, when it was dry she went on foot from one house to another, in the same neighborhood, but to then go to a different neighborhood she used the connecting omnibus."}, {"start": 7717.17, "end": 7748.06, "b_start": 15333.04, "b_end": 15399.36, "orig": "Pendant les premiers instants, avant que la gentillesse native de la femme eût pu percer l’empesé de la petite bourgeoise, et ne sachant trop d’ailleurs si elle devait parler des Verdurin à Swann, elle tint tout naturellement, de sa voix lente, gauche et douce que par moments l’omnibus couvrait complètement de son tonnerre, des propos choisis parmi ceux qu’elle entendait et répétait dans les vingt-cinq maisons dont elle montait les étages dans une journée :\n– Je ne vous demande pas, monsieur, si un homme dans le mouvement comme vous, a vu, aux Mirlitons, le portrait de Machard qui fait courir tout Paris.", "en": "During the first moments, before the native kindness of the woman could break through the starched nature of the petite bourgeoisie, and not really knowing whether she should speak about the Verdurins to Swann, she said quite naturally, in her slow, clumsy and soft voice which at times the omnibus completely covered with its thunder, words chosen from among those she heard and repeated in the twenty-five houses whose floors she went up in a day: - I only ask you not, sir, if a man in the movement like you saw, at the Mirlitons, the portrait of Machard which has all of Paris running around."}, {"start": 7749.06, "end": 7765.42, "b_start": 15399.36, "b_end": 15434.2, "orig": "Eh bien ! qu’en dites-vous ? Êtes-vous dans le camp de ceux qui approuvent ou dans le camp de ceux qui blâment ? Dans tous les salons on ne parle que du portrait de Machard ; on n’est pas chic, on n’est pas pur, on n’est pas dans le train, si on ne donne pas son opinion sur le portrait de Machard.", "en": "Well ! what do you say? Are you in the approving camp or the blaming camp? In all the salons we only talk about Machard’s portrait; we are not chic, we are not pure, we are not on the train, if we do not give our opinion on the portrait of Machard."}, {"start": 7766.42, "end": 7783.97, "b_start": 15434.2, "b_end": 15469.42, "orig": "Swann ayant répondu qu’il n’avait pas vu ce portrait, M\nme\nCottard eut peur de l’avoir blessé en l’obligeant à le confesser.\n– Ah ! c’est très bien, au moins vous l’avouez franchement, vous ne vous croyez pas déshonoré parce que vous n’avez pas vu le portrait de Machard.", "en": "Swann having replied that he had not seen this portrait, Ms. Cottard was afraid of having hurt him by forcing him to confess it. – Oh! that's very good, at least you admit it frankly, you don't think you're dishonored because you haven't seen Machard's portrait."}, {"start": 7784.97, "end": 7801.46, "b_start": 15469.42, "b_end": 15502.55, "orig": "Je trouve cela très beau de votre part. Hé bien, moi je l’ai vu, les avis sont partagés, il y en a qui trouvent que c’est un peu léché, un peu crème fouettée, moi, je le trouve idéal. Évidemment elle ne ressemble pas aux femmes bleues et jaunes de notre ami Biche.", "en": "I find that very beautiful of you. Well, I saw it, opinions are divided, there are some who find it a little slick, a little whipped cream, I find it ideal. Obviously she doesn't look like the blue and yellow women of our friend Biche."}, {"start": 7802.46, "end": 7809.85, "b_start": 15502.55, "b_end": 15519.05, "orig": "Mais je dois vous l’avouer franchement, vous ne me trouverez pas très fin de siècle, mais je le dis comme je le pense, je ne comprends pas.", "en": "But I must admit it to you frankly, you will not find me very fin de siècle, but I say it as I mean it, I don't understand."}, {"start": 7810.85, "end": 7821.84, "b_start": 15519.05, "b_end": 15542.63, "orig": "Mon Dieu je reconnais les qualités qu’il y a dans le portrait de mon mari, c’est moins étrange que ce qu’il fait d’habitude, mais il a fallu qu’il lui fasse des moustaches bleues. Tandis que Machard !", "en": "My God, I recognize the qualities in my husband's portrait, it's less strange than what he usually does, but he had to give him blue mustaches. While Machard!"}, {"start": 7822.84, "end": 7841.39, "b_start": 15542.63, "b_end": 15581.98, "orig": "Tenez justement le mari de l’amie chez qui je vais en ce moment (ce qui me donne le très grand plaisir de faire route avec vous) lui a promis s’il est nommé à l’Académie (c’est un des collègues du docteur), de lui faire faire son portrait par Machard. Évidemment c’est un beau rêve ! j’ai une autre amie qui prétend qu’elle aime mieux Leloir.", "en": "The husband of the friend I am visiting at the moment (which gives me the great pleasure of traveling with you) has promised him if he is appointed to the Academy (he is one of the doctor's colleagues), to have his portrait done by Machard. Obviously it’s a beautiful dream! I have another friend who claims she likes Leloir better."}, {"start": 7842.39, "end": 7855.38, "b_start": 15581.98, "b_end": 15610.36, "orig": "Je ne suis qu’une pauvre profane et Leloir est peut-être encore supérieur comme science. Mais je trouve que la première qualité d’un portrait, surtout quand il coûte 10.000 francs, est d’être ressemblant et d’une ressemblance agréable.", "en": "I am only a poor layman and Leloir is perhaps still superior in science. But I find that the first quality of a portrait, especially when it costs 10,000 francs, is to be similar and have a pleasant resemblance."}, {"start": 7856.38, "end": 7887.26, "b_start": 15610.36, "b_end": 15669.41, "orig": "Ayant tenu ces propos que lui inspiraient la hauteur de son aigrette, le chiffre de son porte-cartes, le petit numéro tracé à l’encre dans ses gants par le teinturier et l’embarras de parler à Swann des Verdurin, M\nme\nCottard, voyant qu’on était encore loin du coin de la rue Bonaparte où le conducteur devait l’arrêter, écouta son cœur qui lui conseillait d’autres paroles.\n– Les oreilles ont dû vous tinter, monsieur, lui dit-elle, pendant le voyage que nous avons fait avec M\nme\nVerdurin.", "en": "Having said these words, inspired by the height of her egret, the number on her card holder, the little number written in ink in her gloves by the dyer and the embarrassment of speaking to Swann about Verdurin, Mme Cottard, seeing that we were still far from the corner of rue Bonaparte where the driver was to stop her, listened to her heart which advised her other words. “Your ears must have been ringing, sir,” she said to him, “during the trip we made with Madame Verdurin."}, {"start": 7888.26, "end": 7910.42, "b_start": 15669.41, "b_end": 15711.4, "orig": "On ne parlait que de vous. Swann fut bien étonné, il supposait que son nom n’était jamais proféré devant les Verdurin.\n– D’ailleurs, ajouta M\nme\nCottard, M\nme\nde Crécy était là et c’est tout dire. Quand Odette est quelque part, elle ne peut jamais rester bien longtemps sans parler de vous.", "en": "We were only talking about you. Swann was very surprised, he assumed that his name was never mentioned in front of the Verdurins. “Besides,” added Ms. Cottard, “Ms. de Crécy was there and that says it all. When Odette is somewhere, she can never go long without talking about you."}, {"start": 7911.42, "end": 7920.2, "b_start": 15711.4, "b_end": 15731.14, "orig": "Et vous pensez que ce n’est pas en mal. Comment ! vous en doutez ? dit-elle, en voyant un geste sceptique de Swann.", "en": "And you think that's not a bad thing. How ! Do you doubt it? she said, seeing a skeptical gesture from Swann."}, {"start": 7921.2, "end": 7937.64, "b_start": 15731.14, "b_end": 15765.56, "orig": "Et emportée par la sincérité de sa conviction, ne mettant d’ailleurs aucune mauvaise pensée sous ce mot qu’elle prenait seulement dans le sens où on l’emploie pour parler de l’affection qui unit des amis :\n– Mais elle vous adore ! Ah ! je crois qu’il ne faudrait pas dire ça de vous devant elle !", "en": "And carried away by the sincerity of her conviction, not putting any bad thought under this word which she took only in the sense in which it is used to speak of the affection which unites friends: – But she adores you! Ah! I don’t think we should say that about you in front of her!"}, {"start": 7938.64, "end": 7955.99, "b_start": 15765.56, "b_end": 15802.42, "orig": "On serait bien arrangé ! À propos de tout, si on voyait un tableau par exemple elle disait : « Ah ! s’il était là, c’est lui qui saurait vous dire si c’est authentique ou non. Il n’y a personne comme lui pour ça. » Et à tout moment elle demandait : « Qu’est-ce qu’il peut faire en ce moment ?", "en": "We'd be fine! About everything, if we saw a painting for example she would say: “Ah! if he were there, he would be the one to tell you if it was authentic or not. There is no one like him for that. » And all the time she would ask: “What can he do right now?"}, {"start": 7956.99, "end": 7974.39, "b_start": 15802.42, "b_end": 15839.08, "orig": "Si seulement il travaillait un peu ! C’est malheureux, un garçon si doué, qu’il soit si paresseux. (Vous me pardonnez, n’est-ce pas ?) En ce moment je le vois, il pense à nous, il se demande où nous sommes. » Elle a même eu un mot que j’ai trouvé bien joli ; M.", "en": "If only he worked a little! It's unfortunate, such a gifted boy, that he is so lazy. (You forgive me, right?) Right now I see him, he's thinking about us, he's wondering where we are. » She even had a word that I found very pretty; Mr."}, {"start": 7975.39, "end": 7992.67, "b_start": 15839.08, "b_end": 15875.42, "orig": "Verdurin lui disait : « Mais comment pouvez-vous voir ce qu’il fait en ce moment puisque vous êtes à huit cents lieues de lui ? » Alors Odette lui a répondu : « Rien n’est impossible à l’œil d’une amie. » Non je vous jure, je ne vous dis pas cela pour vous flatter, vous avez là une vraie amie comme on n’en a pas beaucoup.", "en": "Verdurin said to him: “But how can you see what he is doing at this moment since you are eight hundred leagues from him? » Then Odette replied: “Nothing is impossible to the eye of a friend. » No, I swear, I'm not telling you this to flatter you, you have a real friend there like few others have."}, {"start": 7993.67, "end": 7998.3, "b_start": 15875.42, "b_end": 15885.47, "orig": "Je vous dirai du reste que si vous ne le savez pas, vous êtes le seul.", "en": "I will tell you that if you don't know, you're the only one."}, {"start": 7999.3, "end": 8012.6, "b_start": 15885.47, "b_end": 15912.34, "orig": "M\nme\nVerdurin me le disait encore le dernier jour (vous savez les veilles de départ on cause mieux) : « Je ne dis pas qu’Odette ne nous aime pas, mais tout ce que nous lui disons ne pèserait pas lourd auprès de ce que lui dirait M.", "en": "Ms. Verdurin said it to me again on the last day (you know the days before departure we talk better): “I'm not saying that Odette doesn't love us, but everything we say to her wouldn't carry much weight compared to what Mr."}, {"start": 8013.6, "end": 8039.71, "b_start": 15912.34, "b_end": 15963.25, "orig": "Swann. » Oh ! mon Dieu, voilà que le conducteur m’arrête, en bavardant avec vous j’allais laisser passer la rue Bonaparte... me rendriez-vous le service de me dire si mon aigrette est droite ? »\nEt M\nme\nCottard sortit de son manchon pour la tendre à Swann sa main gantée de blanc d’où s’échappa, avec une correspondance, une vision de haute vie qui remplit l’omnibus, mêlée à l’odeur du teinturier.", "en": "Swann. \" Oh ! my God, the driver stops me, while chatting with you I was going to let rue Bonaparte pass... would you do me the service of telling me if my egret is straight? » And Mme Cottard took out of her muff to offer Swann her white-gloved hand from which escaped, with a letter, a vision of high life which filled the omnibus, mixed with the smell of the dry cleaner."}, {"start": 8040.71, "end": 8069.03, "b_start": 15963.25, "b_end": 16023.02, "orig": "Et Swann se sentit déborder de tendresse pour elle, autant que pour M\nme\nVerdurin (et presque autant que pour Odette, car le sentiment qu’il éprouvait pour cette dernière n’étant plus mêlé de douleur, n’était plus guère de l’amour), tandis que de la plate-forme il la suivait de ses yeux attendris, qui enfilait courageusement la rue Bonaparte, l’aigrette haute, d’une main relevant sa jupe, de l’autre tenant son en-tout-cas et son porte-cartes dont elle laissait voir le chiffre, laissant baller devant elle son manchon.", "en": "And Swann felt himself overflowing with tenderness for her, as much as for Madame Verdurin (and almost as much as for Odette, because the feeling he felt for the latter no longer being mixed with pain, was hardly love anymore), while from the platform he followed her with his tender eyes, as she courageously walked down the Rue Bonaparte, her aigrette held high, with one hand lifting her skirt, the other holding her snack and her card holder, the number of which she showed, letting her muff hang in front of her."}, {"start": 8070.03, "end": 8105.22, "b_start": 16023.02, "b_end": 16094.68, "orig": "Pour faire concurrence aux sentiments maladifs que Swann avait pour Odette, M\nme\nCottard, meilleur thérapeute que n’eût été son mari, avait greffé à côté d’eux d’autres sentiments, normaux ceux-là, de gratitude, d’amitié, des sentiments qui dans l’esprit de Swann rendraient Odette plus humaine (plus semblable aux autres femmes, parce que d’autres femmes aussi pouvaient les lui inspirer), hâteraient sa transformation définitive en cette Odette aimée d’affection paisible, qui l’avait ramené un soir après une fête chez le peintre boire un verre d’orangeade avec Forcheville et près de qui Swann avait entrevu qu’il pourrait vivre heureux.", "en": "To compete with the unhealthy feelings that Swann had for Odette, Ms. Cottard, a better therapist than her husband had been, had grafted alongside them other feelings, normal ones, of gratitude, of friendship, feelings which in Swann's mind would make Odette more human (more similar to other women, because other women could also inspire them in him), would hasten her definitive transformation into this Odette loved by peaceful affection, who had brought him back a evening after a party at the painter's house to drink a glass of orangeade with Forcheville and near whom Swann had foreseen that he could live happily."}, {"start": 8106.22, "end": 8118.46, "b_start": 16094.68, "b_end": 16121.88, "orig": "Jadis ayant souvent pensé avec terreur qu’un jour il cesserait d’être épris d’Odette, il s’était promis d’être vigilant, et dès qu’il sentirait que son amour commencerait à le quitter, de s’accrocher à lui, de le retenir.", "en": "Formerly having often thought with terror that one day he would cease to be in love with Odette, he had promised himself to be vigilant, and as soon as he felt that his love was beginning to leave him, to cling to him, to hold on to him."}, {"start": 8119.46, "end": 8133.98, "b_start": 16121.88, "b_end": 16152.73, "orig": "Mais voici qu’à l’affaiblissement de son amour correspondait simultanément un affaiblissement du désir de rester amoureux. Car on ne peut pas changer, c’est-à-dire devenir une autre personne, tout en continuant à obéir aux sentiments de celle qu’on n’est plus.", "en": "But now the weakening of his love corresponded simultaneously to a weakening of the desire to remain in love. Because we cannot change, that is to say become another person, while continuing to obey the feelings of the person we no longer are."}, {"start": 8134.98, "end": 8143.09, "b_start": 16152.73, "b_end": 16170.46, "orig": "Parfois le nom, aperçu dans un journal, d’un des hommes qu’il supposait avoir pu être les amants d’Odette, lui redonnait de la jalousie.", "en": "Sometimes the name, seen in a newspaper, of one of the men he supposed could have been Odette's lovers, made him feel jealous again."}, {"start": 8144.09, "end": 8169.89, "b_start": 16170.46, "b_end": 16223.36, "orig": "Mais elle était bien légère et comme elle lui prouvait qu’il n’était pas encore complètement sorti de ce temps où il avait tant souffert – mais aussi où il avait connu une manière de sentir si voluptueuse – et que les hasards de la route lui permettraient peut-être d’en apercevoir encore furtivement et de loin les beautés, cette jalousie lui procurait plutôt une excitation agréable comme au morne Parisien qui quitte Venise pour retrouver la France, un dernier moustique prouve que l’Italie et l’été ne sont pas encore bien loin.", "en": "But it was very light and as it proved to him that he had not yet completely emerged from this time when he had suffered so much - but also where he had known such a voluptuous way of feeling - and that the chances of the road would perhaps allow him to still glimpse its beauties furtively and from afar, this jealousy rather gave him a pleasant excitement like the gloomy Parisian who leaves Venice to return to France, a last mosquito proves that Italy and Summer is not far away yet."}, {"start": 8170.89, "end": 8223.71, "b_start": 16223.36, "b_end": 16331.88, "orig": "Mais le plus souvent le temps si particulier de sa vie d’où il sortait, quand il faisait effort sinon pour y rester, du moins pour en avoir une vision claire pendant qu’il le pouvait encore, il s’apercevait qu’il ne le pouvait déjà plus ; il aurait voulu apercevoir comme un paysage qui allait disparaître cet amour qu’il venait de quitter ; mais il est si difficile d’être double et de se donner le spectacle véridique d’un sentiment qu’on a cessé de posséder, que bientôt l’obscurité se faisant dans son cerveau, il ne voyait plus rien, renonçait à regarder, retirait son lorgnon, en essuyait les verres ; et il se disait qu’il valait mieux se reposer un peu, qu’il serait encore temps tout à l’heure, et se rencognait, avec l’incuriosité, dans l’engourdissement du voyageur ensommeillé qui rabat son chapeau sur ses yeux pour dormir dans le wagon qu’il sent l’entraîner de plus en plus vite, loin du pays où il a si longtemps vécu et qu’il s’était promis
