t l’espérance d’en être jamais délivré, elle semblait lui dire comme jadis de son bonheur : « Qu’est-ce cela ? tout cela n’est rien. » Et la pensée de Swann se porta pour la première fois dans un élan de pitié et de tendresse vers ce Vinteuil, vers ce frère inconnu et sublime qui lui aussi avait dû tant souffrir ; qu’avait pu être sa vie ? au fond de quelles douleurs avait-il puisé cette force de dieu, cette puissance illimitée de créer ?", "en": "Of these sorrows of which she spoke to him in the past and of which he saw her, without him being affected by them, dragging them smilingly into her sinuous and rapid course, of these sorrows which had now become his without him having the hope of ever being delivered from them, she seemed to say to him as before of her happiness: “What is this? all this is nothing. » And Swann's thoughts went for the first time in a surge of pity and tenderness towards this Vinteuil, towards this unknown and sublime brother who must also have suffered so much; what could his life have been like? from the depths of what pains had he drawn this godly strength, this unlimited power to create?"}, {"start": 4142.45, "end": 4157.81, "b_start": 8198.6, "b_end": 8230.49, "orig": "Quand c’était la petite phrase qui lui parlait de la vanité de ses souffrances, Swann trouvait de la douceur à cette même sagesse qui tout à l’heure pourtant lui avait paru intolérable, quand il croyait la lire dans les visages des indifférents qui considéraient son amour comme une divagation sans importance.", "en": "When it was the little sentence that spoke to him of the vanity of his suffering, Swann found sweetness in this same wisdom which earlier had seemed intolerable to him, when he thought he read it in the faces of the indifferent people who considered his love as an unimportant rambling."}, {"start": 4158.81, "end": 4174.05, "b_start": 8230.49, "b_end": 8263.4, "orig": "C’est que la petite phrase au contraire, quelque opinion qu’elle pût avoir sur la brève durée de ces états de l’âme, y voyait quelque chose, non pas comme faisaient tous ces gens, de moins sérieux que la vie positive, mais au contraire de si supérieur à elle que seul il valait la peine d’être exprimé.", "en": "It is because the little phrase on the contrary, whatever opinion it might have on the brief duration of these states of the soul, saw in it something, not as all these people did, less serious than positive life, but on the contrary so superior to it that it alone was worth expressing."}, {"start": 4175.05, "end": 4188.99, "b_start": 8263.4, "b_end": 8295.14, "orig": "Ces charmes d’une tristesse intime, c’était eux qu’elle essayait d’imiter, de recréer, et jusqu’à leur essence qui est pourtant d’être incommunicables et de sembler frivoles à tout autre qu’à celui qui les éprouve, la petite phrase l’avait captée, rendue visible.", "en": "These charms of an intimate sadness, it was them that she tried to imitate, to recreate, and even their essence which is nevertheless to be incommunicable and to seem frivolous to anyone other than to the one who experiences them, the little sentence had captured it, made visible."}, {"start": 4189.99, "end": 4202.11, "b_start": 8295.14, "b_end": 8322.47, "orig": "Si bien qu’elle faisait confesser leur prix et goûter leur douceur divine, par tous ces mêmes assistants – si seulement ils étaient un peu musiciens – qui ensuite les méconnaîtraient dans la vie, en chaque amour particulier qu’ils verraient naître près d’eux.", "en": "So much so that she made all these same assistants confess their value and taste their divine sweetness – if only they were a little musical – who would then misrecognize them in life, in each particular love that they saw born near them."}, {"start": 4203.11, "end": 4208.42, "b_start": 8322.47, "b_end": 8334.5, "orig": "Sans doute la forme sous laquelle elle les avait codifiés ne pouvait pas se résoudre en raisonnements.", "en": "No doubt the form in which she had codified them could not be resolved into reasoning."}, {"start": 4209.42, "end": 4232.34, "b_start": 8334.5, "b_end": 8382.42, "orig": "Mais depuis plus d’une année que, lui révélant à lui-même bien des richesses de son âme, l’amour de la musique était pour quelque temps au moins né en lui, Swann tenait les motifs musicaux pour de véritables idées, d’un autre monde, d’un autre ordre, idées voilées de ténèbres, inconnues, impénétrables à l’intelligence, mais qui n’en sont pas moins parfaitement distinctes les unes des autres, inégales entre elles de valeur et de signification.", "en": "But for more than a year since, revealing to himself many of the riches of his soul, the love of music had at least for a time been born in him, Swann had considered musical motifs to be true ideas, from another world, from another order, ideas veiled in darkness, unknown, impenetrable to the intelligence, but which are no less perfectly distinct from each other, unequal in value and meaning."}, {"start": 4233.34, "end": 4268.62, "b_start": 8382.42, "b_end": 8455.49, "orig": "Quand après la soirée Verdurin, se faisant rejouer la petite phrase, il avait cherché à démêler comment à la façon d’un parfum, d’une caresse, elle le circonvenait, elle l’enveloppait, il s’était rendu compte que c’était au faible écart entre les cinq notes qui la composaient et au rappel constant de deux d’entre elles qu’était due cette impression de douceur rétractée et frileuse ; mais en réalité il savait qu’il raisonnait ainsi non sur la phrase elle-même mais sur de simples valeurs, substituées pour la commodité de son intelligence à la mystérieuse entité qu’il avait perçue, avant de connaître les Verdurin, à cette soirée où il avait entendu pour la première fois la sonate.", "en": "When after the Verdurin evening, having the little phrase replayed to himself, he tried to unravel how, like a perfume, a caress, it circumvented him, it enveloped him, he realized that it was the small gap between the five notes that composed it and the constant reminder of two of them that was due to this impression of retracted and chilly sweetness; but in reality he knew that he was reasoning thus not on the sentence itself but on simple values, substituted for the convenience of his intelligence for the mysterious entity that he had perceived, before knowing the Verdurins, on that evening when he had heard the sonata for the first time."}, {"start": 4269.62, "end": 4312.86, "b_start": 8455.49, "b_end": 8544.54, "orig": "Il savait que le souvenir même du piano faussait encore le plan dans lequel il voyait les choses de la musique, que le champ ouvert au musicien n’est pas un clavier mesquin de sept notes, mais un clavier incommensurable, encore presque tout entier inconnu, où seulement çà et là, séparées par d’épaisses ténèbres inexplorées, quelques-unes des millions de touches de tendresse, de passion, de courage, de sérénité, qui le composent, chacune aussi différente des autres qu’un univers d’un autre univers, ont été découvertes par quelques grands artistes qui nous rendent le service, en éveillant en nous le correspondant du thème qu’ils ont trouvé, de nous montrer quelle richesse, quelle variété, cache à notre insu cette grande nuit impénétrée et décourageante de notre âme que nous prenons pour du vide et pour du néant.", "en": "He knew that the very memory of the piano still distorted the plane in which he saw things in music, that the field open to the musician is not a paltry keyboard of seven notes, but an immeasurable keyboard, still almost entirely unknown, where only here and there, separated by thick unexplored darkness, are some of the millions of keys of tenderness, of passion, of courage, of serenity, which compose it, each as different from the others as a universe from another universe, were discovered by some great artists who render us the service, by awakening in us the correspondent of the theme they found, to show us what richness, what variety, hides without our knowledge this great impenetrable and discouraging night of our soul which we take for emptiness and nothingness."}, {"start": 4313.86, "end": 4316.86, "b_start": 8544.54, "b_end": 8552.18, "orig": "Vinteuil avait été l’un de ces musiciens.", "en": "Vinteuil had been one of these musicians."}, {"start": 4317.86, "end": 4333.49, "b_start": 8552.18, "b_end": 8584.88, "orig": "En sa petite phrase, quoiqu’elle présentât à la raison une surface obscure, on sentait un contenu si consistant, si explicite, auquel elle donnait une force si nouvelle, si originale, que ceux qui l’avaient entendue la conservaient en eux de plain-pied avec les idées de l’intelligence.", "en": "In her little sentence, although it presented an obscure surface to reason, we felt a content so consistent, so explicit, to which it gave such a new, so original force, that those who had heard it retained it within themselves along with the ideas of intelligence."}, {"start": 4334.49, "end": 4347.74, "b_start": 8584.88, "b_end": 8612.74, "orig": "Swann s’y reportait comme à une conception de l’amour et du bonheur dont immédiatement il savait aussi bien en quoi elle était particulière, qu’il le savait pour la « Princesse de Clèves », ou pour « René », quand leur nom se présentait à sa mémoire.", "en": "Swann referred to it as a conception of love and happiness of which he immediately knew as well why it was particular, as he knew it for the \"Princess of Cleves\", or for \"René\", when their names presented themselves to his memory."}, {"start": 4348.74, "end": 4365.58, "b_start": 8612.74, "b_end": 8648.29, "orig": "Même quand il ne pensait pas à la petite phrase, elle existait latente dans son esprit au même titre que certaines autres notions sans équivalent, comme les notions de la lumière, du son, du relief, de la volupté physique, qui sont les riches possessions dont se diversifie et se pare notre domaine intérieur.", "en": "Even when he was not thinking about the little phrase, it existed latent in his mind in the same way as certain other unparalleled notions, such as the notions of light, sound, relief, physical pleasure, which are the rich possessions with which our interior domain is diversified and adorned."}, {"start": 4366.58, "end": 4371.79, "b_start": 8648.29, "b_end": 8660.64, "orig": "Peut-être les perdrons-nous, peut-être s’effaceront-elles, si nous retournons au néant.", "en": "Perhaps we will lose them, perhaps they will fade away, if we return to nothingness."}, {"start": 4372.79, "end": 4388.18, "b_start": 8660.64, "b_end": 8692.6, "orig": "Mais tant que nous vivons, nous ne pouvons pas plus faire que nous ne les ayons connues que nous ne le pouvons pour quelque objet réel, que nous ne pouvons par exemple douter de la lumière de la lampe qu’on allume devant les objets métamorphosés de notre chambre d’où s’est échappé jusqu’au souvenir de l’obscurité.", "en": "But as long as we live, we can no more do that we have known them than we can for any real object, nor, for example, can we doubt the light of the lamp that we light in front of the metamorphosed objects in our room from which even the memory of darkness has escaped."}, {"start": 4389.18, "end": 4401.87, "b_start": 8692.6, "b_end": 8720.3, "orig": "Par là, la phrase de Vinteuil avait, comme tel thème de Tristan par exemple, qui nous représente aussi une certaine acquisition sentimentale, épousé notre condition mortelle, pris quelque chose d’humain qui était assez touchant.", "en": "In this way, Vinteuil's sentence had, like such a theme from Tristan for example, which also represents to us a certain sentimental acquisition, married our mortal condition, taken on something human which was quite touching."}, {"start": 4402.87, "end": 4410.82, "b_start": 8720.3, "b_end": 8738.2, "orig": "Son sort était lié à l’avenir, à la réalité de notre âme dont elle était un des ornements les plus particuliers, les mieux différenciés.", "en": "Its fate was linked to the future, to the reality of our soul of which it was one of the most particular, the best differentiated ornaments."}, {"start": 4411.82, "end": 4422.9, "b_start": 8738.2, "b_end": 8762.26, "orig": "Peut-être est-ce le néant qui est le vrai et tout notre rêve est-il inexistant, mais alors nous sentons qu’il faudra que ces phrases musicales, ces notions qui existent par rapport à lui, ne soient rien non plus.", "en": "Perhaps it is nothingness that is true and our whole dream is non-existent, but then we feel that these musical phrases, these notions which exist in relation to it, will have to be nothing either."}, {"start": 4423.9, "end": 4440.34, "b_start": 8762.26, "b_end": 8796.56, "orig": "Nous périrons, mais nous avons pour otages ces captives divines qui suivront notre chance. Et la mort avec elle a quelque chose de moins amer, de moins inglorieux, peut-être de moins probable. Swann n’avait donc pas tort de croire que la phrase de la sonate existât réellement.", "en": "We will perish, but we have as hostages these divine captives who will follow our luck. And death with it has something less bitter, less inglorious, perhaps less probable. Swann was therefore not wrong to believe that the phrase from the sonata really existed."}, {"start": 4441.34, "end": 4459.18, "b_start": 8796.56, "b_end": 8835.65, "orig": "Certes, humaine à ce point de vue, elle appartenait pourtant à un ordre de créatures surnaturelles et que nous n’avons jamais vues, mais que malgré cela nous reconnaissons avec ravissement quand quelque explorateur de l’invisible arrive à en capter une, à l’amener, du monde divin où il a accès, briller quelques instants au-dessus du nôtre.", "en": "Certainly, human from this point of view, she nevertheless belonged to an order of supernatural creatures and which we have never seen, but which despite this we recognize with delight when some explorer of the invisible manages to capture one, to bring it, from the divine world to which he has access, to shine for a few moments above ours."}, {"start": 4460.18, "end": 4463.49, "b_start": 8835.65, "b_end": 8843.87, "orig": "C’est ce que Vinteuil avait fait pour la petite phrase.", "en": "This is what Vinteuil did for the little phrase."}, {"start": 4464.49, "end": 4484.58, "b_start": 8843.87, "b_end": 8885.47, "orig": "Swann sentait que le compositeur s’était contenté, avec ses instruments de musique, de la dévoiler, de la rendre visible, d’en suivre et d’en respecter le dessin d’une main si tendre, si prudente, si délicate et si sûre que le son s’altérait à tout moment, s’estompant pour indiquer une ombre, revivifié quand il lui fallait suivre à la piste un plus hardi contour.", "en": "Swann felt that the composer had contented himself, with his musical instruments, with revealing it, making it visible, following and respecting its outline with a hand so tender, so prudent, so delicate and so sure that the sound altered at any moment, fading to indicate a shadow, revived when it had to follow a bolder outline."}, {"start": 4485.58, "end": 4504.78, "b_start": 8885.47, "b_end": 8926.43, "orig": "Et une preuve que Swann ne se trompait pas quand il croyait à l’existence réelle de cette phrase, c’est que tout amateur un peu fin se fût tout de suite aperçu de l’imposture, si Vinteuil ayant eu moins de puissance pour en voir et en rendre les formes, avait cherché à dissimuler, en ajoutant çà et là des traits de son cru, les lacunes de sa vision ou les défaillances de sa main.", "en": "And proof that Swann was not mistaken when he believed in the real existence of this sentence is that any amateur with a little insight would have immediately noticed the imposture, if Vinteuil, having had less power to see and render its forms, had sought to conceal, by adding here and there features of his own, the gaps in his vision or the failings of his hand."}, {"start": 4505.78, "end": 4517.46, "b_start": 8926.43, "b_end": 8949.53, "orig": "Elle avait disparu. Swann savait qu’elle reparaîtrait à la fin du dernier mouvement, après tout un long morceau que le pianiste de M\nme\nVerdurin sautait toujours.", "en": "She had disappeared. Swann knew that she would reappear at the end of the last movement, after a long piece that Madame Verdurin's pianist always skipped."}, {"start": 4518.46, "end": 4530.75, "b_start": 8949.53, "b_end": 8975.46, "orig": "Il y avait là d’admirables idées que Swann n’avait pas distinguées à la première audition et qu’il percevait maintenant, comme si elles se fussent, dans le vestiaire de sa mémoire, débarrassées du déguisement uniforme de la nouveauté.", "en": "There were admirable ideas there which Swann had not distinguished at the first hearing and which he now perceived, as if they had been, in the locker room of his memory, freed from the uniform disguise of novelty."}, {"start": 4531.75, "end": 4563.74, "b_start": 8975.46, "b_end": 9044.45, "orig": "Swann écoutait tous les thèmes épars qui entreraient dans la composition de la phrase, comme les prémisses dans la conclusion nécessaire, il assistait à sa genèse. « Ô audace aussi géniale peut-être, se disait-il, que celle d’un Lavoisier, d’un Ampère, l’audace d’un Vinteuil expérimentant, découvrant les lois secrètes d’une force inconnue, menant à travers l’inexploré, vers le seul but possible, l’attelage invisible auquel il se fie et qu’il n’apercevra jamais. » Le beau dialogue que Swann entendit entre le piano et le violon au commencement du dernier morceau !", "en": "Swann listened to all the scattered themes that would enter into the composition of the sentence, like the premises in the necessary conclusion, he witnessed its genesis. “O audacity as brilliant perhaps,” he said to himself, “as that of a Lavoisier, of an Ampère, the audacity of a Vinteuil experimenting, discovering the secret laws of an unknown force, leading through the unexplored, towards the only possible goal, the invisible team on which he trusts and which he will never perceive. » The beautiful dialogue that Swann heard between the piano and the violin at the beginning of the last piece!"}, {"start": 4564.74, "end": 4579.1, "b_start": 9044.45, "b_end": 9076.19, "orig": "La suppression des mots humains, loin d’y laisser régner la fantaisie, comme on aurait pu croire, l’en avait éliminée ; jamais le langage parlé ne fut si inflexiblement nécessité, ne connut à ce point la pertinence des questions, l’évidence des réponses.", "en": "The suppression of human words, far from letting fantasy reign, as one might have believed, had eliminated it; never has spoken language been so inflexibly necessary, never known to such an extent the relevance of the questions, the obviousness of the answers."}, {"start": 4580.1, "end": 4588.59, "b_start": 9076.19, "b_end": 9095.09, "orig": "D’abord le piano solitaire se plaignit, comme un oiseau abandonné de sa compagne ; le violon l’entendit, lui répondit comme d’un arbre voisin.", "en": "First the solitary piano complained, like a bird abandoned by its companion; the violin heard it, responded as if from a neighboring tree."}, {"start": 4589.59, "end": 4601.86, "b_start": 9095.09, "b_end": 9122.48, "orig": "C’était comme au commencement du monde, comme s’il n’y avait encore eu qu’eux deux sur la terre, ou plutôt dans ce monde fermé à tout le reste, construit par la logique d’un créateur et où ils ne seraient jamais que tous les deux : cette sonate.", "en": "It was like at the beginning of the world, as if there had still only been the two of them on earth, or rather in this world closed to everything else, built by the logic of a creator and where there would only ever be the two of them: this sonata."}, {"start": 4602.86, "end": 4618.0, "b_start": 9122.48, "b_end": 9153.91, "orig": "Est-ce un oiseau, est-ce l’âme incomplète encore de la petite phrase, est-ce une fée, invisible et gémissant, dont le piano ensuite redisait tendrement la plainte ? Ses cris étaient si soudains que le violoniste devait se précipiter sur son archet pour les recueillir.", "en": "Is it a bird, is it the still incomplete soul of the little phrase, is it a fairy, invisible and moaning, whose complaint the piano then tenderly repeats? His cries were so sudden that the violinist had to rush to his bow to collect them."}, {"start": 4619.0, "end": 4636.88, "b_start": 9153.91, "b_end": 9191.36, "orig": "Merveilleux oiseau ! le violoniste semblait vouloir le charmer, l’apprivoiser, le capter. Déjà il avait passé dans son âme, déjà la petite phrase évoquée agitait comme celui d’un médium le corps vraiment possédé du violoniste. Swann savait qu’elle allait parler encore une fois.", "en": "Wonderful bird! the violinist seemed to want to charm him, tame him, capture him. It had already passed into his soul, already the little phrase evoked shook the truly possessed body of the violinist like that of a medium. Swann knew she was going to speak again."}, {"start": 4637.88, "end": 4654.08, "b_start": 9191.36, "b_end": 9227.78, "orig": "Et il s’était si bien dédoublé que l’attente de l’instant imminent où il allait se retrouver en face d’elle le secoua d’un de ces sanglots qu’un beau vers ou une triste nouvelle provoquent en nous, non pas quand nous sommes seuls, mais si nous les apprenons à des amis en qui nous nous apercevons comme un autre dont l’émotion probable les attendrit.", "en": "And he had split himself so well that the expectation of the imminent moment when he was going to find himself face to face with her shook him with one of those sobs that a beautiful verse or sad news provokes in us, not when we are alone, but if we tell them to friends in whom we perceive ourselves as another whose probable emotion softens them."}, {"start": 4655.08, "end": 4670.37, "b_start": 9227.78, "b_end": 9261.32, "orig": "Elle reparut, mais cette fois pour se suspendre dans l’air et se jouer un instant seulement, comme immobile, et pour expirer après. Aussi Swann ne perdait-il rien du temps si court où elle se prorogeait. Elle était encore là comme une bulle irisée qui se soutient.", "en": "It reappeared, but this time to hang in the air and play for only a moment, as if motionless, and to expire afterwards. So Swann lost nothing of the very short time during which she continued. She was still there like an iridescent bubble that supports itself."}, {"start": 4671.37, "end": 4687.06, "b_start": 9261.32, "b_end": 9295.56, "orig": "Tel un arc-en-ciel, dont l’éclat faiblit, s’abaisse, puis se relève et, avant de s’éteindre, s’exalte un moment comme il n’avait pas encore fait : aux deux couleurs qu’elle avait jusque-là laissé paraître, elle ajouta d’autres cordes diaprées, toutes celles du prisme, et les fit chanter.", "en": "Like a rainbow, whose brightness weakens, falls, then rises again and, before dying out, shines for a moment as it had not yet done: to the two colors that she had until then allowed to appear, she added other variegated strings, all those of the prism, and made them sing."}, {"start": 4688.06, "end": 4703.81, "b_start": 9295.56, "b_end": 9329.12, "orig": "Swann n’osait pas bouger et aurait voulu faire tenir tranquilles aussi les autres personnes, comme si le moindre mouvement avait pu compromettre le prestige surnaturel, délicieux et fragile qui était si près de s’évanouir. Personne, à dire vrai, ne songeait à parler.", "en": "Swann did not dare to move and would have liked to make the other people remain calm as well, as if the slightest movement could have compromised the supernatural, delicious and fragile prestige which was so close to disappearing. Nobody, to tell the truth, thought of speaking."}, {"start": 4704.81, "end": 4723.29, "b_start": 9329.12, "b_end": 9369.48, "orig": "La parole ineffable d’un seul absent, peut-être d’un mort (Swann ne savait pas si Vinteuil vivait encore) s’exhalant au-dessus des rites de ces officiants, suffisait à tenir en échec l’attention de trois cents personnes, et faisait de cette estrade où une âme était ainsi évoquée un des plus nobles autels où pût s’accomplir une cérémonie surnaturelle.", "en": "The ineffable words of a single absentee, perhaps of a dead person (Swann did not know if Vinteuil was still alive) exhaling above the rites of these officiants, was enough to hold in check the attention of three hundred people, and made this platform where a soul was thus evoked one of the noblest altars where a supernatural ceremony could be performed."}, {"start": 4724.29, "end": 4765.83, "b_start": 9369.48, "b_end": 9454.19, "orig": "De sorte que quand la phrase se fut enfin défaite, flottant en lambeaux dans les motifs suivants qui déjà avaient pris sa place, si Swann au premier instant fut irrité de voir la comtesse de Monteriender, célèbre par ses naïvetés, se pencher vers lui pour lui confier ses impressions avant même que la sonate fût finie, il ne put s’empêcher de sourire, et peut-être de trouver aussi un sens profond qu’elle n’y voyait pas, dans les mots dont elle se servit. Émerveillée par la virtuosité des exécutants, la comtesse s’écria en s’adressant à Swann : « C’est prodigieux, je n’ai jamais rien vu d’aussi fort... » Mais un scrupule d’exactitude lui faisant corriger cette première assertion, elle ajouta cette réserve : « rien d’aussi fort... depuis les tables tournantes !", "en": "So that when the phrase had finally come undone, floating in tatters in the following motifs which had already taken its place, if Swann was at first irritated to see the Countess of Monteriender, famous for her naiveties, leaning towards him to confide her impressions even before the sonata was finished, he could not help but smile, and perhaps also find a deep meaning that she did not see, in the words she used. Amazed by the virtuosity of the performers, the countess exclaimed, addressing Swann: \"It's prodigious, I've never seen anything so loud...\" But a scruple of accuracy making her correct this first assertion, she added this reservation: \"nothing so loud... from the turntables!"}, {"start": 4766.83, "end": 4775.57, "b_start": 9454.19, "b_end": 9473.5, "orig": "À partir de cette soirée, Swann comprit que le sentiment qu’Odette avait eu pour lui ne renaîtrait jamais, que ses espérances de bonheur ne se réaliseraient plus.", "en": "From that evening, Swann understood that the feeling that Odette had had for him would never be reborn, that her hopes of happiness would no longer come true."}, {"start": 4776.57, "end": 4810.17, "b_start": 9473.5, "b_end": 9542.68, "orig": "Et les jours où par hasard elle avait encore été gentille et tendre avec lui, si elle avait eu quelque attention, il notait ces signes apparents et menteurs d’un léger retour vers lui, avec cette sollicitude attendrie et sceptique, cette joie désespérée de ceux qui, soignant un ami arrivé aux derniers jours d’une maladie incurable, relatent comme des faits précieux : « hier, il a fait ses comptes lui-même et c’est lui qui a relevé une erreur d’addition que nous avions faite ; il a mangé un œuf avec plaisir, s’il le digère bien on essaiera demain d’une côtelette », quoiqu’ils les sachent dénués de signification à la veille d’une mort inévitable.", "en": "And on the days when by chance she had still been kind and tender to him, if she had been at all attentive, he noted these apparent and lying signs of a slight return to him, with this tender and skeptical solicitude, this desperate joy of those who, caring for a friend who has reached the last days of an incurable illness, relate as precious facts: “yesterday, he did his accounts himself and it was he who noticed an error in the addition that we had made; he ate an egg with pleasure, if he digests it well we'll try a chop tomorrow\", although they know them to have no meaning on the eve of inevitable death."}, {"start": 4811.17, "end": 4824.82, "b_start": 9542.68, "b_end": 9571.66, "orig": "Sans doute Swann était certain que s’il avait vécu maintenant loin d’Odette, elle aurait fini par lui devenir indifférente, de sorte qu’il aurait été content qu’elle quittât Paris pour toujours ; il aurait eu le courage de rester ; mais il n’avait pas celui de partir.", "en": "No doubt Swann was certain that if he had now lived far from Odette, she would have ended up becoming indifferent to him, so that he would have been happy for her to leave Paris forever; he would have had the courage to stay; but he didn't have the will to leave."}, {"start": 4825.82, "end": 4836.41, "b_start": 9571.66, "b_end": 9594.47, "orig": "Il en avait eu souvent la pensée. Maintenant qu’il s’était remis à son étude sur Ver Meer il aurait eu besoin de retourner au moins quelques jours à la Haye, à Dresde, à Brunswick.", "en": "He had often thought about it. Now that he had returned to his study of Ver Meer he would have needed to return at least a few days to The Hague, to Dresden, to Brunswick."}, {"start": 4837.41, "end": 4851.42, "b_start": 9594.47, "b_end": 9624.22, "orig": "Il était persuadé qu’une « Toilette de Diane » qui avait été achetée par le Mauritshuis à la vente Goldschmidt comme un Nicolas Maes était en réalité de Ver Meer. Et il aurait voulu pouvoir étudier le tableau sur place pour étayer sa conviction.", "en": "He was convinced that a “Toilette de Diane” which had been purchased by the Mauritshuis at the Goldschmidt sale as a Nicolas Maes was in reality by Ver Meer. And he would have liked to be able to study the painting on site to support his conviction."}, {"start": 4852.42, "end": 4868.86, "b_start": 9624.22, "b_end": 9660.49, "orig": "Mais quitter Paris pendant qu’Odette y était et même quand elle était absente – car dans des lieux nouveaux où les sensations ne sont pas amorties par l’habitude, on retrempe, on ranime une douleur – c’était pour lui un projet si cruel, qu’il ne se sentait capable d’y penser sans cesse que parce qu’il se savait résolu à ne l’exécuter jamais.", "en": "But leaving Paris while Odette was there and even when she was absent - because in new places where sensations are not dampened by habit, one revives, one revives a pain - it was for him a project so cruel that he only felt capable of thinking about it incessantly because he knew he was resolved never to carry it out."}, {"start": 4869.86, "end": 4877.59, "b_start": 9660.49, "b_end": 9678.55, "orig": "Mais il arrivait qu’en dormant, l’intention du voyage renaissait en lui – sans qu’il se rappelât que ce voyage était impossible – et elle s’y réalisait.", "en": "But it happened that while sleeping, the intention of the trip was reborn in him – without him remembering that this trip was impossible – and it came true."}, {"start": 4878.59, "end": 4888.48, "b_start": 9678.55, "b_end": 9701.51, "orig": "Un jour il rêva qu’il partait pour un an ; penché à la portière du wagon vers un jeune homme qui sur le quai lui disait adieu en pleurant, Swann cherchait à le convaincre de partir avec lui.", "en": "One day he dreamed that he was leaving for a year; Leaning out of the carriage door towards a young man who on the platform was saying goodbye to him while crying, Swann tried to convince him to leave with him."}, {"start": 4889.48, "end": 4898.48, "b_start": 9701.51, "b_end": 9721.22, "orig": "Le train s’ébranlant, l’anxiété le réveilla, il se rappela qu’il ne partait pas, qu’il verrait Odette ce soir-là, le lendemain et presque chaque jour.", "en": "The train moving, anxiety woke him up, he remembered that he was not leaving, that he would see Odette that evening, the next day and almost every day."}, {"start": 4899.48, "end": 4965.12, "b_start": 9721.22, "b_end": 9857.22, "orig": "Alors, encore tout ému de son rêve, il bénit les circonstances particulières qui le rendaient indépendant, grâce auxquelles il pouvait rester près d’Odette, et aussi réussir à ce qu’elle lui permît de la voir quelquefois ; et, récapitulant tous ces avantages : sa situation – sa fortune, dont elle avait souvent trop besoin pour ne pas reculer devant une rupture (ayant même, disait-on, une arrière-pensée de se faire épouser par lui) – cette amitié de M. de Charlus qui à vrai dire ne lui avait jamais fait obtenir grand’chose d’Odette, mais lui donnait la douceur de sentir qu’elle entendait parler de lui d’une manière flatteuse par cet ami commun pour qui elle avait une si grande estime – et jusqu’à son intelligence enfin, qu’il employait tout entière à combiner chaque jour une intrigue nouvelle qui rendît sa présence sinon agréable, du moins nécessaire à Odette – il songea à ce qu’il serait devenu si tout cela lui avait manqué, il songea que s’il avait été, comme tant d’autres, pauvre, humble, dénué, obligé d’accepter toute besogne, ou lié à des parents, à une épouse, il aurait pu être obligé de quitter Odette, que ce rêve dont l’effroi était encore si proche aurait pu être vrai, et il se dit : « On ne connaît pas son bonheur.", "en": "Then, still moved by his dream, he blessed the particular circumstances which made him independent, thanks to which he could stay close to Odette, and also succeed in having her allow him to see her sometimes; and, recapitulating all these advantages: her situation - her fortune, which she often needed too much not to shy away from a break-up (even having, it was said, an ulterior motive of being married by him) - this friendship of M. de Charlus which in truth had never made her obtain much from Odette, but gave her the sweetness of feeling that she was hearing about him in a flattering manner from this mutual friend for whom she had such great esteem - and finally to his intelligence, which he used entirely to combine each day a new intrigue which made his presence, if not pleasant, at least necessary for Odette - he thought of what he would have become if all this had been lacking, he thought that if he had been, like so many others, poor, humble, destitute, obliged to accept any work, or linked to parents, to a wife, he could have been obliged to leave Odette, that this dream whose fear was still so close could have been true, and he said to himself: “One does not know one's happiness."}, {"start": 4966.12, "end": 5002.62, "b_start": 9857.22, "b_end": 9934.18, "orig": "On n’est jamais aussi malheureux qu’on croit. » Mais il compta que cette existence durait déjà depuis plusieurs années, que tout ce qu’il pouvait espérer c’est qu’elle durât toujours, qu’il sacrifierait ses travaux, ses plaisirs, ses amis, finalement toute sa vie à l’attente quotidienne d’un rendez-vous qui ne pouvait rien lui apporter d’heureux, et il se demanda s’il ne se trompait pas, si ce qui avait favorisé sa liaison et en avait empêché la rupture n’avait pas desservi sa destinée, si l’événement désirable, ce n’aurait pas été celui dont il se réjouissait tant qu’il n’eût eu lieu qu’en rêve : son départ ; il se dit qu’on ne connaît pas son malheur, qu’on n’est jamais si heureux qu’on croit.", "en": "We are never as unhappy as we think. » But he realized that this existence had already lasted for several years, that all he could hope for was that it would last forever, that he would sacrifice his work, his pleasures, his friends, ultimately his whole life to the daily expectation of a meeting which could bring him nothing happy, and he wondered if he was not mistaken, if what had favored his affair and had prevented its breakup had not harmed his destiny, if the event desirable, it would not have been the one he so rejoiced about if it had only happened in dreams: his departure; he tells himself that we don't know our misfortune, that we are never as happy as we think."}, {"start": 5003.62, "end": 5011.95, "b_start": 9934.18, "b_end": 9952.84, "orig": "Quelquefois il espérait qu’elle mourrait sans souffrances dans un accident, elle qui était dehors, dans les rues, sur les routes, du matin au soir.", "en": "Sometimes he hoped that she would die without suffering in an accident, she who was outside, in the streets, on the roads, from morning to evening."}, {"start": 5012.95, "end": 5033.26, "b_start": 9952.84, "b_end": 9997.22, "orig": "Et comme elle revenait saine et sauve, il admirait que le corps humain fût si souple et si fort, qu’il pût continuellement tenir en échec, déjouer tous les périls qui l’environnent (et que Swann trouvait innombrables depuis que son secret désir les avait supputés), et permît ainsi aux êtres de se livrer chaque jour et à peu près impunément à leur œuvre de mensonge, à la poursuite du plaisir.", "en": "And as she returned safe and sound, he admired that the human body was so supple and so strong, that it could continually hold itself in check, thwart all the dangers that surround it (and which Swann found innumerable since his secret desire had calculated them), and thus allowed beings to give themselves up every day and with almost impunity to their work of lies, to the pursuit of pleasure."}, {"start": 5034.26, "end": 5048.15, "b_start": 9997.22, "b_end": 10028.48, "orig": "Et Swann sentait bien près de son cœur ce Mahomet II dont il aimait le portrait par Bellini et qui, ayant senti qu’il était devenu amoureux fou d’une de ses femmes, la poignarda afin, dit naïvement son biographe vénitien, de retrouver sa liberté d’esprit.", "en": "And Swann felt very close to his heart this Mohammed II whose portrait he loved by Bellini and who, having felt that he had become madly in love with one of his wives, stabbed her in order, said his Venetian biographer naively, to regain his freedom of mind."}, {"start": 5049.15, "end": 5058.7, "b_start": 10028.48, "b_end": 10050.91, "orig": "Puis il s’indignait de ne penser ainsi qu’à soi, et les souffrances qu’il avait éprouvées lui semblaient ne mériter aucune pitié puisque lui-même faisait si bon marché de la vie d’Odette.", "en": "Then he became indignant at thinking only of himself in this way, and the suffering he had experienced seemed to him to deserve no pity since he himself was making such a cheap deal of Odette's life."}, {"start": 5059.7, "end": 5074.22, "b_start": 10050.91, "b_end": 10082.65, "orig": "Ne pouvant se séparer d’elle sans retour, du moins, s’il l’avait vue sans séparations, sa douleur aurait fini par s’apaiser et peut-être son amour par s’éteindre. Et du moment qu’elle ne voulait pas quitter Paris à jamais, il eût souhaité qu’elle ne le quittât jamais.", "en": "Unable to separate from her without return, at least, if he had seen her without separations, his pain would have ended up appeased and perhaps his love would have died out. And since she did not want to leave Paris forever, he would have wished that she had never left him."}, {"start": 5075.22, "end": 5096.13, "b_start": 10082.65, "b_end": 10128.43, "orig": "Du moins comme il savait que la seule grande absence qu’elle faisait était tous les ans celle d’août et septembre, il avait le loisir plusieurs mois d’avance d’en dissoudre l’idée amère dans tout le Temps à venir qu’il portait en lui par anticipation et qui, composé de jours homogènes aux jours actuels, circulait transparent et froid en son esprit où il entretenait la tristesse, mais sans lui causer de trop vives souffrances.", "en": "At least as he knew that the only major absence she made was every year that of August and September, he had the leisure several months in advance to dissolve the bitter idea in all the Time to come which he carried within him in anticipation and which, composed of days homogeneous with the current days, circulated transparent and cold in his mind where it maintained sadness, but without causing him too much suffering."}, {"start": 5097.13, "end": 5125.62, "b_start": 10128.43, "b_end": 10186.31, "orig": "Mais cet avenir intérieur, ce fleuve, incolore et libre, voici qu’une seule parole d’Odette venait l’atteindre jusqu’en Swann et, comme un morceau de glace, l’immobilisait, durcissait sa fluidité, le faisait geler tout entier ; et Swann s’était senti soudain rempli d’une masse énorme et infrangible qui pesait sur les parois intérieures de son être jusqu’à le faire éclater : c’est qu’Odette lui avait dit, avec un regard souriant et sournois qui l’observait : « Forcheville va faire un beau voyage, à la Pentecôte.", "en": "But this inner future, this river, colorless and free, here was a single word from Odette reaching it all the way to Swann and, like a piece of ice, immobilizing it, hardening its fluidity, making it freeze entirely; and Swann had suddenly felt filled with an enormous and unbreakable mass which weighed on the interior walls of his being until it burst: it was because Odette had said to him, with a smiling and sly look observing him: “Forcheville is going to take a nice trip at Pentecost."}, {"start": 5126.62, "end": 5154.19, "b_start": 10186.31, "b_end": 10243.22, "orig": "Il va en Égypte », et Swann avait aussitôt compris que cela signifiait : « Je vais aller en Égypte à la Pentecôte avec Forcheville. » Et en effet, si quelques jours après, Swann lui disait : « Voyons, à propos de ce voyage que tu m’as dit que tu ferais avec Forcheville », elle répondait étourdiment : « Oui, mon petit, nous partons le 19, on t’enverra une vue des Pyramides. » Alors il voulait apprendre si elle était la maîtresse de Forcheville, le lui demander à elle-même.", "en": "He’s going to Egypt,” and Swann immediately understood that this meant: “I’m going to go to Egypt at Pentecost with Forcheville. » And in fact, if a few days later, Swann said to her: “Let's see, about this trip that you told me you would take with Forcheville”, she would respond absentmindedly: “Yes, my little one, we are leaving on the 19th, we will send you a view of the Pyramids. » So he wanted to find out if she was Forcheville's mistress, to ask her herself."}, {"start": 5155.19, "end": 5170.62, "b_start": 10243.22, "b_end": 10276.88, "orig": "Il savait que, superstitieuse comme elle était, il y avait certains parjures qu’elle ne ferait pas et puis la crainte, qui l’avait retenu jusqu’ici, d’irriter Odette en l’interrogeant, de se faire détester d’elle, n’existait plus maintenant qu’il avait perdu tout espoir d’en être jamais aimé.", "en": "He knew that, superstitious as she was, there were certain perjuries that she would not commit and then the fear, which had held him back until now, of irritating Odette by questioning her, of being hated by her, no longer existed now that he had lost all hope of ever being loved by her."}, {"start": 5171.62, "end": 5184.97, "b_start": 10276.88, "b_end": 10305.31, "orig": "Un jour il reçut une lettre anonyme, qui lui disait qu’Odette avait été la maîtresse d’innombrables hommes (dont on lui citait quelques-uns parmi lesquels Forcheville, M. de Bréauté et le peintre), de femmes, et qu’elle fréquentait les maisons de passe.", "en": "One day he received an anonymous letter, which told him that Odette had been the mistress of countless men (some of whom were mentioned, including Forcheville, M. de Bréauté and the painter), of women, and that she frequented brothels."}, {"start": 5185.97, "end": 5200.01, "b_start": 10305.31, "b_end": 10334.65, "orig": "Il fut tourmenté de penser qu’il y avait parmi ses amis un être capable de lui avoir adressé cette lettre (car par certains détails elle révélait chez celui qui l’avait écrite une connaissance familière de la vie de Swann). Il chercha qui cela pouvait être.", "en": "He was tormented to think that there was among his friends a being capable of having sent him this letter (because in certain details it revealed in the person who had written it a familiar knowledge of Swann's life). He looked for who it could be."}, {"start": 5201.01, "end": 5207.82, "b_start": 10334.65, "b_end": 10350.55, "orig": "Mais il n’avait jamais eu aucun soupçon des actions inconnues des êtres, de celles qui sont sans liens visibles avec leurs propos.", "en": "But he had never had any suspicion of the unknown actions of beings, of those which have no visible links with their words."}, {"start": 5208.82, "end": 5230.14, "b_start": 10350.55, "b_end": 10397.99, "orig": "Et quand il voulut savoir si c’était plutôt sous le caractère apparent de M. de Charlus, de M. des Laumes, de M. d’Orsan, qu’il devait situer la région inconnue où cet acte ignoble avait dû naître, comme aucun de ces hommes n’avait jamais approuvé devant lui les lettres anonymes et que tout ce qu’ils lui avaient dit impliquait qu’ils les réprouvaient, il ne vit pas plus de raisons pour relier cette infamie plutôt à la nature de l’un que de l’autre.", "en": "And when he wanted to know if it was rather under the apparent character of M. de Charlus, of M. des Laumes, of M. d'Orsan, that he should locate the unknown region where this ignoble act must have been born, as none of these men had ever approved of the anonymous letters in front of him and that everything they had said to him implied that they disapproved of them, he saw no more reason to connect this infamy rather to the nature of one than of the other."}, {"start": 5231.14, "end": 5238.62, "b_start": 10397.99, "b_end": 10416.19, "orig": "Celle de M. de Charlus était un peu d’un détraqué mais foncièrement bonne et tendre ; celle de M. des Laumes un peu sèche, mais saine et droite.", "en": "That of M. de Charlus was a bit of a derangement but fundamentally good and tender; that of M. des Laumes a little dry, but healthy and straight."}, {"start": 5239.62, "end": 5249.8, "b_start": 10416.19, "b_end": 10438.48, "orig": "Quant à M. d’Orsan, Swann n’avait jamais rencontré personne qui dans les circonstances même les plus tristes vînt à lui avec une parole plus sentie, un geste plus discret et plus juste.", "en": "As for Mr. d'Orsan, Swann had never met anyone who, in even the saddest circumstances, came to him with a more meaningful word, a more discreet and fairer gesture."}, {"start": 5250.8, "end": 5266.35, "b_start": 10438.48, "b_end": 10472.28, "orig": "C’était au point qu’il ne pouvait comprendre le rôle peu délicat qu’on prêtait à M. d’Orsan dans la liaison qu’il avait avec une femme riche, et que chaque fois que Swann pensait à lui, il était obligé de laisser de côté cette mauvaise réputation inconciliable avec tant de témoignages certains de délicatesse.", "en": "It was to the point that he could not understand the not very delicate role that was attributed to Mr. d'Orsan in the affair he had with a rich woman, and that each time Swann thought of him, he was obliged to leave aside this bad reputation irreconcilable with so many certain signs of delicacy."}, {"start": 5267.35, "end": 5283.58, "b_start": 10472.28, "b_end": 10505.39, "orig": "Un instant Swann sentit que son esprit s’obscurcissait, et il pensa à autre chose pour retrouver un peu de lumière. Puis il eut le courage de revenir vers ces réflexions. Mais alors, après n’avoir pu soupçonner personne, il lui fallut soupçonner tout le monde.", "en": "For a moment Swann felt his mind darken, and he thought of something else to find a little light. Then he had the courage to return to these reflections. But then, after not having been able to suspect anyone, he had to suspect everyone."}, {"start": 5284.58, "end": 5300.32, "b_start": 10505.39, "b_end": 10538.74, "orig": "Après tout M. de Charlus l’aimait, avait bon cœur. Mais c’était un névropathe, peut-être demain pleurerait-il de le savoir malade, et aujourd’hui par jalousie, par colère, sur quelque idée subite qui s’était emparée de lui, avait-il désiré lui faire du mal.", "en": "After all, Mr. de Charlus loved him and had a good heart. But he was a neuropath, perhaps tomorrow he would cry to know he was ill, and today, out of jealousy, out of anger, because of some sudden idea that had taken hold of him, he had wanted to hurt him."}, {"start": 5301.32, "end": 5309.41, "b_start": 10538.74, "b_end": 10557.83, "orig": "Au fond, cette race d’hommes est la pire de toutes. Certes, le prince des Laumes était bien loin d’aimer Swann autant que M. de Charlus.", "en": "Deep down, this race of men is the worst of all. Certainly, the Prince des Laumes was far from loving Swann as much as M. de Charlus."}, {"start": 5310.41, "end": 5324.69, "b_start": 10557.83, "b_end": 10588.46, "orig": "Mais à cause de cela même, il n’avait pas avec lui les mêmes susceptibilités ; et puis c’était une nature froide sans doute, mais aussi incapable de vilenies que de grandes actions ; Swann se repentait de ne s’être pas attaché, dans la vie, qu’à de tels êtres.", "en": "But because of this itself, he did not have the same susceptibilities with him; and then it was a cold nature no doubt, but as incapable of villainies as of great actions; Swann repented of having only attached himself, in life, to such beings."}, {"start": 5325.69, "end": 5341.84, "b_start": 10588.46, "b_end": 10623.11, "orig": "Puis il songeait que ce qui empêche les hommes de faire du mal à leur prochain, c’est la bonté, qu’il ne pouvait au fond répondre que de natures analogues à la sienne, comme était, à l’égard du cœur, celle de M. de Charlus. La seule pensée de faire cette peine à Swann eût révolté celui-ci.", "en": "Then he thought that what prevents men from doing harm to their neighbors is kindness, that he could basically only respond to natures analogous to his own, as was, with regard to the heart, that of M. de Charlus. The very thought of causing this pain to Swann would have revolted him."}, {"start": 5342.84, "end": 5356.18, "b_start": 10623.11, "b_end": 10652.14, "orig": "Mais avec un homme insensible, d’une autre humanité, comme était le prince des Laumes, comment prévoir à quels actes pouvaient le conduire des mobiles d’une essence différente. Avoir du cœur, c’est tout, et M. de Charlus en avait.", "en": "But with an insensitive man, of another humanity, such as the Prince of Laumes, how could we predict what actions motives of a different essence could lead him to? Having a heart is everything, and M. de Charlus had it."}, {"start": 5357.18, "end": 5372.81, "b_start": 10652.14, "b_end": 10687.79, "orig": "M. d’Orsan n’en manquait pas non plus et ses relations cordiales mais peu intimes avec Swann, nées de l’agrément que, pensant de même sur tout, ils avaient à causer ensemble, étaient de plus de repos que l’affection exaltée de M. de Charlus, capable de se porter à des actes de passion, bons ou mauvais.", "en": "M. d'Orsan did not lack it either and his cordial but not very intimate relations with Swann, born from the agreement which, thinking the same on everything, they had to discuss together, were more restful than the exalted affection of M. de Charlus, capable of being inclined to acts of passion, good or bad."}, {"start": 5373.81, "end": 5383.55, "b_start": 10687.79, "b_end": 10709.18, "orig": "S’il y avait quelqu’un par qui Swann s’était toujours senti compris et délicatement aimé, c’était par M. d’Orsan. Oui, mais cette vie peu honorable qu’il menait ?", "en": "If there was anyone by whom Swann had always felt understood and delicately loved, it was M. d’Orsan. Yes, but this dishonorable life he led?"}, {"start": 5384.55, "end": 5401.28, "b_start": 10709.18, "b_end": 10745.39, "orig": "Swann regrettait de n’en avoir pas tenu compte, d’avoir souvent avoué en plaisantant qu’il n’avait jamais éprouvé si vivement des sentiments de sympathie et d’estime que dans la société d’une canaille. « Ce n’est pas pour rien, se disait-il maintenant, que depuis que les hommes jugent leur prochain, c’est sur les actes.", "en": "Swann regretted not having taken this into account, having often admitted in jest that he had never felt feelings of sympathy and esteem so keenly as in the society of a scoundrel. “It is not for nothing,” he said to himself now, “that ever since men have judged their neighbor, it has been by actions."}, {"start": 5402.28, "end": 5416.56, "b_start": 10745.39, "b_end": 10775.14, "orig": "Il n’y a que cela qui signifie quelque chose, et nullement ce que nous disons, ce que nous pensons. Charlus et des Laumes peuvent avoir tels ou tels défauts, ce sont d’honnêtes gens. Orsan n’en a peut-être pas, mais ce n’est pas un honnête homme.", "en": "This is the only thing that means anything, and not what we say, what we think. Charlus and des Laumes may have this or that fault, they are honest people. Orsan may not have one, but he is not an honest man."}, {"start": 5417.56, "end": 5431.79, "b_start": 10775.14, "b_end": 10806.85, "orig": "Il a pu mal agir une fois de plus. » Puis Swann soupçonna Rémi, qui, il est vrai, n’aurait pu qu’inspirer la lettre, mais cette piste lui parut un instant la bonne. D’abord Lorédan avait des raisons d’en vouloir à Odette.", "en": "He may have done something wrong once again. » Then Swann suspected Rémi, who, it is true, could only have inspired the letter, but this lead seemed to him for a moment to be the right one. First of all, Lorédan had reason to be angry with Odette."}, {"start": 5432.79, "end": 5448.08, "b_start": 10806.85, "b_end": 10839.98, "orig": "Et puis comment ne pas supposer que nos domestiques, vivant dans une situation inférieure à la nôtre, ajoutant à notre fortune et à nos défauts des richesses et des vices imaginaires pour lesquels ils nous envient et nous méprisent, se trouveront fatalement amenés à agir autrement que des gens de notre monde ?", "en": "And then how can we not suppose that our servants, living in a situation inferior to ours, adding to our fortune and our faults imaginary riches and vices for which they envy and despise us, will inevitably find themselves led to act differently from the people of our world?"}, {"start": 5449.08, "end": 5461.94, "b_start": 10839.98, "b_end": 10867.12, "orig": "Il soupçonna aussi mon grand-père. Chaque fois que Swann lui avait demandé un service, ne le lui avait-il pas toujours refusé ? puis avec ses idées bourgeoises il avait pu croire agir pour le bien de Swann.", "en": "He also suspected my grandfather. Whenever Swann had asked him for a favor, hadn't he always refused it? then with his bourgeois ideas he could have believed he was acting for the good of Swann."}, {"start": 5462.94, "end": 5488.77, "b_start": 10867.12, "b_end": 10923.5, "orig": "Celui-ci soupçonna encore Bergotte, le peintre, les Verdurin, admira une fois de plus au passage la sagesse des gens du monde de ne pas vouloir frayer avec ces milieux artistes où de telles choses sont possibles, peut-être même avouées sous le nom de bonnes farces ; mais il se rappelait des traits de droiture de ces bohèmes, et les rapprocha de la vie d’expédients, presque d’escroqueries, où le manque d’argent, le besoin de luxe, la corruption des plaisirs conduisent souvent l’aristocratie.", "en": "The latter again suspected Bergotte, the painter, the Verdurins, admired once again in passing the wisdom of the people of the world in not wanting to associate with these artistic circles where such things are possible, perhaps even admitted under the name of good jokes; but he remembered the traits of righteousness of these bohemians, and brought them closer to the life of expedients, almost of swindles, where the lack of money, the need for luxury, the corruption of pleasures often lead the aristocracy."}, {"start": 5489.77, "end": 5505.37, "b_start": 10923.5, "b_end": 10957.55, "orig": "Bref cette lettre anonyme prouvait qu’il connaissait un être capable de scélératesse, mais il ne voyait pas plus de raison pour que cette scélératesse fût cachée dans le tuf – inexploré d’autrui – du caractère de l’homme tendre que de l’homme froid, de l’artiste que du bourgeois, du grand seigneur que du valet.", "en": "In short, this anonymous letter proved that he knew a being capable of villainy, but he saw no more reason for this villainy to be hidden in the tuff – unexplored by others – of the character of the tender man than of the cold man, of the artist than of the bourgeois, of the great lord than of the valet."}, {"start": 5506.37, "end": 5517.62, "b_start": 10957.55, "b_end": 10981.18, "orig": "Quel critérium adopter pour juger les hommes ? au fond il n’y avait pas une seule des personnes qu’il connaissait qui ne pût être capable d’une infamie. Fallait-il cesser de les voir toutes ?", "en": "What standard should we adopt to judge men? basically there was not a single person he knew who could not be capable of infamy. Should we stop seeing them all?"}, {"start": 5518.62, "end": 5541.26, "b_start": 10981.18, "b_end": 11032.48, "orig": "Son esprit se voila ; il passa deux ou trois fois ses mains sur son front, essuya les verres de son lorgnon avec son mouchoir, et, songeant qu’après tout, des gens qui le valaient fréquentaient M. de Charlus, le prince des Laumes, et les autres, il se dit que cela signifiait, sinon qu’ils fussent incapables d’infamie, du moins que c’est une nécessité de la vie à laquelle chacun se soumet de fréquenter des gens qui n’en sont peut-être pas incapables.", "en": "His mind grew cloudy; he passed his hands over his forehead two or three times, wiped the lenses of his glasses with his handkerchief, and, thinking that after all, people who were worthy of him frequented M. de Charlus, the Prince des Laumes, and the others, he said to himself that this meant, if not that they were incapable of infamy, at least that it is a necessity of life to which everyone submits to associate with people who are not. maybe not incapable."}, {"start": 5542.26, "end": 5558.38, "b_start": 11032.48, "b_end": 11068.7, "orig": "Et il continua à serrer la main à tous ces amis qu’il avait soupçonnés, avec cette réserve de pur style qu’ils avaient peut-être cherché à le désespérer. Quant au fond même de la lettre, il ne s’en inquiéta pas, car pas une des accusations formulées contre Odette n’avait l’ombre de vraisemblance.", "en": "And he continued to shake the hands of all these friends whom he had suspected, with this reserve of pure style that they had perhaps sought to drive him to despair. As for the very substance of the letter, he was not concerned, because not one of the accusations formulated against Odette had the shadow of plausibility."}, {"start": 5559.38, "end": 5563.75, "b_start": 11068.7, "b_end": 11079.44, "orig": "Swann comme beaucoup de gens avait l’esprit paresseux et manquait d’invention.", "en": "Swann, like many people, had a lazy mind and lacked invention."}, {"start": 5564.75, "end": 5576.03, "b_start": 11079.44, "b_end": 11103.74, "orig": "Il savait bien comme une vérité générale que la vie des êtres est pleine de contrastes, mais pour chaque être en particulier il imaginait toute la partie de sa vie qu’il ne connaissait pas comme identique à la partie qu’il connaissait.", "en": "He knew well as a general truth that the life of beings is full of contrasts, but for each being in particular he imagined the whole part of his life that he did not know as identical to the part that he knew."}, {"start": 5577.03, "end": 5580.9, "b_start": 11103.74, "b_end": 11113.88, "orig": "Il imaginait ce qu’on lui taisait à l’aide de ce qu’on lui disait.", "en": "He imagined what was being kept from him with the help of what was being said to him."}, {"start": 5581.9, "end": 5602.1, "b_start": 11113.88, "b_end": 11156.38, "orig": "Dans les moments où Odette était auprès de lui, s’ils parlaient ensemble d’une action indélicate commise, ou d’un sentiment indélicat éprouvé par un autre, elle les flétrissait en vertu des mêmes principes que Swann avait toujours entendu professer par ses parents et auxquels il était resté fidèle ; et puis elle arrangeait ses fleurs, elle buvait une tasse de thé, elle s’inquiétait des travaux de Swann.", "en": "In the moments when Odette was with him, if they spoke together of an indelicate action committed, or of an indelicate feeling experienced by another, she condemned them by virtue of the same principles that Swann had always heard his parents profess and to which he had remained faithful; and then she arranged her flowers, she drank a cup of tea, she worried about Swann's work."}, {"start": 5603.1, "end": 5611.5, "b_start": 11156.38, "b_end": 11175.11, "orig": "Donc Swann étendait ces habitudes au reste de la vie d’Odette, il répétait ces gestes quand il voulait se représenter les moments où elle était loin de lui.", "en": "So Swann extended these habits to the rest of Odette's life, he repeated these gestures when he wanted to imagine the moments when she was far from him."}, {"start": 5612.5, "end": 5622.7, "b_start": 11175.11, "b_end": 11197.54, "orig": "Si on la lui avait dépeinte telle qu’elle était, ou plutôt qu’elle avait été si longtemps avec lui, mais auprès d’un autre homme, il eût souffert, car cette image lui eût paru vraisemblable.", "en": "If she had been portrayed to him as she was, or rather that she had been with him for so long, but with another man, he would have suffered, because this image would have seemed plausible to him."}, {"start": 5623.7, "end": 5640.98, "b_start": 11197.54, "b_end": 11233.19, "orig": "Mais qu’elle allât chez des maquerelles, se livrât à des orgies avec des femmes, qu’elle menât la vie crapuleuse de créatures abjectes, quelle divagation insensée à la réalisation de laquelle, Dieu merci, les chrysanthèmes imaginés, les thés successifs, les indignations vertueuses ne laissaient aucune place.", "en": "But that she went to the houses of madams, indulged in orgies with women, that she led the villainous life of abject creatures, what an insane wandering for the realization of which, thank God, the imagined chrysanthemums, the successive teas, the virtuous indignations left no room."}, {"start": 5641.98, "end": 5676.76, "b_start": 11233.19, "b_end": 11305.49, "orig": "Seulement de temps à autre, il laissait entendre à Odette que, par méchanceté, on lui racontait tout ce qu’elle faisait ; et, se servant à propos d’un détail insignifiant mais vrai, qu’il avait appris par hasard, comme s’il était le seul petit bout qu’il laissât passer malgré lui, entre tant d’autres, d’une reconstitution complète de la vie d’Odette qu’il tenait cachée en lui, il l’amenait à supposer qu’il était renseigné sur des choses qu’en réalité il ne savait ni même ne soupçonnait, car si bien souvent il adjurait Odette de ne pas altérer la vérité, c’était seulement, qu’il s’en rendît compte ou non, pour qu’Odette lui dît tout ce qu’elle faisait.", "en": "Only from time to time, he let Odette understand that, out of spite, she was told everything she did; and, using an insignificant but true detail, which he had learned by chance, as if it were the only little piece that he let slip through despite himself, among so many others, of a complete reconstruction of Odette's life that he kept hidden within himself, he led her to suppose that he was informed about things that in reality he did not know or even suspect, because so often he begged Odette not to altering the truth was only, whether he realized it or not, so that Odette would tell him everything she was doing."}, {"start": 5677.76, "end": 5692.14, "b_start": 11305.49, "b_end": 11334.97, "orig": "Sans doute, comme il le disait à Odette, il aimait la sincérité, mais il l’aimait comme une proxénète pouvant le tenir au courant de la vie de sa maîtresse. Aussi son amour de la sincérité n’étant pas désintéressé, ne l’avait pas rendu meilleur.", "en": "No doubt, as he told Odette, he loved sincerity, but he loved her as a pimp who could keep him informed of his mistress's life. Also his love of sincerity, not being disinterested, had not made him better."}, {"start": 5693.14, "end": 5706.89, "b_start": 11334.97, "b_end": 11363.71, "orig": "La vérité qu’il chérissait c’était celle que lui dirait Odette ; mais lui-même, pour obtenir cette vérité, ne craignait pas de recourir au mensonge, le mensonge qu’il ne cessait de peindre à Odette comme conduisant à la dégradation toute créature humaine.", "en": "The truth he cherished was the one Odette would tell him; but he himself, to obtain this truth, did not fear resorting to lies, the lie that he never ceased to portray to Odette as leading to the degradation of every human creature."}, {"start": 5707.89, "end": 5713.84, "b_start": 11363.71, "b_end": 11377.45, "orig": "En somme il mentait autant qu’Odette parce que, plus malheureux qu’elle, il n’était pas moins égoïste.", "en": "In short, he lied as much as Odette because, more unhappy than her, he was no less selfish."}, {"start": 5714.84, "end": 5727.06, "b_start": 11377.45, "b_end": 11403.62, "orig": "Et elle, entendant Swann lui raconter ainsi à elle-même des choses qu’elle avait faites, le regardait d’un air méfiant, et, à toute aventure, fâché, pour ne pas avoir l’air de s’humilier et de rougir de ses actes.", "en": "And she, hearing Swann thus telling her about the things she had done, looked at him with a suspicious air, and, at every turn, angry, so as not to appear to be humiliating herself and blushing at his actions."}, {"start": 5728.06, "end": 5738.86, "b_start": 11403.62, "b_end": 11427.2, "orig": "Un jour, étant dans la période de calme la plus longue qu’il eût encore pu traverser sans être repris d’accès de jalousie, il avait accepté d’aller le soir au théâtre avec la princesse des Laumes.", "en": "One day, being in the longest period of calm that he had yet been able to go through without being seized with fits of jealousy, he had agreed to go to the theater in the evening with the Princesse des Laumes."}, {"start": 5739.86, "end": 5785.74, "b_start": 11427.2, "b_end": 11518.78, "orig": "Ayant ouvert le journal, pour chercher ce qu’on jouait, la vue du titre :\nLes Filles de Marbre\nde Théodore Barrière le frappa si cruellement qu’il eut un mouvement de recul et détourna la tête. Éclairé comme par la lumière de la rampe, à la place nouvelle où il figurait, ce mot de « marbre » qu’il avait perdu la faculté de distinguer tant il avait l’habitude de l’avoir souvent sous les yeux, lui était soudain redevenu visible et l’avait aussitôt fait souvenir de cette histoire qu’Odette lui avait racontée autrefois, d’une visite qu’elle avait faite au Salon du Palais de l’Industrie avec M\nme\nVerdurin et où celle-ci lui avait dit : « Prends garde, je saurai bien te dégeler, tu n’es pas de marbre. » Odette lui avait affirmé que ce n’était qu’une plaisanterie, et il n’y avait attaché aucune importance.", "en": "Having opened the newspaper to look for what was being played, the sight of the title: Les Filles de Marbre by Théodore Barrière struck him so cruelly that he recoiled and turned his head away. Illuminated as if by the light of the footlight, in the new place where it appeared, this word of \"marble\" which he had lost the ability to distinguish as he was so used to having it before his eyes, had suddenly become visible to him again and had immediately made him remember this story that Odette had once told him, of a visit she had made to the Salon du Palais de l'Industrie with Madame Verdurin and where she had said to him: \"Take be careful, I will know how to thaw you, you are not made of marble. » Odette had assured him that it was only a joke, and he had attached no importance to it."}, {"start": 5786.74, "end": 5794.16, "b_start": 11518.78, "b_end": 11535.13, "orig": "Mais il avait alors plus de confiance en elle qu’aujourd’hui. Et justement la lettre anonyme parlait d’amour de ce genre.", "en": "But he had more confidence in her then than he does today. And the anonymous letter spoke of love of this kind."}, {"start": 5795.16, "end": 5812.1, "b_start": 11535.13, "b_end": 11570.38, "orig": "Sans oser lever les yeux vers le journal, il le déplia, tourna une feuille pour ne plus voir ce mot : « Les Filles de Marbre » et commença à lire machinalement les nouvelles des départements. Il y avait eu une tempête dans la Manche, on signalait des dégâts à Dieppe, à Cabourg, à Beuzeval.", "en": "Without daring to look up at the newspaper, he unfolded it, turned a sheet so as to no longer see this word: \"The Marble Girls\" and began to mechanically read the news from the departments. There had been a storm in the Channel, damage was reported in Dieppe, Cabourg, Beuzeval."}, {"start": 5813.1, "end": 5816.25, "b_start": 11570.38, "b_end": 11578.45, "orig": "Aussitôt il fit un nouveau mouvement en arrière.", "en": "Immediately he made another backward movement."}, {"start": 5817.25, "end": 5836.5, "b_start": 11578.45, "b_end": 11618.06, "orig": "Le nom de Beuzeval l’avait fait penser à celui d’une autre localité de cette région, Beuzeville, qui porte uni à celui-là par un trait d’union un autre nom, celui de Bréauté, qu’il avait vu souvent sur les cartes, mais dont pour la première fois il remarquait que c’était le même que celui de son ami M. de Bréauté, dont la lettre anonyme disait qu’il avait été l’amant d’Odette.", "en": "The name of Beuzeval had made him think of that of another locality in this region, Beuzeville, which is linked to that by a hyphen another name, that of Bréauté, which he had often seen on maps, but which for the first time he noticed was the same as that of his friend M. de Bréauté, whose anonymous letter said that he had been Odette's lover."}, {"start": 5837.5, "end": 5848.27, "b_start": 11618.06, "b_end": 11639.05, "orig": "Après tout, pour M. de Bréauté, l’accusation n’était pas invraisemblable ; mais en ce qui concernait M\nme\nVerdurin, il y avait impossibilité.", "en": "After all, for M. de Bréauté, the accusation was not improbable; but as far as Madame Verdurin was concerned, it was impossible."}, {"start": 5849.27, "end": 5875.22, "b_start": 11639.05, "b_end": 11693.02, "orig": "De ce qu’Odette mentait quelquefois, on ne pouvait conclure qu’elle ne disait jamais la vérité et, dans ces propos qu’elle avait échangés avec M\nme\nVerdurin et qu’elle avait racontés elle-même à Swann, il avait reconnu ces plaisanteries inutiles et dangereuses que, par inexpérience de la vie et ignorance du vice, tiennent des femmes dont ils révèlent l’innocence, et qui – comme par exemple Odette – sont plus éloignées qu’aucune d’éprouver une tendresse exaltée pour une autre femme.", "en": "From the fact that Odette sometimes lied, one could not conclude that she never told the truth and, in these remarks which she had exchanged with Mme Verdurin and which she herself had related to Swann, he had recognized these useless and dangerous jokes which, through inexperience of life and ignorance of vice, make of women whose innocence they reveal, and who - like for example Odette - are further away than any from feeling an exalted tenderness for another woman."}, {"start": 5876.22, "end": 5888.19, "b_start": 11693.02, "b_end": 11719.31, "orig": "Tandis qu’au contraire, l’indignation avec laquelle elle avait repoussé les soupçons qu’elle avait involontairement fait naître un instant en lui par son récit, cadrait avec tout ce qu’il savait des goûts, du tempérament de sa maîtresse.", "en": "While on the contrary, the indignation with which she had rejected the suspicions that she had involuntarily aroused in him for a moment by her story, fit with everything he knew about the tastes and temperament of his mistress."}, {"start": 5889.19, "end": 5905.87, "b_start": 11719.31, "b_end": 11756.4, "orig": "Mais à ce moment, par une de ces inspirations de jaloux, analogues à celle qui apporte au poète ou au savant, qui n’a encore qu’une rime ou qu’une observation, l’idée ou la loi qui leur donnera toute leur puissance, Swann se rappela pour la première fois une phrase qu’Odette lui avait dite, il y avait déjà deux ans : « Oh !", "en": "But at that moment, by one of those jealous inspirations, analogous to that which brings to the poet or the scholar, who still has only a rhyme or an observation, the idea or the law which will give them all their power, Swann remembered for the first time a sentence that Odette had said to him, already two years ago: “Oh!"}, {"start": 5906.87, "end": 5928.95, "b_start": 11756.4, "b_end": 11800.16, "orig": "M\nme\nVerdurin, en ce moment il n’y en a que pour moi, je suis un amour, elle m’embrasse, elle veut que je fasse des courses avec elle, elle veut que je la tutoie. » Loin de voir alors dans cette phrase un rapport quelconque avec les absurdes propos destinés à simuler le vice que lui avait racontés Odette, il l’avait accueillie comme la preuve d’une chaleureuse amitié.", "en": "Ms. Verdurin, at the moment there is only one for me, I am a sweetheart, she kisses me, she wants me to go shopping with her, she wants me to speak to her on familiar terms. » Far from seeing in this sentence any connection with the absurd remarks intended to simulate vice that Odette had told him, he had welcomed it as proof of warm friendship."}, {"start": 5929.95, "end": 5940.06, "b_start": 11800.16, "b_end": 11819.02, "orig": "Maintenant voilà que le souvenir de cette tendresse de M\nme\nVerdurin était venu brusquement rejoindre le souvenir de sa conversation de mauvais goût.", "en": "Now the memory of this tenderness from Madame Verdurin had suddenly joined the memory of her conversation in bad taste."}, {"start": 5941.06, "end": 5956.61, "b_start": 11819.02, "b_end": 11851.79, "orig": "Il ne pouvait plus les séparer dans son esprit, et les vit mêlées aussi dans la réalité, la tendresse donnant quelque chose de sérieux et d’important à ces plaisanteries qui en retour lui faisaient perdre de son innocence. Il alla chez Odette. Il s’assit loin d’elle.", "en": "He could no longer separate them in his mind, and saw them also mixed in reality, the tenderness giving something serious and important to these jokes which in return made him lose his innocence. He went to Odette's house. He sat away from her."}, {"start": 5957.61, "end": 5968.43, "b_start": 11851.79, "b_end": 11874.77, "orig": "Il n’osait l’embrasser, ne sachant si en elle, si en lui, c’était l’affection ou la colère qu’un baiser réveillerait. Il se taisait, il regardait mourir leur amour.", "en": "He did not dare to kiss her, not knowing whether in her, if in him, it was affection or anger that a kiss would awaken. He was silent, he watched their love die."}, {"start": 5969.43, "end": 5989.09, "b_start": 11874.77, "b_end": 11913.01, "orig": "Tout à coup il prit une résolution.\n– Odette, lui dit-il, mon chéri, je sais bien que je suis odieux, mais il faut que je te demande des choses. Tu te souviens de l’idée que j’avais eue à propos de toi et de M\nme\nVerdurin ? Dis-moi si c’était vrai, avec elle ou avec une autre.", "en": "Suddenly he made a resolution. – Odette, he said to her, my darling, I know very well that I am odious, but I have to ask you things. Do you remember the idea I had about you and Mme Verdurin? Tell me if it was true, with her or with anyone else."}, {"start": 5990.09, "end": 6010.78, "b_start": 11913.01, "b_end": 11955.1, "orig": "Elle secoua la tête en fronçant la bouche, signe fréquemment employé par les gens pour répondre qu’ils n’iront pas, que cela les ennuie, à quelqu’un qui leur a demandé : « Viendrez-vous voir passer la cavalcade, assisterez-vous à la Revue ? » Mais ce hochement de tête affecté ainsi d’habitude à un événement à venir mêle à cause de cela de quelque incertitude la dénégation d’un événement passé.", "en": "She shook her head, frowning, a sign frequently used by people to respond that they won't go, that it bores them, to someone who asked them: \"Will you come to see the cavalcade go by, will you attend the Revue? » But this nodding of the head usually assigned to a future event therefore mixes with some uncertainty the denial of a past event."}, {"start": 6011.78, "end": 6018.57, "b_start": 11955.1, "b_end": 11971.12, "orig": "De plus il n’évoque que des raisons de convenance personnelle plutôt que la réprobation, qu’une impossibilité morale.", "en": "Moreover, he only evokes reasons of personal convenience rather than disapproval, rather than a moral impossibility."}, {"start": 6019.57, "end": 6033.54, "b_start": 11971.12, "b_end": 12000.91, "orig": "En voyant Odette lui faire ainsi le signe que c’était faux, Swann comprit que c’était peut-être vrai.\n– Je te l’ai dit, tu le sais bien, ajouta-t-elle d’un air irrité et malheureux.\n– Oui, je sais, mais en es-tu sûre ?", "en": "Seeing Odette thus giving him the sign that it was false, Swann understood that it was perhaps true. “I told you, you know it well,” she added with an irritated and unhappy air. – Yes, I know, but are you sure?"}, {"start": 6034.54, "end": 6053.95, "b_start": 12000.91, "b_end": 12038.84, "orig": "Ne me dis pas : « Tu le sais bien », dis-moi : « Je n’ai jamais fait ce genre de choses avec aucune femme. »\nElle répéta comme une leçon, sur un ton ironique, et comme si elle voulait se débarrasser de lui :\n– Je n’ai jamais fait ce genre de choses avec aucune femme.\n– Peux-tu me le jurer sur ta médaille de Notre-Dame de Laghet ?", "en": "Don’t tell me, “You know that,” tell me, “I’ve never done that kind of thing with any woman. » She repeated like a lesson, in an ironic tone, and as if she wanted to get rid of him: – I have never done this kind of thing with any woman. – Can you swear to me on your Notre-Dame de Laghet medal?"}, {"start": 6054.95, "end": 6070.46, "b_start": 12038.84, "b_end": 12071.5, "orig": "Swann savait qu’Odette ne se parjurerait pas sur cette médaille-là.\n– Oh ! que tu me rends malheureuse, s’écria-t-elle en se dérobant par un sursaut à l’étreinte de sa question. Mais as-tu bientôt fini ? Qu’est-ce que tu as aujourd’hui ?", "en": "Swann knew that Odette would not perjure herself over this medal. - Oh ! How unhappy you make me,” she cried, escaping with a start from the embrace of his question. But are you almost done? What do you have today?"}, {"start": 6071.46, "end": 6081.27, "b_start": 12071.5, "b_end": 12092.17, "orig": "Tu as donc décidé qu’il fallait que je te déteste, que je t’exècre ? Voilà, je voulais reprendre avec toi le bon temps comme autrefois et voilà ton remerciement !", "en": "So you decided that I had to hate you, that I loath you? There you go, I wanted to have the good times with you like before and here is your thank you!"}, {"start": 6082.27, "end": 6097.34, "b_start": 12092.17, "b_end": 12124.13, "orig": "Mais, ne la lâchant pas, comme un chirurgien attend la fin du spasme qui interrompt son intervention, mais ne l’y fait pas renoncer :\n– Tu as bien tort de te figurer que je t’en voudrais le moins du monde, Odette, lui dit-il avec une douceur persuasive et menteuse.", "en": "But, not letting go of her, like a surgeon waiting for the end of the spasm which interrupts his operation, but does not make him give up: - You are very wrong to imagine that I would be angry with you in the least, Odette, he said to her with a persuasive and lying gentleness."}, {"start": 6098.34, "end": 6109.94, "b_start": 12124.13, "b_end": 12149.48, "orig": "Je ne te parle jamais que de ce que je sais, et j’en sais toujours bien plus long que je ne dis. Mais toi seule peux adoucir par ton aveu ce qui me fait te haïr tant que cela ne m’a été dénoncé que par d’autres.", "en": "I only ever talk to you about what I know, and I always know much more than I say. But only you can soften by your confession what makes me hate you so much that it was only denounced to me by others."}, {"start": 6110.94, "end": 6121.16, "b_start": 12149.48, "b_end": 12172.87, "orig": "Ma colère contre toi ne vient pas de tes actions, je te pardonne tout puisque je t’aime, mais de ta fausseté, de ta fausseté absurde qui te fait persévérer à nier des choses que je sais.", "en": "My anger against you does not come from your actions, I forgive you everything since I love you, but from your falsity, from your absurd falsity which makes you persevere in denying things that I know."}, {"start": 6122.16, "end": 6138.96, "b_start": 12172.87, "b_end": 12207.61, "orig": "Mais comment veux-tu que je puisse continuer à t’aimer, quand je te vois me soutenir, me jurer une chose que je sais fausse. Odette, ne prolonge pas cet instant qui est une torture pour nous deux. Si tu le veux, ce sera fini dans une seconde, tu seras pour toujours délivrée.", "en": "But how do you expect me to continue to love you, when I see you supporting me, swearing to me something that I know is false. Odette, don't prolong this moment which is torture for both
