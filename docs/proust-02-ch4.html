 de ne pas laisser fuir sans lui donner un dernier adieu.", "en": "But most often the very particular time of his life from which he came out, when he made an effort if not to stay there, at least to have a clear vision of it while he still could, he realized that he already could no longer; he would have liked to see this love he had just left like a landscape that was about to disappear; but it is so difficult to be two-faced and to give oneself the truthful spectacle of a feeling that one has ceased to possess, that soon the darkness settled in his brain, he no longer saw anything, gave up looking, took off his glasses, wiped the glasses; and he said to himself that it would be better to rest a little, that there would still be time later, and fell back, with incuriosity, into the numbness of the sleepy traveler who pulls his hat over his eyes to sleep in the wagon that he feels is taking him faster and faster, far from the country where he has lived for so long and which he had promised himself not to let escape without giving him a last goodbye."}, {"start": 8224.71, "end": 8241.46, "b_start": 16331.88, "b_end": 16366.64, "orig": "Même, comme ce voyageur s’il se réveille seulement en France, quand Swann ramassa par hasard près de lui la preuve que Forcheville avait été l’amant d’Odette, il s’aperçut qu’il n’en ressentait aucune douleur, que l’amour était loin maintenant et regretta de n’avoir pas été averti du moment où il le quittait pour toujours.", "en": "Even, like this traveler if he only woke up in France, when Swann picked up by chance near him the proof that Forcheville had been Odette's lover, he realized that he felt no pain, that love was far away now and regretted not having been warned of the moment when it was leaving him forever."}, {"start": 8242.46, "end": 8264.57, "b_start": 16366.64, "b_end": 16413.5, "orig": "Et de même qu’avant d’embrasser Odette pour la première fois il avait cherché à imprimer dans sa mémoire le visage qu’elle avait eu si longtemps pour lui et qu’allait transformer le souvenir de ce baiser, de même il eût voulu, en pensée au moins, avoir pu faire ses adieux, pendant qu’elle existait encore, à cette Odette lui inspirant de l’amour, de la jalousie, à cette Odette lui causant des souffrances et que maintenant il ne reverrait jamais.", "en": "And just as before kissing Odette for the first time he had sought to imprint in his memory the face that she had had for him for so long and which the memory of this kiss would transform, so he would have wanted, in thought at least, to have been able to say goodbye, while she still existed, to this Odette inspiring him with love, jealousy, to this Odette causing him suffering and who now he would never see again."}, {"start": 8265.57, "end": 8275.14, "b_start": 16413.5, "b_end": 16433.12, "orig": "Il se trompait. Il devait la revoir une fois encore, quelques semaines plus tard. Ce fut en dormant, dans le crépuscule d’un rêve.", "en": "He was wrong. He was to see her again, a few weeks later. It was while sleeping, in the twilight of a dream."}, {"start": 8276.14, "end": 8306.62, "b_start": 16433.12, "b_end": 16495.87, "orig": "Il se promenait avec M\nme\nVerdurin, le docteur Cottard, un jeune homme en fez qu’il ne pouvait identifier, le peintre, Odette, Napoléon III et mon grand-père, sur un chemin qui suivait la mer et la surplombait à pic tantôt de très haut, tantôt de quelques mètres seulement, de sorte qu’on montait et redescendait constamment ; ceux des promeneurs qui redescendaient déjà n’étaient plus visibles à ceux qui montaient encore, le peu de jour qui restât faiblissait et il semblait alors qu’une nuit noire allait s’étendre immédiatement.", "en": "He was walking with Madame Verdurin, Doctor Cottard, a young man in a fez whom he could not identify, the painter, Odette, Napoleon III and my grandfather, on a path which followed the sea and overhung it steeply sometimes from a very high height, sometimes from only a few meters, so that we were constantly going up and down; those of the walkers who were already going down were no longer visible to those who were still going up, the little daylight that remained was fading and it seemed as if a black night would immediately spread."}, {"start": 8307.62, "end": 8321.11, "b_start": 16495.87, "b_end": 16523.2, "orig": "Par moment les vagues sautaient jusqu’au bord, et Swann, sentait sur sa joue des éclaboussures glacées. Odette lui disait de les essuyer, il ne pouvait pas et en était confus vis-à-vis d’elle, ainsi que d’être en chemise de nuit.", "en": "At times the waves jumped to the edge, and Swann felt icy splashes on his cheek. Odette told him to dry them, he couldn't and was confused by it towards her, as well as being in a nightgown."}, {"start": 8322.11, "end": 8337.26, "b_start": 16523.2, "b_end": 16553.14, "orig": "Il espérait qu’à cause de l’obscurité on ne s’en rendait pas compte, mais cependant M\nme\nVerdurin le fixa d’un regard étonné durant un long moment pendant lequel il vit sa figure se déformer, son nez s’allonger et qu’elle avait de grandes moustaches.", "en": "He hoped that because of the darkness no one would notice it, but nevertheless Ms. Verdurin stared at him with a look of astonishment for a long moment during which he saw her face distort, her nose lengthen and that she had large mustaches."}, {"start": 8338.26, "end": 8354.26, "b_start": 16553.14, "b_end": 16587.42, "orig": "Il se détourna pour regarder Odette, ses joues étaient pâles, avec des petits points rouges, ses traits tirés, cernés, mais elle le regardait avec des yeux pleins de tendresse prêts à se détacher comme des larmes pour tomber sur lui, et il se sentait l’aimer tellement qu’il aurait voulu l’emmener tout de suite.", "en": "He turned away to look at Odette, her cheeks were pale, with little red spots, her features were drawn, dark circles, but she looked at him with eyes full of tenderness ready to break away like tears to fall on him, and he felt himself loving her so much that he wanted to take her right away."}, {"start": 8355.26, "end": 8368.7, "b_start": 16587.42, "b_end": 16615.85, "orig": "Tout d’un coup Odette tourna son poignet, regarda une petite montre et dit : « Il faut que je m’en aille », elle prenait congé de tout le monde, de la même façon, sans prendre à part Swann, sans lui dire où elle le reverrait le soir ou un autre jour.", "en": "Suddenly Odette turned her wrist, looked at a little watch and said: “I have to go,” she took leave of everyone, in the same way, without taking Swann aside, without telling him where she would see him again in the evening or another day."}, {"start": 8369.7, "end": 8389.0, "b_start": 16615.85, "b_end": 16655.68, "orig": "Il n’osa pas le lui demander, il aurait voulu la suivre et était obligé, sans se retourner vers elle, de répondre en souriant à une question de M\nme\nVerdurin, mais son cœur battait horriblement, il éprouvait de la haine pour Odette, il aurait voulu crever ses yeux qu’il aimait tant tout à l’heure, écraser ses joues sans fraîcheur.", "en": "He did not dare ask her, he would have liked to follow her and was obliged, without turning towards her, to respond with a smile to a question from Mme Verdurin, but his heart was beating horribly, he felt hatred for Odette, he would have liked to put out her eyes that he had loved so much earlier, to crush her cheeks without coolness."}, {"start": 8390.0, "end": 8403.22, "b_start": 16655.68, "b_end": 16682.71, "orig": "Il continuait à monter avec M\nme\nVerdurin, c’est-à-dire à s’éloigner à chaque pas d’Odette, qui descendait en sens inverse. Au bout d’une seconde il y eut beaucoup d’heures qu’elle était partie.", "en": "He continued to go up with Madame Verdurin, that is to say, to move away with each step of Odette, who was going down in the opposite direction. After a second she had been gone for many hours."}, {"start": 8404.22, "end": 8418.65, "b_start": 16682.71, "b_end": 16712.96, "orig": "Le peintre fit remarquer à Swann que Napoléon III s’était éclipsé un instant après elle. « C’était certainement entendu entre eux, ajouta-t-il, ils ont dû se rejoindre en bas de la côte, mais n’ont pas voulu dire adieu ensemble à cause des convenances.", "en": "The painter pointed out to Swann that Napoleon III had disappeared an instant after her. “It was certainly agreed between them,” he added, “they had to meet at the bottom of the hill, but did not want to say goodbye together because of convenience."}, {"start": 8419.65, "end": 8438.15, "b_start": 16712.96, "b_end": 16752.55, "orig": "Elle est sa maîtresse. » Le jeune homme inconnu se mit à pleurer. Swann essaya de le consoler. « Après tout elle a raison, lui dit-il en lui essuyant les yeux et en lui ôtant son fez pour qu’il fût plus à son aise. Je le lui ai conseillé dix fois. Pourquoi en être triste ?", "en": "She is his mistress. » The unknown young man began to cry. Swann tried to console him. “After all, she’s right,” he said to her, wiping her eyes and taking off her fez so that he would be more comfortable. I advised him ten times. Why be sad about it?"}, {"start": 8439.15, "end": 8456.67, "b_start": 16752.55, "b_end": 16790.12, "orig": "C’était bien l’homme qui pouvait la comprendre. » Ainsi Swann se parlait-il à lui-même, car le jeune homme qu’il n’avait pu identifier d’abord était aussi lui ; comme certains romanciers, il avait distribué sa personnalité à deux personnages, celui qui faisait le rêve, et un qu’il voyait devant lui coiffé d’un fez.", "en": "He was the man who could understand her. » Thus Swann spoke to himself, for the young man whom he had not been able to identify at first was also him; like certain novelists, he had distributed his personality to two characters, the one who had the dream, and one whom he saw before him wearing a fez."}, {"start": 8457.67, "end": 8477.33, "b_start": 16790.12, "b_end": 16833.43, "orig": "Quant à Napoléon III, c’est à Forcheville que quelque vague association d’idées, puis une certaine modification dans la physionomie habituelle du baron, enfin le grand cordon de la Légion d’honneur en sautoir, lui avaient fait donner ce nom ; mais en réalité, et pour tout ce que le personnage présent dans le rêve lui représentait et lui rappelait, c’était bien Forcheville.", "en": "As for Napoleon III, it was in Forcheville that some vague association of ideas, then a certain modification in the usual physiognomy of the baron, finally the large cord of the Legion of Honor in saltire, had caused him to give this name; but in reality, and for everything that the character present in the dream represented and reminded him of, it was definitely Forcheville."}, {"start": 8478.33, "end": 8509.17, "b_start": 16833.43, "b_end": 16897.4, "orig": "Car d’images incomplètes et changeantes Swann endormi tirait des déductions fausses, ayant d’ailleurs momentanément un tel pouvoir créateur qu’il se reproduisait par simple division comme certains organismes inférieurs ; avec la chaleur sentie de sa propre paume il modelait le creux d’une main étrangère qu’il croyait serrer, et de sentiments et d’impressions dont il n’avait pas conscience encore, faisait naître comme des péripéties qui, par leur enchaînement logique, amèneraient à point nommé dans le sommeil de Swann le personnage nécessaire pour recevoir son amour ou provoquer son réveil.", "en": "Because from incomplete and changing images the sleeping Swann drew false deductions, having moreover momentarily such creative power that he reproduced by simple division like certain lower organisms; with the heat felt from his own palm he modeled the hollow of a foreign hand that he thought he was shaking, and from feelings and impressions of which he was not yet conscious, gave rise to adventures which, through their logical sequence, would bring at the right time into Swann's sleep the character necessary to receive his love or provoke his awakening."}, {"start": 8510.17, "end": 8523.99, "b_start": 16897.4, "b_end": 16926.31, "orig": "Une nuit noire se fit tout d’un coup, un tocsin sonna, des habitants passèrent en courant, se sauvant des maisons en flammes ; Swann entendait le bruit des vagues qui sautaient et son cœur qui, avec la même violence, battait d’anxiété dans sa poitrine.", "en": "A dark night suddenly fell, a tocsin sounded, residents ran past, fleeing from burning houses; Swann heard the sound of the crashing waves and his heart which, with the same violence, beat with anxiety in his chest."}, {"start": 8524.99, "end": 8541.22, "b_start": 16926.31, "b_end": 16960.28, "orig": "Tout d’un coup ses palpitations de cœur redoublèrent de vitesse, il éprouva une souffrance, une nausée inexplicables ; un paysan couvert de brûlures lui jetait en passant : « Venez demander à Charlus où Odette est allée finir la soirée avec son camarade, il a été avec elle autrefois et elle lui dit tout.", "en": "Suddenly his heart palpitations increased in speed, he experienced inexplicable pain and nausea; a peasant covered with burns said to him as he passed: “Come and ask Charlus where Odette went to finish the evening with her comrade, he was with her before and she told him everything."}, {"start": 8542.22, "end": 8553.54, "b_start": 16960.28, "b_end": 16984.03, "orig": "C’est eux qui ont mis le feu. » C’était son valet de chambre qui venait l’éveiller et lui disait :\n– Monsieur, il est huit heures et le coiffeur est là, je lui ai dit de repasser dans une heure.", "en": "They were the ones who started the fire. » It was his valet who came to wake him up and said: “Sir, it’s eight o’clock and the hairdresser is here, I told him to come back in an hour."}, {"start": 8554.54, "end": 8572.4, "b_start": 16984.03, "b_end": 17022.49, "orig": "Mais ces paroles, en pénétrant dans les ondes du sommeil où Swann était plongé, n’étaient arrivées jusqu’à sa conscience qu’en subissant cette déviation qui fait qu’au fond de l’eau un rayon paraît un soleil, de même qu’un moment auparavant le bruit de la sonnette prenant au fond de ces abîmes une sonorité de tocsin avait enfanté l’épisode de l’incendie.", "en": "But these words, penetrating the waves of sleep in which Swann was immersed, had only reached his consciousness by undergoing this deviation which makes a ray at the bottom of the water seem like a sun, just as a moment before the sound of the bell taking on the sound of a tocsin at the bottom of these abysses had given rise to the episode of the fire."}, {"start": 8573.4, "end": 8592.24, "b_start": 17022.49, "b_end": 17062.18, "orig": "Cependant le décor qu’il avait sous les yeux vola en poussière, il ouvrit les yeux, entendit une dernière fois le bruit d’une des vagues de la mer qui s’éloignait. Il toucha sa joue. Elle était sèche. Et pourtant il se rappelait la sensation de l’eau froide et le goût du sel. Il se leva, s’habilla.", "en": "However, the scene before his eyes flew into dust, he opened his eyes, heard one last time the sound of one of the waves of the sea receding. He touched her cheek. She was dry. And yet he remembered the feeling of cold water and the taste of salt. He got up and got dressed."}, {"start": 8593.24, "end": 8608.46, "b_start": 17062.18, "b_end": 17091.59, "orig": "Il avait fait venir le coiffeur de bonne heure parce qu’il avait écrit la veille à mon grand-père qu’il irait dans l’après-midi à Combray, ayant appris que M\nme\nde Cambremer – M\nlle\nLegrandin – devait y passer quelques jours.", "en": "He had called for the hairdresser early because he had written to my grandfather the day before that he would go to Combray in the afternoon, having learned that Madame de Cambremer – M lle Legrandin – was to spend a few days there."}, {"start": 8609.46, "end": 8620.5, "b_start": 17091.59, "b_end": 17116.34, "orig": "Associant dans son souvenir au charme de ce jeune visage celui d’une campagne où il n’était pas allé depuis si longtemps, ils lui offraient ensemble un attrait qui l’avait décidé à quitter enfin Paris pour quelques jours.", "en": "Associating in his memory with the charm of this young face that of a countryside where he had not been for so long, they together offered him an attraction which had decided him to finally leave Paris for a few days."}, {"start": 8621.5, "end": 8641.15, "b_start": 17116.34, "b_end": 17158.33, "orig": "Comme les différents hasards qui nous mettent en présence de certaines personnes ne coïncident pas avec le temps où nous les aimons, mais, le dépassant, peuvent se produire avant qu’il commence et se répéter après qu’il a fini, les premières apparitions que fait dans notre vie un être destiné plus tard à nous plaire, prennent rétrospectivement à nos yeux une valeur d’avertissement, de présage.", "en": "As the various chances which bring us into the presence of certain people do not coincide with the time when we love them, but, going beyond it, can occur before it begins and repeat itself after it has finished, the first appearances made in our life by a being destined later to please us, retrospectively take on in our eyes the value of a warning, of an omen."}, {"start": 8642.15, "end": 8660.39, "b_start": 17158.33, "b_end": 17193.36, "orig": "C’est de cette façon que Swann s’était souvent reporté à l’image d’Odette rencontrée au théâtre, ce premier soir où il ne songeait pas à la revoir jamais – et qu’il se rappelait maintenant la soirée de M\nme\nde Saint-Euverte où il avait présenté le général de Froberville à M\nme\nde Cambremer.", "en": "It was in this way that Swann had often referred to the image of Odette he met at the theater, that first evening when he did not think of ever seeing her again - and that he now remembered Madame de Saint-Euverte's evening where he had introduced General de Froberville to Madame de Cambremer."}, {"start": 8661.39, "end": 8671.88, "b_start": 17193.36, "b_end": 17217.37, "orig": "Les intérêts de notre vie sont si multiples qu’il n’est pas rare que dans une même circonstance les jalons d’un bonheur qui n’existe pas encore soient posés à côté de l’aggravation d’un chagrin dont nous souffrons.", "en": "The interests of our life are so multiple that it is not uncommon for in the same circumstance the milestones of a happiness that does not yet exist to be laid alongside the aggravation of a sorrow from which we suffer."}, {"start": 8672.88, "end": 8690.42, "b_start": 17217.37, "b_end": 17252.21, "orig": "Et sans doute cela aurait pu arriver à Swann ailleurs que chez M\nme\nde Saint-Euverte. Qui sait même, dans le cas où, ce soir-là, il se fût trouvé ailleurs, si d’autres bonheurs, d’autres chagrins ne lui seraient pas arrivés, et qui ensuite lui eussent paru avoir été inévitables ?", "en": "And no doubt this could have happened to Swann elsewhere than with Madame de Saint-Euverte. Who even knows, if, that evening, he had found himself elsewhere, if other happiness, other sorrows would not have happened to him, and which would then have seemed to him to have been inevitable?"}, {"start": 8691.42, "end": 8723.22, "b_start": 17252.21, "b_end": 17318.32, "orig": "Mais ce qui lui semblait l’avoir été, c’était ce qui avait eu lieu, et il n’était pas loin de voir quelque chose de providentiel dans ce fait qu’il se fût décidé à aller à la soirée de M\nme\nde Saint-Euverte, parce que son esprit désireux d’admirer la richesse d’invention de la vie et incapable de se poser longtemps une question difficile, comme de savoir ce qui eût été le plus à souhaiter, considérait dans les souffrances qu’il avait éprouvées ce soir-là et les plaisirs encore insoupçonnés qui germaient déjà – et entre lesquels la balance était trop difficile à établir – une sorte d’enchaînement nécessaire.", "en": "But what seemed to him to have been so was what had taken place, and he was not far from seeing something providential in the fact that he had decided to go to Madame de Saint-Euverte's evening, because his mind, eager to admire the richness of life's invention and incapable of asking itself for long a difficult question, such as knowing what would have been the most to wish for, considered in the sufferings he had experienced that evening and the still unsuspected pleasures which were already germinating – and between which the balance was too difficult to establish – a sort of necessary sequence."}, {"start": 8724.22, "end": 8756.65, "b_start": 17318.32, "b_end": 17387.35, "orig": "Mais tandis que, une heure après son réveil, il donnait des indications au coiffeur pour que sa brosse ne se dérangeât pas en wagon, il repensa à son rêve ; il revit, comme il les avait sentis tout près de lui, le teint pâle d’Odette, les joues trop maigres, les traits tirés, les yeux battus, tout ce que – au cours des tendresses successives qui avaient fait de son durable amour pour Odette un long oubli de l’image première qu’il avait reçue d’elle – il avait cessé de remarquer depuis les premiers temps de leur liaison, dans lesquels sans doute, pendant qu’il dormait, sa mémoire en avait été chercher la sensation exacte.", "en": "But while, an hour after waking up, he was giving directions to the hairdresser so that his brush would not be disturbed in the wagon, he thought again of his dream; he saw again, as he had felt them very close to him, Odette's pale complexion, the overly thin cheeks, the drawn features, the beaten eyes, everything that - in the course of the successive tendernesses which had made his enduring love for Odette a long forgetting of the first image he had received of her - he had ceased to notice since the first days of their affair, in which undoubtedly, while he was sleeping, his memory had sought the exact sensation."}, {"start": 8757.65, "end": 8775.19, "b_start": 17387.35, "b_end": 17425.02, "orig": "Et avec cette muflerie intermittente qui reparaissait chez lui dès qu’il n’était plus malheureux et qui baissait du même coup le niveau de sa moralité, il s’écria en lui-même : « Dire que j’ai gâché des années de ma vie, que j’ai voulu mourir, que j’ai eu mon plus grand amour, pour une femme qui ne me plaisait pas, qui n’était pas mon genre ! »", "en": "And with this intermittent snub which reappeared in him as soon as he was no longer unhappy and which at the same time lowered the level of his morality, he exclaimed to himself: “To think that I wasted years of my life, that I wanted to die, that I had my greatest love, for a woman who did not please me, who was not my type! »"}];
            window.__VOCAB_DATA__ = {};
        </script>

        <script>
            const audio = document.getElementById('audio');
            const modeOnline = document.getElementById('modeOnline');
            const modeOffline = document.getElementById('modeOffline');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "proust-02-ch4.mp3", bilingual: "proust-02-ch4.bilingual.mp3" };
            const startPattern = null;
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            function toggleMode() {
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = (mode === 'orig') ? 'bilingual' : 'orig';
                audio.src = sources[mode];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                modeOnline.classList.toggle('active', mode === 'orig');
                modeOffline.classList.toggle('active', mode === 'bilingual');
                container.classList.toggle('offline-mode', mode === 'bilingual');
            }

            checkAudioStatus();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) return;
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('proust-02-ch4.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('proust-02-ch4.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (data.length > 0) {
                    let targetIdx = 0;
                    if (startPattern !== null) {
                        const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                        const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                        targetIdx = matchIdx !== -1 ? matchIdx : 0;
                    }
                    const target = data[targetIdx];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    const targetRow = document.getElementById('row-' + targetIdx);
                    if (targetRow) {
                        requestAnimationFrame(() => {
                            if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                            movePlayBtn(targetRow);
                        });
                    }
                    if (startPattern !== null) applySeek();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
