e des Laumes, car elle souhaitait lui donner une leçon en ne répondant pas à son salut. Elle ne savait pas que sa cousine fût là.", "en": "However, Madame de Gallardon was thinking to herself that it was unfortunate that she rarely had the opportunity to meet the Princess des Laumes, because she wanted to teach her a lesson by not responding to her greeting. She didn't know her cousin was there."}, {"start": 2010.01, "end": 2016.1, "b_start": 4003.84, "b_end": 4015.61, "orig": "Un mouvement de tête de M\nme\nde Franquetot la lui découvrit.", "en": "A movement of Madame de Franquetot's head revealed it to him."}, {"start": 2017.1, "end": 2057.23, "b_start": 4015.61, "b_end": 4098.73, "orig": "Aussitôt elle se précipita vers elle en dérangeant tout le monde ; mais désireuse de garder un air hautain et glacial qui rappelât à tous qu’elle ne désirait pas avoir de relations avec une personne chez qui on pouvait se trouver nez à nez avec la princesse Mathilde, et au-devant de qui elle n’avait pas à aller car elle n’était pas « sa contemporaine », elle voulut pourtant compenser cet air de hauteur et de réserve par quelque propos qui justifiât sa démarche et forçât la princesse à engager la conversation ; aussi une fois arrivée près de sa cousine, M\nme\nde Gallardon, avec un visage dur, une main tendue comme une carte forcée, lui dit : « Comment va ton mari ? » de la même voix soucieuse que si le prince avait été gravement malade.", "en": "Immediately she rushed towards her, disturbing everyone; but wishing to maintain a haughty and icy air which reminded everyone that she did not wish to have relations with a person in whose house one could find themselves face to face with Princess Mathilde, and to meet whom she did not have to go because she was not \"her contemporary\", she nevertheless wanted to compensate for this air of haughtiness and reserve with something which justified her approach and forced the princess to engage in conversation; also once she arrived near her cousin, Madame de Gallardon, with a hard face, a hand outstretched like a forced card, said to her: “How is your husband? » in the same worried voice as if the prince had been seriously ill."}, {"start": 2058.23, "end": 2074.72, "b_start": 4098.73, "b_end": 4133.86, "orig": "La princesse éclatant d’un rire qui lui était particulier et qui était destiné à la fois à montrer aux autres qu’elle se moquait de quelqu’un et aussi à se faire paraître plus jolie en concentrant les traits de son visage autour de sa bouche animée et de son regard brillant, lui répondit :\n– Mais le mieux du monde !", "en": "The princess, bursting out with a laugh which was peculiar to her and which was intended both to show others that she was making fun of someone and also to make herself appear prettier by concentrating the features of her face around her lively mouth and her brilliant gaze, replied: – But the best in the world!"}, {"start": 2075.72, "end": 2077.74, "b_start": 4133.86, "b_end": 4139.53, "orig": "Et elle rit encore.", "en": "And she laughs again."}, {"start": 2078.74, "end": 2110.03, "b_start": 4139.53, "b_end": 4199.26, "orig": "Cependant tout en redressant sa taille et refroidissant sa mine, inquiète encore pourtant de l’état du prince, M\nme\nde Gallardon dit à sa cousine :\n– Oriane (ici M\nme\ndes Laumes regarda d’un air étonné et rieur un tiers invisible vis-à-vis duquel elle semblait tenir à attester qu’elle n’avait jamais autorisé M\nme\nde Gallardon à l’appeler par son prénom), je tiendrais beaucoup à ce que tu viennes un moment demain soir chez moi entendre un quintette avec clarinette de Mozart.", "en": "However, while straightening her figure and cooling her countenance, still worried about the state of the prince, Ms. de Gallardon said to her cousin: - Oriane (here Ms. des Laumes looked with a surprised and laughing air at an invisible third party to whom she seemed keen to attest that she had never authorized Ms. de Gallardon to call her by her first name), I would be very keen that you come to my house for a moment tomorrow evening to hear a quintet. with clarinet by Mozart."}, {"start": 2111.03, "end": 2113.94, "b_start": 4199.26, "b_end": 4206.54, "orig": "Je voudrais avoir ton appréciation.", "en": "I would like to have your appreciation."}, {"start": 2114.94, "end": 2148.39, "b_start": 4206.54, "b_end": 4272.5, "orig": "Elle semblait non pas adresser une invitation, mais demander un service, et avoir besoin de l’avis de la princesse sur le quintette de Mozart, comme si ç’avait été un plat de la composition d’une nouvelle cuisinière sur les talents de laquelle il lui eût été précieux de recueillir l’opinion d’un gourmet.\n– Mais je connais ce quintette, je peux te dire tout de suite... que je l’aime !\n– Tu sais, mon mari n’est pas bien, son foie..., cela lui ferait grand plaisir de te voir, reprit M\nme\nde Gallardon, faisant maintenant à la princesse une obligation de charité de paraître à sa soirée.", "en": "She seemed not to send an invitation, but to ask for a service, and to need the princess's opinion on the Mozart quintet, as if it had been a dish from the composition of a new cook on whose talents it would have been valuable for her to obtain the opinion of a gourmet. – But I know this quintet, I can tell you right away... that I love it! “You know, my husband is not well, his liver..., it would give him great pleasure to see you,” continued Madame de Gallardon, now making it an obligation of charity for the princess to appear at her party."}, {"start": 2149.39, "end": 2153.57, "b_start": 4272.5, "b_end": 4282.79, "orig": "La princesse n’aimait pas à dire aux gens qu’elle ne voulait pas aller chez eux.", "en": "The princess didn't like to tell people that she didn't want to go to their house."}, {"start": 2154.57, "end": 2166.98, "b_start": 4282.79, "b_end": 4310.66, "orig": "Tous les jours elle écrivait son regret d’avoir été privée – par une visite inopinée de sa belle-mère, par une invitation de son beau-frère, par l’Opéra, par une partie de campagne – d’une soirée à laquelle elle n’aurait jamais songé à se rendre.", "en": "Every day she wrote of her regret at having been deprived – by an unexpected visit from her mother-in-law, by an invitation from her brother-in-law, by the Opera, by a country trip – of an evening to which she would never have thought of going."}, {"start": 2167.98, "end": 2180.6, "b_start": 4310.66, "b_end": 4338.37, "orig": "Elle donnait ainsi à beaucoup de gens la joie de croire qu’elle était de leurs relations, qu’elle eût été volontiers chez eux, qu’elle n’avait été empêchée de le faire que par les contretemps princiers qu’ils étaient flattés de voir entrer en concurrence avec leur soirée.", "en": "She thus gave many people the joy of believing that she was one of their acquaintances, that she would have willingly been at their house, that she had only been prevented from doing so by the princely mishaps which they were flattered to see compete with their evening."}, {"start": 2181.6, "end": 2203.01, "b_start": 4338.37, "b_end": 4385.23, "orig": "Puis faisant partie de cette spirituelle coterie des Guermantes où survivait quelque chose de l’esprit alerte, dépouillé de lieux communs et de sentiments convenus, qui descend de Mérimée – et a trouvé sa dernière expression dans le théâtre de Meilhac et Halévy – elle l’adaptait même aux rapports sociaux, le transposait jusque dans sa politesse qui s’efforçait d’être positive, précise, de se rapprocher de l’humble vérité.", "en": "Then being part of this spiritual coterie of the Guermantes where something of the alert spirit survived, stripped of commonplaces and conventional sentiments, which descends from Mérimée – and found its last expression in the theater of Meilhac and Halévy – she even adapted it to social relationships, transposed it even into her politeness which strove to be positive, precise, to get closer to the humble truth."}, {"start": 2204.01, "end": 2225.61, "b_start": 4385.23, "b_end": 4429.86, "orig": "Elle ne développait pas longuement à une maîtresse de maison l’expression du désir qu’elle avait d’aller à sa soirée ; elle trouvait plus aimable de lui exposer quelques petits faits d’où dépendrait qu’il lui fût ou non possible de s’y rendre.\n– Ecoute, je vais te dire, dit-elle à M\nme\nde Gallardon, il faut demain soir que j’aille chez une amie qui m’a demandé mon jour depuis longtemps.", "en": "She did not elaborate at length to a hostess the expression of the desire she had to go to her party; she found it more pleasant to explain to him some small facts on which it would depend whether or not it was possible for him to go there. – Listen, I’ll tell you, she said to Madame de Gallardon, tomorrow evening I have to go to a friend’s house who asked me my day a long time ago."}, {"start": 2226.61, "end": 2240.46, "b_start": 4429.86, "b_end": 4458.79, "orig": "Si elle nous emmène au théâtre, il n’y aura pas, avec la meilleure volonté, possibilité que j’aille chez toi ; mais si nous restons chez elle, comme je sais que nous serons seuls, je pourrai la quitter.\n– Tiens, tu as vu ton ami M.", "en": "If she takes us to the theater, there will be no possibility, with the best will, of me going to your house; but if we stay with her, as I know we will be alone, I will be able to leave her. – Hey, you saw your friend Mr."}, {"start": 2241.46, "end": 2255.42, "b_start": 4458.79, "b_end": 4486.6, "orig": "Swann ?\n– Mais non, cet amour de Charles, je ne savais pas qu’il fût là, je vais tâcher qu’il me voie.\n– C’est drôle qu’il aille même chez la mère Saint-Euverte, dit M\nme\nde Gallardon.", "en": "Swann? – But no, this love of Charles, I didn’t know he was there, I’m going to try to get him to see me. “It’s funny that he even goes to Mother Saint-Euverte,” said Madame de Gallardon."}, {"start": 2256.42, "end": 2275.24, "b_start": 4486.6, "b_end": 4526.54, "orig": "Oh ! je sais qu’il est intelligent, ajouta-t-elle en voulant dire par là intrigant, mais cela ne fait rien, un Juif chez la sœur et la belle-sœur de deux archevêques !\n– J’avoue à ma honte que je n’en suis pas choquée, dit la princesse des Laumes.\n– Je sais qu’il est converti, et même déjà ses parents et ses grands-parents.", "en": "Oh ! I know he’s intelligent,” she added, meaning intriguing, “but that doesn’t matter, a Jew living with the sister and sister-in-law of two archbishops! “I confess to my shame that I am not shocked,” said the Princess of Laumes. – I know he is converted, and even his parents and grandparents already."}, {"start": 2276.24, "end": 2292.78, "b_start": 4526.54, "b_end": 4561.28, "orig": "Mais on dit que les convertis restent plus attachés à leur religion que les autres, que c’est une frime, est-ce vrai ?\n– Je suis sans lumières à ce sujet. Le pianiste qui avait à jouer deux morceaux de Chopin, après avoir terminé le prélude, avait attaqué aussitôt une polonaise.", "en": "But it is said that converts remain more attached to their religion than others, that it is a show off, is it true? – I am at a loss on this subject. The pianist who had to play two pieces by Chopin, after finishing the prelude, immediately attacked a Polonaise."}, {"start": 2293.78, "end": 2308.2, "b_start": 4561.28, "b_end": 4588.61, "orig": "Mais depuis que M\nme\nde Gallardon avait signalé à sa cousine la présence de Swann, Chopin ressuscité aurait pu venir jouer lui-même toutes ses œuvres sans que M\nme\ndes Laumes pût y faire attention.", "en": "But since Ms. de Gallardon had informed her cousin of Swann's presence, the resurrected Chopin could have come and performed all his works himself without Ms. des Laumes being able to pay attention."}, {"start": 2309.2, "end": 2318.3, "b_start": 4588.61, "b_end": 4609.28, "orig": "Elle faisait partie d’une de ces deux moitiés de l’humanité chez qui la curiosité qu’a l’autre moitié pour les êtres qu’elle ne connaît pas est remplacée par l’intérêt pour les êtres qu’elle connaît.", "en": "She was part of one of those two halves of humanity in which the curiosity that the other half has for beings she does not know is replaced by interest in beings she does know."}, {"start": 2319.3, "end": 2332.45, "b_start": 4609.28, "b_end": 4637.23, "orig": "Comme beaucoup de femmes du faubourg Saint-Germain, la présence dans un endroit où elle se trouvait de quelqu’un de sa coterie, et auquel d’ailleurs elle n’avait rien de particulier à dire, accaparait exclusivement son attention aux dépens de tout le reste.", "en": "Like many women from the Faubourg Saint-Germain, the presence in a place where she was of someone from her circle, and to whom she had nothing in particular to say, exclusively monopolized her attention at the expense of everything else."}, {"start": 2333.45, "end": 2373.22, "b_start": 4637.23, "b_end": 4716.3, "orig": "À partir de ce moment, dans l’espoir que Swann la remarquerait, la princesse ne fit plus, comme une souris blanche apprivoisée à qui on tend puis on retire un morceau de sucre, que tourner sa figure, remplie de mille signes de connivence dénués de rapports avec le sentiment de la polonaise de Chopin, dans la direction où était Swann et si celui-ci changeait de place, elle déplaçait parallèlement son sourire aimanté.\n– Oriane, ne te fâche pas, reprit M\nme\nde Gallardon qui ne pouvait jamais s’empêcher de sacrifier ses plus grandes espérances sociales et d’éblouir un jour le monde, au plaisir obscur, immédiat et privé, de dire quelque chose de désagréable : il y a des gens qui prétendent que ce M.", "en": "From that moment on, in the hope that Swann would notice her, the princess, like a tame white mouse to whom a piece of sugar is handed and then taken away, did nothing but turn her face, filled with a thousand signs of connivance devoid of any connection with the feeling of Chopin's Polonaise, in the direction where Swann was and if he changed place, she moved her loving smile in parallel. – Oriane, don’t get angry, replied Madame de Gallardon who could never help sacrificing her greatest social hopes and one day dazzling the world, for the obscure, immediate and private pleasure of saying something unpleasant: there are people who claim that this Mr."}, {"start": 2374.22, "end": 2386.65, "b_start": 4716.3, "b_end": 4741.61, "orig": "Swann, c’est quelqu’un qu’on ne peut pas recevoir chez soi, est-ce vrai ?\n– Mais... tu dois bien savoir que c’est vrai, répondit la princesse des Laumes, puisque tu l’as invité cinquante fois et qu’il n’est jamais venu.", "en": "Swann is someone you can't have at home, is that true? – But... you must know that it is true, replied the Princess of Laumes, since you invited him fifty times and he never came."}, {"start": 0.0, "end": 0.0, "b_start": 0.0, "b_end": 0.0, "orig": "Et quittant sa cousine mortifiée, elle éclata de nouveau d’un rire qui scandalisa les personnes qui écoutaient la musique, mais attira l’attention de M\nme\nde Saint-Euverte, restée par politesse près du piano et qui aperçut seulement alors la princesse.", "en": "And leaving her mortified cousin, she burst out again with laughter which scandalized the people who were listening to the music, but attracted the attention of Madame de Saint-Euverte, who remained out of politeness near the piano and who only then saw the princess."}, {"start": 2387.65, "end": 2416.5, "b_start": 4741.61, "b_end": 4797.13, "orig": "M\nme\nde Saint-Euverte était d’autant plus ravie de voir M\nme\ndes Laumes qu’elle la croyait encore à Guermantes en train de soigner son beau-père malade.\n– Mais comment, princesse, vous étiez là ?\n– Oui, je m’étais mise dans un petit coin, j’ai entendu de belles choses.\n– Comment, vous êtes là depuis déjà un long moment !\n– Mais oui, un très long moment qui m’a semblé très court, long seulement parce que je ne vous voyais pas.", "en": "Ms. de Saint-Euverte was all the more delighted to see Ms. des Laumes as she believed she was still in Guermantes treating her sick father-in-law. – But how, princess, were you there? – Yes, I put myself in a little corner, I heard beautiful things. – What, you’ve been here for a long time already! – But yes, a very long moment which seemed very short to me, long only because I didn’t see you."}, {"start": 2417.5, "end": 2440.3, "b_start": 4797.13, "b_end": 4840.44, "orig": "M\nme\nde Saint-Euverte voulut donner son fauteuil à la princesse qui répondit :\n– Mais pas du tout ! Pourquoi ? Je suis bien n’importe où ! Et, avisant, avec intention, pour mieux manifester sa simplicité de grande dame, un petit siège sans dossier :\n– Tenez, ce pouf, c’est tout ce qu’il me faut.", "en": "Madame de Saint-Euverte wanted to give her chair to the princess who replied: – But not at all! For what ? I'm good anywhere! And, pointing out, with intention, to better demonstrate her great lady's simplicity, a small seat without a back: - Here, this pouf, it's all I need."}, {"start": 2441.3, "end": 2449.53, "b_start": 4840.44, "b_end": 4858.4, "orig": "Cela me fera tenir droite. Oh ! mon Dieu, je fais encore du bruit, je vais me faire conspuer.", "en": "This will make me stand up straight. Oh ! my God, I'm making noise again, I'm going to get yelled at."}, {"start": 2450.53, "end": 2467.93, "b_start": 4858.4, "b_end": 4891.7, "orig": "Cependant le pianiste redoublant de vitesse, l’émotion musicale était à son comble, un domestique passait des rafraîchissements sur un plateau et faisait tinter des cuillers et, comme chaque semaine, M\nme\nde Saint-Euverte lui faisait, sans qu’il la vît, des signes de s’en aller.", "en": "However, as the pianist increased his speed, musical emotion was at its height, a servant passed refreshments on a tray and clinked spoons and, like every week, Madame de Saint-Euverte made signs for him to leave, without him seeing her."}, {"start": 2468.93, "end": 2482.8, "b_start": 4891.7, "b_end": 4918.04, "orig": "Une nouvelle mariée, à qui on avait appris qu’une jeune femme ne doit pas avoir l’air blasé, souriait de plaisir, et cherchait des yeux la maîtresse de maison pour lui témoigner par son regard sa reconnaissance d’avoir « pensé à elle » pour un pareil régal.", "en": "A new bride, who had been taught that a young woman should not appear bored, smiled with pleasure, and looked around for the hostess to show her gratitude for having \"thought of her\" for such a treat."}, {"start": 2483.8, "end": 2503.77, "b_start": 4918.04, "b_end": 4957.39, "orig": "Pourtant, quoique avec plus de calme que M\nme\nde Franquetot, ce n’est pas sans inquiétude qu’elle suivait le morceau ; mais la sienne avait pour objet, au lieu du pianiste, le piano sur lequel une bougie tressautant à chaque fortissimo risquait, sinon de mettre le feu à l’abat-jour, du moins de faire des taches sur le palissandre.", "en": "However, although with more calm than Madame de Franquetot, it was not without concern that she followed the piece; but hers had for object, instead of the pianist, the piano on which a candle flickering at each fortissimo risked, if not setting the lampshade on fire, at least leaving stains on the rosewood."}, {"start": 2504.77, "end": 2519.94, "b_start": 4957.39, "b_end": 4989.35, "orig": "À la fin elle n’y tint plus et, escaladant les deux marches de l’estrade, sur laquelle était placé le piano, se précipita pour enlever la bobèche. Mais à peine ses mains allaient-elles la toucher que, sur un dernier accord, le morceau finit et le pianiste se leva.", "en": "In the end she could hold it no longer and, climbing the two steps of the platform on which the piano was placed, rushed to remove the bobèche. But his hands had barely touched her when, with a final chord, the piece ended and the pianist stood up."}, {"start": 2520.94, "end": 2542.51, "b_start": 4989.35, "b_end": 5032.61, "orig": "Néanmoins l’initiative hardie de cette jeune femme, la courte promiscuité qui en résulta entre elle et l’instrumentiste, produisirent une impression généralement favorable.\n– Vous avez remarqué ce qu’a fait cette personne, princesse, dit le général de Froberville à la princesse des Laumes qu’il était venu saluer et que M\nme\nde Saint-Euverte quitta un instant.", "en": "Nevertheless, the bold initiative of this young woman, and the brief promiscuity which resulted between her and the instrumentalist, produced a generally favorable impression. “You noticed what this person did, princess,” said General de Froberville to the Princess des Laumes whom he had come to greet and whom Madame de Saint-Euverte left for a moment."}, {"start": 2543.51, "end": 2545.26, "b_start": 5032.61, "b_end": 5037.83, "orig": "C’est curieux.", "en": "It's curious."}, {"start": 2546.26, "end": 2572.64, "b_start": 5037.83, "b_end": 5085.5, "orig": "Est-ce donc une artiste ?\n– Non, c’est une petite M\nme\nde Cambremer, répondit étourdiment la princesse et elle ajouta vivement : Je vous répète ce que j’ai entendu dire, je n’ai aucune espèce de notion de qui c’est, on a dit derrière moi que c’étaient des voisins de campagne de M\nme\nde Saint-Euverte, mais je ne crois pas que personne les connaisse. Ça doit être des « gens de la campagne » !", "en": "So is she an artist? “No, it’s a little Madame de Cambremer,” replied the princess in a daze and added quickly: “I repeat to you what I heard, I have no idea who she is, it was said behind me that they were country neighbors of Madame de Saint-Euverte, but I don’t think anyone knows them. They must be “country people”!"}, {"start": 2573.64, "end": 2588.86, "b_start": 5085.5, "b_end": 5115.76, "orig": "Du reste, je ne sais pas si vous êtes très répandu dans la brillante société qui se trouve ici, mais je n’ai pas idée du nom de toutes ces étonnantes personnes. À quoi pensez-vous qu’ils passent leur vie en dehors des soirées de M\nme\nde Saint-Euverte ?", "en": "Besides, I don't know if you are very common in the brilliant society that is here, but I have no idea the names of all these astonishing people. How do you think they spend their lives outside of Madame de Saint-Euverte's evenings?"}, {"start": 2589.86, "end": 2606.25, "b_start": 5115.76, "b_end": 5149.66, "orig": "Elle a dû les faire venir avec les musiciens, les chaises et les rafraîchissements. Avouez que ces « invités de chez Belloir » sont magnifiques. Est-ce que vraiment elle a le courage de louer ces figurants toutes les semaines. Ce n’est pas possible !\n– Ah !", "en": "She had to bring them with the musicians, chairs and refreshments. Admit that these “guests from Belloir” are magnificent. Does she really have the courage to rent these extras every week? This is not possible! – Oh!"}, {"start": 2607.25, "end": 2629.95, "b_start": 5149.66, "b_end": 5194.24, "orig": "Mais Cambremer, c’est un nom authentique et ancien, dit le général.\n– Je ne vois aucun mal à ce que ce soit ancien, répondit sèchement la princesse, mais en tous cas ce n’est pas\neuphonique\n, ajouta-t-elle en détachant le mot euphonique comme s’il était entre guillemets, petite affectation de dépit qui était particulière à la coterie Guermantes.\n– Vous trouvez ?", "en": "But Cambremer is an authentic and old name, said the general. – I see no harm in it being old, replied the princess dryly, but in any case it is not euphonic, she added, detaching the word euphonic as if it were in quotation marks, a little affectation of spite which was particular to the Guermantes coterie. – Do you find it?"}, {"start": 2630.95, "end": 2638.34, "b_start": 5194.24, "b_end": 5208.05, "orig": "Elle est jolie à croquer, dit le général qui ne perdait pas M\nme\nde Cambremer de vue.", "en": "“She’s pretty,” said the general, who didn’t lose sight of Ms. de Cambremer."}, {"start": 2639.34, "end": 2656.91, "b_start": 5208.05, "b_end": 5243.51, "orig": "Ce n’est pas votre avis, princesse ?\n– Elle se met trop en avant, je trouve que chez une si jeune femme, ce n’est pas agréable, car je ne crois pas qu’elle soit ma contemporaine, répondit M\nme\ndes Laumes (cette expression étant commune aux Gallardon et aux Guermantes).", "en": "Don’t you think so, princess? – She puts herself too forward, I find that in such a young woman, it is not pleasant, because I do not believe that she is my contemporary, replied Mme des Laumes (this expression being common to the Gallardons and the Guermantes)."}, {"start": 2657.91, "end": 2671.95, "b_start": 5243.51, "b_end": 5271.05, "orig": "Mais la princesse voyant que M. de Froberville continuait à regarder M\nme\nde Cambremer, ajouta moitié par méchanceté pour celle-ci, moitié par amabilité pour le général : « Pas agréable... pour son mari !", "en": "But the princess, seeing that M. de Froberville continued to look at Madame de Cambremer, added half out of malice for the latter, half out of kindness for the general: “Not pleasant... for her husband!"}, {"start": 2672.95, "end": 2697.86, "b_start": 5271.05, "b_end": 5322.28, "orig": "Je regrette de ne pas la connaître puisqu’elle vous tient à cœur, je vous aurais présenté », dit la princesse qui probablement n’en aurait rien fait si elle avait connu la jeune femme. « Je vais être obligée de vous dire bonsoir, parce que c’est la fête d’une amie à qui je dois aller la souhaiter, dit-elle d’un ton modeste et vrai, réduisant la réunion mondaine à laquelle elle se rendait à la simplicité d’une cérémonie ennuyeuse, mais où il était obligatoire et touchant d’aller.", "en": "I regret not knowing her since she is close to your heart, I would have introduced you,” said the princess who probably would not have cared if she had known the young woman. “I'm going to have to say good evening to you, because it's a friend's birthday and I have to go and wish it,” she said in a modest and true tone, reducing the social gathering to which she was going to the simplicity of a boring ceremony, but one where it was obligatory and touching to go."}, {"start": 2698.86, "end": 2712.81, "b_start": 5322.28, "b_end": 5350.97, "orig": "D’ailleurs je dois y retrouver Basin qui, pendant que j’étais ici, est allé voir ses amis que vous connaissez, je crois, qui ont un nom de pont, les Iéna. »\n– Ç’a été d’abord un nom de victoire, princesse, dit le général.", "en": "Besides, I have to meet Basin there who, while I was here, went to see his friends whom you know, I think, who have a bridge name, the Jenas. » – It was first of all a name of victory, princess, said the general."}, {"start": 2713.81, "end": 2745.82, "b_start": 5350.97, "b_end": 5416.48, "orig": "Qu’est-ce que vous voulez, pour un vieux briscard comme moi, ajouta-t-il en ôtant son monocle pour l’essuyer, comme il aurait changé un pansement, tandis que la princesse détournait instinctivement les yeux, cette noblesse d’Empire, c’est autre chose bien entendu, mais enfin, pour ce que c’est, c’est très beau dans son genre, ce sont des gens qui en somme se sont battus en héros.\n– Mais je suis pleine de respect pour les héros, dit la princesse, sur un ton légèrement ironique : si je ne vais pas avec Basin chez cette princesse d’Iéna, ce n’est pas du tout pour ça, c’est tout simplement parce que je ne les connais pas.", "en": "What do you want, for an old veteran like me, he added, taking off his monocle to wipe it, as if he were changing a bandage, while the princess instinctively looked away, this nobility of the Empire is something else of course, but anyway, for what it is, it is very beautiful in its genre, these are people who in short fought as heroes. – But I am full of respect for the heroes, said the princess, in a slightly ironic tone: if I do not go with Basin to this princess of Jena, it is not for that at all, it is quite simply because I do not know them."}, {"start": 2746.82, "end": 2756.35, "b_start": 5416.48, "b_end": 5436.89, "orig": "Basin les connaît, les chérit. Oh ! non, ce n’est pas ce que vous pouvez penser, ce n’est pas un flirt, je n’ai pas à m’y opposer !", "en": "Basin knows them, cherishes them. Oh ! no, that's not what you may think, it's not flirting, I don't have to object!"}, {"start": 2757.35, "end": 2771.1, "b_start": 5436.89, "b_end": 5465.84, "orig": "Du reste, pour ce que cela sert quand je veux m’y opposer ! ajouta-t-elle d’une voix mélancolique, car tout le monde savait que dès le lendemain du jour où le prince des Laumes avait épousé sa ravissante cousine, il n’avait pas cessé de la tromper.", "en": "Besides, for what use it is when I want to oppose it! she added in a melancholy voice, because everyone knew that from the day after the Prince of Laumes had married his ravishing cousin, he had not stopped deceiving her."}, {"start": 2772.1, "end": 2783.1, "b_start": 5465.84, "b_end": 5488.73, "orig": "Mais enfin ce n’est pas le cas, ce sont des gens qu’il a connus autrefois, il en fait ses choux gras, je trouve cela très bien. D’abord je vous dirai que rien que ce qu’il m’a dit de leur maison...", "en": "But that's not the case, these are people he knew in the past, he's happy with them, I find that very good. First I'll tell you that just what he told me about their house..."}, {"start": 2784.1, "end": 2796.14, "b_start": 5488.73, "b_end": 5513.94, "orig": "Pensez que tous leurs meubles sont « Empire » !\n– Mais, princesse, naturellement, c’est parce que c’est le mobilier de leurs grands-parents.\n– Mais je ne vous dis pas, mais ça n’est pas moins laid pour ça.", "en": "Think all their furniture is “Empire”! – But, princess, of course, it’s because it’s their grandparents’ furniture. – But I’m not telling you, but it’s no less ugly for that."}, {"start": 2797.14, "end": 2803.17, "b_start": 5513.94, "b_end": 5527.75, "orig": "Je comprends très bien qu’on ne puisse pas avoir de jolies choses, mais au moins qu’on n’ait pas de choses ridicules.", "en": "I understand very well that we can't have pretty things, but at least we don't have ridiculous things."}, {"start": 2804.17, "end": 2822.05, "b_start": 5527.75, "b_end": 5564.17, "orig": "Qu’est-ce que vous voulez ? je ne connais rien de plus pompier, de plus bourgeois que cet horrible style avec ces commodes qui ont des têtes de cygnes comme des baignoires.\n– Mais je crois même qu’ils ont de belles choses, ils doivent avoir la fameuse table de mosaïque sur laquelle a été signé le traité de...\n– Ah !", "en": "What do you want? I don't know anything more pompous, more bourgeois than this horrible style with these chests of drawers which have swans' heads like bathtubs. – But I even believe that they have beautiful things, they must have the famous mosaic table on which the treaty of... – Ah!"}, {"start": 2823.05, "end": 2835.7, "b_start": 5564.17, "b_end": 5591.76, "orig": "Mais qu’ils aient des choses intéressantes au point de vue de l’histoire, je ne vous dis pas. Mais ça ne peut pas être beau... puisque c’est horrible ! Moi j’ai aussi des choses comme ça que Basin a héritées des Montesquiou.", "en": "But whether they have interesting things from a historical point of view, I'm not telling you. But it can't be beautiful... since it's horrible! I also have things like that that Basin inherited from the Montesquiou."}, {"start": 2836.7, "end": 2851.72, "b_start": 5591.76, "b_end": 5623.6, "orig": "Seulement elles sont dans les greniers de Guermantes où personne ne les voit. Enfin, du reste, ce n’est pas la question, je me précipiterais chez eux avec Basin, j’irais les voir même au milieu de leurs sphinx et de leur cuivre si je les connaissais, mais... je ne les connais pas !", "en": "Only they are in the Guermantes attics where no one sees them. Well, anyway, that's not the question, I would rush to their house with Basin, I would go see them even in the middle of their sphinxes and their copper if I knew them, but... I don't know them!"}, {"start": 2852.72, "end": 2867.55, "b_start": 5623.6, "b_end": 5654.23, "orig": "Moi, on m’a toujours dit quand j’étais petite que ce n’était pas poli d’aller chez les gens qu’on ne connaissait pas, dit-elle en prenant un ton puéril. Alors, je fais ce qu’on m’a appris. Voyez-vous ces braves gens s’ils voyaient entrer une personne qu’ils ne connaissent pas ?", "en": "“I was always told when I was little that it wasn’t polite to go to people you didn’t know,” she said, taking on a childish tone. So, I do what I was taught. Would you see these good people if they saw someone they don’t know come in?"}, {"start": 2868.55, "end": 2872.34, "b_start": 5654.23, "b_end": 5664.32, "orig": "Ils me recevraient peut-être très mal ! dit la princesse.", "en": "They might receive me very badly! said the princess."}, {"start": 2873.34, "end": 2900.25, "b_start": 5664.32, "b_end": 5717.98, "orig": "Et par coquetterie elle embellit le sourire que cette supposition lui arrachait, en donnant à son regard bleu fixé sur le général une expression rêveuse et douce.\n– Ah ! princesse, vous savez bien qu’ils ne se tiendraient pas de joie...\n– Mais non, pourquoi ? lui demanda-t-elle avec une extrême vivacité, soit pour ne pas avoir l’air de savoir que c’est parce qu’elle était une des plus grandes dames de France, soit pour avoir le plaisir de l’entendre dire au général.", "en": "And out of coquetry she embellished the smile that this supposition drew from her, giving her blue gaze fixed on the general a dreamy and gentle expression. – Oh! princess, you know very well that they would not be happy... - But no, why? she asked him with extreme vivacity, either so as not to seem to know that it was because she was one of the greatest ladies in France, or to have the pleasure of hearing it said to the general."}, {"start": 2901.25, "end": 2908.54, "b_start": 5717.98, "b_end": 5733.8, "orig": "Pourquoi ? Qu’en savez-vous ? Cela leur serait peut-être tout ce qu’il y a de plus désagréable.", "en": "For what ? What do you know about it? This would perhaps be most unpleasant for them."}, {"start": 2909.54, "end": 2920.75, "b_start": 5733.8, "b_end": 5757.17, "orig": "Moi je ne sais pas, mais si j’en juge par moi, cela m’ennuie déjà tant de voir les personnes que je connais, je crois que s’il fallait voir des gens que je ne connais pas, « même héroïques », je deviendrais folle.", "en": "I don't know, but if I judge for myself, it already bores me so much to see people I know, I think that if I had to see people I don't know, \"even heroic\", I would go crazy."}, {"start": 2921.75, "end": 2937.57, "b_start": 5757.17, "b_end": 5790.8, "orig": "D’ailleurs, voyons, sauf lorsqu’il s’agit de vieux amis comme vous qu’on connaît sans cela, je ne sais pas si l’héroïsme serait d’un format très portatif dans le monde. Ça m’ennuie déjà souvent de donner des dîners, mais s’il fallait offrir le bras à Spartacus pour aller à table...", "en": "Besides, let's see, except when it comes to old friends like you who we otherwise know, I don't know if heroism would be of a very portable format in the world. It already often bores me giving dinners, but if I had to offer my arm to Spartacus to go to the table..."}, {"start": 2938.57, "end": 2953.98, "b_start": 5790.8, "b_end": 5822.02, "orig": "Non vraiment, ce ne serait jamais à Vercingétorix que je ferais signe comme quatorzième. Je sens que je le réserverais pour les grandes soirées. Et comme je n’en donne pas...\n– Ah ! princesse, vous n’êtes pas Guermantes pour des prunes.", "en": "No really, it would never be Vercingetorix that I would sign as fourteenth. I feel like I would save it for big parties. And since I don’t give any... – Ah! princess, you are not Guermantes for plums."}, {"start": 2954.98, "end": 2965.63, "b_start": 5822.02, "b_end": 5843.7, "orig": "Le possédez-vous assez, l’esprit des Guermantes !\n– Mais on dit toujours l’esprit\ndes\nGuermantes, je n’ai jamais pu comprendre pourquoi.", "en": "Do you possess it enough, the spirit of the Guermantes! – But they always say the spirit of the Guermantes, I have never been able to understand why."}, {"start": 2966.63, "end": 2987.7, "b_start": 5843.7, "b_end": 5888.02, "orig": "Vous en connaissez donc d’autres qui en aient, ajouta-t-elle dans un éclat de rire écumant et joyeux, les traits de son visage concentrés, accouplés dans le réseau de son animation, les yeux étincelants, enflammés d’un ensoleillement radieux de gaieté que seuls avaient le pouvoir de faire rayonner ainsi les propos, fussent-ils tenus par la princesse elle-même, qui étaient une louange de son esprit ou de sa beauté.", "en": "So you know others who have them, she added in a burst of foaming and joyful laughter, the features of her face concentrated, coupled in the network of her animation, the eyes sparkling, inflamed with a radiant sunshine of cheerfulness that only words had the power to make radiate in this way, even if they were made by the princess herself, which were a praise of her spirit or her beauty."}, {"start": 2988.7, "end": 3007.74, "b_start": 5888.02, "b_end": 5928.64, "orig": "Tenez, voilà Swann qui a l’air de saluer votre Cambremer ; là... il est à côté de la mère Saint-Euverte, vous ne voyez pas ! Demandez-lui de vous présenter. Mais dépêchez-vous, il cherche à s’en aller !\n– Avez-vous remarqué quelle affreuse mine il a ? dit le général.\n– Mon petit Charles !", "en": "Hey, here’s Swann who seems to be greeting your Cambremer; there... he's next to Mother Saint-Euverte, can't you see! Ask him to introduce yourself. But hurry up, he's trying to get away! – Have you noticed what a terrible face he has? said the general. – My little Charles!"}, {"start": 3008.74, "end": 3024.65, "b_start": 5928.64, "b_end": 5965.42, "orig": "Ah ! enfin il vient, je commençais à supposer qu’il ne voulait pas me voir ! Swann aimait beaucoup la princesse des Laumes, puis sa vue lui rappelait Guermantes, terre voisine de Combray, tout ce pays qu’il aimait tant et où il ne retournait plus pour ne pas s’éloigner d’Odette.", "en": "Ah! finally he comes, I was starting to assume he didn’t want to see me! Swann loved the Princess des Laumes very much, then the sight of her reminded him of Guermantes, a land neighboring Combray, all this country that he loved so much and to which he no longer returned so as not to move away from Odette."}, {"start": 3025.65, "end": 3052.82, "b_start": 5965.42, "b_end": 6019.96, "orig": "Usant des formes mi-artistes, mi-galantes, par lesquelles il savait plaire à la princesse et qu’il retrouvait tout naturellement quand il se retrempait un instant dans son ancien milieu – et voulant d’autre part pour lui-même exprimer la nostalgie qu’il avait de la campagne :\n– Ah ! dit-il à la cantonade, pour être entendu à la fois de M\nme\nde Saint-Euverte à qui il parlait et de M\nme\ndes Laumes pour qui il parlait, voici la charmante princesse !", "en": "Using half-artistic, half-gallant forms, with which he knew how to please the princess and which he found quite naturally when he immersed himself for a moment in his old environment – ​​and on the other hand wanting to express for himself the nostalgia he had for the countryside: – Ah! he said to everyone, to be heard both by Madame de Saint-Euverte to whom he was speaking and by Madame des Laumes for whom he was speaking, “here is the charming princess!"}, {"start": 3053.82, "end": 3074.1, "b_start": 6019.96, "b_end": 6059.47, "orig": "Voyez, elle est venue tout exprès de Guermantes pour entendre le\nSaint François d’Assise\nde Liszt et elle n’a eu le temps, comme une jolie mésange, que d’aller piquer pour les mettre sur sa tête quelques petits fruits de prunier des oiseaux et d’aubépine ; il y a même encore de petites gouttes de rosée, un peu de la gelée blanche qui doit faire gémir la duchesse.", "en": "See, she came from Guermantes on purpose to hear Liszt's Saint Francis of Assisi and she only had time, like a pretty tit, to go and prick and place on her head some small fruits of bird plum and hawthorn; there are even still little drops of dew, a little of the white frost which must make the duchess moan."}, {"start": 3075.1, "end": 3093.05, "b_start": 6059.47, "b_end": 6095.6, "orig": "C’est très joli, ma chère princesse.\n– Comment, la princesse est venue exprès de Guermantes ? Mais c’est trop ! Je ne savais pas, je suis confuse, s’écria naïvement M\nme\nde Saint-Euverte qui était peu habituée au tour d’esprit de Swann.", "en": "It’s very pretty, my dear princess. – What do you mean, the princess came from Guermantes on purpose? But it’s too much! I didn't know, I'm confused, cried Madame de Saint-Euverte naively, who was unaccustomed to Swann's turn of mind."}, {"start": 3094.05, "end": 3111.23, "b_start": 6095.6, "b_end": 6130.66, "orig": "Et examinant la coiffure de la princesse : Mais c’est vrai, cela imite... comment dirais-je, pas les châtaignes, non oh ! c’est une idée ravissante ! Mais comment la princesse pouvait-elle connaître mon programme ! Les musiciens ne me l’ont même pas communiqué à moi.", "en": "And examining the princess's hairstyle: But it's true, it imitates... how should I say, not chestnuts, no oh! This is a lovely idea! But how could the princess know my program! The musicians didn't even communicate it to me."}, {"start": 3112.23, "end": 3128.36, "b_start": 6130.66, "b_end": 6163.5, "orig": "Swann, habitué quand il était auprès d’une femme avec qui il avait gardé des habitudes galantes de langage, de dire des choses délicates que beaucoup de gens du monde ne comprenaient pas, ne daigna pas expliquer à M\nme\nde Saint-Euverte qu’il n’avait parlé que par métaphore.", "en": "Swann, accustomed when he was near a woman with whom he had maintained gallant habits of language, to say delicate things that many people in society did not understand, did not deign to explain to Madame de Saint-Euverte that he had only spoken metaphorically."}, {"start": 3129.36, "end": 3148.9, "b_start": 6163.5, "b_end": 6204.96, "orig": "Quant à la princesse, elle se mit à rire aux éclats, parce que l’esprit de Swann était extrêmement apprécié dans sa coterie, et aussi parce qu’elle ne pouvait entendre un compliment s’adressant à elle sans lui trouver les grâces les plus fines et une irrésistible drôlerie.\n– Hé bien ! je suis ravie, Charles, si mes petits fruits d’aubépine vous plaisent.", "en": "As for the princess, she began to laugh out loud, because Swann's wit was extremely appreciated among her coterie, and also because she could not hear a compliment addressed to her without finding in it the finest graces and irresistible humor. – Well! I am delighted, Charles, if you like my little hawthorn fruits."}, {"start": 3149.9, "end": 3155.25, "b_start": 6204.96, "b_end": 6216.01, "orig": "Pourquoi est-ce que vous saluez cette Cambremer, est-ce que vous êtes aussi son voisin de campagne ?", "en": "Why do you greet this Cambremer, are you also her country neighbor?"}, {"start": 3156.25, "end": 3170.91, "b_start": 6216.01, "b_end": 6244.97, "orig": "M\nme\nde Saint-Euverte voyant que la princesse avait l’air content de causer avec Swann s’était éloignée.\n– Mais vous l’êtes vous-même, princesse.\n– Moi, mais ils ont donc des campagnes partout, ces gens !", "en": "Madame de Saint-Euverte, seeing that the princess seemed happy to talk with Swann, moved away. – But you are yourself, princess. – Me, but they have campaigns everywhere, these people!"}, {"start": 3171.91, "end": 3180.91, "b_start": 6244.97, "b_end": 6263.92, "orig": "Mais comme j’aimerais être à leur place !\n– Ce ne sont pas les Cambremer, c’étaient ses parents à elle ; elle est une demoiselle Legrandin qui venait à Combray.", "en": "But how I wish I were in their place! – It’s not the Cambremers, it was her parents; she is a Miss Legrandin who came to Combray."}, {"start": 3181.91, "end": 3197.37, "b_start": 6263.92, "b_end": 6297.31, "orig": "Je ne sais pas si vous savez que vous êtes comtesse de Combray et que le chapitre vous doit une redevance.\n– Je ne sais pas ce que me doit le chapitre mais je sais que je suis tapée de cent francs tous les ans par le curé, ce dont je me passerais. Enfin ces Cambremer ont un nom bien étonnant.", "en": "I don't know if you know that you are Countess of Combray and that the chapter owes you a fee. – I don’t know what the chapter owes me but I know that I am hit with a hundred francs every year by the priest, which I could do without. Finally, these Cambremers have a very surprising name."}, {"start": 3198.37, "end": 3221.55, "b_start": 6297.31, "b_end": 6346.4, "orig": "Il finit juste à temps, mais il finit mal ! dit-elle en riant.\n– Il ne commence pas mieux, répondit Swann.\n– En effet cette double abréviation !...\n– C’est quelqu’un de très en colère et de très convenable, qui n’a pas osé aller jusqu’au bout du premier mot.\n– Mais puisqu’il ne devait pas pouvoir s’empêcher de commencer le second, il aurait mieux fait d’achever le premier pour en finir une bonne fois.", "en": "He finishes just in time, but he ends badly! she said, laughing. “It doesn’t start any better,” replied Swann. – Indeed this double abbreviation!... – He is someone very angry and very decent, who did not dare to go to the end of the first word. – But since he couldn't help but start the second, he would have done better to finish the first to get it over with once and for all."}, {"start": 3222.55, "end": 3232.63, "b_start": 6346.4, "b_end": 6367.44, "orig": "Nous sommes en train de faire des plaisanteries d’un goût charmant, mon petit Charles, mais comme c’est ennuyeux de ne plus vous voir, ajouta-t-elle d’un ton câlin, j’aime tant causer avec vous.", "en": "We are making charming jokes, my little Charles, but how boring it is not to see you anymore,” she added in a cuddly tone, “I like talking with you so much."}, {"start": 3233.63, "end": 3248.27, "b_start": 6367.44, "b_end": 6398.77, "orig": "Pensez que je n’aurais même pas pu faire comprendre à cet idiot de Froberville que le nom de Cambremer était étonnant. Avouez que la vie est une chose affreuse. Il n’y a que quand je vous vois que je cesse de m’ennuyer. Et sans doute cela n’était pas vrai.", "en": "Think that I couldn't even have made that idiot from Froberville understand that the name Cambremer was astonishing. Admit that life is a terrible thing. It's only when I see you that I stop being bored. And probably that wasn't true."}, {"start": 3249.27, "end": 3259.52, "b_start": 6398.77, "b_end": 6421.7, "orig": "Mais Swann et la princesse avaient une même manière de juger les petites choses qui avait pour effet – à moins que ce ne fût pour cause – une grande analogie dans la façon de s’exprimer et jusque dans la prononciation.", "en": "But Swann and the princess had the same way of judging little things which had the effect – unless it was the cause – of a great analogy in the way of expressing themselves and even in pronunciation."}, {"start": 3260.52, "end": 3265.37, "b_start": 6421.7, "b_end": 6433.55, "orig": "Cette ressemblance ne frappait pas parce que rien n’était plus différent que leurs deux voix.", "en": "This resemblance was not striking because nothing was more different than their two voices."}, {"start": 3266.37, "end": 3279.45, "b_start": 6433.55, "b_end": 6461.71, "orig": "Mais si on parvenait par la pensée à ôter aux propos de Swann la sonorité qui les enveloppait, les moustaches d’entre lesquelles ils sortaient, on se rendait compte que c’étaient les mêmes phrases, les mêmes inflexions, le tour de la coterie Guermantes.", "en": "But if we managed through thought to remove from Swann's words the sonority which enveloped them, the mustaches from between which they emerged, we realized that they were the same sentences, the same inflections, the trick of the Guermantes coterie."}, {"start": 3280.45, "end": 3296.38, "b_start": 6461.71, "b_end": 6496.57, "orig": "Pour les choses importantes, Swann et la princesse n’avaient les mêmes idées sur rien. Mais depuis que Swann était si triste, ressentant toujours cette espèce de frisson qui précède le moment où l’on va pleurer, il avait le même besoin de parler du chagrin qu’un assassin a de parler de son crime.", "en": "When it came to important things, Swann and the princess didn't have the same ideas on anything. But since Swann was so sad, always feeling that sort of thrill which precedes the moment when one is about to cry, he had the same need to speak of sorrow as an assassin has to speak of his crime."}, {"start": 3297.38, "end": 3315.77, "b_start": 6496.57, "b_end": 6534.62, "orig": "En entendant la princesse lui dire que la vie était une chose affreuse, il éprouva la même douceur que si elle lui avait parlé d’Odette.\n– Oh ! oui, la vie est une chose affreuse. Il faut que nous nous voyions, ma chère amie. Ce qu’il y a de gentil avec vous, c’est que vous n’êtes pas gaie.", "en": "Hearing the princess tell him that life was a terrible thing, he felt the same sweetness as if she had spoken to him about Odette. - Oh ! yes, life is a terrible thing. We must see each other, my dear friend. The nice thing about you is that you're not cheerful."}, {"start": 3316.77, "end": 3325.5, "b_start": 6534.62, "b_end": 6553.12, "orig": "On pourrait passer une soirée ensemble.\n– Mais je crois bien, pourquoi ne viendriez-vous pas à Guermantes, ma belle-mère serait folle de joie.", "en": "We could spend an evening together. – But I think so, why don’t you come to Guermantes, my mother-in-law would be overjoyed."}, {"start": 3326.5, "end": 3342.44, "b_start": 6553.12, "b_end": 6585.96, "orig": "Cela passe pour très laid, mais je vous dirai que ce pays ne me déplaît pas, j’ai horreur des pays « pittoresques ».\n– Je crois bien, c’est admirable, répondit Swann, c’est presque trop beau, trop vivant pour moi, en ce moment ; c’est un pays pour être heureux.", "en": "It seems very ugly, but I will tell you that I don't dislike this country, I hate \"picturesque\" countries. – I think so, it’s admirable, replied Swann, it’s almost too beautiful, too alive for me at this moment; it’s a country to be happy in."}, {"start": 3343.44, "end": 3347.95, "b_start": 6585.96, "b_end": 6596.65, "orig": "C’est peut-être parce que j’y ai vécu, mais les choses m’y parlent tellement.", "en": "Maybe it’s because I lived there, but things there speak to me so much."}, {"start": 3348.95, "end": 3374.9, "b_start": 6596.65, "b_end": 6651.79, "orig": "Dès qu’il se lève un souffle d’air, que les blés commencent à remuer, il me semble qu’il y a quelqu’un qui va arriver, que je vais recevoir une nouvelle ; et ces petites maisons au bord de l’eau... je serais bien malheureux !\n– Oh ! mon petit Charles, prenez garde, voilà l’affreuse Rampillon qui m’a vue, cachez-moi, rappelez-moi donc ce qui lui est arrivé, je confonds, elle a marié sa fille ou son amant, je ne sais plus ; peut-être les deux... et ensemble !...", "en": "As soon as a breath of air arises, as the wheat begins to stir, it seems to me that someone is going to arrive, that I am going to receive news; and these little houses by the water... I would be very unhappy! - Oh ! my little Charles, be careful, there is the awful Rampillon who has seen me, hide me, remind me what happened to her, I am confused, she married her daughter or her lover, I no longer know; maybe both...and together!..."}, {"start": 3375.9, "end": 3385.35, "b_start": 6651.79, "b_end": 6672.8, "orig": "Ah ! non, je me rappelle, elle a été répudiée par son prince... ayez l’air de me parler, pour que cette Bérénice ne vienne pas m’inviter à dîner.", "en": "Ah! no, I remember, she was repudiated by her prince... pretend to be talking to me, so that this Bérénice doesn't come and invite me to dinner."}, {"start": 3386.35, "end": 3402.98, "b_start": 6672.8, "b_end": 6707.11, "orig": "Du reste, je me sauve. Écoutez, mon petit Charles, pour une fois que je vous vois, vous ne voulez pas vous laisser enlever et que je vous emmène chez la princesse de Parme qui serait tellement contente, et Basin aussi qui doit m’y rejoindre. Si on n’avait pas de vos nouvelles par Mémé...", "en": "Anyway, I'm running away. Listen, my little Charles, for once I see you, you don't want to let yourself be kidnapped and I take you to the Princess of Parma who would be so happy, and Basin too who must join me there. If we didn't hear from you through Mémé..."}, {"start": 3403.98, "end": 3406.65, "b_start": 6707.11, "b_end": 6713.72, "orig": "Pensez que je ne vous vois plus jamais !", "en": "Think I never see you again!"}, {"start": 3407.65, "end": 3435.92, "b_start": 6713.72, "b_end": 6769.85, "orig": "Swann refusa ; ayant prévenu M. de Charlus qu’en quittant de chez M\nme\nde Saint-Euverte il rentrerait directement chez lui, il ne se souciait pas en allant chez la princesse de Parme de risquer de manquer un mot qu’il avait tout le temps espéré se voir remettre par un domestique pendant la soirée, et que peut-être il allait trouver chez son concierge. « Ce pauvre Swann, dit ce soir-là M\nme\ndes Laumes à son mari, il est toujours gentil, mais il a l’air bien malheureux.", "en": "Swann refused; having warned M. de Charlus that on leaving Madame de Saint-Euverte's house he would return directly to his own home, he did not worry in going to the Princess of Parma's house about risking missing a note which he had all the time hoped to be delivered by a servant during the evening, and which perhaps he would find at his concierge's. “Poor Swann,” said Madame des Laumes to her husband that evening, “he’s always nice, but he seems very unhappy."}, {"start": 3436.92, "end": 3441.19, "b_start": 6769.85, "b_end": 6780.35, "orig": "Vous le verrez, car il a promis de venir dîner un de ces jours.", "en": "You will see him, because he promised to come to dinner one of these days."}, {"start": 3442.19, "end": 3463.19, "b_start": 6780.35, "b_end": 6826.15, "orig": "Je trouve ridicule au fond qu’un homme de son intelligence souffre pour une personne de ce genre et qui n’est même pas intéressante, car on la dit idiote », ajouta-t-elle avec la sagesse des gens non amoureux, qui trouvent qu’un homme d’esprit ne devrait être malheureux que pour une personne qui en valût la peine ; c’est à peu près comme s’étonner qu’on daigne souffrir du choléra par le fait d’un être aussi petit que le bacille virgule.", "en": "I find it ridiculous deep down that a man of his intelligence should suffer for a person of this type and who is not even interesting, because she is said to be an idiot,” she added with the wisdom of people not in love, who find that a man of intelligence should only be unhappy for a person who was worth it; it is almost like being surprised that we deign to suffer from cholera because of a being as small as the comma bacillus."}, {"start": 3464.19, "end": 3484.86, "b_start": 6826.15, "b_end": 6866.63, "orig": "Swann voulait partir, mais au moment où il allait enfin s’échapper, le général de Froberville lui demanda à connaître M\nme\nde Cambremer et il fut obligé de rentrer avec lui dans le salon pour la chercher.\n– Dites donc, Swann, j’aimerais mieux être le mari de cette femme-là que d’être massacré par les sauvages, qu’en dites-vous ?", "en": "Swann wanted to leave, but just as he was finally about to escape, General de Froberville asked him to know Madame de Cambremer and he was obliged to go into the living room with him to look for her. – Say, Swann, I would rather be the husband of that woman than be massacred by the savages, what do you say?"}, {"start": 3485.86, "end": 3500.71, "b_start": 6866.63, "b_end": 6896.78, "orig": "Ces mots « massacré par les sauvages » percèrent douloureusement le cœur de Swann ; aussitôt il éprouva le besoin de continuer la conversation avec le général :\n– Ah ! lui dit-il, il y a eu de bien belles vies qui ont fini de cette façon...", "en": "These words “massacred by the savages” pierced Swann’s heart painfully; immediately he felt the need to continue the conversation with the general: – Ah! he said to her, there have been many beautiful lives that ended this way..."}, {"start": 3501.71, "end": 3510.45, "b_start": 6896.78, "b_end": 6916.93, "orig": "Ainsi vous savez... ce navigateur dont Dumont d’Urville ramena les cendres, La Pérouse...(et Swann était déjà heureux comme s’il avait parlé d’Odette).", "en": "So you know... this navigator whose ashes Dumont d'Urville brought back, La Pérouse... (and Swann was already happy as if he had talked about Odette)."}, {"start": 3511.45, "end": 3524.6, "b_start": 6916.93, "b_end": 6945.46, "orig": "C’est un beau caractère et qui m’intéresse beaucoup que celui de La Pérouse, ajouta-t-il d’un air mélancolique.\n– Ah ! parfaitement, La Pérouse, dit le général. C’est un nom connu.", "en": "It’s a beautiful character and one that interests me a lot, that of La Pérouse,” he added with a melancholy air. – Oh! perfectly, La Pérouse, said the general. It's a well-known name."}, {"start": 3525.6, "end": 3542.4, "b_start": 6945.46, "b_end": 6979.91, "orig": "Il a sa rue.\n– Vous connaissez quelqu’un rue La Pérouse ? demanda Swann d’un air agité.\n– Je ne connais que M\nme\nde Chanlivault, la sœur de ce brave Chaussepierre. Elle nous a donné une jolie soirée de comédie l’autre jour.", "en": "He has his street. – Do you know anyone on rue La Pérouse? Swann asked agitatedly. – I only know Madame de Chanlivault, the sister of this brave Chaussepierre. She gave us a lovely evening of comedy the other day."}, {"start": 3543.4, "end": 3562.19, "b_start": 6979.91, "b_end": 7019.95, "orig": "C’est un salon qui sera un jour très élégant, vous verrez !\n– Ah ! elle demeure rue La Pérouse. C’est sympathique, c’est une jolie rue, si triste.\n– Mais non ; c’est que vous n’y êtes pas allé depuis quelque temps ; ce n’est plus triste, cela commence à se construire, tout ce quartier-là.", "en": "It’s a living room that will one day be very elegant, you’ll see! – Oh! she lives on rue La Pérouse. It’s nice, it’s a pretty street, so sad. - But no ; it’s because you haven’t been there for some time; It’s no longer sad, it’s starting to take shape, this whole neighborhood."}, {"start": 3563.19, "end": 3598.9, "b_start": 7019.95, "b_end": 7094.08, "orig": "Quand enfin Swann présenta M. de Froberville à la jeune M\nme\nde Cambremer, comme c’était la première fois qu’elle entendait le nom du général, elle esquissa le sourire de joie et de surprise qu’elle aurait eu si on n’en avait jamais prononcé devant elle d’autre que celui-là, car ne connaissant pas les amis de sa nouvelle famille, à chaque personne qu’on lui amenait, elle croyait que c’était l’un d’eux, et pensant qu’elle faisait preuve de tact en ayant l’air d’en avoir tant entendu parler depuis qu’elle était mariée, elle tendait la main d’un air hésitant destiné à prouver la réserve apprise qu’elle avait à vaincre et la sympathie spontanée qui réussissait à en triompher.", "en": "When Swann finally introduced M. de Froberville to the young Ms. de Cambremer, as it was the first time she had heard the general's name, she sketched the smile of joy and surprise that she would have had if no one had ever said anything other than that one in front of her, because not knowing the friends of her new family, with each person brought to her, she believed that it was one of them, and thinking that she was showing tactfully, seeming to have heard so much about it since she was married, she held out her hand with a hesitant air intended to demonstrate the learned reserve which she had to overcome and the spontaneous sympathy which succeeded in triumphing over it."}, {"start": 3599.9, "end": 3622.03, "b_start": 7094.08, "b_end": 7140.79, "orig": "Aussi ses beaux-parents, qu’elle croyait encore les gens les plus brillants de France, déclaraient-ils qu’elle était un ange ; d’autant plus qu’ils préféraient paraître, en la faisant épouser à leur fils, avoir cédé à l’attrait plutôt de ses qualités que de sa grande fortune.\n– On voit que vous êtes musicienne dans l’âme, madame, lui dit le général, en faisant inconsciemment allusion à l’incident de la bobèche.", "en": "Also her in-laws, whom she still believed to be the most brilliant people in France, declared that she was an angel; all the more so as they preferred to appear, by making her marry their son, to have yielded to the attraction of her qualities rather than of her great fortune. – We see that you are a musician at heart, madame, said the general to her, unconsciously alluding to the bobèche incident."}, {"start": 3623.03, "end": 3629.78, "b_start": 7140.79, "b_end": 7155.83, "orig": "Mais le concert recommença et Swann comprit qu’il ne pourrait pas s’en aller avant la fin de ce nouveau numéro du programme.", "en": "But the concert started again and Swann understood that he could not leave before the end of this new number of the program."}, {"start": 3630.78, "end": 3666.03, "b_start": 7155.83, "b_end": 7231.1, "orig": "Il souffrait de rester enfermé au milieu de ces gens dont la bêtise et les ridicules le frappaient d’autant plus douloureusement qu’ignorant son amour, incapables, s’ils l’avaient connu, de s’y intéresser et de faire autre chose que d’en sourire comme d’un enfantillage ou de le déplorer comme une folie, ils le lui faisaient apparaître sous l’aspect d’un état subjectif qui n’existait que pour lui, dont rien d’extérieur ne lui affirmait la réalité ; il souffrait surtout, et au point que même le son des instruments lui donnait envie de crier, de prolonger son exil dans ce lieu où Odette ne viendrait jamais, où personne, où rien ne la connaissait, d’où elle était entièrement absente.", "en": "He suffered from remaining trapped in the midst of these people whose stupidity and ridicule struck him all the more painfully because, unaware of his love, incapable, if they had known it, of being interested in it and doing anything other than smiling at it as childishness or deploring it as madness, they made it appear to him under the aspect of a subjective state which existed only for him, of which nothing external affirmed the reality to him; Above all, he suffered, to the point that even the sound of the instruments made him want to scream, to prolong his exile in this place where Odette would never come, where no one, where nothing knew her, from where she was entirely absent."}, {"start": 3667.03, "end": 3674.69, "b_start": 7231.1, "b_end": 7248.23, "orig": "Mais tout à coup ce fut comme si elle était entrée, et cette apparition lui fut une si déchirante souffrance qu’il dut porter la main à son cœur.", "en": "But suddenly it was as if she had entered, and this apparition caused him such heartbreaking pain that he had to put his hand to his heart."}, {"start": 3675.69, "end": 3701.68, "b_start": 7248.23, "b_end": 7301.28, "orig": "C’est que le violon était monté à des notes hautes où il restait comme pour une attente, une attente qui se prolongeait sans qu’il cessât de les tenir, dans l’exaltation où il était d’apercevoir déjà l’objet de son attente qui s’approchait, et avec un effort désespéré pour tâcher de durer jusqu’à son arrivée, de l’accueillir avant d’expirer, de lui maintenir encore un moment de toutes ses dernières forces le chemin ouvert pour qu’il pût passer, comme on soutient une porte qui sans cela retomberait.", "en": "It was because the violin had reached high notes where he remained as if waiting, a wait which continued without him ceasing to hold them, in the exaltation in which he was already seeing the object of his wait approaching, and with a desperate effort to try to last until his arrival, to welcome him before expiring, to keep the path open for him for one more moment with all his last strength so that he could pass, as one supports a door which would otherwise fall."}, {"start": 3702.68, "end": 3730.18, "b_start": 7301.28, "b_end": 7359.9, "orig": "Et avant que Swann eût eu le temps de comprendre, et de se dire : « C’est la petite phrase de la sonate de Vinteuil, n’écoutons pas ! » tous ses souvenirs du temps où Odette était éprise de lui, et qu’il avait réussi jusqu’à ce jour à maintenir invisibles dans les profondeurs de son être, trompés par ce brusque rayon du temps d’amour qu’ils crurent revenu, s’étaient réveillés et, à tire d’aile, étaient remontés lui chanter éperdument, sans pitié pour son infortune présente, les refrains oubliés du bonheur.", "en": "And before Swann had time to understand, and to say to himself: “It’s the little phrase from Vinteuil’s sonata, let’s not listen! » all his memories of the time when Odette was in love with him, and which until today he had managed to keep invisible in the depths of his being, deceived by this sudden ray of the time of love which they thought had returned, had woken up and, with the help of their wings, had gone back up to sing to him desperately, without pity for his present misfortune, the forgotten refrains of happiness."}, {"start": 3731.18, "end": 3793.22, "b_start": 7359.9, "b_end": 7487.9, "orig": "Au lieu des expressions abstraites « temps où j’étais heureux », « temps où j’étais aimé », qu’il avait souvent prononcées jusque-là et sans trop souffrir, car son intelligence n’y avait enfermé du passé que de prétendus extraits qui n’en conservaient rien, il retrouva tout ce qui de ce bonheur perdu avait fixé à jamais la spécifique et volatile essence ; il revit tout, les pétales neigeux et frisés du chrysanthème qu’elle lui avait jeté dans sa voiture, qu’il avait gardé contre ses lèvres – l’adresse en relief de la « Maison Dorée » sur la lettre où il avait lu : « Ma main tremble si fort en vous écrivant » – le rapprochement de ses sourcils quand elle lui avait dit d’un air suppliant : « Ce n’est pas dans trop longtemps que vous me ferez signe ? » ; il sentit l’odeur du fer du coiffeur par lequel il se faisait relever sa « brosse » pendant que Lorédan allait chercher la petite ouvrière, les pluies d’orage qui tombèrent si souvent ce printemps-là, le retour glacial dans sa victoria, au clair de lune, toutes les mailles d’habitudes mentales, d’impressions saisonnières, de créations cutanées, qui avaient étendu sur une suite de semaines un réseau uniforme dans lequel son corps se trouvait repris.", "en": "Instead of the abstract expressions \"time when I was happy\", \"time when I was loved\", which he had often pronounced until then and without suffering too much, because his intelligence had only locked away from the past so-called extracts which preserved nothing of it, he found everything which of this lost happiness had fixed forever the specific and volatile essence; he saw everything again, the snowy, curled petals of the chrysanthemum she had thrown to him in her car, which he had held against his lips – the embossed address of the “Golden House” on the letter where he had read: “My hand trembles so hard while writing to you” – the drawing together of her eyebrows when she had said to him pleadingly: “Won’t it be too long before you let me know? »; he smelled the smell of the hairdresser's iron with which he had his \"brush\" lifted while Lorédan went to fetch the little worker, the stormy rains which fell so often that spring, the icy return to his Victoria, in the moonlight, all the meshes of mental habits, of seasonal impressions, of cutaneous creations, which had extended over a series of weeks a uniform network in which his body found itself included."}, {"start": 3794.22, "end": 3801.14, "b_start": 7487.9, "b_end": 7503.35, "orig": "À ce moment-là, il satisfaisait une curiosité voluptueuse en connaissant les plaisirs des gens qui vivent par l’amour.", "en": "At that moment, he satisfied a voluptuous curiosity by knowing the pleasures of people who live through love."}, {"start": 3802.14, "end": 3819.2, "b_start": 7503.35, "b_end": 7538.81, "orig": "Il avait cru qu’il pourrait s’en tenir là, qu’il ne serait pas obligé d’en apprendre les douleurs ; comme maintenant le charme d’Odette lui était peu de chose auprès de cette formidable terreur qui le prolongeait comme un trouble halo, cette immense angoisse de ne pas savoir à tous moments ce qu’elle avait fait, de ne pas la posséder partout et toujours !", "en": "He had believed that he could stop there, that he would not have to learn the pains; how little Odette's charm now meant to him compared to this tremendous terror which prolonged him like a hazy halo, this immense anguish of not knowing at all times what she had done, of not possessing her everywhere and always!"}, {"start": 3820.2, "end": 3863.71, "b_start": 7538.81, "b_end": 7632.71, "orig": "Hélas, il se rappela l’accent dont elle s’était écriée : « Mais je pourrai toujours vous voir, je suis toujours libre ! » elle qui ne l’était plus jamais ! l’intérêt, la curiosité qu’elle avait eus pour sa vie à lui, le désir passionné qu’il lui fît la faveur – redoutée au contraire par lui en ce temps-là comme une cause d’ennuyeux dérangements – de l’y laisser pénétrer ; comme elle avait été obligée de le prier pour qu’il se laissât mener chez les Verdurin ; et, quand il la faisait venir chez lui une fois par mois, comme il avait fallu, avant qu’il se laissât fléchir, qu’elle lui répétât le délice que serait cette habitude de se voir tous les jours dont elle rêvait alors qu’elle ne lui semblait à lui qu’un fastidieux tracas, puis qu’elle avait prise en dégoût et définitivement rompue, pendant qu’elle était devenue pour lui un si invincible et si douloureux besoin.", "en": "Alas, he remembered the accent in which she had exclaimed: “But I will always be able to see you, I am always free! » she who never was again! the interest, the curiosity that she had had for his life, the passionate desire that he would do her the favor – feared on the contrary by him at that time as a cause of annoying disturbances – of letting her enter; as she had been obliged to beg him to allow himself to be taken to the Verdurins; and, when he made her come to his house once a month, as it was necessary, before he allowed himself to relent, for her to repeat to him the delight that would be this habit of seeing each other every day of which she dreamed when it seemed to him only a tedious hassle, then which she had taken in disgust and definitively broken, while it had become for him such an invincible and so painful need."}, {"start": 3864.71, "end": 3876.88, "b_start": 7632.71, "b_end": 7658.42, "orig": "Il ne savait pas dire si vrai quand, à la troisième fois qu’il l’avait vue, comme elle lui répétait : « Mais pourquoi ne me laissez-vous pas venir plus souvent », il lui avait dit en riant, avec galanterie : « par peur de souffrir ».", "en": "He did not know how to say so truly when, on the third time he had seen her, as she repeated to him: “But why don’t you let me come more often”, he had said to her, laughing, gallantly: “for fear of suffering”."}, {"start": 3877.88, "end": 3891.39, "b_start": 7658.42, "b_end": 7687.52, "orig": "Maintenant, hélas ! il arrivait encore parfois qu’elle lui écrivît d’un restaurant ou d’un hôtel sur du papier qui en portait le nom imprimé ; mais c’était comme des lettres de feu qui le brûlaient. « C’est écrit de l’hôtel Vouillemont ?", "en": "Now, alas! it still sometimes happened that she wrote to him from a restaurant or a hotel on paper that had the name printed on it; but it was like letters of fire that burned him. “Is it written from the Vouillemont Hotel?"}, {"start": 3892.39, "end": 3924.24, "b_start": 7687.52, "b_end": 7755.24, "orig": "Qu’y peut-elle être allée faire ! avec qui ? que s’y est-il passé ? » Il se rappela les becs de gaz qu’on éteignait boulevard des Italiens quand il l’avait rencontrée contre tout espoir parmi les ombres errantes, dans cette nuit qui lui avait semblé presque surnaturelle et qui en effet – nuit d’un temps où il n’avait même pas à se demander s’il ne la contrarierait pas en la cherchant, en la retrouvant, tant il était sûr qu’elle n’avait pas de plus grande joie que de le voir et de rentrer avec lui – appartenait bien à un monde mystérieux où on ne peut jamais revenir quand les portes s’en sont refermées.", "en": "What could she have gone there to do! with whom ? what happened there? » He remembered the gas lamps that were being put out on the Boulevard desItaliens when he had met her against all hope among the wandering shadows, in that night which had seemed almost supernatural to him and which in fact - night from a time when he did not even have to ask himself if he would not upset her by looking for her, by finding her, so sure was he that she had no greater joy than seeing him and going home with him - really belonged to a mysterious world where you can never return when the doors have closed."}, {"start": 3925.24, "end": 3938.2, "b_start": 7755.24, "b_end": 7785.35, "orig": "Et Swann aperçut, immobile en face de ce bonheur revécu, un malheureux qui lui fit pitié parce qu’il ne le reconnut pas tout de suite, si bien qu’il dut baisser les yeux pour qu’on ne vît pas qu’ils étaient pleins de larmes. C’était lui-même.", "en": "And Swann saw, motionless in front of this relived happiness, an unfortunate man who made him pity because he did not recognize him immediately, so much so that he had to lower his eyes so that no one could see that they were full of tears. It was himself."}, {"start": 3939.2, "end": 3959.43, "b_start": 7785.35, "b_end": 7828.56, "orig": "Quand il l’eut compris, sa pitié cessa, mais il fut jaloux de l’autre lui-même qu’elle avait aimé, il fut jaloux de ceux dont il s’était dit souvent sans trop souffrir, « elle les aime peut-être », maintenant qu’il avait échangé l’idée vague d’aimer, dans laquelle il n’y a pas d’amour, contre les pétales du chrysanthème et l’« en tête » de la Maison d’Or, qui, eux, en étaient pleins.", "en": "When he understood this, his pity ceased, but he was jealous of the other himself whom she had loved, he was jealous of those of whom he had often said without suffering too much, \"she loves them perhaps\", now that he had exchanged the vague idea of loving, in which there is no love, for the petals of the chrysanthemum and the \"head\" of the Golden House, which, for them, in were full."}, {"start": 3960.43, "end": 3967.85, "b_start": 7828.56, "b_end": 7844.94, "orig": "Puis sa souffrance devenant trop vive, il passa sa main sur son front, laissa tomber son monocle, en essuya le verre.", "en": "Then his suffering becoming too great, he passed his hand over his forehead, dropped his monocle, and wiped the glass."}, {"start": 3968.85, "end": 3981.66, "b_start": 7844.94, "b_end": 7872.55, "orig": "Et sans doute s’il s’était vu à ce moment-là, il eût ajouté à la collection de ceux qu’il avait distingués le monocle qu’il déplaçait comme une pensée importune et sur la face embuée duquel, avec un mouchoir, il cherchait à effacer des soucis.", "en": "And no doubt if he had seen himself at that moment, he would have added to the collection of those he had singled out the monocle which he moved like an unwelcome thought and on whose foggy face, with a handkerchief, he sought to erase his worries."}, {"start": 3982.66, "end": 3996.99, "b_start": 7872.55, "b_end": 7903.43, "orig": "Il y a dans le violon – si, ne voyant pas l’instrument, on ne peut pas rapporter ce qu’on entend à son image, laquelle modifie la sonorité – des accents qui lui sont si communs avec certaines voix de contralto, qu’on a l’illusion qu’une chanteuse s’est ajoutée au concert.", "en": "There are in the violin - although, not seeing the instrument, we cannot relate what we hear to its image, which modifies the sound - accents which are so common to it with certain contralto voices, that we have the illusion that a singer has been added to the concert."}, {"start": 3997.99, "end": 4020.7, "b_start": 7903.43, "b_end": 7951.66, "orig": "On lève les yeux, on ne voit que les étuis, précieux comme des boîtes chinoises, mais, par moments, on est encore trompé par l’appel décevant de la sirène ; parfois aussi on croit entendre un génie captif qui se débat au fond de la docte boîte, ensorcelée et frémissante, comme un diable dans un bénitier ; parfois enfin, c’est dans l’air comme un être surnaturel et pur qui passe en déroulant son message invisible.", "en": "We look up, we only see the cases, as precious as Chinese boxes, but, at times, we are still deceived by the disappointing call of the siren; sometimes we also think we hear a captive genius struggling at the bottom of the learned box, bewitched and quivering, like a devil in a font; sometimes finally, it is in the air like a supernatural and pure being which passes unrolling its invisible message."}, {"start": 4021.7, "end": 4057.36, "b_start": 7951.66, "b_end": 8026.79, "orig": "Comme si les instrumentistes beaucoup moins jouaient la petite phrase qu’ils n’exécutaient les rites exigés d’elle pour qu’elle apparût, et procédaient aux incantations nécessaires pour obtenir et prolonger quelques instants le prodige de son évocation, Swann, qui ne pouvait pas plus la voir que si elle avait appartenu à un monde ultra-violet, et qui goûtait comme le rafraîchissement d’une métamorphose dans la cécité momentanée dont il était frappé en approchant d’elle, Swann la sentait présente, comme une déesse protectrice et confidente de son amour, et qui pour pouvoir arriver jusqu’à lui devant la foule et l’emmener à l’écart pour lui parler, avait revêtu le déguisement de cette apparence sonore.", "en": "As if the instrumentalists played the little phrase much less than they performed the rites required of it for it to appear, and proceeded with the incantations necessary to obtain and prolong for a few moments the prodigy of its evocation, Swann, who could no more see it than if it had belonged to an ultra-violet world, and who tasted like the refreshment of a metamorphosis in the momentary blindness with which he was struck in approaching her, Swann felt her present, like a goddess protector and confidante of his love, and who in order to be able to reach him in front of the crowd and take him aside to speak to him, had taken on the disguise of this sonorous appearance."}, {"start": 4058.36, "end": 4073.98, "b_start": 8026.79, "b_end": 8060.52, "orig": "Et tandis qu’elle passait, légère, apaisante et murmurée comme un parfum, lui disant ce qu’elle avait à lui dire et dont il scrutait tous les mots, regrettant de les voir s’envoler si vite, il faisait involontairement avec ses lèvres le mouvement de baiser au passage le corps harmonieux et fuyant.", "en": "And as she passed, light, soothing and whispered like a perfume, telling him what she had to say to him and whose words he scrutinized, regretting seeing them fly away so quickly, he involuntarily made the movement with his lips to kiss the harmonious and fleeting body as he passed."}, {"start": 4074.98, "end": 4090.15, "b_start": 8060.52, "b_end": 8093.0, "orig": "Il ne se sentait plus exilé et seul puisque, elle, qui s’adressait à lui, lui parlait à mi-voix d’Odette. Car il n’avait plus comme autrefois l’impression qu’Odette et lui n’étaient pas connus de la petite phrase. C’est que si souvent elle avait été témoin de leurs joies !", "en": "He no longer felt exiled and alone since she, who was speaking to him, spoke to him in a low voice about Odette. Because he no longer had the impression that he and Odette were not known in passing. It was because so often she had witnessed their joys!"}, {"start": 4091.15, "end": 4105.82, "b_start": 8093.0, "b_end": 8124.1, "orig": "Il est vrai que souvent aussi elle l’avait averti de leur fragilité. Et même, alors que dans ce temps-là il devinait de la souffrance dans son sourire, dans son intonation limpide et désenchantée, aujourd’hui il y trouvait plutôt la grâce d’une résignation presque gaie.", "en": "It is true that she had also often warned him of their fragility. And even, while at that time he guessed suffering in her smile, in her limpid and disenchanted intonation, today he found there rather the grace of an almost cheerful resignation."}, {"start": 4106.82, "end": 4141.45, "b_start": 8124.1, "b_end": 8198.6, "orig": "De ces chagrins dont elle lui parlait autrefois et qu’il la voyait, sans qu’il fût atteint par eux, entraîner en souriant dans son cours sinueux et rapide, de ces chagrins qui maintenant étaient devenus les siens sans qu’il eû
