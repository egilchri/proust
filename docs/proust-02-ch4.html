<!DOCTYPE html>

        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>À la recherche du temps perdu II – Chapter 4</title>
        
        
        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 20.83, "b_start": 0.0, "b_end": 44.15, "orig": "Comme Odette ne lui donnait aucun renseignement sur ces choses si importantes qui l’occupaient tant chaque jour (bien qu’il eût assez vécu pour savoir qu’il n’y en a jamais d’autres que les plaisirs), il ne pouvait pas chercher longtemps de suite à les imaginer, son cerveau fonctionnait à vide ; alors il passait son doigt sur ses paupières fatiguées comme il aurait essuyé le verre de son lorgnon, et cessait entièrement de penser.", "en": "As Odette gave him no information on these very important things which occupied him so much every day (although he had lived long enough to know that there are never any other than pleasures), he could not try to imagine them for long, his brain was working on empty; then he passed his finger over his tired eyelids as he would have wiped the glass of his glasses, and ceased thinking entirely."}, {"start": 21.83, "end": 40.74, "b_start": 44.15, "b_end": 85.49, "orig": "Il surnageait pourtant à cet inconnu certaines occupations qui réapparaissaient de temps en temps, vaguement rattachées par elle à quelque obligation envers des parents éloignés ou des amis d’autrefois, qui, parce qu’ils étaient les seuls qu’elle lui citait souvent comme l’empêchant de le voir, paraissaient à Swann former le cadre fixe, nécessaire, de la vie d’Odette.", "en": "However, there were certain occupations floating around this unknown which reappeared from time to time, vaguely linked by her to some obligation towards distant relatives or friends of the past, which, because they were the only ones she often cited as preventing her from seeing him, seemed to Swann to form the fixed, necessary framework of Odette's life."}, {"start": 41.74, "end": 64.33, "b_start": 85.49, "b_end": 132.42, "orig": "À cause du ton dont elle lui disait de temps à autre « le jour où je vais avec mon amie à l’Hippodrome », si, s’étant senti malade et ayant pensé : « peut-être Odette voudrait bien passer chez moi », il se rappelait brusquement que c’était justement ce jour-là, il se disait : « Ah ! non, ce n’est pas la peine de lui demander de venir, j’aurais dû y penser plus tôt, c’est le jour où elle va avec son amie à l’Hippodrome.", "en": "Because of the tone in which she said to him from time to time \"the day I go with my friend to the Hippodrome\", if, having felt ill and having thought: \"perhaps Odette would like to come to my house\", he suddenly remembered that it was precisely that day, he said to himself: \"Ah! no, there's no point asking her to come, I should have thought of it sooner, it's the day she goes with her friend to the Hippodrome."}, {"start": 65.33, "end": 86.62, "b_start": 132.42, "b_end": 178.13, "orig": "Réservons-nous pour ce qui est possible ; c’est inutile de s’user à proposer des choses inacceptables et refusées d’avance. » Et ce devoir qui incombait à Odette d’aller à l’Hippodrome et devant lequel Swann s’inclinait ainsi ne lui paraissait pas seulement inéluctable ; mais ce caractère de nécessité dont il était empreint semblait rendre plausible et légitime tout ce qui de près ou de loin se rapportait à lui.", "en": "Let us reserve ourselves for what is possible; It’s useless to wear out proposing things that are unacceptable and refused in advance. » And this duty which fell to Odette to go to the Hippodrome and before which Swann thus bowed did not only seem inevitable to her; but this character of necessity with which he was imbued seemed to make plausible and legitimate everything that directly or remotely related to him."}, {"start": 87.62, "end": 116.61, "b_start": 178.13, "b_end": 240.42, "orig": "Si Odette dans la rue ayant reçu d’un passant un salut qui avait éveillé la jalousie de Swann, elle répondait aux questions de celui-ci en rattachant l’existence de l’inconnu à un des deux ou trois grands devoirs dont elle lui parlait, si, par exemple, elle disait : « C’est un monsieur qui était dans la loge de mon amie avec qui je vais à l’Hippodrome », cette explication calmait les soupçons de Swann, qui en effet trouvait inévitable que l’amie eût d’autre invités qu’Odette dans sa loge à l’Hippodrome, mais n’avait jamais cherché ou réussi à se les figurer.", "en": "If Odette in the street having received a greeting from a passer-by which had aroused Swann's jealousy, she responded to the latter's questions by relating the existence of the stranger to one of the two or three great duties of which she spoke to him, if, for example, she said: \"It is a gentleman who was in the dressing room of my friend with whom I am going to the Hippodrome\", this explanation calmed the suspicions of Swann, who in fact found it inevitable that the friend had other guests than Odette in his box at the Hippodrome, but had never sought or succeeded in picturing them."}, {"start": 117.61, "end": 132.61, "b_start": 240.42, "b_end": 272.35, "orig": "Ah ! comme il eût aimé la connaître, l’amie qui allait à l’Hippodrome, et qu’elle l’y emmenât avec Odette ! Comme il aurait donné toutes ses relations pour n’importe quelle personne qu’avait l’habitude de voir Odette, fût-ce une manucure ou une demoiselle de magasin.", "en": "Ah! how he would have liked to know her, the friend who went to the Hippodrome, and that she would take him there with Odette! As he would have given all his connections for any person Odette used to see, even if it was a manicurist or a shop assistant."}, {"start": 133.61, "end": 143.59, "b_start": 272.35, "b_end": 295.07, "orig": "Il eût fait pour elles plus de frais que pour des reines. Ne lui auraient-elles pas fourni, dans ce qu’elles contenaient de la vie d’Odette, le seul calmant efficace pour ses souffrances ?", "en": "He would have incurred more expenses for them than for queens. Would they not have provided her, in what they contained of Odette's life, with the only effective calming agent for her suffering?"}, {"start": 144.59, "end": 153.93, "b_start": 295.07, "b_end": 314.59, "orig": "Comme il aurait couru avec joie passer les journées chez telle de ces petites gens avec lesquelles Odette gardait des relations, soit par intérêt, soit par simplicité véritable.", "en": "How happily he would have run to spend the days with one of those little people with whom Odette kept in touch, either out of interest or out of true simplicity."}, {"start": 154.93, "end": 169.59, "b_start": 314.59, "b_end": 346.93, "orig": "Comme il eût volontiers élu domicile à jamais au cinquième étage de telle maison sordide et enviée où Odette ne l’emmenait pas, et où, s’il y avait habité avec la petite couturière retirée dont il eût volontiers fait semblant d’être l’amant, il aurait presque chaque jour reçu sa visite.", "en": "How willingly he would have taken up residence forever on the fifth floor of some sordid and envied house where Odette did not take him, and where, if he had lived there with the withdrawn little seamstress whose lover he would have gladly pretended to be, he would have received her visit almost every day."}, {"start": 170.59, "end": 180.65, "b_start": 346.93, "b_end": 368.66, "orig": "Dans ces quartiers presque populaires, quelle existence modeste, abjecte, mais douce, mais nourrie de calme et de bonheur, il eût accepté de vivre indéfiniment.", "en": "In these almost working-class neighborhoods, what a modest, abject, but sweet existence, but nourished by calm and happiness, he would have agreed to live indefinitely."}, {"start": 181.65, "end": 195.35, "b_start": 368.66, "b_end": 396.71, "orig": "Il arrivait encore parfois, quand, ayant rencontré Swann, elle voyait s’approcher d’elle quelqu’un qu’il ne connaissait pas, qu’il pût remarquer sur le visage d’Odette cette tristesse qu’elle avait eue le jour où il était venu pour la voir pendant que Forcheville était là.", "en": "It still happened sometimes, when, having met Swann, she saw someone he did not know approach her, that he could notice on Odette's face that sadness that she had had the day he had come to see her while Forcheville was there."}, {"start": 196.35, "end": 227.91, "b_start": 396.71, "b_end": 463.75, "orig": "Mais c’était rare ; car les jours où malgré tout ce qu’elle avait à faire et la crainte de ce que penserait le monde, elle arrivait à voir Swann, ce qui dominait maintenant dans son attitude était l’assurance : grand contraste, peut-être revanche inconsciente ou réaction naturelle de l’émotion craintive qu’aux premiers temps où elle l’avait connu elle éprouvait auprès de lui, et même loin de lui, quand elle commençait une lettre par ces mots : « Mon ami, ma main tremble si fort que je peux à peine écrire » (elle le prétendait du moins, et un peu de cet émoi devait être sincère pour qu’elle désirât d’en feindre davantage).", "en": "But it was rare; because on the days when, despite everything she had to do and the fear of what the world would think, she managed to see Swann, what now dominated in her attitude was self-assurance: a great contrast, perhaps unconscious revenge or a natural reaction of the fearful emotion that in the first days when she had known him she felt near him, and even far from him, when she began a letter with these words: \"My friend, my hand is trembling so hard that I can hardly write\" (she she claimed at least, and a little of this emotion must have been sincere for her to want to feign more)."}, {"start": 228.91, "end": 241.63, "b_start": 463.75, "b_end": 490.93, "orig": "Swann lui plaisait alors. On ne tremble jamais que pour soi, que pour ceux qu’on aime. Quand notre bonheur n’est plus dans leurs mains, de quel calme, de quelle aisance, de quelle hardiesse on jouit auprès d’eux !", "en": "He liked Swann then. We only ever tremble for ourselves, only for those we love. When our happiness is no longer in their hands, what calm, what ease, what boldness we enjoy near them!"}, {"start": 242.63, "end": 262.31, "b_start": 490.93, "b_end": 533.23, "orig": "En lui parlant, en lui écrivant, elle n’avait plus de ces mots par lesquels elle cherchait à se donner l’illusion qu’il lui appartenait, faisant naître les occasions de dire « mon », « mien », quand il s’agissait de lui : « Vous êtes mon bien, c’est le parfum de notre amitié, je le garde », de lui parler de l’avenir, de la mort même, comme d’une seule chose pour eux deux.", "en": "In speaking to him, in writing to him, she no longer had those words with which she sought to give herself the illusion that he belonged to her, giving rise to the opportunities to say \"my\", \"mine\", when it came to him: \"You are my property, it is the perfume of our friendship, I will keep it\", to speak to him of the future, of death itself, as of a single thing for both of them."}, {"start": 263.31, "end": 289.86, "b_start": 533.23, "b_end": 586.33, "orig": "Dans ce temps-là, à tout de qu’il disait, elle répondait avec admiration : « Vous, vous ne serez jamais comme tout le monde » ; elle regardait sa longue tête un peu chauve, dont les gens qui connaissaient les succès de Swann pensaient : « Il n’est pas régulièrement beau si vous voulez, mais il est chic : ce toupet, ce monocle, ce sourire ! », et, plus curieuse peut-être de connaître ce qu’il était que désireuse d’être sa maîtresse, elle disait :\n– Si je pouvais savoir ce qu’il y a dans cette tête-là !", "en": "At that time, to everything he said, she responded with admiration: “You will never be like everyone else”; she looked at his long, somewhat bald head, of which people who knew of Swann's successes thought: \"He's not regularly handsome if you like, but he's chic: that toupee, that monocle, that smile! \", and, perhaps more curious to know what he was than wanting to be his mistress, she said: – If I could only know what is in that head!"}, {"start": 290.86, "end": 300.79, "b_start": 586.33, "b_end": 607.87, "orig": "Maintenant, à toutes les paroles de Swann elle répondait d’un ton parfois irrité, parfois indulgent :\n– Ah ! tu ne seras donc jamais comme tout le monde !", "en": "Now, to all Swann's words she responded in a tone sometimes irritated, sometimes indulgent: – Ah! so you will never be like everyone else!"}, {"start": 301.79, "end": 338.15, "b_start": 607.87, "b_end": 683.72, "orig": "Elle regardait cette tête qui n’était qu’un peu plus vieillie par le souci (mais dont maintenant tous pensaient, en vertu de cette même aptitude qui permet de découvrir les intentions d’un morceau symphonique dont on a lu le programme, et les ressemblances d’un enfant quand on connaît sa parenté : « Il n’est pas positivement laid si vous voulez, mais il est ridicule ; ce monocle, ce toupet, ce sourire ! », réalisant dans leur imagination suggestionnée la démarcation immatérielle qui sépare à quelques mois de distance une tête d’amant de cœur et une tête de cocu), elle disait :\n– Ah ! si je pouvais changer, rendre raisonnable ce qu’il y a dans cette tête-là.", "en": "She looked at this head which was only a little more aged by worry (but of which now everyone was thinking, by virtue of this same aptitude which allows us to discover the intentions of a symphonic piece for which we have read the program, and the resemblances of a child when we know his parentage: \"He is not positively ugly if you like, but he is ridiculous; this monocle, this toupee, this smile!\"), realizing in their suggested imagination the immaterial demarcation which separates a few months from distance between the head of a lover of heart and the head of a cuckold), she said: – Ah! if I could change, make reasonable what is in that head."}, {"start": 339.15, "end": 350.82, "b_start": 683.72, "b_end": 707.86, "orig": "Toujours prêt à croire ce qu’il souhaitait, si seulement les manières d’être d’Odette avec lui laissaient place au doute, il se jetait avidement sur cette parole.\n– Tu le peux si tu le veux, lui disait-il.", "en": "Always ready to believe what he wished, if only Odette's manner towards him left room for doubt, he eagerly threw himself on this word. “You can if you want,” he told her."}, {"start": 351.82, "end": 372.72, "b_start": 707.86, "b_end": 753.06, "orig": "Et il tâchait de lui montrer que l’apaiser, le diriger, le faire travailler, serait une noble tâche à laquelle ne demandaient qu’à se vouer d’autres femmes qu’elle, entre les mains desquelles il est vrai d’ajouter que la noble tâche ne lui eût paru plus qu’une indiscrète et insupportable usurpation de sa liberté. « Si elle ne m’aimait pas un peu, se disait-il, elle ne souhaiterait pas de me transformer.", "en": "And he tried to show him that appeasing him, directing him, making him work, would be a noble task to which other women besides her only asked to dedicate themselves, in whose hands it is true to add that the noble task would have seemed to him nothing more than an indiscreet and unbearable usurpation of his freedom. “If she didn’t love me a little,” he said to himself, “she wouldn’t want to change me."}, {"start": 373.72, "end": 390.76, "b_start": 753.06, "b_end": 788.04, "orig": "Pour me transformer, il faudra qu’elle me voie davantage. » Ainsi trouvait-il, dans ce reproche qu’elle lui faisait, comme une preuve d’intérêt, d’amour peut-être ; et en effet, elle lui en donnait maintenant si peu qu’il était obligé de considérer comme telles les défenses qu’elle lui faisait d’une chose ou d’une autre.", "en": "To transform me, she will have to see me more. » So he found, in this reproach she made him, a proof of interest, of love perhaps; and in fact, she now gave him so little that he was obliged to consider as such the defenses she gave him of one thing or another."}, {"start": 391.76, "end": 401.6, "b_start": 788.04, "b_end": 810.59, "orig": "Un jour, elle lui déclara qu’elle n’aimait pas son cocher, qu’il lui montait peut-être la tête contre elle, qu’en tous cas il n’était pas avec lui de l’exactitude et de la déférence qu’elle voulait.", "en": "One day, she told him that she did not like her coachman, that he was perhaps turning her head against her, that in any case he was not treated with the exactitude and deference that she wanted."}, {"start": 402.6, "end": 413.71, "b_start": 810.59, "b_end": 834.41, "orig": "Elle sentait qu’il désirait lui entendre dire : « Ne le prends plus pour venir chez moi », comme il aurait désiré un baiser. Comme elle était de bonne humeur, elle le lui dit ; il fut attendri.", "en": "She felt that he wanted to hear her say: “Don’t take him to come to my house anymore,” just as he would have wanted a kiss. As she was in a good mood, she told him; he was moved."}, {"start": 414.71, "end": 433.46, "b_start": 834.41, "b_end": 874.19, "orig": "Le soir, causant avec M. de Charlus avec qui il avait la douceur de pouvoir parler d’elle ouvertement (car les moindres propos qu’il tenait, même aux personnes qui ne la connaissaient pas, se rapportaient en quelque manière à elle), il lui dit :\n– Je crois pourtant qu’elle m’aime ; elle est si gentille pour moi, ce que je fais ne lui est certainement pas indifférent.", "en": "In the evening, chatting with M. de Charlus with whom he had the gentleness to be able to speak about her openly (because the slightest remarks he made, even to people who did not know her, related in some way to her), he said to her: – I believe, however, that she loves me; she is so kind to me, what I do is certainly not indifferent to her."}, {"start": 434.46, "end": 444.94, "b_start": 874.19, "b_end": 895.49, "orig": "Et si, au moment d’aller chez elle, montant dans sa voiture avec un ami qu’il devait laisser en route, l’autre lui disait :\n– Tiens, ce n’est pas Lorédan qui est sur le siège ?", "en": "What if, when going to her house, getting into his car with a friend he had to leave on the way, the other said to him: – Hey, isn’t that Lorédan who’s in the seat?"}, {"start": 445.94, "end": 456.77, "b_start": 895.49, "b_end": 918.16, "orig": "Avec quelle joie mélancolique Swann lui répondait :\n– Oh ! sapristi non ! je te dirai, je ne peux pas prendre Lorédan quand je vais rue La Pérouse.", "en": "With what melancholy joy Swann replied: – Oh! sapristi no! I will tell you, I cannot take Lorédan when I go to rue La Pérouse."}, {"start": 457.77, "end": 473.78, "b_start": 918.16, "b_end": 951.86, "orig": "Odette n’aime pas que je prenne Lorédan, elle ne le trouve pas bien pour moi ; enfin que veux-tu, les femmes, tu sais ! je sais que ça lui déplairait beaucoup. Ah bien oui ! je n’aurais eu qu’à prendre Rémi ! j’en aurais eu une histoire !", "en": "Odette doesn't like me taking Lorédan, she doesn't find it good for me; Well, what do you want, women, you know! I know he would be very displeased. Oh yes! I would have only had to take Rémi! I would have had a story!"}, {"start": 474.78, "end": 496.66, "b_start": 951.86, "b_end": 996.01, "orig": "Ces nouvelles façons indifférentes, distraites, irritables, qui étaient maintenant celles d’Odette avec lui, certes Swann en souffrait ; mais il ne connaissait pas sa souffrance ; comme c’était progressivement, jour par jour, qu’Odette s’était refroidie à son égard, ce n’est qu’en mettant en regard de ce qu’elle était aujourd’hui ce qu’elle avait été au début, qu’il aurait pu sonder la profondeur du changement qui s’était accompli.", "en": "These new indifferent, distracted, irritable ways, which were now those of Odette with him, certainly Swann suffered from them; but he knew not his suffering; as it was progressively, day by day, that Odette had cooled towards him, it was only by comparing what she was today with what she had been at the beginning, that he could have fathomed the depth of the change that had taken place."}, {"start": 497.66, "end": 509.62, "b_start": 996.01, "b_end": 1022.21, "orig": "Or ce changement c’était sa profonde, sa secrète blessure qui lui faisait mal jour et nuit, et dès qu’il sentait que ses pensées allaient un peu trop près d’elle, vivement il les dirigeait d’un autre côté de peur de trop souffrir.", "en": "Now this change was his deep, his secret wound which hurt him day and night, and as soon as he felt that his thoughts were going a little too close to her, he quickly directed them in another direction for fear of suffering too much."}, {"start": 510.62, "end": 517.72, "b_start": 1022.21, "b_end": 1038.42, "orig": "Il se disait bien d’une façon abstraite : « Il fut un temps où Odette m’aimait davantage », mais jamais il ne revoyait ce temps.", "en": "He did say to himself in an abstract way: “There was a time when Odette loved me more,” but he never saw that time again."}, {"start": 518.72, "end": 554.72, "b_start": 1038.42, "b_end": 1113.31, "orig": "De même qu’il y avait dans son cabinet une commode qu’il s’arrangeait à ne pas regarder, qu’il faisait un crochet pour éviter en entrant et en sortant, parce que dans un tiroir étaient serrés le chrysanthème qu’elle lui avait donné le premier soir où il l’avait reconduite, les lettres où elle disait : « Que n’y avez-vous oublié aussi votre cœur, je ne vous aurais pas laissé le reprendre » et « À quelque heure du jour et de la nuit que vous ayez besoin de moi, faites-moi signe et disposez de ma vie », de même il y avait en lui une place dont il ne laissait jamais approcher son esprit, lui faisant faire s’il le fallait le détour d’un long raisonnement pour qu’il n’eût pas à passer devant elle : c’était celle où vivait le souvenir des jours heureux.", "en": "Just as there was a chest of drawers in his study that he managed not to look at, that he made a detour to avoid when entering and leaving, because in a drawer were packed the chrysanthemum that she had given him the first evening when he had taken her home, the letters in which she said: \"Didn't you also forget your heart there, I wouldn't have let you take it back\" and \"At whatever hour of the day or night you need to me, give me a sign and dispose of my life\", in the same way there was a place in him which he never let his mind approach, making him take the detour of a long reasoning if necessary so that he would not have to pass in front of it: it was the one where the memory of happy days lived."}, {"start": 555.72, "end": 570.94, "b_start": 1113.31, "b_end": 1144.31, "orig": "Mais sa si précautionneuse prudence fut déjouée un soir qu’il était allé dans le monde. C’était chez la marquise de Saint-Euverte, à la dernière, pour cette année-là, des soirées où elle faisait entendre des artistes qui lui servaient ensuite pour ses concerts de charité.", "en": "But his careful prudence was thwarted one evening when he went out into society. It was at the Marquise de Saint-Euverte's house, at the last, for that year, evenings where she featured artists who were then used for her charity concerts."}, {"start": 571.94, "end": 589.34, "b_start": 1144.31, "b_end": 1183.01, "orig": "Swann, qui avait voulu successivement aller à toutes les précédentes et n’avait pu s’y résoudre avait reçu, tandis qu’il s’habillait pour se rendre à celle-ci, la visite du baron de Charlus qui venait lui offrir de retourner avec lui chez la marquise, si sa compagnie devait l’aider à s’y ennuyer un peu moins, à s’y trouver moins triste.", "en": "Swann, who had wanted to go to all the previous ones in succession and had not been able to bring himself to do so, had received, while he was getting dressed to go to this one, a visit from Baron de Charlus who came to offer to return with him to the Marquise, if her company would help him to be a little less bored there, to find himself less sad there."}, {"start": 590.34, "end": 604.81, "b_start": 1183.01, "b_end": 1211.7, "orig": "Mais Swann lui avait répondu :\n– Vous ne doutez pas du plaisir que j’aurais à être avec vous. Mais le plus grand plaisir que vous puissiez me faire, c’est d’aller plutôt voir Odette. Vous savez l’excellente influence que vous avez sur elle.", "en": "But Swann replied: – You have no doubt of the pleasure I would have in being with you. But the greatest pleasure you can give me is to go and see Odette instead. You know the excellent influence you have on her."}, {"start": 605.81, "end": 619.85, "b_start": 1211.7, "b_end": 1242.41, "orig": "Je crois qu’elle ne sort pas ce soir avant d’aller chez son ancienne couturière où, du reste, elle sera sûrement contente que vous l’accompagniez. En tous cas vous la trouveriez chez elle avant. Tâchez de la distraire et aussi de lui parler raison.", "en": "I think she's not going out this evening before going to her old seamstress where, moreover, she will surely be happy that you are accompanying her. In any case you would find her at home first. Try to distract her and also talk reason to her."}, {"start": 620.85, "end": 634.82, "b_start": 1242.41, "b_end": 1270.69, "orig": "Si vous pouviez arranger quelque chose pour demain qui lui plaise et que nous pourrions faire tous les trois ensemble. Tâchez aussi de poser des jalons pour cet été, si elle avait envie de quelque chose, d’une croisière que nous ferions tous les trois, que sais-je ?", "en": "If you could arrange something for tomorrow that he would like and that the three of us could do together. Also try to lay the groundwork for this summer, if she wanted something, a cruise that the three of us would take, whatever?"}, {"start": 635.82, "end": 648.44, "b_start": 1270.69, "b_end": 1295.81, "orig": "Quant à ce soir, je ne compte pas la voir ; maintenant si elle le désirait ou si vous trouviez un joint, vous n’avez qu’à m’envoyer un mot chez M\nme\nde Saint-Euverte jusqu’à minuit, et après chez moi.", "en": "As for tonight, I don’t plan to see her; now if she wanted it or if you found a joint, all you have to do is send me a note to Madame de Saint-Euverte's until midnight, and then to my house."}, {"start": 649.44, "end": 676.66, "b_start": 1295.81, "b_end": 1353.37, "orig": "Merci de tout ce que vous faites pour moi, vous savez comme je vous aime. »\nLe baron lui promit d’aller faire la visite qu’il désirait après qu’il l’aurait conduit jusqu’à la porte de l’hôtel Saint-Euverte, où Swann arriva tranquillisé par la pensée que M. de Charlus passerait la soirée rue La Pérouse, mais dans un état de mélancolique indifférence à toutes les choses qui ne touchaient pas Odette, et en particulier aux choses mondaines, qui leur donnait le charme de ce qui, n’étant plus un but pour notre volonté, nous apparaît en soi-même.", "en": "Thank you for everything you do for me, you know how much I love you. » The baron promised to go and make the visit he desired after he had led him to the door of the Hôtel Saint-Euverte, where Swann arrived reassured by the thought that M. de Charlus would spend the evening in rue La Pérouse, but in a state of melancholy indifference to all things which did not touch Odette, and in particular to worldly things, which gave them the charm of what, no longer being a purpose for our will, appears to us in itself."}, {"start": 677.66, "end": 706.91, "b_start": 1353.37, "b_end": 1414.75, "orig": "Dès sa descente de voiture, au premier plan de ce résumé fictif de leur vie domestique que les maîtresses de maison prétendent offrir à leurs invités les jours de cérémonie et où elles cherchent à respecter la vérité du costume et celle du décor, Swann prit plaisir à voir les héritiers des « tigres » de Balzac, les grooms, suivants ordinaires de la promenade, qui, chapeautés et bottés, restaient dehors devant l’hôtel sur le sol de l’avenue, ou devant les écuries, comme des jardiniers auraient été rangés à l’entrée de leurs parterres.", "en": "As soon as he got out of the car, in the foreground of this fictional summary of their domestic life that the hostesses claim to offer to their guests on ceremony days and where they seek to respect the truth of the costume and that of the decor, Swann took pleasure in seeing the heirs of Balzac's \"tigers\", the grooms, ordinary followers of the promenade, who, in hats and boots, remained outside in front of the hotel on the ground of the avenue, or in front of the stables, like gardeners would have been stored at the entrance to their flowerbeds."}, {"start": 707.91, "end": 724.02, "b_start": 1414.75, "b_end": 1449.3, "orig": "La disposition particulière qu’il avait toujours eue à chercher des analogies entre les êtres vivants et les portraits des musées s’exerçait encore mais d’une façon plus constante et plus générale ; c’est la vie mondaine tout entière, maintenant qu’il en était détaché, qui se présentait à lui comme une suite de tableaux.", "en": "The particular disposition that he had always had to seek analogies between living beings and museum portraits was still exercised but in a more constant and more general way; it was the entire worldly life, now that he was detached from it, which presented itself to him like a series of paintings."}, {"start": 725.02, "end": 761.38, "b_start": 1449.3, "b_end": 1523.95, "orig": "Dans le vestibule où, autrefois, quand il était un mondain, il entrait enveloppé dans son pardessus pour en sortir en frac, mais sans savoir ce qui s’y était passé, étant par la pensée, pendant les quelques instants qu’il y séjournait, ou bien encore dans la fête qu’il venait de quitter, ou bien déjà dans la fête où on allait l’introduire, pour la première fois il remarqua, réveillée par l’arrivée inopinée d’un invité aussi tardif, la meute éparse, magnifique et désœuvrée de grands valets de pied qui dormaient çà et là sur des banquettes et des coffres et qui, soulevant leurs nobles profils aigus de lévriers, se dressèrent et, rassemblés, formèrent le cercle autour de lui.", "en": "In the vestibule where, in the past, when he was a socialite, he entered wrapped in his overcoat to come out in a tailcoat, but without knowing what had happened there, being in thought, during the few moments he stayed there, or even in the party he had just left, or already in the party where he was about to be introduced, for the first time he noticed, awakened by the unexpected arrival of such a late guest, the scattered pack, magnificent and idle of large footmen who slept here and there on benches and chests and who, raising their noble, sharp greyhound profiles, stood up and, gathered together, formed the circle around him."}, {"start": 762.38, "end": 773.85, "b_start": 1523.95, "b_end": 1548.8, "orig": "L’un d’eux, d’aspect particulièrement féroce et assez semblable à l’exécuteur dans certains tableaux de la Renaissance qui figurent des supplices, s’avança vers lui d’un air implacable pour lui prendre ses affaires.", "en": "One of them, particularly fierce in appearance and quite similar to the executioner in certain Renaissance paintings depicting torture, advanced towards him with an implacable air to take his things."}, {"start": 774.85, "end": 785.34, "b_start": 1548.8, "b_end": 1571.21, "orig": "Mais la dureté de son regard d’acier était compensée par la douceur de ses gants de fil, si bien qu’en approchant de Swann il semblait témoigner du mépris pour sa personne et des égards pour son chapeau.", "en": "But the hardness of his steely gaze was offset by the softness of his wire gloves, so that as he approached Swann he seemed to show contempt for his person and respect for his hat."}, {"start": 786.34, "end": 795.36, "b_start": 1571.21, "b_end": 1591.0, "orig": "Il le prit avec un soin auquel l’exactitude de sa pointure donnait quelque chose de méticuleux et une délicatesse que rendait presque touchante l’appareil de sa force.", "en": "He took it with a care to which the accuracy of his size gave something of meticulousness and a delicacy that was made almost touching by the display of his strength."}, {"start": 796.36, "end": 808.26, "b_start": 1591.0, "b_end": 1617.46, "orig": "Puis il le passa à un de ses aides, nouveau et timide, qui exprimait l’effroi qu’il ressentait en roulant en tous sens des regards furieux et montrait l’agitation d’une bête captive dans les premières heures de sa domesticité.", "en": "Then he passed it to one of his assistants, new and shy, who expressed the fear he felt by rolling furious glances in all directions and showed the agitation of a captive animal in the first hours of its domesticity."}, {"start": 809.26, "end": 839.22, "b_start": 1617.46, "b_end": 1679.82, "orig": "À quelques pas, un grand gaillard en livrée rêvait, immobile, sculptural, inutile, comme ce guerrier purement décoratif qu’on voit dans les tableaux les plus tumultueux de Mantegna, songer, appuyé sur son bouclier, tandis qu’on se précipite et qu’on s’égorge à côté de lui ; détaché du groupe de ses camarades qui s’empressaient autour de Swann, il semblait aussi résolu à se désintéresser de cette scène, qu’il suivait vaguement de ses yeux glauques et cruels, que si ç’eût été le massacre des Innocents ou le martyre de saint Jacques.", "en": "A few steps away, a tall fellow in livery was dreaming, motionless, sculptural, useless, like that purely decorative warrior that we see in Mantegna's most tumultuous paintings, thinking, leaning on his shield, while people rush and slit their throats next to him; detached from the group of his comrades who crowded around Swann, he seemed as determined to lose interest in this scene, which he vaguely followed with his glaucous and cruel eyes, as if it had been the massacre of the Innocents or the martyrdom of Saint James."}, {"start": 840.22, "end": 856.25, "b_start": 1679.82, "b_end": 1716.0, "orig": "Il semblait précisément appartenir à cette race disparue – ou qui peut-être n’exista jamais que dans le retable de San Zeno et les fresques des Eremitani où Swann l’avait approchée et où elle rêve encore – issue de la fécondation d’une statue antique par quelque modèle padouan du Maître ou quelque saxon d’Albert Dürer.", "en": "He seemed to belong precisely to this vanished race - or which perhaps only ever existed in the altarpiece of San Zeno and the frescoes of the Eremitani where Swann had approached her and where she still dreams - resulting from the fertilization of an ancient statue by some Paduan model of the Master or some Saxon of Albert Dürer."}, {"start": 857.25, "end": 889.53, "b_start": 1716.0, "b_end": 1784.75, "orig": "Et les mèches de ses cheveux roux crespelés par la nature, mais collés par la brillantine, étaient largement traitées comme elles sont dans la sculpture grecque qu’étudiait sans cesse le peintre de Mantoue, et qui, si dans la création elle ne figure que l’homme, sait du moins tirer de ses simples formes des richesses si variées et comme empruntées à toute la nature vivante, qu’une chevelure, par l’enroulement lisse et les becs aigus de ses boucles, ou dans la superposition du triple et fleurissant diadème de ses tresses, a l’air à la fois d’un paquet d’algues, d’une nichée de colombes, d’un bandeau de jacinthes et d’une torsade de serpents.", "en": "And the locks of his red hair curled by nature, but glued together by brilliantine, were largely treated as they are in the Greek sculpture that the painter from Mantua constantly studied, and which, if in creation it only figures man, at least knows how to draw from its simple forms riches so varied and as if borrowed from all living nature, that a hair, by the smooth winding and the sharp tips of its curls, or in the superposition of the triple and flowering diadem of her braids, looks at the same time like a bundle of seaweed, a nest of doves, a band of hyacinths and a twist of snakes."}, {"start": 890.53, "end": 907.74, "b_start": 1784.75, "b_end": 1820.42, "orig": "D’autres encore, colossaux aussi, se tenaient sur les degrés d’un escalier monumental que leur présence décorative et leur immobilité marmoréenne auraient pu faire nommer comme celui du Palais Ducal : « l’Escalier des Géants » et dans lequel Swann s’engagea avec la tristesse de penser qu’Odette ne l’avait jamais gravi.", "en": "Still others, also colossal, stood on the steps of a monumental staircase that their decorative presence and their marmoreal immobility could have led to the name of that of the Ducal Palace: \"the Staircase of the Giants\" and which Swann embarked on with the sadness of thinking that Odette had never climbed it."}, {"start": 908.74, "end": 939.74, "b_start": 1820.42, "b_end": 1884.28, "orig": "Ah ! avec quelle joie au contraire il eût grimpé les étages noirs, malodorants et casse-cou de la petite couturière retirée, dans le « cinquième » de laquelle il aurait été si heureux de payer plus cher qu’une avant-scène hebdomadaire à l’Opéra le droit de passer la soirée quand Odette y venait, et même les autres jours, pour pouvoir parler d’elle, vivre avec les gens qu’elle avait l’habitude de voir quand il n’était pas là, et qui à cause de cela lui paraissaient recéler, de la vie de sa maîtresse, quelque chose de plus naturel, de plus inaccessible et de plus mystérieux.", "en": "Ah! with what joy, on the contrary, he would have climbed the dark, smelly and daring floors of the retired little seamstress, in whose \"fifth\" he would have been so happy to pay more than a weekly proscenium at the Opera for the right to spend the evening when Odette came there, and even the other days, to be able to talk about her, to live with the people she was used to seeing when he was not there, and who because of that seemed to her conceal, from the life of his mistress, something more natural, more inaccessible and more mysterious."}, {"start": 940.74, "end": 1005.28, "b_start": 1884.28, "b_end": 2017.87, "orig": "Tandis que dans cet escalier pestilentiel et désiré de l’ancienne couturière, comme il n’y en avait pas un second pour le service, on voyait le soir devant chaque porte une boîte au lait vide et sale préparée sur le paillasson, dans l’escalier magnifique et dédaigné que Swann montait à ce moment, d’un côté et de l’autre, à des hauteurs différentes, devant chaque anfractuosité que faisait dans le mur la fenêtre de la loge, ou la porte d’un appartement, représentant le service intérieur qu’ils dirigeaient et en faisant hommage aux invités, un concierge, un majordome, un argentier (braves gens qui vivaient le reste de la semaine un peu indépendants dans leur domaine, y dînaient chez eux comme de petits boutiquiers et seraient peut-être demain au service bourgeois d’un médecin ou d’un industriel), attentifs à ne pas manquer aux recommandations qu’on leur avait faites avant de leur laisser endosser la livrée éclatante qu’ils ne revêtaient qu’à de rares intervalles et dans laquelle ils ne se sentaient pas très à leur aise, se tenaient sous l’arcature de leur portail avec un éclat pompeux tempéré de bonhomie populaire, comme des saints dans leur niche ; et un énorme suisse, habillé comme à l’église, frappait les dalles de sa canne au passage de chaque arrivant.", "en": "While in this pestilential and desired staircase of the old seamstress, as there was not a second one for the service, we saw in the evening in front of each door an empty and dirty milk box prepared on the doormat, in the magnificent and disdained staircase that Swann was climbing at that moment, on one side and the other, at different heights, in front of each crevice made in the wall by the window of the dressing room, or the door of an apartment, representing the interior service that they managed and paying homage to the guests, a concierge, a butler, a financier (good people who lived the rest of the week somewhat independent in their domain, dined at home like small shopkeepers and would perhaps tomorrow be in the bourgeois service of a doctor or an industrialist), careful not to fail in the recommendations that had been made to them before allowing them to don the dazzling livery that they wore only at rare intervals and in which they did not feel very at ease, stood under the arch of their portal with a pompous brilliance tempered with popular good-naturedness, like saints in their niche; and an enormous Swiss man, dressed as if in church, struck the flagstones with his cane as each arrival passed."}, {"start": 1006.28, "end": 1024.57, "b_start": 2017.87, "b_end": 2057.17, "orig": "Parvenu en haut de l’escalier le long duquel l’avait suivi un domestique à face blême, avec une petite queue de cheveux noués d’un catogan derrière la tête, comme un sacristain de Goya ou un tabellion du répertoire, Swann passa devant un bureau où des valets, assis comme des notaires devant de grands registres, se levèrent et inscrivirent son nom.", "en": "Having reached the top of the staircase along which a pale-faced servant had followed him, with a small tail of hair tied with a ponytail behind his head, like a Goya sacristan or a tabellion in the repertoire, Swann passed in front of a desk where valets, seated like notaries in front of large registers, stood up and wrote down his name."}, {"start": 1025.57, "end": 1075.22, "b_start": 2057.17, "b_end": 2159.98, "orig": "Il traversa alors un petit vestibule qui – tel que certaines pièces aménagées par leur propriétaire pour servir de cadre à une seule œuvre d’art, dont elles tirent leur nom, et d’une nudité voulue, ne contiennent rien d’autre – exhibait à son entrée, comme quelque précieuse effigie de Benvenuto Cellini représentant un homme de guet, un jeune valet de pied, le corps légèrement fléchi en avant, dressant sur son hausse-col rouge une figure plus rouge encore d’où s’échappaient des torrents de feu, de timidité et de zèle, et qui, perçant les tapisseries d’Aubusson tendues devant le salon où on écoutait la musique, de son regard impétueux, vigilant, éperdu, avait l’air, avec une impassibilité militaire ou une foi surnaturelle – allégorie de l’alarme, incarnation de l’attente, commémoration du branle-bas – d’épier, ange ou vigie, d’une tour de donjon ou de cathédrale, l’apparition de l’ennemi ou l’heure du Jugement.", "en": "He then crossed a small vestibule which - like certain rooms fitted out by their owner to serve as a setting for a single work of art, from which they take their name, and from a deliberate nudity, contained nothing else - exhibited at its entrance, like some precious effigy of Benvenuto Cellini representing a watchman, a young footman, his body slightly bent forward, raising on his red gorget an even redder figure from which escaped torrents of fire, timidity and zeal, and who, piercing the Aubusson tapestries hung in front of the living room where the music was listened to, with his impetuous, vigilant, distraught gaze, seemed, with a military impassivity or a supernatural faith - allegory of alarm, incarnation of waiting, commemoration of the commotion - of spying, angel or lookout, of a dungeon tower or of cathedral, the appearance of the enemy or the hour of Judgment."}, {"start": 1076.22, "end": 1085.75, "b_start": 2159.98, "b_end": 2181.04, "orig": "Il ne restait plus à Swann qu’à pénétrer dans la salle du concert dont un huissier chargé de chaînes lui ouvrit les portes, en s’inclinant, comme il lui aurait remis les clefs d’une ville.", "en": "All that remained for Swann was to enter the concert hall, where an usher loaded with chains opened the doors for him, bowing, as if he were giving him the keys to a city."}, {"start": 1086.75, "end": 1096.57, "b_start": 2181.04, "b_end": 2201.83, "orig": "Mais il pensait à la maison où il aurait pu se trouver en ce moment même, si Odette l’avait permis, et le souvenir entrevu d’une boîte au lait vide sur un paillasson lui serra le cœur.", "en": "But he thought of the house where he might have been at this very moment, if Odette had allowed it, and the glimpsed memory of an empty milk box on a doormat tugged at his heart."}, {"start": 1097.57, "end": 1107.38, "b_start": 2201.83, "b_end": 2222.46, "orig": "Swann retrouva rapidement le sentiment de la laideur masculine, quand, au delà de la tenture de tapisserie, au spectacle des domestiques succéda celui des invités.", "en": "Swann quickly rediscovered the feeling of masculine ugliness, when, beyond the tapestry, the spectacle of the servants was followed by that of the guests."}, {"start": 1108.38, "end": 1129.7, "b_start": 2222.46, "b_end": 2268.53, "orig": "Mais cette laideur même de visages, qu’il connaissait pourtant si bien, lui semblait neuve depuis que leurs traits – au lieu d’être pour lui des signes pratiquement utilisables à l’identification de telle personne qui lui avait représenté jusque-là un faisceau de plaisirs à poursuivre, d’ennuis à éviter, ou de politesses à rendre – reposaient, coordonnés seulement par des rapports esthétiques, dans l’autonomie de leurs lignes.", "en": "But this very ugliness of faces, which he knew so well, seemed new to him since their features - instead of being for him practically usable signs for the identification of a particular person who had until then represented to him a bundle of pleasures to pursue, of troubles to avoid, or of politeness to return - rested, coordinated only by aesthetic relationships, in the autonomy of their lines."}, {"start": 1130.7, "end": 1149.13, "b_start": 2268.53, "b_end": 2307.16, "orig": "Et en ces hommes, au milieu desquels Swann se trouva enserré, il n’était pas jusqu’aux monocles que beaucoup portaient (et qui, autrefois, auraient tout au plus permis à Swann de dire qu’ils portaient un monocle), qui, déliés maintenant de signifier une habitude, la même pour tous, ne lui apparussent chacun avec une sorte d’individualité.", "en": "And among these men, among whom Swann found himself surrounded, it was not even the monocles that many wore (and which, in the past, would have at most allowed Swann to say that they wore a monocle), which, freed now from signifying a habit, the same for all, did not each appear to him with a sort of individuality."}, {"start": 1150.13, "end": 1241.52, "b_start": 2307.16, "b_end": 2494.2, "orig": "Peut-être parce qu’il ne regarda le général de Froberville et le marquis de Bréauté qui causaient dans l’entrée que comme deux personnages dans un tableau, alors qu’ils avaient été longtemps pour lui les amis utiles qui l’avaient présenté au Jockey et assisté dans des duels, le monocle du général, resté entre ses paupières comme un éclat d’obus dans sa figure vulgaire, balafrée et triomphale, au milieu du front qu’il éborgnait comme l’œil unique du cyclope, apparut à Swann comme une blessure monstrueuse qu’il pouvait être glorieux d’avoir reçue, mais qu’il était indécent d’exhiber ; tandis que celui que M. de Bréauté ajoutait, en signe de festivité, aux gants gris perle, au « gibus », à la cravate blanche et substituait au binocle familier (comme faisait Swann lui-même) pour aller dans le monde, portait collé à son revers, comme une préparation d’histoire naturelle sous un microscope, un regard infinitésimal et grouillant d’amabilité, qui ne cessait de sourire à la hauteur des plafonds, à la beauté des fêtes, à l’intérêt des programmes et à la qualité des rafraîchissements.\n– Tiens, vous voilà, mais il y a des éternités qu’on ne vous a vu, dit à Swann le général qui, remarquant ses traits tirés et en concluant que c’était peut-être une maladie grave qui l’éloignait du monde, ajouta : « Vous avez bonne mine, vous savez ! » pendant que M. de Bréauté demandait :\n– Comment, vous, mon cher, qu’est-ce que vous pouvez bien faire ici ? à un romancier mondain qui venait d’installer au coin de son œil un monocle, son seul organe d’investigation psychologique et d’impitoyable analyse, et répondit d’un air important et mystérieux, en roulant l’r :\n– J’observe.", "en": "Perhaps because he only looked at General de Froberville and the Marquis de Bréauté who were chatting in the hall like two characters in a painting, even though they had long been useful friends for him who had introduced him to the Jockey and assisted him in duels, the general's monocle remained between his eyelids like a shrapnel in his vulgar face, scarred and triumphant, in the middle of the forehead which he blinded like the eye. unique to the Cyclops, appeared to Swann as a monstrous wound which it might be glorious to have received, but which it was indecent to exhibit; while the one that Mr. de Bréauté added, as a sign of festivity, to the pearl gray gloves, to the \"gibus\", to the white tie and substituted for the familiar binoculars (as Swann himself did) when going out into society, wore stuck to his lapel, like a natural history preparation under a microscope, an infinitesimal look teeming with amiability, which never ceased to smile at the height of the ceilings, at the beauty of the festivals, at the interest of the programs and to the quality of the refreshments. – Well, there you are, but it’s been ages since you’ve been seen, said the general to Swann, who, noticing his drawn features and concluding that it was perhaps a serious illness that kept him away from the world, added: “You look good, you know! » while M. de Bréauté asked: – How can you, my dear fellow, what can you possibly be doing here? to a society novelist who had just installed a monocle in the corner of his eye, his only organ of psychological investigation and merciless analysis, and replied with an important and mysterious air, rolling his r: – I observe."}, {"start": 1242.52, "end": 1262.63, "b_start": 2494.2, "b_end": 2535.8, "orig": "Le monocle du marquis de Forestelle était minuscule, n’avait aucune bordure et, obligeant à une crispation incessante et douloureuse l’œil où il s’incrustait comme un cartilage superflu dont la présence est inexplicable et la matière recherchée, il donnait au visage du marquis une délicatesse mélancolique, et le faisait juger par les femmes comme capable de grands chagrins d’amour.", "en": "The Marquis de Forestelle's monocle was tiny, had no border and, forcing an incessant and painful contraction of the eye where it was embedded like superfluous cartilage whose presence is inexplicable and the material sought after, it gave the Marquis's face a melancholic delicacy, and made him judge by women as capable of great heartache."}, {"start": 1263.63, "end": 1319.29, "b_start": 2535.8, "b_end": 2653.27, "orig": "Mais celui de M. de Saint-Candé, entouré d’un gigantesque anneau, comme Saturne, était le centre de gravité d’une figure qui s’ordonnait à tout moment par rapport à lui, dont le nez frémissant et rouge et la bouche lippue et sarcastique tâchaient par leurs grimaces d’être à la hauteur des feux roulants d’esprit dont étincelait le disque de verre, et se voyait préférer aux plus beaux regards du monde par des jeunes femmes snobs et dépravées qu’il faisait rêver de charmes artificiels et d’un raffinement de volupté ; et cependant, derrière le sien, M. de Palancy qui, avec sa grosse tête de carpe aux yeux ronds, se déplaçait lentement au milieu des fêtes en desserrant d’instant en instant ses mandibules comme pour chercher son orientation, avait l’air de transporter seulement avec lui un fragment accidentel, et peut-être purement symbolique, du vitrage de son aquarium, partie destinée à figurer le tout qui rappela à Swann, grand admirateur des Vices et des Vertus de Giotto à Padoue, cet Injuste à côté duquel un rameau feuillu évoque les forêts où se cache son repaire.", "en": "But that of Mr. de Saint-Candé, surrounded by a gigantic ring, like Saturn, was the center of gravity of a figure which was ordered at all times in relation to him, whose quivering and red nose and the lippy and sarcastic mouth tried through their grimaces to be at the height of the rolling lights of spirit with which the glass disk sparkled, and was preferred to the most beautiful looks in the world by snobbish and young women. depraved that he made people dream of artificial charms and a refinement of voluptuousness; and yet, behind his, Mr. de Palancy who, with his big carp head with round eyes, moved slowly among the parties, unclenching his mandibles from moment to moment as if to find his direction, seemed to be carrying with him only an accidental, and perhaps purely symbolic, fragment of the glazing of his aquarium, a part intended to represent the whole which reminded Swann, a great admirer of the Vices and Virtues of Giotto in Padua, this Unjust One beside whom a leafy branch evokes the forests where his lair is hidden."}, {"start": 1320.29, "end": 1373.81, "b_start": 2653.27, "b_end": 2758.98, "orig": "Swann s’était avancé, sur l’insistance de M\nme\nde Saint-Euverte et pour entendre un air d’Orphée qu’exécutait un flûtiste, s’était mis dans un coin où il avait malheureusement comme seule perspective deux dames déjà mûres assises l’une à côté de l’autre, la marquise de Cambremer et la vicomtesse de Franquetot, lesquelles, parce qu’elles étaient cousines, passaient leur temps dans les soirées, portant leurs sacs et suivies de leurs filles, à se chercher comme dans une gare et n’étaient tranquilles que quand elles avaient marqué, par leur éventail ou leur mouchoir, deux places voisines : M\nme\nde Cambremer, comme elle avait très peu de relations, étant d’autant plus heureuse d’avoir une compagne, M\nme\nde Franquetot, qui était au contraire très lancée, trouvait quelque chose d’élégant, d’original, à montrer à toutes ses belles connaissances qu’elle leur préférait une dame obscure avec qui elle avait en commun des souvenirs de jeunesse.", "en": "Swann had moved forward, at the insistence of Madame de Saint-Euverte and to hear an aria from Orpheus being performed by a flautist, had placed himself in a corner where his only perspective was unfortunately two already mature ladies seated next to each other, the Marquise de Cambremer and the Viscountess de Franquetot, who, because they were cousins, spent their time in the evenings, wearing their bags and followed by their daughters, looking for each other as in a train station and were only at ease when they had marked, with their fan or their handkerchief, two neighboring places: Ms. de Cambremer, as she had very few connections, being all the more happy to have a companion, Ms. de Franquetot, who was on the contrary very active, found something elegant, original, in showing all her beautiful acquaintances that she preferred an obscure lady with whom she had in common youthful memories."}, {"start": 1374.81, "end": 1438.34, "b_start": 2758.98, "b_end": 2886.29, "orig": "Plein d’une mélancolique ironie, Swann les regardait écouter l’intermède de piano (« Saint François parlant aux oiseaux », de Liszt) qui avait succédé à l’air de flûte, et suivre le jeu vertigineux du virtuose, M\nme\nde Franquetot anxieusement, les yeux éperdus comme si les touches sur lesquelles il courait avec agilité avaient été une suite de trapèzes d’où il pouvait tomber d’une hauteur de quatre-vingts mètres, et non sans lancer à sa voisine des regards d’étonnement, de dénégation qui signifiaient : « Ce n’est pas croyable, je n’aurais jamais pensé qu’un homme pût faire cela », M\nme\nde Cambremer, en femme qui a reçu une forte éducation musicale, battant la mesure avec sa tête transformée en balancier de métronome dont l’amplitude et la rapidité d’oscillations d’une épaule à l’autre étaient devenues telles (avec cette espèce d’égarement et d’abandon du regard qu’ont les douleurs qui ne se connaissent plus ni ne cherchent à se maîtriser et disent : « Que voulez-vous ! ») qu’à tout moment elle accrochait avec ses solitaires les pattes de son corsage et était obligée de redresser les raisins noirs qu’elle avait dans les cheveux, sans cesser pour cela d’accélérer le mouvement.", "en": "Full of melancholy irony, Swann watched them listen to the piano interlude (“Saint Francis speaking to the birds”, by Liszt) which had followed the flute tune, and followed the dizzying playing of the virtuoso, Ms. de Franquetot anxiously, her eyes wild as if the keys over which he ran with agility had been a series of trapezoids from which he could fall from a height of eighty meters, and not without giving her neighbor looks of astonishment, of denial which meant: \"It's not credible, I would never have thought that a man could do that\", Mme de Cambremer, as a woman who received a strong musical education, beating time with her head transformed into a metronome pendulum whose amplitude and speed of oscillations from one shoulder to the other had become such (with this species of bewilderment and abandonment of the gaze that pains have which no longer know themselves nor seek to control themselves and say: “What do you want!”) that at any moment she caught the tabs of her bodice with her solitaires and was obliged to straighten the black grapes that she had in her hair, without ceasing to accelerate the movement."}, {"start": 1439.34, "end": 1464.68, "b_start": 2886.29, "b_end": 2937.64, "orig": "De l’autre côté de M\nme\nde Franquetot, mais un peu en avant, était la marquise de Gallardon, occupée à sa pensée favorite, l’alliance qu’elle avait avec les Guermantes et d’où elle tirait pour le monde et pour elle-même beaucoup de gloire avec quelque honte, les plus brillants d’entre eux la tenant un peu à l’écart, peut-être parce qu’elle était ennuyeuse, ou parce qu’elle était méchante, ou parce qu’elle était d’une branche inférieure, ou peut-être sans aucune raison.", "en": "On the other side of Madame de Franquetot, but a little in front, was the Marquise de Gallardon, occupied with her favorite thought, the alliance she had with the Guermantes and from which she drew for the world and for herself a lot of glory with some shame, the most brilliant of them keeping her a little aside, perhaps because she was boring, or because she was wicked, or because she was of a branch inferior, or perhaps for no reason at all."}, {"start": 1465.68, "end": 1490.52, "b_start": 2937.64, "b_end": 2987.52, "orig": "Quand elle se trouvait auprès de quelqu’un qu’elle ne connaissait pas, comme en ce moment auprès de M\nme\nde Franquetot, elle souffrait que la conscience qu’elle avait de sa parenté avec les Guermantes ne pût se manifester extérieurement en caractères visibles comme ceux qui, dans les mosaïques des églises byzantines, placés les uns au-dessous des autres, inscrivent en une colonne verticale, à côté d’un Saint Personnage, les mots qu’il est censé prononcer.", "en": "When she found herself near someone she did not know, as at the moment with Madame de Franquetot, she suffered from the fact that the awareness she had of her kinship with the Guermantes could not manifest itself externally in visible characters like those which, in the mosaics of Byzantine churches, placed one below the other, inscribe in a vertical column, next to a Holy Personage, the words he is supposed to pronounce."}, {"start": 1491.52, "end": 1500.21, "b_start": 2987.52, "b_end": 3007.69, "orig": "Elle songeait en ce moment qu’elle n’avait jamais reçu une invitation ni une visite de sa jeune cousine la princesse des Laumes, depuis six ans que celle-ci était mariée.", "en": "She was thinking at that moment that she had never received an invitation or a visit from her young cousin, the Princess of Laumes, in the six years that she had been married."}, {"start": 1501.21, "end": 1523.14, "b_start": 3007.69, "b_end": 3051.48, "orig": "Cette pensée la remplissait de colère, mais aussi de fierté ; car, à force de dire aux personnes qui s’étonnaient de ne pas la voir chez M\nme\ndes Laumes, que c’est parce qu’elle aurait été exposée à y rencontrer la princesse Mathilde – ce que sa famille ultra-légitimiste ne lui aurait jamais pardonné – elle avait fini par croire que c’était en effet la raison pour laquelle elle n’allait pas chez sa jeune cousine.", "en": "The thought filled her with anger, but also pride; because, by telling people who were surprised not to see her at Madame des Laumes's, that it was because she would have been exposed to meeting Princess Mathilde there - something her ultra-legitimist family would never have forgiven her - she ended up believing that this was in fact the reason why she did not go to her young cousin's house."}, {"start": 1524.14, "end": 1556.06, "b_start": 3051.48, "b_end": 3115.96, "orig": "Elle se rappelait pourtant qu’elle avait demandé plusieurs fois à M\nme\ndes Laumes comment elle pourrait faire pour la rencontrer, mais ne se le rappelait que confusément et d’ailleurs neutralisait et au delà ce souvenir un peu humiliant en murmurant : « Ce n’est tout de même pas à moi à faire les premiers pas, j’ai vingt ans de plus qu’elle. » Grâce à la vertu de ces paroles intérieures, elle rejetait fièrement en arrière ses épaules détachées de son buste et sur lesquelles sa tête posée presque horizontalement faisait penser à la tête « rapportée » d’un orgueilleux faisan qu’on sert sur une table avec toutes ses plumes.", "en": "She remembered, however, that she had asked Madame des Laumes several times how she could go about meeting her, but only remembered it vaguely and moreover neutralized and beyond this somewhat humiliating memory by murmuring: \"It's not up to me to take the first steps, I'm twenty years older than her. » Thanks to the virtue of these interior words, she proudly threw back her shoulders, detached from her bust and on which her head placed almost horizontally was reminiscent of the “brought back” head of a proud pheasant which is served on a table with all its feathers."}, {"start": 1557.06, "end": 1570.05, "b_start": 3115.96, "b_end": 3143.06, "orig": "Ce n’est pas qu’elle ne fût par nature courtaude, hommasse et boulotte ; mais les camouflets l’avaient redressée comme ces arbres qui, nés dans une mauvaise position au bord d’un précipice, sont forcés de croître en arrière pour garder leur équilibre.", "en": "It’s not that she wasn’t by nature short, manly and plump; but the snubs had straightened it out like those trees which, born in a bad position on the edge of a precipice, are forced to grow backwards to keep their balance."}, {"start": 1571.05, "end": 1591.42, "b_start": 3143.06, "b_end": 3187.26, "orig": "Obligée, pour se consoler de ne pas être tout à fait l’égale des autres Guermantes, de se dire sans cesse que c’était par intransigeance de principes et fierté qu’elle les voyait peu, cette pensée avait fini par modeler son corps et par lui enfanter une sorte de prestance qui passait aux yeux des bourgeoises pour un signe de race et troublait quelquefois d’un désir fugitif le regard fatigué des hommes de cercle.", "en": "Forced, to console herself for not being quite the equal of the other Guermantes, to constantly tell herself that it was through intransigence of principles and pride that she saw them so little, this thought had ended up shaping her body and giving her a sort of presence which passed in the eyes of bourgeois women for a sign of race and sometimes disturbed the tired gaze of the men of the circle with a fleeting desire."}, {"start": 1592.42, "end": 1617.05, "b_start": 3187.26, "b_end": 3237.91, "orig": "Si on avait fait subir à la conversation de M\nme\nde Gallardon ces analyses qui en relevant la fréquence plus ou moins grande de chaque terme permettent de découvrir la clef d’un langage chiffré, on se fût rendu compte qu’aucune expression, même la plus usuelle, n’y revenait aussi souvent que « chez mes cousins de Guermantes », « chez ma tante de Guermantes », « la santé d’Elzéar de Guermantes », « la baignoire de ma cousine de Guermantes ».", "en": "If we had subjected Ms. de Gallardon's conversation to these analyzes which, by noting the greater or lesser frequency of each term, make it possible to discover the key to a ciphered language, we would have realized that no expression, even the most usual, recurred there as often as \"at my cousins ​​in Guermantes,\" \"at my aunt in Guermantes,\" \"the health of Elzéar de Guermantes,\" \"the bathtub of my cousin in Guermantes.\""}, {"start": 1618.05, "end": 1644.35, "b_start": 3237.91, "b_end": 3293.8, "orig": "Quand on lui parlait d’un personnage illustre, elle répondait que, sans le connaître personnellement, elle l’avait rencontré mille fois chez sa tante de Guermantes, mais elle répondait cela d’un ton si glacial et d’une voix si sourde qu’il était clair que si elle ne le connaissait pas personnellement, c’était en vertu de tous les principes indéracinables et entêtés auxquels ses épaules touchaient en arrière, comme à ces échelles sur lesquelles les professeurs de gymnastique vous font étendre pour vous développer le thorax.", "en": "When we spoke to her of an illustrious personage, she replied that, without knowing him personally, she had met him a thousand times at her aunt's house in Guermantes, but she replied this in such an icy tone and in such a dull voice that it was clear that if she did not know him personally, it was by virtue of all the ineradicable and stubborn principles to which her shoulders touched behind, like those ladders on which gymnastics teachers make you lie down to develop your strength. thorax."}, {"start": 1645.35, "end": 1654.66, "b_start": 3293.8, "b_end": 3312.14, "orig": "Or, la princesse des Laumes, qu’on ne se serait pas attendu à voir chez M\nme\nde Saint-Euverte, venait précisément d’arriver.", "en": "Now, the Princess des Laumes, whom one would not have expected to see at Madame de Saint-Euverte's, had just arrived."}, {"start": 1655.66, "end": 1702.01, "b_start": 3312.14, "b_end": 3405.3, "orig": "Pour montrer qu’elle ne cherchait pas à faire sentir dans un salon, où elle ne venait que par condescendance, la supériorité de son rang, elle était entrée en effaçant les épaules là même où il n’y avait aucune foule à fendre et personne à laisser passer, restant exprès dans le fond, de l’air d’y être à sa place, comme un roi qui fait la queue à la porte d’un théâtre tant que les autorités n’ont pas été prévenues qu’il est là ; et, bornant simplement son regard – pour ne pas avoir l’air de signaler sa présence et de réclamer des égards – à la considération d’un dessin du tapis ou de sa propre jupe, elle se tenait debout à l’endroit qui lui avait paru le plus modeste (et d’où elle savait bien qu’une exclamation ravie de M\nme\nde Saint-Euverte allait la tirer dès que celle-ci l’aurait aperçue), à côté de M\nme\nde Cambremer qui lui était inconnue.", "en": "To show that she was not trying to make the superiority of her rank felt in a salon, where she only came out of condescension, she had entered with her shoulders effaced, even where there was no crowd to break through and no one to let pass, remaining purposely in the back, with the air of being in her place, like a king waiting in line at the door of a theater until the authorities have been informed that he is there; and, simply limiting her gaze - so as not to appear to be signaling her presence and demanding attention - to the consideration of a design on the carpet or of her own skirt, she stood in the place which had seemed the most modest to her (and from which she knew well that a delighted exclamation from Madame de Saint-Euverte would pull her away as soon as she saw her), next to Madame de Cambremer who was unknown to her."}, {"start": 1703.01, "end": 1707.62, "b_start": 3405.3, "b_end": 3417.14, "orig": "Elle observait la mimique de sa voisine mélomane, mais ne l’imitait pas.", "en": "She observed the facial expression of her music-loving neighbor, but did not imitate it."}, {"start": 1708.62, "end": 1722.25, "b_start": 3417.14, "b_end": 3445.43, "orig": "Ce n’est pas que, pour une fois qu’elle venait passer cinq minutes chez M\nme\nde Saint-Euverte, la princesse des Laumes n’eût souhaité, pour que la politesse qu’elle lui faisait comptât double, se montrer le plus aimable possible.", "en": "It was not that, for once when she came to spend five minutes at Madame de Saint-Euverte's, the Princess des Laumes would not have wished, so that the politeness she gave her would count double, to show herself as amiable as possible."}, {"start": 1723.25, "end": 1746.74, "b_start": 3445.43, "b_end": 3494.69, "orig": "Mais par nature, elle avait horreur de ce qu’elle appelait « les exagérations » et tenait à montrer qu’elle « n’avait pas à » se livrer à des manifestations qui n’allaient pas avec le « genre » de la coterie où elle vivait, mais qui pourtant d’autre part ne laissaient pas de l’impressionner, à la faveur de cet esprit d’imitation voisin de la timidité que développe, chez les gens les plus sûrs d’eux-mêmes, l’ambiance d’un milieu nouveau, fût-il inférieur.", "en": "But by nature, she had a horror of what she called \"exaggerations\" and wanted to show that she \"did not have to\" indulge in manifestations which did not go with the \"genre\" of the coterie in which she lived, but which nevertheless on the other hand did not fail to impress her, thanks to this spirit of imitation close to the shyness which develops, in the most self-confident people, the atmosphere of an environment new, even if inferior."}, {"start": 1747.74, "end": 1790.25, "b_start": 3494.69, "b_end": 3582.42, "orig": "Elle commençait à se demander si cette gesticulation n’était pas rendue nécessaire par le morceau qu’on jouait et qui ne rentrait peut-être pas dans le cadre de la musique qu’elle avait entendue jusqu’à ce jour, si s’abstenir n’était pas faire preuve d’incompréhension à l’égard de l’œuvre et d’inconvenance vis-à-vis de la maîtresse de la maison : de sorte que pour exprimer par une « cote mal taillée » ses sentiments contradictoires, tantôt elle se contentait de remonter la bride de ses épaulettes ou d’assurer dans ses cheveux blonds les petites boules de corail ou d’émail rose, givrées de diamant, qui lui faisaient une coiffure simple et charmante, en examinant avec une froide curiosité sa fougueuse voisine, tantôt de son éventail elle battait pendant un instant la mesure, mais, pour ne pas abdiquer son indépendance, à contretemps.", "en": "She began to wonder if this gesticulation was not made necessary by the piece that was being played and which perhaps did not fit within the framework of the music she had heard up to that day, if to abstain was not to show incomprehension with regard to the work and impropriety towards the mistress of the house: so that in order to express with a \"poorly cut note\" her contradictory feelings, sometimes she contented herself with raising the strap of her epaulettes or securing in her blond hair the little balls of coral or pink enamel, frosted with diamonds, which gave her a simple and charming hairstyle, while examining with cold curiosity her fiery neighbor, sometimes with her fan she beat time for a moment, but, so as not to abdicate her independence, out of time."}, {"start": 1791.25, "end": 1807.06, "b_start": 3582.42, "b_end": 3611.35, "orig": "Le pianiste ayant terminé le morceau de Liszt et ayant commencé un prélude de Chopin, M\nme\nde Cambremer lança à M\nme\nde Franquetot un sourire attendri de satisfaction compétente et d’allusion au passé.", "en": "The pianist having finished the piece by Liszt and having begun a prelude by Chopin, Ms. de Cambremer gave Ms. de Franquetot a tender smile of competent satisfaction and allusion to the past."}, {"start": 1808.06, "end": 1837.42, "b_start": 3611.35, "b_end": 3672.78, "orig": "Elle avait appris dans sa jeunesse à caresser les phrases, au long col sinueux et démesuré, de Chopin, si libres, si flexibles, si tactiles, qui commencent par chercher et essayer leur place en dehors et bien loin de la direction de leur départ, bien loin du point où on avait pu espérer qu’atteindrait leur attouchement, et qui ne se jouent dans cet écart de fantaisie que pour revenir plus délibérément – d’un retour plus prémédité, avec plus de précision, comme sur un cristal qui résonnerait jusqu’à faire crier – vous frapper au cœur.", "en": "She had learned in her youth to caress the phrases, with their long, sinuous and disproportionate neck, of Chopin, so free, so flexible, so tactile, which begin by seeking and trying their place outside and far from the direction of their departure, far from the point where one could have hoped that their touch would reach, and which play in this gap of fantasy only to return more deliberately - with a more premeditated return, with more precision, as on a crystal which would resonate until you scream – hit you in the heart."}, {"start": 1838.42, "end": 1866.88, "b_start": 3672.78, "b_end": 3733.78, "orig": "Vivant dans une famille provinciale qui avait peu de relations, n’allant guère au bal, elle s’était grisée dans la solitude de son manoir, à ralentir, à précipiter la danse de tous ces couples imaginaires, à les égrener comme des fleurs, à quitter un moment le bal pour entendre le vent souffler dans les sapins, au bord du lac, et à y voir tout d’un coup s’avancer, plus différent de tout ce qu’on a jamais rêvé que ne sont les amants de la terre, un mince jeune homme à la voix un peu chantante, étrangère et fausse, en gants blancs.", "en": "Living in a provincial family that had few connections, rarely going to balls, she had become intoxicated in the solitude of her manor, slowing down, hastening the dance of all these imaginary couples, scattering them like flowers, leaving the ball for a moment to hear the wind blowing in the fir trees, by the lake, and suddenly seeing everything coming forward, more different from everything one has ever dreamed of than the lovers of the earth, a thin young man with a slightly singing voice, foreign and false, in white gloves."}, {"start": 1867.88, "end": 1881.46, "b_start": 3733.78, "b_end": 3764.0, "orig": "Mais aujourd’hui la beauté démodée de cette musique semblait défraîchie. Privée depuis quelques années de l’estime des connaisseurs, elle avait perdu son honneur et son charme et ceux mêmes dont le goût est mauvais n’y trouvaient plus qu’un plaisir inavoué et médiocre.", "en": "But today the old-fashioned beauty of this music seemed faded. Deprived for several years of the esteem of connoisseurs, it had lost its honor and its charm and even those whose taste is bad found only an unacknowledged and mediocre pleasure in it."}, {"start": 1882.46, "end": 1888.51, "b_start": 3764.0, "b_end": 3775.51, "orig": "M\nme\nde Cambremer jeta un regard furtif derrière elle.", "en": "Madame de Cambremer cast a furtive glance behind her."}, {"start": 1889.51, "end": 1904.03, "b_start": 3775.51, "b_end": 3805.14, "orig": "Elle savait que sa jeune bru (pleine de respect pour sa nouvelle famille, sauf en ce qui touchait les choses de l’esprit sur lesquelles, sachant jusqu’à l’harmonie et jusqu’au grec, elle avait des lumières spéciales) méprisait Chopin et souffrait quand elle en entendait jouer.", "en": "She knew that her young daughter-in-law (full of respect for her new family, except in matters of the spirit on which, knowing even harmony and Greek, she had special knowledge) despised Chopin and suffered when she heard him played."}, {"start": 1905.03, "end": 1919.62, "b_start": 3805.14, "b_end": 3833.42, "orig": "Mais loin de la surveillance de cette wagnérienne qui était plus loin avec un groupe de personnes de son âge, M\nme\nde Cambremer se laissait aller à des impressions délicieuses. La princesse des Laumes les éprouvait aussi.", "en": "But far from the surveillance of this Wagnerian who was further away with a group of people of her age, Ms. de Cambremer indulged in delicious impressions. The Princess of Laumes also felt them."}, {"start": 1920.62, "end": 1937.28, "b_start": 3833.42, "b_end": 3869.65, "orig": "Sans être par nature douée pour la musique, elle avait reçu il y a quinze ans les leçons qu’un professeur de piano du faubourg Saint-Germain, femme de génie qui avait été à la fin de sa vie réduite à la misère, avait recommencé, à l’âge de soixante-dix ans, à donner aux filles et aux petites-filles de ses anciennes élèves.", "en": "Without being naturally gifted for music, fifteen years ago she had received the lessons that a piano teacher from the Faubourg Saint-Germain, a woman of genius who had been reduced to poverty at the end of her life, had begun again, at the age of seventy, to give to the daughters and granddaughters of her former students."}, {"start": 1938.28, "end": 1952.34, "b_start": 3869.65, "b_end": 3899.76, "orig": "Elle était morte aujourd’hui. Mais sa méthode, son beau son, renaissaient parfois sous les doigts de ses élèves, même de celles qui étaient devenues pour le reste des personnes médiocres, avaient abandonné la musique et n’ouvraient presque plus jamais un piano.", "en": "She was dead today. But his method, his beautiful sound, was sometimes reborn under the fingers of his students, even those who had otherwise become mediocre people, had abandoned music and almost never opened a piano again."}, {"start": 1953.34, "end": 1969.28, "b_start": 3899.76, "b_end": 3931.86, "orig": "Aussi M\nme\ndes Laumes put-elle secouer la tête, en pleine connaissance de cause, avec une appréciation juste de la façon dont le pianiste jouait ce prélude qu’elle savait par cœur. La fin de la phrase commencée chanta d’elle-même sur ses lèvres.", "en": "So Mme des Laumes was able to shake her head, in full knowledge of the facts, with a fair appreciation of the way in which the pianist played this prelude which she knew by heart. The end of the sentence he had begun sang of itself on his lips."}, {"start": 1970.28, "end": 1992.12, "b_start": 3931.86, "b_end": 3971.42, "orig": "Et elle murmura « c’est toujours\nch\narmant », avec un double\nch\nau commencement du mot qui était une marque de délicatesse et dont elle sentait ses lèvres si romanesquement froissées comme une belle fleur, qu’elle harmonisa instinctivement son regard avec elles en lui donnant à ce moment-là une sorte de sentimentalité et de vague.", "en": "And she murmured \"it's always charming\", with a double ch at the beginning of the word which was a mark of delicacy and which she felt her lips so romantically wrinkled like a beautiful flower, that she instinctively harmonized her look with them giving it at that moment a sort of sentimentality and vagueness."}, {"start": 1993.12, "end": 2009.01, "b_start": 3971.42, "b_end": 4003.84, "orig": "Cependant M\nme\nde Gallardon était en train de se dire qu’il était fâcheux qu’elle n’eût que bien rarement l’occasion de rencontrer la princess
