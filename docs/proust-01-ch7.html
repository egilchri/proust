        <title>À la recherche du temps perdu I – Chapter 7</title>
        
        
        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 28.1, "b_start": 0.0, "b_end": 55.52, "orig": "Pour faire partie du « petit noyau », du « petit groupe », du « petit clan » des Verdurin, une condition était suffisante mais elle était nécessaire : il fallait adhérer tacitement à un Credo dont un des articles était que le jeune pianiste, protégé par M\nme\nVerdurin cette année-là et dont elle disait : « Ça ne devrait pas être permis de savoir jouer Wagner comme ça ! », « enfonçait » à la fois Planté et Rubinstein et que le docteur Cottard avait plus de diagnostic que Potain.", "en": "To be part of the “small nucleus”, the “small group”, the “small clan” of the Verdurins, one condition was sufficient but it was necessary: ​​one had to tacitly adhere to a Credo, one of the articles of which was that the young pianist, protected by Mme Verdurin that year and of whom she said: “It should not be allowed to know how to play Wagner like that! », “punched” both Planté and Rubinstein and that Doctor Cottard had more diagnosis than Potain."}, {"start": 29.1, "end": 38.66, "b_start": 55.52, "b_end": 75.91, "orig": "Toute « nouvelle recrue » à qui les Verdurin ne pouvaient pas persuader que les soirées des gens qui n’allaient pas chez eux étaient ennuyeuses comme la pluie, se voyait immédiatement exclue.", "en": "Any “new recruit” to whom the Verdurins could not persuade that the evenings of people who did not go to their house were as boring as rain, was immediately excluded."}, {"start": 39.66, "end": 60.9, "b_start": 75.91, "b_end": 121.86, "orig": "Les femmes étant à cet égard plus rebelles que les hommes à déposer toute curiosité mondaine et l’envie de se renseigner par soi-même sur l’agrément des autres salons, et les Verdurin sentant d’autre part que cet esprit d’examen et ce démon de frivolité pouvaient par contagion devenir fatal à l’orthodoxie de la petite église, ils avaient été amenés à rejeter successivement tous les « fidèles » du sexe féminin.", "en": "Women being in this respect more rebellious than men in putting aside all worldly curiosity and the desire to find out for oneself about the amenities of other salons, and the Verdurins feeling on the other hand that this spirit of examination and this demon of frivolity could by contagion become fatal to the orthodoxy of the little church, they were led to successively reject all the \"faithful\" of the female sex."}, {"start": 61.9, "end": 111.86, "b_start": 121.86, "b_end": 218.81, "orig": "En dehors de la jeune femme du docteur, ils étaient réduits presque uniquement cette année-là (bien que M\nme\nVerdurin fût elle-même vertueuse et d’une respectable famille bourgeoise excessivement riche et entièrement obscure avec laquelle elle avait peu à peu cessé toute relation) à une personne presque du demi-monde, M\nme\nde Crécy, que M\nme\nVerdurin appelait par son petit nom, Odette, et déclarait être « un amour », et à la tante du pianiste, laquelle devait avoir tiré le cordon ; personnes ignorantes du monde et à la naïveté de qui il avait été si facile de faire accroire que la princesse de Sagan et la duchesse de Guermantes étaient obligées de payer des malheureux pour avoir du monde à leurs dîners, que si on leur avait offert de les faire inviter chez ces deux grandes dames, l’ancienne concierge et la cocotte eussent dédaigneusement refusé.", "en": "Apart from the doctor's young wife, they were reduced almost solely that year (although Mme Verdurin was herself virtuous and from a respectable, excessively rich and entirely obscure bourgeois family with whom she had gradually ceased all relations) to a person almost from the demi-monde, Mme de Crécy, whom Mme Verdurin called by her nickname, Odette, and declared to be \"a sweetheart\", and to the pianist's aunt, who must have pulled the cord; people ignorant of the world and whose naivety it had been so easy to make believe that the Princess of Sagan and the Duchess of Guermantes were obliged to pay unfortunate people to have people at their dinners, that if they had been offered to invite them to the home of these two great ladies, the former concierge and the cocotte would have disdainfully refused."}, {"start": 112.86, "end": 127.5, "b_start": 218.81, "b_end": 249.61, "orig": "Les Verdurin n’invitaient pas à dîner : on avait chez eux « son couvert mis ». Pour la soirée, il n’y avait pas de programme. Le jeune pianiste jouait, mais seulement si « ça lui chantait », car on ne forçait personne et comme disait M.", "en": "The Verdurins did not invite us to dinner: we had “the table set” at their house. For the evening, there was no program. The young pianist played, but only if “he felt like it”, because we didn’t force anyone and as Mr."}, {"start": 128.5, "end": 152.72, "b_start": 249.61, "b_end": 294.48, "orig": "Verdurin : « Tout pour les amis, vivent les camarades ! » Si le pianiste voulait jouer la chevauchée de la\nWalkyrie\nou le prélude de\nTristan\n, M\nme\nVerdurin protestait, non que cette musique lui déplût, mais au contraire parce qu’elle lui causait trop d’impression. « Alors vous tenez à ce que j’aie ma migraine ?", "en": "Verdurin: “Everything for friends, long live comrades! » If the pianist wanted to play the Ride of the Valkyrie or the prelude to Tristan, Ms. Verdurin protested, not because the music displeased him, but on the contrary because it made too much of an impression on him. “So you want me to have my migraine?"}, {"start": 153.72, "end": 171.36, "b_start": 294.48, "b_end": 331.5, "orig": "Vous savez bien que c’est la même chose chaque fois qu’il joue ça. Je sais ce qui m’attend ! Demain quand je voudrai me lever, bonsoir, plus personne ! » S’il ne jouait pas, on causait, et l’un des amis, le plus souvent leur peintre favori d’alors, « lâchait », comme disait M.", "en": "You know it's the same thing every time he plays that. I know what awaits me! Tomorrow when I want to get up, good evening, no one else! » If he was not playing, we would chat, and one of the friends, most often their favorite painter at the time, would “let go”, as M."}, {"start": 172.36, "end": 192.42, "b_start": 331.5, "b_end": 370.61, "orig": "Verdurin, « une grosse faribole qui faisait s’esclaffer tout le monde », M\nme\nVerdurin surtout, à qui, – tant elle avait l’habitude de prendre au propre les expressions figurées des émotions qu’elle éprouvait – le docteur Cottard (un jeune débutant à cette époque) dut un jour remettre sa mâchoire qu’elle avait décrochée pour avoir trop ri.", "en": "Verdurin, \"a big joke that made everyone laugh\", Ms. Verdurin especially, to whom - as she was so accustomed to taking the figurative expressions of the emotions she felt literally - Doctor Cottard (a young beginner at that time) one day had to put back her jaw which she had dropped for laughing too much."}, {"start": 193.42, "end": 208.21, "b_start": 370.61, "b_end": 401.44, "orig": "L’habit noir était défendu parce qu’on était entre « copains » et pour ne pas ressembler aux « ennuyeux » dont on se garait comme de la peste et qu’on n’invitait qu’aux grandes soirées, données le plus rarement possible et seulement si cela pouvait amuser le peintre ou faire connaître le musicien.", "en": "Black clothing was forbidden because we were among \"friends\" and so as not to look like the \"boring\" people who were avoided like the plague and who were only invited to big parties, given as rarely as possible and only if it could amuse the painter or make the musician known."}, {"start": 209.21, "end": 218.47, "b_start": 401.44, "b_end": 421.78, "orig": "Le reste du temps, on se contentait de jouer des charades, de souper en costumes, mais entre soi, en ne mêlant aucun étranger au petit « noyau ».", "en": "The rest of the time, we were content to play charades, to have dinner in costumes, but among ourselves, not mixing any strangers into the little “core”."}, {"start": 219.47, "end": 240.28, "b_start": 421.78, "b_end": 460.84, "orig": "Mais au fur et à mesure que les « camarades » avaient pris plus de place dans la vie de M\nme\nVerdurin, les ennuyeux, les réprouvés, ce fut tout ce qui retenait les amis loin d’elle, ce qui les empêchait quelquefois d’être libres, ce fut la mère de l’un, la profession de l’autre, la maison de campagne ou la mauvaise santé d’un troisième.", "en": "But as the “comrades” took more and more space in Madame Verdurin’s life, the boring ones, the reprobates, it was all that kept the friends away from her, what sometimes prevented them from being free, it was the mother of one, the profession of another, the country house or the poor health of a third."}, {"start": 241.28, "end": 270.7, "b_start": 460.84, "b_end": 516.62, "orig": "Si le docteur Cottard croyait devoir partir en sortant de table pour retourner auprès d’un malade en danger : « Qui sait, lui disait M\nme\nVerdurin, cela lui fera peut-être beaucoup plus de bien que vous n’alliez pas le déranger ce soir ; il passera une bonne nuit sans vous ; demain matin vous irez de bonne heure et vous le trouverez guéri. » Dès le commencement de décembre, elle était malade à la pensée que les fidèles « lâcheraient » pour le jour de Noël et le 1\ner\njanvier.", "en": "If Doctor Cottard thought he had to leave when leaving the table to return to a patient in danger: “Who knows,” Madame Verdurin said to him, “it will perhaps do him a lot more good if you are not going to disturb him this evening; he will have a good night without you; tomorrow morning you will go early and you will find him cured. » From the beginning of December, she was sickened by the thought that the faithful would “give up” for Christmas Day and January 1st."}, {"start": 271.7, "end": 288.72, "b_start": 516.62, "b_end": 548.96, "orig": "La tante du pianiste exigeait qu’il vînt dîner ce jour-là en famille chez sa mère à elle :\n– Vous croyez qu’elle en mourrait, votre mère, s’écria durement M\nme\nVerdurin, si vous ne dîniez pas avec elle le jour de l’an, comme en\nprovince !", "en": "The pianist's aunt demanded that he come to dinner with his family that day at her mother's house: - You think she would die of it, your mother, cried Madame Verdurin harshly, if you did not dine with her on New Year's Day, like in the provinces!"}, {"start": 289.72, "end": 305.1, "b_start": 548.96, "b_end": 580.87, "orig": "Ses inquiétudes renaissaient à la semaine sainte :\n– Vous, docteur, un savant, un esprit fort, vous venez naturellement le Vendredi saint comme un autre jour ? dit-elle à Cottard la première année, d’un ton assuré comme si elle ne pouvait douter de la réponse.", "en": "His concerns resurfaced during Holy Week: – You, doctor, a scholar, a strong spirit, do you naturally come on Good Friday like any other day? she said to Cottard the first year, in a confident tone as if she could not doubt the answer."}, {"start": 306.1, "end": 324.61, "b_start": 580.87, "b_end": 619.88, "orig": "Mais elle tremblait en attendant qu’il l’eût prononcée, car s’il n’était pas venu, elle risquait de se trouver seule.\n– Je viendrai le Vendredi saint... vous faire mes adieux car nous allons passer les fêtes de Pâques en Auvergne.\n– En Auvergne ? pour vous faire manger par les puces et la vermine, grand bien vous fasse !", "en": "But she trembled while waiting for him to say it, because if he had not come, she risked finding herself alone. – I will come on Good Friday... to bid you farewell because we are going to spend the Easter holidays in Auvergne. –In Auvergne? to get eaten by fleas and vermin, great good to you!"}, {"start": 325.61, "end": 335.16, "b_start": 619.88, "b_end": 639.58, "orig": "Et après un silence :\n– Si vous nous l’aviez dit au moins, nous aurions tâché d’organiser cela et de faire le voyage ensemble dans des conditions confortables.", "en": "And after a silence: – If you had at least told us, we would have tried to organize this and make the trip together in comfortable conditions."}, {"start": 336.16, "end": 365.73, "b_start": 639.58, "b_end": 697.93, "orig": "De même si un « fidèle » avait un ami, ou une « habituée » un flirt qui serait capable de le faire « lâcher » quelquefois, les Verdurin, qui ne s’effrayaient pas qu’une femme eût un amant pourvu qu’elle l’eût chez eux, l’aimât en eux, et ne le leur préférât pas, disaient : « Eh bien ! amenez-le votre ami. » Et on l’engageait à l’essai, pour voir s’il était capable de ne pas avoir de secrets pour M\nme\nVerdurin, s’il était susceptible d’être agrégé au « petit clan ».", "en": "In the same way if a “faithful” had a friend, or a “regular” a flirt who would be capable of making him “let go” sometimes, the Verdurins, who were not frightened that a woman had a lover provided that she had him in their home, loved him in them, and did not prefer him to them, would say: “Well! bring it your friend. » And he was hired on trial, to see if he was capable of not having secrets from Madame Verdurin, if he was likely to be added to the “little clan”."}, {"start": 366.73, "end": 383.74, "b_start": 697.93, "b_end": 732.36, "orig": "S’il ne l’était pas, on prenait à part le fidèle qui l’avait présenté et on lui rendait le service de le brouiller avec son ami ou avec sa maîtresse. Dans le cas contraire, le « nouveau » devenait à son tour un fidèle. Aussi quand cette année-là, la demi-mondaine raconta à M.", "en": "If he was not, the faithful who had introduced him were taken aside and the service was rendered to him of quarreling him with his friend or his mistress. Otherwise, the “newbie” in turn became a believer. So when that year, the demi-mondaine told M."}, {"start": 384.74, "end": 392.86, "b_start": 732.36, "b_end": 750.54, "orig": "Verdurin qu’elle avait fait la connaissance d’un homme charmant, M. Swann, et insinua qu’il serait très heureux d’être reçu chez eux, M.", "en": "Verdurin that she had met a charming man, Mr. Swann, and insinuated that he would be very happy to be received at their home, Mr."}, {"start": 393.86, "end": 414.47, "b_start": 750.54, "b_end": 791.23, "orig": "Verdurin transmit-il séance tenante la requête à sa femme. (Il n’avait jamais d’avis qu’après sa femme, dont son rôle particulier était de mettre à exécution les désirs, ainsi que les désirs des fidèles, avec de grandes ressources d’ingéniosité.)\n– Voici M\nme\nde Crécy qui a quelque chose à te demander.", "en": "Verdurin immediately transmitted the request to his wife. (He only ever had an opinion after his wife, whose particular role was to carry out the wishes, as well as the desires of the faithful, with great resources of ingenuity.) – Here is Madame de Crécy who has something to ask you."}, {"start": 415.47, "end": 426.18, "b_start": 791.23, "b_end": 813.97, "orig": "Elle désirerait te présenter un de ses amis, M. Swann. Qu’en dis-tu ?\n– Mais voyons, est-ce qu’on peut refuser quelque chose à une petite perfection comme ça.", "en": "She would like to introduce you to one of her friends, Mr. Swann. What do you say? – But let’s see, can we refuse something to a little perfection like that?"}, {"start": 427.18, "end": 445.25, "b_start": 813.97, "b_end": 849.96, "orig": "Taisez-vous, on ne vous demande pas votre avis, je vous dis que vous êtes une perfection.\n– Puisque vous le voulez, répondit Odette sur un ton de marivaudage, et elle ajouta : vous savez que je ne suis pas « fishing for compliments ».\n– Eh bien ! amenez-le votre ami, s’il est agréable.", "en": "Shut up, we're not asking your opinion, I'm telling you that you are perfection. “Since you want to,” replied Odette in a chirpy tone, and she added: you know that I am not “fishing for compliments.” - Well ! bring your friend, if he is pleasant."}, {"start": 446.25, "end": 458.92, "b_start": 849.96, "b_end": 876.85, "orig": "Certes le « petit noyau » n’avait aucun rapport avec la société où fréquentait Swann, et de purs mondains auraient trouvé que ce n’était pas la peine d’y occuper comme lui une situation exceptionnelle pour se faire présenter chez les Verdurin.", "en": "Certainly the “small core” had no connection with the society where Swann frequented, and pure worldly people would have found that it was not worth occupying an exceptional situation like him to be introduced to the Verdurins."}, {"start": 459.92, "end": 489.46, "b_start": 876.85, "b_end": 939.22, "orig": "Mais Swann aimait tellement les femmes, qu’à partir du jour où il avait connu à peu près toutes celles de l’aristocratie et où elles n’avaient plus rien eu à lui apprendre, il n’avait plus tenu à ces lettres de naturalisation, presque des titres de noblesse, que lui avait octroyées le faubourg Saint-Germain, que comme à une sorte de valeur d’échange, de lettre de crédit dénuée de prix en elle-même, mais lui permettant de s’improviser une situation dans tel petit trou de province ou tel milieu obscur de Paris, où la fille du hobereau ou du greffier lui avait semblé jolie.", "en": "But Swann loved women so much that from the day he had known almost all those of the aristocracy and when they no longer had anything to teach him, he no longer valued these letters of naturalization, almost titles of nobility, which the Faubourg Saint-Germain had granted him, as a sort of exchange value, a letter of credit devoid of price in itself, but allowing him to improvise a situation in such a little hole. from the provinces or some obscure milieu of Paris, where the daughter of the squire or the clerk had seemed pretty to him."}, {"start": 490.46, "end": 519.41, "b_start": 939.22, "b_end": 1001.15, "orig": "Car le désir ou l’amour lui rendait alors un sentiment de vanité dont il était maintenant exempt dans l’habitude de la vie (bien que ce fût lui sans doute qui autrefois l’avait dirigé vers cette carrière mondaine où il avait gaspillé dans les plaisirs frivoles les dons de son esprit et fait servir son érudition en matière d’art à conseiller les dames de la société dans leurs achats de tableaux et pour l’ameublement de leurs hôtels), et qui lui faisait désirer de briller, aux yeux d’une inconnue dont il s’était épris, d’une élégance que le nom de Swann à lui tout seul n’impliquait pas.", "en": "Because desire or love then gave him a feeling of vanity from which he was now exempt in the habits of life (although it was undoubtedly he who had formerly directed him towards this worldly career where he had wasted the gifts of his mind in frivolous pleasures and used his erudition in matters of art to advise the ladies of society in their purchases of paintings and for the furnishing of their hotels), and who made him desire to shine, in the eyes of an unknown woman whose he had fallen in love with an elegance that the name Swann alone did not imply."}, {"start": 520.41, "end": 535.07, "b_start": 1001.15, "b_end": 1033.82, "orig": "Il le désirait surtout si l’inconnue était d’humble condition. De même que ce n’est pas à un autre homme intelligent qu’un homme intelligent aura peur de paraître bête, ce n’est pas par un grand seigneur, c’est par un rustre qu’un homme élégant craindra de voir son élégance méconnue.", "en": "He wanted it especially if the stranger was of humble condition. Just as it is not to another intelligent man that an intelligent man will be afraid of appearing stupid, it is not to a great lord, it is to a boor that an elegant man will fear to see his elegance misunderstood."}, {"start": 536.07, "end": 545.86, "b_start": 1033.82, "b_end": 1054.64, "orig": "Les trois quarts des frais d’esprit et des mensonges de vanité, qui ont été prodigués depuis que le monde existe par des gens qu’ils ne faisaient que diminuer, l’ont été pour des inférieurs.", "en": "Three-quarters of the witticisms and lies of vanity, which have been lavished since the world existed by people whom they only diminished, have been for inferiors."}, {"start": 546.86, "end": 555.17, "b_start": 1054.64, "b_end": 1072.15, "orig": "Et Swann, qui était simple et négligent avec une duchesse, tremblait d’être méprisé, posait, quand il était devant une femme de chambre.", "en": "And Swann, who was simple and careless with a duchess, trembled at being scorned, posed when he was in front of a chambermaid."}, {"start": 556.17, "end": 580.55, "b_start": 1072.15, "b_end": 1124.72, "orig": "Il n’était pas comme tant de gens qui, par paresse, ou sentiment résigné de l’obligation que crée la grandeur sociale de rester attaché à un certain rivage, s’abstiennent des plaisirs que la réalité leur présente en dehors de la position mondaine où ils vivent cantonnés jusqu’à leur mort, se contentant de finir par appeler plaisirs, faute de mieux, une fois qu’ils sont parvenus à s’y habituer, les divertissements médiocres ou les supportables ennuis qu’elle renferme.", "en": "He was not like so many people who, out of laziness, or a resigned feeling of the obligation created by social greatness to remain attached to a certain shore, abstain from the pleasures that reality presents to them outside the worldly position to which they live confined until their death, content to end up calling pleasures, for lack of a better term, once they have managed to get used to it, the mediocre entertainments or the bearable annoyances that it contains."}, {"start": 581.55, "end": 590.31, "b_start": 1124.72, "b_end": 1143.94, "orig": "Swann, lui, ne cherchait pas à trouver jolies les femmes avec qui il passait son temps, mais à passer son temps avec les femmes qu’il avait d’abord trouvées jolies.", "en": "Swann, for his part, did not seek to find the women with whom he spent his time pretty, but to spend his time with the women he had first found pretty."}, {"start": 591.31, "end": 603.72, "b_start": 1143.94, "b_end": 1170.78, "orig": "Et c’était souvent des femmes de beauté assez vulgaire, car les qualités physiques qu’il recherchait sans s’en rendre compte étaient en complète opposition avec celles qui lui rendaient admirables les femmes sculptées ou peintes par les maîtres qu’il préférait.", "en": "And they were often women of fairly vulgar beauty, because the physical qualities that he sought without realizing it were in complete opposition to those that made the women sculpted or painted by the masters he preferred admirable to him."}, {"start": 604.72, "end": 613.38, "b_start": 1170.78, "b_end": 1190.09, "orig": "La profondeur, la mélancolie de l’expression, glaçaient ses sens que suffisait au contraire à éveiller une chair saine, plantureuse et rose.", "en": "The depth, the melancholy of the expression, chilled his senses which, on the contrary, were enough to awaken healthy, plump and pink flesh."}, {"start": 614.38, "end": 647.26, "b_start": 1190.09, "b_end": 1259.17, "orig": "Si en voyage il rencontrait une famille qu’il eût été plus élégant de ne pas chercher à connaître, mais dans laquelle une femme se présentait à ses yeux parée d’un charme qu’il n’avait pas encore connu, rester dans son « quant à soi » et tromper le désir qu’elle avait fait naître, substituer un plaisir différent au plaisir qu’il eût pu connaître avec elle, en écrivant à une ancienne maîtresse de venir le rejoindre, lui eût semblé une aussi lâche abdication devant la vie, un aussi stupide renoncement à un bonheur nouveau, que si au lieu de visiter le pays, il s’était confiné dans sa chambre en regardant des vues de Paris.", "en": "If while traveling he met a family that it would have been more elegant not to try to get to know, but in which a woman presented herself to his eyes adorned with a charm that he had not yet known, remaining in his \"self\" and deceiving the desire that she had given rise to, substituting a different pleasure for the pleasure that he could have experienced with her, by writing to a former mistress to come and join him, would have seemed to him such a cowardly abdication before life, also a stupid renunciation of a new happiness, that if instead of visiting the country, he had confined himself to his room looking at views of Paris."}, {"start": 648.26, "end": 661.08, "b_start": 1259.17, "b_end": 1286.62, "orig": "Il ne s’enfermait pas dans l’édifice de ses relations, mais en avait fait, pour pouvoir le reconstruire à pied d’œuvre sur de nouveaux frais partout où une femme lui avait plu, une de ces tentes démontables comme les explorateurs en emportent avec eux.", "en": "He did not lock himself in the edifice of his relationships, but had made one of those collapsible tents such as explorers take with them, in order to be able to rebuild it on the spot at new costs wherever a woman had pleased him."}, {"start": 662.08, "end": 670.17, "b_start": 1286.62, "b_end": 1304.68, "orig": "Pour ce qui n’en était pas transportable ou échangeable contre un plaisir nouveau, il l’eût donné pour rien, si enviable que cela parût à d’autres.", "en": "As for what was not transportable or exchangeable for a new pleasure, he would have given it for nothing, however enviable that seemed to others."}, {"start": 671.17, "end": 693.37, "b_start": 1304.68, "b_end": 1353.46, "orig": "Que de fois son crédit auprès d’une duchesse, fait du désir accumulé depuis des années que celle-ci avait eu de lui être agréable sans en avoir trouvé l’occasion, il s’en était défait d’un seul coup en réclamant d’elle par une indiscrète dépêche une recommandation télégraphique qui le mît en relation sur l’heure avec un de ses intendants dont il avait remarqué la fille à la campagne, comme ferait un affamé qui troquerait un diamant contre un morceau de pain.", "en": "How many times had his credit with a duchess, made up of the desire accumulated over the years that she had had to please him without having found the opportunity, he had lost it in one fell swoop by demanding from her, through an indiscreet dispatch, a telegraphic recommendation which immediately put him in touch with one of his stewards whose daughter he had noticed in the countryside, like a starving person would do who bartered a diamond for a piece of bread."}, {"start": 694.37, "end": 702.02, "b_start": 1353.46, "b_end": 1370.27, "orig": "Même après coup, il s’en amusait, car il y avait en lui, rachetée par de rares délicatesses, une certaine muflerie.", "en": "Even afterwards, he was amused by it, because there was in him, redeemed by rare delicacies, a certain stupidity."}, {"start": 703.02, "end": 721.48, "b_start": 1370.27, "b_end": 1409.09, "orig": "Puis, il appartenait à cette catégorie d’hommes intelligents qui ont vécu dans l’oisiveté et qui cherchent une consolation et peut-être une excuse dans l’idée que cette oisiveté offre à leur intelligence des objets aussi dignes d’intérêt que pourrait faire l’art ou l’étude, que la « Vie » contient des situations plus intéressantes, plus romanesques que tous les romans.", "en": "Then, he belonged to that category of intelligent men who have lived in idleness and who seek consolation and perhaps an excuse in the idea that this idleness offers to their intelligence objects as worthy of interest as art or study could do, that \"Life\" contains situations more interesting, more romantic than all novels."}, {"start": 722.48, "end": 755.5, "b_start": 1409.09, "b_end": 1479.35, "orig": "Il l’assurait du moins et le persuadait aisément aux plus affinés de ses amis du monde, notamment au baron de Charlus qu’il s’amusait à égayer par le récit des aventures piquantes qui lui arrivaient, soit qu’ayant rencontré en chemin de fer une femme qu’il avait ensuite ramenée chez lui, il eût découvert qu’elle était la sœur d’un souverain entre les mains de qui se mêlaient en ce moment tous les fils de la politique européenne, au courant de laquelle il se trouvait ainsi tenu d’une façon très agréable, soit que par le jeu complexe des circonstances, il dépendît du choix qu’allait faire le conclave, s’il pourrait ou non devenir l’amant d’une cuisinière.", "en": "At least he assured him of this and easily persuaded him to the most refined of his friends in the world, in particular to Baron de Charlus whom he enjoyed amusing with the story of the spicy adventures which happened to him, or that having met on the railway a woman whom he had then brought home, he had discovered that she was the sister of a sovereign in whose hands at that moment all the threads of European politics were mingled, in whose knowledge he found himself thus held in a very pleasant way, whether by the complex play of circumstances, it depended on the choice that the conclave was going to make, whether or not he could become the lover of a cook."}, {"start": 756.5, "end": 769.13, "b_start": 1479.35, "b_end": 1506.31, "orig": "Ce n’était pas seulement d’ailleurs la brillante phalange de vertueuses douairières, de généraux, d’académiciens, avec lesquels il était particulièrement lié, que Swann forçait avec tant de cynisme à lui servir d’entremetteurs.", "en": "Moreover, it was not only the brilliant phalanx of virtuous dowagers, generals, academicians, with whom he was particularly close, that Swann forced with so much cynicism to serve as go-betweens for him."}, {"start": 770.13, "end": 788.1, "b_start": 1506.31, "b_end": 1544.27, "orig": "Tous ses amis avaient l’habitude de recevoir de temps en temps des lettres de lui où un mot de recommandation ou d’introduction leur était demandé avec une habileté diplomatique qui, persistant à travers les amours successives et les prétextes différents, accusait, plus que n’eussent fait les maladresses, un caractère permanent et des buts identiques.", "en": "All his friends were in the habit of receiving letters from him from time to time in which a word of recommendation or introduction was requested from them with a diplomatic skill which, persisting through successive loves and different pretexts, showed, more than clumsiness would have done, a permanent character and identical goals."}, {"start": 789.1, "end": 848.05, "b_start": 1544.27, "b_end": 1663.51, "orig": "Je me suis souvent fait raconter bien des années plus tard, quand je commençai à m’intéresser à son caractère à cause des ressemblances qu’en de tout autres parties il offrait avec le mien, que quand il écrivait à mon grand-père (qui ne l’était pas encore, car c’est vers l’époque de ma naissance que commença la grande liaison de Swann et elle interrompit longtemps ces pratiques) celui-ci, en reconnaissant sur l’enveloppe l’écriture de son ami, s’écriait : « Voilà Swann qui va demander quelque chose : à la garde ! » Et soit méfiance, soit par le sentiment inconsciemment diabolique qui nous pousse à n’offrir une chose qu’aux gens qui n’en ont pas envie, mes grands-parents opposaient une fin de non-recevoir absolue aux prières les plus faciles à satisfaire qu’il leur adressait, comme de le présenter à une jeune fille qui dînait tous les dimanches à la maison, et qu’ils étaient obligés, chaque fois que Swann leur en reparlait, de faire semblant de ne plus voir, alors que pendant toute la semaine on se demandait qui on pourrait bien inviter avec elle, finissant souvent par ne trouver personne, faute de faire signe à celui qui en eût été si heureux.", "en": "I was often told many years later, when I began to be interested in his character because of the resemblances that in all other parts it offered with mine, that when he wrote to my grandfather (who was not yet, because it was around the time of my birth that Swann's great affair began and it interrupted these practices for a long time) the latter, recognizing his friend's handwriting on the envelope, exclaimed: \"Here is Swann who is going to ask something: to the guard! \" And either distrust, or by the unconsciously diabolical feeling which pushes us to offer something only to people who do not want it, my grandparents opposed an absolute refusal to accept the most easily satisfied requests that he addressed to them, such as presenting it to a young girl who dined every Sunday at the house, and which they were obliged, each time Swann spoke to them about it, to pretend to no longer see, while throughout the week we wondered who we could invite with her, often ending up finding no one, failing to signal the one who would have been so happy."}, {"start": 849.05, "end": 862.15, "b_start": 1663.51, "b_end": 1692.71, "orig": "Quelquefois tel couple ami de mes grands-parents et qui jusque-là s’était plaint de ne jamais voir Swann leur annonçait avec satisfaction et peut-être un peu le désir d’exciter l’envie, qu’il était devenu tout ce qu’il y a de plus charmant pour eux, qu’il ne les quittait plus.", "en": "Sometimes a couple who were friends of my grandparents and who until then had complained of never seeing Swann would announce to them with satisfaction and perhaps a little desire to arouse envy, that he had become the most charming thing for them, that he never left them."}, {"start": 863.15, "end": 902.03, "b_start": 1692.71, "b_end": 1766.98, "orig": "Mon grand-père ne voulait pas troubler leur plaisir mais regardait ma grand’mère en fredonnant :\n« Quel est donc ce mystère\nJe n’y puis rien comprendre. »\nou :\n« Vision fugitive... »\nou :\n« Dans ces affaires\nLe mieux est de ne rien voir. »\nQuelques mois après, si mon grand-père demandait au nouvel ami de Swann : « Et Swann, le voyez-vous toujours beaucoup ? » la figure de l’interlocuteur s’allongeait : « Ne prononcez jamais son nom devant moi ! » – « Mais je croyais que vous étiez si liés... » Il avait été ainsi pendant quelques mois le familier de cousins de ma grand’mère, dînant presque chaque jour chez eux.", "en": "My grandfather did not want to disturb their pleasure but looked at my grandmother and hummed: “What is this mystery? I can’t understand anything about it. » or: “Fugitive vision…” or: “In these matters It is best to see nothing. » A few months later, if my grandfather asked Swann's new friend: \"And Swann, do you still see him a lot? » the face of the interlocutor lengthened: “Never mention his name in front of me! » – “But I thought you were so close…” He had been the companion of my grandmother’s cousins ​​for several months, dining with them almost every day."}, {"start": 903.03, "end": 917.62, "b_start": 1766.98, "b_end": 1796.41, "orig": "Brusquement il cessa de venir, sans avoir prévenu. On le crut malade, et la cousine de ma grand’mère allait envoyer demander de ses nouvelles, quand à l’office elle trouva une lettre de lui qui traînait par mégarde dans le livre de comptes de la cuisinière.", "en": "Suddenly he stopped coming, without warning. He was thought to be ill, and my grandmother's cousin was about to ask for news of him, when at the office she found a letter from him lying inadvertently in the cook's account book."}, {"start": 918.62, "end": 929.76, "b_start": 1796.41, "b_end": 1821.19, "orig": "Il y annonçait à cette femme qu’il allait quitter Paris, qu’il ne pourrait plus venir. Elle était sa maîtresse, et au moment de rompre, c’était elle seule qu’il avait jugé utile d’avertir.", "en": "He announced to this woman that he was going to leave Paris, that he would no longer be able to come. She was his mistress, and when it was time to break up, it was only her he thought it useful to warn."}, {"start": 930.76, "end": 996.11, "b_start": 1821.19, "b_end": 1958.39, "orig": "Quand sa maîtresse du moment était au contraire une personne mondaine ou du moins une personne qu’une extraction trop humble ou une situation trop irrégulière n’empêchait pas qu’il fît recevoir dans le monde, alors pour elle il y retournait, mais seulement dans l’orbite particulier où elle se mouvait ou bien où il l’avait entraînée. « Inutile de compter sur Swann ce soir, disait-on, vous savez bien que c’est le jour d’Opéra de son Américaine. » Il la faisait inviter dans les salons particulièrement fermés où il avait ses habitudes, ses dîners hebdomadaires, son poker ; chaque soir, après qu’un léger crépelage ajouté à la brosse de ses cheveux roux avait tempéré de quelque douceur la vivacité de ses yeux verts, il choisissait une fleur pour sa boutonnière et partait pour retrouver sa maîtresse à dîner chez l’une ou l’autre des femmes de sa coterie ; et alors, pensant à l’admiration et à l’amitié que les gens à la mode, pour qui il faisait la pluie et le beau temps et qu’il allait retrouver là, lui prodigueraient devant la femme qu’il aimait, il retrouvait du charme à cette vie mondaine sur laquelle il s’était blasé, mais dont la matière, pénétrée et colorée chaudement d’une flamme insinuée qui s’y jouait, lui semblait précieuse et belle depuis qu’il y avait incorporé un nouvel amour.", "en": "When his mistress of the moment was, on the contrary, a worldly person or at least a person whom too humble an extraction or too irregular a situation did not prevent him from being received into the world, then for her he returned there, but only in the particular orbit in which she moved or in which he had led her. “No need to count on Swann this evening,” they said, “you know very well that it’s his American girl’s Opera day. » He had her invited to the particularly closed salons where he had his habits, his weekly dinners, his poker; every evening, after a light curling added to the brush of his red hair had tempered with some sweetness the liveliness of his green eyes, he would choose a flower for his buttonhole and set out to meet his mistress for dinner with one or other of the women of his coterie; and then, thinking of the admiration and friendship that the fashionable people, for whom he was all rain and shine and whom he was going to find there, would lavish on him in front of the woman he loved, he found charm in this worldly life about which he had become jaded, but whose substance, penetrated and warmly colored by an insinuated flame which played there, seemed precious and beautiful to him since he had incorporated a new love into it."}, {"start": 997.11, "end": 1044.9, "b_start": 1958.39, "b_end": 2057.76, "orig": "Mais tandis que chacune de ces liaisons, ou chacun de ces flirts, avait été la réalisation plus ou moins complète d’un rêve né de la vue d’un visage ou d’un corps que Swann avait, spontanément, sans s’y efforcer, trouvés charmants, en revanche, quand un jour au théâtre il fut présenté à Odette de Crécy par un de ses amis d’autrefois, qui lui avait parlé d’elle comme d’une femme ravissante avec qui il pourrait peut-être arriver à quelque chose, mais en la lui donnant pour plus difficile qu’elle n’était en réalité afin de paraître lui-même avoir fait quelque chose de plus aimable en la lui faisant connaître, elle était apparue à Swann non pas certes sans beauté, mais d’un genre de beauté qui lui était indifférent, qui ne lui inspirait aucun désir, lui causait même une sorte de répulsion physique, de ces femmes comme tout le monde a les siennes, différentes pour chacun, et qui sont l’opposé du type que nos sens réclament.", "en": "But while each of these liaisons, or each of these flirtations, had been the more or less complete realization of a dream born from the sight of a face or a body that Swann had, spontaneously, without making an effort, found charming, on the other hand, when one day at the theater he was introduced to Odette de Crécy by one of his former friends, who had spoken to him of her as a ravishing woman with whom he could perhaps achieve something, but by giving her to him as more difficult than she really was in order to appear to have done something more kind in making her known to him, she had appeared to Swann not certainly without beauty, but with a kind of beauty which was indifferent to him, which inspired him with no desire, even caused him a sort of physical repulsion, of these women like everyone has their own, different for everyone, and which are the opposite of the type that our senses demand."}, {"start": 1045.9, "end": 1053.38, "b_start": 2057.76, "b_end": 2074.74, "orig": "Pour lui plaire elle avait un profil trop accusé, la peau trop fragile, les pommettes trop saillantes, les traits trop tirés.", "en": "To please him, her profile was too pronounced, the skin too fragile, the cheekbones too prominent, the features too drawn."}, {"start": 1054.38, "end": 1064.2, "b_start": 2074.74, "b_end": 2095.9, "orig": "Ses yeux étaient beaux, mais si grands qu’ils fléchissaient sous leur propre masse, fatiguaient le reste de son visage et lui donnaient toujours l’air d’avoir mauvaise mine ou d’être de mauvaise humeur.", "en": "His eyes were beautiful, but so large that they sank under their own mass, tired the rest of his face, and always made him look bad-looking or in a bad mood."}, {"start": 1065.2, "end": 1091.77, "b_start": 2095.9, "b_end": 2151.2, "orig": "Quelque temps après cette présentation au théâtre, elle lui avait écrit pour lui demander à voir ses collections qui l’intéressaient tant, « elle, ignorante qui avait le goût des jolies choses », disant qu’il lui semblait qu’elle le connaîtrait mieux, quand elle l’aurait vu dans « son home » où elle l’imaginait « si confortable avec son thé et ses livres », quoiqu’elle ne lui eût pas caché sa surprise qu’il habitât ce quartier qui devait être si triste et « qui était si peu\nsmart\npour lui qui l’était tant ».", "en": "Some time after this presentation at the theater, she had written to him to ask him to see his collections which interested her so much, \"she, ignorant who had a taste for pretty things\", saying that it seemed to her that she would know him better, when she had seen him in \"his home\" where she imagined him \"so comfortable with his tea and his books\", although she had not hidden her surprise from him that he lived in this neighborhood which must have been so sad and \"which was so unsmart for him who was so.”"}, {"start": 1092.77, "end": 1110.86, "b_start": 2151.2, "b_end": 2188.94, "orig": "Et après qu’il l’eut laissée venir, en le quittant, elle lui avait dit son regret d’être restée si peu dans cette demeure où elle avait été heureuse de pénétrer, parlant de lui comme s’il avait été pour elle quelque chose de plus que les autres êtres qu’elle connaissait, et semblant établir entre leurs deux personnes une sorte de trait d’union romanesque qui l’avait fait sourire.", "en": "And after he had let her come, when leaving him, she had told him of her regret at having stayed so little in this house which she had been happy to enter, speaking of him as if he had been for her something more than the other beings she knew, and seeming to establish between their two persons a sort of romantic link which had made her smile."}, {"start": 1111.86, "end": 1132.98, "b_start": 2188.94, "b_end": 2236.98, "orig": "Mais à l’âge déjà un peu désabusé dont approchait Swann, et où l’on sait se contenter d’être amoureux pour le plaisir de l’être sans trop exiger de réciprocité, ce rapprochement des cœurs, s’il n’est plus comme dans la première jeunesse le but vers lequel tend nécessairement l’amour, lui reste uni en revanche par une association d’idées si forte, qu’il peut en devenir la cause, s’il se présente avant lui.", "en": "But at the already somewhat disillusioned age to which Swann was approaching, and where one knows how to be content to be in love for the pleasure of being without demanding too much reciprocity, this rapprochement of hearts, if it is no longer as in early youth the goal towards which love necessarily tends, remains united to it on the other hand by an association of ideas so strong, that it can become the cause, if it presents itself before it."}, {"start": 1133.98, "end": 1142.72, "b_start": 2236.98, "b_end": 2256.19, "orig": "Autrefois on rêvait de posséder le cœur de la femme dont on était amoureux ; plus tard sentir qu’on possède le cœur d’une femme peut suffire à vous en rendre amoureux.", "en": "In the past we dreamed of possessing the heart of the woman we were in love with; later feeling that you own a woman's heart can be enough to make you fall in love with her."}, {"start": 1143.72, "end": 1158.38, "b_start": 2256.19, "b_end": 2287.02, "orig": "Ainsi, à l’âge où il semblerait, comme on cherche surtout dans l’amour un plaisir subjectif, que la part du goût pour la beauté d’une femme devrait y être la plus grande, l’amour peut naître – l’amour le plus physique – sans qu’il y ait eu, à sa base, un désir préalable.", "en": "Thus, at the age where it would seem, as we seek above all a subjective pleasure in love, that the part of the taste for the beauty of a woman should be the greatest, love can be born – the most physical love – without there being, at its base, a prior desire."}, {"start": 1159.38, "end": 1174.65, "b_start": 2287.02, "b_end": 2319.6, "orig": "À cette époque de la vie, on a déjà été atteint plusieurs fois par l’amour ; il n’évolue plus seul suivant ses propres lois inconnues et fatales, devant notre cœur étonné et passif. Nous venons à son aide, nous le faussons par la mémoire, par la suggestion.", "en": "At this time of life, we have already been touched by love several times; it no longer evolves alone according to its own unknown and fatal laws, before our astonished and passive heart. We come to its aid, we distort it by memory, by suggestion."}, {"start": 1175.65, "end": 1191.46, "b_start": 2319.6, "b_end": 2352.56, "orig": "En reconnaissant un de ses symptômes, nous nous rappelons, nous faisons renaître les autres. Comme nous possédons sa chanson, gravée en nous tout entière, nous n’avons pas besoin qu’une femme nous en dise le début – rempli par l’admiration qu’inspire la beauté – pour en trouver la suite.", "en": "By recognizing one of its symptoms, we remember, we bring the others back to life. As we have her song, engraved in us entirely, we do not need a woman to tell us the beginning – filled with the admiration that beauty inspires – to find the rest."}, {"start": 1192.46, "end": 1203.77, "b_start": 2352.56, "b_end": 2377.2, "orig": "Et si elle commence au milieu – là où les cœurs se rapprochent, où l’on parle de n’exister plus que l’un pour l’autre – nous avons assez l’habitude de cette musique pour rejoindre tout de suite notre partenaire au passage où elle nous attend.", "en": "And if it begins in the middle – where hearts come together, where we talk about existing only for each other – we are used to this music enough to immediately join our partner at the point where she is waiting for us."}, {"start": 1204.77, "end": 1229.25, "b_start": 2377.2, "b_end": 2428.81, "orig": "Odette de Crécy retourna voir Swann, puis rapprocha ses visites ; et sans doute chacune d’elles renouvelait pour lui la déception qu’il éprouvait à se retrouver devant ce visage dont il avait un peu oublié les particularités dans l’intervalle, et qu’il ne s’était rappelé ni si expressif ni, malgré sa jeunesse, si fané ; il regrettait, pendant qu’elle causait avec lui, que la grande beauté qu’elle avait ne fût pas du genre de celles qu’il aurait spontanément préférées.", "en": "Odette de Crécy returned to see Swann, then brought her visits closer together; and no doubt each of them renewed for him the disappointment he felt at finding himself before this face whose particularities he had somewhat forgotten in the meantime, and which he had remembered neither so expressive nor, despite his youth, so faded; he regretted, while she was chatting with him, that the great beauty she had was not of the type that he would have spontaneously preferred."}, {"start": 1230.25, "end": 1294.9, "b_start": 2428.81, "b_end": 2562.5, "orig": "Il faut d’ailleurs dire que le visage d’Odette paraissait plus maigre et plus proéminent parce que le front et le haut des joues, cette surface unie et plus plane était recouverte par la masse de cheveux qu’on portait, alors, prolongés en « devants », soulevés en « crêpés », répandus en mèches folles le long des oreilles ; et quant à son corps qui était admirablement fait, il était difficile d’en apercevoir la continuité (à cause des modes de l’époque et quoiqu’elle fût une des femmes de Paris qui s’habillaient le mieux), tant le corsage, s’avançant en saillie comme sur un ventre imaginaire et finissant brusquement en pointe pendant que par en dessous commençait à s’enfler le ballon des doubles jupes, donnait à la femme l’air d’être composée de pièces différentes mal emmanchées les unes dans les autres ; tant les ruchés, les volants, le gilet suivaient en toute indépendance, selon la fantaisie de leur dessin ou la consistance de leur étoffe, la ligne qui les conduisait aux nœuds, aux bouillons de dentelle, aux effilés de jais perpendiculaires, ou qui les dirigeait le long du busc, mais ne s’attachaient nullement à l’être vivant, qui selon que l’architecture de ces fanfreluches se rapprochait ou s’écartait trop de la sienne, s’y trouvait engoncé ou perdu.", "en": "It must also be said that Odette's face appeared thinner and more prominent because the forehead and the top of the cheeks, this plain and flatter surface, was covered by the mass of hair that was then worn, extended in \"fronts\", raised in \"combed\", spread in wild strands along the ears; and as for her body which was admirably made, it was difficult to see its continuity (because of the fashions of the time and although she was one of the best dressed women in Paris), as the bodice, projecting out as if on an imaginary belly and ending abruptly in a point while from below the balloon of the double skirts began to swell, gave the woman the air of being made up of different pieces poorly fitted together. in each other; so much so that the ruches, the ruffles, the waistcoat followed in complete independence, according to the fantasy of their design or the consistency of their fabric, the line which led them to the knots, to the lace broths, to the perpendicular tapers of jet, or which directed them along the busk, but were in no way attached to the living being, which depending on whether the architecture of these frills approached or diverged too much from its own, was stuck or lost there."}, {"start": 1295.9, "end": 1341.0, "b_start": 2562.5, "b_end": 2651.82, "orig": "Mais, quand Odette était partie, Swann souriait en pensant qu’elle lui avait dit combien le temps lui durerait jusqu’à ce qu’il lui permît de revenir ; il se rappelait l’air inquiet, timide, avec lequel elle l’avait une fois prié que ce ne fût pas dans trop longtemps, et les regards qu’elle avait eus à ce moment-là, fixés sur lui en une imploration craintive, et qui la faisaient touchante sous le bouquet de fleurs de pensées artificielles fixé devant son chapeau rond de paille blanche, à brides de velours noir. « Et vous, avait-elle dit, vous ne viendriez pas une fois chez moi prendre le thé ? » Il avait allégué des travaux en train, une étude – en réalité abandonnée depuis des années – sur Ver Meer de Delft. « Je comprends que je ne peux rien faire, moi chétive, à côté de grands savants comme vous autres, lui avait-elle répondu.", "en": "But when Odette had left, Swann smiled to think that she had told him how long it would be until he allowed her to return; he remembered the worried, shy look with which she had once begged him that it would not be too long before, and the looks she had had at that moment, fixed on him in a fearful imploration, and which made her touching under the bouquet of artificial pansy flowers fixed in front of her round hat of white straw, with black velvet straps. “And you,” she said, “won’t you come to my house for tea once? » He had alleged ongoing work, a study – in reality abandoned for years – on Ver Meer de Delft. “I understand that I can't do anything, me puny, next to great scientists like the rest of you,” she replied."}, {"start": 1342.0, "end": 1349.61, "b_start": 2651.82, "b_end": 2668.7, "orig": "Je serais comme la grenouille devant l’aréopage. Et pourtant j’aimerais tant m’instruire, savoir, être initiée.", "en": "I would be like the frog in front of the Areopagus. And yet I would love to learn, to know, to be initiated."}, {"start": 1350.61, "end": 1376.48, "b_start": 2668.7, "b_end": 2720.51, "orig": "Comme cela doit être amusant de bouquiner, de fourrer son nez dans de vieux papiers », avait-elle ajouté avec l’air de contentement de soi-même que prend une femme élégante pour affirmer que sa joie est de se livrer sans crainte de se salir à une besogne malpropre, comme de faire la cuisine en « mettant elle-même les mains à la pâte ». « Vous allez vous moquer de moi, ce peintre qui vous empêche de me voir (elle voulait parler de Ver Meer), je n’avais jamais entendu parler de lui ; vit-il encore ?", "en": "How fun it must be to read, to stick your nose in old papers,” she added with the air of self-satisfaction that an elegant woman assumes when asserting that her joy lies in devoting herself without fear of getting dirty to dirty work, like cooking while “putting her hands to work herself.” “You are going to make fun of me, this painter who prevents you from seeing me (she meant Ver Meer), I had never heard of him; Is he still living?"}, {"start": 1377.48, "end": 1391.95, "b_start": 2720.51, "b_end": 2750.5, "orig": "Est-ce qu’on peut voir de ses œuvres à Paris, pour que je puisse me représenter ce que vous aimez, deviner un peu ce qu’il y a sous ce grand front qui travaille tant, dans cette tête qu’on sent toujours en train de réfléchir, me dire : voilà, c’est à cela qu’il est en train de penser.", "en": "Can we see some of his works in Paris, so that I can imagine what you like, guess a little of what is under this big forehead that works so hard, in this head that we always feel thinking, say to myself: there you go, that's what he's thinking about."}, {"start": 1392.95, "end": 1415.61, "b_start": 2750.5, "b_end": 2795.82, "orig": "Quel rêve ce serait d’être mêlée à vos travaux ! » Il s’était excusé sur sa peur des amitiés nouvelles, ce qu’il avait appelé, par galanterie, sa peur d’être malheureux. « Vous avez peur d’une affection ? comme c’est drôle, moi qui ne cherche que cela, qui donnerais ma vie pour en trouver une, avait-elle dit d’une voix si naturelle, si convaincue, qu’il en avait été remué.", "en": "What a dream it would be to be involved in your work! » He had apologized for his fear of new friendships, what he had gallantly called his fear of being unhappy. “Are you afraid of a condition? How funny, me who is only looking for that, who would give my life to find one, she had said in a voice so natural, so convinced, that he was moved."}, {"start": 1416.61, "end": 1426.09, "b_start": 2795.82, "b_end": 2816.45, "orig": "Vous avez dû souffrir par une femme. Et vous croyez que les autres sont comme elle. Elle n’a pas su vous comprendre ; vous êtes un être si à part.", "en": "You must have suffered through a woman. And you believe that others are like her. She didn't know how to understand you; you are such a special being."}, {"start": 1427.09, "end": 1443.36, "b_start": 2816.45, "b_end": 2850.01, "orig": "C’est cela que j’ai aimé d’abord en vous, j’ai bien senti que vous n’étiez pas comme tout le monde. » – « Et puis d’ailleurs vous aussi, lui avait-il dit, je sais bien ce que c’est que les femmes, vous devez avoir des tas d’occupations, être peu libre. »\n– « Moi, je n’ai jamais rien à faire !", "en": "This is what I first liked about you, I felt that you were not like everyone else. » – “And besides, you too,” he told her, “I know very well what women are like, you must have lots of occupations, not be very free. » – “I never have anything to do!"}, {"start": 1444.36, "end": 1457.9, "b_start": 2850.01, "b_end": 2878.03, "orig": "Je suis toujours libre, je le serai toujours pour vous. À n’importe quelle heure du jour ou de la nuit où il pourrait vous être commode de me voir, faites-moi chercher, et je serai trop heureuse d’accourir. Le ferez-vous ?", "en": "I am always free, I will always be free for you. At any hour of the day or night when it might be convenient for you to see me, send for me, and I will be only too happy to come. Will you?"}, {"start": 1458.9, "end": 1467.27, "b_start": 2878.03, "b_end": 2895.25, "orig": "Savez-vous ce qui serait gentil, ce serait de vous faire présenter à M\nme\nVerdurin chez qui je vais tous les soirs.", "en": "Do you know what would be nice? It would be to have you introduced to Ms. Verdurin, who I go to every evening."}, {"start": 1468.27, "end": 1518.17, "b_start": 2895.25, "b_end": 3000.7, "orig": "Croyez-vous ! si on s’y retrouvait et si je pensais que c’est un peu pour moi que vous y êtes ! »\nEt sans doute, en se rappelant ainsi leurs entretiens, en pensant ainsi à elle quand il était seul, il faisait seulement jouer son image entre beaucoup d’autres images de femmes dans des rêveries romanesques ; mais si, grâce à une circonstance quelconque (ou même peut-être sans que ce fût grâce à elle, la circonstance qui se présente au moment où un état, latent jusque-là, se déclare, pouvant n’avoir influé en rien sur lui) l’image d’Odette de Crécy venait à absorber toutes ces rêveries, si celles-ci n’étaient plus séparables de son souvenir, alors l’imperfection de son corps ne garderait plus aucune importance, ni qu’il eût été, plus ou moins qu’un autre corps, selon le goût de Swann, puisque devenu le corps de celle qu’il aimait, il serait désormais le seul qui fût capable de lui causer des joies et des tourments.", "en": "Believe it! if we found ourselves there and if I thought that it’s a bit for me that you’re there! » And undoubtedly, in thus remembering their conversations, in thus thinking of her when he was alone, he was only making her image play among many other images of women in romantic reveries; but if, thanks to any circumstance (or even perhaps without it being thanks to it, the circumstance which presents itself at the moment when a state, latent until then, declares itself, being able to have no influence on it) the image of Odette de Crécy came to absorb all these reveries, if these were no longer separable from her memory, then the imperfection of her body would no longer retain any importance, nor that it had been, more or less. less than another body, according to Swann's taste, since having become the body of the one he loved, it would henceforth be the only one capable of causing her joy and torment."}, {"start": 1519.17, "end": 1526.37, "b_start": 3000.7, "b_end": 3017.08, "orig": "Mon grand-père avait précisément connu, ce qu’on n’aurait pu dire d’aucun de leurs amis actuels, la famille de ces Verdurin.", "en": "My grandfather had known precisely, what could not have been said of any of their current friends, the family of these Verdurins."}, {"start": 1527.37, "end": 1538.05, "b_start": 3017.08, "b_end": 3040.32, "orig": "Mais il avait perdu toute relation avec celui qu’il appelait le « jeune Verdurin » et qu’il considérait, un peu en gros, comme tombé – tout en gardant de nombreux millions – dans la bohème et la racaille.", "en": "But he had lost all relationship with the man he called “young Verdurin” and whom he considered, roughly speaking, to have fallen – while keeping many millions – into bohemia and scum."}, {"start": 1539.05, "end": 1555.22, "b_start": 3040.32, "b_end": 3074.1, "orig": "Un jour il reçut une lettre de Swann lui demandant s’il ne pourrait pas le mettre en rapport avec les Verdurin : « À la garde ! à la garde ! s’était écrié mon grand-père, ça ne m’étonne pas du tout, c’est bien par là que devait finir Swann. Joli milieu !", "en": "One day he received a letter from Swann asking if he could not put him in touch with the Verdurins: “On the watch! on guard! my grandfather exclaimed, “that doesn’t surprise me at all, that’s where Swann was supposed to end. Nice middle!"}, {"start": 1556.22, "end": 1565.68, "b_start": 3074.1, "b_end": 3095.04, "orig": "D’abord je ne peux pas faire ce qu’il me demande parce que je ne connais plus ce monsieur. Et puis ça doit cacher une histoire de femme, je ne me mêle pas de ces affaires-là.", "en": "First of all, I can't do what he asks because I no longer know this gentleman. And then it must be a woman's story, I don't get involved in such matters."}, {"start": 1566.68, "end": 1578.7, "b_start": 3095.04, "b_end": 3120.85, "orig": "Ah bien ! nous allons avoir de l’agrément si Swann s’affuble des petits Verdurin. »\nEt sur la réponse négative de mon grand-père, c’est Odette qui avait amené elle-même Swann chez les Verdurin.", "en": "Oh good! We will be happy if Swann adorns himself with the little Verdurins. » And upon my grandfather's negative response, it was Odette who herself brought Swann to the Verdurins."}, {"start": 1579.7, "end": 1594.37, "b_start": 3120.85, "b_end": 3149.45, "orig": "Les Verdurin avaient eu à dîner, le jour où Swann y fit ses débuts, le docteur et M\nme\nCottard, le jeune pianiste et sa tante, et le peintre qui avait alors leur faveur, auxquels s’étaient joints dans la soirée quelques autres fidèles.", "en": "The Verdurins had dinner on the day Swann made his debut there, the doctor and Madame Cottard, the young pianist and his aunt, and the painter who was then in their favor, who were joined in the evening by a few other faithful."}, {"start": 1595.37, "end": 1603.6, "b_start": 3149.45, "b_end": 3167.48, "orig": "Le docteur Cottard ne savait jamais d’une façon certaine de quel ton il devait répondre à quelqu’un, si son interlocuteur voulait rire ou était sérieux.", "en": "Doctor Cottard never knew for certain in what tone he should respond to someone, whether his interlocutor wanted to laugh or was serious."}, {"start": 1604.6, "end": 1617.34, "b_start": 3167.48, "b_end": 3195.26, "orig": "Et à tout hasard il ajoutait à toutes ses expressions de physionomie l’offre d’un sourire conditionnel et provisoire dont la finesse expectante le disculperait du reproche de naïveté, si le propos qu’on lui avait tenu se trouvait avoir été facétieux.", "en": "And at any chance he added to all his facial expressions the offer of a conditional and provisional smile whose expectant finesse would exonerate him from the reproach of naivety, if the remark made to him happened to have been facetious."}, {"start": 1618.34, "end": 1651.54, "b_start": 3195.26, "b_end": 3264.71, "orig": "Mais comme pour faire face à l’hypothèse opposée il n’osait pas laisser ce sourire s’affirmer nettement sur son visage, on y voyait flotter perpétuellement une incertitude où se lisait la question qu’il n’osait pas poser : « Dites-vous cela pour de bon ? » Il n’était pas plus assuré de la façon dont il devait se comporter dans la rue, et même en général dans la vie, que dans un salon, et on le voyait opposer aux passants, aux voitures, aux événements un malicieux sourire qui ôtait d’avance à son attitude toute impropriété, puisqu’il prouvait, si elle n’était pas de mise, qu’il le savait bien et que s’il avait adopté celle-là, c’était par plaisanterie.", "en": "But as if to face the opposite hypothesis he did not dare to let this smile assert itself clearly on his face, we saw perpetually floating there an uncertainty in which could be read the question that he did not dare to ask: “Are you saying that for real? » He was no more sure of the way he should behave in the street, and even in general in life, than in a living room, and we saw him giving passers-by, cars, events a mischievous smile which removed all impropriety from his attitude in advance, since it proved, if it was not appropriate, that he knew it well and that if he had adopted that one, it was as a joke."}, {"start": 1652.54, "end": 1662.45, "b_start": 3264.71, "b_end": 3286.25, "orig": "Sur tous les points cependant où une franche question lui semblait permise, le docteur ne se faisait pas faute de s’efforcer de restreindre le champ de ses doutes et de compléter son instruction.", "en": "On all points, however, where a frank question seemed permissible, the doctor did not fail to endeavor to restrict the scope of his doubts and to complete his instruction."}, {"start": 1663.45, "end": 1675.54, "b_start": 3286.25, "b_end": 3311.51, "orig": "C’est ainsi que, sur les conseils qu’une mère prévoyante lui avait donnés quand il avait quitté sa province, il ne laissait jamais passer soit une locution ou un nom propre qui lui étaient inconnus sans tâcher de se faire documenter sur eux.", "en": "Thus, on the advice that a far-sighted mother had given him when he left his province, he never let a phrase or a proper name that was unknown to him pass without trying to obtain documentation on them."}, {"start": 1676.54, "end": 1703.18, "b_start": 3311.51, "b_end": 3367.08, "orig": "Pour les locutions, il était insatiable de renseignements, car, leur supposant parfois un sens plus précis qu’elles n’ont, il eût désiré savoir ce qu’on voulait dire exactement par celles qu’il entendait le plus souvent employer : la beauté du diable, du sang bleu, une vie de bâtons de chaise, le quart d’heure de Rabelais, être le prince des élégances, donner carte blanche, être réduit à quia, etc., et dans quels cas déterminés il pouvait à son tour les faire figurer dans ses propos.", "en": "For expressions, he was insatiable for information, because, sometimes supposing them to have a more precise meaning than they actually have, he would have liked to know what was meant exactly by those he most often heard used: the devil's beauty, blue blood, a life of chair sticks, Rabelais's quarter of an hour, being the prince of elegance, giving carte blanche, being reduced to quia, etc., and in what specific cases he could in his turn include them in his remarks."}, {"start": 1704.18, "end": 1718.87, "b_start": 3367.08, "b_end": 3398.77, "orig": "À leur défaut il plaçait des jeux de mots qu’il avait appris. Quant aux noms de personnes nouveaux qu’on prononçait devant lui, il se contentait seulement de les répéter sur un ton interrogatif qu’il pensait suffisant pour lui valoir des explications qu’il n’aurait pas l’air de demander.", "en": "In their absence he placed puns that he had learned. As for the names of new people that were mentioned in front of him, he was content only to repeat them in an interrogative tone which he thought was sufficient to earn him explanations which he would not appear to be asking for."}, {"start": 1719.87, "end": 1735.69, "b_start": 3398.77, "b_end": 3432.84, "orig": "Comme le sens critique qu’il croyait exercer sur tout lui faisait complètement défaut, le raffinement de politesse qui consiste à affirmer à quelqu’un qu’on oblige, sans souhaiter d’en être cru, que c’est à lui qu’on a obligation, était peine perdue avec lui, il prenait tout au pied de la lettre.", "en": "As the critical sense that he thought he had over everything was completely lacking in him, the refinement of politeness which consists of affirming to someone whom one owes, without wishing to be believed, that it is to him that one owes an obligation, was lost with him, he took everything literally."}, {"start": 1736.69, "end": 1776.5, "b_start": 3432.84, "b_end": 3511.76, "orig": "Quel que fût l’aveuglement de M\nme\nVerdurin à son égard, elle avait fini, tout en continuant à le trouver très fin, par être agacée de voir que quand elle l’invitait dans une avant-scène à entendre Sarah Bernhardt, lui disant, pour plus de grâce : « Vous êtes trop aimable d’être venu, docteur, d’autant plus que je suis sûre que vous avez déjà souvent entendu Sarah Bernhardt, et puis nous sommes peut-être trop près de la scène », le docteur qui était entré dans la loge avec un sourire qui attendait pour se préciser ou pour disparaître que quelqu’un d’autorisé le renseignât sur la valeur du spectacle, lui répondait : « En effet on est beaucoup trop près et on commence à être fatigué de Sarah Bernhardt.", "en": "Whatever Ms. Verdurin's blindness towards him, she ended up, while continuing to find him very shrewd, by being annoyed to see that when she invited him in a proscenium to hear Sarah Bernhardt, telling him, for greater grace: \"You are too kind to have come, doctor, especially since I am sure that you have already often heard Sarah Bernhardt, and then we are perhaps too close to the stage\", the doctor who was entered the dressing room with a smile that was waiting to become clearer or to disappear until someone authorized informed him about the value of the spectacle, replied: “Indeed we are much too close and we are starting to get tired of Sarah Bernhardt."}, {"start": 1777.5, "end": 1795.82, "b_start": 3511.76, "b_end": 3549.98, "orig": "Mais vous m’avez exprimé le désir que je vienne. Pour moi vos désirs sont des ordres. Je suis trop heureux de vous rendre ce petit service. Que ne ferait-on pas pour vous être agréable, vous êtes si bonne ! » Et il ajoutait : « Sarah Bernhardt, c’est bien la Voix d’Or, n’est-ce pas ?", "en": "But you expressed to me the desire that I come. For me your desires are orders. I am only too happy to do you this little favor. What wouldn't we do to please you, you are so good! » And he added: “Sarah Bernhardt, it’s definitely the Golden Voice, isn’t it?"}, {"start": 1796.82, "end": 1799.98, "b_start": 3549.98, "b_end": 3558.35, "orig": "On écrit souvent aussi qu’elle brûle les planches.", "en": "It is also often written that she burns the boards."}, {"start": 1800.98, "end": 1817.81, "b_start": 3558.35, "b_end": 3591.05, "orig": "C’est une expression bizarre, n’est-ce pas ? » dans l’espoir de commentaires qui ne venaient point.\n« Tu sais, avait dit M\nme\nVerdurin à son mari, je crois que nous faisons fausse route quand par modestie nous déprécions ce que nous offrons au docteur.", "en": "That’s a weird expression, isn’t it? » in the hope of comments which did not come. “You know,” Madame Verdurin had said to her husband, “I think we are on the wrong track when out of modesty we depreciate what we offer the doctor."}, {"start": 1818.81, "end": 1832.34, "b_start": 3591.05, "b_end": 3619.67, "orig": "C’est un savant qui vit en dehors de l’existence pratique, il ne connaît pas par lui-même la valeur des choses et il s’en rapporte à ce que nous lui en disons. » – « Je n’avais pas osé te le dire, mais je l’avais remarqué », répondit M. Verdurin.", "en": "He is a scholar who lives outside of practical existence, he does not know the value of things for himself and he relies on what we tell him about them. » – “I didn’t dare tell you, but I had noticed it,” replied Mr. Verdurin."}, {"start": 1833.34, "end": 1847.1, "b_start": 3619.67, "b_end": 3650.23, "orig": "Et au jour de l’an suivant, au lieu d’envoyer au docteur Cottard un rubis de trois mille francs en lui disant que c’était bien peu de chose, M. Verdurin acheta pour trois cents francs une pierre reconstituée en laissant entendre qu’on pouvait difficilement en voir d’aussi belle.", "en": "And on the following New Year's Day, instead of sending Doctor Cottard a ruby ​​worth three thousand francs, telling him that it was very little, Mr. Verdurin bought a reconstructed stone for three hundred francs, suggesting that one could hardly see one as beautiful."}, {"start": 1848.1, "end": 1866.12, "b_start": 3650.23, "b_end": 3686.22, "orig": "Quand M\nme\nVerdurin avait annoncé qu’on aurait, dans la soirée, M. Swann : « Swann ? » s’était écrié le docteur d’un accent rendu brutal par la surprise, car la moindre nouvelle prenait toujours plus au dépourvu que quiconque cet homme qui se croyait perpétuellement préparé à tout.", "en": "When Ms. Verdurin announced that we would have Mr. Swann in the evening: “Swann? » had exclaimed the doctor in an accent made brutal by surprise, because the slightest news always took this man who thought he was perpetually prepared for everything more off guard than anyone else."}, {"start": 1867.12, "end": 1886.54, "b_start": 3686.22, "b_end": 3725.83, "orig": "Et voyant qu’on ne lui répondait pas : « Swann ? Qui ça, Swann ! » hurla-t-il au comble d’une anxiété qui se détendit soudain quand M\nme\nVerdurin eut dit : « Mais l’ami dont Odette nous avait parlé. » – « Ah ! bon, bon, ça va bien », répondit le docteur apaisé.", "en": "And seeing that no one answered him: “Swann? Who’s that, Swann! » he shouted at the height of an anxiety which suddenly relaxed when Madame Verdurin said: “But the friend that Odette had told us about. » – “Ah! well, well, it’s all right,” replied the doctor, appeased."}, {"start": 1887.54, "end": 1912.88, "b_start": 3725.83, "b_end": 3777.28, "orig": "Quant au peintre il se réjouissait de l’introduction de Swann chez M\nme\nVerdurin, parce qu’il le supposait amoureux d’Odette et qu’il aimait à favoriser les liaisons. « Rien ne m’amuse comme de faire des mariages, confia-t-il, dans l’oreille, au docteur Cottard, j’en ai déjà réussi beaucoup, même entre femmes ! »\nEn disant aux Verdurin que Swann était très « smart », Odette leur avait fait craindre un « ennuyeux ».", "en": "As for the painter, he was delighted with the introduction of Swann to Madame Verdurin, because he supposed him to be in love with Odette and because he liked to encourage liaisons. “Nothing amuse me like making marriages,” he confided in Dr. Cottard’s ear, “I have already succeeded in many, even between women! » By telling the Verdurins that Swann was very “smart”, Odette had made them fear a “boring” person."}, {"start": 1913.88, "end": 1921.46, "b_start": 3777.28, "b_end": 3796.42, "orig": "Il leur fit au contraire une excellente impression dont à leur insu sa fréquentation dans la société élégante était une des causes indirectes.", "en": "On the contrary, he made an excellent impression on them, of which, unbeknownst to them, his association with elegant society was one of the indirect causes."}, {"start": 1922.46, "end": 1936.5, "b_start": 3796.42, "b_end": 3827.94, "orig": "Il avait en effet sur les hommes même intelligents qui ne sont jamais allés dans le monde une des supériorités de ceux qui y ont un peu vécu, qui est de ne plus le transfigurer par le désir ou par l’horreur qu’il inspire à l’imagination, de le considérer comme sans aucune importance.", "en": "In fact, over even intelligent men who have never been in the world, he had one of the superiorities of those who have lived there a little, which is to no longer transfigure it by desire or by the horror that it inspires in the imagination, to consider it as of no importance."}, {"start": 1937.5, "end": 1953.51, "b_start": 3827.94, "b_end": 3862.2, "orig": "Leur amabilité, séparée de tout snobisme et de la peur de paraître trop aimable, devenue indépendante, a cette aisance, cette grâce des mouvements de ceux dont les membres assouplis exécutent exactement ce qu’ils veulent, sans participation indiscrète et maladroite du reste du corps.", "en": "Their friendliness, separated from all snobbery and the fear of appearing too friendly, become independent, has this ease, this grace of the movements of those whose relaxed limbs execute exactly what they want, without indiscreet and clumsy participation from the rest of the body."}, {"start": 1954.51, "end": 1979.83, "b_start": 3862.2, "b_end": 3918.35, "orig": "La simple gymnastique élémentaire de l’homme du monde tendant la main avec bonne grâce au jeune homme inconnu qu’on lui présente et s’inclinant avec réserve devant l’ambassadeur à qui on le présente, avait fini par passer sans qu’il en fût conscient dans toute l’attitude sociale de Swann, qui vis-à-vis de gens d’un milieu inférieur au sien comme étaient les Verdurin et leurs amis, fit instinctivement montre d’un empressement, se livra à des avances, dont, selon eux, un ennuyeux se fût abstenu.", "en": "The simple elementary gymnastics of the man of the world extending his hand with good grace to the unknown young man who is presented to him and bowing with reserve before the ambassador to whom he is presented, had ended up passing without his being aware of it in the whole social attitude of Swann, who towards people of an inferior background to his own like the Verdurins and their friends, instinctively showed an eagerness, indulged in advances, of which, according to them, a boring would have abstained."}, {"start": 1980.83, "end": 2001.57, "b_start": 3918.35, "b_end": 3961.58, "orig": "Il n’eut un moment de froideur qu’avec le docteur Cottard : en le voyant lui cligner de l’œil et lui sourire d’un air ambigu avant qu’ils se fussent encore parlé (mimique que Cottard appelait « laisser venir »), Swann crut que le docteur le connaissait sans doute pour s’être trouvé avec lui en quelque lieu de plaisir, bien que lui-même y allât pourtant fort peu, n’ayant jamais vécu dans le monde de la noce.", "en": "He only had a moment of coldness with Doctor Cottard: seeing him wink at him and smile at him with an ambiguous air before they had spoken again (a mimicry that Cottard called \"letting it happen\"), Swann believed that the doctor undoubtedly knew him from having been with him in some place of pleasure, although he himself went there very little, having never lived in the world of weddings."}, {"start": 2002.57, "end": 2010.58, "b_start": 3961.58, "b_end": 3979.45, "orig": "Trouvant l’allusion de mauvais goût, surtout en présence d’Odette qui pourrait en prendre une mauvaise idée de lui, il affecta un air glacial.", "en": "Finding the allusion in bad taste, especially in the presence of Odette who might get a bad idea of ​​him, he affected an icy air."}, {"start": 2011.58, "end": 2027.71, "b_start": 3979.45, "b_end": 4010.38, "orig": "Mais quand il apprit qu’une dame qui se trouvait près de lui était M\nme\nCottard, il pensa qu’un mari aussi jeune n’aurait pas cherché à faire allusion devant sa femme à des divertissements de ce genre ; et il cessa de donner à l’air entendu du docteur la signification qu’il redoutait.", "en": "But when he learned that a lady who was near him was Madame Cottard, he thought that such a young husband would not have tried to allude to entertainment of this kind in front of his wife; and he stopped giving the doctor's knowing look the meaning he feared."}, {"start": 2028.71, "end": 2047.12, "b_start": 4010.38, "b_end": 4046.63, "orig": "Le peintre invita tout de suite Swann à venir avec Odette à son atelier, Swann le trouva gentil. « Peut-être qu’on vous favorisera plus que moi, dit M\nme\nVerdurin, sur un ton qui feignait d’êtr
