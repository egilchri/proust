tr’ouverte, tout au loin, d’une couleur autre, dans le velouté d’une lumière interposée, la petite phrase apparaissait, dansante, pastorale, intercalée, épisodique, appartenant à un autre monde.", "en": "It began with the holding of the violin tremolos which for a few measures we hear alone, occupying the entire foreground, then all of a sudden they seemed to move away and as in these paintings by Pieter de Hooch, which are deepened by the narrow frame of a half-open door, far in the distance, of another color, in the velvety of an interposed light, the little phrase appeared, dancing, pastoral, interspersed, episodic, belonging to another world."}, {"start": 4171.28, "end": 4185.78, "b_start": 8240.41, "b_end": 8271.65, "orig": "Elle passait à plis simples et immortels, distribuant çà et là les dons de sa grâce, avec le même ineffable sourire ; mais Swann y croyait distinguer maintenant du désenchantement. Elle semblait connaître la vanité de ce bonheur dont elle montrait la voie.", "en": "She passed in simple and immortal folds, distributing here and there the gifts of her grace, with the same ineffable smile; but Swann believed he could now distinguish disenchantment. She seemed to know the vanity of this happiness to which she showed the way."}, {"start": 4186.78, "end": 4193.06, "b_start": 8271.65, "b_end": 8285.27, "orig": "Dans sa grâce légère, elle avait quelque chose d’accompli, comme le détachement qui succède au regret.", "en": "In her light grace, she had something accomplished, like the detachment that follows regret."}, {"start": 4194.06, "end": 4230.38, "b_start": 8285.27, "b_end": 8360.5, "orig": "Mais peu lui importait, il la considérait moins en elle-même – en ce qu’elle pouvait exprimer pour un musicien qui ignorait l’existence et de lui et d’Odette quand il l’avait composée, et pour tous ceux qui l’entendraient dans des siècles – que comme un gage, un souvenir de son amour qui, même pour les Verdurin ou pour le petit pianiste, faisait penser à Odette en même temps qu’à lui, les unissait ; c’était au point que, comme Odette, par caprice, l’en avait prié, il avait renoncé à son projet de se faire jouer par un artiste la sonate entière, dont il continua à ne connaître que ce passage. « Qu’avez-vous besoin du reste ? lui avait-elle dit.", "en": "But it didn't matter to him, he considered it less in itself - in what it could express for a musician who was unaware of the existence of both him and Odette when he had composed it, and for all those who would hear it centuries from now - than as a token, a memory of his love which, even for the Verdurins or for the little pianist, made one think of Odette at the same time as of him, united them; it was to the point that, as Odette, on a whim, had begged him to do so, he had given up his plan to have the entire sonata played by an artist, of which he continued to know only this passage. “What else do you need? she told him."}, {"start": 4231.38, "end": 4260.73, "b_start": 8360.5, "b_end": 8418.47, "orig": "C’est ça\nnotre\nmorceau. » Et même, souffrant de songer, au moment où elle passait si proche et pourtant à l’infini, que tandis qu’elle s’adressait à eux, elle ne les connaissait pas, il regrettait presque qu’elle eût une signification, une beauté intrinsèque et fixe, étrangère à eux, comme en des bijoux donnés, ou même en des lettres écrites par une femme aimée, nous en voulons à l’eau de la gemme et aux mots du langage, de ne pas être faits uniquement de l’essence d’une liaison passagère et d’un être particulier.", "en": "That’s our piece. » And even, suffering to think, at the moment when she passed so close and yet to infinity, that while she addressed them, she did not know them, he almost regretted that she had a meaning, an intrinsic and fixed beauty, foreign to them, as in given jewels, or even in letters written by a beloved woman, we blame the water of the gem and the words of language, for not being made only of the essence of a connection passing and of a particular being."}, {"start": 4261.73, "end": 4272.7, "b_start": 8418.47, "b_end": 8442.74, "orig": "Souvent il se trouvait qu’il s’était tant attardé avec la jeune ouvrière avant d’aller chez les Verdurin, qu’une fois la petite phrase jouée par le pianiste, Swann s’apercevait qu’il était bientôt l’heure qu’Odette rentrât.", "en": "It often happened that he had lingered so long with the young worker before going to the Verdurins, that once the little phrase had been played by the pianist, Swann noticed that it was almost time for Odette to come home."}, {"start": 4273.7, "end": 4280.32, "b_start": 8442.74, "b_end": 8457.11, "orig": "Il la reconduisait jusqu’à la porte de son petit hôtel, rue La Pérouse, derrière l’Arc de Triomphe.", "en": "He took her back to the door of her small hotel, rue La Pérouse, behind the Arc de Triomphe."}, {"start": 4281.32, "end": 4305.66, "b_start": 8457.11, "b_end": 8509.39, "orig": "Et c’était peut-être à cause de cela, pour ne pas lui demander toutes les faveurs, qu’il sacrifiait le plaisir moins nécessaire pour lui de la voir plus tôt, d’arriver chez les Verdurin avec elle, à l’exercice de ce droit qu’elle lui reconnaissait de partir ensemble et auquel il attachait plus de prix, parce que, grâce à cela, il avait l’impression que personne ne la voyait, ne se mettait entre eux, ne l’empêchait d’être encore avec lui, après qu’il l’avait quittée.", "en": "And it was perhaps because of this, in order not to ask her for all the favors, that he sacrificed the less necessary pleasure for him of seeing her sooner, of arriving at the Verdurins with her, to the exercise of this right that she recognized for him to leave together and to which he attached more value, because, thanks to this, he had the impression that no one saw her, did not come between them, did not prevent her from still being with him, after he had left her."}];
            window.__VOCAB_DATA__ = {};
        </script>

            body.reading-mode .speed-btn { display: none; }

    <body>
        <div class="header-box">
            <div class="header-top">
                <div class="header-left">
                    <div class="header-meta"><em style="font-weight:normal;">Personal/educational use only.</em></div>
                    <h1 class="header-title">À la recherche du temps perdu I – Chapter 7</h1>
                    <div class="header-subtitle">Marcel Proust</div>
                </div>
                <div class="header-right">
                    <audio id="audio" preload="metadata" src="proust-01-ch7.mp3"></audio>
                    <span id="audio-status" class="status-badge"></span>
                </div>
            </div>
            <div class="header-controls">
                <span class="speed-label">SPEED:</span>
                <button class="speed-btn" onclick="setSpeed(0.5)">0.5x</button>
                <button class="speed-btn" onclick="setSpeed(0.75)">0.75x</button>
                <button class="speed-btn active" onclick="setSpeed(1.0)">1x</button>
                <button class="speed-btn" onclick="setSpeed(1.25)">1.25x</button>
                <button class="speed-btn" onclick="setSpeed(1.5)">1.5x</button>
                <span class="divider">|</span>
                <div class="mode-toggle">
                    <button id="modePodcast" class="mode-opt active" onclick="setMode('orig')" title="Listen and follow along with the translated text">Podcast<span class="mode-prog" id="prog-orig"></span></button>
                    <button id="modeInterleaved" class="mode-opt" onclick="setMode('bilingual')" title="Listen to alternating source and English audio">Interleaved<span class="mode-prog" id="prog-bilingual"></span></button>
                    <button id="modeReading" class="mode-opt" onclick="setMode('reading')" title="Scroll through source and translation &#x2014; no audio">Reading<span class="mode-prog" id="prog-reading"></span></button>
                </div>
                <button id="jump-btn" class="jump-btn" style="display:none" onclick="jumpToLast()">&#x21A9; Resume</button>
            </div>
        </div>
        
        <button id="play-btn" onclick="togglePlayPause()">&#x25B6;</button>
        <div id="word-tip">
            <span>Tap a <strong style="color:#1565c0;">blue word</strong> in the transcript to see its definition.</span>
            <span id="word-tip-close" onclick="dismissTip()">&#x2715;</span>
        </div>
        <div id="word-popup">
            <span class="wp-close" onclick="closePopup()">&#x2715;</span>
            <div class="wp-lemma" id="wp-lemma"></div>
            <div class="wp-trans" id="wp-trans"></div>
            <div class="wp-cognate" id="wp-cognate"></div>
            <div class="wp-etym" id="wp-etym"></div>
            <a class="wp-link" id="wp-link" target="_blank" rel="noopener">Open in Folkets lexikon &#x2197;</a>
        </div>
        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modePodcast = document.getElementById('modePodcast');
            const modeInterleaved = document.getElementById('modeInterleaved');
            const modeReading = document.getElementById('modeReading');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "proust-01-ch7.mp3", bilingual: "proust-01-ch7.bilingual.mp3" };
            const startPattern = null;
            const epKey = 'proust.vol1-ch7';
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode] || sources['orig'], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            // --- Reading mode ---
            let readingObserver = null;

            function enterReadingMode() {
                audio.pause();
                document.body.classList.add('reading-mode');
                document.querySelectorAll('.row').forEach(row => {
                    if (readingObserver) readingObserver.observe(row);
                });
                if (epKey) {
                    const saved = parseInt(localStorage.getItem('readScroll_' + epKey) || '0');
                    if (saved > 0) requestAnimationFrame(() => window.scrollTo({ top: saved, behavior: 'instant' }));
                }
            }

            function exitReadingMode() {
                document.body.classList.remove('reading-mode');
                if (readingObserver) { readingObserver.disconnect(); }
                document.querySelectorAll('.en.revealed').forEach(el => el.classList.remove('revealed'));
            }

            readingObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const enEl = entry.target.querySelector('.en');
                        if (enEl) enEl.classList.add('revealed');
                    }
                });
            }, { threshold: 0.3 });

            // --- Sticky position ---
            function updateModeProgress() {
                if (!epKey) return;
                const audioPct = parseFloat(localStorage.getItem('audioPct_' + epKey) || '0');
                const readPct  = parseFloat(localStorage.getItem('readPct_'  + epKey) || '0');
                document.getElementById('prog-orig').textContent      = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-bilingual').textContent = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-reading').textContent   = readPct  > 0 ? Math.round(readPct)  + '%' : '';
            }

            function updateJumpBtn() {
                if (!epKey) return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                document.getElementById('jump-btn').style.display = (mode !== 'reading' && saved > 5) ? '' : 'none';
            }

            function jumpToLast() {
                if (!epKey || mode === 'reading') return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                if (!saved || !data.length) return;
                audio.currentTime = saved;
                const idx = data.findIndex(item => saved >= item.start && saved <= item.end);
                if (idx !== -1) {
                    const row = document.getElementById('row-' + idx);
                    if (row) { userScrolling = false; row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }
                audio.play();
            }

            let lastSaveWallTime = 0;
            function saveAudioPos() {
                if (epKey && mode !== 'reading' && audio.currentTime > 5) {
                    localStorage.setItem('audioPos_' + epKey, audio.currentTime.toString());
                    if (audio.duration > 0) {
                        localStorage.setItem('audioPct_' + epKey, (audio.currentTime / audio.duration * 100).toString());
                    }
                    lastSaveWallTime = Date.now();
                    updateModeProgress();
                }
            }
            audio.addEventListener('pause', saveAudioPos);

            function setMode(newMode) {
                if (newMode === mode) return;
                const wasReading = (mode === 'reading');
                const willRead = (newMode === 'reading');
                if (wasReading) exitReadingMode();
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = newMode;
                if (epKey) localStorage.setItem('epMode_' + epKey, mode);
                modePodcast.classList.toggle('active', mode === 'orig');
                modeInterleaved.classList.toggle('active', mode === 'bilingual');
                modeReading.classList.toggle('active', mode === 'reading');
                if (willRead) {
                    enterReadingMode();
                    return;
                }
                audio.src = sources[mode] || sources['orig'];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                updateJumpBtn();
            }

            checkAudioStatus();
            updateJumpBtn();
            updateModeProgress();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) { playBtn.style.display = 'none'; return; }
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
                playBtn.style.display = 'block';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            let readScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
                if (epKey && mode === 'reading') {
                    clearTimeout(readScrollTimer);
                    readScrollTimer = setTimeout(() => {
                        localStorage.setItem('readScroll_' + epKey, window.scrollY.toString());
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        if (maxScroll > 0) {
                            localStorage.setItem('readPct_' + epKey, (window.scrollY / maxScroll * 100).toString());
                        }
                        updateModeProgress();
                    }, 500);
                }
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('proust-01-ch7.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('proust-01-ch7.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                // Restore sticky mode
                if (epKey) {
                    const savedMode = localStorage.getItem('epMode_' + epKey);
                    if (savedMode && savedMode !== mode) {
                        mode = savedMode;
                        modePodcast.classList.toggle('active', mode === 'orig');
                        modeInterleaved.classList.toggle('active', mode === 'bilingual');
                        modeReading.classList.toggle('active', mode === 'reading');
                        if (mode !== 'reading') {
                            audio.src = sources[mode] || sources['orig'];
                            checkAudioStatus();
                        }
                    }
                }
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (mode === 'reading') {
                    enterReadingMode();
                } else if (data.length > 0) {
                    const savedPos = epKey ? parseFloat(localStorage.getItem('audioPos_' + epKey) || '0') : 0;
                    if (savedPos > 5) {
                        seekTargetTime = savedPos;
                        initialSeekDone = false;
                        applySeek();
                    } else {
                        let targetIdx = 0;
                        if (startPattern !== null) {
                            const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                            const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                            targetIdx = matchIdx !== -1 ? matchIdx : 0;
                        }
                        const target = data[targetIdx];
                        seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                        const targetRow = document.getElementById('row-' + targetIdx);
                        if (targetRow) {
                            requestAnimationFrame(() => {
                                if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                                movePlayBtn(targetRow);
                            });
                        }
                        if (startPattern !== null) applySeek();
                    }
                    updateJumpBtn();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                // Save to localStorage every 5s; update display every tick
                if (Date.now() - lastSaveWallTime > 5000) saveAudioPos();
                if (epKey && audio.duration > 0 && mode !== 'reading') {
                    const pct = Math.round(now / audio.duration * 100);
                    document.getElementById('prog-orig').textContent = pct > 0 ? pct + '%' : '';
                    document.getElementById('prog-bilingual').textContent = pct > 0 ? pct + '%' : '';
                }

                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
