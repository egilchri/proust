e piqué, et qu’on vous montrera le portrait de Cottard (elle l’avait commandé au peintre).", "en": "The painter immediately invited Swann to come with Odette to his studio; Swann found him kind. “Perhaps they will favor you more than me,” said Madame Verdurin, in a tone that pretended to be piqued, “and they will show you the portrait of Cottard (she had ordered it from the painter)."}, {"start": 2048.12, "end": 2059.62, "b_start": 4046.63, "b_end": 4069.75, "orig": "Pensez bien, « monsieur » Biche, rappela-t-elle au peintre, à qui c’était une plaisanterie consacrée de dire monsieur, à rendre le joli regard, le petit côté fin, amusant, de l’œil.", "en": "Think carefully, “Monsieur” Biche, she reminded the painter, to whom it was a joke to say monsieur, to render the pretty look, the little fine, amusing side of the eye."}, {"start": 2060.62, "end": 2078.3, "b_start": 4069.75, "b_end": 4106.84, "orig": "Vous savez que ce que je veux surtout avoir, c’est son sourire, ce que je vous ai demandé c’est le portrait de son sourire. » Et comme cette expression lui sembla remarquable elle la répéta très haut pour être sûre que plusieurs invités l’eussent entendue, et même, sous un prétexte vague, en fit d’abord rapprocher quelques-uns.", "en": "You know that what I especially want to have is his smile, what I asked you for is the portrait of his smile. » And as this expression seemed remarkable to her, she repeated it very loudly to be sure that several guests had heard it, and even, under a vague pretext, first brought a few of them together."}, {"start": 2079.3, "end": 2096.08, "b_start": 4106.84, "b_end": 4141.06, "orig": "Swann demanda à faire la connaissance de tout le monde, même d’un vieil ami des Verdurin, Saniette, à qui sa timidité, sa simplicité et son bon cœur avaient fait perdre partout la considération que lui avaient value sa science d’archiviste, sa grosse fortune, et la famille distinguée dont il sortait.", "en": "Swann asked to get to know everyone, even an old friend of the Verdurins, Saniette, whose shyness, simplicity and good heart had made him lose everywhere the consideration that his knowledge as an archivist, his large fortune, and the distinguished family from which he came."}, {"start": 2097.08, "end": 2108.7, "b_start": 4141.06, "b_end": 4166.22, "orig": "Il avait dans la bouche, en parlant, une bouillie qui était adorable parce qu’on sentait qu’elle trahissait moins un défaut de la langue qu’une qualité de l’âme, comme un reste de l’innocence du premier âge qu’il n’avait jamais perdue.", "en": "As he spoke, he had a mush in his mouth that was adorable because you felt that it betrayed less a defect of the language than a quality of the soul, like a remnant of the innocence of his early years that he had never lost."}, {"start": 2109.7, "end": 2118.24, "b_start": 4166.22, "b_end": 4185.07, "orig": "Toutes les consonnes qu’il ne pouvait prononcer figuraient comme autant de duretés dont il était incapable. En demandant à être présenté à M.", "en": "All the consonants he could not pronounce appeared as so many harshnesses of which he was incapable. By asking to be introduced to Mr."}, {"start": 2119.24, "end": 2150.92, "b_start": 4185.07, "b_end": 4248.9, "orig": "Saniette, Swann fit à M\nme\nVerdurin l’effet de renverser les rôles (au point qu’en réponse, elle dit en insistant sur la différence : « Monsieur Swann, voudriez-vous avoir la bonté de me permettre de vous présenter notre ami Saniette »), mais excita chez Saniette une sympathie ardente que d’ailleurs les Verdurin ne révélèrent jamais à Swann, car Saniette les agaçait un peu, et ils ne tenaient pas à lui faire des amis, mais en revanche Swann les toucha infiniment en croyant devoir demander tout de suite à faire la connaissance de la tante du pianiste.", "en": "Saniette, Swann had the effect of reversing the roles on Ms. Verdurin (to the point that in response, she said, emphasizing the difference: \"Mr. Swann, would you be kind enough to allow me to introduce our friend Saniette to you\"), but excited in Saniette an ardent sympathy which, moreover, the Verdurins never revealed to Swann, because Saniette annoyed them a little, and they did not want to make friends with her, but on the other hand Swann touched them immensely when he thought he had to ask straight away to meet the pianist's aunt."}, {"start": 2151.92, "end": 2167.18, "b_start": 4248.9, "b_end": 4280.57, "orig": "En robe noire comme toujours, parce qu’elle croyait qu’en noir on est toujours bien et que c’est ce qu’il y a de plus distingué, elle avait le visage excessivement rouge comme chaque fois qu’elle venait de manger. Elle s’inclina devant Swann avec respect, mais se redressa avec majesté.", "en": "In a black dress as always, because she believed that in black you always look good and that it is the most distinguished, her face was excessively red like every time she had just eaten. She bowed to Swann with respect, but stood up with majesty."}, {"start": 2168.18, "end": 2187.77, "b_start": 4280.57, "b_end": 4321.16, "orig": "Comme elle n’avait aucune instruction et avait peur de faire des fautes de français, elle prononçait exprès d’une manière confuse, pensant que si elle lâchait un cuir il serait estompé d’un tel vague qu’on ne pourrait le distinguer avec certitude, de sorte que sa conversation n’était qu’un graillonnement indistinct duquel émergeaient de temps à autre les rares vocables dont elle se sentait sûre.", "en": "As she had no education and was afraid of making mistakes in French, she deliberately pronounced in a confused manner, thinking that if she dropped a leather it would be so blurred that one could not distinguish it with certainty, so that her conversation was only an indistinct slurring from which emerged from time to time the rare words of which she felt sure."}, {"start": 2188.77, "end": 2198.68, "b_start": 4321.16, "b_end": 4342.37, "orig": "Swann crut pouvoir se moquer légèrement d’elle en parlant à M. Verdurin, lequel au contraire fut piqué.\n« C’est une si excellente femme, répondit-il.", "en": "Swann thought he could make fun of her slightly by speaking to Mr. Verdurin, who on the contrary was piqued. “She is such an excellent woman,” he replied."}, {"start": 2199.68, "end": 2209.9, "b_start": 4342.37, "b_end": 4363.72, "orig": "Je vous accorde qu’elle n’est pas étourdissante ; mais je vous assure qu’elle est agréable quand on cause seul avec elle. » – « Je n’en doute pas, s’empressa de concéder Swann.", "en": "I grant you that it is not stunning; but I assure you that she is pleasant when you talk alone with her. » – “I have no doubt about it,” Swann hastened to concede."}, {"start": 2210.9, "end": 2224.27, "b_start": 4363.72, "b_end": 4391.5, "orig": "Je voulais dire qu’elle ne me semblait pas « éminente », ajouta-t-il en détachant cet adjectif, et en somme c’est plutôt un compliment ! » – « Tenez, dit M. Verdurin, je vais vous étonner, elle écrit d’une manière charmante.", "en": "I meant that she didn’t seem “eminent” to me, he added, detaching this adjective, and in short it’s more of a compliment! » – “Here,” said Mr. Verdurin, “I’m going to surprise you, she writes in a charming way."}, {"start": 2225.27, "end": 2242.58, "b_start": 4391.5, "b_end": 4426.0, "orig": "Vous n’avez jamais entendu son neveu ? c’est admirable, n’est-ce pas, docteur ? Voulez-vous que je lui demande de jouer quelque chose, Monsieur Swann ? »\n– Mais ce sera un bonheur..., commençait à répondre Swann, quand le docteur l’interrompit d’un air moqueur.", "en": "Have you ever heard of his nephew? That’s admirable, isn’t it, doctor? Would you like me to ask him to play something, Mr. Swann? » – But it will be a pleasure..., Swann began to answer, when the doctor interrupted him with a mocking air."}, {"start": 2243.58, "end": 2258.58, "b_start": 4426.0, "b_end": 4457.74, "orig": "En effet, ayant retenu que dans la conversation l’emphase, l’emploi de formes solennelles, était suranné, dès qu’il entendait un mot grave dit sérieusement comme venait de l’être le mot « bonheur », il croyait que celui qui l’avait prononcé venait de se montrer prudhommesque.", "en": "Indeed, having remembered that in conversation emphasis, the use of solemn forms, was out of date, as soon as he heard a serious word said seriously like the word \"happiness\" had just been, he believed that the one who had pronounced it had just been prudish."}, {"start": 2259.58, "end": 2283.79, "b_start": 4457.74, "b_end": 4509.23, "orig": "Et si, de plus, ce mot se trouvait figurer par hasard dans ce qu’il appelait un vieux cliché, si courant que ce mot fût d’ailleurs, le docteur supposait que la phrase commencée était ridicule et la terminait ironiquement par le lieu commun qu’il semblait accuser son interlocuteur d’avoir voulu placer, alors que celui-ci n’y avait jamais pensé.\n– Un bonheur pour la France ! s’écria-t-il malicieusement en levant les bras avec emphase.", "en": "And if, moreover, this word happened to appear by chance in what he called an old cliché, however common this word was, the doctor assumed that the sentence he had begun was ridiculous and ended it ironically with the commonplace that he seemed to accuse his interlocutor of having wanted to place, even though the latter had never thought of it. – A joy for France! he exclaimed mischievously, raising his arms emphatically."}, {"start": 2284.79, "end": 2298.23, "b_start": 4509.23, "b_end": 4535.98, "orig": "M. Verdurin ne put s’empêcher de rire.\n– Qu’est-ce qu’ils ont à rire toutes ces bonnes gens-là, on a l’air de ne pas engendrer la mélancolie dans votre petit coin là-bas, s’écria M\nme\nVerdurin.", "en": "Mr. Verdurin could not help laughing. “What are all these good people laughing at? We don’t seem to be causing melancholy in your little corner over there,” cried Madame Verdurin."}, {"start": 2299.23, "end": 2307.27, "b_start": 4535.98, "b_end": 4552.12, "orig": "Si vous croyez que je m’amuse, moi, à rester toute seule en pénitence, ajouta-t-elle sur un ton dépité, en faisant l’enfant.", "en": "If you think I enjoy being alone in penance,” she added in a disappointed tone, acting like a child."}, {"start": 2308.27, "end": 2331.36, "b_start": 4552.12, "b_end": 4598.78, "orig": "M\nme\nVerdurin était assise sur un haut siège suédois en sapin ciré, qu’un violoniste de ce pays lui avait donné et qu’elle conservait, quoiqu’il rappelât la forme d’un escabeau et jurât avec les beaux meubles anciens qu’elle avait, mais elle tenait à garder en évidence les cadeaux que les fidèles avaient l’habitude de lui faire de temps en temps, afin que les donateurs eussent le plaisir de les reconnaître quand ils venaient.", "en": "Ms. Verdurin was seated on a high Swedish seat in waxed fir, which a violinist from that country had given her and which she kept, although it was shaped like a stepladder and clashed with the beautiful old furniture she had, but she wanted to keep in evidence the gifts that the faithful were in the habit of giving her from time to time, so that the donors would have the pleasure of recognizing them when they came."}, {"start": 2332.36, "end": 2348.9, "b_start": 4598.78, "b_end": 4634.15, "orig": "Aussi tâchait-elle de persuader qu’on s’en tînt aux fleurs et aux bonbons, qui du moins se détruisent ; mais elle n’y réussissait pas et c’était chez elle une collection de chauffe-pieds, de coussins, de pendules, de paravents, de baromètres, de potiches, dans une accumulation de redites et un disparate d’étrennes.", "en": "So she tried to persuade people to stick to flowers and sweets, which at least get destroyed; but she did not succeed and her home was a collection of foot warmers, cushions, clocks, screens, barometers, vases, in an accumulation of repetitions and a patchwork of New Year gifts."}, {"start": 2349.9, "end": 2368.42, "b_start": 4634.15, "b_end": 4674.05, "orig": "De ce poste élevé elle participait avec entrain à la conversation des fidèles et s’égayait de leurs « fumisteries », mais depuis l’accident qui était arrivé à sa mâchoire, elle avait renoncé à prendre la peine de pouffer effectivement et se livrait à la place à une mimique conventionnelle qui signifiait, sans fatigue ni risques pour elle, qu’elle riait aux larmes.", "en": "From this high position she participated with enthusiasm in the conversation of the faithful and was amused by their \"humbugs\", but since the accident which had happened to her jaw, she had given up taking the trouble to actually giggle and indulged instead in a conventional mimicry which meant, without fatigue or risk for her, that she was laughing until tears."}, {"start": 2369.42, "end": 2377.49, "b_start": 4674.05, "b_end": 4692.8, "orig": "Au moindre mot que lâchait un habitué contre un ennuyeux ou contre un ancien habitué rejeté au camp des ennuyeux – et pour le plus grand désespoir de M.", "en": "At the slightest word that a regular uttered against a boring person or against a former regular thrown into the boring camp – and to the great despair of Mr."}, {"start": 2378.49, "end": 2411.13, "b_start": 4692.8, "b_end": 4762.46, "orig": "Verdurin qui avait eu longtemps la prétention d’être aussi aimable que sa femme, mais qui riant pour de bon s’essoufflait vite et avait été distancé et vaincu par cette ruse d’une incessante et fictive hilarité – elle poussait un petit cri, fermait entièrement ses yeux d’oiseau qu’une taie commençait à voiler, et brusquement, comme si elle n’eût eu que le temps de cacher un spectacle indécent ou de parer à un accès mortel, plongeant sa figure dans ses mains qui la recouvraient et n’en laissaient plus rien voir, elle avait l’air de s’efforcer de réprimer, d’anéantir un rire qui, si elle s’y fût abandonnée, l’eût conduite à l’évanouissement.", "en": "Verdurin, who had long claimed to be as amiable as his wife, but who, laughing for real, quickly ran out of steam and had been distanced and defeated by this ruse of incessant and fictitious hilarity - she uttered a little cry, completely closed her bird's eyes which a pillowcase was beginning to veil, and suddenly, as if she had only had time to hide an indecent spectacle or to ward off a deadly attack, plunging her face into her hands which covered her and left nothing to be seen, she seemed to be trying to repress, to annihilate a laughter which, if she had indulged in it, would have led her to faint."}, {"start": 2412.13, "end": 2430.56, "b_start": 4762.46, "b_end": 4797.35, "orig": "Telle, étourdie par la gaîté des fidèles, ivre de camaraderie, de médisance et d’assentiment, M\nme\nVerdurin, juchée sur son perchoir, pareille à un oiseau dont on eût trempé le colifichet dans du vin chaud, sanglotait d’amabilité. Cependant, M.", "en": "Like that, stunned by the gaiety of the faithful, drunk with camaraderie, slander and assent, Ms. Verdurin, perched on her perch, like a bird whose trinket had been dipped in mulled wine, sobbed with kindness. However, Mr."}, {"start": 2431.56, "end": 2455.58, "b_start": 4797.35, "b_end": 4844.23, "orig": "Verdurin, après avoir demandé à Swann la permission d’allumer sa pipe (« ici on ne se gêne pas, on est entre camarades »), priait le jeune artiste de se mettre au piano.\n– Allons, voyons, ne l’ennuie pas, il n’est pas ici pour être tourmenté, s’écria M\nme\nVerdurin, je ne veux pas qu’on le tourmente, moi !\n– Mais pourquoi veux-tu que ça l’ennuie, dit M.", "en": "Verdurin, after asking Swann's permission to light his pipe (\"here we don't shy away from each other, we are among comrades\"), asked the young artist to sit down at the piano. – Come on, don’t bother him, he’s not here to be tormented, cried Madame Verdurin, I don’t want him to be tormented! – But why do you want it to bother him, said M."}, {"start": 2456.58, "end": 2458.86, "b_start": 4844.23, "b_end": 4850.24, "orig": "Verdurin, M.", "en": "Verdurin, M."}, {"start": 2459.86, "end": 2487.42, "b_start": 4850.24, "b_end": 4904.21, "orig": "Swann ne connaît peut-être pas la sonate en fa dièse que nous avons découverte ; il va nous jouer l’arrangement pour piano.\n– Ah ! non, non, pas ma sonate ! cria M\nme\nVerdurin, je n’ai pas envie à force de pleurer de me fiche un rhume de cerveau avec névralgies faciales, comme la dernière fois ; merci du cadeau, je ne tiens pas à recommencer ; vous êtes bons vous autres, on voit bien que ce n’est pas vous qui garderez le lit huit jours !", "en": "Swann may not know the F sharp sonata we discovered; he’s going to play the piano arrangement for us. – Oh! no, no, not my sonata! shouted Madame Verdurin, I don't want to cry so much that I get a head cold with facial neuralgia, like last time; thank you for the gift, I don't want to do it again; You guys are good, we can see that it’s not you who will stay in bed for eight days!"}, {"start": 2488.42, "end": 2501.02, "b_start": 4904.21, "b_end": 4929.66, "orig": "Cette petite scène qui se renouvelait chaque fois que le pianiste allait jouer enchantait les amis aussi bien que si elle avait été nouvelle, comme une preuve de la séduisante originalité de la « Patronne » et de sa sensibilité musicale.", "en": "This little scene which was repeated each time the pianist went to play enchanted the friends as much as if it had been new, as proof of the seductive originality of the “Patronne” and her musical sensitivity."}, {"start": 2502.02, "end": 2525.97, "b_start": 4929.66, "b_end": 4980.1, "orig": "Ceux qui étaient près d’elle faisaient signe à ceux qui plus loin fumaient ou jouaient aux cartes, de se rapprocher, qu’il se passait quelque chose, leur disant comme on fait au Reichstag dans les moments intéressants : « Écoutez, écoutez. » Et le lendemain on donnait des regrets à ceux qui n’avaient pas pu venir en leur disant que la scène avait été encore plus amusante que d’habitude.\n– Eh bien ! voyons, c’est entendu, dit M.", "en": "Those who were near her signaled to those who were further away smoking or playing cards to come closer, that something was happening, saying to them as one does in the Reichstag at interesting moments: “Listen, listen. » And the next day we expressed regret to those who had not been able to come, telling them that the scene had been even more amusing than usual. - Well ! let's see, that's understood, said M."}, {"start": 2526.97, "end": 2542.69, "b_start": 4980.1, "b_end": 5012.6, "orig": "Verdurin, il ne jouera que l’andante.\n– Que l’andante, comme tu y vas ! s’écria M\nme\nVerdurin. C’est justement l’andante qui me casse bras et jambes. Il est vraiment superbe le Patron !", "en": "Verdurin, he will only play the andante. – Than the andante, as you go! cried Madame Verdurin. It’s precisely the andante that breaks my arms and legs. The Boss is really superb!"}, {"start": 2543.69, "end": 2551.06, "b_start": 5012.6, "b_end": 5027.76, "orig": "C’est comme si dans la « Neuvième » il disait : nous n’entendrons que le finale, ou dans « les Maîtres » que l’ouverture.", "en": "It’s as if in the “Ninth” he said: we will only hear the finale, or in “the Masters” only the opening."}, {"start": 2552.06, "end": 2588.22, "b_start": 5027.76, "b_end": 5103.52, "orig": "Le docteur, cependant, poussait M\nme\nVerdurin à laisser jouer le pianiste, non pas qu’il crût feints les troubles que la musique lui donnait – il y reconnaissait certains états neurasthéniques – mais par cette habitude qu’ont beaucoup de médecins de faire fléchir immédiatement la sévérité de leurs prescriptions dès qu’est en jeu, chose qui leur semble beaucoup plus importante, quelque réunion mondaine dont ils font partie et dont la personne à qui ils conseillent d’oublier pour une fois sa dyspepsie, ou sa grippe, est un des facteurs essentiels.\n– Vous ne serez pas malade cette fois-ci, vous verrez, dit-il en cherchant à la suggestionner du regard.", "en": "The doctor, however, pushed Ms. Verdurin to let the pianist play, not because he believed the disturbances that the music was giving her were feigning - he recognized in them certain neurasthenic states - but through the habit that many doctors have of immediately lowering the severity of their prescriptions as soon as there is at stake, something which seems much more important to them, some social gathering of which they are a part and of which the person to whom they are advising should forget for once. his dyspepsia, or his flu, is one of the essential factors. “You won’t be sick this time, you’ll see,” he said, trying to suggest her with his eyes."}, {"start": 2589.22, "end": 2601.46, "b_start": 5103.52, "b_end": 5128.7, "orig": "Et si vous êtes malade nous vous soignerons.\n– Bien vrai ? répondit M\nme\nVerdurin, comme si devant l’espérance d’une telle faveur il n’y avait plus qu’à capituler.", "en": "And if you are sick we will take care of you. – Is that true? replied Madame Verdurin, as if faced with the hope of such a favor there was nothing left to do but capitulate."}, {"start": 2602.46, "end": 2610.89, "b_start": 5128.7, "b_end": 5148.08, "orig": "Peut-être aussi, à force de dire qu’elle serait malade, y avait-il des moments où elle ne se rappelait plus que c’était un mensonge et prenait une âme de malade.", "en": "Perhaps also, by saying so much that she would be ill, there were times when she no longer remembered that it was a lie and took on the appearance of a sick person."}, {"start": 2611.89, "end": 2631.11, "b_start": 5148.08, "b_end": 5191.03, "orig": "Or ceux-ci, fatigués d’être toujours obligés de faire dépendre de leur sagesse la rareté de leurs accès, aiment se laisser aller à croire qu’ils pourront faire impunément tout ce qui leur plaît et leur fait mal d’habitude, à condition de se remettre en les mains d’un être puissant, qui, sans qu’ils aient aucune peine à prendre, d’un mot ou d’une pilule, les remettra sur pied.", "en": "Now these people, tired of always being obliged to make the rarity of their attacks depend on their wisdom, like to let themselves be led to believe that they will be able to do with impunity whatever pleases them and usually hurts them, on the condition of putting themselves in the hands of a powerful being, who, without them having any trouble taking, with a word or a pill, will put them back on their feet."}, {"start": 2632.11, "end": 2643.3, "b_start": 5191.03, "b_end": 5212.21, "orig": "Odette était allée s’asseoir sur un canapé de tapisserie qui était près du piano :\n– Vous savez, j’ai ma petite place, dit-elle à M\nme\nVerdurin.", "en": "Odette had gone to sit down on a tapestry sofa which was near the piano: “You know, I have my own place,” she said to Madame Verdurin."}, {"start": 2644.3, "end": 2655.0, "b_start": 5212.21, "b_end": 5233.94, "orig": "Celle-ci, voyant Swann sur une chaise, le fit lever :\n– Vous n’êtes pas bien là, allez donc vous mettre à côté d’Odette, n’est-ce pas Odette, vous ferez bien une place à M.", "en": "The latter, seeing Swann on a chair, made him stand up: – You are not well there, go and stand next to Odette, don’t you Odette, you will make a place for M."}, {"start": 2656.0, "end": 2676.02, "b_start": 5233.94, "b_end": 5272.21, "orig": "Swann ?\n– Quel joli beauvais, dit avant de s’asseoir Swann qui cherchait à être aimable.\n– Ah ! je suis contente que vous appréciiez mon canapé, répondit M\nme\nVerdurin. Et je vous préviens que si vous voulez en voir d’aussi beau, vous pouvez y renoncer tout de suite.", "en": "Swann? “What a pretty Beauvais,” said Swann before sitting down, trying to be friendly. – Oh! “I’m glad you like my sofa,” replied Ms. Verdurin. And I warn you that if you want to see something this beautiful, you can give it up right away."}, {"start": 2677.02, "end": 2694.3, "b_start": 5272.21, "b_end": 5308.03, "orig": "Jamais ils n’ont rien fait de pareil. Les petites chaises aussi sont des merveilles. Tout à l’heure vous regarderez cela. Chaque bronze correspond comme attribut au petit sujet du siège ; vous savez, vous avez de quoi vous amuser si vous voulez regarder cela, je vous promets un bon moment.", "en": "They have never done anything like this. The little chairs are also wonderful. You will look at this later. Each bronze corresponds in attribute to the small subject of the seat; you know, you have a lot of fun if you want to watch this, I promise you a good time."}, {"start": 2695.3, "end": 2710.39, "b_start": 5308.03, "b_end": 5339.12, "orig": "Rien que les petites frises des bordures, tenez là, la petite vigne sur fond rouge de l’Ours et les Raisins. Est-ce dessiné ? Qu’est-ce que vous en dites, je crois qu’ils le savaient plutôt, dessiner ! Est-elle assez appétissante cette vigne ?", "en": "Nothing but the little friezes of the borders, see there, the little vine on a red background of the Bear and the Grapes. Is it drawn? What do you say, I think they knew how to draw! Is this vine appetizing enough?"}, {"start": 2711.39, "end": 2725.12, "b_start": 5339.12, "b_end": 5367.62, "orig": "Mon mari prétend que je n’aime pas les fruits parce que j’en mange moins que lui. Mais non, je suis plus gourmande que vous tous, mais je n’ai pas besoin de me les mettre dans la bouche puisque je jouis par les yeux. Qu’est ce que vous avez tous à rire ?", "en": "My husband claims that I don't like fruit because I eat less of it than him. But no, I'm greedier than all of you, but I don't need to put them in my mouth since I cum through my eyes. What are you all laughing at?"}, {"start": 2726.12, "end": 2743.16, "b_start": 5367.62, "b_end": 5403.23, "orig": "Demandez au docteur, il vous dira que ces raisins-là me purgent. D’autres font des cures de Fontainebleau, moi je fais ma petite cure de Beauvais. Mais, monsieur Swann, vous ne partirez pas sans avoir touché les petits bronzes des dossiers. Est-ce assez doux comme patine ?", "en": "Ask the doctor, he will tell you that these grapes purge me. Others take cures in Fontainebleau, I do my little cure in Beauvais. But, Mr. Swann, you will not leave without having touched the little bronzes in the files. Is it soft enough as a patina?"}, {"start": 2744.16, "end": 2757.96, "b_start": 5403.23, "b_end": 5432.52, "orig": "Mais non, à pleines mains, touchez-les bien.\n– Ah ! si madame Verdurin commence à peloter les bronzes, nous n’entendrons pas de musique ce soir, dit le peintre.\n– Taisez-vous, vous êtes un vilain.", "en": "But no, with both hands, touch them well. – Oh! If Madame Verdurin starts touching the bronzes, we won't hear any music this evening, said the painter. – Shut up, you’re a bad guy."}, {"start": 2758.96, "end": 2770.05, "b_start": 5432.52, "b_end": 5456.44, "orig": "Au fond, dit-elle en se tournant vers Swann, on nous défend à nous autres femmes des choses moins voluptueuses que cela. Mais il n’y a pas une chair comparable à cela ! Quand M.", "en": "Basically, she said, turning to Swann, we women are forbidden from doing things less voluptuous than that. But there is no flesh like this! When Mr."}, {"start": 2771.05, "end": 2785.38, "b_start": 5456.44, "b_end": 5485.51, "orig": "Verdurin me faisait l’honneur d’être jaloux de moi – allons, sois poli au moins, ne dis pas que tu ne l’as jamais été...\n– Mais je ne dis absolument rien. Voyons, docteur, je vous prends à témoin : est-ce que j’ai dit quelque chose ?", "en": "Verdurin did me the honor of being jealous of me – come on, at least be polite, don’t say that you never were… – But I said absolutely nothing. Let's see, doctor, I call you to witness: did I say something?"}, {"start": 2786.38, "end": 2801.28, "b_start": 5485.51, "b_end": 5517.23, "orig": "Swann palpait les bronzes par politesse et n’osait pas cesser tout de suite.\n– Allons, vous les caresserez plus tard ; maintenant c’est vous qu’on va caresser, qu’on va caresser dans l’oreille ; vous aimez cela, je pense ; voilà un petit jeune homme qui va s’en charger.", "en": "Swann touched the bronzes out of politeness and did not dare stop immediately. – Come on, you will caress them later; now it’s you we’re going to caress, who we’re going to caress in the ear; you like it, I think; here is a little young man who will take care of it."}, {"start": 2802.28, "end": 2817.74, "b_start": 5517.23, "b_end": 5547.38, "orig": "Or quand le pianiste eut joué, Swann fut plus aimable encore avec lui qu’avec les autres personnes qui se trouvaient là. Voici pourquoi :\nL’année précédente, dans une soirée, il avait entendu une œuvre musicale exécutée au piano et au violon.", "en": "Now when the pianist had played, Swann was even more friendly to him than to the other people who were there. Here's why: The year before, at a party, he had heard a musical work performed on the piano and violin."}, {"start": 2818.74, "end": 2824.21, "b_start": 5547.38, "b_end": 5560.5, "orig": "D’abord, il n’avait goûté que la qualité matérielle des sons sécrétés par les instruments.", "en": "At first, he had only tasted the material quality of the sounds secreted by the instruments."}, {"start": 2825.21, "end": 2844.58, "b_start": 5560.5, "b_end": 5600.64, "orig": "Et ç’avait déjà été un grand plaisir quand au-dessous de la petite ligne du violon mince, résistante, dense et directrice, il avait vu tout d’un coup chercher à s’élever en un clapotement liquide, la masse de la partie de piano, multiforme, indivise, plane et entrechoquée comme la mauve agitation des flots que charme et bémolise le clair de lune.", "en": "And it had already been a great pleasure when, below the little line of the violin, thin, resistant, dense and guiding, he had suddenly seen the mass of the piano part, multiform, undivided, plane and clashing like the mauve agitation of the waves charmed and flattened by the moonlight, suddenly trying to rise in a liquid splash."}, {"start": 2845.58, "end": 2864.68, "b_start": 5600.64, "b_end": 5641.62, "orig": "Mais à un moment donné, sans pouvoir nettement distinguer un contour, donner un nom à ce qui lui plaisait, charmé tout d’un coup, il avait cherché à recueillir la phrase ou l’harmonie – il ne savait lui-même – qui passait et qui lui avait ouvert plus largement l’âme, comme certaines odeurs de roses circulant dans l’air humide du soir ont la propriété de dilater nos narines.", "en": "But at a given moment, without being able to clearly distinguish an outline, give a name to what he liked, suddenly charmed, he tried to collect the phrase or harmony – he himself did not know – which passed and which opened his soul more widely, just as certain odors of roses circulating in the humid evening air have the property of dilating our nostrils."}, {"start": 2865.68, "end": 2879.53, "b_start": 5641.62, "b_end": 5672.69, "orig": "Peut-être est-ce parce qu’il ne savait pas la musique qu’il avait pu éprouver une impression aussi confuse, une de ces impressions qui sont peut-être pourtant les seules purement musicales, inétendues, entièrement originales, irréductibles à tout autre ordre d’impressions.", "en": "Perhaps it is because he did not know music that he was able to experience such a confused impression, one of those impressions which are perhaps the only ones that are purely musical, unextended, entirely original, irreducible to any other order of impressions."}, {"start": 2880.53, "end": 2887.13, "b_start": 5672.69, "b_end": 5686.31, "orig": "Une impression de ce genre, pendant un instant, est pour ainsi dire\nsine materia\n.", "en": "An impression of this kind, for a moment, is, so to speak, sine materia."}, {"start": 2888.13, "end": 2903.85, "b_start": 5686.31, "b_end": 5718.58, "orig": "Sans doute les notes que nous entendons alors, tendent déjà, selon leur hauteur et leur quantité, à couvrir devant nos yeux des surfaces de dimensions variées, à tracer des arabesques, à nous donner des sensations de largeur, de ténuité, de stabilité, de caprice.", "en": "No doubt the notes that we then hear already tend, depending on their height and quantity, to cover before our eyes surfaces of varied dimensions, to trace arabesques, to give us sensations of width, of tenuity, of stability, of caprice."}, {"start": 2904.85, "end": 2913.68, "b_start": 5718.58, "b_end": 5739.04, "orig": "Mais les notes sont évanouies avant que ces sensations soient assez formées en nous pour ne pas être submergées par celles qu’éveillent déjà les notes suivantes ou même simultanées.", "en": "But the notes fade away before these sensations are sufficiently formed in us not to be overwhelmed by those already awakened by the following or even simultaneous notes."}, {"start": 2914.68, "end": 2945.5, "b_start": 5739.04, "b_end": 5802.1, "orig": "Et cette impression continuerait à envelopper de sa liquidité et de son « fondu » les motifs qui par instants en émergent, à peine discernables, pour plonger aussitôt et disparaître, connus seulement par le plaisir particulier qu’ils donnent, impossibles à décrire, à se rappeler, à nommer, ineffables – si la mémoire, comme un ouvrier qui travaille à établir des fondations durables au milieu des flots, en fabriquant pour nous des fac-similés de ces phrases fugitives, ne nous permettait de les comparer à celles qui leur succèdent et de les différencier.", "en": "And this impression would continue to envelop with its liquidity and its \"meltdown\" the motifs which at moments emerge, barely discernible, to plunge immediately and disappear, known only by the particular pleasure they give, impossible to describe, to remember, to name, ineffable - if memory, like a worker who works to establish lasting foundations in the middle of the waves, by making for us facsimiles of these fleeting sentences, did not allow us to compare them to those which succeed and differentiate them."}, {"start": 2946.5, "end": 2964.57, "b_start": 5802.1, "b_end": 5839.14, "orig": "Ainsi à peine la sensation délicieuse que Swann avait ressentie était-elle expirée, que sa mémoire lui en avait fourni séance tenante une transcription sommaire et provisoire, mais sur laquelle il avait jeté les yeux tandis que le morceau continuait, si bien que, quand la même impression était tout d’un coup revenue, elle n’était déjà plus insaisissable.", "en": "So as soon as the delicious sensation that Swann had felt had expired, his memory immediately provided him with a summary and provisional transcription, but on which he cast his eyes while the piece continued, so that, when the same impression suddenly returned, it was already no longer elusive."}, {"start": 2965.57, "end": 2980.52, "b_start": 5839.14, "b_end": 5868.96, "orig": "Il s’en représentait l’étendue, les groupements symétriques, la graphie, la valeur expressive ; il avait devant lui cette chose qui n’est plus de la musique pure, qui est du dessin, de l’architecture, de la pensée, et qui permet de se rappeler la musique.", "en": "He imagined its extent, the symmetrical groupings, the writing, the expressive value; he had before him this thing which is no longer pure music, which is drawing, architecture, thought, and which allows us to remember music."}, {"start": 2981.52, "end": 2987.69, "b_start": 5868.96, "b_end": 5882.75, "orig": "Cette fois il avait distingué nettement une phrase s’élevant pendant quelques instants au-dessus des ondes sonores.", "en": "This time he had clearly distinguished a sentence rising for a few moments above the sound waves."}, {"start": 2988.69, "end": 3001.0, "b_start": 5882.75, "b_end": 5909.16, "orig": "Elle lui avait proposé aussitôt des voluptés particulières, dont il n’avait jamais eu l’idée avant de l’entendre, dont il sentait que rien autre qu’elle ne pourrait les lui faire connaître, et il avait éprouvé pour elle comme un amour inconnu.", "en": "She had immediately offered him particular pleasures, of which he had never had the idea before hearing her, of which he felt that nothing other than her could make him aware of them, and he had felt for her a sort of unknown love."}, {"start": 3002.0, "end": 3009.61, "b_start": 5909.16, "b_end": 5926.98, "orig": "D’un rythme lent elle le dirigeait ici d’abord, puis là, puis ailleurs, vers un bonheur noble, inintelligible et précis.", "en": "With a slow rhythm she directed him first here, then there, then elsewhere, towards a noble, unintelligible and precise happiness."}, {"start": 3010.61, "end": 3026.66, "b_start": 5926.98, "b_end": 5961.53, "orig": "Et tout d’un coup, au point où elle était arrivée et d’où il se préparait à la suivre, après une pause d’un instant, brusquement elle changeait de direction, et d’un mouvement nouveau, plus rapide, menu, mélancolique, incessant et doux, elle l’entraînait avec elle vers des perspectives inconnues.", "en": "And all of a sudden, at the point where she had arrived and from where he was preparing to follow her, after a moment's pause, suddenly she changed direction, and with a new movement, more rapid, slight, melancholy, incessant and gentle, she took him with her towards unknown perspectives."}, {"start": 3027.66, "end": 3039.04, "b_start": 5961.53, "b_end": 5986.64, "orig": "Puis elle disparut. Il souhaita passionnément la revoir une troisième fois. Et elle reparut en effet mais sans lui parler plus clairement, en lui causant même une volupté moins profonde.", "en": "Then she disappeared. He passionately wished to see her a third time. And she indeed reappeared but without speaking to him more clearly, even causing him a less profound pleasure."}, {"start": 3040.04, "end": 3056.02, "b_start": 5986.64, "b_end": 6022.32, "orig": "Mais rentré chez lui il eut besoin d’elle, il était comme un homme dans la vie de qui une passante qu’il a aperçue un moment vient de faire entrer l’image d’une beauté nouvelle qui donne à sa propre sensibilité une valeur plus grande, sans qu’il sache seulement s’il pourra revoir jamais celle qu’il aime déjà et dont il ignore jusqu’au nom.", "en": "But when he returned home he needed her, he was like a man into whose life a passer-by whom he had seen for a moment had just introduced the image of a new beauty which gave his own sensitivity a greater value, without him even knowing if he would ever be able to see again the one he already loved and whose very name he did not know."}, {"start": 3057.02, "end": 3064.44, "b_start": 6022.32, "b_end": 6038.68, "orig": "Même cet amour pour une phrase musicale sembla un instant devoir amorcer chez Swann la possibilité d’une sorte de rajeunissement.", "en": "Even this love for a musical phrase seemed for a moment to initiate in Swann the possibility of a sort of rejuvenation."}, {"start": 3065.44, "end": 3084.86, "b_start": 6038.68, "b_end": 6081.36, "orig": "Depuis si longtemps il avait renoncé à appliquer sa vie à un but idéal et la bornait à la poursuite de satisfactions quotidiennes, qu’il croyait, sans jamais se le dire formellement, que cela ne changerait plus jusqu’à sa mort ; bien plus, ne se sentant plus d’idées élevées dans l’esprit, il avait cessé de croire à leur réalité, sans pouvoir non plus la nier tout à fait.", "en": "For so long he had given up applying his life to an ideal goal and limited it to the pursuit of daily satisfactions, that he believed, without ever telling himself formally, that this would no longer change until his death; moreover, no longer feeling lofty ideas in his mind, he had ceased to believe in their reality, without being able to completely deny it either."}, {"start": 3085.86, "end": 3093.3, "b_start": 6081.36, "b_end": 6097.38, "orig": "Aussi avait-il pris l’habitude de se réfugier dans des pensées sans importance et qui lui permettaient de laisser de côté le fond des choses.", "en": "So he had gotten into the habit of taking refuge in unimportant thoughts that allowed him to leave the heart of things aside."}, {"start": 3094.3, "end": 3119.28, "b_start": 6097.38, "b_end": 6151.61, "orig": "De même qu’il ne se demandait pas s’il n’eût pas mieux fait de ne pas aller dans le monde, mais en revanche savait avec certitude que s’il avait accepté une invitation il devait s’y rendre, et que s’il ne faisait pas de visite après il lui fallait laisser des cartes, de même dans sa conversation il s’efforçait de ne jamais exprimer avec cœur une opinion intime sur les choses, mais de fournir des détails matériels qui valaient en quelque sorte par eux-mêmes et lui permettaient de ne pas donner sa mesure.", "en": "Just as he did not ask himself whether he would not have been better off not going into society, but on the other hand knew with certainty that if he had accepted an invitation he had to go there, and that if he did not pay a visit afterwards he had to leave cards, so in his conversation he tried never to express from the heart an intimate opinion on things, but to provide material details which were in some way worth in themselves and enabled him not to give away his opinion. measurement."}, {"start": 3120.28, "end": 3128.58, "b_start": 6151.61, "b_end": 6169.4, "orig": "Il était extrêmement précis pour une recette de cuisine, pour la date de la naissance ou de la mort d’un peintre, pour la nomenclature de ses œuvres.", "en": "It was extremely precise for a cooking recipe, for the date of the birth or death of a painter, for the nomenclature of his works."}, {"start": 3129.58, "end": 3141.54, "b_start": 6169.4, "b_end": 6195.29, "orig": "Parfois, malgré tout, il se laissait aller à émettre un jugement sur une œuvre, sur une manière de comprendre la vie, mais il donnait alors à ses paroles un ton ironique comme s’il n’adhérait pas tout entier à ce qu’il disait.", "en": "Sometimes, despite everything, he allowed himself to pass judgment on a work, on a way of understanding life, but he then gave his words an ironic tone as if he did not entirely agree with what he was saying."}, {"start": 3142.54, "end": 3183.24, "b_start": 6195.29, "b_end": 6280.33, "orig": "Or, comme certains valétudinaires chez qui, tout d’un coup, un pays où ils sont arrivés, un régime différent, quelquefois une évolution organique, spontanée et mystérieuse, semblent amener une telle régression de leur mal qu’ils commencent à envisager la possibilité inespérée de commencer sur le tard une vie toute différente, Swann trouvait en lui, dans le souvenir de la phrase qu’il avait entendue, dans certaines sonates qu’il s’était fait jouer, pour voir s’il ne l’y découvrirait pas, la présence d’une de ces réalités invisibles auxquelles il avait cessé de croire et auxquelles, comme si la musique avait eu sur la sécheresse morale dont il souffrait une sorte d’influence élective, il se sentait de nouveau le désir et presque la force de consacrer sa vie.", "en": "Now, like certain valetudinarians to whom, all of a sudden, a country where they arrived, a different regime, sometimes an organic, spontaneous and mysterious evolution, seem to bring about such a regression of their illness that they begin to envisage the unexpected possibility of starting a completely different life late in life, Swann found in himself, in the memory of the phrase he had heard, in certain sonatas he had played for himself, to see if he would not discover it there, the presence of one of those invisible realities in which he had ceased to believe and in which, as if music had had a sort of elective influence on the moral dryness from which he suffered, he once again felt the desire and almost the strength to devote his life."}, {"start": 3184.24, "end": 3191.68, "b_start": 6280.33, "b_end": 6296.76, "orig": "Mais n’étant pas arrivé à savoir de qui était l’œuvre qu’il avait entendue, il n’avait pu se la procurer et avait fini par l’oublier.", "en": "But not having been able to find out whose work he had heard was, he was unable to obtain it and ended up forgetting it."}, {"start": 3192.68, "end": 3209.94, "b_start": 6296.76, "b_end": 6332.6, "orig": "Il avait bien rencontré dans la semaine quelques personnes qui se trouvaient comme lui à cette soirée et les avait interrogées ; mais plusieurs étaient arrivées après la musique ou parties avant ; certaines pourtant étaient là pendant qu’on l’exécutait, mais étaient allées causer dans un autre salon, et d’autres restées à écouter n’avaient pas entendu plus que les premières.", "en": "During the week he had met a few people who were like him at this party and had questioned them; but many had arrived after the music or left before; some, however, were there while it was being executed, but had gone to talk in another room, and others who remained listening had heard no more than the first."}, {"start": 3210.94, "end": 3221.64, "b_start": 6332.6, "b_end": 6355.49, "orig": "Quant aux maîtres de maison, ils savaient que c’était une œuvre nouvelle que les artistes qu’ils avaient engagés avaient demandé à jouer ; ceux-ci étant partis en tournée, Swann ne put pas en savoir davantage.", "en": "As for the masters of the house, they knew that it was a new work that the artists they had hired had asked to perform; they having gone on tour, Swann was not able to find out more."}, {"start": 3222.64, "end": 3236.94, "b_start": 6355.49, "b_end": 6386.53, "orig": "Il avait bien des amis musiciens, mais tout en se rappelant le plaisir spécial et intraduisible que lui avait fait la phrase, en voyant devant ses yeux les formes qu’elle dessinait, il était pourtant incapable de la leur chanter. Puis il cessa d’y penser.", "en": "He had many musical friends, but while remembering the special and untranslatable pleasure that the phrase had given him, seeing before his eyes the shapes it drew, he was nevertheless incapable of singing it to them. Then he stopped thinking about it."}, {"start": 3237.94, "end": 3261.22, "b_start": 6386.53, "b_end": 6432.82, "orig": "Or, quelques minutes à peine après que le petit pianiste avait commencé de jouer chez M\nme\nVerdurin, tout d’un coup après une note longuement tendue pendant deux mesures, il vit approcher, s’échappant de sous cette sonorité prolongée et tendue comme un rideau sonore pour cacher le mystère de son incubation, il reconnut, secrète, bruissante et divisée, la phrase aérienne et odorante qu’il aimait.", "en": "Now, barely a few minutes after the little pianist had begun to play at Madame Verdurin's, suddenly after a note long strained for two measures, he saw approaching, escaping from under this prolonged and tense sonority like a curtain of sound to hide the mystery of its incubation, he recognized, secret, rustling and divided, the airy and fragrant phrase that he loved."}, {"start": 3262.22, "end": 3275.16, "b_start": 6432.82, "b_end": 6459.42, "orig": "Et elle était si particulière, elle avait un charme si individuel et qu’aucun autre n’aurait pu remplacer, que ce fut pour Swann comme s’il eût rencontré dans un salon ami une personne qu’il avait admirée dans la rue et désespérait de jamais retrouver.", "en": "And she was so special, she had such an individual charm that no other could have replaced, that it was for Swann as if he had met in a friend's salon a person he had admired in the street and despaired of ever meeting again."}, {"start": 3276.16, "end": 3285.98, "b_start": 6459.42, "b_end": 6480.17, "orig": "À la fin, elle s’éloigna, indicatrice, diligente, parmi les ramifications de son parfum, laissant sur le visage de Swann le reflet de son sourire.", "en": "At the end, she walked away, indicative, diligent, among the ramifications of her perfume, leaving on Swann's face the reflection of her smile."}, {"start": 3286.98, "end": 3300.73, "b_start": 6480.17, "b_end": 6509.15, "orig": "Mais maintenant il pouvait demander le nom de son inconnue (on lui dit que c’était l’andante de la sonate pour piano et violon de Vinteuil,) il la tenait, il pourrait l’avoir chez lui aussi souvent qu’il voudrait, essayer d’apprendre son langage et son secret.", "en": "But now he could ask the name of his stranger (he was told that it was the andante from Vinteuil's sonata for piano and violin), he had her, he could have her at his house as often as he wanted, try to learn her language and her secret."}, {"start": 3301.73, "end": 3318.84, "b_start": 6509.15, "b_end": 6542.62, "orig": "Aussi quand le pianiste eut fini, Swann s’approcha-t-il de lui pour lui exprimer une reconnaissance dont la vivacité plut beaucoup à M\nme\nVerdurin.\n– Quel charmeur, n’est-ce pas, dit-elle à Swann ; la comprend-il assez, sa sonate, le petit misérable ?", "en": "So when the pianist had finished, Swann approached him to express gratitude, the liveliness of which greatly pleased Ms. Verdurin. “What a charmer, isn’t he,” she said to Swann; does he understand it enough, his sonata, the little wretch?"}, {"start": 3319.84, "end": 3334.17, "b_start": 6542.62, "b_end": 6572.48, "orig": "Vous ne saviez pas que le piano pouvait atteindre à ça. C’est tout, excepté du piano, ma parole ! Chaque fois j’y suis reprise, je crois entendre un orchestre. C’est même plus beau que l’orchestre, plus complet.", "en": "You didn't know the piano could achieve that. That's all, except piano, my word! Each time I go back, I think I hear an orchestra. It’s even more beautiful than the orchestra, more complete."}, {"start": 3335.17, "end": 3344.74, "b_start": 6572.48, "b_end": 6592.61, "orig": "Le jeune pianiste s’inclina, et, souriant, soulignant les mots comme s’il avait fait un trait d’esprit :\n– Vous êtes très indulgente pour moi, dit-il.", "en": "The young pianist bowed, and, smiling, emphasizing the words as if he were making a witticism: “You are very indulgent towards me,” he said."}, {"start": 3345.74, "end": 3358.51, "b_start": 6592.61, "b_end": 6616.81, "orig": "Et tandis que M\nme\nVerdurin disait à son mari : « Allons, donne-lui de l’orangeade, il l’a bien méritée », Swann racontait à Odette comment il avait été amoureux de cette petite phrase.", "en": "And while Madame Verdurin said to her husband: “Come on, give him some orangeade, he deserved it,” Swann told Odette how he had fallen in love with this little phrase."}, {"start": 3359.51, "end": 3374.68, "b_start": 6616.81, "b_end": 6647.28, "orig": "Quand M\nme\nVerdurin, ayant dit d’un peu loin : « Eh bien ! il me semble qu’on est en train de vous dire de belles choses, Odette », elle répondit : « Oui, de très belles », Swann trouva délicieuse sa simplicité.", "en": "When Mme Verdurin, having said from a little distance: “Well! it seems to me that we are saying beautiful things to you, Odette”, she replied: “Yes, very beautiful things”, Swann found her simplicity delicious."}, {"start": 3375.68, "end": 3388.26, "b_start": 6647.28, "b_end": 6673.52, "orig": "Cependant il demandait des renseignements sur Vinteuil, sur son œuvre, sur l’époque de sa vie où il avait composé cette sonate, sur ce qu’avait pu signifier pour lui la petite phrase, c’est cela surtout qu’il aurait voulu savoir.", "en": "However, he asked for information on Vinteuil, on his work, on the period of his life when he had composed this sonata, on what the little phrase could have meant to him, and that is what he would especially like to know."}, {"start": 3389.26, "end": 3401.76, "b_start": 6673.52, "b_end": 6698.66, "orig": "Mais tous ces gens qui faisaient profession d’admirer ce musicien (quand Swann avait dit que sa sonate était vraiment belle, M\nme\nVerdurin s’était écriée : « Je vous crois un peu qu’elle est belle !", "en": "But all these people who professed to admire this musician (when Swann had said that his sonata was truly beautiful, Ms. Verdurin had exclaimed: “I somewhat believe you that it is beautiful!"}, {"start": 3402.76, "end": 3413.9, "b_start": 6698.66, "b_end": 6721.81, "orig": "Mais on n’avoue pas qu’on ne connaît pas la sonate de Vinteuil, on n’a pas le droit de ne pas la connaître », et le peintre avait ajouté : « Ah ! c’est tout à fait une très grande machine, n’est-ce pas ?", "en": "But we don’t admit that we don’t know Vinteuil’s sonata, we don’t have the right not to know it,” and the painter added: “Ah! It’s quite a very large machine, isn’t it?"}, {"start": 3414.9, "end": 3428.46, "b_start": 6721.81, "b_end": 6750.58, "orig": "Ce n’est pas, si vous voulez, la chose « cher » et « public », n’est-ce pas ? mais c’est la très grosse impression pour les artistes »), ces gens semblaient ne s’être jamais posé ces questions, car ils furent incapables d’y répondre.", "en": "It’s not, if you will, the “expensive” and “public” thing, is it? but this is the very big impression for artists\"), these people seemed to have never asked themselves these questions, because they were incapable of answering them."}, {"start": 3429.46, "end": 3457.27, "b_start": 6750.58, "b_end": 6805.31, "orig": "Même à une ou deux remarques particulières que fit Swann sur sa phrase préférée :\n– Tiens, c’est amusant, je n’avais jamais fait attention ; je vous dirai que je n’aime pas beaucoup chercher la petite bête et m’égarer dans des pointes d’aiguille ; on ne perd pas son temps à couper les cheveux en quatre ici, ce n’est pas le genre de la maison, répondit M\nme\nVerdurin, que le docteur Cottard regardait avec une admiration béate et un zèle studieux se jouer au milieu de ce flot d’expressions toutes faites.", "en": "Even to one or two particular remarks that Swann made on his favorite phrase: – Hey, that’s funny, I never paid attention; I will tell you that I don't really like looking for the little beast and getting lost in needlepoints; we don't waste our time splitting hairs here, that's not the style of the house, replied Madame Verdurin, whom Doctor Cottard watched with blissful admiration and studious zeal play out in the middle of this flood of ready-made expressions."}, {"start": 3458.27, "end": 3475.55, "b_start": 6805.31, "b_end": 6839.59, "orig": "D’ailleurs lui et M\nme\nCottard, avec une sorte de bon sens comme en ont aussi certaines gens du peuple, se gardaient bien de donner une opinion ou de feindre l’admiration pour une musique qu’ils s’avouaient l’un à l’autre, une fois rentrés chez eux, ne pas plus comprendre que la peinture de « M.", "en": "Besides, he and Ms. Cottard, with a sort of common sense as some common people also have, were careful not to give an opinion or feign admiration for music that they admitted to each other, once they returned home, no more than understanding the painting of “Mr."}, {"start": 3476.55, "end": 3477.99, "b_start": 6839.59, "b_end": 6844.02, "orig": "Biche ».", "en": "Doe.”"}, {"start": 3478.99, "end": 3502.1, "b_start": 6844.02, "b_end": 6891.82, "orig": "Comme le public ne connaît du charme, de la grâce, des formes de la nature que ce qu’il en a puisé dans les poncifs d’un art lentement assimilé, et qu’un artiste original commence par rejeter ces poncifs, M. et M\nme\nCottard, image en cela du public, ne trouvaient ni dans la sonate de Vinteuil, ni dans les portraits du peintre, ce qui faisait pour eux l’harmonie de la musique et la beauté de la peinture.", "en": "As the public only knows of charm, grace, and the forms of nature what it has drawn from the clichés of a slowly assimilated art, and an original artist begins by rejecting these clichés, Mr. and Mrs. Cottard, the image of the public in this respect, found neither in Vinteuil's sonata, nor in the painter's portraits, what for them constituted the harmony of music and the beauty of painting."}, {"start": 3503.1, "end": 3514.53, "b_start": 6891.82, "b_end": 6916.67, "orig": "Il leur semblait quand le pianiste jouait la sonate qu’il accrochait au hasard sur le piano des notes que ne reliaient pas en effet les formes auxquelles ils étaient habitués, et que le peintre jetait au hasard des couleurs sur ses toiles.", "en": "It seemed to them when the pianist played the sonata that he hung notes at random on the piano that did not in fact connect the shapes to which they were accustomed, and that the painter threw colors at random on his canvases."}, {"start": 3515.53, "end": 3530.46, "b_start": 6916.67, "b_end": 6947.81, "orig": "Quand, dans celles-ci, ils pouvaient reconnaître une forme, ils la trouvaient alourdie et vulgarisée (c’est-à-dire dépourvue de l’élégance de l’école de peinture à travers laquelle ils voyaient, dans la rue même, les êtres vivants), et sans vérité, comme si M.", "en": "When, in these, they could recognize a form, they found it weighed down and vulgarized (that is to say, devoid of the elegance of the school of painting through which they saw, in the street itself, living beings), and without truth, as if Mr."}, {"start": 3531.46, "end": 3536.42, "b_start": 6947.81, "b_end": 6959.94, "orig": "Biche n’eût pas su comment était construite une épaule et que les femmes n’ont pas les cheveux mauves.", "en": "Biche would not have known how a shoulder was constructed and that women do not have purple hair."}, {"start": 3537.42, "end": 3562.79, "b_start": 6959.94, "b_end": 7009.46, "orig": "Pourtant les fidèles s’étant dispersés, le docteur sentit qu’il y avait là une occasion propice et pendant que M\nme\nVerdurin disait un dernier mot sur la sonate de Vinteuil, comme un nageur débutant qui se jette à l’eau pour apprendre, mais choisit un moment où il n’y a pas trop de monde pour le voir :\n– Alors, c’est ce qu’on appelle un musicien\ndi primo cartello !\ns’écria-t-il avec une brusque résolution.", "en": "However, the faithful having dispersed, the doctor felt that there was a propitious opportunity and while Madame Verdurin said a last word on Vinteuil's sonata, like a beginner swimmer who throws himself into the water to learn, but chooses a moment when there are not too many people to see him: - So, he is what we call a musician di primo cartello! he cried with sudden resolution."}, {"start": 3563.79, "end": 3590.6, "b_start": 7009.46, "b_end": 7062.37, "orig": "Swann apprit seulement que l’apparition récente de la sonate de Vinteuil avait produit une grande impression dans une école de tendances très avancées, mais était entièrement inconnue du grand public.\n– Je connais bien quelqu’un qui s’appelle Vinteuil, dit Swann, en pensant au professeur de piano des sœurs de ma grand’mère.\n– C’est peut-être lui, s’écria M\nme\nVerdurin.\n– Oh ! non, répondit Swann en riant.", "en": "Swann only learned that the recent appearance of Vinteuil's sonata had made a great impression in a school of very advanced tendencies, but was entirely unknown to the general public. – I know someone called Vinteuil, said Swann, thinking of the piano teacher of my grandmother’s sisters. “Perhaps it’s him,” cried Madame Verdurin. - Oh ! no, replied Swann, laughing."}, {"start": 3591.6, "end": 3608.64, "b_start": 7062.37, "b_end": 7098.05, "orig": "Si vous l’aviez vu deux minutes, vous ne vous poseriez pas la question.\n– Alors poser la question, c’est la résoudre ? dit le docteur.\n– Mais ce pourrait être un parent, reprit Swann, cela serait assez triste, mais enfin un homme de génie peut être le cousin d’une vieille bête.", "en": "If you had seen him for two minutes, you wouldn't wonder. – So asking the question means resolving it? said the doctor. – But it could be a relative, continued Swann, that would be quite sad, but after all a man of genius can be the cousin of an old beast."}, {"start": 3609.64, "end": 3620.78, "b_start": 7098.05, "b_end": 7124.17, "orig": "Si cela était, j’avoue qu’il n’y a pas de supplice que je ne m’imposerais pour que la vieille bête me présentât à l’auteur de la sonate : d’abord le supplice de fréquenter la vieille bête, et qui doit être affreux.", "en": "If that were the case, I admit that there is no torture that I would not impose on myself so that the old beast would introduce me to the author of the sonata: first of all the torture of spending time with the old beast, and which must be dreadful."}, {"start": 3621.78, "end": 3645.61, "b_start": 7124.17, "b_end": 7172.33, "orig": "Le peintre savait que Vinteuil était à ce moment très malade et que le docteur Potain craignait de ne pouvoir le sauver.\n– Comment, s’écria M\nme\nVerdurin, il y a encore des gens qui se font soigner par Potain !\n– Ah ! madame Verdurin, dit Cottard, sur un ton de marivaudage, vous oubliez que vous parlez d’un de mes confrères, je devrais dire un de mes maîtres.", "en": "The painter knew that Vinteuil was very ill at the time and that Doctor Potain feared he would not be able to save him. – What, exclaimed Mme Verdurin, there are still people who are being treated by Potain! – Oh! Madame Verdurin, said Cottard, in a tone of marivaudage, you forget that you are talking about one of my colleagues, I should say one of my masters."}, {"start": 3646.61, "end": 3655.99, "b_start": 7172.33, "b_end": 7192.14, "orig": "Le peintre avait entendu dire que Vinteuil était menacé d’aliénation mentale. Et il assurait qu’on pouvait s’en apercevoir à certains passages de sa sonate.", "en": "The painter had heard that Vinteuil was threatened with mental alienation. And he assured that we could see this in certain passages of his sonata."}, {"start": 3656.99, "end": 3690.71, "b_start": 7192.14, "b_end": 7261.97, "orig": "Swann ne trouva pas cette remarque absurde, mais elle le troubla ; car une œuvre de musique pure ne contenant aucun des rapports logiques dont l’altération dans le langage dénonce la folie, la folie reconnue dans une sonate lui paraissait quelque chose d’aussi mystérieux que la folie d’une chienne, la folie d’un cheval, qui pourtant s’observent en effet.\n– Laissez-moi donc tranquille avec vos maîtres, vous en savez dix fois autant que lui, répondit M\nme\nVerdurin au docteur Cottard, du ton d’une personne qui a le courage de ses opinions et tient bravement tête à ceux qui ne sont pas du même avis qu’elle.", "en": "Swann did not find this remark absurd, but it troubled him; because a work of pure music containing none of the logical relationships whose alteration in language denounces madness, the madness recognized in a sonata seemed to him something as mysterious as the madness of a dog, the madness of a horse, which nevertheless can be observed in fact. – So leave me alone with your masters, you know ten times as much as he does, replied Madame Verdurin to Doctor Cottard, in the tone of a person who has the courage of her opinions and bravely stands up to those who are not of the same opinion as her."}, {"start": 3691.71, "end": 3704.72, "b_start": 7261.97, "b_end": 7290.01, "orig": "Vous ne tuez pas vos malades, vous au moins !\n– Mais, madame, il est de l’Académie, répliqua le docteur d’un ton ironique. Si un malade préfère mourir de la main d’un des princes de la science...", "en": "You don't kill your patients, at least you! “But, madame, he is from the Academy,” replied the doctor in an ironic tone. If a sick person prefers to die at the hand of one of the princes of science..."}, {"start": 3705.72, "end": 3727.03, "b_start": 7290.01, "b_end": 7332.65, "orig": "C’est beaucoup plus chic de pouvoir dire : « C’est Potain qui me soigne. »\n– Ah ! c’est plus chic ? dit M\nme\nVerdurin. Alors il y a du chic dans les maladies, maintenant ? je ne savais pas ça... Ce que vous m’amusez, s’écria-t-elle tout à coup en plongeant sa figure dans ses mains.", "en": "It’s much classier to be able to say: “It’s Potain who takes care of me. » – Ah! Is it more chic? said Ms. Verdurin. So there's something cool about illnesses now? I didn't know that... You amuse me, she cried suddenly, burying her face in her hands."}, {"start": 3728.03, "end": 3735.5, "b_start": 7332.65, "b_end": 7350.04, "orig": "Et moi, bonne bête qui discutais sérieusement sans m’apercevoir que vous me faisiez monter à l’arbre. Quant à M.", "en": "And me, good creature who was discussing seriously without realizing that you were making me climb the tree. As for Mr."}, {"start": 3736.5, "end": 3757.09, "b_start": 7350.04, "b_end": 7390.94, "orig": "Verdurin, trouvant que c’était un peu fatigant de se mettre à rire pour si peu, il se contenta de tirer une bouffée de sa pipe en songeant avec tristesse qu’il ne pouvait plus rattraper sa femme sur le terrain de l’amabilité.\n– Vous savez que votre ami nous plaît beaucoup, dit M\nme\nVerdurin à Odette au moment où celle-ci lui souhaitait le bonsoir.", "en": "Verdurin, finding that it was a little tiring to start laughing for so little, he contented himself with taking a puff from his pipe, thinking with sadness that he could no longer catch up with his wife in the area of kindness. – You know that we like your friend very much, said Madame Verdurin to Odette as she wished him good evening."}, {"start": 3758.09, "end": 3765.94, "b_start": 7390.94, "b_end": 7408.21, "orig": "Il est simple, charmant ; si vous n’avez jamais à nous présenter que des amis comme cela, vous pouvez les amener. M.", "en": "He’s simple, charming; If you only ever have to introduce us to friends like that, you can bring them. Mr."}, {"start": 3766.94, "end": 3786.78, "b_start": 7408.21, "b_end": 7446.77, "orig": "Verdurin fit remarquer que pourtant Swann n’avait pas apprécié la tante du pianiste.\n– Il s’est senti un peu dépaysé, cet homme, répondit M\nme\nVerdurin, tu ne voudrais pourtant pas que, la première fois, il ait déjà le ton de la maison comme Cottard qui fait partie de notre petit clan depuis plusieurs années.", "en": "Verdurin pointed out that Swann had not appreciated the pianist's aunt. “He felt a little out of place, this man,” replied Madame Verdurin, “but you wouldn’t want him, the first time, to already have the tone of the house like Cottard, who has been part of our little clan for several years."}, {"start": 3787.78, "end": 3807.39, "b_start": 7446.77, "b_end": 7488.76, "orig": "La première fois ne compte pas, c’était utile pour prendre langue. Odette, il est convenu qu’il viendra nous retrouver demain au Châtelet. Si vous alliez le prendre ?\n– Mais non, il ne veut pas.\n– Ah ! enfin, comme vous voudrez. Pourvu qu’il n’aille pas lâcher au dernier moment !", "en": "The first time doesn't count, it was useful to get the hang of it. Odette, it has been agreed that he will come and meet us tomorrow at Châtelet. If you were going to take it? – But no, he doesn’t want to. – Oh! finally, as you wish. Hopefully he doesn't give up at the last moment!"}, {"start": 3808.39, "end": 3814.9, "b_start": 7488.76, "b_end": 7500.82, "orig": "À la grande surprise de M\nme\nVerdurin, il ne lâcha jamais.", "en": "To Ms. Verdurin’s great surprise, he never let go."}, {"start": 3815.9, "end": 3871.19, "b_start": 7500.82, "b_end": 7612.04, "orig": "Il allait les rejoindre n’importe où, quelquefois dans les restaurants de banlieue où on allait peu encore, car ce n’était pas la saison, plus souvent au théâtre, que M\nme\nVerdurin aimait beaucoup ; et comme un jour, chez elle, elle dit devant lui que pour les soirs de première, de gala, un coupefile leur eût été fort utile, que cela les avait beaucoup gênés de ne pas en avoir le jour de l’enterrement de Gambetta, Swann qui ne parlait jamais de ses relations brillantes, mais seulement de celles mal cotées qu’il eût jugé peu délicat de cacher, et au nombre desquelles il avait pris dans le faubourg Saint-Germain l’habitude de ranger les relations avec le monde officiel, répondit :\n– Je vous promets de m’en occuper, vous l’aurez à temps pour la reprise des\nDanicheff\n, je déjeune justement demain avec le Préfet de police à l’Élysée.\n– Comment ça, à l’Élysée ? cria le docteur Cottard d’une voix tonnante.\n– Oui, chez M.", "en": "He would join them anywhere, sometimes in suburban restaurants where people rarely went yet, because it was not the season, more often at the theater, which Madame Verdurin loved very much; and as one day, at home, she said in front of him that for premiere and gala evenings, a cutter would have been very useful to them, that it had greatly embarrassed them not to have one on the day of Gambetta's funeral, Swann who never spoke of his brilliant connections, but only of those poorly rated ones that he would have considered it would not be delicate to hide, and among which he had acquired the habit in the Faubourg Saint-Germain of classifying relations with the official world, replied: – I promise to take care of it, you will have it in time for the Danicheffs to take over, I am having lunch tomorrow with the Prefect of Police at the Élysée. – What do you mean at the Élysée? cried Doctor Cottard in a thunderous voice. – Yes, at Mr."}, {"start": 3872.19, "end": 3892.26, "b_start": 7612.04, "b_end": 7653.98, "orig": "Grévy, répondit Swann, un peu gêné de l’effet que sa phrase avait produit. Et le peintre dit au docteur en manière de plaisanterie :\n– Ça vous prend souvent ? Généralement, une fois l’explication donnée, Cottard disait : « Ah ! bon, bon, ça va bien » et ne montrait plus trace d’émotion.", "en": "Grévy, Swann replied, a little embarrassed by the effect his sentence had produced. And the painter said to the doctor in a joking manner: – Does this often bother you? Usually, once the explanation was given, Cottard would say: “Ah! okay, okay, it’s okay” and no longer showed a trace of emotion."}, {"start": 3893.26, "end": 3909.72, "b_start": 7653.98, "b_end": 7689.66, "orig": "Mais cette fois-ci, les derniers mots de Swann, au lieu de lui procurer l’apaisement habituel, portèrent au comble son étonnement qu’un homme avec qui il dînait, qui n’avait ni fonctions officielles, ni illustration d’aucune sorte, frayât avec le Chef de l’État.\n– Comment ça, M.", "en": "But this time, Swann's last words, instead of providing him with the usual reassurance, brought his astonishment to the heights that a man with whom he was dining, who had neither official functions nor distinction of any kind, was associating with the Head of State. – What do you mean, Mr."}, {"start": 3910.72, "end": 3914.22, "b_start": 7689.66, "b_end": 7697.9, "orig": "Grévy ? vous connaissez M.", "en": "Grevy? you know Mr."}, {"start": 3915.22, "end": 3918.94, "b_start": 7697.9, "b_end": 7746.04, "orig": "Grévy ? dit-il à Swann de l’air stupide et incrédule d’un municipal à qui un inconnu demande à voir le Président de la République et qui, comprenant par ces mots « à qui il a affaire », comme disent les journaux, assure au pauvre dément qu’il va être reçu à l’instant et le dirige sur l’infirmerie spéciale du dépôt.\n– Je le connais un peu, nous avons des amis communs (il n’osa pas dire que c’était le prince de Galles), du reste il invite très facilement et je vous assure que ces déjeuners n’ont rien d’amusant, ils sont d’ailleurs très simples, on n’est jamais plus de huit à table, répondit Swann qui tâchait d’effacer ce que semblaient avoir de trop éclatant, aux yeux de son interlocuteur, des relations avec le Président de la République.", "en": "Grevy? he said to Swann with the stupid and incredulous air of a municipal official to whom a stranger asks to see the President of the Republic and who, understanding by these words \"who he is dealing with\", as the newspapers say, assures the poor madman that he will be received immediately and directs him to the special infirmary of the depot. – I know him a little, we have mutual friends (he did not dare to say that it was the Prince of Wales), besides he invites people very easily and I assure you that these lunches are not amusing, they are very simple, there are never more than eight at the table, replied Swann who tried to erase what appeared to be too striking, in the eyes of his interlocutor, of relations with the President of the Republic."}, {"start": 3919.94, "end": 3931.01, "b_start": 7746.04, "b_end": 7770.77, "orig": "Aussitôt Cottard, s’en rapportant aux paroles de Swann, adopta cette opinion, au sujet de la valeur d’une invitation chez M. Grévy, que c’était chose fort peu recherchée et qui courait les rues.", "en": "Immediately Cottard, relying on Swann's words, adopted this opinion, regarding the value of an invitation to Mr. Grévy, that it was something very little sought after and which was common in the streets."}, {"start": 3932.01, "end": 3974.56, "b_start": 7770.77, "b_end": 7858.81, "orig": "Dès lors, il ne s’étonna plus que Swann, aussi bien qu’un autre, fréquentât l’Élysée, et même il le plaignait un peu d’aller à des déjeuners que l’invité avouait lui-même être ennuyeux.\n– Ah ! bien, bien, ça va bien, dit-il sur le ton d’un douanier, méfiant tout à l’heure, mais qui, après vos explications, vous donne son visa et vous laisse passer sans ouvrir vos malles.\n– Ah ! je vous crois qu’ils ne doivent pas être amusants ces déjeuners, vous avez de la vertu d’y aller, dit M\nme\nVerdurin, à qui le Président de la République apparaissait comme un ennuyeux particulièrement redoutable parce qu’il disposait de moyens de séduction et de contrainte qui, employés à l’égard des fidèles, eussent été capables de les faire lâcher.", "en": "From then on, he was no longer surprised that Swann, as well as anyone else, frequented the Élysée, and he even pitied him a little for going to lunches that the guest himself admitted were boring. – Oh! well, well, it's going well, he says in the tone of a customs officer, suspicious earlier, but who, after your explanations, gives you his visa and lets you pass without opening your trunks. – Oh! I believe that these lunches must not be amusing, you have the virtue to go there, said Ms. Verdurin, to whom the President of the Republic appeared as a particularly formidable bore because he had at his disposal means of seduction and constraint which, used with regard to the faithful, would have been capable of making them give up."}, {"start": 3975.56, "end": 3994.69, "b_start": 7858.81, "b_end": 7899.46, "orig": "Il paraît qu’il est sourd comme un pot et qu’il mange avec ses doigts.\n– En effet, alors cela ne doit pas beaucoup vous amuser d’y aller, dit le docteur avec une nuance de commisération ; et, se rappelant le chiffre de huit convives : « Sont-ce des déjeuners intimes ? » demanda-t-il vivement avec un zèle de linguiste plus encore qu’une curiosité de badaud.", "en": "It seems that he is as deaf as a stone and that he eats with his fingers. “Indeed, then it must not amuse you much to go there,” said the doctor, with a touch of pity; and, remembering the figure of eight guests: “Are these intimate lunches? » he asked quickly, with the zeal of a linguist even more than the curiosity of an onlooker."}, {"start": 3995.69, "end": 4014.72, "b_start": 7899.46, "b_end": 7937.05, "orig": "Mais le prestige qu’avait à ses yeux le Président de la République finit pourtant par triompher et de l’humilité de Swann et de la malveillance de M\nme\nVerdurin, et à chaque dîner, Cottard demandait avec intérêt : « Verrons-nous ce soir M. Swann ? Il a des relations personnelles avec M. Grévy.", "en": "But the prestige that the President of the Republic had in his eyes nevertheless ended up triumphing over both Swann's humility and Ms. Verdurin's malevolence, and at each dinner, Cottard asked with interest: \"Will we see Mr. Swann this evening? He has personal relations with Mr. Grévy."}, {"start": 4015.72, "end": 4029.14, "b_start": 7937.05, "b_end": 7964.62, "orig": "C’est bien ce qu’on appelle un gentleman ? » Il alla même jusqu’à lui offrir une carte d’invitation pour l’exposition dentaire.\n– Vous serez admis avec les personnes qui seront avec vous, mais on ne laisse pas entrer les chiens.", "en": "Is that what you call a gentleman? » He even went so far as to give her an invitation card to the dental exhibition. – You will be admitted with the people who will be with you, but dogs are not allowed in."}, {"start": 4030.14, "end": 4045.06, "b_start": 7964.62, "b_end": 7996.19, "orig": "Vous comprenez, je vous dis cela parce que j’ai eu des amis qui ne le savaient pas et qui s’en sont mordu les doigts. Quant à M. Verdurin, il remarqua le mauvais effet qu’avait produit sur sa femme cette découverte que Swann avait des amitiés puissantes dont il n’avait jamais parlé.", "en": "You understand, I'm telling you this because I had friends who didn't know it and who bit their fingers. As for Mr. Verdurin, he noticed the bad effect that this discovery that Swann had powerful friendships of which he had never spoken had had on his wife."}, {"start": 4046.06, "end": 4069.99, "b_start": 7996.19, "b_end": 8043.17, "orig": "Si l’on n’avait pas arrangé une partie au dehors, c’est chez les Verdurin que Swann retrouvait le petit noyau, mais il ne venait que le soir, et n’acceptait presque jamais à dîner malgré les instances d’Odette.\n– Je pourrais même dîner seule avec vous, si vous aimiez mieux cela, lui disait-elle.\n– Et M\nme\nVerdurin ?\n– Oh ! ce serait bien simple.", "en": "If a party had not been arranged outside, it was at the Verdurins that Swann found the little core, but he only came in the evening, and almost never agreed to dinner despite Odette's entreaties. “I could even have dinner alone with you, if you liked that better,” she said to him. – And Ms. Verdurin? - Oh ! it would be very simple."}, {"start": 4070.99, "end": 4080.78, "b_start": 8043.17, "b_end": 8064.3, "orig": "Je n’aurais qu’à dire que ma robe n’a pas été prête, que mon cab est venu en retard. Il y a toujours moyen de s’arranger.\n– Vous êtes gentille.", "en": "I would only have to say that my dress was not ready, that my cab came late. There is always a way to work things out. – You are nice."}, {"start": 4081.78, "end": 4094.26, "b_start": 8064.3, "b_end": 8089.87, "orig": "Mais Swann se disait que s’il montrait à Odette (en consentant seulement à la retrouver après dîner), qu’il y avait des plaisirs qu’il préférait à celui d’être avec elle, le goût qu’elle ressentait pour lui ne connaîtrait pas de longtemps la satiété.", "en": "But Swann told himself that if he showed Odette (by only agreeing to meet her after dinner) that there were pleasures that he preferred to being with her, the taste she felt for him would not be satiated for long."}, {"start": 4095.26, "end": 4108.06, "b_start": 8089.87, "b_end": 8118.06, "orig": "Et, d’autre part, préférant infiniment à celle d’Odette la beauté d’une petite ouvrière fraîche et bouffie comme une rose et dont il était épris, il aimait mieux passer le commencement de la soirée avec elle, étant sûr de voir Odette ensuite.", "en": "And, on the other hand, infinitely preferring to that of Odette the beauty of a little worker, fresh and puffy as a rose and with whom he was in love, he preferred to spend the beginning of the evening with her, being sure of seeing Odette afterwards."}, {"start": 4109.06, "end": 4114.62, "b_start": 8118.06, "b_end": 8131.1, "orig": "C’est pour les mêmes raisons qu’il n’acceptait jamais qu’Odette vînt le chercher pour aller chez les Verdurin.", "en": "It was for the same reasons that he never allowed Odette to come and pick him up to go to the Verdurins."}, {"start": 4115.62, "end": 4126.35, "b_start": 8131.1, "b_end": 8154.83, "orig": "La petite ouvrière l’attendait près de chez lui à un coin de rue que son cocher Rémi connaissait, elle montait à côté de Swann et restait dans ses bras jusqu’au moment où la voiture l’arrêtait devant chez les Verdurin.", "en": "The little worker was waiting for him near his house on a street corner that his coachman Rémi knew. She got in next to Swann and stayed in his arms until the car stopped in front of the Verdurins."}, {"start": 4127.35, "end": 4144.27, "b_start": 8154.83, "b_end": 8187.74, "orig": "À son entrée, tandis que M\nme\nVerdurin montrant des roses qu’il avait envoyées le matin lui disait : « Je vous gronde » et lui indiquait une place à côté d’Odette, le pianiste jouait, pour eux deux, la petite phrase de Vinteuil qui était comme l’air national de leur amour.", "en": "At his entrance, while Madame Verdurin, showing the roses he had sent in the morning, said to him: “I scold you” and showed him a place next to Odette, the pianist played, for both of them, Vinteuil's little phrase which was like the national tune of their love."}, {"start": 4145.27, "end": 4170.28, "b_start": 8187.74, "b_end": 8240.41, "orig": "Il commençait par la tenue des trémolos de violon que pendant quelques mesures on entend seuls, occupant tout le premier plan, puis tout d’un coup ils semblaient s’écarter et comme dans ces tableaux de Pieter de Hooch, qu’approfondit le cadre étroit d’une porte en
