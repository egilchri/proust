 the premeditated words that she had deemed essential to the full realization of her desire."}, {"start": 1950.74, "end": 1964.35, "b_start": 3913.06, "b_end": 3942.54, "orig": "Et à tous moments au fond d’elle-même une vierge timide et suppliante implorait et faisait reculer un soudard fruste et vainqueur.\n– Oui, c’est probable qu’on nous regarde à cette heure-ci, dans cette campagne fréquentée, dit ironiquement son amie.", "en": "And at all times deep inside herself a timid and pleading virgin implored and pushed back a crude and victorious soldier. – Yes, it’s likely that people are looking at us at this time, in this busy countryside, said her friend ironically."}, {"start": 1965.35, "end": 1984.12, "b_start": 3942.54, "b_end": 3979.99, "orig": "Et puis quoi ? ajouta-t-elle (en croyant devoir accompagner d’un clignement d’yeux malicieux et tendre ces mots qu’elle récita par bonté, comme un texte qu’elle savait être agréable à M\nlle\nVinteuil, d’un ton qu’elle s’efforçait de rendre cynique), quand même on nous verrait, ce n’en est que meilleur.", "en": "And then what? she added (believing she had to accompany with a mischievous and tender wink these words which she recited out of kindness, like a text which she knew would be pleasant to M lle Vinteuil, in a tone which she tried to make cynical), even if we were seen, it would be all the better."}, {"start": 1985.12, "end": 1997.14, "b_start": 3979.99, "b_end": 4004.32, "orig": "M\nlle\nVinteuil frémit et se leva. Son cœur scrupuleux et sensible ignorait quelles paroles devaient spontanément venir s’adapter à la scène que ses sens réclamaient.", "en": "Miss Vinteuil shuddered and stood up. His scrupulous and sensitive heart did not know what words should spontaneously come to adapt to the scene that his senses demanded."}, {"start": 1998.14, "end": 2009.88, "b_start": 4004.32, "b_end": 4029.17, "orig": "Elle cherchait le plus loin qu’elle pouvait de sa vraie nature morale, à trouver le langage propre à la fille vicieuse qu’elle désirait d’être, mais les mots qu’elle pensait que celle-ci eût prononcés sincèrement lui paraissaient faux dans sa bouche.", "en": "She sought as far as she could from her true moral nature, to find the language specific to the vicious girl she wanted to be, but the words she thought she had sincerely pronounced seemed false in her mouth."}, {"start": 2010.88, "end": 2032.36, "b_start": 4029.17, "b_end": 4074.18, "orig": "Et le peu qu’elle s’en permettait était dit sur un ton guindé où ses habitudes de timidité paralysaient ses velléités d’audace, et s’entremêlait de : « Tu n’as pas froid, tu n’as pas trop chaud, tu n’as pas envie d’être seule et de lire ? »\n– Mademoiselle me semble avoir des pensées bien lubriques, ce soir, finit-elle par dire, répétant sans doute une phrase qu’elle avait entendue autrefois dans la bouche de son amie.", "en": "And what little she allowed herself was said in a stilted tone in which her habits of shyness paralyzed her desire for daring, and was interspersed with: “Aren’t you cold, you’re not too hot, don’t you want to be alone and read? » – Mademoiselle seems to me to have very lustful thoughts this evening, she ended up saying, no doubt repeating a phrase that she had once heard from her friend."}, {"start": 2033.36, "end": 2050.21, "b_start": 4074.18, "b_end": 4106.86, "orig": "Dans l’échancrure de son corsage de crêpe, M\nlle\nVinteuil sentit que son amie piquait un baiser, elle poussa un petit cri, s’échappa, et elles se poursuivirent en sautant, faisant voleter leurs larges manches comme des ailes et gloussant et piaillant comme des oiseaux amoureux.", "en": "In the opening of her crepe bodice, M lle Vinteuil felt that her friend was kissing her, she uttered a little cry, escaped, and they chased each other, jumping, making their large sleeves flutter like wings and giggling and squawking like birds in love."}, {"start": 2051.21, "end": 2065.58, "b_start": 4106.86, "b_end": 4134.23, "orig": "Puis M\nlle\nVinteuil finit par tomber sur le canapé, recouverte par le corps de son amie. Mais celle-ci tournait le dos à la petite table sur laquelle était placé le portrait de l’ancien professeur de piano.", "en": "Then M lle Vinteuil ends up falling on the sofa, covered by the body of her friend. But her back was turned to the small table on which the portrait of the former piano teacher was placed."}, {"start": 2066.58, "end": 2085.81, "b_start": 4134.23, "b_end": 4172.38, "orig": "M\nlle\nVinteuil comprit que son amie ne le verrait pas si elle n’attirait pas sur lui son attention, et elle lui dit, comme si elle venait seulement de le remarquer :\n– Oh ! ce portrait de mon père qui nous regarde, je ne sais pas qui a pu le mettre là, j’ai pourtant dit vingt fois que ce n’était pas sa place.", "en": "M lle Vinteuil understood that her friend would not see him if she did not draw her attention to him, and she said to him, as if she had only just noticed him: – Oh! this portrait of my father looking at us, I don't know who could have put it there, yet I have said twenty times that it was not his place."}, {"start": 2086.81, "end": 2092.54, "b_start": 4172.38, "b_end": 4185.64, "orig": "Je me souvins que c’étaient les mots que M. Vinteuil avait dits à mon père à propos du morceau de musique.", "en": "I remembered that these were the words that Mr. Vinteuil had said to my father about the piece of music."}, {"start": 2093.54, "end": 2106.62, "b_start": 4185.64, "b_end": 4213.82, "orig": "Ce portrait leur servait sans doute habituellement pour des profanations rituelles, car son amie lui répondit par ces paroles qui devaient faire partie de ses réponses liturgiques :\n– Mais laisse-le donc où il est, il n’est plus là pour nous embêter.", "en": "This portrait was no doubt usually used by them for ritual desecration, because her friend responded to her with these words which must have been part of her liturgical responses: – But leave him where he is, he is no longer here to bother us."}, {"start": 2107.62, "end": 2115.3, "b_start": 4213.82, "b_end": 4230.2, "orig": "Crois-tu qu’il pleurnicherait, qu’il voudrait te mettre ton manteau, s’il te voyait là, la fenêtre ouverte, le vilain singe.", "en": "Do you think he would whine, that he would want to put your coat on you, if he saw you there, the window open, the ugly monkey."}, {"start": 2116.3, "end": 2143.78, "b_start": 4230.2, "b_end": 4286.98, "orig": "M\nlle\nVinteuil répondit par des paroles de doux reproche : « Voyons, voyons », qui prouvaient la bonté de sa nature, non qu’elles fussent dictées par l’indignation que cette façon de parler de son père eût pu lui causer (évidemment, c’était là un sentiment qu’elle s’était habituée, à l’aide de quels sophismes ? à faire taire en elle dans ces minutes-là), mais parce qu’elles étaient comme un frein que pour ne pas se montrer égoïste elle mettait elle-même au plaisir que son amie cherchait à lui procurer.", "en": "M lle Vinteuil responded with words of gentle reproach: \"Let's see, let's see\", which proved the goodness of her nature, not that they were dictated by the indignation that this way of speaking of her father could have caused her (obviously, this was a feeling that she had become accustomed to, with the help of what sophisms? to silence within herself in those minutes), but because they were like a brake to prevent herself from to show selfishness she put herself in the pleasure that her friend sought to give her."}, {"start": 2144.78, "end": 2158.34, "b_start": 4286.98, "b_end": 4315.98, "orig": "Et puis cette modération souriante en répondant à ces blasphèmes, ce reproche hypocrite et tendre, paraissaient peut-être à sa nature franche et bonne une forme particulièrement infâme, une forme doucereuse de cette scélératesse qu’elle cherchait à s’assimiler.", "en": "And then this smiling moderation in responding to these blasphemies, this hypocritical and tender reproach, perhaps seemed to her frank and good nature a particularly infamous form, a sweet form of this villainy which she sought to assimilate."}, {"start": 2159.34, "end": 2177.92, "b_start": 4315.98, "b_end": 4354.8, "orig": "Mais elle ne put résister à l’attrait du plaisir qu’elle éprouverait à être traitée avec douceur par une personne si implacable envers un mort sans défense ; elle sauta sur les genoux de son amie, et lui tendit chastement son front à baiser comme elle aurait pu faire si elle avait été sa fille, sentant avec délices qu’elles allaient ainsi toutes deux au bout de la cruauté en ravissant à M.", "en": "But she could not resist the lure of the pleasure she would feel in being treated gently by one so implacable towards a helpless dead man; she jumped on her friend's knees, and chastely offered her her forehead to kiss as she might have done if she had been her daughter, feeling with delight that they were both going to the end of cruelty by delighting M."}, {"start": 2178.92, "end": 2183.12, "b_start": 4354.8, "b_end": 4364.08, "orig": "Vinteuil, jusque dans le tombeau, sa paternité.", "en": "Vinteuil, even in the tomb, his paternity."}, {"start": 2184.12, "end": 2204.33, "b_start": 4364.08, "b_end": 4404.1, "orig": "Son amie lui prit la tête entre ses mains et lui déposa un baiser sur le front avec cette docilité que lui rendait facile la grande affection qu’elle avait pour M\nlle\nVinteuil et le désir de mettre quelque distraction dans la vie si triste maintenant de l’orpheline.\n– Sais-tu ce que j’ai envie de lui faire à cette vieille horreur ? dit-elle en prenant le portrait.", "en": "Her friend took her head in her hands and placed a kiss on her forehead with that docility made easy by the great affection she had for Miss Vinteuil and the desire to provide some distraction in the orphan's now so sad life. – Do you know what I want to do to this old horror? she said, taking the portrait."}, {"start": 2205.33, "end": 2223.28, "b_start": 4404.1, "b_end": 4437.68, "orig": "Et elle murmura à l’oreille de M\nlle\nVinteuil quelque chose que je ne pus entendre.\n– Oh ! tu n’oserais pas.\n– Je n’oserais pas cracher dessus ? sur\nça ?\ndit l’amie avec une brutalité voulue.", "en": "And she whispered something in Miss Vinteuil’s ear that I couldn’t hear. - Oh ! you wouldn't dare. – I wouldn’t dare spit on it? on that? said the friend with deliberate brutality."}, {"start": 2224.28, "end": 2239.3, "b_start": 4437.68, "b_end": 4467.24, "orig": "Je n’en entendis pas davantage, car M\nlle\nVinteuil, d’un air las, gauche, affairé, honnête et triste, vint fermer les volets et la fenêtre, mais je savais maintenant, pour toutes les souffrances que pendant sa vie M.", "en": "I didn't hear any more, because M lle Vinteuil, with a weary, awkward, busy, honest and sad air, came to close the shutters and the window, but I knew now, for all the suffering that during his life Mr."}, {"start": 2240.3, "end": 2248.99, "b_start": 4467.24, "b_end": 4486.64, "orig": "Vinteuil avait supportées à cause de sa fille, ce qu’après la mort il avait reçu d’elle en salaire. Et pourtant j’ai pensé depuis que si M.", "en": "Vinteuil had suffered because of his daughter, what after her death he had received from her in salary. And yet I have since thought that if Mr."}, {"start": 2249.99, "end": 2259.59, "b_start": 4486.64, "b_end": 4508.06, "orig": "Vinteuil avait pu assister à cette scène, il n’eût peut-être pas encore perdu sa foi dans le bon cœur de sa fille, et peut-être même n’eût-il pas eu en cela tout à fait tort.", "en": "Had Vinteuil been able to witness this scene, he would perhaps not yet have lost his faith in the good heart of his daughter, and perhaps he would not even have been completely wrong in this."}, {"start": 2260.59, "end": 2286.58, "b_start": 4508.06, "b_end": 4563.01, "orig": "Certes, dans les habitudes de M\nlle\nVinteuil l’apparence du mal était si entière qu’on aurait eu de la peine à la rencontrer réalisée à ce degré de perfection ailleurs que chez une sadique ; c’est à la lumière de la rampe des théâtres du boulevard plutôt que sous la lampe d’une maison de campagne véritable qu’on peut voir une fille faire cracher une amie sur le portrait d’un père qui n’a vécu que pour elle ; et il n’y a guère que le sadisme qui donne un fondement dans la vie à l’esthétique du mélodrame.", "en": "Certainly, in Miss Vinteuil's habits the appearance of evil was so complete that one would have had difficulty finding it realized to this degree of perfection anywhere other than in a sadist; it is by the light of the footlights of the boulevard theaters rather than under the lamp of a real country house that we can see a girl make a friend spit on the portrait of a father who lived only for her; and it is hardly anything other than sadism that gives a basis in life to the aesthetics of melodrama."}, {"start": 2287.58, "end": 2310.53, "b_start": 4563.01, "b_end": 4610.62, "orig": "Dans la réalité, en dehors des cas de sadisme, une fille aurait peut-être des manquements aussi cruels que ceux de M\nlle\nVinteuil envers la mémoire et les volontés de son père mort, mais elle ne les résumerait pas expressément en un acte d’un symbolisme aussi rudimentaire et aussi naïf ; ce que sa conduite aurait de criminel serait plus voilé aux yeux des autres et même à ses yeux à elle qui ferait le mal sans se l’avouer.", "en": "In reality, apart from cases of sadism, a daughter would perhaps have failings as cruel as those of M lle Vinteuil towards the memory and wishes of her dead father, but she would not expressly summarize them in an act of such rudimentary and naive symbolism; any criminal aspect of her behavior would be more veiled from the eyes of others and even from her eyes, who would do evil without admitting it."}, {"start": 2311.53, "end": 2321.94, "b_start": 4610.62, "b_end": 4630.52, "orig": "Mais, au-delà de l’apparence, dans le cœur de M\nlle\nVinteuil, le mal, au début du moins, ne fut sans doute pas sans mélange.", "en": "But, beyond the appearance, in the heart of Miss Vinteuil, the evil, at least at the beginning, was undoubtedly not unmixed."}, {"start": 2322.94, "end": 2342.79, "b_start": 4630.52, "b_end": 4672.3, "orig": "Une sadique comme elle est l’artiste du mal, ce qu’une créature entièrement mauvaise ne pourrait être, car le mal ne lui serait pas extérieur, il lui semblerait tout naturel, ne se distinguerait même pas d’elle ; et la vertu, la mémoire des morts, la tendresse filiale, comme elle n’en aurait pas le culte, elle ne trouverait pas un plaisir sacrilège à les profaner.", "en": "A sadist like her is the artist of evil, which an entirely evil creature could not be, because evil would not be external to her, it would seem completely natural to her, would not even be distinguishable from her; and virtue, the memory of the dead, filial tenderness, as she would not worship them, she would not find sacrilegious pleasure in profaning them."}, {"start": 2343.79, "end": 2356.82, "b_start": 4672.3, "b_end": 4697.27, "orig": "Les sadiques de l’espèce de M\nlle\nVinteuil sont des êtres si purement sentimentaux, si naturellement vertueux que même le plaisir sensuel leur paraît quelque chose de mauvais, le privilège des méchants.", "en": "Sadists of Miss Vinteuil's type are beings so purely sentimental, so naturally virtuous that even sensual pleasure seems to them something bad, the privilege of the wicked."}, {"start": 2357.82, "end": 2371.41, "b_start": 4697.27, "b_end": 4727.66, "orig": "Et quand ils se concèdent à eux-mêmes de s’y livrer un moment, c’est dans la peau des méchants qu’ils tâchent d’entrer et de faire entrer leur complice, de façon à avoir eu un moment l’illusion de s’être évadés de leur âme scrupuleuse et tendre, dans le monde inhumain du plaisir.", "en": "And when they allow themselves to indulge in it for a moment, it is in the skin of the bad guys that they try to enter and bring in their accomplice, so as to have had for a moment the illusion of having escaped from their scrupulous and tender soul, into the inhuman world of pleasure."}, {"start": 2372.41, "end": 2386.74, "b_start": 4727.66, "b_end": 4757.72, "orig": "Et je comprenais combien elle l’eût désiré en voyant combien il lui était impossible d’y réussir. Au moment où elle se voulait si différente de son père, ce qu’elle me rappelait, c’était les façons de penser, de dire, du vieux professeur de piano.", "en": "And I understood how much she would have wanted it when I saw how impossible it was for her to succeed. At the time when she wanted to be so different from her father, what she reminded me of was the ways of thinking and saying of the old piano teacher."}, {"start": 2387.74, "end": 2418.19, "b_start": 4757.72, "b_end": 4820.66, "orig": "Bien plus que sa photographie, ce qu’elle profanait, ce qu’elle faisait servir à ses plaisirs mais qui restait entre eux et elle et l’empêchait de les goûter directement, c’était la ressemblance de son visage, les yeux bleus de sa mère à lui qu’il lui avait transmis comme un bijou de famille, ces gestes d’amabilité qui interposaient entre le vice de M\nlle\nVinteuil et elle une phraséologie, une mentalité qui n’était pas faite pour lui et l’empêchait de le connaître, comme quelque chose de très différent des nombreux devoirs de politesse auxquels elle se consacrait d’habitude.", "en": "Much more than her photography, what she desecrated, what she used for her pleasures but which remained between them and her and prevented her from enjoying them directly, it was the resemblance of his face, the blue eyes of his mother which he had passed on to her like a family jewel, these gestures of kindness which interposed between the vice of Miss Vinteuil and her a phraseology, a mentality which was not made for him and prevented him to know him, as something very different from the numerous duties of politeness to which she usually devoted herself."}, {"start": 2419.19, "end": 2426.22, "b_start": 4820.66, "b_end": 4836.28, "orig": "Ce n’est pas le mal qui lui donnait l’idée du plaisir, qui lui semblait agréable ; c’est le plaisir qui lui semblait malin.", "en": "It was not evil that gave him the idea of ​​pleasure, which seemed pleasant to him; it was pleasure that seemed evil to him."}, {"start": 2427.22, "end": 2439.78, "b_start": 4836.28, "b_end": 4863.46, "orig": "Et comme chaque fois qu’elle s’y adonnait il s’accompagnait pour elle de ces pensées mauvaises qui le reste du temps étaient absentes de son âme vertueuse, elle finissait par trouver au plaisir quelque chose de diabolique, par l’identifier au Mal.", "en": "And as each time she indulged in it it was accompanied for her by these evil thoughts which the rest of the time were absent from her virtuous soul, she ended up finding something diabolical in pleasure, by identifying it with Evil."}, {"start": 2440.78, "end": 2451.82, "b_start": 4863.46, "b_end": 4885.31, "orig": "Peut-être M\nlle\nVinteuil sentait-elle que son amie n’était pas foncièrement mauvaise, et qu’elle n’était pas sincère au moment où elle lui tenait ces propos blasphématoires.", "en": "Perhaps M lle Vinteuil felt that her friend was not fundamentally bad, and that she was not sincere at the time when she made these blasphemous remarks to her."}, {"start": 2452.82, "end": 2466.66, "b_start": 4885.31, "b_end": 4914.67, "orig": "Du moins avait-elle le plaisir d’embrasser sur son visage des sourires, des regards, feints peut-être, mais analogues dans leur expression vicieuse et basse à ceux qu’aurait eus non un être de bonté et de souffrance, mais un être de cruauté et de plaisir.", "en": "At least she had the pleasure of kissing smiles and looks on her face, feigned perhaps, but similar in their vicious and base expression to those which would have been shown not by a being of kindness and suffering, but by a being of cruelty and pleasure."}, {"start": 2467.66, "end": 2478.68, "b_start": 4914.67, "b_end": 4938.68, "orig": "Elle pouvait s’imaginer un instant qu’elle jouait vraiment les jeux qu’eût joués, avec une complice aussi dénaturée, une fille qui aurait ressenti en effet ces sentiments barbares à l’égard de la mémoire de son père.", "en": "She could imagine for a moment that she was really playing the games that a girl who would indeed have felt these barbaric feelings towards the memory of her father would have played, with such an unnatural accomplice."}, {"start": 2479.68, "end": 2497.9, "b_start": 4938.68, "b_end": 4977.22, "orig": "Peut-être n’eût-elle pas pensé que le mal fût un état si rare, si extraordinaire, si dépaysant, où il était si reposant d’émigrer, si elle avait su discerner en elle, comme en tout le monde, cette indifférence aux souffrances qu’on cause et qui, quelques autres noms qu’on lui donne, est la forme terrible et permanente de la cruauté.", "en": "Perhaps she would not have thought that evil was such a rare, extraordinary, exotic state, where it was so relaxing to emigrate, if she had known how to discern in herself, as in everyone, this indifference to the suffering we cause and which, whatever other names we give it, is the terrible and permanent form of cruelty."}, {"start": 2498.9, "end": 2508.71, "b_start": 4977.22, "b_end": 4997.82, "orig": "S’il était assez simple d’aller du côté de Méséglise, c’était une autre affaire d’aller du côté de Guermantes, car la promenade était longue et l’on voulait être sûr du temps qu’il ferait.", "en": "If it was quite simple to go towards Méséglise, it was another matter to go towards Guermantes, because the walk was long and we wanted to be sure of the weather."}, {"start": 2509.71, "end": 2526.7, "b_start": 4997.82, "b_end": 5035.13, "orig": "Quand on semblait entrer dans une série de beaux jours ; quand Françoise désespérée qu’il ne tombât pas une goutte d’eau pour les « pauvres récoltes », et ne voyant que de rares nuages blancs nageant à la surface calme et bleue du ciel s’écriait en gémissant : « Ne dirait-on pas qu’on voit ni plus ni moins des chiens de mer qui jouent en montrant là-haut leurs museaux ?", "en": "When we seemed to be entering a series of good days; when Françoise, desperate that not a drop of water fell for the \"poor harvests\", and seeing only rare white clouds swimming on the calm and blue surface of the sky, cried out moaning: \"Wouldn't one say that we see neither more nor less sea dogs playing, showing their muzzles up there?"}, {"start": 2527.7, "end": 2532.67, "b_start": 5035.13, "b_end": 5046.47, "orig": "Ah ! ils pensent bien à faire pleuvoir pour les pauvres laboureurs !", "en": "Ah! they are thinking of making it rain for the poor plowmen!"}, {"start": 2533.67, "end": 2575.38, "b_start": 5046.47, "b_end": 5133.94, "orig": "Et puis quand les blés seront poussés, alors la pluie se mettra à tomber tout à petit patapon, sans discontinuer, sans plus savoir sur quoi elle tombe que si c’était sur la mer » ; quand mon père avait reçu invariablement les mêmes réponses favorables du jardinier et du baromètre, alors on disait au dîner : « Demain s’il fait le même temps, nous irons du côté de Guermantes. » On partait tout de suite après déjeuner par la petite porte du jardin et on tombait dans la rue des Perchamps, étroite et formant un angle aigu, remplie de graminées au milieu desquelles deux ou trois guêpes passaient la journée à herboriser, aussi bizarre que son nom d’où me semblaient dériver ses particularités curieuses et sa personnalité revêche, et qu’on chercherait en vain dans le Combray d’aujourd’hui où sur son tracé ancien s’élève l’école.", "en": "And then when the wheat is grown, then the rain will start to fall little by little, without stopping, without knowing what it will fall on any more than if it were on the sea”; when my father had invariably received the same favorable responses from the gardener and the barometer, then we would say at dinner: “Tomorrow if the weather is the same, we will go towards Guermantes. » We left immediately after lunch through the little garden gate and found ourselves in the Rue des Perchamps, narrow and forming an acute angle, full of grasses in the middle of which two or three wasps spent the day herbalizing, as bizarre as its name from which seemed to me to derive its curious particularities and its surly personality, and which one would look for in vain in today's Combray where on its ancient route the school stands."}, {"start": 2576.38, "end": 2599.14, "b_start": 5133.94, "b_end": 5178.66, "orig": "Mais ma rêverie (semblable à ces architectes élèves de Viollet-le-Duc, qui, croyant retrouver sous un jubé Renaissance et un autel du XVII\ne\nsiècle les traces d’un chœur roman, remettent tout l’édifice dans l’état où il devait être au VII\ne\nsiècle) ne laisse pas une pierre du bâtiment nouveau, reperce et « restitue » la rue des Perchamps.", "en": "But my reverie (similar to those architect students of Viollet-le-Duc, who, believing to find under a Renaissance rood screen and a 17th century altar the traces of a Romanesque choir, put the entire building back to the state it must have been in the 7th century) does not leave a stone of the new building, locates and \"restores\" the rue des Perchamps."}, {"start": 2600.14, "end": 2635.1, "b_start": 5178.66, "b_end": 5251.7, "orig": "Elle a d’ailleurs pour ces reconstitutions des données plus précises que n’en ont généralement les restaurateurs : quelques images conservées par ma mémoire, les dernières peut-être qui existent encore actuellement, et destinées à être bientôt anéanties, de ce qu’était le Combray du temps de mon enfance ; et parce que c’est lui-même qui les a tracées en moi avant de disparaître, émouvantes – si on peut comparer un obscur portrait à ces effigies glorieuses dont ma grand’mère aimait à me donner des reproductions – comme ces gravures anciennes de la Cène ou ce tableau de Gentile Bellini, dans lesquels l’on voit en un état qui n’existe plus aujourd’hui le chef-d’œuvre de Vinci et le portail de Saint-Marc.", "en": "She also has more precise data for these reconstructions than restorers generally have: a few images preserved by my memory, the last perhaps which still exist today, and destined to soon be destroyed, of what Combray was in the time of my childhood; and because it was he himself who traced them in me before disappearing, moving - if we can compare an obscure portrait to these glorious effigies of which my grandmother loved to give me reproductions - like these old engravings of the Last Supper or this painting by Gentile Bellini, in which we see in a state which no longer exists today the masterpiece of Vinci and the portal of Saint Mark."}, {"start": 2636.1, "end": 2655.21, "b_start": 5251.7, "b_end": 5290.79, "orig": "On passait, rue de l’Oiseau, devant la vieille hôtellerie de l’Oiseau flesché dans la grande cour de laquelle entrèrent quelquefois au XVII\ne\nsiècle les carrosses des duchesses de Montpensier, de Guermantes et de Montmorency, quand elles avaient à venir à Combray pour quelque contestation avec leurs fermiers, pour une question d’hommage.", "en": "We passed, on rue de l'Oiseau, in front of the old inn of l'Oiseau flesché, into the large courtyard of which the carriages of the duchesses of Montpensier, Guermantes and Montmorency sometimes entered in the 17th century, when they had to come to Combray for some dispute with their farmers, for a question of homage."}, {"start": 2656.21, "end": 2660.98, "b_start": 5290.79, "b_end": 5302.2, "orig": "On gagnait le mail entre les arbres duquel apparaissait le clocher de Saint-Hilaire.", "en": "We reached the mall between the trees from which the bell tower of Saint-Hilaire appeared."}, {"start": 2661.98, "end": 2690.59, "b_start": 5302.2, "b_end": 5362.4, "orig": "Et j’aurais voulu pouvoir m’asseoir là et rester toute la journée à lire en écoutant les cloches ; car il faisait si beau et si tranquille que, quand sonnait l’heure, on aurait dit non qu’elle rompait le calme du jour, mais qu’elle le débarrassait de ce qu’il contenait et que le clocher, avec l’exactitude indolente et soigneuse d’une personne qui n’a rien d’autre à faire, venait seulement – pour exprimer et laisser tomber les quelques gouttes d’or que la chaleur y avait lentement et naturellement amassées – de presser, au moment voulu, la plénitude du silence.", "en": "And I wish I could sit there and stay all day reading and listening to the bells; because it was so beautiful and so peaceful that, when the hour struck, one would have said not that it was breaking the calm of the day, but that it was ridding it of what it contained and that the bell tower, with the indolent and careful exactitude of a person who has nothing else to do, had only come – to express and let fall the few drops of gold that the heat had slowly and naturally collected there – to press, at the right moment, the fullness of the silence."}, {"start": 2691.59, "end": 2704.79, "b_start": 5362.4, "b_end": 5389.87, "orig": "Le plus grand charme du côté de Guermantes, c’est qu’on y avait presque tout le temps à côté de soi le cours de la Vivonne. On la traversait une première fois, dix minutes après avoir quitté la maison, sur une passerelle dite le Pont-Vieux.", "en": "The greatest charm of the Guermantes side is that we had the course of the Vivonne close to us almost all the time. We crossed it for the first time, ten minutes after leaving the house, on a footbridge called the Pont-Vieux."}, {"start": 2705.79, "end": 2735.62, "b_start": 5389.87, "b_end": 5452.36, "orig": "Dès le lendemain de notre arrivée, le jour de Pâques, après le sermon s’il faisait beau temps, je courais jusque-là, voir dans ce désordre d’un matin de grande fête où quelques préparatifs somptueux font paraître plus sordides les ustensiles de ménage qui traînent encore, la rivière qui se promenait déjà en bleu ciel entre les terres encore noires et nues, accompagnée seulement d’une bande de coucous arrivés trop tôt et de primevères en avance, cependant que çà et là une violette au bec bleu laissait fléchir sa tige sous le poids de la goutte d’odeur qu’elle tenait dans son cornet.", "en": "The day after our arrival, on Easter Day, after the sermon if the weather was good, I would run there, to see in this disorder of a morning of great celebration where some sumptuous preparations make the household utensils still lying around seem more sordid, the river which was already wandering in sky blue between the lands still black and bare, accompanied only by a flock of cuckoos arriving too early and primroses early, while here and there a Violet with a blue beak let her stem bend under the weight of the drop of scent she held in her cone."}, {"start": 2736.62, "end": 2745.55, "b_start": 5452.36, "b_end": 5472.07, "orig": "Le Pont-Vieux débouchait dans un sentier de halage qui à cet endroit se tapissait l’été du feuillage bleu d’un noisetier sous lequel un pêcheur en chapeau de paille avait pris racine.", "en": "The Pont-Vieux led into a towpath which at this point was covered in summer with the blue foliage of a hazel tree under which a fisherman in a straw hat had taken root."}, {"start": 2746.55, "end": 2759.1, "b_start": 5472.07, "b_end": 5498.41, "orig": "À Combray où je savais quelle individualité de maréchal ferrant ou de garçon épicier était dissimulée sous l’uniforme du suisse ou le surplis de l’enfant de chœur, ce pêcheur est la seule personne dont je n’aie jamais découvert l’identité.", "en": "In Combray where I knew the individuality of a blacksmith or a grocer's boy was hidden under the Swiss uniform or the altar boy's surplice, this fisherman is the only person whose identity I never discovered."}, {"start": 2760.1, "end": 2769.75, "b_start": 5498.41, "b_end": 5519.4, "orig": "Il devait connaître mes parents, car il soulevait son chapeau quand nous passions ; je voulais alors demander son nom, mais on me faisait signe de me taire pour ne pas effrayer le poisson.", "en": "He must have known my parents, because he tipped his hat when we passed; I then wanted to ask its name, but I was signaled to be silent so as not to frighten the fish."}, {"start": 2770.75, "end": 2782.1, "b_start": 5519.4, "b_end": 5544.16, "orig": "Nous nous engagions dans le sentier de halage qui dominait le courant d’un talus de plusieurs pieds ; de l’autre côté la rive était basse, étendue en vastes prés jusqu’au village et jusqu’à la gare qui en était distante.", "en": "We entered the towpath which overlooked the current of an embankment of several feet; on the other side the bank was low, extending into vast meadows as far as the village and the station which was distant from it."}, {"start": 2783.1, "end": 2795.39, "b_start": 5544.16, "b_end": 5572.01, "orig": "Ils étaient semés des restes, à demi enfouis dans l’herbe, du château des anciens comtes de Combray qui au moyen âge avait de ce côté le cours de la Vivonne comme défense contre les attaques des sires de Guermantes et des abbés de Martinville.", "en": "They were strewn with the remains, half buried in the grass, of the castle of the ancient counts of Combray which in the Middle Ages had on this side the course of the Vivonne as a defense against the attacks of the lords of Guermantes and the abbots of Martinville."}, {"start": 2796.39, "end": 2836.71, "b_start": 5572.01, "b_end": 5658.11, "orig": "Ce n’étaient plus que quelques fragments de tours bossuant la prairie, à peine apparents, quelques créneaux d’où jadis l’arbalétrier lançait des pierres, d’où le guetteur surveillait Novepont, Clairefontaine, Martinville-le-Sec, Bailleau-l’Exempt, toutes terres vassales de Guermantes entre lesquelles Combray était enclavé, aujourd’hui au ras de l’herbe, dominés par les enfants de l’école des frères qui venaient là apprendre leurs leçons ou jouer aux récréations – passé presque descendu dans la terre, couché au bord de l’eau comme un promeneur qui prend le frais, mais me donnant fort à songer, me faisant ajouter dans le nom de Combray à la petite ville d’aujourd’hui une cité très différente, retenant mes pensées par son visage incompréhensible et d’autrefois qu’il cachait à demi sous les boutons d’or.", "en": "They were nothing more than a few fragments of towers humping the meadow, barely visible, a few battlements from which formerly the crossbowman threw stones, from where the lookout watched over Novepont, Clairefontaine, Martinville-le-Sec, Bailleau-l'Exempt, all vassal lands of Guermantes between which Combray was enclosed, today at grass level, dominated by the children of the school of brothers who came there to learn their lessons or play at recess - past almost descended into the earth, lying at the edge of the water like a walker taking the fresh air, but giving me plenty to think about, making me add in the name of Combray to the small town of today a very different city, retaining my thoughts by his incomprehensible and former face which he half hid under the buttercups."}, {"start": 2837.71, "end": 2884.9, "b_start": 5658.11, "b_end": 5758.75, "orig": "Ils étaient fort nombreux à cet endroit qu’ils avaient choisi pour leurs jeux sur l’herbe, isolés, par couples, par troupes, jaunes comme un jaune d’œuf, brillants d’autant plus, me semblait-il, que ne pouvant dériver vers aucune velléité de dégustation le plaisir que leur vue me causait, je l’accumulais dans leur surface dorée, jusqu’à ce qu’il devînt assez puissant pour produire de l’inutile beauté ; et cela dès ma plus petite enfance, quand du sentier de halage je tendais les bras vers eux sans pouvoir épeler complètement leur joli nom de Princes de contes de fées français, venus peut-être il y a bien des siècles d’Asie, mais apatriés pour toujours au village, contents du modeste horizon, aimant le soleil et le bord de l’eau, fidèles à la petite vue de la gare, gardant encore pourtant comme certaines de nos vieilles toiles peintes, dans leur simplicité populaire, un poétique éclat d’orient.", "en": "There were very numerous of them in this place which they had chosen for their games on the grass, isolated, in pairs, in troops, yellow as an egg yolk, all the more brilliant, it seemed to me, because not being able to divert the pleasure that their sight caused me into any desire for tasting, I accumulated it in their golden surface, until it became powerful enough to produce useless beauty; and this from my earliest childhood, when from the towpath I stretched out my arms towards them without being able to completely spell their pretty names of French fairy tale princes, perhaps coming many centuries ago from Asia, but forever apatriated to the village, content with the modest horizon, loving the sun and the water's edge, faithful to the little view of the station, still retaining, however, like some of our old painted canvases, in their popular simplicity, a poetic radiance of the Orient."}, {"start": 2885.9, "end": 2918.46, "b_start": 5758.75, "b_end": 5826.06, "orig": "Je m’amusais à regarder les carafes que les gamins mettaient dans la Vivonne pour prendre les petits poissons, et qui, remplies par la rivière, où elles sont à leur tour encloses, à la fois « contenant » aux flancs transparents comme une eau durcie, et « contenu » plongé dans un plus grand contenant de cristal liquide et courant, évoquaient l’image de la fraîcheur d’une façon plus délicieuse et plus irritante qu’elles n’eussent fait sur une table servie, en ne la montrant qu’en fuite dans cette allitération perpétuelle entre l’eau sans consistance où les mains ne pouvaient la capter et le verre sans fluidité où le palais ne pourrait en jouir.", "en": "I had fun looking at the carafes that the kids put in the Vivonne to catch the little fish, and which, filled by the river, where they are in turn enclosed, both \"container\" with transparent sides like hardened water, and \"content\" immersed in a larger container of liquid and current crystal, evoked the image of freshness in a more delicious and more irritating way than they would have done on a table served, showing it only in flight in this perpetual alliteration between the water without consistency where the hands could not capture it and the glass without fluidity where the palate could not enjoy it."}, {"start": 2919.46, "end": 2940.73, "b_start": 5826.06, "b_end": 5872.32, "orig": "Je me promettais de venir là plus tard avec des lignes ; j’obtenais qu’on tirât un peu de pain des provisions du goûter ; j’en jetais dans la Vivonne des boulettes qui semblaient suffire pour y provoquer un phénomène de sursaturation, car l’eau se solidifiait aussitôt autour d’elles en grappes ovoïdes de têtards inanitiés qu’elle tenait sans doute jusque-là en dissolution, invisibles, tout près d’être en voie de cristallisation.", "en": "I promised myself I’d come there later with some lines; I got a little bread from the snack provisions; I threw pellets into the Vivonne which seemed enough to cause a phenomenon of supersaturation, because the water immediately solidified around them into ovoid clusters of uninitiated tadpoles which it had undoubtedly held until then in dissolution, invisible, very close to being in the process of crystallization."}, {"start": 2941.73, "end": 2945.42, "b_start": 5872.32, "b_end": 5881.84, "orig": "Bientôt le cours de la Vivonne s’obstrue de plantes d’eau.", "en": "Soon the course of the Vivonne becomes clogged with water plants."}, {"start": 2946.42, "end": 2961.98, "b_start": 5881.84, "b_end": 5916.14, "orig": "Il y en a d’abord d’isolées comme tel nénufar à qui le courant au travers duquel il était placé d’une façon malheureuse laissait si peu de repos que, comme un bac actionné mécaniquement, il n’abordait une rive que pour retourner à celle d’où il était venu, refaisant éternellement la double traversée.", "en": "First of all, there are isolated ones like a water lily to which the current through which it was placed in an unfortunate manner left so little rest that, like a mechanically operated ferry, it only approached a bank to return to the one from which it had come, eternally repeating the double crossing."}, {"start": 2962.98, "end": 2982.44, "b_start": 5916.14, "b_end": 5957.1, "orig": "Poussé vers la rive, son pédoncule se dépliait, s’allongeait, filait, atteignait l’extrême limite de sa tension jusqu’au bord où le courant le reprenait, le vert cordage se repliait sur lui-même et ramenait la pauvre plante à ce qu’on peut d’autant mieux appeler son point de départ qu’elle n’y restait pas une seconde sans en repartir par une répétition de la même manœuvre.", "en": "Pushed towards the bank, its peduncle unfolded, lengthened, spun, reached the extreme limit of its tension until the edge where the current took it again, the green rope folded back on itself and brought the poor plant back to what we can all the better call its starting point since it did not stay there for a second without leaving again by a repetition of the same maneuver."}, {"start": 2983.44, "end": 3012.79, "b_start": 5957.1, "b_end": 6018.05, "orig": "Je la retrouvais de promenade en promenade, toujours dans la même situation, faisant penser à certains neurasthéniques au nombre desquels mon grand-père comptait ma tante Léonie, qui nous offrent sans changement au cours des années le spectacle des habitudes bizarres qu’ils se croient chaque fois à la veille de secouer et qu’ils gardent toujours ; pris dans l’engrenage de leurs malaises et de leurs manies, les efforts dans lesquels ils se débattent inutilement pour en sortir ne font qu’assurer le fonctionnement et faire jouer le déclic de leur diététique étrange, inéluctable et funeste.", "en": "I found her from walk to walk, always in the same situation, bringing to mind certain neurasthenics, among whom my grandfather included my aunt Léonie, who offer us without change over the years the spectacle of the bizarre habits which they believe each time they are about to shake and which they always keep; caught in the spiral of their discomforts and their manias, the efforts in which they struggle uselessly to escape from it only ensure the functioning and trigger the trigger of their strange, inescapable and fatal diet."}, {"start": 3013.79, "end": 3034.48, "b_start": 6018.05, "b_end": 6062.56, "orig": "Tel était ce nénufar, pareil aussi à quelqu’un de ces malheureux dont le tourment singulier, qui se répète indéfiniment durant l’éternité, excitait la curiosité de Dante et dont il se serait fait raconter plus longuement les particularités et la cause par le supplicié lui-même, si Virgile, s’éloignant à grands pas, ne l’avait forcé à le rattraper au plus vite, comme moi mes parents.", "en": "Such was this water lily, also like one of those unfortunates whose singular torment, which is repeated indefinitely throughout eternity, excited Dante's curiosity and whose particularities and cause he would have had told at greater length by the tortured person himself, if Virgil, striding away, had not forced him to catch up with him as quickly as possible, like my parents."}, {"start": 3035.48, "end": 3051.06, "b_start": 6062.56, "b_end": 6096.12, "orig": "Mais plus loin le courant se ralentit, il traverse une propriété dont l’accès était ouvert au public par celui à qui elle appartenait et qui s’y était complu à des travaux d’horticulture aquatique, faisant fleurir, dans les petits étangs que forme la Vivonne, de véritables jardins de nymphéas.", "en": "But further on the current slows down, it crosses a property to which access was open to the public by the person to whom it belonged and who had taken pleasure in aquatic horticultural work there, causing veritable gardens of water lilies to flourish in the small ponds that form the Vivonne."}, {"start": 3052.06, "end": 3075.77, "b_start": 6096.12, "b_end": 6146.44, "orig": "Comme les rives étaient à cet endroit très boisées, les grandes ombres des arbres donnaient à l’eau un fond qui était habituellement d’un vert sombre mais que parfois, quand nous rentrions par certains soirs rassérénés d’après-midi orageux, j’ai vu d’un bleu clair et cru, tirant sur le violet, d’apparence cloisonnée et de goût japonais. Çà et là, à la surface, rougissait comme une fraise une fleur de nymphéa au cœur écarlate, blanc sur les bords.", "en": "As the banks here were very wooded, the long shadows of the trees gave the water a background which was usually a dark green but which sometimes, when we returned on certain calm evenings from stormy afternoons, I saw a light and raw blue, tending towards purple, with a partitioned appearance and Japanese taste. Here and there, on the surface, blushed like a strawberry a nymphea flower with a scarlet heart, white at the edges."}, {"start": 3076.77, "end": 3092.49, "b_start": 6146.44, "b_end": 6179.59, "orig": "Plus loin, les fleurs plus nombreuses étaient plus pâles, moins lisses, plus grenues, plus plissées, et disposées par le hasard en enroulements si gracieux qu’on croyait voir flotter à la dérive, comme après l’effeuillement mélancolique d’une fête galante, des roses mousseuses en guirlandes dénouées.", "en": "Farther away, the more numerous flowers were paler, less smooth, grainier, more pleated, and arranged by chance in windings so graceful that one thought they saw moss roses in untied garlands floating adrift, as after the melancholy leafing of a love affair."}, {"start": 3093.49, "end": 3148.52, "b_start": 6179.59, "b_end": 6294.73, "orig": "Ailleurs un coin semblait réservé aux espèces communes qui montraient le blanc et rose proprets de la julienne, lavés comme de la porcelaine avec un soin domestique, tandis qu’un peu plus loin, pressées les unes contre les autres en une véritable plate-bande flottante, on eût dit des pensées des jardins qui étaient venues poser comme des papillons leur ailes bleuâtres et glacées sur l’obliquité transparente de ce parterre d’eau ; de ce parterre céleste aussi : car il donnait aux fleurs un sol d’une couleur plus précieuse, plus émouvante que la couleur des fleurs elles-mêmes ; et, soit que pendant l’après-midi il fît étinceler sous les nymphéas le kaléidoscope d’un bonheur attentif, silencieux et mobile, ou qu’il s’emplît vers le soir, comme quelque port lointain, du rose et de la rêverie du couchant, changeant sans cesse pour rester toujours en accord, autour des corolles de teintes plus fixes, avec ce qu’il y a de plus profond, de plus fugitif, de plus mystérieux – avec ce qu’il y a d’infini – dans l’heure, il semblait les avoir fait fleurir en plein ciel.", "en": "Elsewhere a corner seemed reserved for common species which showed the clean white and pink of the julienne, washed like porcelain with domestic care, while a little further away, pressed against each other in a veritable floating flowerbed, one would have said of garden pansies which had come to rest like butterflies their bluish and icy wings on the transparent obliquity of this waterbed; of this heavenly bed also: for he gave to the flowers a ground of a color more precious, more moving than the color of the flowers themselves; and, whether during the afternoon it sparkled under the water lilies the kaleidoscope of an attentive, silent and mobile happiness, or whether it filled towards the evening, like some distant port, with the pink and reverie of the setting sun, constantly changing to always remain in harmony, around the corollas of more fixed hues, with what is deepest, most fleeting, most mysterious – with what there is of infinity – within the hour, he seemed to have made them bloom in the sky."}, {"start": 3149.52, "end": 3153.6, "b_start": 6294.73, "b_end": 6304.1, "orig": "Au sortir de ce parc, la Vivonne redevient courante.", "en": "Leaving this park, the Vivonne becomes common again."}, {"start": 3154.6, "end": 3174.33, "b_start": 6304.1, "b_end": 6346.07, "orig": "Que de fois j’ai vu, j’ai désiré imiter quand je serais libre de vivre à ma guise, un rameur, qui, ayant lâché l’aviron, s’était couché à plat sur le dos, la tête en bas, au fond de sa barque, et la laissant flotter à la dérive, ne pouvant voir que le ciel qui filait lentement au-dessus de lui, portait sur son visage l’avant-goût du bonheur et de la paix.", "en": "How many times have I seen, I have desired to imitate when I am free to live as I please, a rower, who, having let go of the oar, had lain flat on his back, head down, at the bottom of his boat, and letting it float adrift, being able to see only the sky which passed slowly above him, bore on his face the foretaste of happiness and peace."}, {"start": 3175.33, "end": 3190.59, "b_start": 6346.07, "b_end": 6378.36, "orig": "Nous nous asseyions entre les iris au bord de l’eau. Dans le ciel férié flânait longuement un nuage oisif. Par moments, oppressée par l’ennui, une carpe se dressait hors de l’eau dans une aspiration anxieuse. C’était l’heure du goûter.", "en": "We sat among the irises at the water's edge. In the holiday sky an idle cloud loitered for a long time. At times, oppressed by boredom, a carp rose out of the water in anxious aspiration. It was snack time."}, {"start": 3191.59, "end": 3212.9, "b_start": 6378.36, "b_end": 6422.53, "orig": "Avant de repartir nous restions longtemps à manger des fruits, du pain et du chocolat, sur l’herbe où parvenaient jusqu’à nous, horizontaux, affaiblis, mais denses et métalliques encore, des sons de la cloche de Saint-Hilaire qui ne s’étaient pas mélangés à l’air qu’ils traversaient depuis si longtemps, et côtelés par la palpitation successive de toutes leurs lignes sonores, vibraient en rasant les fleurs, à nos pieds.", "en": "Before leaving we stayed for a long time eating fruit, bread and chocolate, on the grass where reached us, horizontal, weakened, but still dense and metallic, the sounds of the bell of Saint-Hilaire which had not mixed with the air they passed through for so long, and ribbed by the successive palpitation of all their sound lines, vibrated as they skimmed the flowers at our feet."}, {"start": 3213.9, "end": 3224.03, "b_start": 6422.53, "b_end": 6445.61, "orig": "Parfois, au bord de l’eau entourée de bois, nous rencontrions une maison dite de plaisance, isolée, perdue, qui ne voyait rien du monde que la rivière qui baignait ses pieds.", "en": "Sometimes, at the edge of the water surrounded by woods, we came across a so-called pleasure house, isolated, lost, which saw nothing of the world except the river which bathed its feet."}, {"start": 3225.03, "end": 3245.53, "b_start": 6445.61, "b_end": 6489.59, "orig": "Une jeune femme dont le visage pensif et les voiles élégants n’étaient pas de ce pays et qui sans doute était venue, selon l’expression populaire « s’enterrer » là, goûter le plaisir amer de sentir que son nom, le nom surtout de celui dont elle n’avait pu garder le cœur, y était inconnu, s’encadrait dans la fenêtre qui ne lui laissait pas regarder plus loin que la barque amarrée près de la porte.", "en": "A young woman whose pensive face and elegant veils were not from this country and who had undoubtedly come, according to the popular expression \"to bury herself\" there, to taste the bitter pleasure of feeling that her name, especially the name of the one whose heart she had been unable to keep, was unknown there, framed herself in the window which did not let her look further than the boat moored near the door."}, {"start": 3246.53, "end": 3263.11, "b_start": 6489.59, "b_end": 6525.1, "orig": "Elle levait distraitement les yeux en entendant derrière les arbres de la rive la voix des passants dont avant qu’elle eût aperçu leur visage, elle pouvait être certaine que jamais ils n’avaient connu, ni ne connaîtraient l’infidèle, que rien dans leur passé ne gardait sa marque, que rien dans leur avenir n’aurait l’occasion de la recevoir.", "en": "She raised her eyes absently as she heard behind the trees on the bank the voices of passers-by, before she had seen their faces, she could be certain that they had never known, nor would they know the infidel, that nothing in their past kept its mark, that nothing in their future would have the opportunity to receive it."}, {"start": 3264.11, "end": 3273.04, "b_start": 6525.1, "b_end": 6544.76, "orig": "On sentait que, dans son renoncement, elle avait volontairement quitté des lieux où elle aurait pu du moins apercevoir celui qu’elle aimait, pour ceux-ci qui ne l’avaient jamais vu.", "en": "We felt that, in her renunciation, she had voluntarily left places where she could at least have seen the one she loved, for those who had never seen him."}, {"start": 3274.04, "end": 3282.82, "b_start": 6544.76, "b_end": 6564.07, "orig": "Et je la regardais, revenant de quelque promenade sur un chemin où elle savait qu’il ne passerait pas, ôter de ses mains résignées de longs gants d’une grâce inutile.", "en": "And I watched her, returning from some walk on a path where she knew he would not pass, remove from her resigned hands long gloves of useless grace."}, {"start": 3283.82, "end": 3307.18, "b_start": 6564.07, "b_end": 6611.92, "orig": "Jamais dans la promenade du côté de Guermantes nous ne pûmes remonter jusqu’aux sources de la Vivonne auxquelles j’avais souvent pensé et qui avaient pour moi une existence si abstraite, si idéale, que j’avais été aussi surpris quand on m’avait dit qu’elles se trouvaient dans le département, à une certaine distance kilométrique de Combray, que le jour où j’avais appris qu’il y avait un autre point précis de la terre où s’ouvrait, dans l’antiquité, l’entrée des Enfers.", "en": "Never during the walk near Guermantes were we able to go back to the sources of the Vivonne which I had often thought about and which had for me such an abstract, so ideal existence, that I had been as surprised when I was told that they were in the department, at a certain kilometer distance from Combray, as the day when I had learned that there was another precise point on the earth where, in antiquity, the entrance to Hell opened."}, {"start": 3308.18, "end": 3314.1, "b_start": 6611.92, "b_end": 6625.01, "orig": "Jamais non plus nous ne pûmes pousser jusqu’au terme que j’eusse tant souhaité d’atteindre, jusqu’à Guermantes.", "en": "We were never able to push to the end that I so much wished to reach, until Guermantes."}, {"start": 3315.1, "end": 3360.08, "b_start": 6625.01, "b_end": 6718.91, "orig": "Je savais que là résidaient des châtelains, le duc et la duchesse de Guermantes, je savais qu’ils étaient des personnages réels et actuellement existants, mais chaque fois que je pensais à eux, je me les représentais tantôt en tapisserie, comme était la comtesse de Guermantes, dans le « Couronnement d’Esther » de notre église, tantôt de nuances changeantes comme était Gilbert le Mauvais dans le vitrail où il passait du vert chou au bleu prune, selon que j’étais encore à prendre de l’eau bénite ou que j’arrivais à nos chaises, tantôt tout à fait impalpables comme l’image de Geneviève de Brabant, ancêtre de la famille de Guermantes, que la lanterne magique promenait sur les rideaux de ma chambre ou faisait monter au plafond – enfin toujours enveloppés du mystère des temps mérovingiens et baignant comme dans un coucher de soleil dans la lumière orangée qui émane de cette syllabe : « antes ».", "en": "I knew that lords resided there, the Duke and Duchess of Guermantes, I knew that they were real and currently existing characters, but every time I thought of them, I pictured them sometimes in tapestry, as was the Countess of Guermantes, in the \"Coronation of Esther\" in our church, sometimes in changing shades like Gilbert the Bad in the stained glass window where he went from cabbage green to blue plum, depending on whether I was still taking holy water or whether I was arriving at our chairs, sometimes completely impalpable like the image of Geneviève de Brabant, ancestor of the Guermantes family, which the magic lantern passed over the curtains of my room or brought up to the ceiling – finally always enveloped in the mystery of Merovingian times and bathed as in a sunset in the orange light which emanates from this syllable: “antes.”"}, {"start": 3361.08, "end": 3383.42, "b_start": 6718.91, "b_end": 6766.18, "orig": "Mais si malgré cela ils étaient pour moi, en tant que duc et duchesse, des êtres réels, bien qu’étranges, en revanche leur personne ducale se distendait démesurément, s’immatérialisait, pour pouvoir contenir en elle ce Guermantes dont ils étaient duc et duchesse, tout ce « côté de Guermantes » ensoleillé, le cours de la Vivonne, ses nymphéas et ses grands arbres, et tant de beaux après-midi.", "en": "But if despite this they were for me, as duke and duchess, real beings, although strange, on the other hand their ducal person became disproportionately distended, immaterialized, to be able to contain within itself this Guermantes of whom they were duke and duchess, all this sunny \"side of Guermantes\", the course of the Vivonne, its water lilies and its large trees, and so many beautiful afternoons."}, {"start": 3384.42, "end": 3404.68, "b_start": 6766.18, "b_end": 6807.08, "orig": "Et je savais qu’ils ne portaient pas seulement le titre de duc et de duchesse de Guermantes, mais que depuis le XIV\ne\nsiècle où, après avoir inutilement essayé de vaincre leurs anciens seigneurs ils s’étaient alliés à eux par des mariages, ils étaient comtes de Combray, les premiers des citoyens de Combray par conséquent et pourtant les seuls qui n’y habitassent pas.", "en": "And I knew that they not only bore the title of Duke and Duchess of Guermantes, but that since the 14th century when, after having vainly tried to defeat their former lords, they had allied themselves with them through marriages, they had been Counts of Combray, the first citizens of Combray therefore and yet the only ones who did not live there."}, {"start": 3405.68, "end": 3431.34, "b_start": 6807.08, "b_end": 6861.02, "orig": "Comtes de Combray, possédant Combray au milieu de leur nom, de leur personne, et sans doute ayant effectivement en eux cette étrange et pieuse tristesse qui était spéciale à Combray ; propriétaires de la ville, mais non d’une maison particulière, demeurant sans doute dehors, dans la rue entre ciel et terre, comme ce Gilbert de Guermantes, dont je ne voyais aux vitraux de l’abside de Saint-Hilaire que l’envers de laque noire, si je levais la tête quand j’allais chercher du sel chez Camus.", "en": "Counts of Combray, possessing Combray in the middle of their name, of their person, and without doubt actually having in them this strange and pious sadness which was special to Combray; owners of the town, but not of a private house, undoubtedly living outside, in the street between heaven and earth, like this Gilbert de Guermantes, whose stained glass windows of the apse of Saint-Hilaire I only saw the back of black lacquer, if I raised my head when I went to get salt from Camus."}, {"start": 3432.34, "end": 3439.2, "b_start": 6861.02, "b_end": 6877.67, "orig": "Puis il arriva que sur le côté de Guermantes je passai parfois devant de petits enclos humides où montaient des grappes de fleurs sombres.", "en": "Then it happened that on the side of Guermantes I sometimes passed in front of small damp enclosures where clusters of dark flowers were growing."}, {"start": 3440.2, "end": 3452.75, "b_start": 6877.67, "b_end": 6904.58, "orig": "Je m’arrêtais, croyant acquérir une notion précieuse, car il me semblait avoir sous les yeux un fragment de cette région fluviatile, que je désirais tant connaître depuis que je l’avais vue décrite par un de mes écrivains préférés.", "en": "I stopped, believing I had acquired a valuable notion, because I seemed to have before my eyes a fragment of this fluvial region, which I so desired to know since I had seen it described by one of my favorite writers."}, {"start": 3453.75, "end": 3467.89, "b_start": 6904.58, "b_end": 6936.11, "orig": "Et ce fut avec elle, avec son sol imaginaire traversé de cours d’eau bouillonnants, que Guermantes, changeant d’aspect dans ma pensée, s’identifia, quand j’eus entendu le docteur Percepied nous parler des fleurs et des belles eaux vives qu’il y avait dans le parc du château.", "en": "And it was with it, with its imaginary ground crossed by bubbling waterways, that Guermantes, changing aspect in my thoughts, identified himself, when I heard Doctor Percepied talking to us about the flowers and the beautiful living waters that were in the castle park."}, {"start": 3468.89, "end": 3478.73, "b_start": 6936.11, "b_end": 6955.37, "orig": "Je rêvais que M\nme\nde Guermantes m’y faisait venir, éprise pour moi d’un soudain caprice ; tout le jour elle y pêchait la truite avec moi.", "en": "I dreamed that Madame de Guermantes made me come there, in love with a sudden whim for me; All day long she fished for trout with me."}, {"start": 3479.73, "end": 3494.8, "b_start": 6955.37, "b_end": 6989.2, "orig": "Et le soir me tenant par la main, en passant devant les petits jardins de ses vassaux, elle me montrait, le long des murs bas, les fleurs qui y appuient leurs quenouilles violettes et rouges et m’apprenait leurs noms. Elle me faisait lui dire le sujet des poèmes que j’avais l’intention de composer.", "en": "And in the evening, holding my hand, passing in front of the small gardens of her vassals, she showed me, along the low walls, the flowers which rest their purple and red cattails there and taught me their names. She made me tell her the subject of the poems I intended to compose."}, {"start": 3495.8, "end": 3502.83, "b_start": 6989.2, "b_end": 7004.78, "orig": "Et ces rêves m’avertissaient que, puisque je voulais un jour être un écrivain, il était temps de savoir ce que je comptais écrire.", "en": "And these dreams warned me that, since I wanted to be a writer one day, it was time to know what I planned to write."}, {"start": 3503.83, "end": 3520.01, "b_start": 7004.78, "b_end": 7038.64, "orig": "Mais dès que je me le demandais, tâchant de trouver un sujet où je pusse faire tenir une signification philosophique infinie, mon esprit s’arrêtait de fonctionner, je ne voyais plus que le vide en face de mon attention, je sentais que je n’avais pas de génie ou peut-être une maladie cérébrale l’empêchait de naître.", "en": "But as soon as I asked myself, trying to find a subject where I could convey an infinite philosophical meaning, my mind stopped functioning, I saw only emptiness in front of my attention, I felt that I had no genius or perhaps a brain disease prevented it from being born."}, {"start": 3521.01, "end": 3524.42, "b_start": 7038.64, "b_end": 7047.07, "orig": "Parfois je comptais sur mon père pour arranger cela.", "en": "Sometimes I counted on my father to fix it."}, {"start": 3525.42, "end": 3555.3, "b_start": 7047.07, "b_end": 7109.89, "orig": "Il était si puissant, si en faveur auprès des gens en place qu’il arrivait à nous faire transgresser les lois que Françoise m’avait appris à considérer comme plus inéluctables que celles de la vie et de la mort, à faire retarder d’un an pour notre maison, seule de tout le quartier, les travaux de « ravalement », à obtenir du ministre, pour le fils de M\nme\nSazerat qui voulait aller aux eaux, l’autorisation qu’il passât le baccalauréat deux mois d’avance, dans la série des candidats dont le nom commençait par un A au lieu d’attendre le tour des S.", "en": "He was so powerful, so in favor with the people in power that he managed to make us transgress the laws that Françoise had taught me to consider as more inescapable than those of life and death, to delay the \"renovation\" work for our house, the only one in the whole neighborhood, for a year, to obtain from the minister, for the son of Mrs. Sazerat who wanted to go to the waters, authorization for him to take the baccalaureate two months in advance, in the series of candidates whose name started with an A instead of waiting for the S's turn."}, {"start": 3556.3, "end": 3596.95, "b_start": 7109.89, "b_end": 7193.74, "orig": "Si j’étais tombé gravement malade, si j’avais été capturé par des brigands, persuadé que mon père avait trop d’intelligences avec les puissances suprêmes, de trop irrésistibles lettres de recommandation auprès du bon Dieu, pour que ma maladie ou ma captivité pussent être autre chose que de vains simulacres sans danger pour moi, j’aurais attendu avec calme l’heure inévitable du retour à la bonne réalité, l’heure de la délivrance ou de la guérison ; peut-être cette absence de génie, ce trou noir qui se creusait dans mon esprit quand je cherchais le sujet de mes écrits futurs, n’était-il aussi qu’une illusion sans consistance, et cesserait-elle par l’intervention de mon père qui avait dû convenir avec le Gouvernement et avec la Providence que je serais le premier écrivain de l’époque.", "en": "If I had fallen seriously ill, if I had been captured by bandits, convinced that my father had too many contacts with the supreme powers, too irresistible letters of recommendation to the good Lord, for my illness or my captivity to be anything other than vain simulacra without danger for me, I would have waited calmly for the inevitable hour of return to good reality, the hour of deliverance or healing; perhaps this absence of genius, this black hole which opened up in my mind when I sought the subject of my future writings, was also only an illusion without substance, and would cease through the intervention of my father who had to agree with the Government and with Providence that I would be the first writer of the time."}, {"start": 3597.95, "end": 3619.79, "b_start": 7193.74, "b_end": 7239.97, "orig": "Mais d’autres fois, tandis que mes parents s’impatientaient de me voir rester en arrière et ne pas les suivre, ma vie actuelle, au lieu de me sembler une création artificielle de mon père et qu’il pouvait modifier à son gré, m’apparaissait au contraire comme comprise dans une réalité qui n’était pas faite pour moi, contre laquelle il n’y avait pas de recours, au cœur de laquelle je n’avais pas d’allié, qui ne cachait rien au delà d’elle-même.", "en": "But other times, while my parents were impatient to see me stay behind and not follow them, my current life, instead of seeming to me an artificial creation of my father and which he could modify as he pleased, appeared to me on the contrary as included in a reality which was not made for me, against which there was no recourse, at the heart of which I had no ally, which hid nothing beyond itself."}, {"start": 3620.79, "end": 3631.9, "b_start": 7239.97, "b_end": 7263.67, "orig": "Il me semblait alors que j’existais de la même façon que les autres hommes, que je vieillirais, que je mourrais comme eux, et que parmi eux j’étais seulement du nombre de ceux qui n’ont pas de dispositions pour écrire.", "en": "It seemed to me then that I existed in the same way as other men, that I would age, that I would die like them, and that among them I was only among those who did not have the disposition to write."}, {"start": 3632.9, "end": 3640.3, "b_start": 7263.67, "b_end": 7279.04, "orig": "Aussi, découragé, je renonçais à jamais à la littérature, malgré les encouragements que m’avait donnés Bloch.", "en": "So, discouraged, I renounced literature forever, despite the encouragement Bloch had given me."}, {"start": 3641.3, "end": 3653.56, "b_start": 7279.04, "b_end": 7305.5, "orig": "Ce sentiment intime, immédiat, que j’avais du néant de ma pensée, prévalait contre toutes les paroles flatteuses qu’on pouvait me prodiguer, comme chez un méchant dont chacun vante les bonnes actions, les remords de sa conscience.", "en": "This intimate, immediate feeling that I had of the nothingness of my thoughts prevailed against all the flattering words that could be lavished on me, like a villain whose good deeds and the remorse of his conscience everyone praises."}, {"start": 3654.56, "end": 3667.69, "b_start": 7305.5, "b_end": 7331.96, "orig": "Un jour ma mère me dit : « Puisque tu parles toujours de M\nme\nde Guermantes, comme le docteur Percepied l’a très bien soignée il y a quatre ans, elle doit venir à Combray pour assister au mariage de sa fille.", "en": "One day my mother said to me: “Since you always talk about Madame de Guermantes, as Doctor Percepied treated her very well four years ago, she must come to Combray to attend her daughter’s wedding."}, {"start": 3668.69, "end": 3686.95, "b_start": 7331.96, "b_end": 7368.05, "orig": "Tu pourras l’apercevoir à la cérémonie. » C’était du reste par le docteur Percepied que j’avais le plus entendu parler de M\nme\nde Guermantes, et il nous avait même montré le numéro d’une revue illustrée où elle était représentée dans le costume qu’elle portait à un bal travesti chez la princesse de Léon.", "en": "You will be able to see him at the ceremony. » It was from Doctor Percepied that I had heard the most about Madame de Guermantes, and he had even shown us the number of an illustrated magazine where she was represented in the costume she wore to a dragooned ball at the Princess de Léon's."}, {"start": 3687.95, "end": 3703.34, "b_start": 7368.05, "b_end": 7400.72, "orig": "Tout d’un coup pendant la messe de mariage, un mouvement que fit le suisse en se déplaçant me permit de voir assise dans une chapelle une dame blonde avec un grand nez, des yeux bleus et perçants, une cravate bouffante en soie mauve, lisse, neuve et brillante, et un petit bouton au coin du nez.", "en": "All of a sudden during the wedding mass, a movement that the Swiss made while moving allowed me to see sitting in a chapel a blonde lady with a large nose, piercing blue eyes, a puffy purple silk tie, smooth, new and shiny, and a small button at the corner of her nose."}, {"start": 3704.34, "end": 3764.91, "b_start": 7400.72, "b_end": 7518.22, "orig": "Et parce que dans la surface de son visage rouge, comme si elle eût eu très chaud, je distinguais, diluées et à peine perceptibles, des parcelles d’analogie avec le portrait qu’on m’avait montré, parce que surtout les traits particuliers que je relevais en elle, si j’essayais de les énoncer, se formulaient précisément dans les mêmes termes : un grand nez, des yeux bleus, dont s’était servi le docteur Percepied quand il avait décrit devant moi la duchesse de Guermantes, je me dis : cette dame ressemble à M\nme\nde Guermantes ; or la chapelle où elle suivait la messe était celle de Gilbert le Mauvais, sous les plates tombes de laquelle, dorées et distendues comme des alvéoles de miel, reposaient les anciens comtes de Brabant, et que je me rappelais être, à ce qu’on m’avait dit, réservée à la famille de Guermantes quand quelqu’un de ses membres venait pour une cérémonie à Combray ; il ne pouvait vraisemblablement y avoir qu’une seule femme ressemblant au portrait de M\nme\nde Guermantes, qui fût ce jour-là, jour où elle devait justement venir, dans cette chapelle : c’était elle !", "en": "And because in the surface of her red face, as if she had been very hot, I distinguished, diluted and barely perceptible, fragments of analogy with the portrait that had been shown to me, because above all the particular features that I noticed in her, if I tried to state them, were formulated in precisely the same terms: a large nose, blue eyes, which Doctor Percepied had used when he had described the Duchess of Guermantes, I say to myself: this lady looks like Madame de Guermantes; now the chapel where she attended mass was that of Gilbert the Bad, under whose flat tombs, golden and distended like cells of honey, rested the former counts of Brabant, and which I remembered being, as I had been told, reserved for the Guermantes family when one of its members came for a ceremony in Combray; there could probably only be one woman resembling the portrait of Mme de Guermantes, who was that day, the day she was to come, in this chapel: it was her!"}, {"start": 3765.91, "end": 3783.58, "b_start": 7518.22, "b_end": 7553.77, "orig": "Ma déception était grande. Elle provenait de ce que je n’avais jamais pris garde, quand je pensais à M\nme\nde Guermantes, que je me la représentais avec les couleurs d’une tapisserie ou d’un vitrail, dans un autre siècle, d’une autre matière que le reste des personnes vivantes.", "en": "My disappointment was great. It came from the fact that I had never taken care, when I thought of Madame de Guermantes, that I represented her with the colors of a tapestry or a stained glass window, in another century, of a different material than the rest of living people."}, {"start": 3784.58, "end": 3869.87, "b_start": 7553.77, "b_end": 7723.49, "orig": "Jamais je ne m’étais avisé qu’elle pouvait avoir une figure rouge, une cravate mauve comme M\nme\nSazerat, et l’ovale de ses joues me fit tellement souvenir de personnes que j’avais vues à la maison que le soupçon m’effleura, pour se dissiper d’ailleurs aussitôt après, que cette dame en son principe générateur, en toutes ses molécules, n’était peut-être pas substantiellement la duchesse de Guermantes, mais que son corps, ignorant du nom qu’on lui appliquait, appartenait à un certain type féminin, qui comprenait aussi des femmes de médecins et de commerçants. « C’est cela, ce n’est que cela, M\nme\nde Guermantes ! » disait la mine attentive et étonnée avec laquelle je contemplais cette image qui, naturellement, n’avait aucun rapport avec celles qui sous le même nom de M\nme\nde Guermantes étaient apparues tant de fois dans mes songes, puisque, elle, elle n’avait pas été comme les autres arbitrairement formée par moi, mais qu’elle m’avait sauté aux yeux pour la première fois, il y a un moment seulement, dans l’église ; qui n’était pas de la même nature, n’était pas colorable à volonté comme elles qui se laissaient imbiber de la teinte orangée d’une syllabe, mais était si réelle que tout, jusqu’à ce petit bouton qui s’enflammait au coin du nez, certifiait son assujettissement aux lois de la vie, comme dans une apothéose de théâtre, un plissement de la robe de la fée, un tremblement de son petit doigt, dénoncent la présence matérielle d’une actrice vivante, là où nous étions incertains si nous n’avions pas devant les yeux une simple projection lumineuse.", "en": "I had never noticed that she could have a red face, a purple tie like Madame Sazerat, and the oval of her cheeks reminded me so much of people I had seen at home that the suspicion touched me, only to dissipate immediately afterwards, that this lady in her generating principle, in all her molecules, was perhaps not substantially the Duchess of Guermantes, but that her body, unaware of the name given to her applied, belonged to a certain feminine type, which also included wives of doctors and merchants. “That’s it, that’s all, Madame de Guermantes! » said the attentive and astonished look with which I contemplated this image which, naturally, had no connection with those which under the same name of Madame de Guermantes had appeared so many times in my dreams, since it had not been like the others arbitrarily formed by me, but had jumped out at me for the first time, only a moment ago, in the church; which was not of the same nature, was not colorable at will like those who allowed themselves to be soaked in the orange tint of a syllable, but was so real that everything, down to that little pimple that burned at the corner of the nose, certified its subjection to the laws of life, as in a theatrical apotheosis, a wrinkle of the fairy's dress, a tremor of her little finger, denounce the material presence of an actress alive, where we were uncertain if we did not have a simple luminous projection before our eyes."}, {"start": 3870.87, "end": 3902.29, "b_start": 7723.49, "b_end": 7785.76, "orig": "Mais en même temps, sur cette image que le nez proéminent, les yeux perçants, épinglaient dans ma vision (peut-être parce que c’était eux qui l’avaient d’abord atteinte, qui y avaient fait la première encoche, au moment où je n’avais pas encore le temps de songer que la femme qui apparaissait devant moi pouvait être M\nme\nde Guermantes), sur cette image toute récente, inchangeable, j’essayais d’appliquer l’idée : « C’est M\nme\nde Guermantes » sans parvenir qu’à la faire manœuvrer en face de l’image, comme deux disques séparés par un intervalle.", "en": "But at the same time, on this image that the prominent nose, the piercing eyes, pinned in my vision (perhaps because it was they who had first reached it, who had made the first notch there, at the moment when I did not yet have time to think that the woman who appeared before me could be Madame de Guermantes), on this very recent, unchangeable image, I tried to apply the idea: \"It is Madame de Guermantes” without managing to make it maneuver in front of the image, like two discs separated by an interval."}, {"start": 3903.29, "end": 3929.57, "b_start": 7785.76, "b_end": 7839.82, "orig": "Mais cette M\nme\nde Guermantes à laquelle j’avais si souvent rêvé, maintenant que je voyais qu’elle existait effectivement en dehors de moi, en prit plus de puissance encore sur mon imagination qui, un moment paralysée au contact d’une réalité si différente de ce qu’elle attendait, se mit à réagir et à me dire : « Glorieux dès avant Charlemagne, les Guermantes avaient le droit de vie et de mort sur leurs vassaux ; la duchesse de Guermantes descend de Geneviève de Brabant.", "en": "But this Madame de Guermantes of whom I had so often dreamed, now that I saw that she actually existed outside of me, gained even more power over my imagination which, paralyzed for a moment in contact with a reality so different from what she expected, began to react and tell me: “Glorious since before Charlemagne, the Guermantes had the right of life and death over their vassals; the Duchess of Guermantes descends from Geneviève de Brabant."}, {"start": 3930.57, "end": 3962.06, "b_start": 7839.82, "b_end": 7903.31, "orig": "Elle ne connaît, ni ne consentirait à connaître aucune des personnes qui sont ici. »\nEt – ô merveilleuse indépendance des regards humains, retenus au visage par une corde si lâche, si longue, si extensible qu’ils peuvent se promener seuls loin de lui – pendant que M\nme\nde Guermantes était assise dans la chapelle au-dessus des tombes de ses morts, ses regards flânaient çà et là, montaient le long des piliers, s’arrêtaient même sur moi comme un rayon de soleil errant dans la nef, mais un rayon de soleil qui, au moment où je reçus sa caresse, me sembla conscient.", "en": "She does not know, nor would she consent to know, any of the people here. » And – oh marvelous independence of human gazes, held to the face by a rope so loose, so long, so extensible that they can walk away from it alone – while M me de Guermantes was seated in the chapel above the tombs of her dead, her glances wandered here and there, climbed along the pillars, even stopped on me like a ray of sunshine wandering in the nave, but a ray of sunshine which, at the moment I received her caress, me seemed conscious."}, {"start": 3963.06, "end": 3983.67, "b_start": 7903.31, "b_end": 7944.5, "orig": "Quant à M\nme\nde Guermantes elle-même, comme elle restait immobile, assise comme une mère qui semble ne pas voir les audaces espiègles et les entreprises indiscrètes de ses enfants qui jouent et interpellent des personnes qu’elle ne connaît pas, il me fut impossible de savoir si elle approuvait ou blâmait, dans le désœuvrement de son âme, le vagabondage de ses regards.", "en": "As for Madame de Guermantes herself, as she remained motionless, seated like a mother who seems not to see the mischievous daring and indiscreet enterprises of her children who play and challenge people she does not know, it was impossible for me to know whether she approved or blamed, in the idleness of her soul, the wandering of her glances."}, {"start": 3984.67, "end": 4008.38, "b_start": 7944.5, "b_end": 7994.94, "orig": "Je trouvais important qu’elle ne partît pas avant que j’eusse pu la regarder suffisamment, car je me rappelais que depuis des années je considérais sa vue comme éminemment désirable, et je ne détachais pas mes yeux d’elle, comme si chacun de mes regards eût pu matériellement emporter et m
