ettre en réserve en moi le souvenir du nez proéminent, des joues rouges, de toutes ces particularités qui me semblaient autant de renseignements précieux, authentiques et singuliers sur son visage.", "en": "I found it important that she did not leave before I had been able to look at her sufficiently, because I remembered that for years I had considered her sight to be eminently desirable, and I did not take my eyes off her, as if each of my glances could materially take away and store in me the memory of the prominent nose, the red cheeks, all these particularities which seemed to me so much precious, authentic and singular information about her face."}, {"start": 4009.38, "end": 4043.82, "b_start": 7994.94, "b_end": 8063.83, "orig": "Maintenant que me le faisaient trouver beau toutes les pensées que j’y rapportais – et peut-être surtout, forme de l’instinct de conservation des meilleures parties de nous-mêmes, ce désir qu’on a toujours de ne pas avoir été déçu – la replaçant (puisque c’était une seule personne qu’elle et cette duchesse de Guermantes que j’avais évoquée jusque-là) hors du reste de l’humanité dans laquelle la vue pure et simple de son corps me l’avait fait un instant confondre, je m’irritais en entendant dire autour de moi : « Elle est mieux que M\nme\nSazerat, que M\nlle\nVinteuil », comme si elle leur eût été comparable.", "en": "Now that all the thoughts I brought back to it made me find it beautiful - and perhaps above all, a form of the instinct to preserve the best parts of ourselves, this desire that we always have not to have been disappointed - placing her (since it was a single person, her and this Duchess of Guermantes that I had mentioned so far) outside the rest of humanity in which the pure and simple sight of her body had made me feel it for an instant confused, I got irritated when I heard people around me say: “She is better than Ms. Sazerat, than Ms. Vinteuil,” as if she were comparable to them."}, {"start": 4044.82, "end": 4058.36, "b_start": 8063.83, "b_end": 8093.53, "orig": "Et mes regards s’arrêtant à ses cheveux blonds, à ses yeux bleus, à l’attache de son cou et omettant les traits qui eussent pu me rappeler d’autres visages, je m’écriais devant ce croquis volontairement incomplet : « Qu’elle est belle ! Quelle noblesse !", "en": "And my eyes stopping at her blond hair, her blue eyes, the look of her neck and omitting the features which could have reminded me of other faces, I exclaimed in front of this deliberately incomplete sketch: “How beautiful she is! How noble!"}, {"start": 4059.36, "end": 4082.42, "b_start": 8093.53, "b_end": 8140.68, "orig": "Comme c’est bien une fière Guermantes, la descendante de Geneviève de Brabant, que j’ai devant moi ! » Et l’attention avec laquelle j’éclairais son visage l’isolait tellement, qu’aujourd’hui si je repense à cette cérémonie, il m’est impossible de revoir une seule des personnes qui y assistaient sauf elle et le suisse qui répondit affirmativement quand je lui demandai si cette dame était bien M\nme\nde Guermantes.", "en": "What a proud Guermantes, the descendant of Geneviève de Brabant, that I have before me! » And the attention with which I illuminated her face isolated her so much that today if I think back to this ceremony, it is impossible for me to see a single one of the people who attended it again except her and the Swiss who answered in the affirmative when I asked him if this lady was indeed Madame de Guermantes."}, {"start": 4083.42, "end": 4109.32, "b_start": 8140.68, "b_end": 8194.04, "orig": "Mais elle, je la revois, surtout au moment du défilé dans la sacristie qu’éclairait le soleil intermittent et chaud d’un jour de vent et d’orage, et dans laquelle M\nme\nde Guermantes se trouvait au milieu de tous ces gens de Combray dont elle ne savait même pas les noms, mais dont l’infériorité proclamait trop sa suprématie pour qu’elle ne ressentît pas pour eux une sincère bienveillance, et auxquels du reste elle espérait imposer davantage encore à force de bonne grâce et de simplicité.", "en": "But I see her again, especially at the time of the parade in the sacristy lit by the intermittent and warm sun of a windy and stormy day, and in which Madame de Guermantes found herself in the middle of all these people from Combray whose names she did not even know, but whose inferiority proclaimed her supremacy too much for her not to feel sincere goodwill for them, and on whom she hoped to impose even more by dint of good grace. and simplicity."}, {"start": 4110.32, "end": 4130.65, "b_start": 8194.04, "b_end": 8238.29, "orig": "Aussi, ne pouvant émettre ces regards volontaires, chargés d’une signification précise, qu’on adresse à quelqu’un qu’on connaît, mais seulement laisser ses pensées distraites s’échapper incessamment devant elle en un flot de lumière bleue qu’elle ne pouvait contenir, elle ne voulait pas qu’il pût gêner, paraître dédaigner ces petites gens qu’il rencontrait au passage, qu’il atteignait à tous moments.", "en": "Also, not being able to emit those voluntary glances, charged with a precise meaning, which one addresses to someone one knows, but only to let her distracted thoughts escape incessantly before her in a flood of blue light which she could not contain, she did not want him to be able to get in the way, to appear to disdain these little people whom he met in passing, whom he reached at all times."}, {"start": 4131.65, "end": 4148.28, "b_start": 8238.29, "b_end": 8273.34, "orig": "Je revois encore, au-dessus de sa cravate mauve, soyeuse et gonflée, le doux étonnement de ses yeux auxquels elle avait ajouté sans oser le destiner à personne, mais pour que tous pussent en prendre leur part, un sourire un peu timide de suzeraine qui a l’air de s’excuser auprès de ses vassaux et de les aimer.", "en": "I can still see, above her purple tie, silky and puffy, the sweet astonishment of her eyes to which she had added without daring to direct it to anyone, but so that everyone could take their part, a slightly shy smile of a suzerain who seems to apologize to her vassals and to love them."}, {"start": 4149.28, "end": 4152.83, "b_start": 8273.34, "b_end": 8282.42, "orig": "Ce sourire tomba sur moi qui ne la quittais pas des yeux.", "en": "This smile fell on me who did not take my eyes off her."}, {"start": 4153.83, "end": 4174.26, "b_start": 8282.42, "b_end": 8326.09, "orig": "Alors me rappelant ce regard qu’elle avait laissé s’arrêter sur moi, pendant la messe, bleu comme un rayon de soleil qui aurait traversé le vitrail de Gilbert le Mauvais, je me dis : « Mais sans doute elle fait attention à moi. » Je crus que je lui plaisais, qu’elle penserait encore à moi quand elle aurait quitté l’église, qu’à cause de moi elle serait peut-être triste le soir à Guermantes.", "en": "So remembering that look that she had allowed to rest on me during mass, blue like a ray of sunlight that would have passed through the stained glass window of Gilbert the Bad, I said to myself: “But no doubt she is paying attention to me. » I thought that she liked me, that she would still think of me when she left the church, that because of me she would perhaps be sad in the evening at Guermantes."}, {"start": 4175.26, "end": 4197.07, "b_start": 8326.09, "b_end": 8367.98, "orig": "Et aussitôt je l’aimai, car s’il peut quelquefois suffire pour que nous aimions une femme qu’elle nous regarde avec mépris comme j’avais cru qu’avait fait M\nlle\nSwann et que nous pensions qu’elle ne pourra jamais nous appartenir, quelquefois aussi il peut suffire qu’elle nous regarde avec bonté comme faisait M\nme\nde Guermantes et que nous pensions qu’elle pourra nous appartenir.", "en": "And immediately I loved her, because if it can sometimes be enough for us to love a woman that she looks at us with contempt as I had believed that Miss Swann had done and that we thought that she could never belong to us, sometimes it can also be enough that she looks at us with kindness as Madame de Guermantes did and that we think that she could belong to us."}, {"start": 4198.07, "end": 4234.84, "b_start": 8367.98, "b_end": 8444.44, "orig": "Ses yeux bleuissaient comme une pervenche impossible à cueillir et que pourtant elle m’eût dédiée ; et le soleil menacé par un nuage mais dardant encore de toute sa force sur la place et dans la sacristie, donnait une carnation de géranium aux tapis rouges qu’on y avait étendus par terre pour la solennité, et sur lesquels s’avançait en souriant M\nme\nde Guermantes, et ajoutait à leur lainage un velouté rose, un épiderme de lumière, cette sorte de tendresse, de sérieuse douceur dans la pompe et dans la joie qui caractérisent certaines pages de Lohengrin, certaines peintures de Carpaccio, et qui font comprendre que Baudelaire ait pu appliquer au son de la trompette l’épithète de délicieux.", "en": "Her eyes turned blue like a periwinkle impossible to pick and yet dedicated to me; and the sun threatened by a cloud but still darting with all its force on the square and in the sacristy, gave a geranium complexion to the red carpets which had been spread on the ground for the solemnity, and on which Madame de Guermantes advanced smiling, and added to their woolen fabric a velvety pink, an epidermis of light, this sort of tenderness, of serious sweetness in pomp and joy which characterize certain pages of Lohengrin, certain paintings by Carpaccio, and which make it clear that Baudelaire was able to apply the epithet of delicious to the sound of the trumpet."}, {"start": 4235.84, "end": 4247.74, "b_start": 8444.44, "b_end": 8468.9, "orig": "Combien depuis ce jour, dans mes promenades du côté de Guermantes, il me parut plus affligeant encore qu’auparavant de n’avoir pas de dispositions pour les lettres, et de devoir renoncer à être jamais un écrivain célèbre.", "en": "How much since that day, in my walks near Guermantes, it seemed even more distressing than before to have no disposition for letters, and to have to give up ever being a famous writer."}, {"start": 4248.74, "end": 4267.44, "b_start": 8468.9, "b_end": 8508.23, "orig": "Les regrets que j’en éprouvais, tandis que je restais seul à rêver un peu à l’écart, me faisaient tant souffrir, que pour ne plus les ressentir, de lui-même par une sorte d’inhibition devant la douleur, mon esprit s’arrêtait entièrement de penser aux vers, aux romans, à un avenir poétique sur lequel mon manque de talent m’interdisait de compter.", "en": "The regrets I felt, while I remained alone dreaming a little apart, made me suffer so much that in order to no longer feel them, by itself through a sort of inhibition in the face of pain, my mind stopped entirely thinking about verses, about novels, about a poetic future on which my lack of talent forbade me to count."}, {"start": 4268.44, "end": 4289.42, "b_start": 8508.23, "b_end": 8551.68, "orig": "Alors, bien en dehors de toutes ces préoccupations littéraires et ne s’y rattachant en rien, tout d’un coup un toit, un reflet de soleil sur une pierre, l’odeur d’un chemin me faisaient arrêter par un plaisir particulier qu’ils me donnaient, et aussi parce qu’ils avaient l’air de cacher au delà de ce que je voyais, quelque chose qu’ils m’invitaient à venir prendre et que malgré mes efforts je n’arrivais pas à découvrir.", "en": "So, well outside of all these literary concerns and not connected to them in any way, suddenly a roof, a reflection of the sun on a stone, the smell of a path made me stop by a particular pleasure that they gave me, and also because they seemed to hide beyond what I saw, something that they invited me to come and take and that despite my efforts I could not discover."}, {"start": 4290.42, "end": 4300.38, "b_start": 8551.68, "b_end": 8571.68, "orig": "Comme je sentais que cela se trouvait en eux, je restais là, immobile, à regarder, à respirer, à tâcher d’aller avec ma pensée au delà de l’image ou de l’odeur.", "en": "As I felt that this was in them, I remained there, motionless, looking, breathing, trying to go with my thoughts beyond the image or the smell."}, {"start": 4301.38, "end": 4319.76, "b_start": 8571.68, "b_end": 8610.65, "orig": "Et s’il me fallait rattraper mon grand-père, poursuivre ma route, je cherchais à les retrouver, en fermant les yeux ; je m’attachais à me rappeler exactement la ligne du toit, la nuance de la pierre qui, sans que je pusse comprendre pourquoi, m’avaient semblé pleines, prêtes à s’entr’ouvrir, à me livrer ce dont elles n’étaient qu’un couvercle.", "en": "And if I had to catch up with my grandfather, continue on my way, I tried to find them, closing my eyes; I tried to remember exactly the line of the roof, the shade of the stone which, without my being able to understand why, had seemed to me full, ready to open a little, to reveal to me what they were only a cover."}, {"start": 4320.76, "end": 4335.06, "b_start": 8610.65, "b_end": 8641.6, "orig": "Certes ce n’était pas des impressions de ce genre qui pouvaient me rendre l’espérance que j’avais perdue de pouvoir être un jour écrivain et poète, car elles étaient toujours liées à un objet particulier dépourvu de valeur intellectuelle et ne se rapportant à aucune vérité abstraite.", "en": "Certainly it was not impressions of this kind that could restore to me the hope that I had lost of being able to one day be a writer and poet, because they were always linked to a particular object devoid of intellectual value and not relating to any abstract truth."}, {"start": 4336.06, "end": 4349.48, "b_start": 8641.6, "b_end": 8671.25, "orig": "Mais du moins elles me donnaient un plaisir irraisonné, l’illusion d’une sorte de fécondité et par là me distrayaient de l’ennui, du sentiment de mon impuissance que j’avais éprouvés chaque fois que j’avais cherché un sujet philosophique pour une grande œuvre littéraire.", "en": "But at least they gave me an irrational pleasure, the illusion of a sort of fertility and thereby distracted me from the boredom, from the feeling of my helplessness that I had experienced each time I had looked for a philosophical subject for a great literary work."}, {"start": 4350.48, "end": 4365.67, "b_start": 8671.25, "b_end": 8704.07, "orig": "Mais le devoir de conscience était si ardu – que m’imposaient ces impressions de forme, de parfum ou de couleur – de tâcher d’apercevoir ce qui se cachait derrière elles, que je ne tardais pas à me chercher à moi-même des excuses qui me permissent de me dérober à ces efforts et de m’épargner cette fatigue.", "en": "But the duty of conscience was so arduous - imposed on me by these impressions of shape, scent or color - to try to perceive what was hidden behind them, that I wasted no time in looking for excuses for myself which would allow me to evade these efforts and spare myself this fatigue."}, {"start": 4366.67, "end": 4380.04, "b_start": 8704.07, "b_end": 8733.89, "orig": "Par bonheur mes parents m’appelaient, je sentais que je n’avais pas présentement la tranquillité nécessaire pour poursuivre utilement ma recherche, et qu’il valait mieux n’y plus penser jusqu’à ce que je fusse rentré, et ne pas me fatiguer d’avance sans résultat.", "en": "Fortunately my parents called me, I felt that I did not currently have the necessary tranquility to usefully continue my research, and that it was better not to think about it anymore until I was home, and not to tire myself out in advance without result."}, {"start": 4381.04, "end": 4400.53, "b_start": 8733.89, "b_end": 8775.37, "orig": "Alors je ne m’occupais plus de cette chose inconnue qui s’enveloppait d’une forme ou d’un parfum, bien tranquille puisque je la ramenais à la maison, protégée par le revêtement d’images sous lesquelles je la trouverais vivante, comme les poissons que, les jours où on m’avait laissé aller à la pêche, je rapportais dans mon panier, couverts par une couche d’herbe qui préservait leur fraîcheur.", "en": "So I no longer concerned myself with this unknown thing which was enveloped in a form or a perfume, very peaceful since I brought it home, protected by the covering of images under which I would find it alive, like the fish which, on the days when I was allowed to go fishing, I brought back in my basket, covered by a layer of grass which preserved their freshness."}, {"start": 4401.53, "end": 4422.72, "b_start": 8775.37, "b_end": 8819.18, "orig": "Une fois à la maison je songeais à autre chose et ainsi s’entassaient dans mon esprit (comme dans ma chambre les fleurs que j’avais cueillies dans mes promenades ou les objets qu’on m’avait donnés), une pierre où jouait un reflet, un toit, un son de cloche, une odeur de feuilles, bien des images différentes sous lesquelles il y a longtemps qu’est morte la réalité pressentie que je n’ai pas eu assez de volonté pour arriver à découvrir.", "en": "Once at home I thought of something else and thus piled up in my mind (like in my room the flowers that I had picked on my walks or the objects that had been given to me), a stone where a reflection played, a roof, the sound of a bell, the smell of leaves, many different images under which the anticipated reality that I did not have enough will to discover had long since died."}, {"start": 4423.72, "end": 4443.18, "b_start": 8819.18, "b_end": 8859.35, "orig": "Une fois pourtant – où notre promenade s’étant prolongée fort au delà de sa durée habituelle, nous avions été bien heureux de rencontrer à mi-chemin du retour, comme l’après-midi finissait, le docteur Percepied qui passait en voiture à bride abattue, nous avait reconnus et fait monter avec lui – j’eus une impression de ce genre et ne l’abandonnai pas sans un peu l’approfondir.", "en": "Once, however - when our walk had extended well beyond its usual duration, we were very happy to meet halfway back, as the afternoon was ending, Doctor Percepied who was passing in a car at full speed, recognized us and made us ride with him - I had an impression of this kind and did not abandon it without exploring it a little."}, {"start": 4444.18, "end": 4455.87, "b_start": 8859.35, "b_end": 8884.68, "orig": "On m’avait fait monter près du cocher, nous allions comme le vent parce que le docteur avait encore avant de rentrer à Combray à s’arrêter à Martinville-le-Sec chez un malade à la porte duquel il avait été convenu que nous l’attendrions.", "en": "I was put up next to the coachman, we went like the wind because the doctor still had to stop at Martinville-le-Sec before returning to Combray to see a patient at whose door it had been agreed that we would wait for him."}, {"start": 4456.87, "end": 4479.22, "b_start": 8884.68, "b_end": 8931.9, "orig": "Au tournant d’un chemin j’éprouvai tout à coup ce plaisir spécial qui ne ressemblait à aucun autre, à apercevoir les deux clochers de Martinville, sur lesquels donnait le soleil couchant et que le mouvement de notre voiture et les lacets du chemin avaient l’air de faire changer de place, puis celui de Vieuxvicq qui, séparé d’eux par une colline et une vallée, et situé sur un plateau plus élevé dans le lointain, semblait pourtant tout voisin d’eux.", "en": "At the bend of a path I suddenly experienced this special pleasure which was unlike any other, in seeing the two bell towers of Martinville, on which the setting sun looked down and which the movement of our car and the bends of the path seemed to cause to change place, then that of Vieuxvicq which, separated from them by a hill and a valley, and located on a higher plateau in the distance, nevertheless seemed very close to them."}, {"start": 4480.22, "end": 4496.66, "b_start": 8931.9, "b_end": 8965.99, "orig": "En constatant, en notant la forme de leur flèche, le déplacement de leurs lignes, l’ensoleillement de leur surface, je sentais que je n’allais pas au bout de mon impression, que quelque chose était derrière ce mouvement, derrière cette clarté, quelque chose qu’ils semblaient contenir et dérober à la fois.", "en": "By observing, by noting the shape of their arrow, the movement of their lines, the sunshine of their surface, I felt that I was not going to the end of my impression, that something was behind this movement, behind this clarity, something that they seemed to contain and hide at the same time."}, {"start": 4497.66, "end": 4507.9, "b_start": 8965.99, "b_end": 8988.28, "orig": "Les clochers paraissaient si éloignés et nous avions l’air de si peu nous rapprocher d’eux, que je fus étonné quand, quelques instants après, nous nous arrêtâmes devant l’église de Martinville.", "en": "The bell towers seemed so far away and we seemed to be getting so little closer to them, that I was surprised when, a few moments later, we stopped in front of the Martinville church."}, {"start": 4508.9, "end": 4522.49, "b_start": 8988.28, "b_end": 9016.94, "orig": "Je ne savais pas la raison du plaisir que j’avais eu à les apercevoir à l’horizon et l’obligation de chercher à découvrir cette raison me semblait bien pénible ; j’avais envie de garder en réserve dans ma tête ces lignes remuantes au soleil et de n’y plus penser maintenant.", "en": "I did not know the reason for the pleasure I had in seeing them on the horizon and the obligation to try to discover this reason seemed very painful to me; I wanted to keep these stirring lines in the sun in reserve in my head and not think about them anymore."}, {"start": 4523.49, "end": 4537.22, "b_start": 9016.94, "b_end": 9047.48, "orig": "Et il est probable que si je l’avais fait, les deux clochers seraient allés à jamais rejoindre tant d’arbres, de toits, de parfums, de sons, que j’avais distingués des autres à cause de ce plaisir obscur qu’ils m’avaient procuré et que je n’ai jamais approfondi.", "en": "And it is probable that if I had done so, the two bell towers would have gone forever to join so many trees, roofs, perfumes, sounds, which I had distinguished from the others because of this obscure pleasure which they had given me and which I have never delved into."}, {"start": 4538.22, "end": 4551.66, "b_start": 9047.48, "b_end": 9076.13, "orig": "Je descendis causer avec mes parents en attendant le docteur. Puis nous repartîmes, je repris ma place sur le siège, je tournai la tête pour voir encore les clochers qu’un peu plus tard j’aperçus une dernière fois au tournant d’un chemin.", "en": "I went down to chat with my parents while waiting for the doctor. Then we left again, I returned to my place on the seat, I turned my head to still see the bell towers which a little later I saw one last time at the bend of a path."}, {"start": 4552.66, "end": 4564.61, "b_start": 9076.13, "b_end": 9101.39, "orig": "Le cocher, qui ne semblait pas disposé à causer, ayant à peine répondu à mes propos, force me fut, faute d’autre compagnie, de me rabattre sur celle de moi-même et d’essayer de me rappeler mes clochers.", "en": "The coachman, who did not seem inclined to talk, having barely responded to my remarks, I was forced, for lack of other company, to fall back on that of myself and try to remember my steeples."}, {"start": 4565.61, "end": 4587.35, "b_start": 9101.39, "b_end": 9147.48, "orig": "Bientôt, leurs lignes et leurs surfaces ensoleillées, comme si elles avaient été une sorte d’écorce, se déchirèrent, un peu de ce qui m’était caché en elles m’apparut, j’eus une pensée qui n’existait pas pour moi l’instant avant, qui se formula en mots dans ma tête, et le plaisir que m’avait fait tout à l’heure éprouver leur vue s’en trouva tellement accru que, pris d’une sorte d’ivresse, je ne pus plus penser à autre chose.", "en": "Soon, their lines and their sunny surfaces, as if they had been a sort of bark, were torn, a little of what was hidden from me in them appeared to me, I had a thought which did not exist for me the moment before, which was formulated in words in my head, and the pleasure which the sight of them had given me earlier was so increased that, overcome by a sort of intoxication, I could no longer think of anything else."}, {"start": 4588.35, "end": 4603.93, "b_start": 9147.48, "b_end": 9181.04, "orig": "À ce moment et comme nous étions déjà loin de Martinville, en tournant la tête je les aperçus de nouveau, tout noirs cette fois, car le soleil était déjà couché. Par moments les tournants du chemin me les dérobaient, puis ils se montrèrent une dernière fois et enfin je ne les vis plus.", "en": "At this moment and as we were already far from Martinville, turning my head I saw them again, all black this time, because the sun had already set. At times the turns of the path hid them from me, then they showed themselves one last time and finally I saw them no more."}, {"start": 4604.93, "end": 4635.79, "b_start": 9181.04, "b_end": 9246.79, "orig": "Sans me dire que ce qui était caché derrière les clochers de Martinville devait être quelque chose d’analogue à une jolie phrase, puisque c’était sous la forme de mots qui me faisaient plaisir que cela m’était apparu, demandant un crayon et du papier au docteur, je composai malgré les cahots de la voiture, pour soulager ma conscience et obéir à mon enthousiasme, le petit morceau suivant que j’ai retrouvé depuis et auquel je n’ai eu à faire subir que peu de changements :\n« Seuls, s’élevant du niveau de la plaine et comme perdus en rase campagne, montaient vers le ciel les deux clochers de Martinville.", "en": "Without telling myself that what was hidden behind the bell towers of Martinville must be something analogous to a pretty sentence, since it was in the form of words that gave me pleasure that it had appeared to me, asking the doctor for a pencil and paper, I composed despite the bumps of the car, to ease my conscience and obey my enthusiasm, the following little piece which I have since found and to which I have only had to undergo few changes: \"Alone, rising from the level from the plain and as if lost in the open countryside, the two bell towers of Martinville rose towards the sky."}, {"start": 4636.79, "end": 4645.6, "b_start": 9246.79, "b_end": 9265.07, "orig": "Bientôt nous en vîmes trois : venant se placer en face d’eux par une volte hardie, un clocher retardataire, celui de Vieuxvicq, les avait rejoints.", "en": "Soon we saw three of them: coming to stand in front of them with a bold turn, a late bell tower, that of Vieuxvicq, had joined them."}, {"start": 4646.6, "end": 4656.25, "b_start": 9265.07, "b_end": 9286.85, "orig": "Les minutes passaient, nous allions vite et pourtant les trois clochers étaient toujours au loin devant nous, comme trois oiseaux posés sur la plaine, immobiles et qu’on distingue au soleil.", "en": "The minutes passed, we were going quickly and yet the three bell towers were still in the distance in front of us, like three birds resting on the plain, motionless and visible in the sun."}, {"start": 4657.25, "end": 4669.39, "b_start": 9286.85, "b_end": 9313.5, "orig": "Puis le clocher de Vieuxvicq s’écarta, prit ses distances, et les clochers de Martinville restèrent seuls, éclairés par la lumière du couchant que même à cette distance, sur leurs pentes, je voyais jouer et sourire.", "en": "Then the bell tower of Vieuxvicq moved aside, took its distance, and the bell towers of Martinville remained alone, lit by the light of the setting sun which even at this distance, on their slopes, I saw playing and smiling."}, {"start": 4670.39, "end": 4685.8, "b_start": 9313.5, "b_end": 9347.02, "orig": "Nous avions été si longs à nous rapprocher d’eux, que je pensais au temps qu’il faudrait encore pour les atteindre quand, tout d’un coup, la voiture ayant tourné, elle nous déposa à leurs pieds ; et ils s’étaient jetés si rudement au-devant d’elle, qu’on n’eut que le temps d’arrêter pour ne pas se heurter au porche.", "en": "We had taken so long to get closer to them that I was thinking about the time it would still take to reach them when, suddenly, the car having turned, it deposited us at their feet; and they had thrown themselves so roughly in front of her that we only had time to stop so as not to run into the porch."}, {"start": 4686.8, "end": 4702.42, "b_start": 9347.02, "b_end": 9381.23, "orig": "Nous poursuivîmes notre route ; nous avions déjà quitté Martinville depuis un peu de temps et le village après nous avoir accompagnés quelques secondes avait disparu, que restés seuls à l’horizon à nous regarder fuir, ces clochers et celui de Vieuxvicq agitaient encore en signe d’adieu leurs cimes ensoleillées.", "en": "We continued our journey; we had already left Martinville for a short time and the village, after having accompanied us for a few seconds, had disappeared; left alone on the horizon watching us flee, these bell towers and that of Vieuxvicq still waved their sunny peaks in a sign of farewell."}, {"start": 4703.42, "end": 4713.98, "b_start": 9381.23, "b_end": 9404.59, "orig": "Parfois l’un s’effaçait pour que les deux autres pussent nous apercevoir un instant encore ; mais la route changea de direction, ils virèrent dans la lumière comme trois pivots d’or et disparurent à mes yeux.", "en": "Sometimes one would step aside so that the other two could see us for a moment longer; but the road changed direction, they turned in the light like three golden pivots and disappeared from my eyes."}, {"start": 4714.98, "end": 4727.8, "b_start": 9404.59, "b_end": 9431.89, "orig": "Mais, un peu plus tard, comme nous étions déjà près de Combray, le soleil étant maintenant couché, je les aperçus une dernière fois de très loin, qui n’étaient plus que comme trois fleurs peintes sur le ciel au-dessus de la ligne basse des champs.", "en": "But, a little later, as we were already near Combray, the sun having now set, I saw them one last time from a long distance, who were nothing more than three flowers painted on the sky above the low line of the fields."}, {"start": 4728.8, "end": 4775.62, "b_start": 9431.89, "b_end": 9528.07, "orig": "Ils me faisaient penser aussi aux trois jeunes filles d’une légende, abandonnées dans une solitude où tombait déjà l’obscurité ; et tandis que nous nous éloignions au galop, je les vis timidement chercher leur chemin et après quelques gauches trébuchements de leurs nobles silhouettes, se serrer les uns contre les autres, glisser l’un derrière l’autre, ne plus faire sur le ciel encore rose qu’une seule forme noire, charmante et résignée, et s’effacer dans la nuit. « Je ne repensai jamais à cette page, mais à ce moment-là, quand, au coin du siège où le cocher du docteur plaçait habituellement dans un panier les volailles qu’il avait achetées au marché de Martinville, j’eus fini de l’écrire, je me trouvai si heureux, je sentais qu’elle m’avait si parfaitement débarrassé de ces clochers et de ce qu’ils cachaient derrière eux, que comme si j’avais été moi-même une poule et si je venais de pondre un œuf, je me mis à chanter à tue-tête.", "en": "They also made me think of the three young girls of a legend, abandoned in a solitude where darkness was already falling; and as we galloped away, I saw them timidly seek their way and, after a few awkward stumbles of their noble silhouettes, huddle together, slide one behind the other, making nothing against the still pink sky but a single black shape, charming and resigned, and fading into the night. \"I never thought of that page again, but at that moment, when, at the corner of the seat where the doctor's coachman usually placed in a basket the poultry he had bought at the Martinville market, I had finished writing it, I found myself so happy, I felt that she had so perfectly rid me of these bell towers and of what they hid behind them, that as if I had been a hen myself and if I had just laid eggs an egg, I started singing at the top of my lungs."}, {"start": 4776.62, "end": 4794.38, "b_start": 9528.07, "b_end": 9565.33, "orig": "Pendant toute la journée, dans ces promenades, j’avais pu rêver au plaisir que ce serait d’être l’ami de la duchesse de Guermantes, de pêcher la truite, de me promener en barque sur la Vivonne, et, avide de bonheur, ne demander en ces moments-là rien d’autre à la vie que de se composer toujours d’une suite d’heureux après-midi.", "en": "During the whole day, during these walks, I had been able to dream of the pleasure it would be to be the friend of the Duchess of Guermantes, to fish for trout, to go for a boat ride on the Vivonne, and, eager for happiness, to ask for nothing other in these moments than to always consist of a series of happy afternoons."}, {"start": 4795.38, "end": 4837.24, "b_start": 9565.33, "b_end": 9650.78, "orig": "Mais quand sur le chemin du retour j’avais aperçu sur la gauche une ferme, assez distante de deux autres qui étaient au contraire très rapprochées, et à partir de laquelle pour entrer dans Combray il n’y avait plus qu’à prendre une allée de chênes bordée d’un côté de prés appartenant chacun à un petit clos et plantés à intervalles égaux de pommiers qui y portaient, quand ils étaient éclairés par le soleil couchant, le dessin japonais de leurs ombres, brusquement mon cœur se mettait à battre, je savais qu’avant une demi-heure nous serions rentrés, et que, comme c’était de règle les jours où nous étions allés du côté de Guermantes et où le dîner était servi plus tard, on m’enverrait me coucher sitôt ma soupe prise, de sorte que ma mère, retenue à table comme s’il y avait du monde à dîner, ne monterait pas me dire bonsoir dans mon lit.", "en": "But when on the way back I saw on the left a farm, quite distant from two others which were on the contrary very close together, and from which to enter Combray there was nothing more than to take an avenue of oaks bordered on one side by meadows each belonging to a small enclosure and planted at equal intervals with apple trees which bore, when lit by the setting sun, the Japanese pattern of their shadows, suddenly my heart began to beat, I knew that within half an hour we would be back, and that, as was the rule on the days when we went to Guermantes and where dinner was served later, I would be sent to bed as soon as I had eaten my soup, so that my mother, kept at the table as if there were people at dinner, would not come up to my bed to say good night."}, {"start": 4838.24, "end": 4849.86, "b_start": 9650.78, "b_end": 9676.0, "orig": "La zone de tristesse où je venais d’entrer était aussi distincte de la zone où je m’élançais avec joie il y avait un moment encore que dans certains ciels une bande rose est séparée comme par une ligne d’une bande verte ou d’une bande noire.", "en": "The zone of sadness into which I had just entered was as distinct from the zone into which I rushed with joy a while ago that in certain skies a pink band is separated as by a line from a green band or a black band."}, {"start": 4850.86, "end": 4857.86, "b_start": 9676.0, "b_end": 9691.9, "orig": "On voit un oiseau voler dans le rose, il va en atteindre la fin, il touche presque au noir, puis il y est entré.", "en": "We see a bird flying in the pink, it is about to reach the end of it, it almost touches black, then it enters it."}, {"start": 4858.86, "end": 4873.48, "b_start": 9691.9, "b_end": 9723.61, "orig": "Les désirs qui tout à l’heure m’entouraient, d’aller à Guermantes, de voyager, d’être heureux, j’étais maintenant tellement en dehors d’eux que leur accomplissement ne m’eût fait aucun plaisir. Comme j’aurais donné tout cela pour pouvoir pleurer toute la nuit dans les bras de maman !", "en": "The desires that surrounded me just now, to go to Guermantes, to travel, to be happy, I was now so far outside of them that their fulfillment would not have given me any pleasure. How I would have given all that to be able to cry all night in Mom’s arms!"}, {"start": 4874.48, "end": 4884.78, "b_start": 9723.61, "b_end": 9745.92, "orig": "Je frissonnais, je ne détachais pas mes yeux angoissés du visage de ma mère, qui n’apparaîtrait pas ce soir dans la chambre où je me voyais déjà par la pensée, j’aurais voulu mourir.", "en": "I shivered, I couldn't take my anguished eyes away from my mother's face, who would not appear this evening in the room where I already saw myself in thought, I would have wanted to die."}, {"start": 4885.78, "end": 4901.81, "b_start": 9745.92, "b_end": 9781.0, "orig": "Et cet état durerait jusqu’au lendemain, quand les rayons du matin, appuyant, comme le jardinier, leurs barreaux au mur revêtu de capucines qui grimpaient jusqu’à ma fenêtre, je sauterais à bas du lit pour descendre vite au jardin, sans plus me rappeler que le soir ramènerait jamais l’heure de quitter ma mère.", "en": "And this state would last until the next day, when the morning rays, leaning, like the gardener, their bars on the wall covered with nasturtiums which climbed up to my window, I would jump out of bed to go quickly down to the garden, without remembering anymore that the evening would never bring the time to leave my mother."}, {"start": 4902.81, "end": 4928.18, "b_start": 9781.0, "b_end": 9834.96, "orig": "Et de la sorte c’est du côté de Guermantes que j’ai appris à distinguer ces états qui se succèdent en moi, pendant certaines périodes, et vont jusqu’à se partager chaque journée, l’un revenant chasser l’autre, avec la ponctualité de la fièvre ; contigus, mais si extérieurs l’un à l’autre, si dépourvus de moyens de communication entre eux, que je ne puis plus comprendre, plus même me représenter, dans l’un, ce que j’ai désiré, ou redouté, ou accompli dans l’autre.", "en": "And in this way it was from Guermantes that I learned to distinguish these states which succeed one another in me, during certain periods, and go so far as to share each day, one returning to chase away the other, with the punctuality of a fever; contiguous, but so external to each other, so devoid of means of communication between them, that I can no longer understand, no longer even represent, in one, what I desired, or feared, or accomplished in the other."}, {"start": 4929.18, "end": 4942.83, "b_start": 9834.96, "b_end": 9864.4, "orig": "Aussi le côté de Méséglise et le côté de Guermantes restent-ils pour moi liés à bien des petits événements de celle de toutes les diverses vies que nous menons parallèlement, qui est la plus pleine de péripéties, la plus riche en épisodes, je veux dire la vie intellectuelle.", "en": "Also the side of Méséglise and the side of Guermantes remain for me linked to many small events of that of all the various lives that we lead in parallel, which is the most full of adventures, the richest in episodes, I mean intellectual life."}, {"start": 4943.83, "end": 4959.72, "b_start": 9864.4, "b_end": 9899.59, "orig": "Sans doute elle progresse en nous insensiblement et les vérités qui en ont changé pour nous le sens et l’aspect, qui nous ont ouvert de nouveaux chemins, nous en préparions depuis longtemps la découverte ; mais c’était sans le savoir ; et elles ne datent pour nous que du jour, de la minute où elles nous sont devenues visibles.", "en": "No doubt it progresses in us imperceptibly and the truths which have changed its meaning and appearance for us, which have opened new paths for us, we have been preparing for the discovery for a long time; but it was without knowing it; and they only date for us from the day, from the minute when they became visible to us."}, {"start": 4960.72, "end": 5010.5, "b_start": 9899.59, "b_end": 10006.91, "orig": "Les fleurs qui jouaient alors sur l’herbe, l’eau qui passait au soleil, tout le paysage qui environna leur apparition continue à accompagner leur souvenir de son visage inconscient ou distrait ; et certes quand ils étaient longuement contemplés par cet humble passant, par cet enfant qui rêvait – comme l’est un roi, par un mémorialiste perdu dans la foule – ce coin de nature, ce bout de jardin n’eussent pu penser que ce serait grâce à lui qu’ils seraient appelés à survivre en leurs particularités les plus éphémères ; et pourtant ce parfum d’aubépine qui butine le long de la haie où les églantiers le remplaceront bientôt, un bruit de pas sans écho sur le gravier d’une allée, une bulle formée contre une plante aquatique par l’eau de la rivière et qui crève aussitôt, mon exaltation les a portés et a réussi à leur faire traverser tant d’années successives, tandis qu’alentour les chemins se sont effacés et que sont morts ceux qui les foulèrent et le souvenir de ceux qui les foulèrent.", "en": "The flowers which then played on the grass, the water which passed in the sun, the whole landscape which surrounded their appearance continues to accompany their memory of his unconscious or distracted face; and certainly when they were long contemplated by this humble passer-by, by this dreaming child – like a king, by a memoirist lost in the crowd – this corner of nature, this piece of garden could not have thought that it would be thanks to him that they would be called to survive in their most ephemeral particularities; and yet this scent of hawthorn which grows along the hedge where the rose hips will soon replace it, a sound of footsteps without echo on the gravel of an alley, a bubble formed against an aquatic plant by the water of the river and which bursts immediately, my exaltation has carried them and succeeded in carrying them through so many successive years, while around the paths have faded and those who trod them and the memory of those who have trodden them have died. trodden."}, {"start": 5011.5, "end": 5024.79, "b_start": 10006.91, "b_end": 10037.42, "orig": "Parfois ce morceau de paysage amené ainsi jusqu’à aujourd’hui se détache si isolé de tout, qu’il flotte incertain dans ma pensée comme une Délos fleurie, sans que je puisse dire de quel pays, de quel temps – peut-être tout simplement de quel rêve – il vient.", "en": "Sometimes this piece of landscape brought to this day stands out so isolated from everything that it floats uncertainly in my thoughts like a flowery Delos, without me being able to say from what country, from what time – perhaps quite simply from what dream – it comes."}, {"start": 5025.79, "end": 5036.11, "b_start": 10037.42, "b_end": 10059.9, "orig": "Mais c’est surtout comme à des gisements profonds de mon sol mental, comme aux terrains résistants sur lesquels je m’appuie encore, que je dois penser au côté de Méséglise et au côté de Guermantes.", "en": "But it is above all like the deep deposits of my mental soil, like the resistant grounds on which I still rely, that I must think of the side of Méséglise and the side of Guermantes."}, {"start": 5037.11, "end": 5048.08, "b_start": 10059.9, "b_end": 10084.39, "orig": "C’est parce que je croyais aux choses, aux êtres, tandis que je les parcourais, que les choses, les êtres qu’ils m’ont fait connaître sont les seuls que je prenne encore au sérieux et qui me donnent encore de la joie.", "en": "It is because I believed in things, in beings, while I was traveling through them, that the things, the beings that they introduced me to are the only ones that I still take seriously and that still give me joy."}, {"start": 5049.08, "end": 5058.97, "b_start": 10084.39, "b_end": 10106.99, "orig": "Soit que la foi qui crée soit tarie en moi, soit que la réalité ne se forme que dans la mémoire, les fleurs qu’on me montre aujourd’hui pour la première fois ne me semblent pas de vraies fleurs.", "en": "Whether the faith that creates has dried up in me, or whether reality is only formed in memory, the flowers that are being shown to me today for the first time do not seem like real flowers to me."}, {"start": 5059.97, "end": 5100.48, "b_start": 10106.99, "b_end": 10191.14, "orig": "Le côté de Méséglise avec ses lilas, ses aubépines, ses bluets, ses coquelicots, ses pommiers, le côté de Guermantes avec sa rivière à têtards, ses nymphéas et ses boutons d’or, ont constitué à tout jamais pour moi la figure des pays où j’aimerais vivre, où j’exige avant tout qu’on puisse aller à la pêche, se promener en canot, voir des ruines de fortifications gothiques et trouver au milieu des blés, ainsi qu’était Saint-André-des-Champs, une église monumentale, rustique et dorée comme une meule ; et les bluets, les aubépines, les pommiers qu’il m’arrive quand je voyage de rencontrer encore dans les champs, parce qu’ils sont situés à la même profondeur, au niveau de mon passé, sont immédiatement en communication avec mon cœur.", "en": "The side of Méséglise with its lilacs, its hawthorns, its cornflowers, its poppies, its apple trees, the side of Guermantes with its tadpole river, its water lilies and its buttercups, have forever constituted for me the image of the countries where I would like to live, where I demand above all that one can go fishing, take a canoe trip, see the ruins of Gothic fortifications and find among the wheat, thus what was Saint-André-des-Champs, a monumental church, rustic and golden like a millstone; and the blueberries, the hawthorns, the apple trees that I happen to come across when I travel in the fields, because they are located at the same depth, at the level of my past, are immediately in communication with my heart."}, {"start": 5101.48, "end": 5127.06, "b_start": 10191.14, "b_end": 10248.2, "orig": "Et pourtant, parce qu’il y a quelque chose d’individuel dans les lieux, quand me saisit le désir de revoir le côté de Guermantes, on ne le satisferait pas en me menant au bord d’une rivière où il y aurait d’aussi beaux, de plus beaux nymphéas que dans la Vivonne, pas plus que le soir en rentrant – à l’heure où s’éveillait en moi cette angoisse qui plus tard émigre dans l’amour, et peut devenir à jamais inséparable de lui – je n’aurais souhaité que vînt me dire bonsoir une mère plus belle et plus intelligente que la mienne.", "en": "And yet, because there is something individual in the place, when the desire seizes me to see the side of Guermantes again, it would not be satisfied by taking me to the edge of a river where there would be as beautiful, more beautiful water lilies as in the Vivonne, any more than in the evening when returning - at the hour when awakened in me this anguish which later emigrates in love, and can become forever inseparable from him – I would only have wished that a mother more beautiful and more intelligent than mine had come to say goodnight to me."}, {"start": 5128.06, "end": 5181.49, "b_start": 10248.2, "b_end": 10360.75, "orig": "Non ; de même que ce qu’il me fallait pour que je pusse m’endormir heureux, avec cette paix sans trouble qu’aucune maîtresse n’a pu me donner depuis, puisqu’on doute d’elles encore au moment où on croit en elles et qu’on ne possède jamais leur cœur comme je recevais dans un baiser celui de ma mère, tout entier, sans la réserve d’une arrère-pensée, sans le reliquat d’une intention qui ne fût pas pour moi – c’est que ce fût elle, c’est qu’elle inclinât vers moi ce visage où il y avait au-dessous de l’œil quelque chose qui était, paraît-il, un défaut, et que j’aimais à l’égal du reste ; de même ce que je veux revoir, c’est le côté de Guermantes que j’ai connu, avec la ferme qui est peu éloignée des deux suivantes serrées l’une contre l’autre, à l’entrée de l’allée des chênes ; ce sont ces prairies où, quand le soleil les rend réfléchissantes comme une mare, se dessinent les feuilles des pommiers, c’est ce paysage dont parfois, la nuit dans mes rêves, l’individualité m’étreint avec une puissance presque fantastique et que je ne peux plus retrouver au réveil.", "en": "No ; as well as what I needed so that I could fall asleep happy, with this undisturbed peace that no mistress has been able to give me since, since we still doubt them at the moment when we believe in them and we never possess their heart as I received my mother's in a kiss, entirely, without the reserve of an ulterior motive, without the remainder of an intention which was not for me - it was that it was her, it was that she tilted towards me this face where there was something below the eye which was, it seems, a defect, and which I loved as much as the rest; in the same way what I want to see again is the side of Guermantes that I knew, with the farm which is not far from the next two close together, at the entrance to the avenue of oaks; these are these meadows where, when the sun makes them reflective like a pond, the leaves of the apple trees are outlined, it is this landscape whose individuality sometimes, at night in my dreams, embraces me with an almost fantastic power and which I can no longer find when I wake up."}, {"start": 5182.49, "end": 5197.08, "b_start": 10360.75, "b_end": 10392.56, "orig": "Sans doute pour avoir à jamais indissolublement uni en moi des impressions différentes, rien que parce qu’ils me les avaient fait éprouver en même temps, le côté de Méséglise ou le côté de Guermantes m’ont exposé, pour l’avenir, à bien des déceptions et même à bien des fautes.", "en": "No doubt for having forever indissolubly united in me different impressions, just because they had made me experience them at the same time, the side of Méséglise or the side of Guermantes exposed me, for the future, to many disappointments and even to many faults."}, {"start": 5198.08, "end": 5209.89, "b_start": 10392.56, "b_end": 10418.9, "orig": "Car souvent j’ai voulu revoir une personne sans discerner que c’était simplement parce qu’elle me rappelait une haie d’aubépines, et j’ai été induit à croire, à faire croire à un regain d’affection, par un simple désir de voyage.", "en": "Because often I wanted to see a person again without discerning that it was simply because they reminded me of a hawthorn hedge, and I was led to believe, to make believe, in a renewed affection, by a simple desire to travel."}, {"start": 5210.89, "end": 5226.3, "b_start": 10418.9, "b_end": 10450.12, "orig": "Mais par là même aussi, et en restant présents en celles de mes impressions d’aujourd’hui auxquelles ils peuvent se relier, ils leur donnent des assises, de la profondeur, une dimension de plus qu’aux autres. Ils leur ajoutent aussi un charme, une signification qui n’est que pour moi.", "en": "But by the same token, and by remaining present in those of my impressions today to which they can relate, they give them foundation, depth, a dimension more than the others. They also add a charm to them, a meaning that is only for me."}, {"start": 5227.3, "end": 5281.94, "b_start": 10450.12, "b_end": 10565.76, "orig": "Quand par les soirs d’été le ciel harmonieux gronde comme une bête fauve et que chacun boude l’orage, c’est au côté de Méséglise que je dois de rester seul en extase à respirer, à travers le bruit de la pluie qui tombe, l’odeur d’invisibles et persistants lilas.\n* * *\nC’est ainsi que je restais souvent jusqu’au matin à songer au temps de Combray, à mes tristes soirées sans sommeil, à tant de jours aussi dont l’image m’avait été plus récemment rendue par la saveur – ce qu’on aurait appelé à Combray le « parfum » – d’une tasse de thé, et par association de souvenirs à ce que, bien des années après avoir quitté cette petite ville, j’avais appris, au sujet d’un amour que Swann avait eu avant ma naissance, avec cette précision dans les détails plus facile à obtenir quelquefois pour la vie de personnes mortes il y a des siècles que pour celle de nos meilleurs amis, et qui semble impossible comme semblait impossible de causer d’une ville à une autre – tant qu’on ignore le biais par lequel cette impossibilité a été tournée.", "en": "When on summer evenings the harmonious sky roars like a wild beast and everyone shuns the storm, it is alongside Méséglise that I owe it to myself to remain alone in ecstasy breathing, through the sound of the falling rain, the smell of invisible and persistent lilacs. * * * This is how I often stayed until morning thinking about the days of Combray, about my sad sleepless evenings, about so many days also whose image had been more recently brought back to me by the flavor – what in Combray would have been called the “perfume” – of a cup of tea, and by association of memories with what, many years after leaving this small town, I had learned, about a love that Swann had had before my birth, with this precision in details that is sometimes easier to obtain for the lives of people who died centuries ago than for those of our best friends, and which seems impossible as it seemed impossible to talk from one city to another – as long as we do not know the means by which this impossibility was overcome."}, {"start": 5282.94, "end": 5308.29, "b_start": 10565.76, "b_end": 10619.2, "orig": "Tous ces souvenirs ajoutés les uns aux autres ne formaient plus qu’une masse, mais non sans qu’on ne pût distinguer entre eux – entre les plus anciens, et ceux plus récents, nés d’un parfum, puis ceux qui n’étaient que les souvenirs d’une autre personne de qui je les avais appris – sinon des fissures, des failles véritables, du moins ces veinures, ces bigarrures de coloration, qui, dans certaines roches, dans certains marbres, révèlent des différences d’origine, d’âge, de « formation ».", "en": "All these memories added to each other formed only one mass, but not without being able to distinguish between them - between the oldest, and those more recent, born from a perfume, then those which were only the memories of another person from whom I had learned them - if not cracks, real faults, at least these veins, these variegations of coloring, which, in certain rocks, in certain marbles, reveal differences of origin, of age, of “training”."}, {"start": 5309.29, "end": 5315.65, "b_start": 10619.2, "b_end": 10633.32, "orig": "Certes quand approchait le matin, il y avait bien longtemps qu’était dissipée la brève incertitude de mon réveil.", "en": "Certainly when morning approached, the brief uncertainty of my awakening had long since dissipated."}, {"start": 5316.65, "end": 5342.71, "b_start": 10633.32, "b_end": 10687.84, "orig": "Je savais dans quelle chambre je me trouvais effectivement, je l’avais reconstruite autour de moi dans l’obscurité, et – soit en m’orientant par la seule mémoire, soit en m’aidant, comme indication, d’une faible lueur aperçue, au pied de laquelle je plaçais les rideaux de la croisée – je l’avais reconstruite tout entière et meublée comme un architecte et un tapissier qui gardent leur ouverture primitive aux fenêtres et aux portes, j’avais reposé les glaces et remis la commode à sa place habituelle.", "en": "I knew in which room I actually found myself, I had rebuilt it around me in the darkness, and - either by orienting myself by memory alone, or by helping me, as an indication, of a faint light seen, at the foot of which I placed the curtains of the casement - I had rebuilt it entirely and furnished it like an architect and an upholsterer who keep their original opening to the windows and doors, I had replaced the mirrors and put the chest of drawers back in its place usual."}, {"start": 5343.71, "end": 5383.86, "b_start": 10687.84, "b_end": 10771.46, "orig": "Mais à peine le jour – et non plus le reflet d’une dernière braise sur une tringle de cuivre que j’avais pris pour lui – traçait-il dans l’obscurité, et comme à la craie, sa première raie blanche et rectificative, que la fenêtre avec ses rideaux quittait le cadre de la porte où je l’avais située par erreur, tandis que pour lui faire place, le bureau que ma mémoire avait maladroitement installé là se sauvait à toute vitesse, poussant devant lui la cheminée et écartant le mur mitoyen du couloir ; une courette régnait à l’endroit où il y a un instant encore s’étendait le cabinet de toilette, et la demeure que j’avais rebâtie dans les ténèbres était allée rejoindre les demeures entrevues dans le tourbillon du réveil, mise en fuite par ce pâle signe qu’avait tracé au-dessus des rideaux le doigt levé du jour.", "en": "But barely did daylight - and no longer the reflection of a last ember on a copper rod that I had taken for it - trace in the darkness, and as if with chalk, its first white and corrective stripe, that the window with its curtains left the frame of the door where I had placed it by mistake, while to make room for it, the desk that my memory had clumsily installed there fled at full speed, pushing the fireplace in front of it and pushing aside the wall adjoining hallway; a small courtyard reigned in the place where only a moment ago the dressing room extended, and the residence that I had rebuilt in the darkness had joined the residences glimpsed in the whirlwind of awakening, put to flight by this pale sign that the raised finger of day had traced above the curtains."}];

            <div class="wp-cognate" id="wp-cognate"></div>
            <div class="wp-etym" id="wp-etym"></div>
            <a class="wp-link" id="wp-link" target="_blank" rel="noopener">Open in Folkets lexikon &#x2197;</a>
        </div>
        <div id="transcript" class="transcript"></div>
        <script>
            const audio = document.getElementById('audio');
            const modePodcast = document.getElementById('modePodcast');
            const modeInterleaved = document.getElementById('modeInterleaved');
            const modeReading = document.getElementById('modeReading');
            const statusEl = document.getElementById('audio-status');
            const container = document.getElementById('transcript');
            const sources = { orig: "proust-01-ch6.mp3", bilingual: "proust-01-ch6.bilingual.mp3" };
            const startPattern = null;
            const epKey = 'proust.vol1-ch6';
            let mode = 'orig';
            let data = [];
            let lastIdx = -1;
            let seekTargetTime = null;
            let initialSeekDone = false;

            function applySeek() {
                if (initialSeekDone || seekTargetTime === null) return;
                if (audio.readyState >= 1) {
                    audio.currentTime = seekTargetTime;
                    initialSeekDone = true;
                }
            }

            audio.addEventListener('loadedmetadata', applySeek);
            audio.addEventListener('canplay', applySeek);

            async function checkAudioStatus() {
                try {
                    const response = await fetch(sources[mode] || sources['orig'], { method: 'HEAD' });
                    if (response.ok) {
                        statusEl.innerText = "● Live";
                        statusEl.style.color = "green";
                    } else {
                        statusEl.innerText = "○ Missing";
                        statusEl.style.color = "orange";
                    }
                } catch (e) {
                    statusEl.innerText = "○ Offline";
                    statusEl.style.color = "red";
                }
            }

            function setSpeed(rate) {
                audio.playbackRate = rate;
                document.querySelectorAll('.speed-btn').forEach(btn => {
                    btn.classList.toggle('active', parseFloat(btn.textContent) === rate);
                });
            }

            // --- Reading mode ---
            let readingObserver = null;

            function enterReadingMode() {
                audio.pause();
                document.body.classList.add('reading-mode');
                document.querySelectorAll('.row').forEach(row => {
                    if (readingObserver) readingObserver.observe(row);
                });
                if (epKey) {
                    const saved = parseInt(localStorage.getItem('readScroll_' + epKey) || '0');
                    if (saved > 0) requestAnimationFrame(() => window.scrollTo({ top: saved, behavior: 'instant' }));
                }
            }

            function exitReadingMode() {
                document.body.classList.remove('reading-mode');
                if (readingObserver) { readingObserver.disconnect(); }
                document.querySelectorAll('.en.revealed').forEach(el => el.classList.remove('revealed'));
            }

            readingObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const enEl = entry.target.querySelector('.en');
                        if (enEl) enEl.classList.add('revealed');
                    }
                });
            }, { threshold: 0.3 });

            // --- Sticky position ---
            function updateModeProgress() {
                if (!epKey) return;
                const audioPct = parseFloat(localStorage.getItem('audioPct_' + epKey) || '0');
                const readPct  = parseFloat(localStorage.getItem('readPct_'  + epKey) || '0');
                document.getElementById('prog-orig').textContent      = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-bilingual').textContent = audioPct > 0 ? Math.round(audioPct) + '%' : '';
                document.getElementById('prog-reading').textContent   = readPct  > 0 ? Math.round(readPct)  + '%' : '';
            }

            function updateJumpBtn() {
                if (!epKey) return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                document.getElementById('jump-btn').style.display = (mode !== 'reading' && saved > 5) ? '' : 'none';
            }

            function jumpToLast() {
                if (!epKey || mode === 'reading') return;
                const saved = parseFloat(localStorage.getItem('audioPos_' + epKey) || '0');
                if (!saved || !data.length) return;
                audio.currentTime = saved;
                const idx = data.findIndex(item => saved >= item.start && saved <= item.end);
                if (idx !== -1) {
                    const row = document.getElementById('row-' + idx);
                    if (row) { userScrolling = false; row.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }
                audio.play();
            }

            let lastSaveWallTime = 0;
            function saveAudioPos() {
                if (epKey && mode !== 'reading' && audio.currentTime > 5) {
                    localStorage.setItem('audioPos_' + epKey, audio.currentTime.toString());
                    if (audio.duration > 0) {
                        localStorage.setItem('audioPct_' + epKey, (audio.currentTime / audio.duration * 100).toString());
                    }
                    lastSaveWallTime = Date.now();
                    updateModeProgress();
                }
            }
            audio.addEventListener('pause', saveAudioPos);

            function setMode(newMode) {
                if (newMode === mode) return;
                const wasReading = (mode === 'reading');
                const willRead = (newMode === 'reading');
                if (wasReading) exitReadingMode();
                const isPlaying = !audio.paused;
                const rate = audio.playbackRate;
                mode = newMode;
                if (epKey) localStorage.setItem('epMode_' + epKey, mode);
                modePodcast.classList.toggle('active', mode === 'orig');
                modeInterleaved.classList.toggle('active', mode === 'bilingual');
                modeReading.classList.toggle('active', mode === 'reading');
                if (willRead) {
                    enterReadingMode();
                    return;
                }
                audio.src = sources[mode] || sources['orig'];
                audio.playbackRate = rate;
                lastIdx = -1;
                if (startPattern !== null && data.length > 0) {
                    const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                    const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                    const target = data[matchIdx !== -1 ? matchIdx : 0];
                    seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                    initialSeekDone = false;
                }
                checkAudioStatus();
                if (isPlaying) audio.play();
                updateJumpBtn();
            }

            checkAudioStatus();
            updateJumpBtn();
            updateModeProgress();

            const playBtn = document.getElementById('play-btn');
            function togglePlayPause() {
                if (audio.paused) { audio.play(); } else { audio.pause(); }
            }
            audio.addEventListener('play', () => { playBtn.innerHTML = '&#x23F8;'; });
            audio.addEventListener('pause', () => { playBtn.innerHTML = '&#x25B6;'; });

            function movePlayBtn(rowEl) {
                if (!rowEl) { playBtn.style.display = 'none'; return; }
                const rect = rowEl.getBoundingClientRect();
                const btnTop = rect.top + rect.height / 2 - 18;
                playBtn.style.top = btnTop + 'px';
                playBtn.style.display = 'block';
            }

            let formToEntry = {};
            let userScrolling = false;
            let pinnedIdx = -1;
            let userScrollTimer = null;
            let readScrollTimer = null;
            window.addEventListener('scroll', () => {
                userScrolling = true;
                clearTimeout(userScrollTimer);
                userScrollTimer = setTimeout(() => { userScrolling = false; }, 2000);
                if (epKey && mode === 'reading') {
                    clearTimeout(readScrollTimer);
                    readScrollTimer = setTimeout(() => {
                        localStorage.setItem('readScroll_' + epKey, window.scrollY.toString());
                        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
                        if (maxScroll > 0) {
                            localStorage.setItem('readPct_' + epKey, (window.scrollY / maxScroll * 100).toString());
                        }
                        updateModeProgress();
                    }, 500);
                }
            }, { passive: true });

            (function() {
                const tip = document.getElementById('word-tip');
                if (localStorage.getItem('wordTipDismissed')) tip.style.display = 'none';
            })();

            function dismissTip() {
                document.getElementById('word-tip').style.display = 'none';
                localStorage.setItem('wordTipDismissed', '1');
            }

            function tokenizeOrig(text) {
                const tokens = text.split(/(\s+|[.,!?;:""''()\[\]–—-]+)/);
                return tokens.map(tok => {
                    const key = tok.toLowerCase().replace(/^[""''()\[\]–—-]+|[.,!?;:""''()\[\]–—-]+$/g, '');
                    const entry = key ? formToEntry[key] : null;
                    if (!entry) return tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const safe = tok.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                    const arrow = entry.folkets ? '<span class="wikt-arrow">&#x2197;</span>' : '';
                    return `<span class="sv-word" data-key="${key}">${safe}${arrow}</span>`;
                }).join('');
            }

            let pausedForPopup = false;

            function showWordPopup(key, anchorEl) {
                const entry = formToEntry[key];
                if (!entry) return;
                if (!audio.paused) { audio.pause(); pausedForPopup = true; }
                const popup = document.getElementById('word-popup');
                document.getElementById('wp-lemma').textContent = entry.word;
                document.getElementById('wp-trans').textContent = entry.translation || '';
                const cogEl = document.getElementById('wp-cognate');
                cogEl.textContent = entry.cognate ? `cognate: ${entry.cognate}` : '';
                cogEl.style.display = entry.cognate ? '' : 'none';
                const etymEl = document.getElementById('wp-etym');
                etymEl.textContent = entry.etymology || '';
                etymEl.style.display = entry.etymology ? '' : 'none';
                const linkEl = document.getElementById('wp-link');
                if (entry.folkets) {
                    linkEl.href = `https://folkets-lexikon.csc.kth.se/folkets/folkets.en.html#lookup&${encodeURIComponent(entry.word)}`;
                    linkEl.style.display = '';
                } else {
                    linkEl.style.display = 'none';
                }
                popup.style.display = 'block';
                const rect = anchorEl.getBoundingClientRect();
                let top = rect.bottom + 6;
                let left = rect.left;
                const pw = 280;
                if (left + pw > window.innerWidth - 10) left = window.innerWidth - pw - 10;
                if (left < 10) left = 10;
                popup.style.top = top + 'px';
                popup.style.left = left + 'px';
            }

            function closePopup() {
                document.getElementById('word-popup').style.display = 'none';
                if (pausedForPopup) { pausedForPopup = false; audio.play(); }
            }

            document.addEventListener('click', e => {
                const popup = document.getElementById('word-popup');
                if (!popup.contains(e.target) && !e.target.classList.contains('sv-word')) {
                    closePopup();
                }
            });

            function makeRowHTML(item) {
                const origHTML = Object.keys(formToEntry).length > 0 ? tokenizeOrig(item.orig) : item.orig.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<div class="row-nav"><span class="pin-btn">&#x1F4CC;</span></div><div class="row-content"><div class="orig">${origHTML}</div><div class="en">${item.en}</div></div>`;
            }

            function rerenderTranscript() {
                data.forEach((item, i) => {
                    const row = document.getElementById('row-' + i);
                    if (row) row.innerHTML = makeRowHTML(item);
                });
            }

            const _loadVocab = cb => window.__VOCAB_DATA__ ? Promise.resolve(window.__VOCAB_DATA__).then(cb) : fetch('proust-01-ch6.vocab.json').then(r => r.json()).then(cb).catch(() => {});
            _loadVocab(vocab => {
                Object.entries(vocab).forEach(([pos, words]) => {
                    words.forEach(e => {
                        const entry = { word: e.word, translation: e.translation, pos, cognate: e.cognate || '', etymology: e.etymology || '', folkets: e.folkets || false };
                        formToEntry[e.word.toLowerCase()] = entry;
                        (e.forms || []).forEach(f => { formToEntry[f.toLowerCase()] = entry; });
                    });
                });
                rerenderTranscript();
            }).catch(() => {});

            const _loadTranscript = cb => window.__TRANSCRIPT_DATA__ ? Promise.resolve(window.__TRANSCRIPT_DATA__).then(cb) : fetch('proust-01-ch6.json').then(r => r.json()).then(cb);
            _loadTranscript(json => {
                data = json;
                // Restore sticky mode
                if (epKey) {
                    const savedMode = localStorage.getItem('epMode_' + epKey);
                    if (savedMode && savedMode !== mode) {
                        mode = savedMode;
                        modePodcast.classList.toggle('active', mode === 'orig');
                        modeInterleaved.classList.toggle('active', mode === 'bilingual');
                        modeReading.classList.toggle('active', mode === 'reading');
                        if (mode !== 'reading') {
                            audio.src = sources[mode] || sources['orig'];
                            checkAudioStatus();
                        }
                    }
                }
                data.forEach((item, i) => {
                    const row = document.createElement('div');
                    row.className = 'row'; row.id = 'row-' + i;
                    row.innerHTML = makeRowHTML(item);
                    row.onclick = e => {
                        const wordEl = e.target.classList.contains('wikt-arrow') ? e.target.closest('.sv-word') : null;
                        if (e.target.classList.contains('sv-word') || wordEl) {
                            showWordPopup((wordEl || e.target).dataset.key, wordEl || e.target);
                        } else if (e.target.classList.contains('pin-btn') || e.target.classList.contains('row-nav')) {
                            const nav = row.querySelector('.row-nav');
                            if (e.target.classList.contains('pin-btn')) {
                                if (pinnedIdx === i) {
                                    pinnedIdx = -1;
                                    nav.classList.remove('pinned');
                                } else {
                                    if (pinnedIdx !== -1) {
                                        const old = document.querySelector('.row-nav.pinned');
                                        if (old) old.classList.remove('pinned');
                                    }
                                    pinnedIdx = i;
                                    nav.classList.add('pinned');
                                }
                            }
                            nav.classList.remove('flash');
                            void nav.offsetWidth;
                            nav.classList.add('flash');
                            setTimeout(() => nav.classList.remove('flash'), 400);
                            closePopup();
                            userScrolling = false;
                            audio.currentTime = (mode === 'orig') ? item.start : item.b_start;
                            audio.play();
                            movePlayBtn(row);
                        }
                    };
                    container.appendChild(row);
                });
                if (mode === 'reading') {
                    enterReadingMode();
                } else if (data.length > 0) {
                    const savedPos = epKey ? parseFloat(localStorage.getItem('audioPos_' + epKey) || '0') : 0;
                    if (savedPos > 5) {
                        seekTargetTime = savedPos;
                        initialSeekDone = false;
                        applySeek();
                    } else {
                        let targetIdx = 0;
                        if (startPattern !== null) {
                            const normPat = startPattern.toLowerCase().replace(/\s+/g, '');
                            const matchIdx = data.findIndex(item => item.orig.toLowerCase().replace(/\s+/g, '').includes(normPat));
                            targetIdx = matchIdx !== -1 ? matchIdx : 0;
                        }
                        const target = data[targetIdx];
                        seekTargetTime = (mode === 'orig') ? target.start : target.b_start;
                        const targetRow = document.getElementById('row-' + targetIdx);
                        if (targetRow) {
                            requestAnimationFrame(() => {
                                if (startPattern !== null) targetRow.scrollIntoView({ block: 'center' });
                                movePlayBtn(targetRow);
                            });
                        }
                        if (startPattern !== null) applySeek();
                    }
                    updateJumpBtn();
                }
            });

            audio.addEventListener('timeupdate', () => {
                const now = audio.currentTime;
                // Save to localStorage every 5s; update display every tick
                if (Date.now() - lastSaveWallTime > 5000) saveAudioPos();
                if (epKey && audio.duration > 0 && mode !== 'reading') {
                    const pct = Math.round(now / audio.duration * 100);
                    document.getElementById('prog-orig').textContent = pct > 0 ? pct + '%' : '';
                    document.getElementById('prog-bilingual').textContent = pct > 0 ? pct + '%' : '';
                }

                const currentIdx = data.findIndex(item => {
                    const s = (mode === 'orig') ? item.start : item.b_start;
                    const e = (mode === 'orig') ? item.end : item.b_end;
                    return now >= s && now <= e;
                });

                if (pinnedIdx !== -1) {
                    const pinEnd = (mode === 'orig') ? data[pinnedIdx].end : data[pinnedIdx].b_end;
                    const pinStart = (mode === 'orig') ? data[pinnedIdx].start : data[pinnedIdx].b_start;
                    if (now >= pinEnd) {
                        audio.pause();
                        setTimeout(() => {
                            audio.currentTime = pinStart;
                            audio.play();
                        }, 600);
                    }
                }

                if (currentIdx !== lastIdx) {
                    if (lastIdx !== -1) {
                        const oldEl = document.getElementById('row-' + lastIdx);
                        if (oldEl) oldEl.classList.remove('highlight');
                    }
                    if (currentIdx !== -1) {
                        const newEl = document.getElementById('row-' + currentIdx);
                        if (newEl) {
                            newEl.classList.add('highlight');
                            if (!userScrolling) newEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            movePlayBtn(newEl);
                        }
                    } else {
                        movePlayBtn(null);
                    }
                    lastIdx = currentIdx;
                } else if (currentIdx !== -1) {
                    movePlayBtn(document.getElementById('row-' + currentIdx));
                }
            });
        </script>
    </body>
    </html>
