<!DOCTYPE html>

        <title>À la recherche du temps perdu I – Chapter 6</title>
        
        
        <script>
            window.__TRANSCRIPT_DATA__ = [{"start": 0.0, "end": 13.58, "b_start": 0.0, "b_end": 29.1, "orig": "C’est du côté de Méséglise, à Montjouvain, maison située au bord d’une grande mare et adossée à un talus buissonneux que demeurait M. Vinteuil. Aussi croisait-on souvent sur la route sa fille, conduisant un buggy à toute allure.", "en": "Mr. Vinteuil lived near Méséglise, in Montjouvain, a house located on the edge of a large pond and backed by a bushy embankment. So we often came across his daughter on the road, driving a buggy at full speed."}, {"start": 14.58, "end": 27.83, "b_start": 29.1, "b_end": 57.1, "orig": "À partir d’une certaine année on ne la rencontra plus seule, mais avec une amie plus âgée, qui avait mauvaise réputation dans le pays et qui un jour s’installa définitivement à Montjouvain. On disait : « Faut-il que ce pauvre M.", "en": "From a certain year onwards we no longer met her alone, but with an older friend, who had a bad reputation in the country and who one day settled permanently in Montjouvain. They said: “Must this poor Mr."}, {"start": 28.83, "end": 42.13, "b_start": 57.1, "b_end": 83.39, "orig": "Vinteuil soit aveuglé par la tendresse pour ne pas s’apercevoir de ce qu’on raconte, et permettre à sa fille, lui qui se scandalise d’une parole\ndéplacée\n, de faire vivre sous son toit une femme pareille.", "en": "Vinteuil is blinded by tenderness so as not to notice what is being said, and to allow his daughter, he who is scandalized by an inappropriate word, to have such a woman live under his roof."}, {"start": 43.13, "end": 56.42, "b_start": 83.39, "b_end": 112.63, "orig": "Il dit que c’est une femme supérieure, un grand cœur et qu’elle aurait eu des dispositions extraordinaires pour la musique si elle les avait cultivées. Il peut être sûr que ce n’est pas de musique qu’elle s’occupe avec sa fille. » M.", "en": "He says that she is a superior woman, a big heart and that she would have had extraordinary talents for music if she had cultivated them. He can be sure that it’s not music that she and her daughter are preoccupied with. » Mr."}, {"start": 57.42, "end": 67.91, "b_start": 112.63, "b_end": 135.76, "orig": "Vinteuil le disait ; et il est en effet remarquable combien une personne excite toujours d’admiration pour ses qualités morales chez les parents de toute autre personne avec qui elle a des relations charnelles.", "en": "Vinteuil said it; and it is indeed remarkable how much a person always excites admiration for his moral qualities in the parents of every other person with whom he has carnal relations."}, {"start": 68.91, "end": 80.79, "b_start": 135.76, "b_end": 161.9, "orig": "L’amour physique, si injustement décrié, force tellement tout être à manifester jusqu’aux moindres parcelles qu’il possède de bonté, d’abandon de soi, qu’elles resplendissent jusqu’aux yeux de l’entourage immédiat.", "en": "Physical love, so unfairly criticized, so forces every being to manifest even the smallest particles of goodness, of self-abandonment, that they shine even in the eyes of those immediately around them."}, {"start": 81.79, "end": 107.26, "b_start": 161.9, "b_end": 216.25, "orig": "Le docteur Percepied à qui sa grosse voix et ses gros sourcils permettaient de tenir tant qu’il voulait le rôle de perfide dont il n’avait pas le physique, sans compromettre en rien sa réputation inébranlable et imméritée de bourru bienfaisant, savait faire rire aux larmes le curé et tout le monde en disant d’un ton rude : « Hé bien ! il paraît qu’elle fait de la musique avec son amie, M\nlle\nVinteuil. Ça a l’air de vous étonner.", "en": "Doctor Percepied, whose big voice and big eyebrows allowed him to play the role of perfidious person for as long as he wanted, for which he did not have the physique, without compromising in any way his unshakeable and undeserved reputation as a beneficent gruff, knew how to make the priest and everyone laugh to tears by saying in a harsh tone: “Well! It seems that she makes music with her friend, M lle Vinteuil. That seems to surprise you."}, {"start": 108.26, "end": 124.43, "b_start": 216.25, "b_end": 250.54, "orig": "Moi je sais pas. C’est le père Vinteuil qui m’a encore dit ça hier. Après tout, elle a bien le droit d’aimer la musique, c’te fille. Moi je ne suis pas pour contrarier les vocations artistiques des enfants. Vinteuil non plus à ce qu’il paraît.", "en": "I don't know. It was Father Vinteuil who told me that again yesterday. After all, she has every right to like music, this girl. I am not for thwarting the artistic vocations of children. Neither does Vinteuil, it seems."}, {"start": 125.43, "end": 141.9, "b_start": 250.54, "b_end": 285.88, "orig": "Et puis lui aussi il fait de la musique avec l’amie de sa fille. Ah ! sapristi on en fait une musique dans c’te boîte-là. Mais qu’est-ce que vous avez à rire ; mais ils font trop de musique ces gens. L’autre jour j’ai rencontré le père Vinteuil près du cimetière.", "en": "And then he also makes music with his daughter’s friend. Ah! sapristi we make music out of it in that box. But what are you laughing at? but these people make too much music. The other day I met Father Vinteuil near the cemetery."}, {"start": 142.9, "end": 148.25, "b_start": 285.88, "b_end": 298.56, "orig": "Il ne tenait pas sur ses jambes. »\nPour ceux qui comme nous virent à cette époque M.", "en": "He couldn't stand on his legs. » For those like us who saw at that time Mr."}, {"start": 149.25, "end": 172.19, "b_start": 298.56, "b_end": 345.4, "orig": "Vinteuil éviter les personnes qu’il connaissait, se détourner quand il les apercevait, vieillir en quelques mois, s’absorber dans son chagrin, devenir incapable de tout effort qui n’avait pas directement le bonheur de sa fille pour but, passer des journées entières devant la tombe de sa femme – il eût été difficile de ne pas comprendre qu’il était en train de mourir de chagrin, et de supposer qu’il ne se rendait pas compte des propos qui couraient.", "en": "Vinteuil avoided people he knew, turned away when he saw them, aged in a few months, absorbed in his grief, becoming incapable of any effort that did not directly have his daughter's happiness as its goal, spending entire days in front of his wife's grave – it would have been difficult not to understand that he was dying of grief, and to suppose that he was not aware of the talk that was going around."}, {"start": 173.19, "end": 176.96, "b_start": 345.4, "b_end": 354.07, "orig": "Il les connaissait, peut-être même y ajoutait-il foi.", "en": "He knew them, perhaps even believed in them."}, {"start": 177.96, "end": 201.82, "b_start": 354.07, "b_end": 405.13, "orig": "Il n’est peut-être pas une personne, si grande que soit sa vertu, que la complexité des circonstances ne puisse amener à vivre un jour dans la familiarité du vice qu’elle condamne le plus formellement – sans qu’elle le reconnaisse d’ailleurs tout à fait sous le déguisement de faits particuliers qu’il revêt pour entrer en contact avec elle et la faire souffrir : paroles bizarres, attitude inexplicable, un certain soir, de tel être qu’elle a par ailleurs tant de raisons pour aimer.", "en": "There is perhaps not a person, however great her virtue, that the complexity of circumstances cannot lead her to live one day in the familiarity of the vice she most formally condemns – without her recognizing it completely under the disguise of particular facts that he puts on to come into contact with her and make her suffer: bizarre words, inexplicable attitude, on a certain evening, of a being whom she otherwise has so many reasons to love."}, {"start": 202.82, "end": 205.1, "b_start": 405.13, "b_end": 411.36, "orig": "Mais pour un homme comme M.", "en": "But for a man like Mr."}, {"start": 206.1, "end": 227.58, "b_start": 411.36, "b_end": 457.86, "orig": "Vinteuil il devait entrer bien plus de souffrance que pour un autre dans la résignation à une de ces situations qu’on croit à tort être l’apanage exclusif du monde de la bohème : elles se produisent chaque fois qu’a besoin de se réserver la place et la sécurité qui lui sont nécessaires un vice que la nature elle-même fait épanouir chez un enfant, parfois rien qu’en mêlant les vertus de son père et de sa mère, comme la couleur de ses yeux.", "en": "Vinteuil must have entered much more suffering than for another in the resignation to one of these situations which we wrongly believe to be the exclusive prerogative of the bohemian world: they occur each time one needs to reserve the place and security which are necessary for him a vice which nature itself makes flourish in a child, sometimes simply by mixing the virtues of his father and his mother, like the color of his eyes."}, {"start": 228.58, "end": 236.38, "b_start": 457.86, "b_end": 475.18, "orig": "Mais de ce que M. Vinteuil connaissait peut-être la conduite de sa fille, il ne s’ensuit pas que son culte pour elle en eût été diminué.", "en": "But from the fact that Mr. Vinteuil perhaps knew his daughter's behavior, it does not follow that his worship of her would have been diminished."}, {"start": 237.38, "end": 255.23, "b_start": 475.18, "b_end": 514.21, "orig": "Les faits ne pénètrent pas dans le monde où vivent nos croyances, ils n’ont pas fait naître celles-ci, ils ne les détruisent pas ; ils peuvent leur infliger les plus constants démentis sans les affaiblir, et une avalanche de malheurs ou de maladies se succédant sans interruption dans une famille ne la fera pas douter de la bonté de son Dieu ou du talent de son médecin.", "en": "Facts do not enter the world where our beliefs live, they do not give birth to them, they do not destroy them; they can inflict the most constant denials on them without weakening them, and an avalanche of misfortunes or illnesses succeeding one another without interruption in a family will not make it doubt the goodness of its God or the talent of its doctor."}, {"start": 256.23, "end": 257.96, "b_start": 514.21, "b_end": 519.36, "orig": "Mais quand M.", "en": "But when Mr."}, {"start": 258.96, "end": 293.59, "b_start": 519.36, "b_end": 592.4, "orig": "Vinteuil songeait à sa fille et à lui-même du point de vue du monde, du point de vue de leur réputation, quand il cherchait à se situer avec elle au rang qu’ils occupaient dans l’estime générale, alors ce jugement d’ordre social, il le portait exactement comme l’eût fait l’habitant de Combray qui lui eût été le plus hostile, il se voyait avec sa fille dans le dernier bas-fond, et ses manières en avaient reçu depuis peu cette humilité, ce respect pour ceux qui se trouvaient au-dessus de lui et qu’il voyait d’en bas (eussent-ils été fort au-dessous de lui jusque-là), cette tendance à chercher à remonter jusqu’à eux, qui est une résultante presque mécanique de toutes les déchéances.", "en": "Vinteuil thought of his daughter and himself from the point of view of the world, from the point of view of their reputation, when he sought to place himself with her in the rank they occupied in general esteem, then he made this judgment of a social order exactly as the inhabitant of Combray who would have been the most hostile to him would have done, he saw himself with his daughter in the lowest depths, and his manners had recently received this humility, this respect for those who were above him and whom he saw from below (even if they had been far below him until then), this tendency to seek to go back up to them, which is an almost mechanical result of all declines."}, {"start": 294.59, "end": 298.96, "b_start": 592.4, "b_end": 602.93, "orig": "Un jour que nous marchions avec Swann dans une rue de Combray, M.", "en": "One day as we were walking with Swann in a street in Combray, Mr."}, {"start": 299.96, "end": 325.02, "b_start": 602.93, "b_end": 656.92, "orig": "Vinteuil qui débouchait d’une autre s’était trouvé trop brusquement en face de nous pour avoir le temps de nous éviter ; et Swann avec cette orgueilleuse charité de l’homme du monde qui, au milieu de la dissolution de tous ses préjugés moraux, ne trouve dans l’infamie d’autrui qu’une raison d’exercer envers lui une bienveillance dont les témoignages chatouillent d’autant plus l’amour-propre de celui qui les donne, qu’il les sent plus précieux à celui qui les reçoit, avait longuement causé avec M.", "en": "Vinteuil, who was emerging from another, found himself too abruptly in front of us to have time to avoid us; and Swann, with that proud charity of the man of the world who, in the midst of the dissolution of all his moral prejudices, finds in the infamy of others only a reason to exercise towards him a benevolence whose testimonies tickle the self-esteem of the one who gives them all the more, as he feels them more precious to the one who receives them, had spoken at length with Mr."}, {"start": 326.02, "end": 338.76, "b_start": 656.92, "b_end": 684.98, "orig": "Vinteuil, à qui jusque-là il n’adressait pas la parole, et lui avait demandé avant de nous quitter s’il n’enverrait pas un jour sa fille jouer à Tansonville. C’était une invitation qui, il y a deux ans, eût indigné M.", "en": "Vinteuil, to whom until then he had not spoken, and had asked him before leaving us if he would not one day send his daughter to play in Tansonville. It was an invitation which, two years ago, would have outraged Mr."}, {"start": 339.76, "end": 348.81, "b_start": 684.98, "b_end": 703.96, "orig": "Vinteuil, mais qui, maintenant, le remplissait de sentiments si reconnaissants qu’il se croyait obligé par eux à ne pas avoir l’indiscrétion de l’accepter.", "en": "Vinteuil, but who now filled him with such grateful feelings that he believed himself obliged by them not to have the indiscretion to accept it."}, {"start": 349.81, "end": 373.23, "b_start": 703.96, "b_end": 753.72, "orig": "L’amabilité de Swann envers sa fille lui semblait être en soi-même un appui si honorable et si délicieux qu’il pensait qu’il valait peut-être mieux ne pas s’en servir, pour avoir la douceur toute platonique de le conserver.\n– Quel homme exquis, nous dit-il, quand Swann nous eut quittés, avec la même enthousiaste vénération qui tient de spirituelles et jolies bourgeoises en respect et sous le charme d’une duchesse, fût-elle laide et sotte.", "en": "Swann's kindness towards his daughter seemed to him to be in itself such an honorable and delicious support that he thought it was perhaps better not to use it, in order to have the platonic gentleness of preserving it. – What an exquisite man, he said to us, when Swann had left us, with the same enthusiastic veneration which keeps witty and pretty bourgeois women in respect and under the charm of a duchess, even if she were ugly and stupid."}, {"start": 374.23, "end": 389.74, "b_start": 753.72, "b_end": 788.84, "orig": "Quel homme exquis ! Quel malheur qu’il ait fait un mariage tout à fait déplacé. Et alors, tant les gens les plus sincères sont mêlés d’hypocrisie et dépouillent en causant avec une personne l’opinion qu’ils ont d’elle et expriment dès qu’elle n’est plus là, mes parents déplorèrent avec M.", "en": "What an exquisite man! What a shame that he had a completely inappropriate marriage. And then, as the most sincere people are mixed with hypocrisy and strip away when talking with a person the opinion they have of them and express them as soon as they are no longer there, my parents deplored with Mr."}, {"start": 390.74, "end": 406.43, "b_start": 788.84, "b_end": 822.72, "orig": "Vinteuil le mariage de Swann au nom de principes et de convenances auxquels (par cela même qu’ils les invoquaient en commun avec lui, en braves gens de même acabit) ils avaient l’air de sous-entendre qu’il n’était pas contrevenu à Montjouvain. M. Vinteuil n’envoya pas sa fille chez Swann.", "en": "Vinteuil the marriage of Swann in the name of principles and conventions to which (by the very fact that they invoked them in common with him, as good people of the same ilk) they seemed to imply that it had not contravened Montjouvain. Mr. Vinteuil did not send his daughter to Swann."}, {"start": 407.43, "end": 421.98, "b_start": 822.72, "b_end": 853.19, "orig": "Et celui-ci fût le premier à le regretter. Car, chaque fois qu’il venait de quitter M. Vinteuil, il se rappelait qu’il avait depuis quelque temps un renseignement à lui demander sur quelqu’un qui portait le même nom que lui, un de ses parents, croyait-il.", "en": "And he was the first to regret it. Because, each time he had just left Mr. Vinteuil, he remembered that for some time he had had information to ask him about someone who had the same name as him, one of his relatives, he believed."}, {"start": 422.98, "end": 430.37, "b_start": 853.19, "b_end": 869.52, "orig": "Et cette fois-là il s’était bien promis de ne pas oublier ce qu’il avait à lui dire, quand M. Vinteuil enverrait sa fille à Tansonville.", "en": "And this time he had promised himself not to forget what he had to say to her when Mr. Vinteuil sent his daughter to Tansonville."}, {"start": 431.37, "end": 448.41, "b_start": 869.52, "b_end": 903.85, "orig": "Comme la promenade du côté de Méséglise était la moins longue des deux que nous faisions autour de Combray et qu’à cause de cela on la réservait pour les temps incertains, le climat du côté de Méséglise était assez pluvieux et nous ne perdions jamais de vue la lisière des bois de Roussainville dans l’épaisseur desquels nous pourrions nous mettre à couvert.", "en": "As the walk on the Méséglise side was the shortest of the two we did around Combray and because of this it was reserved for uncertain times, the climate on the Méséglise side was quite rainy and we never lost sight of the edge of the Roussainville woods in the depths of which we could take cover."}, {"start": 449.41, "end": 455.19, "b_start": 903.85, "b_end": 916.82, "orig": "Souvent le soleil se cachait derrière une nuée qui déformait son ovale et dont il jaunissait la bordure.", "en": "Often the sun hid behind a cloud which distorted its oval and whose borders turned yellow."}, {"start": 456.19, "end": 468.62, "b_start": 916.82, "b_end": 943.98, "orig": "L’éclat, mais non la clarté, était enlevé à la campagne où toute vie semblait suspendue, tandis que le petit village de Roussainville sculptait sur le ciel le relief de ses arêtes blanches avec une précision et un fini accablants.", "en": "The brilliance, but not the clarity, was taken away from the countryside where all life seemed suspended, while the small village of Roussainville sculpted the relief of its white ridges on the sky with overwhelming precision and finish."}, {"start": 469.62, "end": 481.43, "b_start": 943.98, "b_end": 969.79, "orig": "Un peu de vent faisait envoler un corbeau qui retombait dans le lointain, et, contre le ciel blanchissant, le lointain des bois paraissait plus bleu, comme peint dans ces camaïeux qui décorent les trumeaux des anciennes demeures.", "en": "A little wind blew away a crow which fell into the distance, and, against the whitening sky, the distance of the woods seemed bluer, as if painted in those shades which decorate the piers of ancient residences."}, {"start": 482.43, "end": 494.89, "b_start": 969.79, "b_end": 997.43, "orig": "Mais d’autres fois se mettait à tomber la pluie dont nous avait menacés le capucin que l’opticien avait à sa devanture ; les gouttes d’eau, comme des oiseaux migrateurs qui prennent leur vol tous ensemble, descendaient à rangs pressés du ciel.", "en": "But other times the rain would begin to fall with which the capuchin that the optician had in his shop window had threatened us; the drops of water, like migratory birds taking flight all together, descended in hurrying rows from the sky."}, {"start": 495.89, "end": 509.11, "b_start": 997.43, "b_end": 1025.26, "orig": "Elles ne se séparent point, elles ne vont pas à l’aventure pendant la rapide traversée, mais chacune tenant sa place attire à elle celle qui la suit et le ciel en est plus obscurci qu’au départ des hirondelles. Nous nous réfugiions dans le bois.", "en": "They do not separate, they do not go on adventures during the rapid crossing, but each holding its place attracts the one who follows it and the sky is darker than when the swallows departed. We took refuge in the woods."}, {"start": 510.11, "end": 516.38, "b_start": 1025.26, "b_end": 1038.47, "orig": "Quand leur voyage semblait fini, quelques-unes, plus débiles, plus lentes, arrivaient encore.", "en": "When their journey seemed to be over, some, more feeble, slower, still arrived."}, {"start": 517.38, "end": 534.58, "b_start": 1038.47, "b_end": 1074.24, "orig": "Mais nous ressortions de notre abri, car les gouttes se plaisent aux feuillages, et la terre était déjà presque séchée que plus d’une s’attardait à jouer sur les nervures d’une feuille, et suspendue à la pointe, reposée, brillant au soleil, tout d’un coup se laissait glisser de toute la hauteur de la branche et nous tombait sur le nez.", "en": "But we came out of our shelter, because the drops like the foliage, and the earth was already almost dried that more than one lingered to play on the veins of a leaf, and suspended at the tip, rested, shining in the sun, suddenly let itself slide from the full height of the branch and fell on our noses."}, {"start": 535.58, "end": 545.21, "b_start": 1074.24, "b_end": 1095.61, "orig": "Souvent aussi nous allions nous abriter, pêle-mêle avec les saints et les patriarches de pierre sous le porche de Saint-André-des-Champs. Que cette église était française !", "en": "We also often went to take shelter, pell-mell with the saints and the stone patriarchs under the porch of Saint-André-des-Champs. How French this church was!"}, {"start": 546.21, "end": 556.55, "b_start": 1095.61, "b_end": 1117.15, "orig": "Au-dessus de la porte, les saints, les rois-chevaliers une fleur de lys à la main, des scènes de noces et de funérailles, étaient représentés comme ils pouvaient l’être dans l’âme de Françoise.", "en": "Above the door, the saints, the knight-kings with fleur-de-lis in their hands, scenes of weddings and funerals, were represented as they could be in the soul of Françoise."}, {"start": 557.55, "end": 572.1, "b_start": 1117.15, "b_end": 1148.32, "orig": "Le sculpteur avait aussi narré certaines anecdotes relatives à Aristote et à Virgile de la même façon que Françoise à la cuisine parlait volontiers de saint Louis comme si elle l’avait personnellement connu, et généralement pour faire honte par la comparaison à mes grands-parents moins « justes ».", "en": "The sculptor had also narrated certain anecdotes relating to Aristotle and Virgil in the same way that Françoise in the kitchen readily spoke of Saint Louis as if she had known him personally, and generally to shame my less “righteous” grandparents by comparison."}, {"start": 573.1, "end": 594.74, "b_start": 1148.32, "b_end": 1192.25, "orig": "On sentait que les notions que l’artiste médiéval et la paysanne médiévale (survivant au XIX\ne\nsiècle) avaient de l’histoire ancienne ou chrétienne, et qui se distinguaient par autant d’inexactitude que de bonhomie, ils les tenaient non des livres, mais d’une tradition à la fois antique et directe, ininterrompue, orale, déformée, méconnaissable et vivante.", "en": "We felt that the notions that the medieval artist and the medieval peasant woman (surviving the 19th century) had of ancient or Christian history, and which were distinguished by as much inaccuracy as bonhomie, they held not from books, but from a tradition that was both ancient and direct, uninterrupted, oral, distorted, unrecognizable and living."}, {"start": 595.74, "end": 606.42, "b_start": 1192.25, "b_end": 1215.01, "orig": "Une autre personnalité de Combray que je reconnaissais aussi, virtuelle et prophétisée, dans la sculpture gothique de Saint-André-des-Champs c’était le jeune Théodore, le garçon de chez Camus.", "en": "Another personality from Combray that I also recognized, virtual and prophesied, in the Gothic sculpture of Saint-André-des-Champs was young Théodore, the boy from Camus."}, {"start": 607.42, "end": 624.39, "b_start": 1215.01, "b_end": 1250.62, "orig": "Françoise sentait d’ailleurs si bien en lui un pays et un contemporain que, quand ma tante Léonie était trop malade pour que Françoise pût suffire à la retourner dans son lit, à la porter dans son fauteuil, plutôt que de laisser la fille de cuisine monter se faire « bien voir » de ma tante, elle appelait Théodore.", "en": "Françoise also felt so well in him a country and a contemporary that, when my aunt Léonie was too ill for Françoise to be able to turn her over in her bed, to carry her in her armchair, rather than letting the kitchen maid go up to make herself \"well looked upon\" by my aunt, she called Théodore."}, {"start": 625.39, "end": 663.86, "b_start": 1250.62, "b_end": 1330.98, "orig": "Or ce garçon, qui passait et avec raison pour si mauvais sujet, était tellement rempli de l’âme qui avait décoré Saint-André-des-Champs et notamment des sentiments de respect que Françoise trouvait dus aux « pauvres malades », à « sa pauvre maîtresse », qu’il avait pour soulever la tête de ma tante sur son oreiller la mine naïve et zélée des petits anges des bas-reliefs, s’empressant, un cierge à la main, autour de la Vierge défaillante, comme si les visages de pierre sculptée, grisâtres et nus, ainsi que sont les bois en hiver, n’étaient qu’un ensommeillement, qu’une réserve, prête à refleurir dans la vie en innombrables visages populaires, révérends et futés comme celui de Théodore, enluminés de la rougeur d’une pomme mûre.", "en": "Now this boy, who passed and rightly for such a bad subject, was so full of the soul which had decorated Saint-André-des-Champs and in particular with the feelings of respect which Françoise found due to the \"poor sick people\", to \"his poor mistress\", that when he lifted my aunt's head on her pillow he had the naive and zealous expression of the little angels in the bas-reliefs, hurrying, with a candle in his hand, around the failing Virgin, as if the faces of sculpted stone, grayish and bare, like the woods in winter, were only a slumber, only a reserve, ready to bloom again in life in innumerable popular, reverend and clever faces like that of Theodore, illuminated with the redness of a ripe apple."}, {"start": 664.86, "end": 689.06, "b_start": 1330.98, "b_end": 1382.62, "orig": "Non plus appliquée à la pierre comme ces petits anges, mais détachée du porche, d’une stature plus qu’humaine, debout sur un socle comme sur un tabouret qui lui évitât de poser ses pieds sur le sol humide, une sainte avait les joues pleines, le sein ferme et qui gonflait la draperie comme une grappe mûre dans un sac de crin, le front étroit, le nez court et mutin, les prunelles enfoncées, l’air valide, insensible et courageux des paysannes de la contrée.", "en": "No longer attached to the stone like these little angels, but detached from the porch, of a more than human stature, standing on a base as if on a stool which prevented her from placing her feet on the damp ground, a saint had full cheeks, a firm breast which swelled the drapery like a ripe grape in a horsehair sack, a narrow forehead, a short and mischievous nose, sunken pupils, the valid, insensitive and courageous air of the peasant women of the region."}, {"start": 690.06, "end": 711.61, "b_start": 1382.62, "b_end": 1427.32, "orig": "Cette ressemblance, qui insinuait dans la statue une douceur que je n’y avais pas cherchée, était souvent certifiée par quelque fille des champs, venue comme nous se mettre à couvert, et dont la présence, pareille à celle de ces feuillages pariétaires qui ont poussé à côté des feuillages sculptés, semblait destinée à permettre, par une confrontation avec la nature, de juger de la vérité de l’œuvre d’art.", "en": "This resemblance, which insinuated into the statue a sweetness that I had not looked for, was often certified by some girl from the fields, who had come like us to take cover, and whose presence, similar to that of these parietal foliage which grew next to the sculpted foliage, seemed destined to allow, through a confrontation with nature, to judge the truth of the work of art."}, {"start": 712.61, "end": 740.38, "b_start": 1427.32, "b_end": 1485.05, "orig": "Devant nous, dans le lointain, terre promise ou maudite, Roussainville, dans les murs duquel je n’ai jamais pénétré, Roussainville, tantôt, quand la pluie avait déjà cessé pour nous, continuait à être châtié comme un village de la Bible par toutes les lances de l’orage qui flagellaient obliquement les demeures de ses habitants, ou bien était déjà pardonné par Dieu le Père qui faisait descendre vers lui, inégalement longues, comme les rayons d’un ostensoir d’autel, les tiges d’or effrangées de son soleil reparu.", "en": "Before us, in the distance, promised or cursed land, Roussainville, within whose walls I have never entered, Roussainville, sometimes, when the rain had already stopped for us, continued to be chastised like a village in the Bible by all the spears of the storm which obliquely scourged the dwellings of its inhabitants, or else was already forgiven by God the Father who made descend towards him, unequally long, like the rays of a monstrance altar, the golden rods frayed by its reappeared sun."}, {"start": 741.38, "end": 761.66, "b_start": 1485.05, "b_end": 1528.48, "orig": "Quelquefois le temps était tout à fait gâté, il fallait rentrer et rester enfermé dans la maison. Çà et là au loin dans la campagne que l’obscurité et l’humidité faisaient ressembler à la mer, des maisons isolées, accrochées au flanc d’une colline plongée dans la nuit et dans l’eau, brillaient comme des petits bateaux qui ont replié leurs voiles et sont immobiles au large pour toute la nuit.", "en": "Sometimes the weather was quite bad, we had to go back and stay locked in the house. Here and there in the distance in the countryside which the darkness and humidity made resemble the sea, isolated houses, clinging to the side of a hill plunged into darkness and into the water, shone like small boats which have folded their sails and are motionless offshore for the whole night."}, {"start": 762.66, "end": 766.11, "b_start": 1528.48, "b_end": 1537.13, "orig": "Mais qu’importait la pluie, qu’importait l’orage !", "en": "But what did the rain matter, what did the storm matter!"}, {"start": 767.11, "end": 791.95, "b_start": 1537.13, "b_end": 1591.09, "orig": "L’été, le mauvais temps n’est qu’une humeur passagère, superficielle, du beau temps sous-jacent et fixe, bien différent du beau temps instable et fluide de l’hiver et qui, au contraire, installé sur la terre où il s’est solidifié en denses feuillages sur lesquels la pluie peut s’égoutter sans compromettre la résistance de leur permanente joie, a hissé pour toute la saison, jusque dans les rues du village, aux murs des maisons et des jardins, ses pavillons de soie violette ou blanche.", "en": "Summer, bad weather is only a passing, superficial mood, of the underlying and fixed good weather, very different from the unstable and fluid good weather of winter and which, on the contrary, installed on the earth where it has solidified into dense foliage on which the rain can drip without compromising the resistance of their permanent joy, has hoisted for the whole season, even in the streets of the village, on the walls of houses and gardens, its pavilions of purple or white silk."}, {"start": 792.95, "end": 829.62, "b_start": 1591.09, "b_end": 1667.42, "orig": "Assis dans le petit salon, où j’attendais l’heure du dîner en lisant, j’entendais l’eau dégoutter de nos marronniers, mais je savais que l’averse ne faisait que vernir leurs feuilles et qu’ils promettaient de demeurer là, comme des gages de l’été, toute la nuit pluvieuse, à assurer la continuité du beau temps ; qu’il avait beau pleuvoir, demain, au-dessus de la barrière blanche de Tansonville, onduleraient, aussi nombreuses, de petites feuilles en forme de cœur ; et c’est sans tristesse que j’apercevais le peuplier de la rue des Perchamps adresser à l’orage des supplications et des salutations désespérées ; c’est sans tristesse que j’entendais au fond du jardin les derniers roulements du tonnerre roucouler dans les lilas.", "en": "Sitting in the small living room, where I waited for dinner time while reading, I heard the water dripping from our chestnut trees, but I knew that the downpour only varnished their leaves and that they promised to stay there, like tokens of summer, all rainy night, to ensure the continuity of the good weather; that no matter how rainy it might be, tomorrow, above the white barrier of Tansonville, there would be just as many little heart-shaped leaves waving; and it was without sadness that I saw the poplar of the rue des Perchamps addressing the storm with supplications and desperate greetings; It was without sadness that I heard at the bottom of the garden the last rolls of thunder cooing in the lilacs."}, {"start": 830.62, "end": 836.05, "b_start": 1667.42, "b_end": 1679.87, "orig": "Si le temps était mauvais dès le matin, mes parents renonçaient à la promenade et je ne sortais pas.", "en": "If the weather was bad in the morning, my parents gave up on the walk and I didn't go out."}, {"start": 837.05, "end": 869.28, "b_start": 1679.87, "b_end": 1747.9, "orig": "Mais je pris ensuite l’habitude d’aller, ces jours-là, marcher seul du côté de Méséglise-la-Vineuse, dans l’automne où nous dûmes venir à Combray pour la succession de ma tante Léonie, car elle était enfin morte, faisant triompher à la fois ceux qui prétendaient que son régime affaiblissant finirait par la tuer, et non moins les autres qui avaient toujours soutenu qu’elle souffrait d’une maladie non pas imaginaire mais organique, à l’évidence de laquelle les sceptiques seraient bien obligés de se rendre quand elle y aurait succombé ; et ne causant par sa mort de grande douleur qu’à un seul être, mais à celui-là, sauvage.", "en": "But then I got into the habit of going, on those days, to walk alone in the direction of Méséglise-la-Vineuse, in the autumn when we had to come to Combray for the succession of my aunt Léonie, because she was finally dead, making triumphant both those who claimed that her weakening diet would end up killing her, and no less the others who had always maintained that she suffered from an illness which was not imaginary but organic, to the evidence of which the skeptics would be obliged. to surrender when she had succumbed to it; and only causing great pain through his death to one being, but to that one, savage."}, {"start": 870.28, "end": 882.45, "b_start": 1747.9, "b_end": 1774.26, "orig": "Pendant les quinze jours que dura la dernière maladie de ma tante, Françoise ne la quitta pas un instant, ne se déshabilla pas, ne laissa personne lui donner aucun soin, et ne quitta son corps que quand il fut enterré.", "en": "During the fifteen days that my aunt's last illness lasted, Françoise did not leave her side for a moment, did not undress, did not let anyone give her any care, and only left her body when it was buried."}, {"start": 883.45, "end": 896.0, "b_start": 1774.26, "b_end": 1800.65, "orig": "Alors nous comprîmes que cette sorte de crainte où Françoise avait vécu des mauvaises paroles, des soupçons, des colères de ma tante avait développé chez elle un sentiment que nous avions pris pour de la haine et qui était de la vénération et de l’amour.", "en": "Then we understood that this kind of fear where Françoise had experienced the bad words, the suspicions, the anger of my aunt had developed in her a feeling that we had taken for hatred and which was veneration and love."}, {"start": 897.0, "end": 911.86, "b_start": 1800.65, "b_end": 1831.69, "orig": "Sa véritable maîtresse, aux décisions impossibles à prévoir, aux ruses difficiles à déjouer, au bon cœur facile à fléchir, sa souveraine, son mystérieux et tout-puissant monarque n’était plus. À côté d’elle nous comptions pour bien peu de chose.", "en": "His true mistress, with decisions impossible to predict, with tricks difficult to foil, with a good heart easy to bend, his sovereign, his mysterious and all-powerful monarch was no more. Compared to her we counted for very little."}, {"start": 912.86, "end": 921.62, "b_start": 1831.69, "b_end": 1850.88, "orig": "Il était loin le temps où, quand nous avions commencé à venir passer nos vacances à Combray, nous possédions autant de prestige que ma tante aux yeux de Françoise.", "en": "The time was long gone when, when we began to come and spend our holidays in Combray, we had as much prestige as my aunt in Françoise's eyes."}, {"start": 922.62, "end": 963.75, "b_start": 1850.88, "b_end": 1937.05, "orig": "Cet automne-là, tout occupés des formalités à remplir, des entretiens avec les notaires et avec les fermiers, mes parents, n’ayant guère de loisir pour faire des sorties que le temps d’ailleurs contrariait, prirent l’habitude de me laisser aller me promener sans eux du côté de Méséglise, enveloppé dans un grand plaid qui me protégeait contre la pluie et que je jetais d’autant plus volontiers sur mes épaules que je sentais que ses rayures écossaises scandalisaient Françoise, dans l’esprit de qui on n’aurait pu faire entrer l’idée que la couleur des vêtements n’a rien à faire avec le deuil et à qui d’ailleurs le chagrin que nous avions de la mort de ma tante plaisait peu, parce que nous n’avions pas donné de grand repas funèbre, que nous ne prenions pas un son de voix spécial pour parler d’elle, que même parfois je chantonnais.", "en": "That autumn, busy with the formalities to be completed, with interviews with notaries and with farmers, my parents, having little leisure to go on outings which the weather otherwise hampered, got into the habit of letting me go for a walk without them near Méséglise, wrapped in a large blanket which protected me against the rain and which I threw all the more readily over my shoulders because I felt that its Scottish stripes scandalized Françoise, in spirit. who could not have been introduced to the idea that the color of clothing has nothing to do with mourning and who, moreover, did not like the grief we had over my aunt's death, because we had not given a big funeral meal, because we did not use a special sound of voice to speak about her, which sometimes I even hummed."}, {"start": 964.75, "end": 974.64, "b_start": 1937.05, "b_end": 1959.62, "orig": "Je suis sûr que dans un livre – et en cela j’étais bien moi-même comme Françoise – cette conception du deuil d’après la Chanson de Roland et le portail de Saint-André-des-Champs m’eût été sympathique.", "en": "I am sure that in a book – and in this I was very much like Françoise – this conception of mourning based on the Song of Roland and the portal of Saint-André-des-Champs would have been sympathetic to me."}, {"start": 975.64, "end": 996.69, "b_start": 1959.62, "b_end": 2004.16, "orig": "Mais dès que Françoise était auprès de moi, un démon me poussait à souhaiter qu’elle fût en colère, je saisissais le moindre prétexte pour lui dire que je regrettais ma tante parce que c’était une bonne femme, malgré ses ridicules, mais nullement parce que c’était ma tante, qu’elle eût pu être ma tante et me sembler odieuse, et sa mort ne me faire aucune peine, propos qui m’eussent semblé ineptes dans un livre.", "en": "But as soon as Françoise was near me, a demon pushed me to wish that she was angry, I seized the slightest pretext to tell her that I missed my aunt because she was a good woman, despite her ridicule, but not at all because she was my aunt, that she could have been my aunt and seemed odious to me, and her death would not have caused me any pain, remarks which would have seemed inept to me in a book."}, {"start": 997.69, "end": 1037.84, "b_start": 2004.16, "b_end": 2089.92, "orig": "Si alors Françoise, remplie comme un poète d’un flot de pensées confuses sur le chagrin, sur les souvenirs de famille, s’excusait de ne pas savoir répondre à mes théories et disait : « Je ne sais pas m’esprimer », je triomphais de cet aveu avec un bon sens ironique et brutal digne du docteur Percepied ; et si elle ajoutait : « Elle était tout de même de la parentèse, il reste toujours le respect qu’on doit à la parentèse », je haussais les épaules et je me disais : « Je suis bien bon de discuter avec une illettrée qui fait des cuirs pareils », adoptant ainsi pour juger Françoise le point de vue mesquin d’hommes dont ceux qui les méprisent le plus dans l’impartialité de la méditation, sont fort capables de tenir le rôle, quand ils jouent une des scènes vulgaires de la vie.", "en": "If then Françoise, filled like a poet with a flood of confused thoughts about grief, about family memories, apologized for not knowing how to respond to my theories and said: \"I don't know how to express myself\", I triumphed over this admission with an ironic and brutal good sense worthy of Doctor Percepied; and if she added: \"She was all the same parentesis, there always remains the respect that one owes to parentesis\", I shrugged my shoulders and said to myself: \"I am very good to discuss with an illiterate woman who makes such leathers\", thus adopting to judge Françoise the petty point of view of men of whom those who despise them the most in the impartiality of meditation, are very capable of playing the role, when they play one of the vulgar scenes of the life."}, {"start": 1038.84, "end": 1045.39, "b_start": 2089.92, "b_end": 2103.97, "orig": "Mes promenades de cet automne-là furent d’autant plus agréables que je les faisais après de longues heures passées sur un livre.", "en": "My walks that fall were all the more pleasant because I took them after long hours spent reading a book."}, {"start": 1046.39, "end": 1064.61, "b_start": 2103.97, "b_end": 2142.34, "orig": "Quand j’étais fatigué d’avoir lu toute la matinée dans la salle, jetant mon plaid sur mes épaules, je sortais : mon corps obligé depuis longtemps de garder l’immobilité, mais qui s’était chargé sur place d’animation et de vitesse accumulées, avait besoin ensuite, comme une toupie qu’on lâche, de les dépenser dans toutes les directions.", "en": "When I was tired from reading all morning in the room, throwing my blanket over my shoulders, I went out: my body, which had long been obliged to maintain immobility, but which had taken on the accumulated animation and speed on the spot, then needed, like a spinning top released, to expend them in all directions."}, {"start": 1065.61, "end": 1089.39, "b_start": 2142.34, "b_end": 2191.86, "orig": "Les murs des maisons, la haie de Tansonville, les arbres du bois de Roussainville, les buissons auxquels s’adosse Montjouvain, recevaient des coups de parapluie ou de canne, entendaient des cris joyeux, qui n’étaient, les uns et les autres, que des idées confuses qui m’exaltaient et qui n’ont pas atteint le repos dans la lumière, pour avoir préféré à un lent et difficile éclaircissement, le plaisir d’une dérivation plus aisée vers une issue immédiate.", "en": "The walls of the houses, the hedge of Tansonville, the trees of the woods of Roussainville, the bushes against which Montjouvain leans, received blows from umbrellas or canes, heard joyful cries, which were, both of them, only confused ideas which excited me and which did not achieve rest in the light, for having preferred to a slow and difficult enlightenment, the pleasure of an easier diversion towards an exit immediate."}, {"start": 1090.39, "end": 1100.76, "b_start": 2191.86, "b_end": 2213.04, "orig": "La plupart des prétendues traductions de ce que nous avons ressenti ne font ainsi que nous en débarrasser, en le faisant sortir de nous sous une forme indistincte qui ne nous apprend pas à le connaître.", "en": "Most so-called translations of what we have felt do nothing but get rid of it, making it come out of us in an indistinct form that does not teach us to know it."}, {"start": 1101.76, "end": 1121.85, "b_start": 2213.04, "b_end": 2254.81, "orig": "Quand j’essaye de faire le compte de ce que je dois au côté de Méséglise, des humbles découvertes dont il fût le cadre fortuit ou le nécessaire inspirateur, je me rappelle que c’est cet automne-là, dans une de ces promenades, près du talus broussailleux qui protège Montjouvain, que je fus frappé pour la première fois de ce désaccord entre nos impressions et leur expression habituelle.", "en": "When I try to take into account what I owe to Méséglise, the humble discoveries of which he was the fortuitous setting or the necessary inspiration, I remember that it was that autumn, in one of these walks, near the bushy embankment which protects Montjouvain, that I was struck for the first time by this disagreement between our impressions and their usual expression."}, {"start": 1122.85, "end": 1132.86, "b_start": 2254.81, "b_end": 2276.88, "orig": "Après une heure de pluie et de vent contre lesquels j’avais lutté avec allégresse, comme j’arrivais au bord de la mare de Montjouvain devant une petite cahute recouverte en tuiles où le jardinier de M.", "en": "After an hour of rain and wind against which I had fought with joy, as I arrived at the edge of the Montjouvain pond in front of a small hut covered in tiles where the gardener of Mr."}, {"start": 1133.86, "end": 1148.64, "b_start": 2276.88, "b_end": 2307.56, "orig": "Vinteuil serrait ses instruments de jardinage, le soleil venait de reparaître, et ses dorures lavées par l’averse reluisaient à neuf dans le ciel, sur les arbres, sur le mur de la cahute, sur son toit de tuile encore mouillé, à la crête duquel se promenait une poule.", "en": "Vinteuil clutched his gardening tools, the sun had just reappeared, and its gilding, washed by the downpour, shone anew in the sky, on the trees, on the wall of the hut, on its still wet tile roof, on the crest of which a hen was walking."}, {"start": 1149.64, "end": 1164.78, "b_start": 2307.56, "b_end": 2337.84, "orig": "Le vent qui soufflait tirait horizontalement les herbes folles qui avaient poussé dans la paroi du mur, et les plumes de duvet de la poule, qui, les unes et les autres se laissaient filer au gré de son souffle jusqu’à l’extrémité de leur longueur, avec l’abandon de choses inertes et légères.", "en": "The wind which was blowing horizontally pulled the wild grasses which had grown in the wall, and the hen's down feathers, which, each of which let themselves drift with its breath to the end of their length, with the abandonment of inert and light things."}, {"start": 1165.78, "end": 1174.9, "b_start": 2337.84, "b_end": 2356.33, "orig": "Le toit de tuile faisait dans la mare, que le soleil rendait de nouveau réfléchissante, une marbrure rose, à laquelle je n’avais encore jamais fait attention.", "en": "The tiled roof made a pink marbling in the pond, which the sun made reflective again, which I had never paid attention to before."}, {"start": 1175.9, "end": 1194.17, "b_start": 2356.33, "b_end": 2395.85, "orig": "Et voyant sur l’eau et à la face du mur un pâle sourire répondre au sourire du ciel, je m’écriai dans mon enthousiasme en brandissant mon parapluie refermé : « Zut, zut, zut, zut. » Mais en même temps je sentis que mon devoir eût été de ne pas m’en tenir à ces mots opaques et de tâcher de voir plus clair dans mon ravissement.", "en": "And seeing on the water and on the face of the wall a pale smile responding to the smile of the sky, I cried out in my enthusiasm, brandishing my closed umbrella: “Damn, damn, damn, damn. » But at the same time I felt that my duty would have been not to stick to these opaque words and to try to see more clearly in my rapture."}, {"start": 1195.17, "end": 1215.54, "b_start": 2395.85, "b_end": 2439.28, "orig": "Et c’est à ce moment-là encore – grâce à un paysan qui passait, l’air déjà d’être d’assez mauvaise humeur, qui le fut davantage quand il faillit recevoir mon parapluie dans la figure, et qui répondit sans chaleur à mes « beau temps, n’est-ce pas, il fait bon marcher » – que j’appris que les mêmes émotions ne se produisent pas simultanément, dans un ordre préétabli, chez tous les hommes.", "en": "And it was at that moment again - thanks to a peasant who was passing by, already looking like he was in a rather bad mood, who was even more so when he almost got my umbrella in the face, and who responded without warmth to my \"nice weather, isn't it, it's good to walk\" - that I learned that the same emotions do not occur simultaneously, in a pre-established order, in all men."}, {"start": 1216.54, "end": 1229.38, "b_start": 2439.28, "b_end": 2465.3, "orig": "Plus tard, chaque fois qu’une lecture un peu longue m’avait mis en humeur de causer, le camarade à qui je brûlais d’adresser la parole venait justement de se livrer au plaisir de la conversation et désirait maintenant qu’on le laissât lire tranquille.", "en": "Later, each time a somewhat long reading had put me in the mood to talk, the comrade to whom I burned to speak had just indulged in the pleasure of conversation and now wanted to be left alone to read."}, {"start": 1230.38, "end": 1244.9, "b_start": 2465.3, "b_end": 2496.23, "orig": "Si je venais de penser à mes parents avec tendresse et de prendre les décisions les plus sages et les plus propres à leur faire plaisir, ils avaient employé le même temps à apprendre une peccadille que j’avais oubliée et qu’ils me reprochaient sévèrement au moment où je m’élançais vers eux pour les embrasser.", "en": "If I had just thought of my parents with tenderness and made the wisest and most likely decisions to please them, they had spent the same time learning a peccadillo that I had forgotten and for which they reproached me severely at the moment when I rushed towards them to embrace them."}, {"start": 1245.9, "end": 1257.28, "b_start": 2496.23, "b_end": 2521.22, "orig": "Parfois à l’exaltation que me donnait la solitude, s’en ajoutait une autre que je ne savais pas en départager nettement, causée par le désir de voir surgir devant moi une paysanne que je pourrais serrer dans mes bras.", "en": "Sometimes to the exaltation that solitude gave me, another was added that I did not know how to clearly separate, caused by the desire to see a peasant girl appear before me whom I could hold in my arms."}, {"start": 1258.28, "end": 1270.28, "b_start": 2521.22, "b_end": 2547.49, "orig": "Né brusquement, et sans que j’eusse eu le temps de le rapporter exactement à sa cause, au milieu de pensées très différentes, le plaisir dont il était accompagné ne me semblait qu’un degré supérieur de celui qu’elles me donnaient.", "en": "Born suddenly, and without me having had the time to relate it exactly to its cause, in the midst of very different thoughts, the pleasure with which it was accompanied seemed to me only a degree higher than that which they gave me."}, {"start": 1271.28, "end": 1297.94, "b_start": 2547.49, "b_end": 2604.7, "orig": "Je faisais un mérite de plus à tout ce qui était à ce moment-là dans mon esprit, au reflet rose du toit de tuile, aux herbes folles, au village de Roussainville où je désirais depuis longtemps aller, aux arbres de son bois, au clocher de son église, de cet émoi nouveau qui me les faisait seulement paraître plus désirables parce que je croyais que c’était eux qui le provoquaient, et qui semblait ne vouloir que me porter vers eux plus rapidement quand il enflait ma voile d’une brise puissante, inconnue et propice.", "en": "I made one more merit to everything that was in my mind at that moment, to the pink reflection of the tile roof, to the wild grass, to the village of Roussainville where I had long wanted to go, to the trees of its woods, to the bell tower of its church, of this new emotion which only made them seem more desirable to me because I believed that it was they who provoked it, and which seemed only to want to carry me towards them more quickly when it swelled my sail a little. powerful, unknown and propitious breeze."}, {"start": 1298.94, "end": 1310.49, "b_start": 2604.7, "b_end": 2629.45, "orig": "Mais si ce désir qu’une femme apparût ajoutait pour moi aux charmes de la nature quelque chose de plus exaltant, les charmes de la nature, en retour, élargissaient ce que celui de la femme aurait eu de trop restreint.", "en": "But if this desire for a woman to appear added for me to the charms of nature something more exhilarating, the charms of nature, in return, enlarged what that of the woman would have been too restricted."}, {"start": 1311.49, "end": 1331.53, "b_start": 2629.45, "b_end": 2672.04, "orig": "Il me semblait que la beauté des arbres c’était encore la sienne, et que l’âme de ces horizons, du village de Roussainville, des livres que je lisais cette année-là, son baiser me la livrerait ; et mon imagination reprenant des forces au contact de ma sensualité, ma sensualité se répandant dans tous les domaines de mon imagination, mon désir n’avait plus de limites.", "en": "It seemed to me that the beauty of the trees was still hers, and that the soul of these horizons, of the village of Roussainville, of the books I read that year, her kiss would deliver it to me; and my imagination regaining strength in contact with my sensuality, my sensuality spreading in all areas of my imagination, my desire no longer had limits."}, {"start": 1332.53, "end": 1354.58, "b_start": 2672.04, "b_end": 2719.57, "orig": "C’est qu’aussi – comme il arrive dans ces moments de rêverie au milieu de la nature où l’action de l’habitude étant suspendue, nos notions abstraites des choses mises de côté, nous croyons d’une foi profonde à l’originalité, à la vie individuelle du lieu où nous nous trouvons – la passante qu’appelait mon désir me semblait être non un exemplaire quelconque de ce type général : la femme, mais un produit nécessaire et naturel de ce sol.", "en": "It is also that – as happens in these moments of reverie in the middle of nature where the action of habit being suspended, our abstract notions of things put aside, we believe with deep faith in the originality, in the individual life of the place where we find ourselves – the passer-by whom my desire called seemed to me to be not any exemplar of this general type: woman, but a necessary and natural product of this soil."}, {"start": 1355.58, "end": 1368.38, "b_start": 2719.57, "b_end": 2747.9, "orig": "Car en ce temps-là tout ce qui n’était pas moi, la terre et les êtres, me paraissait plus précieux, plus important, doué d’une existence plus réelle que cela ne paraît aux hommes faits. Et la terre et les êtres, je ne les séparais pas.", "en": "Because at that time everything that was not me, the earth and beings, seemed to me more precious, more important, endowed with a more real existence than it appears to grown men. And the earth and the beings, I did not separate them."}, {"start": 1369.38, "end": 1385.58, "b_start": 2747.9, "b_end": 2783.22, "orig": "J’avais le désir d’une paysanne de Méséglise ou de Roussainville, d’une pêcheuse de Balbec, comme j’avais le désir de Méséglise et de Balbec. Le plaisir qu’elles pouvaient me donner m’aurait paru moins vrai, je n’aurais plus cru en lui, si j’en avais modifié à ma guise les conditions.", "en": "I had the desire for a peasant woman from Méséglise or Roussainville, a fisherwoman from Balbec, as I had the desire for Méséglise and Balbec. The pleasure they could give me would have seemed less true to me, I would no longer have believed in it, if I had modified the conditions as I pleased."}, {"start": 1386.58, "end": 1402.37, "b_start": 2783.22, "b_end": 2817.29, "orig": "Connaître à Paris une pêcheuse de Balbec ou une paysanne de Méséglise, c’eût été recevoir des coquillages que je n’aurais pas vus sur la plage, une fougère que je n’aurais pas trouvée dans les bois, c’eût été retrancher au plaisir que la femme me donnerait tous ceux au milieu desquels l’avait enveloppée mon imagination.", "en": "To know a fisherwoman from Balbec or a peasant woman from Méséglise in Paris would have been to receive shells that I would not have seen on the beach, a fern that I would not have found in the woods, it would have been to take away from the pleasure that the woman would give me all those in which my imagination had enveloped her."}, {"start": 1403.37, "end": 1412.01, "b_start": 2817.29, "b_end": 2835.88, "orig": "Mais errer ainsi dans les bois de Roussainville sans une paysanne à embrasser, c’était ne pas connaître de ces bois le trésor caché, la beauté profonde.", "en": "But to wander like this in the woods of Roussainville without a peasant girl to kiss was to not know the hidden treasure of these woods, the profound beauty."}, {"start": 1413.01, "end": 1425.1, "b_start": 2835.88, "b_end": 2862.5, "orig": "Cette fille que je ne voyais que criblée de feuillages, elle était elle-même pour moi comme une plante locale d’une espèce plus élevée seulement que les autres et dont la structure permet d’approcher de plus près qu’en elles la saveur profonde du pays.", "en": "This girl whom I only saw riddled with foliage, she herself was for me like a local plant of a species only higher than the others and whose structure allows us to approach more closely than in them the deep flavor of the country."}, {"start": 1426.1, "end": 1451.18, "b_start": 2862.5, "b_end": 2916.4, "orig": "Je pouvais d’autant plus facilement le croire (et que les caresses par lesquelles elle m’y ferait parvenir seraient aussi d’une sorte particulière et dont je n’aurais pas pu connaître le plaisir par une autre qu’elle), que j’étais pour longtemps encore à l’âge où on ne l’a pas encore abstrait ce plaisir de la possession des femmes différentes avec lesquelles on l’a goûté, où on ne l’a pas réduit à une notion générale qui les fait considérer dès lors comme des instruments interchangeables d’un plaisir toujours identique.", "en": "I could believe it all the more easily (and that the caresses by which she would make me achieve it would also be of a particular kind and the pleasure of which I could not have known through anyone other than her), that I was for a long time still at the age where we have not yet abstracted this pleasure from the possession of the different women with whom we have tasted it, where we have not reduced it to a general notion which makes them considered from then on as interchangeable instruments of an always identical pleasure."}, {"start": 1452.18, "end": 1461.95, "b_start": 2916.4, "b_end": 2938.66, "orig": "Il n’existe même pas, isolé, séparé et formulé dans l’esprit, comme le but qu’on poursuit en s’approchant d’une femme, comme la cause du trouble préalable qu’on ressent.", "en": "It does not even exist, isolated, separated and formulated in the mind, as the goal one pursues in approaching a woman, as the cause of the prior disturbance one feels."}, {"start": 1462.95, "end": 1471.54, "b_start": 2938.66, "b_end": 2958.64, "orig": "À peine y songe-t-on comme un plaisir qu’on aura ; plutôt, on l’appelle son charme à elle ; car on ne pense pas à soi, on ne pense qu’à sortir de soi.", "en": "We hardly think of it as a pleasure we will have; rather, it is called her own charm; because we don't think about ourselves, we only think about getting out of ourselves."}, {"start": 1472.54, "end": 1495.22, "b_start": 2958.64, "b_end": 3006.02, "orig": "Obscurément attendu, immanent et caché, il porte seulement à un tel paroxysme au moment où il s’accomplit les autres plaisirs que nous causent les doux regards, les baisers de celle qui est auprès de nous, qu’il nous apparaît surtout à nous-même comme une sorte de transport de notre reconnaissance pour la bonté de cœur de notre compagne et pour sa touchante prédilection à notre égard que nous mesurons aux bienfaits, au bonheur dont elle nous comble.", "en": "Obscurely awaited, immanent and hidden, it only brings to such a paroxysm at the moment when it is accomplished the other pleasures caused to us by the sweet glances, the kisses of the one who is near us, that it appears to us above all as a sort of transport of our gratitude for the goodness of heart of our companion and for her touching predilection towards us which we measure by the benefits, by the happiness with which she fills us."}, {"start": 1496.22, "end": 1533.14, "b_start": 3006.02, "b_end": 3082.4, "orig": "Hélas, c’était en vain que j’implorais le donjon de Roussainville, que je lui demandais de faire venir auprès de moi quelque enfant de son village, comme au seul confident que j’avais eu de mes premiers désirs, quand au haut de notre maison de Combray, dans le petit cabinet sentant l’iris, je ne voyais que sa tour au milieu du carreau de la fenêtre entr’ouverte, pendant qu’avec les hésitations héroïques du voyageur qui entreprend une exploration ou du désespéré qui se suicide, défaillant, je me frayais en moi-même une route inconnue et que je croyais mortelle, jusqu’au moment où une trace naturelle comme celle d’un colimaçon s’ajoutait aux feuilles du cassis sauvage qui se penchaient jusqu’à moi.", "en": "Alas, it was in vain that I implored the dungeon of Roussainville, that I asked it to bring to me some child from its village, as the only confidant that I had had of my first desires, when at the top of our house in Combray, in the little cabinet smelling of iris, I saw only its tower in the middle of the pane of the half-open window, while with the heroic hesitations of the traveler who undertakes an exploration or of the desperate person who commits suicide, failing, I forged within myself an unknown path which I believed to be mortal, until the moment when a natural trace like that of a spiral was added to the leaves of the wild blackcurrant which leaned towards me."}, {"start": 1534.14, "end": 1543.4, "b_start": 3082.4, "b_end": 3103.01, "orig": "En vain je le suppliais maintenant. En vain, tenant l’étendue dans le champ de ma vision, je la drainais de mes regards qui eussent voulu en ramener une femme.", "en": "In vain I begged him now. In vain, holding the expanse in the field of my vision, I drained it of my glances which would have wanted to bring back a woman."}, {"start": 1544.4, "end": 1555.34, "b_start": 3103.01, "b_end": 3127.04, "orig": "Je pouvais aller jusqu’au porche de Saint-André-des-Champs ; jamais ne s’y trouvait la paysanne que je n’eusse pas manqué d’y rencontrer si j’avais été avec mon grand-père et dans l’impossibilité de lier conversation avec elle.", "en": "I could go as far as the porch of Saint-André-des-Champs; There was never the peasant woman there whom I would not have missed meeting there if I had been with my grandfather and unable to strike up a conversation with her."}, {"start": 1556.34, "end": 1597.05, "b_start": 3127.04, "b_end": 3213.14, "orig": "Je fixais indéfiniment le tronc d’un arbre lointain, de derrière lequel elle allait surgir et venir à moi ; l’horizon scruté restait désert, la nuit tombait, c’était sans espoir que mon attention s’attachait, comme pour aspirer les créatures qu’ils pouvaient recéler, à ce sol stérile, à cette terre épuisée ; et ce n’était plus d’allégresse, c’était de rage que je frappais les arbres du bois de Roussainville d’entre lesquels ne sortait pas plus d’êtres vivants que s’ils eussent été des arbres peints sur la toile d’un panorama, quand, ne pouvant me résigner à rentrer à la maison avant d’avoir serré dans mes bras la femme que j’avais tant désirée, j’étais pourtant obligé de reprendre le chemin de Combray en m’avouant à moi-même qu’était de moins en moins probable le hasard qui l’eût mise sur mon chemin.", "en": "I stared indefinitely at the trunk of a distant tree, from behind which she was going to emerge and come to me; the horizon scanned remained deserted, night fell, it was without hope that my attention was attached, as if to suck up the creatures they could conceal, to this sterile soil, to this exhausted earth; and it was no longer with joy, it was with rage that I struck the trees of the woods of Roussainville from between which no more living beings emerged than if they had been trees painted on the canvas of a panorama, when, unable to resign myself to returning home before having hugged in my arms the woman I had so desired, I was nevertheless obliged to return to Combray, confessing to myself that the chance that would have put her in my path was less and less probable."}, {"start": 1598.05, "end": 1613.1, "b_start": 3213.14, "b_end": 3248.22, "orig": "Et s’y fût-elle trouvée, d’ailleurs, eussé-je osé lui parler ? Il me semblait qu’elle m’eût considéré comme un fou ; je cessais de croire partagés par d’autres êtres, de croire vrais en dehors de moi, les désirs que je formais pendant ces promenades et qui ne se réalisaient pas.", "en": "And had she been there, moreover, would I have dared to speak to her? It seemed to me that she would have considered me crazy; I stopped believing that the desires that I formed during these walks and which did not come true were shared by other beings, to believe that the desires that I formed during these walks were true outside of me."}, {"start": 1614.1, "end": 1621.2, "b_start": 3248.22, "b_end": 3263.59, "orig": "Ils ne m’apparaissaient plus que comme les créations purement subjectives, impuissantes, illusoires, de mon tempérament.", "en": "They no longer appeared to me as purely subjective, powerless, illusory creations of my temperament."}, {"start": 1622.2, "end": 1636.17, "b_start": 3263.59, "b_end": 3293.08, "orig": "Ils n’avaient plus de lien avec la nature, avec la réalité qui dès lors perdait tout charme et toute signification et n’était plus à ma vie qu’un cadre conventionnel, comme l’est à la fiction d’un roman le wagon sur la banquette duquel le voyageur le lit pour tuer le temps.", "en": "They no longer had a link with nature, with reality which from then on lost all charm and all meaning and was nothing more than a conventional framework in my life, like the wagon on the seat of which the traveler reads it to kill time in the fiction of a novel."}, {"start": 1637.17, "end": 1648.5, "b_start": 3293.08, "b_end": 3317.62, "orig": "C’est peut-être d’une impression ressentie aussi auprès de Montjouvain, quelques années plus tard, impression restée obscure alors, qu’est sortie, bien après, l’idée que je me suis faite du sadisme.", "en": "It is perhaps from an impression also felt near Montjouvain, a few years later, an impression which remained obscure at the time, that the idea that I had of sadism arose, long afterwards."}, {"start": 1649.5, "end": 1656.6, "b_start": 3317.62, "b_end": 3333.97, "orig": "On verra plus tard que, pour de tout autres raisons, le souvenir de cette impression devait jouer un rôle important dans ma vie.", "en": "We will see later that, for completely different reasons, the memory of this impression was to play an important role in my life."}, {"start": 1657.6, "end": 1677.28, "b_start": 3333.97, "b_end": 3377.62, "orig": "C’était par un temps très chaud ; mes parents qui avaient dû s’absenter pour toute la journée, m’avaient dit de rentrer aussi tard que je voudrais ; et étant allé jusqu’à la mare de Montjouvain où j’aimais revoir les reflets du toit de tuile, je m’étais étendu à l’ombre et endormi dans les buissons du talus qui domine la maison, là où j’avais attendu mon père autrefois, un jour qu’il était allé voir M.", "en": "It was very hot weather; my parents, who had to be gone for the whole day, told me to come home as late as I wanted; and having gone as far as the Montjouvain pond where I liked to see the reflections of the tiled roof again, I lay down in the shade and fell asleep in the bushes of the embankment which dominates the house, where I had once waited for my father, one day when he had gone to see Mr."}, {"start": 1678.28, "end": 1679.91, "b_start": 3377.62, "b_end": 3382.52, "orig": "Vinteuil.", "en": "Vinteuil."}, {"start": 1680.91, "end": 1706.35, "b_start": 3382.52, "b_end": 3432.79, "orig": "Il faisait presque nuit quand je m’éveillai, je voulus me lever, mais je vis M\nlle\nVinteuil (autant que je pus la reconnaître, car je ne l’avais pas vue souvent à Combray, et seulement quand elle était encore une enfant, tandis qu’elle commençait d’être une jeune fille) qui probablement venait de rentrer, en face de moi, à quelques centimètres de moi, dans cette chambre où son père avait reçu le mien et dont elle avait fait son petit salon à elle.", "en": "It was almost dark when I woke up, I wanted to get up, but I saw Miss Vinteuil (as far as I could recognize her, because I had not seen her often in Combray, and only when she was still a child, when she was just beginning to be a young girl) who had probably just returned, opposite me, a few centimeters from me, in this room where her father had received mine and of which she had made her own little living room."}, {"start": 1707.35, "end": 1719.23, "b_start": 3432.79, "b_end": 3458.2, "orig": "La fenêtre était entr’ouverte, la lampe était allumée, je voyais tous ses mouvements sans qu’elle me vît, mais en m’en allant j’aurais fait craquer les buissons, elle m’aurait entendu et elle aurait pu croire que je m’étais caché là pour l’épier.", "en": "The window was ajar, the lamp was on, I saw all her movements without her seeing me, but if I left I would have made the bushes creak, she would have heard me and she might have believed that I had hidden there to spy on her."}, {"start": 1720.23, "end": 1737.32, "b_start": 3458.2, "b_end": 3494.57, "orig": "Elle était en grand deuil, car son père était mort depuis peu. Nous n’étions pas allés la voir, ma mère ne l’avait pas voulu à cause d’une vertu qui chez elle limitait seule les effets de la bonté : la pudeur ; mais elle la plaignait profondément. Ma mère se rappelant la triste fin de vie de M.", "en": "She was in great mourning, because her father had recently died. We had not gone to see her, my mother had not wanted to because of a virtue which in her alone limited the effects of kindness: modesty; but she pitied her deeply. My mother remembering the sad end of life of Mr."}, {"start": 1738.32, "end": 1781.59, "b_start": 3494.57, "b_end": 3585.56, "orig": "Vinteuil, tout absorbée d’abord par les soins de mère et de bonne d’enfant qu’il donnait à sa fille, puis par les souffrances que celle-ci lui avait causées ; elle revoyait le visage torturé qu’avait eu le vieillard tous les derniers temps ; elle savait qu’il avait renoncé à jamais à achever de transcrire au net toute son œuvre des dernières années, pauvres morceaux d’un vieux professeur de piano, d’un ancien organiste de village dont nous imaginions bien qu’ils n’avaient guère de valeur en eux-mêmes, mais que nous ne méprisions pas, parce qu’ils en avaient tant pour lui dont ils avaient été la raison de vivre avant qu’il les sacrifiât à sa fille, et qui pour la plupart pas même notés, conservés seulement dans sa mémoire, quelques-uns inscrits sur des feuillets épars, illisibles, resteraient inconnus ; ma mère pensait à cet autre renoncement plus cruel encore auquel M.", "en": "Vinteuil, completely absorbed first by the care of mother and nanny that he gave to his daughter, then by the suffering that she had caused him; she saw again the tortured face that the old man had had lately; she knew that he had forever given up trying to finish transcribing clearly all his work of recent years, poor pieces of an old piano teacher, of a former village organist which we well imagined had little value in themselves, but which we did not despise, because they had so much for him which they had been the reason for living before he sacrificed them to his daughter, and which for the most part had not even been written down, preserved only in his memory, a few written on scattered, illegible sheets would remain unknown; my mother was thinking of this other, even more cruel renunciation to which Mr."}, {"start": 1782.59, "end": 1805.68, "b_start": 3585.56, "b_end": 3632.06, "orig": "Vinteuil avait été contraint, le renoncement à un avenir de bonheur honnête et respecté pour sa fille ; quand elle évoquait toute cette détresse suprême de l’ancien maître de piano de mes tantes, elle éprouvait un véritable chagrin et songeait avec effroi à celui, autrement amer, que devait éprouver M\nlle\nVinteuil, tout mêlé du remords d’avoir à peu près tué son père. « Pauvre M.", "en": "Vinteuil had been forced, the renunciation of a future of honest and respected happiness for his daughter; when she spoke of all this supreme distress of my aunts' former piano master, she felt real sorrow and thought with fear of that, otherwise bitter, that M lle Vinteuil must have felt, all mixed with remorse for having almost killed her father. “Poor Mr."}, {"start": 1806.68, "end": 1816.74, "b_start": 3632.06, "b_end": 3653.68, "orig": "Vinteuil, disait ma mère, il a vécu et il est mort pour sa fille, sans avoir reçu son salaire. Le recevra-t-il après sa mort et sous quelle forme ?", "en": "Vinteuil, my mother said, he lived and died for his daughter, without having received his salary. Will he receive it after his death and in what form?"}, {"start": 1817.74, "end": 1838.86, "b_start": 3653.68, "b_end": 3695.86, "orig": "Il ne pourrait lui venir que d’elle. »\nAu fond du salon de M\nlle\nVinteuil, sur la cheminée, était posé un petit portrait de son père que vivement elle alla chercher au moment où retentit le roulement d’une voiture qui venait de la route, puis elle se jeta sur un canapé, et tira près d’elle une petite table sur laquelle elle plaça le portrait, comme M.", "en": "It could only come from her. » At the back of Miss Vinteuil's living room, on the fireplace, was placed a small portrait of her father which she quickly went to fetch at the moment when there was the sound of a car coming from the road, then she threw herself onto a sofa, and pulled a small table close to her on which she placed the portrait, like Mr."}, {"start": 1839.86, "end": 1857.62, "b_start": 3695.86, "b_end": 3731.27, "orig": "Vinteuil autrefois avait mis à côté de lui le morceau qu’il avait le désir de jouer à mes parents. Bientôt son amie entra. M\nlle\nVinteuil l’accueillit sans se lever, ses deux mains derrière la tête et se recula sur le bord opposé du sofa comme pour lui faire une place.", "en": "Vinteuil once placed next to him the piece he wanted to play for my parents. Soon her friend entered. M lle Vinteuil welcomed him without getting up, her two hands behind her head and moved back to the opposite edge of the sofa as if to make room for him."}, {"start": 1858.62, "end": 1864.42, "b_start": 3731.27, "b_end": 3745.01, "orig": "Mais aussitôt elle sentit qu’elle semblait ainsi lui imposer une attitude qui lui était peut-être importune.", "en": "But immediately she felt that she seemed to be imposing an attitude on him that was perhaps unwelcome to him."}, {"start": 1865.42, "end": 1881.79, "b_start": 3745.01, "b_end": 3780.66, "orig": "Elle pensa que son amie aimerait peut-être mieux être loin d’elle sur une chaise, elle se trouva indiscrète, la délicatesse de son cœur s’en alarma ; reprenant toute la place sur le sofa elle ferma les yeux et se mit à bâiller pour indiquer que l’envie de dormir était la seule raison pour laquelle elle s’était ainsi étendue.", "en": "She thought that her friend would perhaps prefer to be away from her on a chair, she found herself indiscreet, the delicacy of her heart was alarmed; taking up all the space on the sofa, she closed her eyes and began to yawn to indicate that the desire to sleep was the only reason why she had stretched out like this."}, {"start": 1882.79, "end": 1892.27, "b_start": 3780.66, "b_end": 3801.48, "orig": "Malgré la familiarité rude et dominatrice qu’elle avait avec sa camarade, je reconnaissais les gestes obséquieux et réticents, les brusques scrupules de son père.", "en": "Despite the rough and dominating familiarity she had with her comrade, I recognized the obsequious and reticent gestures, the sudden scruples of her father."}, {"start": 1893.27, "end": 1908.92, "b_start": 3801.48, "b_end": 3831.92, "orig": "Bientôt elle se leva, feignit de vouloir fermer les volets et de n’y pas réussir.\n– Laisse donc tout ouvert, j’ai chaud, dit son amie.\n– Mais c’est assommant, on nous verra, répondit M\nlle\nVinteuil.", "en": "Soon she got up, pretended to want to close the shutters but was unable to do so. – Leave everything open, I’m hot, said her friend. “But it’s boring, we’ll be seen,” replied M lle Vinteuil."}, {"start": 1909.92, "end": 1922.52, "b_start": 3831.92, "b_end": 3859.54, "orig": "Mais elle devina sans doute que son amie penserait qu’elle n’avait dit ces mots que pour la provoquer à lui répondre par certains autres, qu’elle avait en effet le désir d’entendre, mais que par discrétion elle voulait lui laisser l’initiative de prononcer.", "en": "But she undoubtedly guessed that her friend would think that she had only said these words to provoke her into responding with certain others, which she indeed wanted to hear, but which out of discretion she wanted to give her the initiative to pronounce."}, {"start": 1923.52, "end": 1939.72, "b_start": 3859.54, "b_end": 3892.6, "orig": "Aussi son regard, que je ne pouvais distinguer, dut-il prendre l’expression qui plaisait tant à ma grand’mère, quand elle ajouta vivement :\n– Quand je dis nous voir, je veux dire nous voir lire ; c’est assommant, quelque chose insignifiante qu’on fasse, de penser que des yeux vous voient.", "en": "So her look, which I could not distinguish, had to take on the expression that pleased my grandmother so much, when she added quickly: “When I say seeing us, I mean seeing us reading; It’s boring, such an insignificant thing to do, to think that eyes are seeing you."}, {"start": 1940.72, "end": 1949.74, "b_start": 3892.6, "b_end": 3913.06, "orig": "Par une générosité instinctive et une politesse involontaire elle taisait les mots prémédités qu’elle avait jugés indispensables à la pleine réalisation de son désir.", "en": "By an instinctive generosity and an involuntary politeness she kept quiet
